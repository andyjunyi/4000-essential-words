rate","p":"[diˈtiəriəreit] v.","d":"To deteriorate means to become steadily worse.","e":"The nation&rsquo;s economy continued to deteriorate despite the politicians&rsquo; efforts.","zh":"(動) 惡化；變糟　(動) 衰退；退化","ez":"儘管政治人物努力，國家經濟仍持續惡化。"},{"w":"exterior","p":"[iksˈtiəriər] n.","d":"An exterior is the outside surface of something.","e":"The exterior of the nut was hard and woody, but the inside was soft and delicious.","zh":"(形) 外部的；外面的　(名) 外部；外觀","ez":"堅果的外殼又硬又木質，但裡面柔軟又美味。"},{"w":"freeway","p":"[ˈfriːwei] n.","d":"A freeway is a road with no stops where cars travel at high speeds.","e":"Once you get on the freeway, it only takes an hour to drive to my parent&rsquo;s farm.","zh":"(名) 高速公路；快速道路","ez":"一旦上了高速公路，開車到我父母農場只需一個小時。"},{"w":"hearty","p":"[ˈhɑːrti] adj.","d":"If someone or something is hearty, then they are loud and happy.","e":"The grandmother ended her story with a hearty laugh that pleased her grandchild.","zh":"(形) 熱烈的；誠摯的　(形) 豐盛的；量大的","ez":"祖母以開懷大笑結束她的故事，讓孫子很開心。"},{"w":"hospitable","p":"[hɒsˈpitəbəl] adj.","d":"If someone is hospitable, they are friendly to strangers.","e":"At dinner, Dad was very hospitable to my friends.","zh":"(形) 好客的；熱情招待的　殷勤款待的","ez":"晚餐時，爸爸對我的朋友們非常熱情。"},{"w":"manor","p":"[ˈmænə:r] n.","d":"A manor is a large house with many rooms.","e":"The manor had over forty rooms in addition to beautiful gardens.","zh":"(名) 莊園；大宅　(名) 舉止；態度","ez":"這座莊園除了美麗的花園外，還有四十多個房間。"},{"w":"monastery","p":"[ˈmɒnəsteri] n.","d":"A monastery is a building in which monks live.","e":"The monks at this monastery are famous for their bread and music.","zh":"(名) 修道院；寺院","ez":"這座修道院的僧侶以他們的麵包和音樂聞名。"},{"w":"nursery","p":"[ˈnəːrsəri] n.","d":"A nursery is a room where babies and children sleep, play, or are cared for.","e":"The children kissed their parents goodnight and went upstairs to the nursery.","zh":"(名) 幼兒園；托兒所　(名) 苗圃；種苗場","ez":"孩子們親吻父母道晚安後，上樓去了育兒室。"},{"w":"outstretched","p":"[ˈautstretʃt] adj.","d":"If something is outstretched, then it is extended to its full length.","e":"The cat stood on its back legs with its front legs outstretched.","zh":"展開的；伸出的","ez":"那隻貓用後腿站立，前腿向前伸展。"},{"w":"parcel","p":"[ˈpɑːrsəl] n.","d":"A parcel is a package of things to be carried or mailed somewhere.","e":"The parcel looked like it had been stepped on by someone.","zh":"(名) 包裹；一片（土地）　(動) 打包；分配","ez":"那個包裹看起來像是被人踩過。"},{"w":"profile","p":"[ˈproufail] n.","d":"A profile is an outline of a face, usually as seen from the side.","e":"The drawing of Olivia&rsquo;s profile came out very well.","zh":"(名) 簡歷；側面輪廓　(動) 概述；描繪輪廓","ez":"奧莉維亞的側面素描畫得非常成功。"},{"w":"vivacious","p":"[viˈveiʃəs] adj.","d":"If someone is vivacious, they are talkative and cheerful.","e":"Everyone at the party was very vivacious and having a good time.","zh":"活潑迷人的","ez":"派對上的每個人都非常活潑，玩得很開心。"},{"w":"winding","p":"[ˈwaindiŋ] adj.","d":"If something is winding, then it follows a twisting course.","e":"The winding river turned and looped around the bases of the hills.","zh":"(形) 蜿蜒的；曲折的","ez":"蜿蜒的河流繞著山腳轉彎和環繞。"},{"w":"zip","p":"[zip] v.","d":"To zip something means to close it with a zipper.","e":"She zipped her backpack closed after putting her books inside it.","zh":"(名) 拉鍊　(動) 拉上拉鍊","ez":"她把書本放進背包後，拉上了拉鍊。"}]},{"id":19,"name":"Unit 19","words":[{"w":"airway","p":"[ˈɛərwei] n.","d":"An airway is the passage by which air reaches a person’s lungs.","e":"Since he was sick, mucus would occasionally get stuck in his airway.","zh":"(名) 氣道；呼吸道","ez":"因為他生病了，黏液偶爾會卡在他的呼吸道裡。"},{"w":"Almighty","p":"[ɔːlˈmaiti] n.","d":"The Almighty is a name for a god in a religion.","e":"Before eating, they thanked the Almighty for their food.","zh":"上帝；全能的；萬能的；有無限權力的；非常大的；聲音很大的；十分嚴重的；上帝","ez":"吃飯前，他們感謝全能者賜予食物。"},{"w":"advent","p":"[ˈædvənt] n.","d":"An advent is the arrival or beginning of an important person, thing, or event.","e":"During the advent of radio, very few programs actually played music.","zh":"(名) 到來；來臨　(名) 聖誕節前的四週","ez":"在收音機剛出現的時期，很少有節目真的播放音樂。"},{"w":"constellation","p":"[ˌkɒnstəˈleiʃən] n.","d":"A constellation is a group of stars with a recognizable shape.","e":"That constellation in the shape of a square is named after a flying horse.","zh":"星座；群英薈萃；人才濟濟；明星群集","ez":"那個方形的星座以一隻飛馬命名。"},{"w":"definitive","p":"[diˈfinətiv] adj.","d":"If something is definitive, then it is the most official.","e":"This library has the definitive collection of books on ancient Egypt.","zh":"(形) 最終的；確定的　(形) 權威性的；決定性的","ez":"這間圖書館擁有最完整的有關古埃及的藏書。"},{"w":"equate","p":"[iˈkweit] v.","d":"To equate one thing with another is to compare them and consider them very similar.","e":"She equated the man&rsquo;s messy appearance with a lack of responsibility.","zh":"(動) 等同；視為相同　(動) 相等；成正比","ez":"她把那個男人邋遢的外表等同於缺乏責任感。"},{"w":"inhale","p":"[inˈheil] v.","d":"To inhale means to take air or a smell into the lungs.","e":"The camper inhaled the cool and fresh mountain air and felt relaxed.","zh":"(動) 吸入；吸氣","ez":"露營者吸入涼爽清新的山間空氣，感到放鬆。"},{"w":"invoke","p":"[inˈvouk] v.","d":"To invoke something is to mention it to support an argument or ask for help.","e":"Before going into battle, the soldier invoked the name of his god for protection.","zh":"(動) 祈求；懇求　援用；引用","ez":"上戰場前，士兵祈求他神明的保護。"},{"w":"lunar","p":"[ˈluːnər] adj.","d":"If something is lunar, then it is related to the moon.","e":"During a lunar eclipse, Earth&rsquo;s shadow darkens the moon&rsquo;s surface.","zh":"(形) 月球的；月亮的　(形) 新月形的；弧形的","ez":"月食期間，地球的影子會使月球表面變暗。"},{"w":"novelty","p":"[ˈnɒvəlti] n.","d":"A novelty is something that is new, original, or strange.","e":"Ice cream was a novelty for him since he rarely had any.","zh":"(名) 新奇；新穎的事物　(名) 新奇感；新鮮感","ez":"冰淇淋對他來說是新奇的事物，因為他很少吃到。"},{"w":"outmoded","p":"[ˌautˈmoudid] adj.","d":"If something is outmoded, then it is no longer in fashion or use.","e":"Black and white television sets are outmoded.","zh":"過時的；廢棄的；無用的","ez":"黑白電視機已經過時了。"},{"w":"personalize","p":"[ˈpəːrsənəlaiz] v.","d":"To personalize something means to design it to meet a person’s unique needs.","e":"He personalized the woman&rsquo;s exercises to give her a better workout.","zh":"(動) 個性化；使個人化","ez":"他為那位女性量身訂做運動，讓她得到更好的鍛鍊效果。"},{"w":"pertain","p":"[pəːrˈtein] v.","d":"To pertain to something means to be related or connected to it.","e":"All of the lawyer&rsquo;s questions pertained to events around the night of the crime.","zh":"(動) 關於；適用於","ez":"律師的所有問題都與犯罪當晚發生的事件有關。"},{"w":"primal","p":"[ˈpraiməl] adj.","d":"If something is primal, then it is very basic or related to the origin of something.","e":"Cooking the food over the camp fire felt like a primal way of making a meal.","zh":"最初的；原始的；基本的；根本的；原始的","ez":"在營火上烹調食物感覺像是一種原始的做飯方式。"},{"w":"psychiatric","p":"[ˌsaikiˈætrik] adj.","d":"If something is psychiatric, then it is related to mental illness or its treatment.","e":"The doctor said the patient might have a psychiatric problem.","zh":"(形) 精神科的；精神病學的","ez":"醫生說那位病人可能有精神方面的問題。"},{"w":"psychiatry","p":"[saiˈkaiətri] n.","d":"Psychiatry is the study and treatment of mental illness.","e":"Studying psychiatry has taught me a lot about mental illness.","zh":"(名) 精神病學","ez":"學習精神病學讓我對心理疾病有了很多了解。"},{"w":"reflex","p":"[ˈriːfleks] n.","d":"A reflex is an unconscious action in which a body part responds to an event.","e":"There was a reflex when the doctor hit his knee with a rubber hammer.","zh":"(名) 反射；反應","ez":"當醫生用橡膠槌敲擊他的膝蓋時，產生了一種反射動作。"},{"w":"seizure","p":"[ˈsiːʒər] n.","d":"A seizure is sudden illness in which the body loses control and shakes.","e":"Bright flashing lights can cause seizures in children.","zh":"(名) 癲癇發作；抓住","ez":"明亮的閃光可能會導致兒童癲癇發作。"},{"w":"session","p":"[ˈseʃən] n.","d":"A session is a meeting at a regular time in order to discuss and solve an issue.","e":"Every three months the managers met in a session to discuss regional sales.","zh":"(名) 會議；一場","ez":"每三個月，經理們會開會討論區域銷售情況。"},{"w":"utensil","p":"[juːˈtensəl] n.","d":"A utensil is a common tool or container.","e":"It seemed that a fork was the wrong utensil for trying to eat the soup.","zh":"(名) 器具；用具","ez":"用叉子來喝湯似乎是用錯了餐具。"}]},{"id":20,"name":"Unit 20","words":[{"w":"adhesive","p":"[ædˈhiːsiv] n.","d":"An adhesive is a substance used for sticking things together.","e":"The carpenter used an adhesive to hold the two pieces of wood together.","zh":"(形) 黏著的；粘合的　(名) 黏合劑；膠水","ez":"木匠用黏合劑將兩塊木頭黏在一起。"},{"w":"adverse","p":"[ˈædvəːrs] adj.","d":"If something is adverse, then it is harmful.","e":"Not eating healthy foods can have an adverse effect on your health.","zh":"(形) 不利的；有害的　(形) 對立的；敵對的","ez":"不吃健康的食物會對你的健康產生不良影響。"},{"w":"dependency","p":"[diˈpendənsi] n.","d":"A dependency is a strong need for someone or something.","e":"The child still has a dependency on her mother.","zh":"附屬國；附屬地","ez":"那個小孩仍然依賴她的母親。"},{"w":"dump","p":"[dʌmp] v.","d":"To dump something means to throw it away or get rid of it.","e":"She dumped the garbage into the trash can.","zh":"(動) 傾倒；倒垃圾　(名) 垃圾場；廢棄物堆放地","ez":"她把垃圾倒進垃圾桶裡。"},{"w":"eternal","p":"[iˈtəːrnəl] adj.","d":"If something is eternal, then it lasts forever.","e":"She said that her love for him was eternal.","zh":"(形) 永恆的；永遠的　(形) 終身的；不朽的","ez":"她說她對他的愛是永恆的。"},{"w":"fluctuate","p":"[ˈflʌktjueit] v.","d":"To fluctuate means to rise and fall in number or amount.","e":"Prices for gasoline have been fluctuating all month.","zh":"(動) 波動；變化　(名) 波動；變化","ez":"汽油價格整個月都在波動。"},{"w":"fro","p":"[frou] adv.","d":"If something moves to and fro, it moves backward and forward or side to side.","e":"Her long hair went to and fro as she swung on the swing.","zh":"（參見 to and fro）","ez":"她盪鞦韆時，長髮前後擺動。"},{"w":"inclusion","p":"[inˈkluːʒən] n.","d":"Inclusion is the act of including someone or something in a group.","e":"Her inclusion into the photo club was well received.","zh":"(名) 包含；納入　(名) 包容性；融合","ez":"她加入攝影社團受到大家的歡迎。"},{"w":"intermediate","p":"[ˌintərˈmiːdiit] adj.","d":"If something is intermediate, then it is in the middle of two levels, places, or times.","e":"He selected the intermediate ski hill to begin his afternoon of skiing.","zh":"(形) 中等的；中級的　(名) 中級者；中介物","ez":"他選擇了中級滑雪道來開始下午的滑雪活動。"},{"w":"intermittent","p":"[ˌintərˈmitənt] adj.","d":"If something is intermittent, then it happens in a way that is not constant.","e":"It was hard to focus because intermittent noises came from the workers outside.","zh":"(形) 間歇的；斷斷續續的　(形) 不連續的；時有時無的","ez":"因為外面工人斷斷續續的噪音，很難集中注意力。"},{"w":"mentor","p":"[ˈmentɔːr] n.","d":"A mentor is a person with experience or knowledge who advises someone.","e":"The students each chose a mentor to help them with the experiment.","zh":"(名) 導師；良師　(動) 指導；輔導","ez":"每個學生都選了一位導師來幫助他們進行實驗。"},{"w":"phoenix","p":"[ˈfiːniks] n.","d":"A phoenix is an imaginary bird that burned to ashes and was reborn.","e":"Some believe the phoenix is a symbol for rebirth and a new beginning.","zh":"(名) 鳳凰；不死鳥","ez":"有些人認為鳳凰是重生和新開始的象徵。"},{"w":"photosynthesis","p":"[ˌfoutouˈsinθəsis] n.","d":"Photosynthesis is the process in which plants change sunlight and air.","e":"The chemical in plants that makes them green is used in photosynthesis.","zh":"光合作用","ez":"植物中讓它們呈現綠色的化學物質用於光合作用。"},{"w":"pollen","p":"[ˈpɒlən] n.","d":"Pollen is the tiny yellow powder made in the flowers of plants.","e":"During the spring, the pollen in the air makes some people become sick.","zh":"(名) 花粉","ez":"春天時，空氣中的花粉會讓一些人感到不適。"},{"w":"regain","p":"[riˈgein] v.","d":"To regain something means to get it back.","e":"The battery regained its power after being recharged.","zh":"(動) 重新獲得；恢復","ez":"電池充電後恢復了電力。"},{"w":"reverse","p":"[riˈvəːrs] v.","d":"To reverse means to change to the opposite direction.","e":"They reversed their direction after seeing the sign.","zh":"(動) 逆轉；倒車　(名) 相反；背面　(形) 相反的；背面的","ez":"他們看到標誌後，改變了方向。"},{"w":"swarm","p":"[swɔrːm] n.","d":"A swarm is a group of flying insects.","e":"A beautiful swarm of butterflies filled the summer sky.","zh":"(名) 一大群（昆蟲等）；群體","ez":"一群美麗的蝴蝶充滿了夏日的天空。"},{"w":"texture","p":"[ˈtekstʃər] n.","d":"Texture is the quality of something that can be known by its touch.","e":"The texture of her skin was very soft and smooth.","zh":"(名) 質地；口感","ez":"她皮膚的質地非常柔軟光滑。"},{"w":"tickle","p":"[ˈtikəl] v.","d":"To tickle someone is to touch them in a way that causes laughter.","e":"The mother tickled the little boy&rsquo;s foot, and he screamed with laughter.","zh":"(動) 逗樂；使發癢　(名) 癢；癢的感覺","ez":"媽媽搔癢小男孩的腳，他笑得尖叫起來。"},{"w":"vibrant","p":"[ˈvaibrənt] adj.","d":"If something is vibrant, then it is bright and full of color.","e":"Their new shirts were a vibrant shade of red.","zh":"(形) 充滿活力的；鮮豔的","ez":"他們的新襯衫是鮮豔的紅色。"}]},{"id":21,"name":"Unit 21","words":[{"w":"abolish","p":"[əˈbɒliʃ] v.","d":"To abolish something means to put an end to it, such as a system or law.","e":"President Lincoln abolished slavery in the US.","zh":"(動) 廢除；廢止","ez":"林肯總統在美國廢除了奴隸制度。"},{"w":"amend","p":"[əˈmend] v.","d":"To amend something means to change it to improve or make it accurate.","e":"The countries were in agreement that the treaty needed to be amended.","zh":"(動) 修改；改正　(動) 修訂法律；改進","ez":"各國一致認為這項條約需要修改。"},{"w":"aspire","p":"[əsˈpaiər] v.","d":"To aspire means to have a strong desire to achieve or do something.","e":"George aspired to be a doctor from a young age.","zh":"(動) 渴望；追求　(動) 有志於；立志","ez":"喬治從小就立志成為醫生。"},{"w":"censor","p":"[ˈsensər] v.","d":"To censor information means to remove it if it is rude or rebellious.","e":"To protect innocent people, the location of the bomb was censored.","zh":"(動) 審查；刪除　(名) 審查員；檢查官","ez":"為了保護無辜民眾，炸彈的位置被隱瞞了。"},{"w":"charter","p":"[ˈtʃɑːrtər] n.","d":"A charter is a document that describes the rights of an organization or group.","e":"The company charter explained that all employees had to pay a tax.","zh":"(名) 租用；包租　(動) 租用；包租；特許","ez":"公司章程說明所有員工都必須繳稅。"},{"w":"constitution","p":"[ˌkɒnstəˈtjuːʃən] n.","d":"A constitution is a document of principles for a government.","e":"The country&rsquo;s constitution said a prime minister could only serve three terms.","zh":"(名) 憲法；憲章　(名) 體質；身體狀況","ez":"該國憲法規定總理最多只能連任三屆。"},{"w":"cosmopolitan","p":"[ˌkɒzməˈpɒlətən] adj.","d":"When a place is cosmopolitan, it is full of people from many different places.","e":"There are dozens of different types of restaurants in a cosmopolitan city.","zh":"(形) 世界性的；國際化的　(名) 世界公民；國際人士","ez":"在國際化大都市裡，有數十種不同類型的餐廳。"},{"w":"disseminate","p":"[diˈseməneit] v.","d":"To disseminate information or knowledge means to distribute it.","e":"The organization disseminates information about the dangers of smoking.","zh":"(動) 散布；傳播　(動) 廣泛流傳；宣傳","ez":"該組織傳播關於吸菸危害的資訊。"},{"w":"flatter","p":"[ˈflætər] v.","d":"To flatter people means to praise them in an effort to please them.","e":"He was just flattering me when he said that my new dress looked gorgeous.","zh":"(動) 奉承；吹捧　(動) 使顯得更好看；使顯得漂亮","ez":"他說我的新洋裝很好看，只是在奉承我而已。"},{"w":"infamous","p":"[ˈinfəməs] adj.","d":"When someone is infamous, they are well known for something bad.","e":"That news channel is infamous for presenting biased information.","zh":"(形) 臭名昭著的；惡名遠播的　(形) 令人厭惡的；可恥的","ez":"那個新聞頻道以報導偏頗資訊而惡名昭彰。"},{"w":"lame","p":"[leim] adj.","d":"If one is lame, they cannot walk properly due to an injury to the leg or foot.","e":"The terrible accident left many people dead and several others lame.","zh":"(形) 跛的；瘸的　(形) 無聊的；乏味的","ez":"那場可怕的意外造成多人死亡，還有好幾人因此跛腳。"},{"w":"limp","p":"[imp] v.","d":"To limp means to walk with difficulty because someone’s leg or foot is hurt.","e":"After the injury, the player limped off of the field.","zh":"(動) 跛行；一瘸一拐地走　(形) 無力的；軟弱的","ez":"受傷後，那名球員一瘸一拐地走下球場。"},{"w":"outburst","p":"[ˈautbəːrst] n.","d":"An outburst is a sudden, strong expression of an emotion.","e":"There was an outburst of cheers when the comedian took the stage.","zh":"(名) 爆發；發作","ez":"喜劇演員一上台，觀眾就爆發出歡呼聲。"},{"w":"pathological","p":"[ˌpæθəˈlɒdʒikəl] adj.","d":"When a behavior is pathological, it is extreme, unacceptable, and uncontrollable.","e":"The pathological liar could not even tell the truth about unimportant matters.","zh":"行為；無法控制的；病態的；非理智的；病理的；病態的；由疾病引起的","ez":"那個病態說謊者連無關緊要的小事都無法說實話。"},{"w":"phenomenal","p":"[fiˈnɒmənl] adj.","d":"When something is phenomenal, it is unusually great.","e":"The child&rsquo;s ability to play the piano is nothing short of phenomenal.","zh":"(形) 驚人的；非凡的","ez":"那個孩子彈鋼琴的能力簡直是驚為天人。"},{"w":"poll","p":"[poul] n.","d":"A poll is a survey in which people give their opinions about important things.","e":"&nbsp;The poll showed that many people support the plan to stop gang violence.","zh":"(名) 民意調查；投票　(動) 進行民意調查；獲得（選票）","ez":"民調顯示，許多人支持阻止幫派暴力的計畫。"},{"w":"remorse","p":"[riˈmɔːrs] n.","d":"Remorse is a strong feeling of sadness and regret.","e":"When I realized what I did, I felt remorse for my actions.","zh":"(名) 懊悔；自責","ez":"當我意識到自己做了什麼時，我對自己的行為感到懊悔。"},{"w":"secrecy","p":"[ˈsiːkrəsi] n.","d":"Secrecy is the behavior of keeping things secret.","e":"The secrecy of the big organization made the government nervous.","zh":"(名) 秘密；保密","ez":"那個大型組織的神祕性讓政府感到不安。"},{"w":"tackle","p":"[ˈtækəl] v.","d":"To tackle something means to deal with it in a determined and efficient way.","e":"Such social problems need to be tackled right away.","zh":"(動) 處理；應付　(名) 擒抱；工具","ez":"這類社會問題需要立刻處理。"},{"w":"trance","p":"[træns] n.","d":"A trance is a a state where people seem asleep and have no control of themselves.","e":"The woman&rsquo;s powerful eyes often put men in a trance.","zh":"昏睡狀態；催眠狀態；迷幻音樂；睡房音樂","ez":"那名女子銳利的眼神常讓男人陷入恍惚。"}]},{"id":22,"name":"Unit 22","words":[{"w":"coward","p":"[ˈkauərd] n.","d":"A coward is a person who lacks courage to do risky or dangerous things.","e":"A firefighter cannot be a coward. They have to be able to act quickly.","zh":"(名) 懦夫；膽小鬼　(形) 膽小的；懦弱的","ez":"消防員不能膽小，他們必須能迅速行動。"},{"w":"delete","p":"[diˈliːt] v.","d":"To delete something means to remove or erase written material.","e":"Several lines had been deleted from her speech.","zh":"(動) 刪除；刪去　(動) 消除；清除","ez":"她的演講稿中有好幾行被刪掉了。"},{"w":"firsthand","p":"[ˌfəːrstˈhænd] adj.","d":"If something is firsthand, then it is from an original source.","e":"If you want firsthand knowledge, ask someone who saw it.","zh":"第；直接地","ez":"如果你想知道第一手資訊，去問親眼目睹的人。"},{"w":"earnest","p":"[ˈəːrnist] adj.","d":"If someone is earnest, then they are honest.","e":"The child was very earnest when she told her mother how she broke the dish.","zh":"(形) 認真的；誠摯的　(名) 認真；誠摯","ez":"那個孩子非常認真地告訴媽媽她是怎麼打破盤子的。"},{"w":"ethnic","p":"[ˈeθnik] adj.","d":"If something is ethnic, then it is related to a group with a similar culture.","e":"Many sections of the city are home to different ethnic communities.","zh":"(形) 民族的；種族的　(形) 具有民族特色的","ez":"該城市的許多區域住著不同的族群。"},{"w":"exclude","p":"[iksˈkluːd] v.","d":"To exclude someone means to not accept them into a group.","e":"Carol was excluded from the contest because her friend was a judge.","zh":"(動) 排除；不包括　(動) 把...拒之門外；不讓進入","ez":"卡蘿被排除在比賽之外，因為她的朋友是評審。"},{"w":"fluent","p":"[ˈfluːənt] adj.","d":"If someone is fluent in a language, then they are able to speak it very well.","e":"She was so fluent in German that you&rsquo;d have thought she was from Germany.","zh":"(形) 流利的；流暢的　(形) 說話自然流利的","ez":"她的德語說得如此流利，你會以為她是德國人。"},{"w":"imperial","p":"[imˈpiəriəl] adj.","d":"If something is imperial, then it is of, or related to an empire.","e":"These old imperial coins were once used in the Roman Empire.","zh":"(形) 帝國的；皇帝的　(形) 宏偉的；壯麗的","ez":"這些古老的帝國錢幣曾在羅馬帝國時期使用。"},{"w":"inclusive","p":"[inˈkluːsiv] adj.","d":"If something is inclusive, then it is open to all groups and people in society.","e":"A more inclusive event would have allowed children to attend.","zh":"(形) 包含的；包容性的　(形) 全部包括的；費用全包的","ez":"如果活動更具包容性，就會允許兒童參加。"},{"w":"legislature","p":"[ˈledʒisleitʃə:r] n.","d":"A legislature is the section of a government that makes laws.","e":"The senator had served ten years in the national legislature.","zh":"(名) 立法機關；立法部門","ez":"那位參議員在國家立法機構任職了十年。"},{"w":"linguistic","p":"[liŋˈgwistik] adj.","d":"If something is linguistic, then it is concerned with language.","e":"A linguistic way of studying culture focuses on words within that culture.","zh":"語言的；語言學的","ez":"從語言學角度研究文化，會聚焦於該文化中的詞彙。"},{"w":"monolingual","p":"[ˌmɒnəˈliŋgwəl] adj.","d":"If someone is monolingual, then they speak only one language.","e":"In today&rsquo;s global economy, being monolingual limits your opportunities.","zh":"單語的","ez":"在當今的全球經濟中，只會一種語言會限制你的機會。"},{"w":"nationality","p":"[ˌnæʃəˈnæləti] n.","d":"Nationality is an identity based on the nation from which you come.","e":"His nationality is German, but he speaks French, Spanish, and Korean.","zh":"(名) 國籍；國民身份　(名) 民族；國民性","ez":"他的國籍是德國，但他會說法語、西班牙語和韓語。"},{"w":"patriot","p":"[ˈpeitriət] n.","d":"A patriot is someone who loves, supports, and defends their country.","e":"Every year young patriots join their countries&rsquo; militaries.","zh":"(名) 愛國者","ez":"每年都有年輕的愛國者加入自己國家的軍隊。"},{"w":"prosecute","p":"[ˈprɒsəkjuːt] v.","d":"To prosecute someone means to take legal action against them.","e":"They were prosecuted for fishing in the river without a permit.","zh":"(動) 起訴；告發","ez":"他們因為未經許可就在河裡釣魚而被起訴。"},{"w":"racial","p":"[ˈreiʃəl] adj.","d":"If something is racial, then it is related to a race or races.","e":"The differences between racial groups are physical characteristics and culture.","zh":"(形) 種族的；人種的","ez":"種族之間的差異在於生理特徵和文化。"},{"w":"solemn","p":"[ˈsɒləm] adj.","d":"If something is solemn, then it is serious and honest.","e":"The professor preferred a solemn relationship between him and his students.","zh":"(形) 莊嚴的；嚴肅的","ez":"教授偏好與學生之間維持嚴肅的關係。"},{"w":"solidarity","p":"[ˌsɒləˈdærəti] n.","d":"Solidarity is a union formed from common responsibilities or interests.","e":"All the citizens came together in a show of solidarity to create change.","zh":"(名) 團結；團結一致","ez":"所有公民團結一致展現團結，以促成改變。"},{"w":"tact","p":"[tækt] n.","d":"Tact is the ability to avoid offending people when dealing with problems.","e":"Since both sides would not agree, it required someone with tact to make peace.","zh":"(名) 機智；圓滑","ez":"既然雙方都不願讓步，就需要有圓融的人來調解。"},{"w":"undermine","p":"[ˌʌndərˈmain] v.","d":"To undermine someone means to betray or weaken their efforts or authority.","e":"The documents helped to undermine the workers&rsquo; trust in their bosses&rsquo; honesty.","zh":"(動) 削弱；破壞","ez":"這些文件削弱了工人對老闆誠實的信任。"}]},{"id":23,"name":"Unit 23","words":[{"w":"allocate","p":"[ˈæləkeit] v.","d":"To allocate something means to put it aside for a certain purpose or person.","e":"The government allocated $100 million to aid the disaster relief effort.","zh":"(動) 分配；分派　(動) 撥款；撥給","ez":"政府撥款一億美元協助災難救援工作。"},{"w":"appetizing","p":"[ˈæpitaiziŋ] adj.","d":"When food is appetizing, it looks and smells very good.","e":"The appetizing plate of cookies was gone in half an hour.","zh":"(形) 引起食慾的；誘人的　(形) 吸引人的；有吸引力的","ez":"那盤誘人的餅乾在半小時內就被吃光了。"},{"w":"blizzard","p":"[ˈblizərd] n.","d":"A blizzard is a severe snow storm with strong winds.","e":"We did not dare to go outside during the terrible blizzard.","zh":"(名) 暴風雪；猛烈的風雪","ez":"在那場可怕的暴風雪中，我們不敢出門。"},{"w":"cavity","p":"[ˈkævəti] n.","d":"A cavity is a hole or space in something.","e":"There was a small cavity in the wall of the cave where an animal lived.","zh":"(名) 蛀洞；齲齒　(名) 空洞；凹陷","ez":"洞穴牆壁上有一個小洞，住著一隻動物。"},{"w":"clockwise","p":"[ˈklɒkwaiz] adv.","d":"If something moves clockwise, it moves in a circle in the same direction as a clock.","e":"Turn the screw clockwise to tighten it.","zh":"(副) 順時針方向；依順時針轉動　(形) 順時針的；按順時針方向的","ez":"順時針轉動螺絲以鎖緊它。"},{"w":"concentric","p":"[kənˈsentrik] adj.","d":"When circles or rings are concentric, they have the same center.","e":"The target was a series of concentric circles.","zh":"同心的","ez":"靶心是一系列同心圓。"},{"w":"courtesy","p":"[ˈkɔːrtəsi] n.","d":"Courtesy is the excellence of manners or social conduct.","e":"Jenna always behaves with great courtesy when people visit her home.","zh":"(名) 禮貌；親切　(形) 恭敬的；有禼的","ez":"珍娜在客人來訪時總是表現得非常禮貌。"},{"w":"crisp","p":"[krisp] adj.","d":"When food is crisp, it is hard or has a hard surface in a way that is pleasant.","e":"My favorite snack is a bag of crisp, delicious potato chips.","zh":"(形) 酥脆的；新鮮的　(形) 清爽的；清晰的","ez":"我最喜歡的零食是一袋香脆可口的洋芋片。"},{"w":"discord","p":"[ˈdiskɔːrd] n.","d":"Discord is disagreement or fighting between people.","e":"There was much discord between the experts on the talk show.","zh":"(名) 不和；爭執　(動) 不一致；相衝突","ez":"談話性節目上的專家之間存在許多分歧。"},{"w":"frigid","p":"[ˈfridʒid] adj.","d":"When something is frigid, it is extremely cold.","e":"We decided not to go on the hike because the weather was too frigid.","zh":"(形) 極冷的；寒冷的　(形) 冷淡的；不友善的","ez":"我們決定不去健行，因為天氣太冷了。"},{"w":"generate","p":"[ˈdʒenəreit] v.","d":"To generate something means to cause it to develop or begin.","e":"The mayor promised to generate new jobs and programs to help the poor.","zh":"(動) 產生；發電　(動) 引起；造成","ez":"市長承諾創造新的就業機會和計畫來幫助窮人。"},{"w":"glacial","p":"[ˈgleiʃəl] adj.","d":"When something is glacial, it relates to large masses of ice that move slowly.","e":"Penguins thrive in the glacial regions of Antarctica.","zh":"(形) 冰川的；冰冷的　(形) 極其緩慢的；冷淡的","ez":"企鵝在南極的冰川地區繁衍生息。"},{"w":"interchange","p":"[ˌintərˈtʃeindʒ] n.","d":"An interchange of ideas between people is a discussion of each person’s idea.","e":"There was an interchange of ideas between the groups.","zh":"交流；交換；互換；互通式立體交叉道；交流思想；交換資訊","ez":"各團體之間交換了意見。"},{"w":"locker","p":"[ˈlɒkər] n.","d":"A locker is a small cabinet with a lock where people store their possessions.","e":"I keep my school books in my locker.","zh":"(名) 置物櫃；儲物櫃","ez":"我把課本放在置物櫃裡。"},{"w":"multicultural","p":"[ˌmʌltiˈkʌltʃərəl] adj.","d":"When something is multicultural, it relates to many different cultures.","e":"Everyone was welcomed to attend the multicultural celebration.","zh":"多元文化的；融合多種文化的","ez":"每個人都受邀參加多元文化慶祝活動。"},{"w":"omission","p":"[ouˈmiʃən] n.","d":"An omission is something that has been left out or not done.","e":"Mike was upset because of the omission of his name during the ceremony.","zh":"疏忽；遺漏；疏漏","ez":"麥克因為典禮上他的名字被遺漏而感到難過。"},{"w":"oversee","p":"[ˌouvərˈsiː] v.","d":"To oversee something means to make sure that it is being done properly.","e":"His job was to oversee the progress of the construction project.","zh":"(動) 監督；監管","ez":"他的工作是監督建築工程的進度。"},{"w":"pierce","p":"[piərs] v.","d":"To pierce something means to make a hole in it using a sharp object.","e":"The arrow pierced the target in the very center.","zh":"(動) 刺穿；穿透","ez":"箭精準地射中了靶心。"},{"w":"replicate","p":"[ˈrepləˌkeit] v.","d":"To replicate something is to do it in the exact same way as someone before.","e":"I would love to replicate my father&rsquo;s achievements in school.","zh":"(動) 複製；重複","ez":"我很想在學業上複製父親的成就。"},{"w":"wavy","p":"[ˈweivi] adj.","d":"When something is wavy, it is not straight but has a series of curves.","e":"The child drew wavy lines all over the piece of paper.","zh":"(形) 波浪的；起伏的","ez":"小孩在整張紙上畫滿了波浪線。"}]},{"id":24,"name":"Unit 24","words":[{"w":"abide","p":"[əˈbaid] v.","d":"To abide by something, like a rule, means to obey it.","e":"If you want to play the game with us, you must be willing to abide by our rules.","zh":"(動) 遵守；忍受","ez":"如果你想和我們一起玩遊戲，就必須遵守我們的規則。"},{"w":"conversion","p":"[kənˈvəːrʃən] n.","d":"Conversion is the act of changing something into a different state or form.","e":"The city discussed the conversion of the parking lot into a skateboard park.","zh":"(名) 轉換；改變　(名) 信仰的改宗；宗教信仰的改變","ez":"市政府討論了將停車場改建成滑板公園的方案。"},{"w":"cram","p":"[kræm] v.","d":"To cram things means to put them into a place that can barely contain them.","e":"He crammed all of his shirts into the top drawer of the dresser.","zh":"(動) 死記硬背；填塞　(名) 臨時抱佛腳","ez":"他把所有襯衫都塞進衣櫃最上層的抽屜裡。"},{"w":"defer","p":"[diˈfəːr] v.","d":"To defer means to arrange for an action to happen at a later time.","e":"The girl was very sleepy, so she chose to defer her bath until morning.","zh":"(動) 延遲；推遲　(動) 尊重；服從","ez":"女孩很睏，所以決定把洗澡延到早上。"},{"w":"export","p":"[ˈekspɔːrt] v.","d":"To export products means to sell them to other countries.","e":"The United States exports many cereals and grains.","zh":"(動) [ɪkˈspɔrt] 出口；輸出　(名) [ˈɛkspɔrt] 出口商品；出口貿易","ez":"美國出口許多穀物和糧食。"},{"w":"fume","p":"[fjuːm] n.","d":"Fumes are unhealthy smoke and gases that are made by fires or chemicals.","e":"The engine put unpleasant, black fumes into the air.","zh":"(名) 煙霧；有毒氣體　(動) 冒煙；生氣","ez":"引擎排放出難聞的黑煙。"},{"w":"habitual","p":"[həˈbitjuəl] adj.","d":"When something is habitual, it is a behavior that a person usually does or has.","e":"The man was a habitual liar who was incapable of being honest with the police.","zh":"(形) 習慣的；經常的　(形) 慣常的；通常的","ez":"這個人是個慣性說謊者，無法對警察誠實。"},{"w":"justify","p":"[ˈdʒʌstəfai] v.","d":"To justify something means to show or prove that it is necessary.","e":"The government tried to justify its decision to bring the country into a war.","zh":"(動) 為...辯護；說明理由　證明...正當","ez":"政府試圖為其讓國家參戰的決定辯護。"},{"w":"output","p":"[ˈautput] n.","d":"Output is the amount of something that a person or thing produces.","e":"The boss hired more workers to increase the factory&rsquo;s output of products.","zh":"(名) 產量；輸出","ez":"老闆僱用更多工人以提高工廠的產量。"},{"w":"overpopulation","p":"[ˌouvərpɒpjuˈleiʃən] n.","d":"Overpopulation is the state of having too many people in an area.","e":"The organization is concerned with overpopulation of the world.","zh":"人口過多；人口過剩","ez":"這個組織關注全球人口過剩的問題。"},{"w":"patent","p":"[ˈpætənt] n.","d":"A patent is a right to be the only person allowed to make or sell a new product.","e":"He quickly established a patent for his brilliant invention.","zh":"(名) 專利；專利權　(動) 取得專利","ez":"他迅速為他出色的發明申請了專利。"},{"w":"penalize","p":"[ˈpiːnəlaiz] v.","d":"To penalize someone means to punish him or her.","e":"The team was penalized when they broke the rules.","zh":"使處於不利地位；處罰；懲罰","ez":"該隊伍因違規而受到處罰。"},{"w":"petroleum","p":"[piˈtrouliəm] n.","d":"Petroleum is a liquid natural resource from which many fuels are made.","e":"The petroleum at that factory is used to make gasoline.","zh":"(名) 石油","ez":"那家工廠的石油用來製造汽油。"},{"w":"prototype","p":"[ˈproutətaip] n.","d":"A prototype is a new machine that is not ready to be made in large quantities.","e":"He introduced his prototype to the motorcycle company.","zh":"(名) 原型；樣品","ez":"他向摩托車公司介紹了他的原型機。"},{"w":"scrap","p":"[skræp] n.","d":"A scrap of something is a small amount of it.","e":"Chris liked to use many scraps of paper when thinking up ideas.","zh":"(動) 丟棄；廢棄　(名) 碎片；廢料","ez":"克里斯喜歡在構思點子時使用許多碎紙片。"},{"w":"sector","p":"[ˈsektə:r] n.","d":"A sector is a part of a country’s economy in a specific type of industry.","e":"We learned about just a few of the factories within the manufacturing sector.","zh":"(名) 部門；領域","ez":"我們只學到了製造業部門中的少數工廠。"},{"w":"subscribe","p":"[səbˈskraib] v.","d":"To subscribe to something is to agree or to concur with it.","e":"She subscribed to the view that musical education should be kept in schools.","zh":"(動) 訂閱；贊同","ez":"她贊同音樂教育應保留在學校的觀點。"},{"w":"subsist","p":"[səbˈsist] v.","d":"To subsist means to have the food, water, and money needed to stay alive.","e":"Some people are forced to subsist on only a few dollars a month.","zh":"(動) 勉強維持生計；生存","ez":"有些人被迫每月僅靠幾美元維生。"},{"w":"suspend","p":"[səsˈpend] v.","d":"To suspend something means to delay or stop it from happening for a while.","e":"The oil company suspended production until it was sure the factory was safe.","zh":"(動) 暫停；懸掛","ez":"石油公司暫停生產，直到確認工廠安全為止。"},{"w":"synthesis","p":"[ˈsinθəsis] n.","d":"A synthesis is a combination of different ideas or styles.","e":"The band&rsquo;s music was a synthesis of many different musical genres.","zh":"(名) 合成；綜合","ez":"該樂團的音樂融合了許多不同的音樂類型。"}]},{"id":25,"name":"Unit 25","words":[{"w":"acrobat","p":"[ˈækrəbæt] n.","d":"An acrobat is a person who entertains people by doing amazing physical things.","e":"There were acrobats at the circus that did impressive and complicated jumps.","zh":"(名) 特技表演者；雜技演員","ez":"馬戲團裡有雜技演員表演令人印象深刻且複雜的跳躍動作。"},{"w":"advocacy","p":"[ˈædvəkəsi] n.","d":"Advocacy is the act of supporting or recommending something.","e":"Janine&rsquo;s strong advocacy for the event made people want to attend.","zh":"擁護；主張；提倡","ez":"珍妮對活動的大力倡導讓人們想要參加。"},{"w":"communal","p":"[ˈkəmjuːnl] adj.","d":"If something is communal, it involves a group of people.","e":"On the weekends, Theo and his son picked up trash in the communal park.","zh":"(形) 共有的；公共的　(形) 集體的；社區的","ez":"週末時，西奧和他的兒子在社區公園撿垃圾。"},{"w":"fluid","p":"[ˈfluːid] adj.","d":"If something is fluid, it is smooth and moves gracefully.","e":"Boris was a famous ballet dancer because people admired his fluid movements.","zh":"(形) 流動的；流暢的　(名) 流體；液體","ez":"鮑里斯是著名的芭蕾舞者，因為人們欣賞他流暢的動作。"},{"w":"harmonize","p":"[ˈhɑːrmənaiz] v.","d":"To harmonize means to make different things go well together.","e":"The sweet and sour flavors of the dish harmonized well and tasted great.","zh":"配和聲；使；協調；使","ez":"這道菜的酸甜風味調和得很好，非常美味。"},{"w":"industrious","p":"[inˈdʌstriəs] adj.","d":"If someone is industrious, they work hard.","e":"Dennis was very industrious, so he never had problems finding a job.","zh":"(形) 勤勞的；勤奮的　(形) 刻苦的；認真的","ez":"丹尼斯非常勤奮，所以找工作從來沒有問題。"},{"w":"inventive","p":"[inˈventiv] adj.","d":"When someone is inventive, they are good at creating new things.","e":"The inventive student built a robot to help her with her chores.","zh":"(形) 有創意的；富於發明的　(形) 新穎的；獨特的","ez":"這位有創意的學生做了一個機器人來幫她做家事。"},{"w":"judicial","p":"[dʒuːˈdiʃəl] adj.","d":"If something is judicial, it is related to judges or courts of law.","e":"The laws changed the way the judicial system was structured.","zh":"(形) 司法的；法官的　法庭的；審判的","ez":"法律改變了司法系統的結構。"},{"w":"Mandarin","p":"[ˈmændərin] n.","d":"Mandarin is one of the two main Chinese languages.","e":"Although John&rsquo;s parents both spoke Mandarin, he could only speak English.","zh":"(名) 普通話；國語　(形) 橙黃色的；普通話的","ez":"雖然約翰的父母都說中文，但他只會說英文。"},{"w":"metropolitan","p":"[ˌmetrəˈpɒlitən] adj.","d":"If something is metropolitan, it relates to a large city.","e":"All of the metropolitan excitement of New York City made Rufus nervous.","zh":"(形) 大都市的；首都的　(名) 大都市居民；大主教","ez":"紐約市大都會的繁華讓魯弗斯感到緊張。"},{"w":"mimic","p":"[ˈmimik] v.","d":"To mimic something means to copy the way it sounds or moves.","e":"The hunter mimicked a duck&rsquo;s call and shot the two ducks that called back.","zh":"(動) 模仿；學...的樣子　(名) 模仿者；學舌者","ez":"獵人模仿鴨子的叫聲，射殺了兩隻回應的鴨子。"},{"w":"misguided","p":"[ˌmisˈgaidid] adj.","d":"When something is misguided, it is based on bad judgment or wrong beliefs.","e":"The snake bit Molly during her misguided attempt to grab it.","zh":"(形) 被誤導的；方向錯誤的","ez":"蛇在茉莉錯誤地試圖抓住牠時咬了她。"},{"w":"rehearse","p":"[riˈhəːrs] v.","d":"To rehearse means to practice and prepare for a performance in front of people.","e":"Vick&rsquo;s band rehearsed all week before their first show.","zh":"(動) 排練；預演","ez":"維克的樂團在首場演出前練習了整整一週。"},{"w":"scorn","p":"[ˈskɔːrn] v.","d":"To scorn someone means to behave without respect toward them.","e":"The criminal was scorned by everyone in the community.","zh":"(名) 輕蔑；鄙視　(動) 輕視；不屑","ez":"這個罪犯受到社區裡每個人的鄙視。"},{"w":"sensory","p":"[ˈsensəri] adj.","d":"If something is sensory, it is related to the senses.","e":"Iris and Eric preferred the sensory thrill of watching movies in the theater.","zh":"(形) 感官的；感覺的","ez":"艾瑞絲和艾瑞克更喜歡在電影院觀看電影的感官刺激。"},{"w":"staple","p":"[ˈsteipəl] adj.","d":"If something is staple, it is standard or basic.","e":"Hamburgers, steaks and hotdogs are staple foods to cook on a grill.","zh":"(名) 主食；主要產品　(動) 用釘書機釘住","ez":"漢堡、牛排和熱狗是燒烤時的主食。"},{"w":"statute","p":"[ˈstætjuːt] n.","d":"A statute is a law that is official and has been written down.","e":"The new statute made it illegal to walk dogs in the park.","zh":"(名) 法規；章程","ez":"新法規規定在公園遛狗是違法的。"},{"w":"veteran","p":"[ˈvetərən] n.","d":"A veteran is someone who has a lot of experience doing something.","e":"Hank was the team veteran and had played in more games than anyone else.","zh":"(名) 老兵；老手；(形) 經驗豐富的","ez":"漢克是隊上的老將，參賽次數比任何人都多。"},{"w":"villain","p":"[ˈvilən] n.","d":"A villain is an evil person who breaks the law or hurts others.","e":"The villain escaped with half of my family&rsquo;s valuables.","zh":"(名) 反派；惡棍","ez":"惡棍帶著我家一半的財物逃走了。"},{"w":"vine","p":"[vain] n.","d":"A vine is a plant that has long, twisting stems and climbs upward.","e":"The branches of the trees were covered with vines.","zh":"(名) 藤蔓；葡萄藤","ez":"樹枝上覆滿了藤蔓。"}]},{"id":26,"name":"Unit 26","words":[{"w":"constrain","p":"[kənˈstrein] v.","d":"To constrain something means to limit its development.","e":"Jim cannot join us because he is constrained by previous plans.","zh":"(動) 限制；約束　(動) 強制；迫使","ez":"吉姆因為先前已有安排，無法加入我們。"},{"w":"depot","p":"[ˈdi:pou] n.","d":"A depot is a bus or train station.","e":"He waited for his mother to arrive at the depot.","zh":"(名) 倉庫；儲存站　(名) 公車站；集散地","ez":"他等他媽媽到達車站。"},{"w":"emulate","p":"[ˈemjəleit] v.","d":"To emulate people means to imitate them because they are greatly admired.","e":"As a small boy, he always tried to emulate his big brother.","zh":"(動) 模仿；效法　(動) 競爭；比較","ez":"小時候，他總是試圖模仿他的哥哥。"},{"w":"forefinger","p":"[ˈfɔːrfiŋgər] n.","d":"The forefinger is the finger between one’s thumb and middle finger.","e":"He shouted, &ldquo; There it is!&rdquo; and pointed with his forefinger.","zh":"食指","ez":"他大喊：「在那裡！」並用食指指向那裡。"},{"w":"guts","p":"[gʌts] n.","d":"The guts are all the organs inside a person or animal.","e":"The doctor can tell you every process that happens in one&rsquo;s guts.","zh":"(名) 勇氣；膽量　(名) 腸子；內臟","ez":"醫生可以告訴你腸道裡發生的每一個過程。"},{"w":"inherent","p":"[inˈhiərənt] adj.","d":"When something is inherent, it is a natural part of something else.","e":"Sweating is an inherent bodily function when exercising.","zh":"(形) 內在的；固有的　(形) 天生的；與生俱來的","ez":"流汗是運動時身體的固有功能。"},{"w":"intimidate","p":"[inˈtimədeit] v.","d":"To intimidate means to frighten others.","e":"My dad intimidates my friends whenever they visit.","zh":"(動) 威脅；恫嚇　(動) 使害怕；使畏縮","ez":"我爸爸每次朋友來訪時都會嚇到他們。"},{"w":"janitor","p":"[ˈdʒænətər] n.","d":"A janitor is a person who makes repairs and takes care of a building.","e":"The school janitor cleaned up the messy cafeteria.","zh":"(名) 清潔工；門房","ez":"學校的清潔工打掃了凌亂的餐廳。"},{"w":"moist","p":"[mɔist] adj.","d":"When something is moist, it is slightly wet.","e":"The ground is still moist from the rain last night.","zh":"(形) 潮濕的；濕潤的　(動) 使潮濕；弄濕","ez":"昨晚的雨讓地面還是濕的。"},{"w":"nope","p":"[noup] adv.","d":"Nope is an informal way of saying “ no.”","e":"He asked if I had any money, and I had to say, &ldquo;Nope. &rdquo;","zh":"(副) 不；不是","ez":"他問我有沒有錢，我只好說：「沒有。」"},{"w":"prod","p":"[prɒd] v.","d":"To prod means to push someone or something with a finger or pointed object.","e":"The bully prodded me in the chest with his finger.","zh":"刺；捅；戳；激勵；促使；敦促；刺；捅；戳；激勵；鼓勵","ez":"那個惡霸用手指戳我的胸口。"},{"w":"ransom","p":"[ˈrænsəm] n.","d":"A ransom is a sum of money paid to a kidnapper to set the person free.","e":"He kidnapped the prince and demanded $1 million as ransom.","zh":"(名) 贖金","ez":"他綁架了王子，並要求一百萬美元贖金。"},{"w":"restrain","p":"[risˈtrein] v.","d":"To restrain someone or something means to use physical strength to stop them.","e":"Mike restrained Allen from reaching the door.","zh":"(動) 克制；限制","ez":"麥克阻止艾倫靠近門口。"},{"w":"saliva","p":"[səˈlaivə] n.","d":"Saliva is the watery liquid in people’s mouths that helps in digestion.","e":"The baby could not keep the saliva from dripping out of its mouth.","zh":"(名) 唾液；口水","ez":"嬰兒無法阻止口水從嘴裡流出來。"},{"w":"spit","p":"[spit] v.","d":"To spit means to force liquid from one’s mouth.","e":"He emerged from the pool and spit water from his mouth.","zh":"(動) 吐；吐出","ez":"他從泳池裡出來，從嘴裡吐出水。"},{"w":"sprint","p":"[sprint] v.","d":"To sprint means to run very fast over a short distance.","e":"The kids didn&rsquo;t want to be late to class, so they sprinted to the bus stop.","zh":"(動) 衝刺；短跑　(名) 衝刺；短跑","ez":"孩子們不想上課遲到，所以他們衝向公車站。"},{"w":"stunt","p":"[stʌnt] n.","d":"A stunt is something that is done in order to get attention or publicity.","e":"The man jumped over the cars as a promotional stunt.","zh":"(名) 特技；噱頭　(動) 阻礙；妨礙","ez":"那個男人跳過汽車作為宣傳噱頭。"},{"w":"tolerant","p":"[ˈtɒlərənt] adj.","d":"When people are tolerant, they are approved of because they accept others.","e":"The tolerant leader thought that everyone was equal regardless of race.","zh":"(形) 寬容的；容忍的","ez":"寬容的領袖認為每個人不論種族都是平等的。"},{"w":"vampire","p":"[ˈvæmpaiər] n.","d":"A vampire is a fictional monster that sleeps in a coffin and sucks people’s blood.","e":"The vampire snuck up on the woman and bit her in the neck.","zh":"吸血鬼","ez":"吸血鬼悄悄接近那個女人，咬了她的脖子。"},{"w":"yawn","p":"[jɔːn] v.","d":"To yawn means to open one’s mouth wide and breathe in air.","e":"The child yawned and stretched her arms before bed for the night.","zh":"(名) 哈欠　(動) 打哈欠","ez":"孩子睡前打了個哈欠，伸了伸懶腰。"}]},{"id":27,"name":"Unit 27","words":[{"w":"analogy","p":"[əˈnælədʒi] n.","d":"An analogy is a connection made between things to show that they are similar.","e":"The doctor made an analogy between the human heart and a water pump.","zh":"(名) 類比；比喻　(名) 類似之處；相似點","ez":"醫生將人類的心臟比作水泵。"},{"w":"ancestry","p":"[ˈænsestri] n.","d":"A person's ancestry is the series of people from whom a person descended.","e":"We studied our ancestry and found out that we are related to royalty.","zh":"(名) 祖先；家族來源　(名) 血統；家世背景","ez":"我們研究了祖先，發現我們與皇室有血緣關係。"},{"w":"archer","p":"[ˈɑːrtʃər] n.","d":"An archer is a person who uses a bow and arrows.","e":"The expert archer hit the target every time.","zh":"(名) 弓箭手；射手　(名) 射手座","ez":"專業的弓箭手每次都命中目標。"},{"w":"conspiracy","p":"[kənˈspirəsi] n.","d":"A conspiracy is a secret plan made by a group of people to do something illegal.","e":"Some people think that there was a conspiracy to kill American president John Kennedy.<br />","zh":"(名) 陰謀；密謀　(名) 共謀者的集合","ez":"有些人認為刺殺美國總統約翰·甘迺迪是一場陰謀。"},{"w":"deputy","p":"[ˈdepjəti] n.","d":"A deputy is the second-highest-ranking person in a business or government.","e":"While the sheriff was ill, the deputy took over his duties.","zh":"(名) 副手；代理人　(形) 代理的；副的","ez":"警長生病時，副警長接替了他的職務。"},{"w":"earl","p":"[əːrl] n.","d":"An earl is a nobleman from Britain.","e":"The Earl of Canterbury lived in a huge mansion.","zh":"英國；伯爵","ez":"坎特伯雷伯爵住在一棟巨大的豪宅裡。"},{"w":"fragrant","p":"[ˈfreigrənt] adj.","d":"When something is fragrant, it has a pleasant smell.","e":"The girl picked delicious berries and fragrant flowers.","zh":"(形) 芬芳的；香的　(形) 香氣怡人的；馨香的","ez":"女孩摘了美味的漿果和芬芳的花朵。"},{"w":"funnel","p":"[ˈfʌnl] n.","d":"A funnel is an object with a wide top and a narrow bottom for pouring liquids.","e":"The worker used a funnel when he poured the oil into the engine.","zh":"漏斗；煙囪；使；流經漏斗；使；經過漏斗形口子；運送；輸送","ez":"工人用漏斗將油倒入引擎。"},{"w":"hereditary","p":"[hiˈredəˌteri] adj.","d":"If something is hereditary, it is a trait passed onto children from their parents.","e":"The hereditary disease affected three generations of children.","zh":"遺傳的；世襲的","ez":"遺傳性疾病影響了三代兒童。"},{"w":"hymn","p":"[him] n.","d":"A hymn is a religious song that often praises a god.","e":"The book was filled with hymns that the worshippers sang.","zh":"(名) 讚美詩；聖歌","ez":"這本書充滿了信徒們唱的讚美詩。"},{"w":"invert","p":"[inˈvəːrt] v.","d":"To invert something means to turn it upside down.","e":"He inverted the bicycle to make repairs on the wheels.","zh":"(名) ['ɪnvɝt] 倒置物　(動) [ɪn'vɝt] 翻轉；顛倒；反轉","ez":"他把自行車倒過來修理輪子。"},{"w":"prey","p":"[prei] n.","d":"Prey is the animals that are hunted and eaten by another creature.","e":"The lion ran as fast as he could to catch his prey.","zh":"(名) 獵物；犧牲者　(動) 捕食；折磨","ez":"獅子盡全力奔跑以捕捉獵物。"},{"w":"procession","p":"[prəˈseʃən] n.","d":"A procession is a group of people who walk or drive in a line during a public event.","e":"The procession all celebrated when they reached the end.","zh":"(名) 隊伍；行列","ez":"遊行隊伍到達終點時全都歡呼起來。"},{"w":"prophet","p":"[ˈprɒfit] n.","d":"A prophet is a person chosen by a god to give the god’s message to people.","e":"Harold believed that he was one of the prophets of his god.","zh":"(名) 先知；預言者","ez":"哈羅德相信他是他神的先知之一。"},{"w":"sarcastic","p":"[sɑːrˈkæstik] adj.","d":"When something is sarcastic, it is the opposite of what is actually meant.","e":"She hurt her mother&rsquo;s feelings with her constant sarcastic remarks.","zh":"(形) 諷刺的；挖苦的","ez":"她不斷的諷刺言論傷害了她母親的感情。"},{"w":"seasoning","p":"[ˈsiːzəniŋ] n.","d":"Seasoning is a mix of salt, herbs, and spices that improves the taste of food.","e":"This steak tastes bland. Maybe I&rsquo;ll add some seasoning to it.","zh":"(名) 調味料；佐料","ez":"這塊牛排吃起來沒味道，也許我會加點調味料。"},{"w":"sodium","p":"[ˈsoudiəm] n.","d":"Sodium is an element that can be used to make substances such as salt.","e":"Sodium and chloride combine to make table salt.","zh":"(名) 鈉","ez":"鈉和氯結合形成食鹽。"},{"w":"tyranny","p":"[ˈtirəni] n.","d":"A tyranny is a cruel and unfair government in which one person has power.","e":"His tyranny was impossible to live under.","zh":"(名) 暴政；專制","ez":"他的暴政讓人難以忍受。"},{"w":"tyrant","p":"[ˈtaiərənt] n.","d":"A tyrant is someone who treats people in a cruel, harsh, and unfair way.","e":"Our boss is a tyrant. He makes us work long hours for little pay.","zh":"(名) 暴君；專制統治者","ez":"我們的老闆是個暴君，他讓我們長時間工作卻只給很少的報酬。"},{"w":"vinegar","p":"[ˈvinigər] n.","d":"Vinegar is a strong liquid made from sour wine that is used in cooking.","e":"Be careful because too much vinegar will ruin the recipe.","zh":"(名) 醋","ez":"小心，因為太多醋會毀了食譜。"}]},{"id":28,"name":"Unit 28","words":[{"w":"adjoining","p":"[əˈdʒɔiniŋ] adj.","d":"If something is adjoining, it is next to or joined with a building, or room.","e":"I couldn&rsquo;t sleep because the people in the adjoining room were loud.","zh":"(形) 相鄰的；毗鄰的　(形) 接著的；相連的","ez":"我睡不著，因為隔壁房間的人很吵。"},{"w":"allege","p":"[əˈledʒ] v.","d":"To allege something is to say that it is true without offering proof.","e":"The little girl had alleged that her older brother hid her favorite doll.","zh":"(動) 聲稱；宣稱　(動) 指控；控告","ez":"小女孩聲稱她哥哥藏了她最喜歡的娃娃。"},{"w":"arch","p":"[ɑːrtʃ] n.","d":"An arch is a curved opening formed under a structure such as a bridge or doorway.","e":"The arch of the bridge was not high enough for the tall boat to pass underneath.","zh":"(名) 拱；拱形結構　(動) 弓起；呈拱形　(形) 主要的；狡猾的","ez":"橋拱不夠高，高大的船無法從下面通過。"},{"w":"assemble","p":"[əˈsembəl] v.","d":"To assemble means to get together in one place.","e":"The parents assembled to discuss ways to improve their children&rsquo;s education.","zh":"(動) 組裝；集合　(動) 聚集；聚合","ez":"家長們聚集在一起討論改善孩子教育的方法。"},{"w":"casualty","p":"[ˈkæʒjuəlti] n.","d":"A casualty is a person killed or injured in a war or an accident.","e":"The only casualty in the car accident was a woman who broke her arm.","zh":"(名) 傷亡者；傷亡　(名) 損失；受害者","ez":"車禍中唯一的傷亡是一名手臂骨折的婦女。"},{"w":"erect","p":"[iˈrekt] v.","d":"To erect something means to build it.","e":"The king erected two towers on the north and south sides of his castle.","zh":"(動) 豎立；建造　(形) 直立的；挺直的","ez":"國王在他的城堡南北兩側各建了一座塔。"},{"w":"foul","p":"[faul] adj.","d":"If something is foul, then it is not pleasant or enjoyable.","e":"He wouldn&rsquo;t let his dog drink from the water because it had a foul smell.","zh":"(形) 骯髒的；污穢的　(形) 違規的；不正當的　(動) 犯規；弄髒","ez":"他不讓他的狗喝那水，因為水有臭味。"},{"w":"hectare","p":"[ˈhektɛər] n.","d":"A hectare is a unit of measure equal to 10,000 square meters.","e":"His family farm covered many hectares.","zh":"(名) 公頃（面積單位）","ez":"他家的農場佔地好幾公頃。"},{"w":"heighten","p":"[ˈhaitn] v.","d":"To heighten an emotion means to increase the intensity of it.","e":"The pleasant music heightened their enjoyment of the wonderful dinner.","zh":"(動) 提高；加強　(動) 增強；突出","ez":"悅耳的音樂提升了他們對美妙晚餐的享受。"},{"w":"hospitality","p":"[ˌhɒspiˈtæləti] n.","d":"Hospitality is friendly behavior and entertainment given to guests or strangers.","e":"The travelers were amazed at the hospitality given them by the hotel&rsquo;s staff.","zh":"(名) 好客；熱情款待　殷勤招待","ez":"旅客們對飯店員工給予的熱情款待感到驚訝。"},{"w":"mansion","p":"[ˈmænʃən] n.","d":"A mansion is a large and expensive home.","e":"The mansion had thirty bedrooms, two kitchens, and a pool.","zh":"(名) 豪宅；大宅邸","ez":"這棟豪宅有三十間臥室、兩間廚房和一個游泳池。"},{"w":"outnumber","p":"[autˈnʌmbər] v.","d":"To outnumber a group means to have a greater number than it.","e":"The girls outnumbered the boys at the school by four to one.","zh":"(動) 在數量上超過","ez":"這所學校的女生人數是男生的四倍。"},{"w":"overjoyed","p":"[ˌouvərˈdʒɔid] adj.","d":"If someone is overjoyed, then they are extremely happy.","e":"He was overjoyed by the news of his promotion.","zh":"(形) 非常高興的；狂喜的","ez":"他聽到升職的消息後欣喜若狂。"},{"w":"pasture","p":"[ˈpæstʃər] n.","d":"A pasture is an area of land covered with grass for animals to use as food.","e":"The sheep were taken to a pasture where there was more grass.","zh":"(名) 牧場；草地　(動) 放牧","ez":"羊群被帶到一片草更多的牧場。"},{"w":"petition","p":"[piˈtiʃən] n.","d":"A petition is a written request asking an authority to do something.","e":"The citizens all signed a petition asking the mayor to repair the sidewalks.","zh":"(名) 請願書；請願","ez":"市民們都簽署了一份請願書，要求市長修補人行道。"},{"w":"renovate","p":"[ˈrenəveit] v.","d":"To renovate a building means to repair it or build new structures on it.","e":"The old fire station was renovated into an apartment building.","zh":"(動) 翻新；修復","ez":"舊消防局被改建成了公寓大樓。"},{"w":"revise","p":"[riˈvaiz] v.","d":"To revise something means to change or update it to make it better.","e":"When the editor discovered certain facts were wrong, he revised the book.","zh":"(動) 修訂；修改","ez":"當編輯發現某些事實有誤時，他修改了這本書。"},{"w":"slab","p":"[slæb] n.","d":"A slab is a large, thick, flat piece of stone, concrete, metal, or wood.","e":"I looked at various slabs of stone to decorate my house.","zh":"(名) 厚板；平板","ez":"我看了好幾塊石板來裝飾我的房子。"},{"w":"terrace","p":"[ˈterəs] n.","d":"A terrace is an open area that is connected to a house or an apartment.","e":"In the afternoons, she liked to sit on the terrace and check her email.","zh":"(名) 露臺；陽臺","ez":"下午她喜歡坐在露臺上查看電子郵件。"},{"w":"turf","p":"[təːrf] n.","d":"Turf is a section of grass and the dirt in which it grows.","e":"After the game, the turf looked ragged.","zh":"(名) 草皮；地盤　(動) 覆蓋草皮","ez":"比賽結束後，草皮看起來破破爛爛的。"}]},{"id":29,"name":"Unit 29","words":[{"w":"analogous","p":"[əˈnæləgəs] adj.","d":"If something is analogous to another thing, then it is like it in certain ways.","e":"The relationship with his teacher was analogous to that of a son and mother.","zh":"(形) 類似的；相似的　(形) 對應的；平行的","ez":"他和老師的關係就像兒子與母親一樣。"},{"w":"binoculars","p":"[bəˈnɒkjələrz] n.","d":"Binoculars are a device used for seeing things that are far away.","e":"He could see the ship on the horizon only if he used his binoculars.","zh":"(名) 雙筒望遠鏡；雙眼鏡","ez":"他只有用望遠鏡才能看到地平線上的船。"},{"w":"bulk","p":"[bʌlk] n.","d":"The bulk of something is its great size.","e":"The large elephant moved its bulk with legs as strong as tree trunks.","zh":"(名) 大量；主體　(形) 大宗的；散裝的","ez":"那頭大象移動龐大的身軀，腿粗得像樹幹一樣。"},{"w":"comprise","p":"[kəmˈpraiz] v.","d":"If something comprises something else, it consists of or is made up of it.","e":"Our school&rsquo;s football team is mostly comprised with seniors.","zh":"(動) 組成；構成　包含；包括","ez":"我們學校的足球隊主要由高三學生組成。"},{"w":"depict","p":"[diˈpikt] v.","d":"To depict something means to show or portray it, often using art.","e":"The statue&rsquo;s face depicted the general&rsquo;s determination and courage.","zh":"(動) 描繪；表現　(動) 刻畫；描述","ez":"雕像的臉部刻畫出將軍的決心和勇氣。"},{"w":"dual","p":"[ˈdju:əl] adj.","d":"If something is dual, then it is made up of two parts.","e":"The room had a dual function. It was a living room, but at night it was a bedroom.","zh":"(形) 雙重的；二元的　(名) 雙打；雙人賽","ez":"這個房間有雙重功能：白天是客廳，晚上是臥室。"},{"w":"Fahrenheit","p":"[ˈfærənhait] n.","d":"Fahrenheit temperature is a scale where water freezes at 32° and boils at 212°.","e":"When the temperature dropped to 32&deg; Fahrenheit, it started snowing.","zh":"(名) 華氏溫標；華氏度數","ez":"當氣溫降到華氏三十二度時，開始下雪了。"},{"w":"fulfill","p":"[fulˈfil] v.","d":"To fulfill something means to achieve or finish it.","e":"The professor did not fulfill his promise not to miss a single class.","zh":"(動) 完成；滿足　(動) 實現；達成","ez":"教授沒有履行他一堂課都不缺席的承諾。"},{"w":"grove","p":"[grouv] n.","d":"A grove is a small group of trees.","e":"All the trees in this grove are apple trees.","zh":"(名) 小樹林；果園","ez":"這片小樹林裡所有的樹都是蘋果樹。"},{"w":"ore","p":"[ɔːr] n.","d":"Ore is the raw form of rock or material from which a valuable metal is taken.","e":"The factory melted the ore and used it to make iron products.","zh":"(名) 礦石；礦　(名) 礦物資源","ez":"工廠熔化了礦石，用來製造鐵製品。"},{"w":"outback","p":"[ˈautbæk] n.","d":"The outback is the wild inland region of Australia where very few people live.","e":"Many Australian farmers use the outback to raise cattle.","zh":"內地","ez":"許多澳洲農民利用內陸地區來養牛。"},{"w":"outweigh","p":"[autˈwei] v.","d":"To outweigh something means to exceed it in value, amount, or importance.","e":"Finding a warm place to sleep outweighed the need to find something to eat.","zh":"(動) 超過；重於","ez":"找個溫暖的地方睡覺比找東西吃更重要。"},{"w":"paradox","p":"[ˈpærədɒks] n.","d":"A paradox is a true statement or real event that seems illogical.","e":"The paradox of her work was that the less she worked, the more she got done.","zh":"(名) 矛盾；悖論","ez":"她工作的矛盾之處在於，做得越少，完成得越多。"},{"w":"pier","p":"[piər] n.","d":"A pier is a structure that extends into a body of water.","e":"If you want to catch bigger fish, then go to the far end of the pier.","zh":"(名) 碼頭；橋墩","ez":"如果你想釣更大的魚，就去碼頭的最遠端。"},{"w":"shortcut","p":"[ˈʃɔːrtkʌt] n.","d":"A shortcut is a route that is shorter than the main route.","e":"We got to the house first because we took a shortcut through the forest.","zh":"(名) 捷徑；近路","ez":"我們先到房子，因為我們穿過森林抄了近路。"},{"w":"tariff","p":"[ˈtærif] n.","d":"A tariff is a tax or fee paid on certain imports or exports.","e":"Our tariff on imported wool makes foreign wool more expensive.","zh":"(名) 關稅","ez":"我們對進口羊毛課徵的關稅讓外國羊毛變得更貴。"},{"w":"thermometer","p":"[θə:rˈmɒmitə:r] n.","d":"A thermometer is a device that measures temperature.","e":"The thermometer outside the window indicated that it was a hot day today.","zh":"(名) 體溫計；溫度計","ez":"窗外的溫度計顯示今天天氣很熱。"},{"w":"tilt","p":"[tilt] v.","d":"To tilt something means to tip it into a sloping position.","e":"She tilted her glass and almost spilled some of the wine inside.","zh":"(動) 傾斜；使傾斜","ez":"她傾斜了杯子，差點灑出裡面的酒。"},{"w":"vice versa","p":"[ˈvaisiˈvəːrsə] adv.","d":"If a statement is vice versa, then its two main ideas are switched with one another.","e":"Students learn from their teachers, and vice versa.","zh":"反之亦然","ez":"學生向老師學習，反之亦然。"},{"w":"whereabouts","p":"[ˌhwɛərəˈbauts] n.","d":"The whereabouts of someone or something is the place where they are.","e":"The police looked for the lost dog, but its whereabouts were still unknown.","zh":"(名) 下落；行蹤","ez":"警方尋找那隻走失的狗，但牠的下落仍然不明。"}]},{"id":30,"name":"Unit 30","words":[{"w":"amber","p":"[ˈæmbər] n.","d":"Amber is a hard, yellowish material that comes from trees.","e":"The necklace was made from pieces of amber.","zh":"琥珀；黃燈","ez":"這條項鍊是用琥珀碎片做成的。"},{"w":"charcoal","p":"[ˈtʃɑːrkoul] n.","d":"Charcoal is a black material that is used as fuel for fire.","e":"There was burnt charcoal left on the ground from an old fire.","zh":"(名) 木炭；炭　(形) 炭的；深灰色的","ez":"地上留有舊火燒過後剩下的木炭。"},{"w":"columnist","p":"[ˈkɒləmnist] n.","d":"A columnist is a writer who creates articles about a particular subject.","e":"The columnist won praise for his articles about life on the farm.","zh":"(名) 專欄作家；評論員","ez":"這位專欄作家因描寫農場生活的文章而獲得讚譽。"},{"w":"courteous","p":"[ˈkəːrtiəs] adj.","d":"When someone is courteous, they are polite and respectful.","e":"The mother asked her family to be courteous to their guests.","zh":"(形) 有禮貌的；恭敬的　(形) 周到的；殷勤的","ez":"母親要求家人對客人要有禮貌。"},{"w":"credentials","p":"[kriˈdenʃəlz] n.","d":"Credentials are the proof of someone’s experience or ability to do something.","e":"The mechanic hung his credentials on his office wall.","zh":"資歷；資格；資格證書；資質證明","ez":"技師把他的證照掛在辦公室的牆上。"},{"w":"cricket","p":"[ˈkrikit] n.","d":"A cricket is an insect that makes loud noises, usually at night.","e":"In the country, we could see the stars and hear the crickets at night.","zh":"(名) 蟋蟀；板球","ez":"在鄉下，晚上我們可以看到星星，聽到蟋蟀的叫聲。"},{"w":"delta","p":"[ˈdeltə] n.","d":"A delta is flat area where a river splits into smaller rivers that flow into the sea.","e":"The archeologists found many ancient materials in the delta of the Nile River.","zh":"三角洲","ez":"考古學家在尼羅河三角洲發現了許多古代文物。"},{"w":"detergent","p":"[diˈtəːrdʒənt] n.","d":"Detergent is soap that is used to clean clothes or dishes.","e":"My brother added too much detergent to the wash, and bubbles got all over the floor.","zh":"(名) 洗滌劑；清潔劑　(形) 去污的；清潔的","ez":"我哥哥在洗衣時加了太多洗衣精，結果泡泡弄得滿地都是。"},{"w":"euphemism","p":"[ˈjuːfəmizəm] n.","d":"A euphemism is a term that is used in place of a mean or unpleasant word.","e":"&ldquo;Window maintenance officer&rdquo; is a euphemism for a window washer.","zh":"委婉語；委婉說法","ez":"「窗戶維護專員」是擦窗工人的委婉說法。"},{"w":"expire","p":"[iksˈpaiər] v.","d":"To expire is to no longer be effective because its use has come to an end.","e":"The man&rsquo;s driver&rsquo;s license was going to expire in two days.","zh":"(動) 期滿；終止　失效；到期　(動) 呼氣；斷氣","ez":"這個男人的駕照再過兩天就要到期了。"},{"w":"granite","p":"[ˈgrænit] n.","d":"Granite is a very hard type of rock that is often black or pink.","e":"The kitchen counter was made of granite.","zh":"花崗岩；花崗石","ez":"廚房流理臺是用花崗岩做的。"},{"w":"gravel","p":"[ˈgrævəl] n.","d":"Gravel is a combination of small stones mixed with sand.","e":"The ground around the swing set was covered with gravel.","zh":"沙礫；礫石","ez":"鞦韆架周圍的地面鋪滿了碎石。"},{"w":"haunt","p":"[hɔːnt] v.","d":"To haunt is to cause problems or negative thoughts over a long period of time.","e":"His thoughts about his scary dream haunted him for weeks.","zh":"(動) 縈繞；困擾　(動) 經常出沒於","ez":"他對那個可怕夢境的回憶困擾了他好幾個星期。"},{"w":"liberal","p":"[ˈlibərəl] adj.","d":"When someone is liberal, they accept different ideas and people.","e":"My grandparents aren&rsquo;t as liberal as my parents.","zh":"(形) 自由的；開放的　(形) 寬宏的；慷慨的","ez":"我的祖父母沒有我父母那麼開明。"},{"w":"maze","p":"[meiz] n.","d":"A maze is a system of paths that is complicated and easy to get lost in.","e":"We got lost in the maze in the garden.","zh":"曲徑；迷宮；迷宮似的區域；錯綜複雜的事物","ez":"我們在花園的迷宮裡迷路了。"},{"w":"moss","p":"[mɔ(:)s] n.","d":"Moss is a small green or yellow plant that grows on wet dirt, rocks, or tree trunks.","e":"Be careful not to slip on the moss that&rsquo;s covering those rocks.","zh":"(名) 苔蘚；青苔","ez":"小心別踩到覆蓋那些岩石的青苔而滑倒。"},{"w":"pebble","p":"[ˈpebəl] n.","d":"A pebble is a small, round stone.","e":"We threw pebbles into the lake to make the water splash.","zh":"(名) 小圓石；鵝卵石","ez":"我們把鵝卵石丟進湖裡，讓水花四濺。"},{"w":"peck","p":"[pek] v.","d":"When a bird pecks, it bites or hits something with its beak.","e":"The birds pecked at the seeds on the ground.","zh":"(動) 啄；啄食","ez":"鳥兒啄食地上的種子。"},{"w":"reservoir","p":"[ˈrezərvwɑːr] n.","d":"A reservoir is a place for storing water for a town to use.","e":"If it doesn&rsquo;t rain soon, the reservoir is going to dry up completely.","zh":"(名) 水庫；儲藏所","ez":"如果再不趕快下雨，水庫就要完全乾涸了。"},{"w":"streak","p":"[striːk] n.","d":"A streak is a long, thin mark that is easy to see.","e":"Her hair was brown except for a streak which she dyed blonde.","zh":"(名) 條紋；一陣子；連勝　(動) 飛奔；加上條紋","ez":"她的頭髮是棕色的，只有一縷染成了金色。"}]},{"id":31,"name":"Index","words":[]}]}];
  renderBooks();
}

const BOOK_COLORS = ['#0abde3','#27ae60','#f39c12','#9b59b6','#e84393','#00cec9'];
const BOOK_ICONS   = ['📘','📗','📙','📕','📒','📓'];

function renderBooks() {
  const wrap = document.getElementById('bookCards');
  wrap.innerHTML = allData.map((b,i) => {
    const total = b.units.reduce((s,u) => s + u.words.length, 0);
    return `<div class="book-card" id="book${i}" style="--accent:${BOOK_COLORS[i]};--accent-bg:${BOOK_COLORS[i]}15"
              onclick="selectBook(${i})">
      <div class="book-card-header">
        <span class="icon">${BOOK_ICONS[i]}</span>
        <div class="info">
          <div class="book-name">Book ${b.id}</div>
          <div class="book-meta">${b.units.length} 單元 · ${total} 字</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectBook(idx) {
  document.querySelectorAll('.book-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('book'+idx).classList.add('selected');
  currentBook = idx;
  currentUnit = null;
  // 填入單元下拉
  const sel = document.getElementById('unitSelect');
  sel.innerHTML = '<option value="">-- 選單元 --</option>' +
    allData[idx].units.map((u,j) =>
      `<option value="${j}">${u.name} (${u.words.length} 字)</option>`
    ).join('');
  document.getElementById('wordPanel').classList.remove('show');
}

function onUnitChange() {
  const sel = document.getElementById('unitSelect');
  if (!sel.value) {
    document.getElementById('wordPanel').classList.remove('show');
    currentUnit = null;
    return;
  }
  currentUnit = parseInt(sel.value);
  const unit = allData[currentBook].units[currentUnit];
  const panel = document.getElementById('wordPanel');
  panel.style.setProperty('--accent', BOOK_COLORS[currentBook]);
  document.getElementById('wordPanelTitle').textContent =
    `${unit.name} · ${unit.words.length} 字`;
  document.getElementById('wordsGrid').innerHTML = unit.words.map(w =>
    `<span class="word-tag" title="${w.d||''}">${w.w}</span>`
  ).join('');
  document.querySelector('.start-here').textContent =
    `開始練習 ▶ (${unit.words.length} 字)`;
  panel.classList.add('show');
}

function closeWordPanel() {
  document.getElementById('wordPanel').classList.remove('show');
  document.getElementById('unitSelect').value = '';
  currentUnit = null;
}

function startStudy() {
  const unit = allData[currentBook].units[currentUnit];
  cards = [...unit.words];
  // 隨機排序
  for (let i = cards.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  currentIdx = 0;
  known = 0;
  unknown = 0;
  
  document.getElementById('selectorView').style.display = 'none';
  document.getElementById('completeView').classList.remove('show');
  document.getElementById('completeView').style.display = 'none';
  document.getElementById('studyView').style.display = 'block';
  
  document.getElementById('studyInfo').textContent =
    `Book ${allData[currentBook].id} · ${unit.name}`;
  
  renderDots();
  showCard();
}

function renderDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = cards.map((_,i) =>
    `<div class="dot" id="dot${i}"></div>`
  ).join('');
}

function showCard() {
  const card = cards[currentIdx];
  document.getElementById('flipInner').classList.remove('revealed');
  document.getElementById('frontWord').textContent = card.w;
  document.getElementById('frontPhonetic').textContent = card.p || '';
  document.getElementById('backWord').textContent = card.w;
  document.getElementById('backPhonetic').textContent = card.p || '';
  document.getElementById('defText').textContent = card.d || '';
  
  if (card.zh) {
    document.getElementById('zhBox').style.display = 'block';
    document.getElementById('zhText').textContent = card.zh;
  } else {
    document.getElementById('zhBox').style.display = 'none';
  }
  
  if (card.e) {
    document.getElementById('exampleBox').style.display = 'block';
    document.getElementById('exampleText').textContent = card.e;
  } else {
    document.getElementById('exampleBox').style.display = 'none';
  }
  
  if (card.ez) {
    document.getElementById('exzhBox').style.display = 'block';
    document.getElementById('exzhText').textContent = card.ez;
  } else {
    document.getElementById('exzhBox').style.display = 'none';
  }
  
  // 預設隱藏英文定義
  document.getElementById('defBox').style.display = 'none';
  document.querySelector('.def-toggle').textContent = '顯示定義 ▸';
  
  updateDots();
  speak();
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.remove('active');
    if (i === currentIdx) d.classList.add('active');
  });
}

function flipCard() {
  const inner = document.getElementById('flipInner');
  inner.classList.toggle('revealed');
  if (!inner.classList.contains('revealed')) speak();  // 翻回正面自動發音
}

function toggleDef() {
  const box = document.getElementById('defBox');
  const toggle = document.querySelector('.def-toggle');
  if (box.style.display === 'none') {
    box.style.display = 'block';
    toggle.textContent = '隱藏定義 ▾';
  } else {
    box.style.display = 'none';
    toggle.textContent = '顯示定義 ▸';
  }
}

async function speak() {
  const word = cards[currentIdx].w;
  const safe = word.replace(/[^a-zA-Z-]/g, '');
  const audio = new Audio(`data/audio/${safe}.mp3`);
  audio.onerror = () => speakFallback(word);
  audio.play().catch(() => speakFallback(word));
}

let speaking = false;
function speakFallback(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function prevCard() {
  if (currentIdx <= 0) return;
  // 退回上一張時不計分
  currentIdx--;
  showCard();
}

function answer(isKnown) {
  const dot = document.getElementById(`dot${currentIdx}`);
  if (isKnown) {
    known++; dot.classList.add('known');
  } else {
    unknown++; dot.classList.add('unknown');
  }
  
  currentIdx++;
  if (currentIdx >= cards.length) {
    showComplete();
  } else {
    showCard();
  }
}

// 鍵盤快捷鍵
document.addEventListener('keydown', function(e) {
  if (document.getElementById('studyView').style.display !== 'block') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); speak(); break;
    case 'ArrowDown':  e.preventDefault(); flipCard(); break;
    case ' ':          e.preventDefault(); flipCard(); break;
    case 'ArrowRight': e.preventDefault(); answer(true); break;
    case 'ArrowLeft':  e.preventDefault(); prevCard(); break;
  }
});

function showComplete() {
  document.getElementById('studyView').style.display = 'none';
  document.getElementById('completeView').style.display = 'block';
  document.getElementById('completeView').classList.add('show');
  
  const total = cards.length;
  const pct = Math.round(known/total*100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : pct >= 50 ? '💪' : '📖';
  document.getElementById('completeEmoji').textContent = emoji;
  document.getElementById('statsText').innerHTML =
    `完成 ${total} 個單字！<br>
    <span class="green">😊 認識：${known} (${pct}%)</span><br>
    <span class="red">😣 不熟：${unknown}</span>`;
}

function goBack() {
  document.getElementById('studyView').style.display = 'none';
  document.getElementById('completeView').style.display = 'none';
  document.getElementById('completeView').classList.remove('show');
  document.getElementById('selectorView').style.display = 'block';
  document.getElementById('flipInner').classList.remove('revealed');
  document.querySelectorAll('.book-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('unitSelect').innerHTML = '<option value="">-- 選單元 --</option>';
  document.getElementById('wordPanel').classList.remove('show');
  currentBook = null; currentUnit = null;
}

init();
</script>
