"zh":"(名) 帳戶；帳號　(動) 說明；解釋","ez":"付完新車的錢後，我的銀行帳戶幾乎空了。"},{"w":"architect","p":"[ˈɑːrkɪtekt] n.","d":"An architect is a person who designs buildings.","e":"The plans for building the new home were drawn by a famous architect.","zh":"(名) 建築師；設計者　(動) 設計；規劃","ez":"建造新家的設計圖是由一位著名建築師繪製的。"},{"w":"conceal","p":"[kənˈsiːl] v.","d":"To conceal something means to hide it.","e":"You should conceal your money so no one can take it from you.","zh":"(動) 隱藏；隱瞞　(動) 遮掩；掩蓋","ez":"你應該把錢藏好，這樣就沒人能拿走。"},{"w":"crime","p":"[kraɪm] n.","d":"A crime is something bad that a person does that can be punished by law.","e":"Police quickly arrived at the scene of the crime.","zh":"(名) 犯罪；罪行　(名) 犯罪行為；嚴重違法","ez":"警察迅速趕到了犯罪現場。"},{"w":"deed","p":"[diːd] n.","d":"A deed is a certificate that proves that someone owns something.","e":"When she bought the car, she was given a deed to show the car was hers.","zh":"(名) 行為；事蹟　(動) 做；行動","ez":"她買車時拿到了一張證明車子屬於她的證書。"},{"w":"gratitude","p":"[ˈgrӕtətjuːd] n.","d":"Gratitude is a feeling of being thankful.","e":"The kids showed Aunt Tess much gratitude for visiting them.","zh":"(名) 感謝；感激　(形) 感謝的；感激的","ez":"孩子們非常感謝泰絲阿姨來探望他們。"},{"w":"habitat","p":"[ˈhӕbətӕt] n.","d":"A habitat is the natural home of animals or plants.","e":"Frogs are often found in a wet habitat, such as near a lake, river, or pond.","zh":"(名) 棲息地；生活環境","ez":"青蛙常出現在潮濕的環境，例如湖邊、河邊或池塘附近。"},{"w":"intervene","p":"[intərviːn] v.","d":"To intervene means to help stop a problem between two people or groups.","e":"The students argued until the teacher intervened.","zh":"(動) 干預；介入　(動) 調停；仲裁","ez":"學生們一直爭論，直到老師介入。"},{"w":"landmark","p":"[ˈlændmɑːrk] n.","d":"A landmark is an object that helps people find or remember a location.","e":"The tall tree was used as a landmark for people to find the road to the inn.","zh":"(名) 地標；landmark　(名) 里程碑；重要事件","ez":"那棵高大的樹被當作地標，讓人們找到通往旅館的路。"},{"w":"legal","p":"[ˈliːgəl] adj.","d":"If something is legal, it is related to the law or allowed by the law.","e":"It was not legal for him to drive until he was eighteen years old.","zh":"(形) 合法的；法律的　(形) 正當的；有效的","ez":"他未滿十八歲前開車是不合法的。"},{"w":"memorable","p":"[ˈmemərəbəl] adj.","d":"If something is memorable, then it is remembered for a special reason.","e":"The party was memorable; people were still talking about it years later.","zh":"(形) 難忘的；值得記住的　(形) 令人印象深刻的；顯著的","ez":"那場派對令人難忘，多年後人們仍在談論。"},{"w":"oblige","p":"[əˈblaɪdʒ] v.","d":"To oblige someone means to require them to do something.","e":"If I wanted to have playtime, I was obliged to clean my room once a week.","zh":"(動) 幫忙；協助　(動) 迫使；強制","ez":"如果我想有玩樂時間，就必須每週打掃一次房間。"},{"w":"offense","p":"[əˈfens] n.","d":"An offense is an action that breaks the law and requires punishment.","e":"He was put in jail for two days for the offense.","zh":"(名) 冒犯；得罪　(名) 犯罪行為；違法行為","ez":"他因為這項違規行為被關了兩天。"},{"w":"proclaim","p":"[prouˈkleim] v.","d":"To proclaim something means to say it in public.","e":"The army general proclaimed that the war was won.","zh":"(動) 宣布；聲明","ez":"陸軍將軍宣布戰爭勝利了。"},{"w":"rally","p":"[ˈrӕli] n.","d":"A rally is a large public meeting in order to support something.","e":"The school had a rally in the gym to support the basketball team.","zh":"(名) 集會；恢復　(動) 召集；恢復","ez":"學校在體育館舉辦了一場集會來支持籃球隊。"},{"w":"resolve","p":"[rɪˈzɒlv] v.","d":"To resolve something means to find a solution.","e":"She resolved the problem with her children by giving them both a toy.","zh":"(動) 決心；解決","ez":"她給兩個孩子各一個玩具，解決了他們的問題。"},{"w":"resource","p":"[rɪˈsɔːrs] n.","d":"Resources are a person or country’s money and materials that they can use.","e":"The poor man didn&rsquo;t have the resources to feed himself.","zh":"(名) 資源；財力","ez":"那個可憐的人沒有資源養活自己。"},{"w":"sentence","p":"[ˈsentəns] n.","d":"A sentence is punishment given to someone who didn’t follow the law.","e":"The sentence for stealing a car is much worse than for stealing candy.","zh":"(名) 句子；判決　(動) 判刑","ez":"偷車的刑罰比偷糖果嚴重多了。"},{"w":"volunteer","p":"[volənˈtiər] v.","d":"To volunteer means to offer to do something for free.","e":"Many people volunteered to help the adults learn to read.","zh":"(動) 自願做；義務服務　(名) 志願者；義工","ez":"許多人自願幫助成年人學習閱讀。"},{"w":"witness","p":"[ˈwitnis] n.","d":"A witness is someone who sees or hears a crime or accident happen.","e":"The woman was the only witness of the horrible crime.","zh":"(動) 見證；目擊　(名) 證人；目擊者","ez":"那位女士是這起可怕罪行的唯一目擊者。"}]},{"id":8,"name":"Unit 8","words":[{"w":"access","p":"[ˈækses] n.","d":"Access is the right to enter or use something.","e":"The manager was the only person with access to the password.","zh":"(名) 入口；使用權　(動) 存取；進入","ez":"經理是唯一有密碼權限的人。"},{"w":"conduct","p":"[ˈkɒndʌkt] n.","d":"Conduct is the way that someone acts.","e":"She was punished for her bad conduct.","zh":"(名) ['kɑndʌkt] 行為；舉止　(動) [kən'dʌkt] 進行；指揮","ez":"她因為行為不當而受到處罰。"},{"w":"constant","p":"[ˈkɒnstənt] adj.","d":"When an event or action is constant, it happens a lot or all the time.","e":"The television at home is in constant use.","zh":"(形) 持續的；不變的　(名) 常數；常量","ez":"家裡的電視機一直在使用。"},{"w":"crack","p":"[kræk] n.","d":"A crack is a narrow space between the parts of something broken.","e":"The old window was covered with cracks.","zh":"(動) 裂開；破裂　(名) 裂縫；裂痕","ez":"舊窗戶上滿是裂痕。"},{"w":"device","p":"[diˈvais] n.","d":"A device is an object or a machine.","e":"A thermometer is a device that tells temperature.","zh":"(名) 裝置；設備　(名) 方法；手段","ez":"溫度計是一種測量溫度的裝置。"},{"w":"enclose","p":"[inˈklouz] v.","d":"To enclose something is to contain it.","e":"The cows in the field were enclosed by a fence.","zh":"(動) 圍住；封閉　(動) 附上；隨信附寄","ez":"田野裡的牛被籬笆圍住了。"},{"w":"grip","p":"[grɪp] v.","d":"To grip something is to hold it very tightly.","e":"I was scared, so I gripped my older sister&rsquo;s hand.","zh":"(名) 抓握；握力　(動) 緊握；吸引　(形) 引人入勝的；緊握的","ez":"我很害怕，所以緊緊抓住姐姐的手。"},{"w":"halt","p":"[hɔːlt] v.","d":"To halt is to stop moving.","e":"The criminal halted when he saw the police coming.","zh":"(動) 停止；中止　(名) 停止；暫停","ez":"罪犯看到警察來了就停了下來。"},{"w":"impending","p":"[ɪmˈpendɪŋ] adj.","d":"If something is impending, it is going to happen soon.","e":"The student was nervous about his impending test.","zh":"即將發生的；逼近的","ez":"學生對即將到來的考試感到緊張。"},{"w":"influence","p":"[ˈinfluəns] v.","d":"To influence someone or something is to have an effect over them.","e":"My friend influenced my decision to attend Terrance University.","zh":"(名) 影響；影響力　(動) 影響；左右","ez":"我的朋友影響了我決定就讀特倫斯大學。"},{"w":"law","p":"[lɔː] n.","d":"A law is a rule made by the legislative body.","e":"The students learned about different laws during social studies class.","zh":"(名) 法律；法令　(動) 控告；起訴","ez":"學生在社會課上學到了不同的法律。"},{"w":"mode","p":"[moud] n.","d":"A mode is a setting or condition on a machine.","e":"Mother turned the TV to quiet mode while she talked on the phone.","zh":"(名) 方式；模式　(名) 時尚；款式　(動) 塑造；模擬","ez":"媽媽在講電話時把電視調成靜音模式。"},{"w":"perspire","p":"[pəsˈpaɪər] v.","d":"To perspire means to sweat.","e":"I usually perspire a lot when I am at practice.","zh":"(動) 流汗；出汗","ez":"我練習時通常會流很多汗。"},{"w":"replace","p":"[riˈpleis] v.","d":"To replace something is to put it in the place of something else.","e":"I replaced the tire on my car because it was flat.","zh":"(動) 取代；替換","ez":"我換了車子的輪胎，因為它沒氣了。"},{"w":"snap","p":"[snæp] v.","d":"To snap something means to break it suddenly, which causes a loud noise.","e":"I took the stick and snapped it with my hands.","zh":"(動) 折斷；發出折斷聲　(名) 啪嗒聲；快照","ez":"我拿起棍子，用手把它折斷。"},{"w":"sly","p":"[slai] adj.","d":"If a person or animal is sly, they are sneaky or good at tricking people.","e":"The sly fox stole the eggs from the nest.","zh":"(形) 狡猾的；狡詐的","ez":"狡猾的狐狸從巢裡偷走了蛋。"},{"w":"tend","p":"[tend] v.","d":"To tend to do something is to be likely to do it or to do it often.","e":"My mom tends to buy me the perfect gift each Christmas.","zh":"(動) 傾向於；照顧","ez":"我媽媽每年聖誕節都會買最完美的禮物給我。"},{"w":"valid","p":"[ˈvælid] adj.","d":"When something is valid, it is correct or based on good reasoning.","e":"The expert&rsquo;s opinion on the subject was more valid than others.","zh":"(形) 有效的；合理的","ez":"專家對這個議題的意見比其他人的更可信。"},{"w":"version","p":"[ˈvəːrʒən] n.","d":"A version is an account of something that differs slightly from the original.","e":"She read the students British version of the Chinese fairy tale.","zh":"(名) 版本；說法","ez":"她讀了英國版的中國童話給學生聽。"},{"w":"whatsoever","p":"[hwɒtsouˈevər] adj.","d":"You use whatsoever after a noun to emphasize that there is nothing of that thing.","e":"The boy had no idea whatsoever how to solve the story problem.","zh":"(副) 絲毫；任何（用於否定句或疑問句，加強語氣）　(代) 無論什麼","ez":"那個男孩完全不知道怎麼解應用題。"}]},{"id":9,"name":"Unit 9","words":[{"w":"alongside","p":"[əˈlɒŋˈsaɪd] adv.","d":"If something is alongside another thing, then it is next to it.","e":"We work alongside each other in the office.","zh":"(介) 沿著；在...旁邊　(副) 一起；並肩","ez":"我們在辦公室裡一起工作。"},{"w":"appetite","p":"[ˈæpitait] n.","d":"Your appetite is your hunger for food.","e":"Tom has a big appetite. He eats all the time.","zh":"(名) 食慾；胃口　(名) 慾望；渴望","ez":"湯姆胃口很大，他一直在吃東西。"},{"w":"assist","p":"[əˈsist] v.","d":"To assist someone is to help them.","e":"Andrew assisted me with my homework.","zh":"(動) 幫助；協助　(名) 助手；輔助","ez":"安德魯幫我做功課。"},{"w":"breeze","p":"[briːz] n.","d":"A breeze is a soft wind.","e":"The breeze caused the leaves to fall off the tree.","zh":"(名) 微風；輕風　(動) 輕輕吹過；輕鬆行動","ez":"微風讓樹葉從樹上掉了下來。"},{"w":"defy","p":"[diˈfai] v.","d":"To defy someone is to work against them or refuse to do what they say.","e":"The students got into trouble for defying their teacher&rsquo;s rules.","zh":"(動) 違抗；反抗　(動) 挑戰；不畏懼","ez":"學生因為違抗老師的規定而惹上麻煩。"},{"w":"display","p":"[disˈplei] v.","d":"To display something is to show it, especially by putting it in a certain place.","e":"The museum displayed many wonderful paintings.","zh":"(動) 展示；陳列　(名) 展覽；表現","ez":"博物館展出了許多精彩的畫作。"},{"w":"efficient","p":"[iˈfiʃənt] adj.","d":"If something or someone is efficient, they do not waste energy.","e":"My car is very efficient. I rarely have to buy gas.","zh":"(形) 有效率的；高效的　(形) 節省的；省力的","ez":"我的車很省油，我很少需要加油。"},{"w":"feeble","p":"[ˈfiːbəl] adj.","d":"If someone is feeble, they are small or weak.","e":"The boy was too feeble to carry the object very far.","zh":"(形) 虛弱的；無力的　(形) 微弱的；淡薄的","ez":"那個男孩太虛弱了，沒辦法把東西搬很遠。"},{"w":"forgive","p":"[fə:rgɪv] v.","d":"To forgive someone is to stop being angry with them.","e":"Sandra forgave Peter after he said he was sorry.","zh":"(動) 原諒；寬恕　(動) 免除（債務、罪責）","ez":"桑德拉在彼得道歉後原諒了他。"},{"w":"lively","p":"[ˈlaivli] adj.","d":"If someone is lively, they have a lot of energy.","e":"Jennifer is very lively: she&rsquo;s always running and playing.","zh":"(形) 活潑的；充滿生氣的　(形) 熱鬧的；生動的","ez":"珍妮佛很有活力，她總是跑來跑去玩耍。"},{"w":"majestic","p":"[məˈdʒestik] adj.","d":"If something is majestic, it is large and beautiful.","e":"The rich people lived in a big, majestic house.","zh":"(形) 雄偉的；莊嚴的　(形) 堂皇的；壯麗的","ez":"有錢人住在一棟宏偉的大房子裡。"},{"w":"nor","p":"[nɔːr] conj","d":"You use nor to connect two negative ideas.","e":"I eat neither apples nor oranges. I don&rsquo;t like either one.","zh":"(連) 也不；既不　(連) 也沒有","ez":"我蘋果和柳丁都不吃，兩種我都不喜歡。"},{"w":"outraged","p":"[ˈautreɪdʒ] adj.","d":"If someone is outraged, they are very angry.","e":"My father was outraged when he saw that I had crashed his car.","zh":"(形) 憤怒的；憤慨的","ez":"我爸爸看到我撞壞他的車時非常憤怒。"},{"w":"pessimistic","p":"[ˌpesəˈmistik] adj.","d":"If someone is pessimistic, they believe that the worst will happen.","e":"John is pessimistic. He always thinks something bad will happen.","zh":"(形) 悲觀的","ez":"約翰很悲觀，他總覺得會有壞事發生。"},{"w":"rumor","p":"[ˈruːmər] n.","d":"A rumor is something people talk about even though it may not be true.","e":"Kevin was spreading rumors about Marcia to everyone.","zh":"(名) 謠言；傳聞","ez":"凱文到處跟每個人散播瑪西亞的謠言。"},{"w":"slap","p":"[slæp] v.","d":"To slap someone means to hit them with the palm of the hand.","e":"Out of anger, Helen slapped Eunice on the face.","zh":"(動) 打耳光；拍打　(名) 一巴掌；拍打聲","ez":"海倫一氣之下打了尤妮絲一巴掌。"},{"w":"smash","p":"[smæʃ] v.","d":"To smash something is to break it into many small pieces.","e":"Jacob smashed the window with a rock.","zh":"(動) 粉碎；猛擊　(名) 扣殺；破碎聲","ez":"雅各用石頭砸破了窗戶。"},{"w":"subject","p":"[ˈsʌbdʒɪkt] n.","d":"A subject is the topic that is being discussed or taught.","e":"The subject of Marco&rsquo;s speech was the economy.","zh":"(名) [ˋsʌbdʒɪkt] 主題；科目　(動) [səbˋdʒɛkt] 使服從；使遭受","ez":"馬可演講的主題是經濟。"},{"w":"wage","p":"[weɪdʒ] n.","d":"A wage is the money that a person gets for doing a job.","e":"The wages I receive from my job are really great!","zh":"(名) 工資；薪資","ez":"我工作的薪水真的很棒！"},{"w":"whereas","p":"[hwɛərˈæz] conj.","d":"You use whereas to show how two things are different.","e":"My sister loves horror movies, whereas I prefer comedies.","zh":"(連) 然而；鑑於","ez":"我姊姊喜歡恐怖片，而我比較喜歡喜劇片。"}]},{"id":10,"name":"Unit 10","words":[{"w":"animate","p":"[ˈӕnəmit] adj.","d":"When something is animate, it has life.","e":"Rocks and machines are not animate things.","zh":"(動) [ˋænəmet] 使有生氣；使活躍　(形) [ˋænəmɪt] 生動的；活潑的","ez":"石頭和機器都不是有生命的東西。"},{"w":"classify","p":"[ˈklӕsəfai] v.","d":"To classify things is to put them into groups based on their type.","e":"The biologist classified the plant as a completely new species.","zh":"(動) 分類；歸類　(動) 列為機密的","ez":"生物學家將這種植物歸類為全新的物種。"},{"w":"concede","p":"[kənˈsiːd] v.","d":"To concede is to admit that something is true against your wish.","e":"The student conceded that he had cheated on the test.","zh":"(動) 承認；讓步　(動) 認輸；退縮","ez":"學生承認他在考試中作弊了。"},{"w":"concept","p":"[ˈkɒnsept] n.","d":"A concept is an idea about something.","e":"I learned some concepts of molecules before working in the science lab.","zh":"(名) 概念；想法　(名) 概括；觀念","ez":"我在進科學實驗室工作前學了一些分子的概念。"},{"w":"construct","p":"[kənˈstrʌkt] v.","d":"To construct something means to make or build it.","e":"The men used wood and metal to construct a house.","zh":"(名) ['kɑnstrʌkt] 概念；構想　(動) [kən'strʌkt] 建造；構造","ez":"那些人用木材和金屬建造了一間房子。"},{"w":"decade","p":"[ˈdekeɪd] n.","d":"A decade is a period often years.","e":"She celebrated her three decades of work with the company.","zh":"(名) 十年；十個","ez":"她慶祝了在公司工作的三十年。"},{"w":"diagram","p":"[ˈdaiəgrӕm] n.","d":"A diagram is a simple drawing that explains what something is or how it works.","e":"By following the diagram, I was able to put the desk together.","zh":"(名) 圖表；圖解　(動) 用圖表表示；繪製圖表","ez":"按照圖示，我成功把桌子組裝起來了。"},{"w":"ferry","p":"[ˈferi] n.","d":"A ferry is a boat that carries passengers over short distances.","e":"The ferry took the people across the lake.","zh":"(名) 渡輪；擺渡船　(動) 用渡輪運送；擺渡","ez":"渡輪載著人們橫越了湖面。"},{"w":"handy","p":"[ˈhændi] adj.","d":"If something is handy, it is useful.","e":"An eraser is handy if you make a lot of mistakes.","zh":"(形) 方便的；易用的　(形) 靈巧的；有用的","ez":"如果你常犯錯，橡皮擦很方便。"},{"w":"isolate","p":"[ˈaisəleit] v.","d":"To isolate is to separate one person or thing from a group.","e":"The teacher isolated the bad child from the class before talking with her.","zh":"(動) 隔離；孤立　(動) 分離；區分","ez":"老師在跟那個壞孩子談話前，先把他隔離出班級。"},{"w":"longing","p":"[ˈlɔ(:)ŋɪŋ] n.","d":"A longing is a strong feeling of wanting.","e":"Since he skipped breakfast, he had a longing for food all morning.","zh":"渴望；嚮往；期望","ez":"因為他沒吃早餐，整個早上都很想吃東西。"},{"w":"numerous","p":"[ˈnjuːmərəs] adj.","d":"If something is numerous, there are many of those things.","e":"It was hard to drive fast since there were numerous holes in the road.","zh":"(形) 眾多的；許多的　(形) 數量龐大的；無數的","ez":"路上坑洞很多，很難開快車。"},{"w":"particle","p":"[ˈpaːrtikl] n.","d":"A particle is a very small piece of something.","e":"The bottles of wine were covered in a layer of dust particles.","zh":"(名) 粒子；微粒","ez":"那些酒瓶上覆蓋了一層灰塵。"},{"w":"plea","p":"[pliː] n.","d":"A plea is a request that is urgent or emotional.","e":"The poor, hungry man made a plea for food.","zh":"(名) 懇求；請求","ez":"那個貧窮又飢餓的男人懇求食物。"},{"w":"refrain","p":"[riˈfrein] v.","d":"To refrain from something is to avoid doing it.","e":"The doctor asked Mary to refrain from eating fast food as part of her diet.","zh":"(動) 克制；避免","ez":"醫生要求瑪麗在飲食中避免吃速食。"},{"w":"review","p":"[riˈvjuː] n.","d":"A review of something is a formal inspection of it by people in authority.","e":"The government ordered a careful review of the economic situation.","zh":"(動) 複習；檢討　(名) 複習；評論","ez":"政府下令仔細檢討經濟狀況。"},{"w":"sophisticated","p":"[səˈfistəkeitid] adj.","d":"If someone is sophisticated, they know many things about the world.","e":"Jake is one of the most sophisticated persons I&rsquo;ve ever met.","zh":"(形) 複雜精密的；高雅的","ez":"傑克是我見過最有教養的人之一。"},{"w":"surrender","p":"[səˈrendər] v.","d":"To surrender something is to give it up.","e":"The thief surrendered the money to the police when he was caught.","zh":"(動) 投降；放棄","ez":"小偷被抓到時把錢交給了警察。"},{"w":"upright","p":"[ˈʌprait] adj.","d":"If something is upright, it is standing up straight.","e":"Meerkats can&rsquo;t walk like humans, but they can stand upright.","zh":"(形) 正直的；垂直的　(副) 垂直地；挺直地","ez":"狐獴不能像人類一樣走路，但可以直立。"},{"w":"worthwhile","p":"[ˈwəːrθhwail] adj.","d":"If something is worthwhile, it is important or useful.","e":"On his visit to Canada, he realized studying English was worthwhile.","zh":"(形) 值得的；有價值的","ez":"在訪問加拿大時，他體會到學英文是值得的。"}]},{"id":11,"name":"Unit 11","words":[{"w":"alliance","p":"[əˈlaiəns] n.","d":"An alliance is a group of people who work together.","e":"The junior executives formed an alliance with each other.","zh":"(名) 聯盟；同盟　(動) 結成聯盟；聯合","ez":"初階主管們彼此結盟。"},{"w":"applause","p":"[əˈplɔːz] n.","d":"Applause is the noise made when people clap hands to show approval.","e":"At the end of his speech, everyone gave applause.","zh":"(名) 掌聲；喝彩　(動) 為…鼓掌；喝彩","ez":"演講結束時，大家報以掌聲。"},{"w":"armed","p":"[ɑːrmd] adj.","d":"If you are armed, you are carrying a weapon.","e":"The robber was armed with a gun.","zh":"(形) 武裝的；帶武器的　(動) 裝備；武裝","ez":"搶匪持槍。"},{"w":"authoritative","p":"[əˈθɔːriteitiv] adj.","d":"If something is authoritative, it uses the best information available.","e":"This book is an authoritative source on Ancient Egypt&rsquo;s Queen Nefertiti.","zh":"(形) 權威的；有權勢的　(形) 確定的；有信服力的","ez":"這本書是關於古埃及娜芙蒂蒂王后的權威來源。"},{"w":"ceremony","p":"[ˈserəmouni] n.","d":"A ceremony is an event that happens on special occasions.","e":"Tom and Amy&rsquo;s marriage ceremony is in June.","zh":"(名) 儀式；典禮　(名) 正式程序；禮儀","ez":"湯姆和艾美的婚禮在六月舉行。"},{"w":"culture","p":"[ˈkʌltʃər] n.","d":"Culture is the music, art, and writings of a certain place or group of people.","e":"Ancient Mexican culture is renowned for its architecture.","zh":"(名) 文化；文明　(名) 修養；素質","ez":"古墨西哥文化以其建築聞名。"},{"w":"defense","p":"[diˈfens] n.","d":"A defense is something that is done to protect another thing.","e":"The airforce works in defense of its country.","zh":"(名) 防守；防衛　(名) 辯護；答辯","ez":"空軍保衛國家。"},{"w":"detail","p":"[ˈdiːteil] n.","d":"A detail is a small piece of information.","e":"Jane told Ben all the details of her trip to China.","zh":"(名) 細節；詳情　(動) 詳述；說明細節","ez":"珍告訴班她去中國旅行的所有細節。"},{"w":"diverse","p":"[diˈvəːrs] adj.","d":"When a group of things is diverse, it is made up of a wide variety of things.","e":"Big cities have diverse populations with people of different races and ages.","zh":"(形) 多樣的；各種各樣的　(形) 差異大的；不同的","ez":"大城市有不同種族和年齡的多元人口。"},{"w":"enchant","p":"[inˈtʃænt] v.","d":"To enchant someone is to make them feel very interested or happy.","e":"The beautiful woman enchanted everybody in the room.","zh":"(動) 迷住；使著迷　(動) 施魔法；下咒語","ez":"那位美麗的女人迷住了房間裡的每個人。"},{"w":"equip","p":"[iˈkwip] v.","d":"To equip someone is to give them the things needed to do something.","e":"Steve was equipped with the tools needed to do the job.","zh":"(動) 裝備；配備　(動) 使具有能力；準備","ez":"史提夫備有完成工作所需的工具。"},{"w":"exception","p":"[ikˈsepʃən] n.","d":"An exception is someone or something not conforming to a rule.","e":"Most students thought the test was hard, but Tim was the exception.","zh":"(名) 例外；特殊情況　(名) 異議；反對","ez":"大部分學生覺得考試很難，但提姆是例外。"},{"w":"genre","p":"[ʒɑ̃ːnrə] n.","d":"A genre is a type of literature, art, or music characterized by its style.","e":"She is considered a master in the comedy genre.","zh":"(名) 文類；類型　(名) 風格；流派","ez":"她被認為是喜劇類型的大師。"},{"w":"impact","p":"[ˈimpækt] n.","d":"An impact is the effect someone or something has on another.","e":"My grandmother had a great impact on my life.","zh":"(名) 影響；衝擊　(動) 影響；衝撞","ez":"我祖母對我的人生影響很大。"},{"w":"lure","p":"[luər] v.","d":"To lure someone is to convince them to do something, by using a trick.","e":"The store lures people in with big signs that say &ldquo;Sale!&rdquo;","zh":"(動) 吸引；誘惑　(名) 誘餌；吸引力","ez":"商店用寫著「大拍賣！」的大招牌吸引人。"},{"w":"obstacle","p":"[ˈɒbstəkəl] n.","d":"An obstacle is an object or a problem that stops you from doing something.","e":"Climbing over the giant rock was the biggest obstacle for the hikers.","zh":"(名) 障礙；阻礙　(名) 困難；難題","ez":"爬過那塊巨石是健行者最大的障礙。"},{"w":"shelter","p":"[ˈʃeltə:r] n.","d":"A shelter is a place to go that is safe from danger or bad weather.","e":"The frog took shelter from the storm in a nearby cave.","zh":"(名) 避難所；遮蔽物　(動) 庇護；遮蔽","ez":"青蛙在附近的洞穴躲避暴風雨。"},{"w":"sort","p":"[sɔːrt] v.","d":"To sort means to separate things into different groups or classes.","e":"He sorted his clothes by colors and sizes.","zh":"(動) 分類；整理　(名) 種類；類型","ez":"他按顏色和尺寸分類衣服。"},{"w":"supply","p":"[səˈplai] v.","d":"To supply something means to give people what they need or want.","e":"The water heater supplied the house with warm water.","zh":"(名) 供應；補給品　(動) 供應；提供","ez":"熱水器為房子供應熱水。"},{"w":"vain","p":"[vein] adj.","d":"If people are vain, they are only concerned with how they look.","e":"Rebecca is so vain that she looks at herself in every mirror.","zh":"(形) 徒勞的；虛榮的","ez":"蕾貝卡非常自戀，每面鏡子都要照。"}]},{"id":12,"name":"Unit 12","words":[{"w":"alternative","p":"[ɔːlˈtəːrnətiv] n.","d":"An alternative is something that you can choose instead of your first choice.","e":"Her first plan to make extra money seemed weak, so she chose an alternative.","zh":"(形) 替代的；另外的　(名) 替代品；另一選擇","ez":"她第一個賺外快的計畫似乎不可行，所以她選了另一個方案。"},{"w":"avenue","p":"[ˈævənjuː] n.","d":"An avenue is a road, often a large one with buildings on each side.","e":"Drive down this avenue and then turn left to go to the park.","zh":"(名) 大街；林蔭道　(名) 途徑；方法","ez":"沿著這條大道開，然後左轉去公園。"},{"w":"belly","p":"[ˈbeli] n.","d":"The belly is the stomach of a person or animal.","e":"His belly was full because he ate a lot of food.","zh":"(名) 腹部；肚子　(形) 腹部的；前面的","ez":"他吃很多食物，肚子很飽。"},{"w":"bid","p":"[bid] n.","d":"A bid to do something is an attempt to do it.","e":"He made a bid to become the university&rsquo;s next president.","zh":"(名) 出價；投標　(動) 出價；投標","ez":"他出價要成為大學的下一任校長。"},{"w":"blow","p":"[blou] v.","d":"To blow means to move air or move something through the air, as in the wind.","e":"The wind is blowing very hard today. We should stay inside.","zh":"(動) 吹；吹動　(動) 打；打擊　(名) 一擊；打擊","ez":"今天風很大。我們應該待在室內。"},{"w":"conflict","p":"[ˈkɒnflɪkt] n.","d":"A conflict is a fight between different people or groups.","e":"The two nations had a conflict over which one could use the water in the river.","zh":"(名) [ˈkɑnflɪkt] 衝突；爭執　(動) [kənˈflɪkt] 衝突；不一致","ez":"這兩個國家因誰能使用河水而發生衝突。"},{"w":"continent","p":"[ˈkɒntənənt] n.","d":"A continent is one of the seven large areas of land on the Earth.","e":"Asia is the largest continent.","zh":"(名) 大陸；洲","ez":"亞洲是最大的洲。"},{"w":"current","p":"[ˈkə:rənt] n.","d":"A current is a steady and constant flow of air or water in a river or ocean.","e":"The ocean currents took the ship far off into the sea.","zh":"(形) 現在的；當前的　(名) 電流；水流；趨勢","ez":"洋流把船帶到遠海。"},{"w":"disrespect","p":"[ˈdisrisˈpekt] n.","d":"Disrespect is rudeness or a behavior that shows a lack of respect.","e":"He showed disrespect by arguing with his boss during a meeting.","zh":"不尊敬；無禮；失禮；不尊敬；對；無禮","ez":"他在會議上與老闆爭論，表現出不尊重。"},{"w":"enthusiasm","p":"[enˈθuːzɪæzəm] n.","d":"Enthusiasm is a very strong good feeling about something.","e":"The crowd showed their enthusiasm for the soccer team by cheering loudly.","zh":"(名) 熱情；熱忱　(名) 熱心；積極的態度","ez":"群眾大聲歡呼，展現對足球隊的熱情。"},{"w":"harsh","p":"[hɑːrʃ] adj.","d":"When something is harsh, it is very unpleasant.","e":"The desert can be a very harsh environment.","zh":"(形) 刺耳的；粗糙的　(形) 嚴厲的；無情的","ez":"沙漠可能是非常嚴酷的環境。"},{"w":"lean","p":"[li:n] v.","d":"To lean is to bend the body in a particular direction.","e":"The woman leaned against the counter because she was tired.","zh":"(形) 瘦的；精幹的　(動) 傾斜；靠著　(副) 朝向；傾向","ez":"那位女士因為累了而靠在櫃檯上。"},{"w":"meantime","p":"[ˈmiːnˈtaim] n.","d":"The meantime is the time between two events.","e":"Ted began setting the table. In the meantime, I began preparing the food.","zh":"(名) 同時；其間　(副) 在此期間；與此同時","ez":"泰德開始擺設餐桌。與此同時，我開始準備食物。"},{"w":"mischief","p":"[ˈmistʃif] n.","d":"Mischief is behavior that is meant to trick or cause trouble for people.","e":"Ben was up to mischief when he persuaded Ken to paint his face.","zh":"(名) 惡作劇；調皮　(動) 製造麻煩；搗亂","ez":"班說服肯在臉上畫畫，是在搗蛋。"},{"w":"muscle","p":"[ˈmʌsəl] n.","d":"Muscle is a mass of tissue attached to bone that helps you move.","e":"She went to the gym in order to make her muscles stronger.","zh":"(名) 肌肉；肌肉組織　(名) 力量；體力","ez":"她去健身房是為了讓肌肉更強壯。"},{"w":"rescue","p":"[ˈreskjuː] v.","d":"To rescue someone means to remove them from danger.","e":"The firefighter rescued the man from the burning building.","zh":"(名) 救援；營救　(動) 拯救；解救","ez":"消防員從燃燒的建築物中救出那名男子。"},{"w":"succession","p":"[səkˈseʃən] n.","d":"A succession is a number of things that follow one after the other.","e":"The student said the letters of the alphabet in succession.","zh":"(名) 連續；繼承","ez":"學生依序說出字母。"},{"w":"terrain","p":"[təˈrein] n.","d":"The terrain is the land and all of its physical features or parts.","e":"The terrain below was rocky and full of hills.","zh":"(名) 地形；地勢","ez":"下方的地形多岩石且多丘陵。"},{"w":"timid","p":"[ˈtimid] adj.","d":"If someone is timid, they are afraid, shy, or nervous.","e":"The timid child hides behind her mother whenever she sees a stranger.","zh":"(形) 膽小的；羞怯的","ez":"那個膽小的孩子一看到陌生人就躲在媽媽身後。"},{"w":"violence","p":"[ˈvaiələns] n.","d":"Violence is forceful action that is meant to injure or kill people.","e":"The boy hit his brother in an act of violence.","zh":"(名) 暴力；猛烈","ez":"男孩打了他的兄弟，這是一種暴力行為。"}]},{"id":13,"name":"Unit 13","words":[{"w":"affect","p":"[əˈfekt] v.","d":"To affect someone or something is to have an influence over them.","e":"The student&rsquo;s poor attitude affected the other students in the class.","zh":"(動) 影響；影響到　(名) 情感；感受","ez":"那位學生的差勁態度影響了班上其他學生。"},{"w":"autograph","p":"[ˈɔːtəgrɑːf] n.","d":"An autograph is the written name of a famous person.","e":"Everybody wanted the movie star&rsquo;s autograph.","zh":"(名) 親筆簽名；手簽　(動) 簽名；在...上簽名","ez":"每個人都想要那位電影明星的簽名。"},{"w":"bead","p":"[bi:d] n.","d":"A bead is a drop of liquid.","e":"Beads of water collected outside the glass.","zh":"(名) 珠子；珠粒　(動) 形成珠粒；用珠子裝飾","ez":"水珠聚集在玻璃杯外側。"},{"w":"brew","p":"[bru:] v.","d":"To brew coffee or tea means to pour hot water over it.","e":"Please brew a fresh pot of coffee.","zh":"(動) 釀造；沖泡　(名) 釀造物；一杯飲料","ez":"請泡一壺新鮮咖啡。"},{"w":"charm","p":"[tʃɑːrm] v.","d":"To charm someone is to please them with your personality.","e":"Gail charmed everyone with her humorous stories.","zh":"(名) 魅力；吸引力　(動) 迷住；吸引　(形) 迷人的；有魅力的","ez":"蓋爾用她的幽默故事迷住了每個人。"},{"w":"destiny","p":"[ˈdestəni] n.","d":"A destiny is all the things that happen or will happen to a person in their life.","e":"It was his destiny to become a great singer.","zh":"(名) 命運；宿命　(名) 前途；發展方向","ez":"成為偉大歌手是他的命運。"},{"w":"horn","p":"[hɔːrn] n.","d":"A horn is a device that makes a loud noise.","e":"The boy honked his horn while he rode his bicycle past the house.","zh":"(名) 喇叭；號角　(名) 角；獸角　(動) 用角頂；插嘴","ez":"男孩騎腳踏車經過房子時按了喇叭。"},{"w":"irritable","p":"[ˈirətəbəl] adj.","d":"When someone is irritable, they become annoyed or angry very easily.","e":"She is irritable when she doesn&rsquo;t get enough sleep.","zh":"(形) 易怒的；容易惹惱的　(形) 易受刺激的；敏感的","ez":"她睡眠不足時會很煩躁。"},{"w":"lag","p":"[læg] v.","d":"To lag behind is to move slowly behind other moving objects.","e":"The girl on rollerblades lagged behind the little girl on the bicycle.","zh":"(動) 落後；滯後　(名) 延遲；時間差","ez":"穿直排輪的女孩落後在騎腳踏車的小女孩後面。"},{"w":"maximize","p":"[ˈmæksəmaiz] v.","d":"To maximize something means to make it the biggest in size or amount.","e":"Businesses try to maximize their profits.","zh":"(動) 最大化；使達到最大　(動) 充分利用；發揮到最大","ez":"企業試圖最大化利潤。"},{"w":"nightmare","p":"[ˈnaitmɛə:r] n.","d":"A nightmare is a bad or scary dream.","e":"The girl was scared to go back to sleep because she had a nightmare.","zh":"(名) 噩夢；惡夢　(名) 令人極度困擾的事物","ez":"那個女孩因為做了惡夢，嚇得不敢回去睡覺。"},{"w":"nutritious","p":"[njuˈtriʃəs] adj.","d":"When something is nutritious, it helps the body stay healthy.","e":"Mangoes are one of the most nutritious fruits in the world.","zh":"(形) 營養豐富的；有營養的","ez":"芒果是世界上最有營養的水果之一。"},{"w":"protein","p":"[ˈproutiːn] n.","d":"Protein is a substance that is necessary for the body to grow and be strong.","e":"Fish and beef are good sources of protein.","zh":"(名) 蛋白質","ez":"魚肉和牛肉是很好的蛋白質來源。"},{"w":"signature","p":"[ˈsɪgnətʃə:r] n.","d":"A signature is your name that you have written in your own way.","e":"I put my signature at the end of the letter.","zh":"(名) 簽名；署名","ez":"我在信的末尾簽上了名字。"},{"w":"stuff","p":"[stʌf] n.","d":"Stuff is a word used to refer to things without mentioning the things by name.","e":"We gave a lot of stuff to the charity.","zh":"(名) 東西；物品　(動) 填塞；裝滿","ez":"我們捐了很多東西給慈善機構。"},{"w":"subconscious","p":"[ˈsʌbˈkɒnʃəs] adj.","d":"When something is subconscious, it is done without thinking about it.","e":"Breathing is one of the subconscious things that the body does.","zh":"(形) 潛意識的；下意識的","ez":"呼吸是身體下意識進行的動作之一。"},{"w":"van","p":"[væn] n.","d":"A van is a vehicle that is used for carrying things but is smaller than a truck.","e":"The delivery company uses large vans to deliver packages.","zh":"(名) 廂型車；貨車","ez":"快遞公司用大型貨車運送包裹。"},{"w":"warn","p":"[wɔːrn] v.","d":"To warn someone is to make them know of possible danger in the future.","e":"The lifeguard warned people to stay away from the rough ocean.","zh":"(動) 警告；告誡","ez":"救生員警告人們遠離波濤洶湧的海面。"},{"w":"workout","p":"[ˈwəːrkaut] n.","d":"A workout is an exercise routine that helps improve health.","e":"She doesn&rsquo;t do her workout on the weekends.","zh":"(名) 鍛鍊；運動","ez":"她週末不做運動。"},{"w":"zoom","p":"[zuːm] v.","d":"To zoom is to move quickly.","e":"The cars zoomed along the road.","zh":"(名) 變焦；縮放　(動) 快速移動；變焦","ez":"汽車沿著道路呼嘯而過。"}]},{"id":14,"name":"Unit 14","words":[{"w":"brick","p":"[brik] n.","d":"A brick is a block of hard clay that is used for building things, such as walls.","e":"There were several bricks scattered on the ground.","zh":"(名) 磚；磚塊　(名) 磚紅色","ez":"地上散落著好幾塊磚頭。"},{"w":"crumble","p":"[ˈkrʌmbl] v.","d":"To crumble means to break or fall apart into small pieces.","e":"The old house&rsquo;s walls crumbled into a pile of rock and wood.","zh":"(動) 碎裂；崩潰　(名) 碎片；崩潰","ez":"老房子的牆壁坍塌成一堆石頭和木頭。"},{"w":"dough","p":"[dou] n.","d":"Dough is a mixture of flour and water that becomes bread when baked.","e":"I made heart-shaped cookies from the dough.","zh":"(名) 麵糰；金錢　(動) 搓揉；製作麵糰","ez":"我用麵團做了心形餅乾。"},{"w":"express","p":"[iksˈpres] v.","d":"To express a feeling or idea means to show others how one thinks or feels.","e":"The nurse expressed her sympathy for the sick patient.","zh":"(動) 表達；表現　(形) 快速的；特快的","ez":"護士對生病的病人表達了同情。"},{"w":"fist","p":"[fist] n.","d":"A fist is a hand with fingers bent in toward the palm.","e":"The bully made a fist and threatened to hit the small boy.","zh":"(名) 拳頭；緊握的手　(動) 握拳；用拳頭打","ez":"那個惡霸握緊拳頭，威脅要打那個小男孩。"},{"w":"flexible","p":"[ˈfleksəbəl] adj.","d":"If something is flexible, then it can bend easily without breaking.","e":"The tree branch was so flexible it could be bent into a circle and not break.","zh":"(形) 柔軟的；易彎曲的　(形) 靈活的；有適應力的","ez":"樹枝非常柔韌，可以彎成圓圈而不斷裂。"},{"w":"flush","p":"[flʌʃ] v.","d":"To flush means the face becomes red due to heat, illness, or emotion.","e":"After the long race, the runner&rsquo;s face was flushed.","zh":"(動) 沖洗；沖水　(形) 臉紅的；充足的","ez":"長跑比賽結束後，跑者的臉漲紅了。"},{"w":"injure","p":"[ˈindʒər] v.","d":"To injure someone means to damage a part of their body.","e":"The car crash injured two people.","zh":"(動) 傷害；受傷　(動) 損害；危害","ez":"車禍導致兩人受傷。"},{"w":"lump","p":"[lʌmp] n.","d":"A lump is a small piece of something that is solid.","e":"The artist took a lump of clay and turned it into a beautiful pot.","zh":"(名) 腫塊；疙瘩　(動) 把...合併；歸為一類　(形) 成塊的；結塊的","ez":"藝術家拿起一塊黏土，把它變成了一個美麗的花瓶。"},{"w":"mixture","p":"[ˈmikstʃə:r] n.","d":"A mixture is something that is made by mixing other things together.","e":"The walls were built using a mixture of water, rock, and dirt.","zh":"(名) 混合物；混合　(動) 混合；摻合","ez":"牆壁是用水和岩石、泥土的混合物建造的。"},{"w":"reconcile","p":"[ˈrekənsail] v.","d":"To reconcile means to return to a friendly relationship.","e":"After arguing, the two friends were reconciled with each other.","zh":"(動) 調解；使和好","ez":"爭吵過後，那兩個朋友和好了。"},{"w":"ruin","p":"[ˈruːin] v.","d":"To ruin something means to harm or damage it greatly.","e":"Our walk in the park was ruined by the sudden rain.","zh":"(動) 毀壞；毀滅　(名) 廢墟；毀滅","ez":"我們在公園散步的興致被突如其來的雨給破壞了。"},{"w":"shatter","p":"[ˈʃætə:r] v.","d":"To shatter something means to break it suddenly into many tiny pieces.","e":"When the ball hit the window, the glass shattered.","zh":"(動) 粉碎；震碎","ez":"球打到窗戶時，玻璃碎了。"},{"w":"shutter","p":"[ˈʃʌtə:r] n.","d":"Shutters are wooden or metal covers in front of a window.","e":"Mr. Smith closed the shutters every night to make his bedroom dark.","zh":"(名) 快門；百葉窗","ez":"史密斯先生每晚都關上百葉窗，讓臥室變暗。"},{"w":"sift","p":"[sift] v.","d":"To sift something means to remove all the large pieces.","e":"The baker sifted the flour into a large bowl.","zh":"(動) 篩；過濾","ez":"麵包師傅將麵粉篩進一個大碗裡。"},{"w":"slight","p":"[slait] adj.","d":"If something is slight, then it is small or minor.","e":"There was only a slight change in the little boy&rsquo;s height.","zh":"(形) 輕微的；細小的　(動) 輕視；怠慢","ez":"那個小男孩的身高只有微小的變化。"},{"w":"sparkle","p":"[ˈspɑːrkəl] v.","d":"To sparkle means to shine brightly with quick flashes of light.","e":"The stars sparkled in the winter night&rsquo;s sky.","zh":"(動) 閃爍；閃耀　(名) 閃光；光彩","ez":"星星在冬夜的天空中閃爍。"},{"w":"sprinkle","p":"[ˈspriŋkəl] v.","d":"To sprinkle means to scatter something all over something else.","e":"He sprinkled the pasta with salt and black pepper.","zh":"(動) 灑；撒","ez":"他在義大利麵上撒了鹽和黑胡椒。"},{"w":"stale","p":"[steil] adj.","d":"If food is stale, then it is not fresh but dry, hard, and not good to eat.","e":"The cookies sat on the table so long that they became stale.","zh":"(形) 不新鮮的；陳腐的","ez":"餅乾在桌上放太久，變得不好吃了。"},{"w":"utter","p":"[ˈʌtər] v.","d":"To utter a word or a sound means to say it.","e":"The lost boy was so scared that he could barely utter a single word.","zh":"(動) 說出；發出(聲音)","ez":"迷路的小男孩嚇得幾乎說不出一個字。"}]},{"id":15,"name":"Unit 15","words":[{"w":"although","p":"[ɔːlˈðou] conj.","d":"You use although to say that one thing is contrasted by another.","e":"Although she was late, her friends gave her a warm welcome.","zh":"(連) 雖然；縱然　(副) 儘管；雖說","ez":"雖然她遲到了，朋友們還是熱烈歡迎她。"},{"w":"apply","p":"[əˈplai] v.","d":"To apply something means to put it on.","e":"She always applies makeup to her face before going outside.","zh":"(動) 申請；應徵　提出申請　(動) 使用；運用　(動) 涂抹；敷","ez":"她出門前總會在臉上化妝。"},{"w":"await","p":"[əˈweit] v.","d":"To await something means to wait for it.","e":"The players awaited the judge&rsquo;s decision.","zh":"(動) 等待；期待　(動) 留待；等著被","ez":"選手們等待著裁判的判決。"},{"w":"beloved","p":"[biˈlʌvid] adj.","d":"When something is beloved, it is very special and you like it very much.","e":"The boy took a nap next to his beloved cat.","zh":"(形) 心愛的；摯愛的　(名) 心愛的人；摯愛","ez":"男孩在他心愛的貓旁邊打了個盹。"},{"w":"bury","p":"[ˈberɪ] v.","d":"To bury someone or something means to put them in the ground.","e":"They buried their grandfather under his favorite tree after he died.","zh":"(動) 埋藏；埋葬　(動) 隱藏；掩蓋","ez":"祖父過世後，他們把他埋在他最喜歡的樹下。"},{"w":"climate","p":"[ˈklaimit] n.","d":"A climate is the usual weather in a place.","e":"The climate in the desert is very hot.","zh":"(名) 氣候；氣象　(名) 風氣；環境","ez":"沙漠的氣候非常炎熱。"},{"w":"complain","p":"[kəmˈplein] v.","d":"When you complain, you say that you are unhappy about something.","e":"The workers complained that they were being treated unfairly.","zh":"(動) 抱怨；不滿　(名) 抱怨；訴苦","ez":"工人們抱怨他們受到不公平的對待。"},{"w":"confuse","p":"[kənˈfjuːz] v.","d":"To confuse someone means to make them feel like they are unsure.","e":"The sign confused the traveler because it pointed in two directions.","zh":"(動) 使困惑；使混淆　(動) 弄混；搞混","ez":"那個標誌讓旅客感到困惑，因為它指向兩個方向。"},{"w":"due","p":"[djuː] adj.","d":"When something is due, it is expected to happen or be done at that time.","e":"The papers were due on the 19th.","zh":"(形) 應該；預期的　(形) 到期的；應繳納的　(名) 應得的；應付款","ez":"報告要在19號繳交。"},{"w":"entire","p":"[ənˈtaiər] adj.","d":"When you talk about an entire thing, you are talking about the whole thing.","e":"He was so hungry that he ate the entire pizza by himself.","zh":"(形) 整個的；全部的　(形) 完整的；未損傷的","ez":"他餓極了，一個人吃掉了整塊披薩。"},{"w":"establish","p":"[isˈtæbliʃ] v.","d":"To establish something means to create it.","e":"He wanted to establish a club for people to help the Earth.","zh":"(動) 建立；設立　(動) 確定；證實","ez":"他想成立一個俱樂部，幫助人們保護地球。"},{"w":"furnace","p":"[ˈfəːrnis] n.","d":"A furnace is a place where heat is made.","e":"Mr. Jones came to fix the furnace.","zh":"(名) 熔爐；火爐　(名) 極熱的地方","ez":"瓊斯先生來修理暖爐。"},{"w":"leash","p":"[liːʃ] n.","d":"A leash is a rope or chain that is used to lead an animal.","e":"A lot of dogs must wear a leash to keep them from running away.","zh":"(名) 皮帶；繩子　(動) 用皮帶拴住；束縛","ez":"很多狗必須戴上牽繩，以免跑掉。"},{"w":"mature","p":"[məˈtjuə:r] v.","d":"To mature means to grow up to become an adult.","e":"When they matured, they became as tall as their parents.","zh":"(形) 成熟的；懂事的　(動) 成熟；變成熟","ez":"他們長大後，變得和父母一樣高。"},{"w":"measure","p":"[ˈmeʒə:r] v.","d":"To measure something means to find out the quality, value, or effect of it.","e":"The scientists carefully measured the amount of chemicals in the tubes.","zh":"(名) 措施；方法　(動) 測量；衡量　(形) 適度的；有分寸的","ez":"科學家仔細測量了試管中化學物質的含量。"},{"w":"midst","p":"[midst] n.","d":"The midst of something is the middle of it.","e":"She was in the midst of cleaning when the telephone rang.","zh":"(介) 在…之中；在…中間　(名) 中間；中央","ez":"她正在打掃時，電話響了。"},{"w":"misery","p":"[ˈmizəri] n.","d":"Misery is extreme suffering.","e":"There was a lot of misery after Sam lost his dog.","zh":"(名) 痛苦；悲慘　(名) 貧困；困境","ez":"山姆失去他的狗之後，感到非常痛苦。"},{"w":"prior","p":"[ˈpraiər] adj.","d":"When something happened prior to something else, it happened earlier.","e":"Ron had to wait since he arrived prior to the scheduled meeting time.","zh":"(形) 先前的；較早的　(副) 在前；居先","ez":"羅恩在預定會議時間之前就到了，所以必須等待。"},{"w":"research","p":"[riˈsəːrtʃ] n.","d":"Research is close and careful study to discover new things.","e":"Scientists did a lot of research on the subject of blood type.","zh":"(名) 研究；調查　(動) 研究；調查","ez":"科學家針對血型這個主題做了很多研究。"},{"w":"variety","p":"[vəˈraiəti] n.","d":"A variety of something is a group of many different kinds of it.","e":"There are a variety of flowers at the shop.","zh":"(名) 多樣化；種類","ez":"這家店裡有各式各樣的花。"}]},{"id":16,"name":"Unit 16","words":[{"w":"altogether","p":"[ˌɔːltəˈgeðər] adv.","d":"If something happens altogether, it happens completely.","e":"The company stopped using sugar altogether in its food.","zh":"(副) 總共；一共　(副) 完全地；根本上","ez":"這家公司完全停止在食物中使用糖。"},{"w":"bind","p":"[baind] v.","d":"To bind is to bring people together.","e":"The victims of the flood were bound by their need to help each other.","zh":"(動) 綁；束縛　(動) 裝訂；釘成冊","ez":"水災的受害者因需要互相幫助而團結在一起。"},{"w":"bruise","p":"[bruːz] n.","d":"A bruise is a dark mark caused by being hit by something.","e":"She got a bruise on her knee from falling down.","zh":"(名) 瘀傷；淤青　(動) 使受傷；碰傷　(形) 受傷的；有瘀傷的","ez":"她跌倒時膝蓋擦傷了。"},{"w":"custom","p":"[ˈkʌstəm] n.","d":"A custom is a way of doing things that has been the same for a long time.","e":"It is a custom that the bride and groom have the first dance.","zh":"(名) 風俗；習慣　(形) 訂做的；習慣性的","ez":"新郎新娘跳第一支舞是習俗。"},{"w":"disobedient","p":"[ˌdisəˈbiːdiənt] adj.","d":"When someone is disobedient, they do not follow the rules or instructions.","e":"The disobedient children didn&rsquo;t listen to their mother and had an accident.","zh":"不服從的；不聽話的","ez":"不聽話的孩子沒聽媽媽的話，結果出了意外。"},{"w":"foresee","p":"[fɔːrsiː] v.","d":"To foresee something is to know about it before it happens.","e":"The teacher didn&rsquo;t foresee any problems with her large class.","zh":"(動) 預見；預先看到　(動) 預測；預料","ez":"老師沒預料到她的班級人數這麼多會出問題。"},{"w":"glimpse","p":"[glimps] v.","d":"To glimpse something is to see it for a short time.","e":"She glimpsed outside the window as the plane was about to land.","zh":"(名) 一瞥；匆匆一看　(動) 瞥見；匆匆看到","ez":"飛機即將降落時，她瞥了一眼窗外。"},{"w":"hoop","p":"[huːp] n.","d":"A hoop is a ring that is made of plastic, metal, or wood.","e":"The boys tried to toss the ball through the basketball hoop.","zh":"環；圈；半圈；圓形耳環","ez":"男孩們試著把球投進籃框。"},{"w":"misfortune","p":"[misˈfɔːrtʃən] n.","d":"Misfortune is bad luck or an unlucky event.","e":"His family helped him when he encountered misfortune.","zh":"(名) 不幸；厄運　(名) 災難；困難","ez":"他遇到不幸時，家人幫了他。"},{"w":"negative","p":"[ˈnegətiv] adj.","d":"When something is negative, it is unpleasant or sad.","e":"She doesn&rsquo;t like to say negative things about her friends.","zh":"(形) 否定的；消極的　(名) 否定；負面的事物","ez":"她不喜歡說朋友的壞話。"},{"w":"per","p":"[pər] prep.","d":"Per is used to mean “each” when giving a price, size, or amount.","e":"It costs $8 per person to watch the baseball game.","zh":"(介) 每；每一","ez":"看棒球賽每人要花八美元。"},{"w":"plead","p":"[pliːd] v.","d":"To plead is to ask for something you want very badly.","e":"He pleaded for his parents to let him go to the soccer game.","zh":"(動) 懇求；辯護","ez":"他懇求父母讓他去看足球賽。"},{"w":"rip","p":"[rip] v.","d":"To rip something means to pull it apart.","e":"She ripped the paper in half by accident.","zh":"(動) 撕；撕裂　(名) 裂口；撕裂處","ez":"她不小心把紙撕成兩半。"},{"w":"sake","p":"[seik] n.","d":"The sake of something is the reason for doing it.","e":"The parents worked hard for their children&rsquo;s sake.","zh":"(名) 目的；利益","ez":"父母為了孩子而努力工作。"},{"w":"scrape","p":"[skreip] v.","d":"To scrape something is to rub it very hard with something sharp.","e":"I accidentally scraped the paint off the side of the car.","zh":"(動) 刮除；擦掉","ez":"我不小心刮掉了車側的油漆。"},{"w":"source","p":"[sɔːrs] n.","d":"A source of something is the place that it comes from.","e":"The river was the source of drinking water for the village.","zh":"(名) 來源；出處","ez":"這條河是村莊飲用水的來源。"},{"w":"stern","p":"[stəːrn] adj.","d":"When somebody is stern, they are very serious.","e":"The stern teacher didn&rsquo;t allow the students to speak during class.","zh":"嚴厲的；苛刻的；嚴峻的；棘手的；船尾；艉","ez":"嚴格的老師不允許學生在課堂上講話。"},{"w":"stitch","p":"[stitʃ] v.","d":"To stitch is to use a needle and thread to join pieces of cloth together.","e":"My grandmother stitched the pieces together to make a big blanket.","zh":"(名) 一針；縫線　(動) 縫合；縫補","ez":"我奶奶把布片縫在一起，做成一條大毯子。"},{"w":"thump","p":"[θʌmp] n.","d":"A thump is the sound of a heavy object falling.","e":"They heard the thump when the bowling ball hit the floor.","zh":"嘭嘭敲打；使；砰然作響；重擊；捶擊；某人；頭痛欲裂；某人；心怦怦直跳；砰然落下；物體落下的聲音；重擊；捶擊","ez":"保齡球撞到地板時，他們聽到了砰的一聲。"},{"w":"vehement","p":"[ˈviːəmənt] adj.","d":"When somebody is vehement, they are angry and emotional.","e":"Gina was vehement when she found out that Liz was bad in school.","zh":"(形) 激烈的；強烈的","ez":"吉娜發現麗茲在學校表現不好時非常激動。"}]},{"id":17,"name":"Unit 17","words":[{"w":"civilization","p":"[sivəliˈzeiʃən] n.","d":"A civilization is an organized group of humans that have culture and government.","e":"Most early civilizations in Central America didn&rsquo;t use metal weapons.","zh":"(名) 文明；文化　(名) 開化；教化","ez":"中美洲大多數早期文明不使用金屬武器。"},{"w":"convenient","p":"[kənˈviːnjənt] adj.","d":"When something is convenient, it is easy to do and does not take a lot of work.","e":"The bus is a convenient way to get to school.","zh":"(形) 方便的；便利的　(形) 近便的；容易到達的","ez":"搭公車是上學的便利方式。"},{"w":"den","p":"[den] n.","d":"A den is a living space for some types of animals, such as lions.","e":"The mother lion left her babies in the den.","zh":"動物的；巢穴；窩；活動室；休閒室；簡易房；簡易棚；巢穴；老窩","ez":"母獅把寶寶留在巢穴裡。"},{"w":"dew","p":"[djuː] n.","d":"Dew is the drops of water that form on the ground outside during the night.","e":"When we woke up, we saw that the grass was covered in dew.","zh":"(名) 露水；露　(動) 凝結成露","ez":"我們醒來時，看到草地上覆蓋著露水。"},{"w":"drastic","p":"[ˈdræstik] adj.","d":"When something is drastic, it is extreme or major.","e":"She made a drastic decision to get her long hair cut short.","zh":"(形) 劇烈的；激進的　(形) 嚴厲的；極端的","ez":"她做了個重大決定，把長髮剪短。"},{"w":"exit","p":"[ˈegzit] v.","d":"To exit means to leave.","e":"The students exited through the front door.","zh":"(名) 出口；出去　(動) 離開；退出","ez":"學生們從前門離開。"},{"w":"flock","p":"[flɒk] n.","d":"A flock is a group of animals, such as birds, sheep or goats.","e":"There was one black sheep in the entire flock.","zh":"(名) 羊群；一大群　(動) 聚集；成群結隊","ez":"整群羊裡有一隻黑羊。"},{"w":"fold","p":"[fould] v.","d":"To fold is to bend something like paper or cloth so that it takes up less space.","e":"I folded the paper and put it in my pocket.","zh":"(動) 摺疊；對摺　(名) 褶皺；摺痕","ez":"我把紙折起來放進口袋。"},{"w":"lid","p":"[lid] n.","d":"A lid is a top for a box or container that can be removed.","e":"He lifted the lid of the box and revealed her present.","zh":"(名) 蓋子；蓋　(動) 用蓋子蓋住；覆蓋","ez":"他掀開盒蓋，露出送她的禮物。"},{"w":"loom","p":"[lu:m] v.","d":"To loom is to seem very large and often scary.","e":"The ominous clouds loomed over the school.","zh":"(動) 逼近；隱約出現　(名) 織布機","ez":"不祥的烏雲籠罩著學校。"},{"w":"mighty","p":"[ˈmaiti] adj.","d":"When something is mighty, it is strong and large.","e":"The mighty wrestler scared all who faced him.","zh":"(形) 強大的；有力的　(形) 巨大的；龐大的","ez":"強壯的摔角手嚇到了所有對手。"},{"w":"mushroom","p":"[ˈmʌʃru(:)m] n.","d":"A mushroom is a fungus with a round top. Some are used as food.","e":"The soup had fresh mushrooms in it.","zh":"(名) 蘑菇；菌類　(動) 迅速增長；蓬勃發展","ez":"湯裡有新鮮的蘑菇。"},{"w":"native","p":"[ˈneitiv] adj.","d":"When something is native, it is originating in a certain place or area.","e":"Avocadoes are native fruits of Mexico.","zh":"(形) 本地的；本國的　(名) 本地人；原住民","ez":"酪梨是墨西哥的原生水果。"},{"w":"poison","p":"[ˈpɔɪzən] n.","d":"Poison is a dangerous substance that causes illness or death.","e":"They used poison to get rid of the rats in their home.","zh":"(名) 毒藥；毒物　(動) 毒害；下毒","ez":"他們用毒藥消滅家中的老鼠。"},{"w":"reed","p":"[ri:d] n.","d":"Reeds are tall and skinny plants that grow in groups near water.","e":"The sun set behind the reeds of the lake&rsquo;s shore.","zh":"(名) 蘆葦；簧片","ez":"太陽落在湖岸的蘆葦後面。"},{"w":"shield","p":"[ʃiːld] v.","d":"To shield something is to protect it.","e":"She shielded her eyes from the sun with sunglasses.","zh":"(名) 盾牌；保護物　(動) 保護；遮擋","ez":"她用太陽眼鏡遮住眼睛防曬。"},{"w":"stormy","p":"[ˈstɔːrmi] adj.","d":"Stormy describes something affected or characterized by storms.","e":"The golfers decided to go home because of the stormy weather.","zh":"(形) 暴風雨的；激烈的","ez":"高爾夫球手因為暴風雨天氣決定回家。"},{"w":"sway","p":"[swei] v.","d":"To sway is to move slowly from side to side.","e":"She swayed while she listened to the music.","zh":"(動) 搖晃；影響　(名) 搖擺；影響力","ez":"她聽音樂時輕輕搖擺。"},{"w":"urban","p":"[ˈəːrbən] adj.","d":"When something is urban, it is related to the city.","e":"Subways are an important form of urban transportation.","zh":"(形) 都市的；城市的","ez":"地鐵是城市交通的重要形式。"},{"w":"wade","p":"[weid] v.","d":"To wade is to walk in or pass through water.","e":"The child waded in the water at the beach.","zh":"(動) 涉水；跋涉","ez":"小孩在海灘的水中涉水。"}]},{"id":18,"name":"Unit 18","words":[{"w":"accent","p":"[ˈæksənt] n.","d":"An accent is a certain way of speaking that shows where a person is from.","e":"The new teacher&rsquo;s accent was clearly a German one.","zh":"(名) [ˈæksɛnt] 口音；腔調　(動) [ækˈsɛnt] 強調；使突出","ez":"新老師的口音明顯是德國腔。"},{"w":"barber","p":"[ˈbɑːrbər] n.","d":"A barber is a person whose job is to cut hair.","e":"My hair is getting much too long. I&rsquo;d better go to the barber&rsquo;s shop.","zh":"(名) 理髮師；男理髮店","ez":"我的頭髮太長了，最好去理髮店。"},{"w":"basement","p":"[ˈbeismənt] n.","d":"A basement of a house or building is a room that is built underground.","e":"They turned their basement into a game room.","zh":"(名) 地下室；地窖","ez":"他們把地下室改造成遊戲間。"},{"w":"blank","p":"[blæŋk] adj.","d":"When something is blank, it does not have anything on it.","e":"She got a blank paper to draw on.","zh":"(形) 空白的；無字跡的　(名) 空白；空白處　(動) 忘記；(記憶)一片空白","ez":"她拿了一張白紙來畫畫。"},{"w":"blink","p":"[blɪŋk] v.","d":"To blink means to shut the eyes and quickly open them again.","e":"I blinked many times so that my eyes could adjust to the bright light.","zh":"(動) 眨眼；閃爍　(名) 眨眼；一瞬間","ez":"我眨了好幾次眼，讓眼睛適應強光。"},{"w":"choir","p":"[ˈkwaɪər] n.","d":"A choir is a group of people who sing together.","e":"He had choir practice every day after school.","zh":"(名) 合唱團；唱詩班","ez":"他每天放學後都有合唱團練習。"},{"w":"comic","p":"[ˈkɒmik] adj.","d":"When something is comic, it is funny.","e":"The comic actor was famous for his jokes.","zh":"(形) 滑稽的；好笑的　(名) 漫畫；喜劇演員","ez":"這位喜劇演員以他的笑話聞名。"},{"w":"complicate","p":"[ˈkɒmplikeit] v.","d":"To complicate something means to make it harder than necessary.","e":"The bad weather complicated finishing the job quickly.","zh":"(動) 使複雜；使難以理解　(形) 複雜的；難懂的","ez":"惡劣天氣讓完成工作變得複雜。"},{"w":"decline","p":"[diˈklain] v.","d":"To decline an offer or invitation means to say no to it.","e":"She declined his offer to pay for her dinner.","zh":"(動) 拒絕；婉言謝絕　(動) 下降；衰退　(名) 衰落；下降","ez":"她婉拒了他要幫她付晚餐的提議。"},{"w":"errand","p":"[ˈerənd] n.","d":"An errand is a trip taken to do a specific activity.","e":"He couldn&rsquo;t go to practice because he had several errands to do.","zh":"(名) 差事；跑腿　(動) 跑腿；辦差","ez":"他因為有幾件差事要辦，所以無法去練習。"},{"w":"glove","p":"[glʌv] n.","d":"A glove is a piece of clothing that covers your fingers and hand.","e":"When it gets cold, I always put on a pair of gloves.","zh":"(名) 手套　(動) 戴手套；用手套覆蓋","ez":"天氣變冷的時候，我都會戴手套。"},{"w":"hermit","p":"[ˈhəːrmit] n.","d":"A hermit is one who lives alone and does not spend time with others.","e":"The hermit lived a simple life in a small cave in the forest.","zh":"(名) 隱士；隱居者　(名) 隱居修士","ez":"那位隱士住在森林裡一個小洞穴中，過著簡樸的生活。"},{"w":"justly","p":"[ˈdʒʌstli] adv.","d":"If something is done justly, then it is fair.","e":"We justly decided to give the prize to him.","zh":"公正地；公平地；正義地","ez":"我們公正地決定把獎品給他。"},{"w":"leather","p":"[ˈleðə:r] n.","d":"Leather is a material made from animal skin that is used to make clothing.","e":"He got a new leather jacket for his birthday.","zh":"(名) 皮革；皮革製品　(形) 皮革的；用皮革製成的","ez":"他生日時得到一件新的皮夾克。"},{"w":"ponder","p":"[ˈpɒndər] v.","d":"To ponder something is to think about it carefully.","e":"She sat in the park and pondered her problem.","zh":"(動) 沉思；仔細考慮","ez":"她坐在公園裡思考自己的問題。"},{"w":"reserve","p":"[riˈzəːrv] v.","d":"To reserve something means to keep it for a certain person or time.","e":"He reserved a table at the busy restaurant.","zh":"(動) 預訂；保留　(名) 儲備；保留區","ez":"他在那間熱門的餐廳訂了位。"},{"w":"script","p":"[skript] n.","d":"A script is the words of a film or play.","e":"He read the script of the play three times.","zh":"(名) 劇本；手稿　(動) 編寫腳本","ez":"他把劇本讀了三遍。"},{"w":"search","p":"[səːrtʃ] v.","d":"To search for something or someone means to look for them carefully.","e":"I searched the newspaper for a new job.","zh":"(動) 搜尋；搜查　(名) 搜索；搜尋","ez":"我在報紙上找工作。"},{"w":"slam","p":"[slæm] v.","d":"To slam is to close something hard.","e":"She slammed the book shut after she finished reading it.","zh":"(動) 砰地關上；猛擊","ez":"她讀完書後砰地一聲把書闔上。"},{"w":"staircase","p":"[ˈstɛərkeɪs] n.","d":"A staircase is a set of stairs found inside a building.","e":"The staircase leads directly into the kitchen.","zh":"(名) 樓梯；階梯","ez":"樓梯直接通往廚房。"}]},{"id":19,"name":"Unit 19","words":[{"w":"afflicted","p":"[əˈfliktid] adj.","d":"Afflicted means to suffer physically or mentally.","e":"He was afflicted by pain in his right arm.","zh":"使痛苦；使苦惱；折磨","ez":"他的右臂受到疼痛的折磨。"},{"w":"aisle","p":"[ail] n.","d":"An aisle is a space between two things that people use to walk.","e":"They were told to clear the aisle because the plane was about to land.","zh":"(名) 走廊；通道　(名) 飛機座位之間的通路","ez":"他們被告知要清空走道，因為飛機即將降落。"},{"w":"atmosphere","p":"[ˈætməsfiər] n.","d":"The atmosphere is the air around the Earth where weather conditions form.","e":"Scientists worry that harmful substances are hurting the atmosphere.","zh":"(名) 大氣；氛圍　(名) 氣氛；環境","ez":"科學家擔心有害物質正在傷害大氣層。"},{"w":"author","p":"[ˈɔːθər] n.","d":"An author is a person who wrote a certain piece of writing.","e":"The author was hard at work on his next novel.","zh":"(名) 作者；作家　(動) 創作；著述","ez":"那位作者正忙於創作他的下一本小說。"},{"w":"breakdown","p":"[ˈbreɪkdaun] n.","d":"A breakdown is a failure to work correctly.","e":"Her car had a breakdown, and she wasn&rsquo;t sure how to fix it.","zh":"(名) 故障；崩潰　(動) 分解；發生故障","ez":"她的車拋錨了，她不確定該怎麼修理。"},{"w":"cargo","p":"[ˈkɑːrgəu] n.","d":"Cargo is the items carried by a ship or airplane.","e":"The cargo of the ship got wet when it started raining.","zh":"(名) 貨物；貨運　(名) 船貨；運送的物品","ez":"船上的貨物因為開始下雨而淋濕了。"},{"w":"chapter","p":"[ˈtʃæptər] n.","d":"A chapter is a part of a book that usually has a number or a title.","e":"The first chapter of a book usually introduces the main character of a story.","zh":"(名) 章；章節　(名) (書籍或歷史的)部分；時期","ez":"書的第一章通常會介紹故事的主角。"},{"w":"connect","p":"[kəˈnekt] v.","d":"To connect two things means to join them together.","e":"I connected the mouse to my laptop computer.","zh":"(動) 連接；接上　連結；聯繫","ez":"我把滑鼠連接到筆記型電腦上。"},{"w":"etc.","p":"[etsetərə] n.","d":"Etc. is short for “etcetera.” It is used to refer to other unspecified objects.","e":"She was going to bring treats to the party: cookies, muffins, cake, etc.","zh":"(縮) 等等；及其他　(片) 諸如此類","ez":"她打算帶點心去派對：餅乾、馬芬、蛋糕等等。"},{"w":"flip","p":"[flip] v.","d":"To flip means to press a switch quickly to turn it on or off.","e":"To turn on the lights, just flip this switch.","zh":"(動) 翻轉；翻動　(動) 快速切換；按動開關","ez":"要開燈的話，只要撥動這個開關就行了。"},{"w":"idle","p":"[ˈaidl] adj.","d":"If you are idle, you are not doing anything.","e":"She read a book to keep from being idle.","zh":"(形) 閒散的；懶惰的　(動) 閒置；虛度","ez":"她看書以免無所事事。"},{"w":"notify","p":"[ˈnoutəfai] v.","d":"To notify someone of something is to tell them about it.","e":"The teacher notified us about a change to our assignment.","zh":"(動) 通知；告知　(動) 報告；宣布","ez":"老師通知我們作業有變動。"},{"w":"pea","p":"[pi:] n.","d":"Peas are a vegetable that is small, round and green.","e":"His favorite food was peas.","zh":"(名) 豌豆","ez":"他最喜歡的食物是豌豆。"},{"w":"raisin","p":"[ˈreizən] n.","d":"A raisin is a dried grape.","e":"Raisins are one of my favorite snacks.","zh":"(名) 葡萄乾","ez":"葡萄乾是我最喜歡的零食之一。"},{"w":"retain","p":"[riˈtein] v.","d":"To retain something is to keep it.","e":"Even by the afternoon, the day had retained the morning&rsquo;s freshness.","zh":"(動) 保留；記住","ez":"即使到了下午，那天依然保留著早晨的新鮮感。"},{"w":"state","p":"[steit] v.","d":"To state something means to say it in a definite way.","e":"The president stated his opinion about the world&rsquo;s health concerns.","zh":"(名) 狀態；州　(動) 陳述；說明","ez":"總統就全球健康問題發表了他的看法。"},{"w":"tray","p":"[trei] n.","d":"A tray is a flat plate used to hold food.","e":"The waiter brought our food on a tray.","zh":"(名) 托盤；盤子","ez":"服務生用托盤把我們的餐點送上來。"},{"w":"unfortunate","p":"[ʌnˈfɔːrtʃənɪt] adj.","d":"If something is unfortunate, it is bad or unlucky.","e":"It was unfortunate that Dave&rsquo;s team lost, but he still had fun.","zh":"(形) 不幸的；令人遺憾的","ez":"很不幸戴夫的隊伍輸了，但他還是玩得很開心。"},{"w":"vivid","p":"[vivid] adj.","d":"When something is vivid, it is bright and colorful.","e":"The figures in the painting were vivid.","zh":"(形) 生動的；鮮明的","ez":"畫中的人物栩栩如生。"},{"w":"vomit","p":"[ˈvɒmit] v.","d":"To vomit means to have food come up from one’s stomach.","e":"It is common for women to vomit when they are pregnant.","zh":"(動) 嘔吐　(名) 嘔吐物","ez":"女性懷孕時嘔吐是很常見的。"}]},{"id":20,"name":"Unit 20","words":[{"w":"betray","p":"[biˈtrei] v.","d":"To betray someone means to treat them in a dishonest way.","e":"The man betrayed his country when he gave away national secrets.","zh":"(動) 背叛；洩露　(動) 暴露；顯露","ez":"那個男人洩漏國家機密，背叛了他的國家。"},{"w":"blast","p":"[blæst] n.","d":"A blast is a loud noise made by something that explodes.","e":"There was a loud blast when the police officer fired the gun.","zh":"(名) 爆炸；氣流　(動) 炸毀；破壞　(片) 太棒了","ez":"警察開槍時發出一聲巨響。"},{"w":"bracelet","p":"[ˈbreislit] n.","d":"A bracelet is a piece of jewelry that you wear around your wrist.","e":"My father gave me a pretty gold bracelet for my birthday.","zh":"(名) 手鐲；手環","ez":"我父親送我一條漂亮的金手鍊當生日禮物。"},{"w":"cease","p":"[siːs] v.","d":"To cease means to stop.","e":"After about an hour, the rain ceased, and a rainbow appeared.","zh":"(動) 停止；終止　(名) 停止；終結","ez":"大約一小時後，雨停了，彩虹出現了。"},{"w":"choke","p":"[tʃouk] v.","d":"To choke means to cough because you have difficulty breathing.","e":"There was a lot of smoke in the air, and it made me choke.","zh":"(動) 窒息；哽咽　(動) 使無法呼吸","ez":"空氣中有很多煙，嗆得我喘不過氣。"},{"w":"civil","p":"[ˈsivəl] adj.","d":"When an event is civil, it happens inside a country.","e":"The country was torn apart by a terrible civil war.","zh":"(形) 公民的；民間的　(形) 有禮貌的；溫文儒雅的","ez":"這個國家因為一場可怕的內戰而四分五裂。"},{"w":"comment","p":"[ˈkɒment] v.","d":"To comment means to say something that shows your personal opinion.","e":"Tom commented on the poor quality of the food.","zh":"(名) 評論；意見　(動) 評論；發表意見","ez":"湯姆評論了食物的品質很差。"},{"w":"cross","p":"[krɔ:s] v.","d":"To cross means to go from one side to the other side.","e":"We used his boat to cross to the other side of the lake.","zh":"(動) 穿過；通過　(形) 生氣的；不悅的　(名) 十字；交叉","ez":"我們用他的船渡到湖的另一邊。"},{"w":"dent","p":"[dent] n.","d":"A dent is damage caused by something heavy hitting something else.","e":"That blue car hit my car, and now there is a small dent in my car door.","zh":"(名) 凹痕；凹陷　(動) 使凹陷；損害","ez":"那輛藍色的車撞到我的車，現在我的車門上有個小凹痕。"},{"w":"distrust","p":"[disˈtrʌst] v.","d":"To distrust someone means to believe that they are not honest.","e":"Don&rsquo;t lend money to someone if you distrust them!","zh":"(動) 不信任；懷疑　(名) 不信任；懷疑","ez":"如果你不信任某人，就不要借錢給他！"},{"w":"fort","p":"[fɔːrt] n.","d":"A fort is a small building that is specially built to defend an area from attack.","e":"When the army arrived, they built a big fort on the top of the hill.","zh":"(名) 堡壘；要塞　(動) 加強；防禦","ez":"軍隊抵達後，在山頂上建造了一座大堡壘。"},{"w":"found","p":"[faund] v.","d":"To found means to bring something into existence.","e":"The pastor founded his church in the countryside.","zh":"(動) 創辦；建立　(動) 發現；找到","ez":"那位牧師在鄉下創立了他的教會。"},{"w":"lining","p":"[ˈlainiŋ] n.","d":"Lining is a piece of cloth that covers the inside of clothes.","e":"This jacket is very warm because it has a thick lining.","zh":"(名) 襯裡；內襯　(名) 襯墊物；保護層","ez":"這件夾克很保暖，因為內襯很厚。"},{"w":"mass","p":"[mæs] n.","d":"A mass is a large number of things of one type.","e":"We received a mass of letters this morning.","zh":"(名) 大量；群眾　(形) 大規模的；廣泛的","ez":"我們今天早上收到一大堆信件。"},{"w":"pray","p":"[prei] v.","d":"To pray means to talk to God.","e":"When people go to church, they pray for their families and friends.","zh":"(動) 祈禱；祈求","ez":"人們去教堂時，會為家人和朋友祈禱。"},{"w":"rife","p":"[raif] adj.","d":"If a place is rife with something bad, it is very common in that place.","e":"This part of the country is rife with disease.","zh":"盛行的；流行的；普遍的","ez":"這個國家的這個地區疾病盛行。"},{"w":"sole","p":"[soul] adj.","d":"When something is the sole thing, it is the only thing of a particular type.","e":"His sole purpose in life was to help others.","zh":"(形) 唯一的；單獨的　(名) 腳底；鞋底","ez":"他人生唯一的目標就是幫助別人。"},{"w":"sweep","p":"[swiːp] v.","d":"If you sweep the floor, you clean it with a tool like a broom or a brush.","e":"There is a lot of dirt on the floor. Can you sweep it please?","zh":"(動) 打掃；掃除","ez":"地板很髒。可以請你掃一下嗎？"},{"w":"treachery","p":"[ˈtretʃəri] n.","d":"Treachery is a behavior in which a person betrays a country or a person.","e":"The man ran away to escape from the treachery of his wife.","zh":"背叛；背信棄義","ez":"那個男人逃跑，以逃離他妻子的背叛。"},{"w":"tuck","p":"[tʌk] v.","d":"To tuck something means to put it somewhere so that it is neat or safe.","e":"He looked sloppy without his shirt being tucked into his pants.","zh":"(動) 塞進；捲起","ez":"他沒把襯衫紮進褲子裡，看起來很邋遢。"}]},{"id":21,"name":"Unit 21","words":[{"w":"background","p":"[ˈbækgraund] n.","d":"A background is a person’s education, family, and experience.","e":"The new teacher had a background in science and math.","zh":"(名) 背景；背景資訊　(名) 教育背景；家庭背景","ez":"新來的老師有科學和數學的背景。"},{"w":"bait","p":"[beit] n.","d":"Bait is something used to trick a person or thing to do something.","e":"The best bait for catching fish is a big, fat worm.","zh":"(名) 餌；誘餌　(動) 用餌引誘；激怒","ez":"釣魚最好的餌是一條又大又肥的蟲子。"},{"w":"chronicle","p":"[ˈkrɒnikl] v.","d":"To chronicle something means to record an event or speech.","e":"The daily newspaper chronicles local and world events.","zh":"(名) 編年史；歷史記錄　(動) 記錄；詳細記述","ez":"日報記錄了本地和世界的事件。"},{"w":"copper","p":"[ˈkɒpər] n.","d":"Copper is a red-brown metal often used in electric wire and pipes.","e":"Ancient hunters melted copper to make knives and spears.","zh":"(名) 銅；銅幣　(形) 銅色的；紅銅色的","ez":"古代獵人熔化銅來製作刀和矛。"},{"w":"disease","p":"[diˈziːz] n.","d":"A disease is an illness that causes specific problems.","e":"He had a disease that caused him to lose his hearing.","zh":"(名) 疾病；病　(動) 使患病；使衰退","ez":"他得了一種病，導致他失去聽力。"},{"w":"folklore","p":"[ˈfouklɔːr] n.","d":"Folklore is the collection of beliefs and stories of a culture.","e":"India&rsquo;s folklore has stories written in long poems about great warriors.","zh":"(名) 民間故事；民俗傳說　(名) 民間文化；傳統知識","ez":"印度的民間傳說中有關於偉大戰士的長篇詩歌故事。"},{"w":"infect","p":"[inˈfekt] v.","d":"To infect someone means to give them an illness.","e":"The common cold infects hundreds of millions of people each year.","zh":"(動) 使感染；傳染　(名) 感染","ez":"普通感冒每年感染數億人。"},{"w":"itch","p":"[itʃ] v.","d":"To itch means to rub the skin with your fingernails.","e":"The rough fabric in his shirt made the back of his neck itch.","zh":"(名) 癢；搔癢感　(動) 發癢；使發癢　(形) 發癢的；想要做的","ez":"他襯衫的粗糙布料讓他脖子後面發癢。"},{"w":"literature","p":"[ˈlitərətʃər] n.","d":"Literature is books, plays, and poetry.","e":"Early American literature covers the poetry and stories from 1500 to 1800.","zh":"(名) 文學；文學作品　(名) 文獻；印刷品","ez":"早期美國文學涵蓋了1500年到1800年的詩歌和故事。"},{"w":"millennium","p":"[miˈleniəm] n.","d":"A millennium is one thousand years.","e":"Stonehenge is believed to have been built about 5 millenniums ago.","zh":"(名) 千年；千年期","ez":"巨石陣被認為是大約五千年前建造的。"},{"w":"myth","p":"[miθ] n.","d":"A myth is a traditional story that explains a culture’s history and beliefs.","e":"In Greece, there was a myth about a woman who had snakes for hair.","zh":"(名) 神話；傳說　(名) 虛假的信念；謊言","ez":"在希臘，有一個關於頭髮是蛇的女人的神話。"},{"w":"relate","p":"[riˈleit] v.","d":"To relate to something means to have a connection with it.","e":"A company&rsquo;s plan usually relates to how much profit it can make.","zh":"(動) 與...有關；敘述；建立關係","ez":"公司的計劃通常與它能賺多少利潤有關。"},{"w":"religion","p":"[riˈlidʒən] n.","d":"A religion is a belief in a god or gods.","e":"Their religion taught that people should forgive their enemies.","zh":"(名) 宗教；宗教信仰","ez":"他們的宗教教導人們應該原諒敵人。"},{"w":"sum","p":"[sʌm] n.","d":"A sum is a specific amount of money.","e":"He calculated the numbers to see what the sum of his bills would be.","zh":"(名) 總數；金額　(動) 總結；合計","ez":"他計算了數字，看看他的帳單總額是多少。"},{"w":"teller","p":"[ˈtelə:r] n.","d":"A teller is a person who works with a bank’s customers.","e":"The teller at the bank helped Kelly put money into a savings account.","zh":"(名) 出納員；講述者","ez":"銀行的櫃員幫凱莉把錢存入儲蓄帳戶。"},{"w":"trustworthy","p":"[ˈtrʌstˌwəːrði] adj.","d":"If someone is trustworthy, they are honest and truthful.","e":"Mary is one of the most trustworthy people I&rsquo;ve ever met.","zh":"(形) 值得信賴的；可靠的","ez":"瑪麗是我見過最值得信賴的人之一。"},{"w":"update","p":"[ʌpˈdeit] v.","d":"To update something means to make it more modern.","e":"We need to update the programs on our computers.","zh":"(動) [ʌp'det] 更新；使現代化　(名) ['ʌp.det] 更新；最新消息","ez":"我們需要更新電腦上的程式。"},{"w":"vein","p":"[vein] n.","d":"A vein is a tube in the body that carries blood toward the heart.","e":"The blue veins in my hand are just under my skin.","zh":"(名) 血管；脈；礦脈；葉脈","ez":"我手上的藍色靜脈就在皮膚下面。"},{"w":"venom","p":"[ˈvenəm] n.","d":"Venom is a poisonous substance that comes from animals or plants.","e":"A snake&rsquo;s venom can be used to cure the illnesses it creates.","zh":"(名) 毒液；惡意","ez":"蛇的毒液可以用來治療它引起的疾病。"},{"w":"promote","p":"[prəˈmout] v.","d":"To promote someone means to raise them to a higher position or rank.","e":"After two years in the company, she was promoted to a manager.","zh":"(動) 促進；推銷","ez":"在公司兩年後，她被晉升為經理。"}]},{"id":22,"name":"Unit 22","words":[{"w":"charity","p":"[ˈtʃӕrəti] n.","d":"Charity is an act of giving help, usually money, to those who need it.","e":"Thanks to his friends&rsquo; charity, he had enough money to pay the rent.","zh":"(名) 慈善；慈善機構　(名) 仁慈；寬容","ez":"多虧了朋友的慈善捐助，他有足夠的錢付房租。"},{"w":"commerce","p":"[ˈkɒmərs] n.","d":"Commerce is the activity of buying and selling things.","e":"The new shopping mall increased the commerce in that section of town.","zh":"(名) 商業；貿易　(名) 商務；商品買賣","ez":"新的購物中心增加了該地區的商業活動。"},{"w":"condemn","p":"[kənˈdem] v.","d":"To condemn someone means to give them a specific punishment.","e":"The judge condemned the criminal to five years in prison.","zh":"(動) 譴責；批評　(動) 判刑；定罪","ez":"法官判處罪犯五年監禁。"},{"w":"cozy","p":"[ˈkouzi] adj.","d":"If something is cozy, then it is comfortable, warm, and relaxing.","e":"The thick blanket made the bed very cozy.","zh":"(形) 舒適的；溫暖舒適的　(形) 親切的；親密的","ez":"厚厚的毯子讓床非常舒適。"},{"w":"deplete","p":"[diˈpliːt] v.","d":"To deplete an amount of something means to use up all of it.","e":"All the driving he was doing was depleting his car&rsquo;s fuel supply.","zh":"(動) 耗盡；用完　枯竭；減少","ez":"他開車太多，正在耗盡汽車的燃料。"},{"w":"economy","p":"[iˈkɒnəmi] n.","d":"An economy is the money and businesses of a country or region.","e":"The factory was good for the economy because it brought jobs to the area.","zh":"(名) 經濟；節約　(形) 經濟的；省錢的","ez":"這家工廠對經濟有好處，因為它為該地區帶來了工作機會。"},{"w":"empire","p":"[ˈempaɪər] n.","d":"An empire is a large group of countries ruled by an emperor or empress.","e":"The emperor built roads to make travel easier throughout the empire.","zh":"(名) 帝國；帝制　(名) 權力大的企業或組織","ez":"皇帝修建道路，讓整個帝國的旅行更方便。"},{"w":"goods","p":"[gudz] n.","d":"Goods are anything that can be bought or sold.","e":"Shoes, hats, dresses and purses were the goods she wanted to buy.","zh":"(名) 商品；貨物　(名) 物品；財產","ez":"鞋子、帽子、裙子和手提包是她想買的商品。"},{"w":"heed","p":"[hiːd] v.","d":"To heed something means to obey or follow it.","e":"You should heed the advice on the sign and not drive so fast.","zh":"(動) 注意；理會　(動) 遵守；聽從","ez":"你應該聽從標誌上的建議，不要開那麼快。"},{"w":"hitchhike","p":"[ˈhitʃhaik] v.","d":"To hitchhike means to travel by asking for rides from passing vehicles.","e":"She didn&rsquo;t have a car, so she hitchhiked several miles to her brother&rsquo;s home.","zh":"免費搭車旅行","ez":"她沒有車，所以搭便車走了好幾英里去她哥哥家。"},{"w":"mock","p":"[mɒk] v.","d":"To mock someone means to tease them in a cruel way.","e":"The girls mocked Nancy because she was a new student.","zh":"(動) 嘲笑；模仿　(形) 假的；虛假的","ez":"女孩們嘲笑南希，因為她是新來的學生。"},{"w":"neutral","p":"[ˈnjuːtrəl] adj.","d":"If someone is neutral, then they do not help either of the two fighting sides.","e":"The girl&rsquo;s friend remained neutral while the couple was arguing.","zh":"(形) 中立的；不偏不倚　(形) 中性的；無色的","ez":"這對情侶爭吵時，女孩的朋友保持中立。"},{"w":"persecute","p":"[ˈpəːrsikjuːt] v.","d":"To persecute means to treat someone badly.","e":"Dan felt persecuted because he was smaller than the other boys at school.","zh":"(動) 迫害；虐待","ez":"丹覺得自己受到迫害，因為他比學校裡其他男孩矮小。"},{"w":"pity","p":"[ˈpiti] n.","d":"Pity is the feeling of sadness and kindness for those who are suffering.","e":"Because she had pity for the lost boy, she helped him find his parents.","zh":"(名) 可惜；遺憾　(動) 同情；憐憫","ez":"因為她同情迷路的男孩，所以幫他找到了父母。"},{"w":"reduce","p":"[riˈdjuːs] v.","d":"To reduce something means to make it less in size or number.","e":"When the store reduced its prices, people wanted to shop there.","zh":"(動) 減少；降低","ez":"當商店降價時，人們想去那裡購物。"},{"w":"scribe","p":"[skraib] n.","d":"A scribe was a person whose job was to copy written works.","e":"In Ancient Egypt, scribes recorded important events.","zh":"抄書吏；抄寫員；法學家","ez":"在古埃及，抄寫員記錄了重要事件。"},{"w":"temper","p":"[ˈtempə:r] n.","d":"A temper is someone’s mood or a chance that they might get angry.","e":"She has a temper. Even the slightest mistakes make her angry.","zh":"(名) 脾氣；性情　(動) 使回火；調和","ez":"她脾氣不好，即使是最小的錯誤也會讓她生氣。"},{"w":"throne","p":"[θroun] n.","d":"A throne is the special chair in which a ruler sits.","e":"Nobody except the king and queen sat in the thrones in the great hall.","zh":"(名) 王位；寶座","ez":"除了國王和王后，沒有人坐在大廳的寶座上。"},{"w":"unity","p":"[ˈjuːnəti] n.","d":"Unity is the state of people working together for a certain purpose.","e":"The project was finished early, thanks to the unity of the workers.","zh":"(名) 團結；統一","ez":"由於工人的團結，項目提前完成了。"},{"w":"victor","p":"[ˈviktər] n.","d":"A victor is a group or person that wins in a contest.","e":"At the end of the game, the blue team was the victor.","zh":"(名) 勝利者；優勝者","ez":"比賽結束時，藍隊是勝利者。"}]},{"id":23,"name":"Unit 23","words":[{"w":"accurate","p":"[ˈækjərit] adj.","d":"If something is accurate, it is completely correct.","e":"The story in the newspaper wasn&rsquo;t very accurate.","zh":"(形) 準確的；精確的","ez":"報紙上的報導不太準確。"},{"w":"analyze","p":"[ˈænəlaiz] v.","d":"To analyze something is to study it.","e":"The scientist will analyze the blood sample.","zh":"(動) 分析；解析　(動) 研究；檢查","ez":"科學家將分析血液樣本。"},{"w":"asteroid","p":"[ˈæstərɔɪd] n.","d":"An asteroid is a giant rock from outer space.","e":"In 1908, a giant asteroid hit Siberia.","zh":"小行星","ez":"1908年，一顆巨大的小行星撞擊了西伯利亞。"},{"w":"controversy","p":"[kɒnˈtrəvə:rsɪ] n.","d":"A controversy is a dispute about something that affects many people.","e":"There has been a lot of controversy over the judge&rsquo;s decision.","zh":"(名) 爭議；爭論　(形) 有爭議的；引起爭論的","ez":"關於法官的判決有很多爭議。"},{"w":"evolve","p":"[iˈvɒlv] v.","d":"To evolve is to change over time.","e":"Many people think that humans evolved from animals.","zh":"(動) 進化；演變　(動) 發展；逐漸形成","ez":"很多人認為人類是從動物演化而來的。"},{"w":"factor","p":"[ˈfæktər] n.","d":"A factor is something that has an effect on the way another thing happens.","e":"Smoking is the main factor that causes lung cancer.","zh":"(名) 因素；要素　(動) 是...的因素；影響","ez":"吸煙是導致肺癌的主要因素。"},{"w":"genetic","p":"[dʒiˈnetik] adj.","d":"If something is genetic, it is related to the genes in one’s body.","e":"The color of one&rsquo;s eyes is genetic.","zh":"(形) 遺傳的；基因的　(形) 與生俱來的；天生的","ez":"一個人的眼睛顏色是遺傳的。"},{"w":"genome","p":"[ˈdʒiːnoum] n.","d":"A genome is the collection of all the genes in a living thing.","e":"Understanding the human genome may help cure many diseases.","zh":"基因組；染色體組","ez":"了解人類基因組可能有助於治療許多疾病。"},{"w":"identical","p":"[aiˈdentikəl] adj.","d":"To be identical is to be the same as someone or something else.","e":"James and John are identical twins.","zh":"(形) 完全相同的；一模一样的　(形) 同一的；同一个的","ez":"詹姆斯和約翰是長得一模一樣的雙胞胎。"},{"w":"intellectual","p":"[ˌɪntəˈlektjuəl] n.","d":"An intellectual is a very smart person.","e":"We&rsquo;ve always considered my Uncle Max the intellectual of the family.","zh":"(形) 聰慧的；智慧的　(名) 知識份子；聰慧的人","ez":"我們一直認為馬克斯叔叔是我們家最有學問的人。"},{"w":"majority","p":"[məˈdʒɔ(:)rətɪ] n.","d":"A majority of something is almost all of the people or things in that group.","e":"A majority of the people voted for Tom Smith in the election.","zh":"(名) 多數；大多數　(名) 成年；法定年齡","ez":"大部分人在選舉中投票給湯姆·史密斯。"},{"w":"mammal","p":"[ˈmæməl] n.","d":"A mammal is an animal that usually has hair and is not born from an egg.","e":"Even though it lives in the water, whales are actually mammals.","zh":"(名) 哺乳動物；有奶腺的動物","ez":"雖然鯨魚生活在水中，但其實是哺乳動物。"},{"w":"multiply","p":"[ˈmʌltəplai] v.","d":"To multiply is to increase in number.","e":"In the past year, the number of people at work multiplied by ten percent.","zh":"(動) 乘以；相乘　(動) 增加；繁殖","ez":"過去一年，工作人數增加了百分之十。"},{"w":"offspring","p":"[ˈɔ:fspriŋ] n.","d":"Offspring are the children of a person or the babies of an animal.","e":"The dog&rsquo;s offspring had the same color of fur as she did.","zh":"(名) 後代；子孫　(名) 子女；產物","ez":"那隻狗的後代毛色和牠一樣。"},{"w":"pesticide","p":"[ˈpestəsaid] n.","d":"A pesticide is a substance used to kill insects.","e":"The farmer sprayed his crops with a pesticide to keep bugs away.","zh":"(名) 農藥；殺蟲劑","ez":"農夫在作物上噴灑農藥以防蟲害。"},{"w":"regulate","p":"[ˈregjəleit] v.","d":"To regulate something is to control how it happens.","e":"The bank regulates how much money people can borrow from it.","zh":"(動) 調節；管理","ez":"銀行會規範人們可以向它借多少錢。"},{"w":"reinforce","p":"[riːinˈfoːrs] v.","d":"To reinforce something is to make it stronger.","e":"Peter reinforced his opinion with information from a book.","zh":"(動) 加強；增援","ez":"彼得用一本書的資訊來強化他的觀點。"},{"w":"stricken","p":"[ˈstrikən] adj.","d":"If one is stricken by a disease or problem, they are badly affected by it.","e":"Mike was stricken with a horrible illness.","zh":"受嚴重侵害的；遭受重創的","ez":"麥克罹患了一種可怕的疾病。"},{"w":"vast","p":"[væst] adj.","d":"If something is vast, it is very large.","e":"The wealthy man bought a vast amount of land in the countryside.","zh":"(形) 廣闊的；巨大的","ez":"那位富人在鄉下買了一大片土地。"},{"w":"vegetarian","p":"[ˌvedʒəˈtɛəriən] n.","d":"A vegetarian is someone who does not eat any meat products.","e":"I became a vegetarian because I don&rsquo;t like the taste of meat.","zh":"(名) 素食主義者；(形) 素食的","ez":"我成為素食者，因為我不喜歡肉的味道。"}]},{"id":24,"name":"Unit 24","words":[{"w":"cherish","p":"[ˈtʃeriʃ] v.","d":"To cherish something means to hold it as very important.","e":"I cherish this trophy I won.","zh":"(動) 珍惜；重視　(動) 懷念；深深喜愛","ez":"我很珍惜贏得的這個獎盃。"},{"w":"compassion","p":"[kəmˈpæʃən] n.","d":"Compassion is a feeling of understanding for someone who is hurt or suffering.","e":"The veterinarian had compassion for the sick little puppy.","zh":"(名) 同情心；憐憫　(動) 同情；憐憫","ez":"獸醫對那隻生病的小狗充滿同情。"},{"w":"consent","p":"[kənˈsent] n.","d":"Consent is permission to do something.","e":"Their mother gave the children consent to go outside and play.","zh":"(名) 同意；許可　(動) 同意；贊成","ez":"母親允許孩子們到外面玩耍。"},{"w":"core","p":"[kɔːr] n.","d":"The core is the center of something.","e":"The rings of a tree start forming at its core.","zh":"(名) 核心；中心　(動) 去除果核","ez":"樹木的年輪從樹心開始形成。"},{"w":"cunning","p":"[ˈkʌniŋ] adj.","d":"If someone is cunning, they are good at tricking people.","e":"The cunning child fooled his parents into thinking that he was kind.","zh":"(形) 狡猾的；精明的　(名) 狡詐；詭計","ez":"那個狡猾的孩子騙父母，讓他們以為他很善良。"},{"w":"dizzy","p":"[ˈdizi] adj.","d":"If someone is dizzy, then they feel off balance as if they will fall down.","e":"The pregnant woman was dizzy after standing up too quickly.","zh":"(形) 頭暈的；眩暈的　(形) 使人困惑的；令人眼花的","ez":"那位孕婦站起來太快，感到頭暈。"},{"w":"equilibrium","p":"[iːkwəˈlibriəm] n.","d":"Equilibrium is the balance between different forces.","e":"The sudden drop in prices upset the equilibrium of the economy.","zh":"(名) 平衡；均衡　(名) 穩定狀態；平衡狀態","ez":"價格突然下跌擾亂了經濟的平衡。"},{"w":"foster","p":"[ˈfɔ(:)stər] v.","d":"To foster a feeling or a skill means to help it develop.","e":"She helped foster a sense of calm in the little boy.","zh":"(動) 培養；促進　(動) 領養；撫養","ez":"她幫助那個小男孩培養平靜的感覺。"},{"w":"grind","p":"[graind] v.","d":"To grind something means to break it into very small pieces or powder.","e":"She wanted to grind the beans, so she could brew some coffee.","zh":"(動) 磨；研磨　(動) 辛苦地工作；努力奮鬥","ez":"她想磨豆子，這樣就能煮咖啡。"},{"w":"growl","p":"[graul] v.","d":"To growl means to make a deep, angry sound.","e":"&nbsp;The dog started to growl at the man walking by.","zh":"(動) 低聲咆哮；發出沙啞聲　(名) 咆哮聲；沙啞聲","ez":"那隻狗開始對路過的人低吼。"},{"w":"moderation","p":"[ˌmɒdəˈreɪʃən] n.","d":"Moderation is a state of being just enough but not too much.","e":"It is important to eat in moderation so that you can have a healthy body.","zh":"(名) 適度；溫和　(動) 調節；主持","ez":"適量飲食很重要，這樣才能擁有健康的身體。"},{"w":"predator","p":"[ˈpredətər] n.","d":"A predator is an animal that kills and eats other animals.","e":"The peregrine falcon is a predator that eats fish.","zh":"(名) 掠食者；捕食者","ez":"遊隼是一種以魚為食的掠食者。"},{"w":"sane","p":"[sein] adj.","d":"If someone is sane, they can think in a normal way.","e":"Oliver does not act like a sane person when he is angry.","zh":"(形) 心智健全的；明智的","ez":"奧利佛生氣時的行為不像個正常人。"},{"w":"saucer","p":"[ˈsɔːsər] n.","d":"A saucer is a small round dish that you set a cup on.","e":"He placed the spoon on the saucer.","zh":"(名) 碟子；茶托","ez":"他把湯匙放在茶碟上。"},{"w":"snatch","p":"[snætʃ] v.","d":"To snatch something means to take it away with a quick motion.","e":"He was so hungry that he snatched an apple from a tree.","zh":"(動) 搶奪；奪取","ez":"他太餓了，從樹上摘了一顆蘋果。"},{"w":"stagger","p":"[ˈstægər] v.","d":"To stagger means to move in an unsteady way and almost fall over.","e":"He staggered around after having too much to drink.","zh":"(動) 踉蹌；搖晃","ez":"他喝太多酒後搖搖晃晃地走來走去。"},{"w":"stumble","p":"[ˈstʌmbəl] v.","d":"To stumble means to put your foot down wrong so that you almost fall.","e":"He stumbled as he ran through the puddle.","zh":"(動) 絆倒；結巴地說；(名) 絆倒","ez":"他跑過水坑時絆了一下。"},{"w":"tense","p":"[tens] adj.","d":"If someone is tense, they are worried something bad might happen.","e":"After the phone call, Monica was very tense.","zh":"(形) 緊張的；拉緊的　(名) 時態","ez":"接完電話後，莫妮卡非常緊張。"},{"w":"tumble","p":"[ˈtʌmbəl] v.","d":"To tumble means to fall, often in a rolling way.","e":"He lost his balance while snowboarding and tumbled to the ground.","zh":"(動) 跌倒；翻滾","ez":"他在滑雪時失去平衡，摔倒在地。"},{"w":"withhold","p":"[wiθˈhould] v.","d":"To withhold something is to not give it to someone.","e":"They withheld all information until she paid her fine.","zh":"(動) 扣留；保留","ez":"他們在她繳清罰款前隱瞞了所有資訊。"}]},{"id":25,"name":"Unit 25","words":[{"w":"aircraft","p":"[ˈɛəkræft] n.","d":"An aircraft is a vehicle that flies in the sky, such as an airplane or helicopter.","e":"At the museum in the airport, you can see a lot of old aircraft.","zh":"飛機；飛行器；航空器","ez":"在機場的博物館裡，你可以看到許多老舊的飛機。"},{"w":"celebrity","p":"[ˈsəlebrəti] n.","d":"A celebrity is someone who is famous.","e":"It was the highlight of the evening when the celebrities arrived.","zh":"(名) 名人；名星　(名) 名聲；名望","ez":"名人到場是今晚的高潮。"},{"w":"concrete","p":"[ˈkɒnkriːt] n.","d":"Concrete is a substance made from stones.","e":"The man covered the ground with concrete.","zh":"(形) 具體的；實際的　(名) 混凝土；水泥","ez":"那個人用混凝土覆蓋了地面。"},{"w":"decisive","p":"[diˈsaisiv] adj.","d":"If someone is decisive, they make decisions quickly.","e":"Our boss is very decisive, so it did not take long to organize the project.","zh":"(形) 決定性的；果斷的　(形) 明確的；決定結果的","ez":"我們老闆非常果斷，所以組織專案沒花太多時間。"},{"w":"esteemed","p":"[isti:md] adj.","d":"If someone is esteemed, many people like or respect them.","e":"An esteemed scientist is coming to the university to talk about her discoveries.","zh":"尊敬；敬重；好評；尊敬；敬重；好評","ez":"一位備受尊敬的科學家將來大學談論她的發現。"},{"w":"ethical","p":"[ˈeθikəl] adj.","d":"If something is ethical, it is the right thing to do.","e":"Many people believe that it is ethical to help others in need.","zh":"(形) 倫理的；道德的　(形) 符合道德的；誠實的","ez":"許多人認為幫助有需要的人是合乎道德的。"},{"w":"extinct","p":"[iksˈtiŋkt] adj.","d":"If plants or animals are extinct, there are none left.","e":"There used to be dinosaurs all over the world, but now they are extinct.","zh":"(形) 滅絕的；絕種的　(形) 熄滅的；消失的","ez":"以前全世界都有恐龍，但現在牠們已經滅絕了。"},{"w":"hardy","p":"[ˈhɑːrdi] adj.","d":"If a person or plant is hardy, it is strong and can live though difficult conditions.","e":"The farmer is a hardy man and doesn&rsquo;t mind working outside.","zh":"(形) 強壯的；耐寒的　(形) 勇敢的；堅強的","ez":"農夫是個強壯的人，不介意在戶外工作。"},{"w":"institute","p":"[ˈinstətjuːt] n.","d":"An institute is an organization that is interested in research or teaching.","e":"I am going to a lecture about ancient Rome at the Historical Institute.","zh":"(名) 機構；研究所　(動) 建立；設立","ez":"我要去歷史研究所聽一場關於古羅馬的講座。"},{"w":"jealousy","p":"[ˈdʒeləsi] n.","d":"Jealousy is a feeling of wanting something that somebody else has.","e":"She felt a lot of jealousy when she saw Luke with two girls.","zh":"(名) 妒忌；嫉妒　(形) 妒忌的；猜疑的","ez":"看到盧克和兩個女孩在一起，她感到非常嫉妒。"},{"w":"migrate","p":"[maiˈgreit] v.","d":"To migrate means to move from one place to another.","e":"Many birds migrate to warmer countries in the winter.","zh":"(動) 遷移；遷徙　(動) 移居；移動","ez":"許多鳥類在冬天會遷徙到較溫暖的國家。"},{"w":"nurture","p":"[ˈnəːtʃər] v.","d":"To nurture something means to care for it as it grows or develops.","e":"Robert nurtured his plants, and that is why they grow so well.","zh":"(動) 培養；養育　(名) 營養；培育","ez":"羅伯特細心照料他的植物，所以它們長得很好。"},{"w":"overhead","p":"[ouvərˈhed] adv.","d":"If something is overhead, it is located a
