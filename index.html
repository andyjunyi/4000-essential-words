動) 給予權利；使有資格　使享有","ez":"他的黃金門票讓他有資格坐在音樂會的前排。"},{"w":"escort","p":"[ˈeskɔːrt] v.","d":"To escort people means to safely accompany them to a place.","e":"Her bodyguards escorted her to the movie theater.","zh":"(動) [ɪˈskɔrt] 護送；陪同　(名) [ˈɛskɔrt] 護衛者；同伴","ez":"她的保鏢護送她到電影院。"},{"w":"external","p":"[ikˈstəːrnəl] adj.","d":"When something is external, it is connected to an outer part.","e":"It is warm inside my house, but the external temperature is freezing.","zh":"(形) 外部的；外面的　(形) 外在的；表面的","ez":"我家裡很溫暖，但外面的溫度冷得刺骨。"},{"w":"facility","p":"[fəˈsiləti] n.","d":"A facility is a building that exists for a particular purpose.","e":"There are many educational facilities in big cities.","zh":"(名) 設施；便利　(名) 才能；技能","ez":"大城市裡有許多教育設施。"},{"w":"faculty","p":"[ˈfӕkəlti] n.","d":"A faculty is a mental or physical ability.","e":"The boy&rsquo;s mental faculties impressed all of his teachers.","zh":"(名) 能力；才能　(名) 教職員；系所","ez":"這個男孩的心智能力讓所有老師印象深刻。"},{"w":"heap","p":"[hiːp] n.","d":"A heap of things is a large pile of them.","e":"After the building was torn down, all that was left was a heap of bricks.","zh":"(名) 堆；大量　(動) 堆積；積累","ez":"建築物拆除後，只剩下一堆磚塊。"},{"w":"hemisphere","p":"[ˈhemisfiər] n.","d":"A hemisphere is one half of the earth.","e":"In the northern hemisphere, the weather is usually warmest in July and August.","zh":"(名) 半球；地球的一半","ez":"在北半球，天氣通常在七月和八月最溫暖。"},{"w":"hound","p":"[haund] n.","d":"A hound is a type of dog that is often used for racing or hunting.","e":"The men took their hounds with them when they went on the hunting trip.","zh":"(名) 獵犬；狗　(動) 窮追；逼迫","ez":"男人們去打獵時帶著他們的獵犬。"},{"w":"impersonal","p":"[imˈpəːrsənəl] adj.","d":"If something is impersonal, it is not friendly and makes people feel unimportant.","e":"The boy felt scared on his first day at the big, impersonal high school.","zh":"(形) 不個人的；冷淡的　(形) 客觀的；沒有個人感情的","ez":"男孩第一天到那所巨大又冷漠的高中時感到害怕。"},{"w":"ornament","p":"[ˈɔːrnəmənt] n.","d":"An ornament is an attractive object that people display in their homes.","e":"The woman kept some colorful ornaments on the shelves.","zh":"(名) 裝飾品；飾物","ez":"那個女人在架子上放了一些色彩繽紛的裝飾品。"},{"w":"pedestrian","p":"[pəˈdestriən] n.","d":"A pedestrian is a person who is walking on a street.","e":"Cars should be careful when pedestrians are walking around.","zh":"(名) 行人；步行者　(形) 行人的；徒步的","ez":"行人走動時，車輛要小心。"},{"w":"sanctuary","p":"[ˈsӕŋktʃuəri] n.","d":"A sanctuary is a place where people in danger can go to be safe.","e":"The church was made into a sanctuary for homeless people in the winter.","zh":"(名) 庇護所；聖所；保護區","ez":"教堂在冬天成了無家可歸者的庇護所。"},{"w":"spectator","p":"[spekˈteitə:r] n.","d":"A spectator is someone who watches something, especially a sports event.","e":"There were thousands of spectators at the big game.","zh":"(名) 觀眾；旁觀者","ez":"那場大賽有數千名觀眾。"}]},{"id":14,"name":"Unit 14","words":[{"w":"asset","p":"[ˈæset] n.","d":"An asset is a skill or quality that is useful or valuable.","e":"The coach realized the boy&rsquo;s speed was an asset to the team.","zh":"(名) 資產；有利條件　(名) 優勢；長處","ez":"教練意識到男孩的速度是球隊的資產。"},{"w":"aspect","p":"[ˈæspekt] n.","d":"An aspect is one part or feature of something.","e":"I thought about the different aspects of owning two dogs.","zh":"(名) 方面；層面　(名) 外觀；樣子","ez":"我考慮了養兩隻狗的不同面向。"},{"w":"Braille","p":"[breil] n.","d":"Braille is a system of raised patterns on paper that allows the blind to read.","e":"The boy enjoyed reading his favorite books written in Braille.","zh":"盲文點字法；布萊葉盲文","ez":"男孩喜歡閱讀他用點字法寫的最愛書籍。"},{"w":"bud","p":"[bʌd] n.","d":"A bud is a part of a plant that turns into a flower or a leaf.","e":"Two weeks after planting the seed, a small bud appeared.","zh":"(名) 花蕾；芽　(動) 發芽；萌發","ez":"播種兩週後，一個小芽出現了。"},{"w":"coordinate","p":"[kouˈɔːrdəneit] v.","d":"To coordinate things is to make different parts work together.","e":"Each skating team had to coordinate their movements for the show.","zh":"(動) 協調；調配　(名) 坐標；座標","ez":"每個溜冰隊必須協調動作來進行表演。"},{"w":"disprove","p":"[disˈpruːv] v.","d":"To disprove something means to show that it is not true.","e":"The scientist disproved the theory that the sun moved around the Earth.","zh":"(動) 證明...是錯誤的；駁斥","ez":"科學家否定了太陽繞著地球轉的理論。"},{"w":"humanitarian","p":"[hjuːˌmænəˈtɛəriən] adj.","d":"If something is humanitarian, it is connected to helping people’s lives.","e":"After the flood, several humanitarian organizations offered help.","zh":"(形) 人道主義的；人文的　(名) 人道主義者；慈善家","ez":"洪水過後，許多人道組織提供了幫助。"},{"w":"hypothesis","p":"[haiˈpɒθəsis] n.","d":"A hypothesis is an idea for something that has not been proved yet.","e":"The teacher did an experiment to prove whether his hypothesis was right.","zh":"(名) 假說；假設　(名) 推測；猜想","ez":"老師做了一個實驗來證明他的假設是否正確。"},{"w":"imprint","p":"[imˈprint] n.","d":"An imprint is an effect or lesson from an experience that is hard to forget.","e":"The experience ofwarleftan imprint on his mind that troubled him.","zh":"(名) [ˈɪmˌprɪnt] 印記；痕跡　(動) [ɪmˈprɪnt] 留下印象；印刷","ez":"戰爭的經歷在他腦中留下了困擾他的印記。"},{"w":"informative","p":"[inˈfɔːrmətiv] adj.","d":"When something is informative, it provides a lot of information.","e":"The travel guide had a lot of informative facts about the region.","zh":"(形) 提供資訊的；有教育意義的；富有啟發性的","ez":"旅遊指南提供了許多關於該地區的資訊性事實。"},{"w":"optic","p":"[ˈɒptik] adj.","d":"When something is optic, it relates to the eyes or light.","e":"Her blindness was caused by a problem with her optic nerve.","zh":"(形) 眼睛的；視覺的　(名) 光學","ez":"她的失明是由視神經問題引起的。"},{"w":"premise","p":"[ˈpremis] n.","d":"A premise is an idea on which something is based.","e":"The premise of the movie that Bobbi and I watched was unrealistic.","zh":"(名) 前提；假定","ez":"我和芭比看的那部電影的前提很不切實際。"},{"w":"rack","p":"[ræk] n.","d":"A rack is an object with shelves that holds things.","e":"He stored his tools on a rack.","zh":"(動) 折磨；使痛苦；(名) 架子；擱架","ez":"他把工具存放在架子上。"},{"w":"Renaissance","p":"[reˈnəsɑːns] n.","d":"The Renaissance was a period between the 14th and 17th centuries.","e":"Leonardo Da Vinci was a popular artist of the Renaissance.","zh":"(名) 文藝復興","ez":"李奧納多·達文西是文藝復興時期受歡迎的藝術家。"},{"w":"revere","p":"[riviə:r] v.","d":"To revere something is to admire it greatly.","e":"The students revere their teacher, who has taught them a lot.","zh":"(動) 尊敬；崇敬","ez":"學生們尊敬他們的老師，因為老師教了他們很多。"},{"w":"simultaneous","p":"[ˌsaiməlˈteiniəs] adj.","d":"When something is simultaneous, it occurs at the same time as something else.","e":"The movement of the gears inside the watch was simultaneous.","zh":"(形) 同時的；同步的","ez":"手錶內部齒輪的運動是同步的。"},{"w":"skeptic","p":"[ˈskeptik] n.","d":"A skeptic is a person who does not believe something.","e":"The scientist showed the skeptic that dinosaurs did exist by providing evidence.","zh":"持懷疑態度的人","ez":"科學家透過提供證據向懷疑者證明恐龍確實存在。"},{"w":"spatial","p":"[ˈspeiʃəl] adj.","d":"When something is spatial, it relates to the position and size of things.","e":"He was asked where the books were located to test his spatial ability.","zh":"(形) 空間的","ez":"他被問到書放在哪裡，以測試他的空間能力。"},{"w":"specify","p":"[ˈspesəfai] v.","d":"To specify is to describe something clearly.","e":"The poster didn&rsquo;t specify where the concert was taking place.","zh":"(動) 指定；具體說明","ez":"海報沒有具體說明音樂會的地點。"},{"w":"wax","p":"[wæks] n.","d":"Wax is a substance that is slightly shiny and melts when heated.","e":"The candles are made of wax.","zh":"(名) 蠟　(動) 打蠟；上蠟","ez":"蠟燭是由蠟製成的。"}]},{"id":15,"name":"Unit 15","words":[{"w":"accessory","p":"[ækˈsesəri] n.","d":"An accessory is a thing that is added to another thing to make it look better.","e":"The store sold colorful accessories like bags, sunglasses, and makeup.","zh":"(名) 配件；附屬品　(形) 附加的；輔助的","ez":"這家店賣色彩繽紛的配件，像是包包、太陽眼鏡和化妝品。"},{"w":"acquisition","p":"[ˌækwəziʃən] n.","d":"An acquisition is something that a person buys or gets in some way.","e":"Marty was happy with his new acquisition: a very fast bicycle.","zh":"(名) 獲得；習得　(名) 所得物；收購品","ez":"馬蒂對他的新獲得物——一輛非常快的腳踏車——感到開心。"},{"w":"adequate","p":"[ˈædikwit] adj.","d":"When something is adequate, it is good enough for something else.","e":"Without adequate notice of the road block, they will have to turn around.","zh":"(形) 足夠的；充分的　(形) 令人滿意的；適當的","ez":"如果沒有充分通知道路封閉，他們就得掉頭。"},{"w":"cardboard","p":"[ˈkɑːrdbɔːrd] n.","d":"Cardboard is a material made out of stiff paper. It is often used to make boxes.","e":"We packed our things into cardboard boxes and moved to our new home.","zh":"(名) 硬紙板；紙板　(形) 硬紙板製的；平板的","ez":"我們把東西裝進紙箱，搬到新家。"},{"w":"dilemma","p":"[diˈlemə] n.","d":"A dilemma is a difficult situation in which a choice has to be made.","e":"Choosing either the tastier or healthier drink proved to be quite a dilemma.","zh":"(名) 進退兩難的局面；困境　(名) 兩難的選擇；難題","ez":"選擇更好喝或更健康的飲料，成了個兩難。"},{"w":"elaborate","p":"[iˈlæbərit] adj.","d":"When something is elaborate, it contains a lot of details.","e":"She gave the teacher an elaborate explanation of her project.","zh":"(形) 詳細的；精心製作的　(動) 詳細說明；精心設計","ez":"她向老師詳細解釋了她的專案。"},{"w":"facilitate","p":"[fəˈsiləteit] v.","d":"To facilitate something is to make it easier.","e":"To facilitate the meeting, Melissa used a simple computer program.","zh":"(動) 促進；便利　(動) 協助進行；提供便利條件","ez":"為了促進會議進行，梅麗莎用了一個簡單的電腦程式。"},{"w":"fleet","p":"[fliːt] n.","d":"A fleet is a group of ships.","e":"The fleet of ships spent a few days at the dock.","zh":"(名) 艦隊；船隊　(形) 快速的；敏捷的　(動) 快速移動；掠過","ez":"那支船隊在碼頭待了幾天。"},{"w":"grid","p":"[grid] n.","d":"A grid is a pattern of squares with numbers and letters to find places on a map.","e":"We located our town using the grid.","zh":"網格；方格；格柵；格子；電力網；輸電網；坐標方格；賽車起跑線","ez":"我們用網格找到了我們的小鎮。"},{"w":"import","p":"[ˈimpɔːrt] v.","d":"To import means to bring in a product from another country.","e":"Foods that have been imported are usually more expensive.","zh":"(動) [ɪm`pɔrt] 進口；輸入　(名) [`ɪmpɔrt] 進口商品；重要性","ez":"進口食品通常比較貴。"},{"w":"infer","p":"[inˈfəːr] v.","d":"To infer something is to decide it is true based on other information one has.","e":"By the position of the sun in the sky, she inferred that it was noon.","zh":"(動) 推論；推斷　(動) 暗示；意味著","ez":"根據太陽在天空的位置，她推斷是中午。"},{"w":"inflate","p":"[inˈfleit] v.","d":"To inflate something means to fill it up with air.","e":"I helped him inflate the balloons.","zh":"(動) 充氣；膨脹　(動) 誇大；抬高","ez":"我幫他把氣球吹起來。"},{"w":"innate","p":"[iˈneit] adj.","d":"When something is innate, it is something that one is born with, it is not learned.","e":"He had the innate desire to please his teachers.","zh":"天生的；固有的","ez":"他天生就有取悅老師的渴望。"},{"w":"marble","p":"[ˈmɑːrbəl] n.","d":"Marble is a type of rock that feels cold and is smooth when cut.","e":"The large house had floors made of marble.","zh":"(名) 大理石；彈珠　(形) 大理石的；冷漠的","ez":"那棟大房子的地板是大理石做的。"},{"w":"mast","p":"[mæst] n.","d":"A mast is a long pole on a ship that holds the sail.","e":"The mast held both sails of the ship upright.","zh":"船桅；桅杆；天線杆；旗杆","ez":"桅杆支撐著船的兩面帆。"},{"w":"nausea","p":"[ˈnɔːziə] n.","d":"Nausea is the feeling of being sick to your stomach.","e":"The doctor said the medicine would help get rid of her nausea.","zh":"(名) 噁心；想吐　(動) 使噁心；使厭煩","ez":"醫生說這種藥能幫助消除她的噁心感。"},{"w":"naval","p":"[ˈneivəl] adj.","d":"When something is naval, it relates to a country’s navy or military ships.","e":"The country sent all of its naval forces to protect them.","zh":"(形) 海軍的；軍艦的","ez":"國家派出所有海軍力量來保護他們。"},{"w":"pouch","p":"[pautʃ] n.","d":"A pouch is a small, flexible bag that is usually made of cloth.","e":"I keep my money in a small pouch.","zh":"(名) 小袋；錢包　(動) 把…放入袋中","ez":"我把錢放在一個小袋子裡。"},{"w":"saturated","p":"[ˈsætʃəreitid] adj.","d":"If something is saturated, it is completely wet.","e":"Leigh&rsquo;s hair became saturated in the rain storm.","zh":"(形) 飽和的；濕透的","ez":"莉的頭髮在暴風雨中濕透了。"},{"w":"update","p":"[ʌpˈdeit] n.","d":"An update is an act of making something more modern.","e":"I&rsquo;m doing an update on my personal phone directory.","zh":"(動) [ʌp'det] 更新；使現代化　(名) ['ʌp.det] 更新；最新消息","ez":"我正在更新我的個人電話簿。"}]},{"id":16,"name":"Unit 16","words":[{"w":"addict","p":"[ˈædikt] n.","d":"An addict is a person who cannot stop doing or having something.","e":"She was a coffee addict. She had more than three cups each day.","zh":"(名) [ˈædɪkt] 成癮者；上癮的人　(動) [əˈdɪkt] 使成癮；沉溺於　(形) 成癮的；上癮的","ez":"她是個咖啡成癮者，每天至少喝三杯。"},{"w":"archeological","p":"[ˌɑːrkiəˈlɒdʒikəl] adj.","d":"When something is archeological, it relates to archeology.","e":"They found archeological evidence that proved an ancient species of man.","zh":"考古學的；和考古有關的","ez":"他們找到了考古證據，證明存在一種古代人類。"},{"w":"archeology","p":"[ˌɑːrkiˈɒlədʒi] n.","d":"Archeology is the study of ancient people through their artifacts.","e":"He studied archeology to learn more about ancient Egyptian culture.","zh":"(名) 考古學；考古","ez":"他學習考古學是為了更了解古埃及文化。"},{"w":"brainstorm","p":"[ˈbreinstɔːrm] v.","d":"To brainstorm is to have a lot of ideas about a certain topic.","e":"The students met after school to brainstorm ideas for their assignment.","zh":"(名) 腦力激盪；集體討論　(動) 進行腦力激盪；集思廣益","ez":"學生們放學後聚在一起，為作業腦力激盪。"},{"w":"budget","p":"[ˈbʌdʒit] n.","d":"A budget is the amount of money available to spend on something.","e":"His budget for food was very tight.","zh":"(名) 預算；預算案　(動) 編列預算；規劃開支","ez":"他的食物預算非常緊。"},{"w":"chaotic","p":"[keiˈɒtik] adj.","d":"When something is chaotic, it is crazy, confused, and hectic.","e":"The first day of school can be chaotic for a new student.","zh":"混亂的；毫無秩序的","ez":"對新生來說，開學第一天可能會很混亂。"},{"w":"cite","p":"[sait] v.","d":"To cite something is to mention it as an example or as proof of something.","e":"She cited six reasons that the school needed to build new classrooms.","zh":"(動) 引用；列舉　(動) 提及；引證","ez":"她舉出六個理由，說明學校需要新建教室。"},{"w":"correspond","p":"[ˌkɔ:rəsˈpɒnd] v.","d":"To correspond is to match or to be similar to something.","e":"The boy&rsquo;s story didn&rsquo;t correspond with his mother&rsquo;s version.","zh":"(動) 符合；相應　(動) 通信；交流","ez":"男孩的說法與他母親的版本不符。"},{"w":"courtyard","p":"[ˈkɔːrtjɑːrd] n.","d":"A courtyard is an outdoor area that is surrounded by the walls of a building.","e":"During the summer, the courtyard is a nice place to have lunch.","zh":"(名) 院子；庭院　(名) 校園內的空地","ez":"夏天時，庭院是個吃午餐的好地方。"},{"w":"estate","p":"[isˈteit] n.","d":"An estate is a large area of land owned by a family or organization.","e":"He lived on his father&rsquo;s estate in the country.","zh":"(名) 莊園；房產　(名) 遺產；財產","ez":"他住在父親位於鄉間的莊園裡。"},{"w":"fraud","p":"[frɔːd] n.","d":"Fraud is the crime of gaining money by lying or by tricking people.","e":"Experts say that credit card fraud increases around the holidays.","zh":"(名) 詐騙；欺詐　(動) 詐騙；騙取","ez":"專家表示，信用卡詐騙在節日期間會增加。"},{"w":"hydrogen","p":"[ˈhaidrədʒən] n.","d":"Hydrogen is a gas that has no taste, color, or smell.","e":"Balloons filled with hydrogen can easily float away if you aren&rsquo;t careful.","zh":"(名) 氫；氫氣","ez":"裝滿氫氣的氣球如果不小心，很容易飄走。"},{"w":"integrity","p":"[inˈtegrəti] n.","d":"Integrity is honesty and good morals.","e":"The principal had a lot of integrity.","zh":"(名) 正直；誠實　(名) 完整性；整體","ez":"校長非常有誠信。"},{"w":"knit","p":"[nit] v.","d":"To knit is to make fabric by connecting strings together.","e":"My grandmother knitted me a sweater.","zh":"(動) 編織；針織　(名) 針織品；毛衣","ez":"我奶奶織了一件毛衣給我。"},{"w":"outlook","p":"[ˈautluk] n.","d":"An outlook is a person’s opinion or way of thinking about something.","e":"He changed his outlook about rats after he read a book about them.","zh":"(名) [ˈaʊtˌlʊk] 觀點；展望　(動) [aʊtˈlʊk] 比...好看","ez":"他讀了一本關於老鼠的書後，改變了對牠們的看法。"},{"w":"parachute","p":"[ˈpærəʃuːt] n.","d":"A parachute is a device that helps people and things fall to the ground safely.","e":"They used parachutes dropped from airplanes to send supplies to the civilians.","zh":"(名) ['pɛrəˌʃut] 降落傘　(動) [ˌpɛrə'ʃut] 跳傘；空投","ez":"他們用飛機空投的降落傘，運送補給品給平民。"},{"w":"prehistoric","p":"[ˈpriːhisˈtɔ:rik] adj.","d":"When something is prehistoric, it is from a time when there was no written history.","e":"The scientists found prehistoric pots used by the people in the area.","zh":"(形) 史前的","ez":"科學家發現了該地區古人使用的史前陶器。"},{"w":"proponent","p":"[prəˈpounənt] n.","d":"A proponent is a person who supports an idea or a plan.","e":"He was a proponent of using environmentally friendly products.","zh":"(名) 支持者；提倡者","ez":"他是環保產品的支持者。"},{"w":"refine","p":"[riˈfain] v.","d":"To refine something is to make it better by making changes.","e":"The principal refined his method of controlling students over the years.","zh":"(動) 精煉；改進","ez":"校長多年來不斷改進管理學生的方法。"},{"w":"restrict","p":"[risˈtrikt] v.","d":"To restrict is to limit something and prevent it from getting bigger.","e":"The club restricted the amount of members.","zh":"(動) 限制；約束","ez":"這個俱樂部限制了會員人數。"}]},{"id":17,"name":"Unit 17","words":[{"w":"attorney","p":"[əˈtəːrni] n.","d":"An attorney is one who gives others advice about the law.","e":"The attorney appeared in front of the judge for me.","zh":"(名) 律師；檢察官","ez":"律師為我出庭，站在法官面前。"},{"w":"chronic","p":"[ˈkrɒnik] adj.","d":"When something is chronic, it happens over and over again over time.","e":"He had chronic pain in his chest and needed to see a doctor.","zh":"(形) 慢性的；長期的　(形) 持續的；根深蒂固的","ez":"他胸口長期疼痛，需要去看醫生。"},{"w":"discipline","p":"[ˈdisəplin] n.","d":"Discipline is training that helps people follow the rules.","e":"One of the teacher&rsquo;s jobs is to teach her students discipline.","zh":"(名) 紀律；訓練　(動) 懲罰；訓練","ez":"老師的職責之一是教導學生紀律。"},{"w":"donor","p":"[ˈdounər] n.","d":"A donor is somebody who gives something to an organization.","e":"He was proud to be a blood donor.","zh":"(名) 捐贈者；施予者　(名) 器官捐贈者","ez":"他以捐血為榮。"},{"w":"fellow","p":"[ˈfelou] n.","d":"A fellow is someone who shares a job or quality with someone else.","e":"All of my fellow patients at the hospital have also complained about the food.","zh":"(名) 同伴；夥伴　(形) 同類的；相同的","ez":"醫院裡的其他病友也都在抱怨食物。"},{"w":"gossip","p":"[ˈgɒsip] n.","d":"Gossip is information that might be untrue but is still discussed anyway.","e":"The friends exchanged gossip about the people they knew in school.","zh":"(名) 閒言碎語；八卦　(動) 說閒話；八卦","ez":"朋友們交換著關於學校裡認識的人的八卦。"},{"w":"graduate","p":"[ˈgrædjueit] v.","d":"To graduate from a school means to complete and pass all courses of study there.","e":"At the end of the spring, my friends and I will graduate from high school.","zh":"(動) [ˈgrædʒuˌet] 畢業；完成學業　(名) [ˈgrædʒuɪt] 畢業生；大學畢業生","ez":"春天結束時，我和朋友們將從高中畢業。"},{"w":"graffiti","p":"[grəˈfiːti:] n.","d":"Graffiti is words or drawings in public places.","e":"The wall was covered with colorful graffiti.","zh":"(名) 塗鴉；壁畫","ez":"牆上布滿了五顏六色的塗鴉。"},{"w":"guardian","p":"[ˈgɑːrdiən] n.","d":"A guardian is someone who protects somebody or something.","e":"The librarians are the guardians of the books.","zh":"(名) 監護人；保護者　(名) 守護神；保衛者","ez":"圖書館員是書籍的守護者。"},{"w":"implicate","p":"[ˈimpləkeit] v.","d":"To implicate someone is to show that they have done a crime or something bad.","e":"The man was implicated in the theft at the store.","zh":"牽連；涉及","ez":"那名男子被牽涉進商店的竊案中。"},{"w":"kin","p":"[kin] n.","d":"Kin is a person’s family and relatives.","e":"His kin were all farmers.","zh":"(名) 親戚；親屬　(名) 同類的人或物","ez":"他的親戚都是農夫。"},{"w":"referee","p":"[ˌrefəˈriː] n.","d":"A referee is a person who makes sure that the rules are followed in sports.","e":"The soccer player didn&rsquo;t agree with the referee.","zh":"(名) 裁判；(動) 擔任裁判","ez":"足球選手不同意裁判的判決。"},{"w":"sever","p":"[ˈsevə:r] v.","d":"To sever something is to cut through it completely.","e":"He severed the string using scissors.","zh":"(動) 切斷；中斷","ez":"他用剪刀剪斷了繩子。"},{"w":"shaft","p":"[ʃæft] n.","d":"A shaft is a handle of a tool or weapon.","e":"The golf club had a long wooden shaft that he held in his hands.","zh":"(名) 軸；柄","ez":"高爾夫球桿有根長木柄，他握在手中。"},{"w":"stab","p":"[stæb] v.","d":"To stab means to cut someone or something with a sharp object like a knife.","e":"He stabbed the fork into the potato and passed it to his daughter.","zh":"戳；捅；刺；戳；捅；戳；刺；捅；戳；捅；中傷；誹謗","ez":"他把叉子插進馬鈴薯，然後遞給女兒。"},{"w":"stimulus","p":"[ˈstimjələs] n.","d":"A stimulus is something that causes growth or activity.","e":"Having a lot of money is a stimulus for people to buy more things.","zh":"(名) 刺激；刺激物","ez":"有很多錢會刺激人們購買更多東西。"},{"w":"suspicion","p":"[səsˈpiʃən] n.","d":"A suspicion is a feeling that something is possible or true in a crime.","e":"The police had a suspicion that the driver had stolen the purse.","zh":"(名) 懷疑；嫌疑","ez":"警方懷疑司機偷了錢包。"},{"w":"terminate","p":"[ˈtəːrməneit] v.","d":"To terminate something means to stop or end it.","e":"The trip was terminated after the car broke down.","zh":"使；結束；停止；終止；終止妊娠；人工流產","ez":"車子拋錨後，這趟旅程就終止了。"},{"w":"theme","p":"[θiːm] n.","d":"A theme is the main subject of a book, movie, or painting.","e":"The students discussed the book&rsquo;s theme in class.","zh":"(名) 主題；題目","ez":"學生們在課堂上討論這本書的主題。"},{"w":"tuition","p":"[tju:iʃən] n.","d":"Tuition is the amount of money paid to go to a school.","e":"University tuitions have increased by fifty percent in the last five years.","zh":"(名) 學費","ez":"大學學費在過去五年內漲了百分之五十。"}]},{"id":18,"name":"Unit 18","words":[{"w":"aggressive","p":"[əˈgresiv] adj.","d":"If someone is aggressive, then they constantly want to fight.","e":"Nobody liked to play games with him because he was always too aggressive.","zh":"(形) 好鬥的；富有進攻性的　(形) 積極進取的；主動的","ez":"沒有人喜歡跟他玩遊戲，因為他總是太具攻擊性。"},{"w":"amnesty","p":"[ˈӕmnəsti] n.","d":"Amnesty is a pardon given to prisoners of war.","e":"She was denied amnesty for her involvement in the war.","zh":"(名) 赦免；特赦　(動) 赦免；特赦","ez":"她因參與戰爭而被拒絕赦免。"},{"w":"arena","p":"[əˈriːnə] n.","d":"An arena is a building where people can watch sports and concerts.","e":"The new arena was all set to hold the championship match.","zh":"(名) 競技場；舞台　(名) 領域；範疇","ez":"新場館已準備好舉辦冠軍賽。"},{"w":"auditorium","p":"[ˌɔːdiˈtɔːriəm] n.","d":"An auditorium is a large building used for public events.","e":"People have gathered at the school auditorium to watch the play.","zh":"(名) 禮堂；演講廳　(名) 觀眾席；講堂","ez":"人們聚集在學校禮堂觀看話劇。"},{"w":"captive","p":"[ˈkæptiv] n.","d":"A captive is a prisoner.","e":"The guards told the captive that there was no way he could escape the prison.","zh":"(形) 被囚禁的；被俘虜的　(名) 俘虜；囚犯","ez":"守衛告訴俘虜，他絕對無法逃出監獄。"},{"w":"combat","p":"[ˈkɒmbæt] n.","d":"Combat is fighting between two people or groups.","e":"The two warriors were locked in combat.","zh":"(動) [kəmˈbæt] 對抗；戰鬥　(名) [ˈkɑmbæt] 戰鬥；格鬥","ez":"兩名戰士陷入激戰。"},{"w":"commonplace","p":"[ˈkɒmənpleis] adj.","d":"If something is commonplace, then it is ordinary.","e":"There is nothing commonplace about the way Morris dresses.","zh":"(形) 普通的；平凡的　(名) 平凡的事；老生常談","ez":"莫里斯的穿著一點都不平凡。"},{"w":"compound","p":"[ˈkɒmpaund] n.","d":"A compound is an enclosed area such as a prison or factory.","e":"The workers waited outside the compound for the gates to the factory to open.","zh":"(名) [ˈkɑmpaʊnd] 化合物；混合物　(形) [ˈkɑmpaʊnd] 複合的；混合的　(動) [kəmˈpaʊnd] 加重；惡化","ez":"工人們在廠區外等待工廠大門開啟。"},{"w":"corps","p":"[kɔːr] n.","d":"A corps is a division of a military force.","e":"The army had a corps of archers who trained apart from the regular soldiers.","zh":"(名) 軍團；兵團　(名) 團體；集團","ez":"軍隊裡有一支弓箭手部隊，與一般士兵分開訓練。"},{"w":"distract","p":"[disˈtrækt] v.","d":"To distract someone means to stop them from concentrating on something.","e":"The phone call distracted him so much that he forgot all about his homework.","zh":"(動) 分散注意力；打擾　(動) 使心煩意亂；使困擾","ez":"那通電話讓他分心到完全忘了作業。"},{"w":"dumb","p":"[dʌm] adj.","d":"If someone is dumb, they are unable to speak.","e":"She did not share the secret. She remained silent as if she were dumb.","zh":"(形) 啞的；不能說話　(形) 愚蠢的；傻的","ez":"她沒有說出秘密。她保持沉默，就像啞巴一樣。"},{"w":"foe","p":"[fou] n.","d":"A foe is an enemy or opponent.","e":"It was hard to believe that anyone could be his foe.","zh":"(名) 敵人；對手　(名) 反對者；仇敵","ez":"很難相信有人會是他的敵人。"},{"w":"hack","p":"[hæk] v.","d":"To hack something means to cut it into uneven pieces.","e":"My uncle used the ax to hack the tree into many logs.","zh":"(動) 砍；劈　(名) 黑客；駭客","ez":"我叔叔用斧頭把樹砍成許多木頭。"},{"w":"meditate","p":"[ˈmedəteit] v.","d":"To meditate means to focus or think deeply in silence.","e":"She liked to meditate for several hours of each day.","zh":"(動) 冥想；沉思　(動) 深思熟慮；思考","ez":"她喜歡每天花幾個小時冥想。"},{"w":"nick","p":"[nik] v.","d":"To nick someone means to cut them slightly with a sharp object.","e":"While cutting the carrots, the cook nicked his finger with the edge of his knife.","zh":"(名) 小傷口；刻痕　(動) 割傷；刻下","ez":"切紅蘿蔔時，廚師用刀緣劃傷了手指。"},{"w":"provoke","p":"[prəˈvouk] v.","d":"To provoke someone means to annoy them on purpose to cause violence.","e":"The older boy provoked Paul by calling him mean names.","zh":"(動) 激怒；引起","ez":"較大的男孩用難聽的外號挑釁保羅。"},{"w":"realm","p":"[relm] n.","d":"A realm is any area of activity or interest.","e":"He was not very active in the realm of business.","zh":"界；領域；範圍；王國","ez":"他在商業領域不太活躍。"},{"w":"reign","p":"[rein] n.","d":"A reign is the period of time in which a ruler rules.","e":"The emperor&rsquo;s reign lasted for only two years.","zh":"(名) 統治時期；王朝","ez":"皇帝的統治只持續了兩年。"},{"w":"rust","p":"[rʌst] n.","d":"Rust is a red and brown coating on iron objects caused by water and air.","e":"The old metal gate would not swing because the hinges were covered in rust.","zh":"(動) 生鏽　(名) 鏽；鐵鏽","ez":"舊鐵門因為鉸鏈生鏽而無法擺動。"},{"w":"sacred","p":"[ˈseikrid] adj.","d":"If something is sacred, then it is worshipped and respected.","e":"One religion in India will not harm cows because it believes that they are sacred.","zh":"(形) 神聖的；莊嚴的","ez":"印度有一種宗教不傷害牛，因為他們認為牛是神聖的。"}]},{"id":19,"name":"Unit 19","words":[{"w":"accordingly","p":"[əˈkɔːrdiŋli] adv.","d":"If someone acts accordingly, they act in a way that is suitable.","e":"He feels like he did a good job, and his boss should pay him accordingly.","zh":"(副) 因此；照著辦","ez":"他覺得自己做得很好，老闆應該相應地支付他薪水。"},{"w":"anchor","p":"[ˈæŋkər] n.","d":"An anchor is a heavy object dropped from a boat to make it stay in one place.","e":"When the ship reached its destination, the crew dropped the anchor.","zh":"(名) 錨；支柱　(動) 拋錨；固定　(形) 主要的；關鍵的","ez":"船到達目的地時，船員們放下了錨。"},{"w":"buoy","p":"[ˈbuːi] n.","d":"A buoy is a floating sign that warns boats of dangerous areas.","e":"Don&rsquo;t steer the boat near those buoys. There are rocks underneath the water.","zh":"(名) 浮標；浮筒　(動) 使浮起；支撑","ez":"不要把船駛近那些浮標，水底下有岩石。"},{"w":"catastrophe","p":"[kəˈtæstrəfi] n.","d":"A catastrophe is an unexpected event that causes great suffering or damage.","e":"It was a catastrophe for my family when my dad lost his job.","zh":"(名) 大災難；災難　(名) 慘敗；失敗","ez":"爸爸失業對我們家來說是一場災難。"},{"w":"context","p":"[ˈkɒntekst] n.","d":"Context is the situations that form the background of an event.","e":"They studied the context of the battle before giving their presentation.","zh":"(名) 上下文；背景　(名) 環境；情況","ez":"他們在發表報告前研究了那場戰役的背景。"},{"w":"designate","p":"[ˈdezigneit] v.","d":"To designate someone or something means to give them a particular description.","e":"The famous lighthouse was designated a historical monument.","zh":"(動) 指定；任命　(動) 標明；表示","ez":"那座著名的燈塔被指定為歷史古蹟。"},{"w":"distort","p":"[disˈtɔːrt] v.","d":"To distort something means to lie about it.","e":"His lawyer distorted the facts so that he would be set free.","zh":"(動) 扭曲；歪曲　(動) 曲解；篡改","ez":"他的律師扭曲事實，好讓他被釋放。"},{"w":"dock","p":"[dɒk] n.","d":"A dock is an enclosed area where ships go to be loaded, unloaded, and repaired.","e":"The huge ship pulled into the dock, and the crew unloaded the cargo.","zh":"(名) 碼頭；船塢　(動) 靠岸；停靠　(動) 扣除；減少","ez":"大船駛入碼頭，船員們卸下貨物。"},{"w":"fore","p":"[fɔːr] n.","d":"The fore of something is the front part of it.","e":"The teacher&rsquo;s desk is at the fore of the classroom.","zh":"向；前部；在；前部；前部的；向前的","ez":"老師的桌子在教室的前方。"},{"w":"frequent","p":"[ˈfriːkwənt] adj.","d":"If something is frequent, then it happens or is done often.","e":"While Dad was sick, the doctor made frequent visits to his house.","zh":"(形) [ˈfrikwənt] 頻繁的；經常的　(動) [friˈkwɛnt] 經常造訪；常去","ez":"爸爸生病期間，醫生經常來他家探訪。"},{"w":"genuine","p":"[ˈdʒenjuin] adj.","d":"When something is genuine, it is true or real.","e":"After the painting was determined to be genuine, it sold for a million dollars.","zh":"(形) 真正的；真實的　(形) 誠實的；坦誠的","ez":"那幅畫被鑑定為真跡後，以一百萬美元賣出。"},{"w":"grease","p":"[griːs] n.","d":"Grease is an oily substance put on moving parts, so they work smoothly.","e":"When I was done working on the car, I had grease all over my hands.","zh":"(名) [gris] 油脂；潤滑油　(動) [griz] 塗油；潤滑　(形) 油膩的；骯髒的","ez":"修完車後，我手上全是油污。"},{"w":"intricate","p":"[ˈintrəkit] adj.","d":"When something is intricate, it has many small parts or details.","e":"The intricate painting on the quilt was very lovely.","zh":"(形) 複雜的；精細的　(形) 難以理解的；曲折的","ez":"被子上的精緻圖案非常漂亮。"},{"w":"offset","p":"[ˈɔ:fset] v.","d":"To offset means to use one thing to cancel out the effect of another thing.","e":"Increased wages are offset by higher prices for goods.","zh":"(名) [ˋɔfˏsɛt] 抵消；補償　(動) [ˋɔfˋsɛt] 抵消；彌補","ez":"工資上漲被商品價格上漲所抵消。"},{"w":"overlap","p":"[ˈouvərlæp] v.","d":"To overlap something means to cover a piece of it.","e":"The gift on top overlaps the other gift on the bottom.","zh":"(動) [ˌovɚ'læp] 重疊；部分重複　(名) ['ovɚˌlæp] 重疊部分","ez":"上面的禮物重疊在下面的禮物上。"},{"w":"precipitate","p":"[priˈsipəteit] v.","d":"To precipitate an event means to cause it to happen sooner than normal.","e":"The violent attack precipitated an all-out war.","zh":"(動) [prɪ'sɪpəˌtet] 促成；使突然發生　(名) [prɪ'sɪpətɪt] 沉澱物","ez":"暴力攻擊引發了一場全面戰爭。"},{"w":"secondhand","p":"[ˈsekəndˈhænd] adj.","d":"When something is secondhand, it has been owned by someone else.","e":"Her secondhand jeans were a bit faded in the front.","zh":"(形) 二手的；間接的　(副) 二手地；間接地","ez":"她的二手牛仔褲前面有點褪色。"},{"w":"slot","p":"[slɒt] n.","d":"A slot is a narrow opening in a machine or container.","e":"To operate the machine, put your coins into the slot.","zh":"(名) 時段；位置","ez":"要操作機器，請把硬幣投入投幣口。"},{"w":"submerge","p":"[səbˈməːrdʒ] v.","d":"To submerge something means to put it below the surface of a liquid.","e":"The whale submerged its huge body into the ocean.","zh":"(動) 淹沒；浸沒","ez":"鯨魚將巨大的身體潛入海洋中。"},{"w":"tactic","p":"[ˈtæktik] n.","d":"A tactic is a careful plan to achieve something.","e":"Sam thought of a good tactic in order to attract more business.","zh":"(名) 策略；戰術","ez":"山姆想出一個好策略來吸引更多生意。"}]},{"id":20,"name":"Unit 20","words":[{"w":"aggregate","p":"[ˈӕgrəgit] adj.","d":"When a number is aggregate, it is made up of smaller amounts added together.","e":"The company totaled its aggregate sales for the entire year.","zh":"(名) [ˈægrəgɪt] 總和；合計　(動) [ˈægrəˌget] 合併；聚集　(形) 合成的；集合的","ez":"公司統計了整年度的總銷售額。"},{"w":"antibiotic","p":"[ˈæntibaiˈɒtik] n.","d":"An antibiotic is a medical drug used to kill bacteria and treat infections.","e":"The doctor gave me a shot of an antibiotic when I got the flu.","zh":"(名) 抗生素　(形) 抗生素的；殺菌的","ez":"我得了流感時，醫生給我打了一針抗生素。"},{"w":"circuit","p":"[ˈsəːrkit] n.","d":"A circuit is a piece of an electronic device that allows electricity to flow.","e":"Be very careful not to shock yourself when fixing an electrical circuit.","zh":"(名) 電路；迴路　(名) 巡迴；路線","ez":"修理電路時要非常小心，不要觸電。"},{"w":"complement","p":"[ˈkɒmpləment] v.","d":"To complement something or someone is to make them better.","e":"The wool scarf complemented her lovely eyes.","zh":"(名) 補足物；搭配物　(動) 補充；襯托","ez":"羊毛圍巾襯托出她美麗的眼睛。"},{"w":"compress","p":"[kəmˈpres] v.","d":"To compress something means to press or squeeze it so that it takes up less space.","e":"I compressed my clothes to fit into a single suitcase.","zh":"(動) [kəmˋprɛs] 壓縮；壓扁　(名) [ˋkɑmprɛs] 冷敷布；藥布","ez":"我把衣服壓縮，好裝進一個行李箱。"},{"w":"database","p":"[ˈdeitəbeis] n.","d":"A database is a collection of data that is stored in a computer.","e":"The company has a database of all the names and accounts of their customers.","zh":"(名) 資料庫；數據庫","ez":"公司有一個資料庫，記錄所有客戶的姓名和帳戶。"},{"w":"equivalent","p":"[iˈkwivələnt] n.","d":"An equivalent is an amount or value that is the same as another amount or value.","e":"I worked the equivalent of sixty hours this week.","zh":"(形) 相等的；等量的　(名) 相等物；等價物","ez":"這週我工作了相當於六十小時。"},{"w":"immune","p":"[iˈmjuːn] adj.","d":"When someone is immune to a disease, they cannot be affected by it.","e":"Children usually get shots to make them immune to certain diseases.","zh":"(形) 免疫的；不受影響的　(動) 使免除；豁免","ez":"孩子們通常會打針，以對某些疾病產生免疫力。"},{"w":"input","p":"[ˈinput] n.","d":"Input is information that is put into a computer.","e":"Type the input into the computer program.","zh":"(名) 輸入；投入　(動) 輸入；輸進","ez":"將輸入資料鍵入電腦程式中。"},{"w":"intimate","p":"[ˈintəmit] adj.","d":"When a relationship is intimate, the two things are very closely connected.","e":"I only tell my secrets to my most intimate friends.","zh":"(形) [ˋɪntəmɪt] 親密的；密切的　(動) [ˋɪntəmet] 暗示；透露","ez":"我只把秘密告訴我最親密的朋友。"},{"w":"magnet","p":"[ˈmægnit] n.","d":"A magnet is a piece of iron or other material which attracts iron toward it.","e":"I used a magnet to pick up the nails that were scattered on the floor.","zh":"(名) 磁鐵；磁石　(名) 吸引力強的人或物","ez":"我用磁鐵撿起散落在地板上的釘子。"},{"w":"metabolism","p":"[məˈtæbəlizəm] n.","d":"A person’s metabolism is the way chemical processes in their body use energy.","e":"If you exercise every day, your metabolism speeds up.","zh":"(名) 新陳代謝；代謝作用","ez":"如果你每天運動，新陳代謝就會加快。"},{"w":"microchip","p":"[ˈmaikrouˌtʃip] n.","d":"A microchip is a small device inside a computer that holds information.","e":"I can put more data on my computer if I buy a more powerful microchip.","zh":"(名) 微晶片；晶片","ez":"如果我買更強大的微晶片，就能在電腦上儲存更多資料。"},{"w":"phase","p":"[feiz] n.","d":"A phase is a stage in a process or the gradual development of something.","e":"The first phase in the recycling project involves finding volunteers to help out.","zh":"(名) 階段；時期　(動) 逐步實行","ez":"回收計畫的第一階段是尋找志願者幫忙。"},{"w":"pinch","p":"[pintʃ] v.","d":"To pinch means to take a piece of skin between one’s fingers and squeeze.","e":"I pinched my nose, so I couldn&rsquo;t smell the odor from the garbage.","zh":"(名) 捏；掐　(動) 捏；掐","ez":"我捏住鼻子，所以聞不到垃圾的臭味。"},{"w":"prevalent","p":"[ˈprevələnt] adj.","d":"When something is prevalent, it is common.","e":"Growing a beard is more prevalent behavior in men than women.","zh":"(形) 普遍的；流行的","ez":"留鬍子在男性中比在女性中更常見。"},{"w":"quantum","p":"[ˈkwɒntəm] adj.","d":"When something is quantum, it relates to the behavior of atomic particles.","e":"The physics student studied quantum mechanics.","zh":"(名) 量子；(形) 量子的","ez":"物理系學生研究量子力學。"},{"w":"ratio","p":"[ˈreiʃou] n.","d":"A ratio is a relationship between two things expressed in numbers or amounts.","e":"The boy to girl ratio is one to three.","zh":"(名) 比率；比例","ez":"男生與女生的比例是一比三。"},{"w":"spiral","p":"[ˈspaiərəl] n.","d":"A spiral is a shape which winds round and round in a larger and larger circle.","e":"A strand of DNA looks like two interlocking spirals.","zh":"(動) 盤旋；螺旋式上升/下降　(名) 螺旋；螺旋形","ez":"一條DNA看起來像兩個互相纏繞的螺旋。"},{"w":"viral","p":"[ˈvaiərəl] adj.","d":"When something is viral, it is a disease or infection that is caused by a virus.","e":"The girl was in bed fora week when she had a viral infection.","zh":"(形) 病毒式的；廣泛傳播的；(名) 病毒式內容","ez":"那個女孩因為病毒感染在床上躺了一週。"}]},{"id":21,"name":"Unit 21","words":[{"w":"astounded","p":"[əˈstaundid] adj.","d":"If you are astounded, you are very surprised.","e":"I was astounded that Monica won the art competition.","zh":"感到震驚的；覺得驚駭的","ez":"我很驚訝莫妮卡贏得了藝術比賽。"},{"w":"attribute","p":"[ˈætribjuːt] n.","d":"An attribute is a characteristic of a person or thing.","e":"He isn&rsquo;t very clever, but he does have some other positive attributes.","zh":"(名) ['ætrəˌbjut] 特徵；屬性　(動) [ə'trɪbˌjut] 把...歸因於；認為...是由於","ez":"他不是很聰明，但確實有一些其他的優點。"},{"w":"bilingual","p":"[baiˈliŋgwəl] adj.","d":"If someone is bilingual, then they can speak two languages.","e":"Since you already know English, after learning French you&rsquo;ll be bilingual.","zh":"能用兩種語言的；兩種語言的","ez":"既然你已經會英文，學完法文後你就會是雙語人士了。"},{"w":"clone","p":"[kloun] n.","d":"A clone is an identical copy of a living creature.","e":"Scientists recently made a clone of a sheep.","zh":"(名) 克隆；複製品　(動) 複製；克隆","ez":"科學家最近複製了一隻羊。"},{"w":"colloquial","p":"[kəˈloukwiəl] adj.","d":"Colloquial describes informal words that are more suitable for speech than writing.","e":"I find it difficult to understand people if they use colloquial language.","zh":"(形) 日常會話的；非正式的　(形) 口語的；通俗的","ez":"如果有人用口語化的語言，我會覺得很難理解。"},{"w":"cosmetics","p":"[kɒzˈmetiks] n.","d":"Cosmetics are substances that make the face and skin more beautiful.","e":"Girls often look nicer when they don&rsquo;t use so many cosmetics.","zh":"(名) 化妝品","ez":"女生如果不化太多妝，通常看起來更漂亮。"},{"w":"dash","p":"[dæʃ] v.","d":"To dash means to run or move quickly.","e":"Helen dashed up the stairs, so she wouldn&rsquo;t be late for her appointment.","zh":"(動) 衝刺；急跑　(名) 短跑；衝刺","ez":"海倫衝上樓梯，以免約會遲到。"},{"w":"disgust","p":"[disˈgʌst] n.","d":"Disgust is a feeling of distaste and anger caused by something rude or unpleasant.","e":"He felt disgust toward his date because she had such terrible eating habits.","zh":"(名) 厭惡；反感　(動) 使厭惡；使反感　(形) 感到厭惡的","ez":"他對約會對象感到厭惡，因為她的飲食習慣很差。"},{"w":"fluorescent","p":"[fluəˈresnt] adj.","d":"If something is fluorescent, it is such a bright color that it seems to give off light.","e":"She highlighted the key words in the document with a fluorescent yellow pen.","zh":"(形) 螢光的；發螢光的　(形) 明亮的；容易引人注目的","ez":"她用螢光黃筆標記了文件中的關鍵字。"},{"w":"furious","p":"[ˈfjuəriəs] adj.","d":"If you are furious, you are extremely angry.","e":"My father was furious when he read my bad school report.","zh":"(形) 極其憤怒的；狂怒的　(形) 猛烈的；激烈的","ez":"我父親看到我糟糕的成績單時非常生氣。"},{"w":"gulf","p":"[gʌlf] n.","d":"A gulf is a gap between people who do not understand each other.","e":"There has been a gulf between James and Tony since their parents died.","zh":"(名) 海灣；灣　(名) 深淵；鴻溝","ez":"自從父母過世後，詹姆斯和東尼之間就有了隔閡。"},{"w":"humanities","p":"[hju:mænətiz] n.","d":"Humanities are subjects which analyze human ideas, such as history and literature.","e":"Jennifer has always been more interested in humanities than science.","zh":"人文學科；語言；歷史","ez":"珍妮佛一直以來都對人文學科比對科學更感興趣。"},{"w":"knot","p":"[nɒt] n.","d":"A knot is made when you tie the ends of rope or cord together.","e":"He tied a knot in his shoelaces, so they wouldn&rsquo;t come off during the race.","zh":"(名) 結；打結　(動) 打結；系住　(形) 複雜的；難解的","ez":"他把鞋帶打了個結，以免在比賽中鬆脫。"},{"w":"linguist","p":"[ˈliŋgwist] n.","d":"A linguist is someone who studies languages.","e":"Tony is a good linguist and speaks four different languages.","zh":"(名) 語言學家；精通多種語言的人","ez":"東尼是個優秀的語言學家，會說四種不同的語言。"},{"w":"participant","p":"[pɑːrˈtisəpənt] n.","d":"A participant is someone who joins in a social event or competition.","e":"There were thousands of participants in this year&rsquo;s marathon.","zh":"(名) 參與者；參加者","ez":"今年有數千名參賽者參加馬拉松。"},{"w":"plausible","p":"[ˈplɔːzəbəl] adj.","d":"If something is plausible, it is reasonable or possible.","e":"It is plausible that Jack isn&rsquo;t here today because he is sick.","zh":"(形) 看似真實的；合理的","ez":"傑克今天沒來，有可能是因為他生病了。"},{"w":"ritual","p":"[ˈritjuəl] n.","d":"A ritual is a formal custom that people do regularly.","e":"Ken was very interested to learn about the religious rituals of the natives.","zh":"(名) 儀式；例行公事　(形) 儀式的；例行公事的","ez":"肯恩對於學習當地原住民的宗教儀式非常感興趣。"},{"w":"sibling","p":"[ˈsibliŋ] n.","d":"A sibling is a brother or sister.","e":"Jane has two siblings, an older brother and a younger sister.","zh":"(名) 兄弟姊妹；手足","ez":"珍有兩個手足，一個哥哥和一個妹妹。"},{"w":"skinny","p":"[ˈskini] adj.","d":"If someone is skinny, they are extremely thin.","e":"Polly is very skinny. I think she needs to eat more.","zh":"(形) 極瘦的；皮包骨的","ez":"波莉非常瘦，我覺得她需要多吃一點。"},{"w":"vague","p":"[veig] adj.","d":"If something is vague, it is not clear, and it gives very few details.","e":"I asked him about his mother&rsquo;s health, but he was very vague about it.","zh":"(形) 模糊的；不明確的","ez":"我問他母親的健康狀況，但他回答得很含糊。"}]},{"id":22,"name":"Unit 22","words":[{"w":"acid","p":"[ˈæsid] n.","d":"An acid is a chemical that can burn or dissolve other substances.","e":"In chemistry class, we mixed two acids together and watched the reaction.","zh":"(名) 酸；酸性物質　(形) 酸的；尖刻的","ez":"在化學課上，我們把兩種酸混合在一起，觀察它們的反應。"},{"w":"administration","p":"[ədˌminəsˈtreiʃən] n.","d":"An administration is the group of people who manage a company or organization.","e":"She hoped she could be promoted to a job in the administration.","zh":"(名) 管理；行政　(名) 政府部門；內閣","ez":"她希望能升遷到行政部門的工作。"},{"w":"administrative","p":"[ədˈminəstrətiv] adj.","d":"Administrative describes anything related to managing a company or organization.","e":"I work as an administrative assistant to the owner of the company.","zh":"(形) 行政的；管理的　(形) 與政府部門有關的","ez":"我擔任公司老闆的行政助理。"},{"w":"biotechnology","p":"[ˌbaioutekˈnɒlədʒi] n.","d":"Biotechnology is the use of living parts, such as cells, in industry and technology.","e":"Researchers at the biotechnology company use bacteria to make medicine.","zh":"生物技術；生物工藝學","ez":"這家生技公司的研究人員利用細菌製造藥物。"},{"w":"cholesterol","p":"[kəˈlestəroul] n.","d":"Cholesterol is a substance in fat, tissues, and blood of all animals.","e":"When people have too much cholesterol, they are at a high risk for heart problems.","zh":"(名) 膽固醇；一種脂肪物質","ez":"當人們膽固醇過高時，罹患心臟疾病的風險就很高。"},{"w":"coalition","p":"[kouəˈliʃən] n.","d":"A coalition is a group of people or organizations working for a common purpose.","e":"The companies formed a coalition to make trade less expensive.","zh":"(名) 聯盟；聯合　(名) 結合；聯合體","ez":"這些公司組成聯盟，以降低貿易成本。"},{"w":"deceptive","p":"[diˈseptiv] adj.","d":"When something is deceptive, it encourages one to believe something that is false.","e":"The scary-looking man&rsquo;s appearance is deceptive, but he is actually very nice.","zh":"(形) 欺騙的；具有迷惑性的　(形) 外表騙人的；容易誤導的","ez":"那個長相嚇人的男人外表有欺騙性，但他其實人很好。"},{"w":"diabetes","p":"[daiəˈbiːtis] n.","d":"Diabetes is a medical condition where a person has too much sugar in their blood.","e":"Overweight people are more likely to suffer from diabetes than slimmer ones.","zh":"(名) 糖尿病；糖尿病患者","ez":"體重過重的人比身材較瘦的人更容易罹患糖尿病。"},{"w":"eliminate","p":"[iˈliməneit] v.","d":"To eliminate something that is unwanted means to completely remove it.","e":"Wearing a seatbelt eliminates some of the dangers of driving a car.","zh":"(動) 消除；排除　(動) 淘汰；刪除","ez":"繫安全帶可以消除開車時的部分危險。"},{"w":"erosion","p":"[iˈrouʒən] n.","d":"Erosion is the destruction of rock or soil due to flowing water or weather.","e":"Canyons are formed because rivers of fast-moving water caused erosion.","zh":"(名) 侵蝕；腐蝕　(動) 侵蝕；逐漸破壞","ez":"峽谷是由於湍急的河流造成侵蝕而形成的。"},{"w":"ethics","p":"[ˈeθiks] n.","d":"Ethics are moral beliefs or rules about right or wrong.","e":"The act of stealing certainly doesn&rsquo;t go against some people&rsquo;s ethics.","zh":"(名) 倫理；道德　(名) 倫理學；道德標準","ez":"偷竊的行為顯然並未違背某些人的道德觀。"},{"w":"explicit","p":"[iksˈplisit] adj.","d":"If something is explicit, it is very clear, open, and truthful.","e":"The man gave a very explicit account of the car accident.","zh":"(形) 明確的；清楚的　(形) 露骨的；直率的","ez":"那名男子非常清楚地描述了車禍的經過。"},{"w":"framework","p":"[ˈfreimwəːrk] n.","d":"A framework is a set of rules or ideas that people use to solve problems.","e":"His ideas fit into the framework of a successful business plan.","zh":"(名) 框架；結構　(名) 體系；架構","ez":"他的想法符合一個成功商業計畫的架構。"},{"w":"manufacture","p":"[ˌmænjəˈfæktʃə:r] v.","d":"To manufacture something means to make it in a factory.","e":"My father&rsquo;s company manufactures steel building materials.","zh":"(動) 製造；生產　(名) 製造商；廠商","ez":"我父親的公司製造鋼鐵建材。"},{"w":"mechanism","p":"[ˈmekənizəm] n.","d":"A mechanism is a part of a machine that performs a certain function.","e":"I can&rsquo;t open my car door because the locking mechanism is broke.","zh":"(名) 機制；機構　(名) 方法；途徑","ez":"我打不開車門，因為鎖的機制壞了。"},{"w":"minimize","p":"[ˈminəmaiz] v.","d":"To minimize means to reduce something to the lowest possible level.","e":"I checked my homework twice to minimize errors I might have made.","zh":"(動) 使最小化；減少　(動) 縮小；貶低","ez":"我把作業檢查了兩次，以盡量減少可能犯的錯誤。"},{"w":"nectar","p":"[ˈnektər] n.","d":"Nectar is a sweet liquid produced by flowers that bees and other insects collect.","e":"Bees use nectar to make their honey.","zh":"(名) 花蜜；甘露　(名) 神酒；美酒","ez":"蜜蜂用花蜜來釀造蜂蜜。"},{"w":"notion","p":"[ˈnouʃən] n.","d":"A notion is an idea or belief about something.","e":"I have a notion that this route would get us to the beach.","zh":"(名) 觀念；想法　(名) 衝動；傾向","ez":"我有一種預感，這條路會帶我們到海灘。"},{"w":"prone","p":"[proun] adj.","d":"When things are prone to some bad thing, they are likely affected by it.","e":"Some people are more prone to catching colds than others.","zh":"(形) 易於……的；有……傾向的","ez":"有些人比其他人更容易感冒。"},{"w":"straightforward","p":"[ˌstreitˈfɔːrwərd] adj.","d":"When something is straightforward, it is good because it is easy to understand.","e":"The teacher&rsquo;s grading system was straightforward and fair.","zh":"(形) 直接的；簡單的","ez":"老師的評分系統簡單明瞭又公平。"}]},{"id":23,"name":"Unit 23","words":[{"w":"astronomical","p":"[ˌæstrəˈnɒmikəl] adj.","d":"If something is astronomical, then it is extremely large.","e":"It&rsquo;s an astronomical distance between the Milky Way galaxy and the nearest galaxy.","zh":"(形) 天文的；極其巨大的　(形) 極高的；天文數字的","ez":"從銀河系到最近的星系，距離非常遙遠。"},{"w":"atom","p":"[ˈætəm] n.","d":"An atom is the smallest unit of a substance.","e":"A molecule consists of a combination of two or more atoms.","zh":"(名) 原子；微粒","ez":"一個分子由兩個或兩個以上的原子結合而成。"},{"w":"breadth","p":"[bretθ] n.","d":"Breadth is the distance from one side to the other side of something.","e":"The breadth of the northern wall of the house is twenty meters.","zh":"(名) 寬度；範圍　(名) 廣度；涵蓋面","ez":"房子北牆的寬度是二十公尺。"},{"w":"circumference","p":"[səˈkʌmfərəns] n.","d":"A circumference is the distance completely around a circular object.","e":"The circumference of the Earth is obviously much larger than a baseball&rsquo;s.","zh":"(名) 圓周；周長　(名) 周圍；邊界","ez":"地球的周長顯然比棒球大得多。"},{"w":"comet","p":"[ˈkɒmit] n.","d":"A comet is an object in space made of ice and rock with a tail of glowing dust.","e":"Comets take many decades to complete an orbit around a star.","zh":"(名) 彗星；彗虹","ez":"彗星需要幾十年的時間才能完成繞行恆星一周。"},{"w":"crater","p":"[ˈkreitər] n.","d":"A crater is a large hole in a planet’s or moon’s surface.","e":"They could clearly see the big crater on the moon through the telescope.","zh":"(名) 隕石坑；火山口　(名) 凹陷；坑洞","ez":"他們透過望遠鏡可以清楚地看到月球上的大隕石坑。"},{"w":"crescent","p":"[ˈkresənt] n.","d":"A crescent is the curved shape lit on the moon’s face during its early and late stages.","e":"Ten days ago the entire moon was bright, but now only a small crescent is shining.","zh":"(名) 新月；月牙　(形) 彎曲的；逐漸增加的","ez":"十天前整個月亮都很亮，但現在只有一小彎新月在發光。"},{"w":"debris","p":"[ˈdəbriː] n.","d":"Debris is the small pieces scattered from something wrecked or destroyed.","e":"The debris from the cube scattered on the floor.","zh":"(名) 碎片；殘骸　(名) 廢墟；瓦礫","ez":"立方體的碎片散落在地板上。"},{"w":"despair","p":"[disˈpɛər] n.","d":"Despair is the complete loss of hope.","e":"After the other company won the account, our salespeople were filled with despair.","zh":"(名) 絕望；失望　(動) 失去希望；感到絕望","ez":"在另一家公司贏得這個客戶後，我們的業務員充滿了絕望。"},{"w":"embed","p":"[imˈbed] v.","d":"To embed something means to place it firmly within a surrounding thing.","e":"The logger embedded the ax into the wood after chopping several logs.","zh":"(動) 嵌入；埋入　(動) 使深深植入","ez":"樵夫砍了好幾根木頭後，把斧頭嵌進木頭裡。"},{"w":"fragment","p":"[ˈfrægmənt] n.","d":"A fragment is a small part of something.","e":"After the light broke, there were fragments of glass to clean up.","zh":"(名) [ˈfrægmənt] 碎片；片段　(動) [frægˈmɛnt] 分裂；破碎","ez":"燈泡破掉後，地上有玻璃碎片要清理。"},{"w":"galaxy","p":"[ˈgæləksi] n.","d":"A galaxy is any extremely large collection of star systems.","e":"Our solar system is located in the outer area of our galaxy.","zh":"(名) 銀河；星系","ez":"我們的太陽系位於銀河系的外圍區域。"},{"w":"gigantic","p":"[dʒaiˈgæntik] adj.","d":"If something is gigantic, then it is extremely large.","e":"Some dinosaurs were so gigantic that they were the size of buildings.","zh":"(形) 巨大的；龐大的　(形) 非常大的；極其巨大的","ez":"有些恐龍巨大到跟建築物一樣大。"},{"w":"gloom","p":"[gluːm] n.","d":"Gloom is a state of being almost completely dark.","e":"In the gloom of the morning, it was difficult to see the boat on the lake.","zh":"(名) 黑暗；陰沉　(形) 陰沉的；沮喪的","ez":"清晨昏暗的光線下，很難看清湖上的船。"},{"w":"radiate","p":"[ˈreidieit] v.","d":"To radiate means to send out energy or heat.","e":"The heat from the fireplace radiated throughout the room.","zh":"(動) 輻射；散發","ez":"壁爐的熱氣散佈到整個房間。"},{"w":"roam","p":"[roum] v.","d":"To roam means to move around without a plan or purpose.","e":"All day the cows roamed around the field eating grass.","zh":"閒逛；漫步；漫遊","ez":"牛群一整天都在草地上吃草。"},{"w":"solitary","p":"[ˈsɒliteri] adj.","d":"If something is solitary, then it is lonely or the only one.","e":"The only thing in the room was a solitary chair.","zh":"(形) 孤獨的；獨自的","ez":"房間裡只有一張孤零零的椅子。"},{"w":"spectrum","p":"[ˈspektrəm] n.","d":"The spectrum is the full range of color ranging from red to violet.","e":"You can see the entire spectrum in a rainbow.","zh":"(名) 光譜；範圍；系列","ez":"彩虹裡可以看到完整的色譜。"},{"w":"sphere","p":"[sfiə:r] n.","d":"A sphere is a three-dimensional round shape, like a ball.","e":"The balloons were inflated into a variety of colorful spheres.","zh":"(名) 範圍；領域；球體","ez":"氣球被吹成各種顏色的球體。"},{"w":"status","p":"[ˈsteitəs] n.","d":"Status is the position of something or someone in relation to others.","e":"She had achieved the status of being the smartest girl in the class.","zh":"(名) 地位；狀況","ez":"她達到了班上最聰明女生的地位。"}]},{"id":24,"name":"Unit 24","words":[{"w":"bankrupt","p":"[ˈbæŋkrʌpt] adj.","d":"If someone is bankrupt, then they are unable to pay their debts.","e":"The store had few customers and soon went bankrupt.","zh":"(形) 破產的；無法償還債務的　(動) 使破產；導致經濟失敗","ez":"那家店客人很少，很快就倒閉了。"},{"w":"conform","p":"[kənˈfɔːrm] v.","d":"To conform to rules or laws is to obey them.","e":"The new student had to conform to the school&rsquo;s dress code.","zh":"(動) 遵守；順應　符合；一致","ez":"新來的學生必須遵守學校的服裝規定。"},{"w":"employ","p":"[imˈplɔi] v.","d":"To employ someone means to give work to them.","e":"The bookstore employed two full-time clerks.","zh":"(動) 僱用；雇用　(動) 利用；運用","ez":"那家書店雇用了兩名全職店員。"},{"w":"expel","p":"[iksˈpel] v.","d":"To expel someone means to force them to leave a place.","e":"Since he would not follow the rules, the principal had to expel the student.","zh":"(動) 開除；驅逐　(動) 趕出；排出","ez":"因為他不遵守規定，校長只好開除他。"},{"w":"extension","p":"[iksˈtenʃən] n.","d":"An extension is a part added to something to give it more time or space.","e":"My parents decided to add an extension to our house for the new baby.","zh":"(名) 延伸；延長　(名) 延期；展期","ez":"爸媽決定為新生兒擴建房子。"},{"w":"forthcoming","p":"[fɔːrθˈkʌmiŋ] adj.","d":"If something is forthcoming, then it is about to happen in the future.","e":"Some economists predicted that the forthcoming world economy would be severe.","zh":"(形) 即將到來的；即將發生的　(形) 樂於提供的；坦誠的","ez":"有些經濟學家預測未來全球經濟會很嚴峻。"},{"w":"furnish","p":"[ˈfəːrniʃ] v.","d":"To furnish means to put furniture in a house or room.","e":"Most homes are furnished with tables, chairs, and beds.","zh":"(動) 供應；提供　(動) 裝置；配置","ez":"大多數家庭都配有桌子、椅子和床。"},{"w":"hygiene","p":"[ˈhaidʒiːn] n.","d":"Hygiene is the conditions or methods needed for health and cleanliness.","e":"People who brush their teeth at least twice a day are practicing good hygiene.","zh":"(名) 衛生；衛生習慣　(形) 衛生的；清潔的","ez":"每天至少刷兩次牙的人，就是在實踐良好的衛生習慣。"},{"w":"hygienic","p":"[haiˈdʒinik] adj.","d":"If something is hygienic, then it is clean and unlikely to cause disease.","e":"My sister works very hard to keep her entire home as hygienic as possible.","zh":"(形) 衛生的；清潔的　(形) 健康的；符合衛生標準的","ez":"我姊姊很努力讓整個家盡可能保持衛生。"},{"w":"landlord","p":"[ˈlændlɔːrd] n.","d":"A landlord is a man who rents property to a person.","e":"The landlord collected everyone&rsquo;s rent money on the first day of every month.","zh":"(名) 房東；地主　(名) 旅館老闆；酒館老闆","ez":"房東每個月的第一天收大家的房租。"},{"w":"lease","p":"[liːs] v.","d":"To lease means to rent property, usually an apartment or land.","e":"When the family first leased the apartment, the rent was very low.","zh":"(名) 租約；租賃　(動) 出租；租賃","ez":"這家人剛租下公寓時，租金非常便宜。"},{"w":"mandatory","p":"[ˈmændətɔ:ri] adj.","d":"If something is mandatory, then it is required by law.","e":"It&rsquo;s mandatory that everyone be at least sixteen to drive a car in the US.","zh":"(形) 強制的；必須的　(形) 法定的；規定的","ez":"在美國，規定必須年滿十六歲才能開車。"},{"w":"mend","p":"[mend] v.","d":"To mend something means to fix it when it is broken or damaged.","e":"Mother mended the rip in my pants with a piece of cloth.","zh":"(動) 修理；修補　(動) 改善；改正","ez":"媽媽用一塊布補好了我褲子上的裂縫。"},{"w":"mortgage","p":"[ˈmɔːrgidʒ] n.","d":"A mortgage is a loan for property, especially homes and businesses.","e":"When they bought their new home, the married couple had to sign a mortgage.","zh":"(名) 抵押貸款；房貸　(動) 抵押；以房屋作為貸款擔保","ez":"買新房時，這對夫妻必須簽署房貸合約。"},{"w":"personnel","p":"[ˌpəːrsəˈnel] n.","d":"Personnel are employees in a business.","e":"When business increased, we had to hire more personnel.","zh":"(名) 人員；人事部門","ez":"生意增加後，我們必須雇用更多人手。"},{"w":"plumbing","p":"[ˈplʌmiŋ] n.","d":"Plumbing is the system of pipes used in a home to supply water.","e":"When the plumbing stopped working, no one was allowed to use the toilets.","zh":"(名) 水管系統；管道工程","ez":"水管壞掉時，沒有人可以使用廁所。"},{"w":"tenant","p":"[ˈtenənt] n.","d":"A tenant is a person who rents property from a landlord.","e":"The new tenants moved into the house across the street.","zh":"(名) 租戶；房客","ez":"新住戶搬進了對街的房子。"},{"w":"trendy","p":"[ˈtrendi] adj.","d":"If something is trendy, then it is very popular and new.","e":"Carlo bought a trendy new car.","zh":"(形) 時髦的；流行的","ez":"卡羅買了一輛時髦的新車。"},{"w":"utility","p":"[juːˈtiləti] n.","d":"A utility is a business that supplies services such as water or electricity.","e":"If you don&rsquo;t pay the utilities, you may have your electricity turned off.","zh":"(名) 實用性；公用事業","ez":"如果不繳水電費，可能會被斷電。"},{"w":"whereby","p":"[hwɛə:rˈbai] conj.","d":"Whereby means by which or through which.","e":"The mayor had a new bridge built whereby the citizens could cross the river.","zh":"(副) 藉此；憑藉","ez":"市長蓋了一座新橋，讓市民可以過河。"}]},{"id":25,"name":"Unit 25","words":[{"w":"aesthetic","p":"[esˈθetik] adj.","d":"If something is aesthetic, then it is concerned with a love of beauty.","e":"The dresses were noteworthy for their aesthetic design.","zh":"(形) 美學的；審美的　(名) 美感；審美觀點","ez":"這些洋裝因其美學設計而引人注目。"},{"w":"arrogant","p":"[ˈærəgənt] adj.","d":"If someone is arrogant, they think that they are more important than others.","e":"He is very arrogant. Even though he&rsquo;s not the boss, he tells everyone what to do.","zh":"(形) 傲慢的；自大的　(形) 驕傲自滿的；目中無人的","ez":"他非常傲慢，明明不是老闆，卻對每個人發號施令。"},{"w":"bias","p":"[ˈbaiəs] n.","d":"A bias is a person’s likelihood to like one thing more than another thing.","e":"The mothers had a natural bias for their own child&rsquo;s picture.","zh":"(名) 偏見；偏差　(動) 使有偏見；影響　(形) 偏頗的；有偏差的","ez":"媽媽們自然會偏愛自己孩子的照片。"},{"w":"canyon","p":"[ˈkænjən] n.","d":"A canyon is a narrow valley with steep walls through which a river often flows.","e":"The canyon was so deep that the ground inside was covered in shadow.","zh":"(名) 峽谷；險峽","ez":"峽谷深到谷底都籠罩在陰影中。"},{"w":"creek","p":"[kriːk] n.","d":"A creek is a stream or small river.","e":"Only small fish lived in the shallow waters of the creek.","zh":"(名) 小溪；溪流","ez":"小溪的淺水區只住著小魚。"},{"w":"drill","p":"[dril] n.","d":"A drill is a tool with a point that spins in order to make a hole.","e":"The carpenter used the drill to make several holes in the wood.","zh":"(名) 鑽孔機；操練　(動) 鑽孔；進行操練　(動) 反覆練習；反覆教授","ez":"木匠用鑽頭在木頭上鑽了幾個洞。"},{"w":"executive","p":"[igˈzekjətiv] n.","d":"An executive is the top manager of a business.","e":"After twenty years at the company, he finally became the executive.","zh":"(名) 行政主管；執行官　(形) 行政的；執行的","ez":"在公司待了二十年後，他終於成了主管。"},{"w":"fatigue","p":"[fəˈtiːg] n.","d":"Fatigue is a feeling of extreme tiredness.","e":"After three days with little sleep, she was feeling a lot of fatigue.","zh":"(名) 疲勞；疲倦　(動) 使疲倦；使厭倦　(形) 疲倦的；疲勞的","ez":"連續三天沒睡好，她感到非常疲勞。"},{"w":"incline","p":"[ˈinklain] n.","d":"An incline is a sharp rise in something, especially a hill or mountain.","e":"This mountain has one of the steepest inclines in the world.","zh":"(動) [ɪnˈklaɪn] 傾斜；彎曲　(名) [ˈɪnklaɪn] 斜坡；坡度","ez":"這座山擁有世界上最陡的斜坡之一。"},{"w":"nasty","p":"[ˈnæsti] adj.","d":"If something is nasty, then it is not nice or pleasant.","e":"The rotten apple left a nasty taste inside her mouth.","zh":"(形) 令人厭惡的；討厭的　(形) 惡劣的；不愉快的","ez":"那顆爛蘋果在她嘴裡留下難聞的味道。"},{"w":"perceive","p":"[pərsiːv] v.","d":"To perceive something means to be aware of it.","e":"He was talking loudly, so he did not perceive that the music had stopped.","zh":"(動) 察覺；理解；看待","ez":"他講話很大聲，所以沒注意到音樂已經停了。"},{"w":"primate","p":"[ˈpraimeit] n.","d":"A primate is a type of mammal that includes monkeys, apes, and humans.","e":"Primates use their hands for such tasks as swinging from branches.","zh":"靈長類動物；大主教；首主教","ez":"靈長類動物用手來做像在樹枝間擺盪這類的事。"},{"w":"primitive","p":"[ˈprimətiv] adj.","d":"If something is primitive, then it is simple, basic, and not very developed.","e":"The computers of the 1980s are primitive compared to those of todays.","zh":"(形) 原始的；早期的","ez":"1980年代的電腦跟現在的比起來，顯得很原始。"},{"w":"stereotype","p":"[ˈsteriətaip] n.","d":"A stereotype is a general but often incorrect idea about a person or thing.","e":"There&rsquo;s a stereotype that pigs are dirty animals. But they are rather clean.","zh":"(名) 刻板印象　(動) 對…形成刻板印象","ez":"大家對豬有刻板印象，覺得牠們很髒，但其實牠們相當乾淨。"},{"w":"sticky","p":"[ˈstiki] adj.","d":"If something is sticky, then it is covered with a substance that things stick to.","e":"Place the sticky part of the tape against the paper, so it will cling to the wall.","zh":"(形) 黏的；棘手的","ez":"把膠帶有黏性的一面貼在紙上，這樣它才能黏在牆上。"},{"w":"termite","p":"[ˈtəːrmait] n.","d":"A termite is an insect that lives in groups and feeds on wood.","e":"The wood we found was full of termites.","zh":"(名) 白蟻","ez":"我們找到的木頭裡全是白蟻。"},{"w":"thereby","p":"[ˈðɛə:rˈbai] adv.","d":"If something happens thereby an action, then it is the result of that action.","e":"He didn&rsquo;t score a goal, thereby ending his chance at setting a record.","zh":"(副) 因此；從而","ez":"他沒進球，因此失去了創紀錄的機會。"},{"w":"trail","p":"[treil] n.","d":"A trail is a path through a wild area.","e":"A narrow trail cut through the field and over the hills.","zh":"(名) 痕跡；小徑　(動) 跟蹤；落後","ez":"一條狹窄的小徑穿過田野，越過山丘。"},{"w":"twig","p":"[twig] n.","d":"A twig is a short and thin branch from a tree or bush.","e":"They started the fire with a handful of dry twigs.","zh":"(名) 小樹枝；細枝","ez":"他們用一把乾樹枝生起了火。"},{"w":"welfare","p":"[ˈwelfɛə:r] n.","d":"Welfare is the health and happiness of a person or group.","e":"Having plenty of clean water is necessary for the welfare of people.","zh":"(名) 福利；福祉","ez":"有充足的乾淨水對人們的福祉來說是必要的。"}]},{"id":26,"name":"Unit 26","words":[{"w":"behalf","p":"[biˈhæf] n.","d":"If something is done on one’s behalf, it is done for that person by another.","e":"The original speaker was sick, so his son gave the speech on his behalf.","zh":"(介) 代表；為了　(名) 利益；好處","ez":"原本的演講者生病了，所以由他的兒子代為致詞。"},{"w":"flap","p":"[flæp] v.","d":"To flap means to move quickly up and down or from side to side.","e":"The tiny bird flapped its wings and ate from the flowers.","zh":"(名) 拍打；襟翼　(動) 拍動；揮動　(形) 鬆垂的；搖晃的","ez":"小鳥拍動翅膀，從花朵中覓食。"},{"w":"glacier","p":"[ˈgleiʃər] n.","d":"A glacier is a large piece of ice that moves very slowly.","e":"The North Pole is covered by a huge glacier.","zh":"(名) 冰川；冰河","ez":"北極被巨大的冰川覆蓋。"},{"w":"globe","p":"[gloub] n.","d":"The globe refers to the Earth.","e":"Water covers most of the globe.","zh":"(名) 地球；世界　(名) 地球儀；圓球","ez":"水覆蓋了地球大部分面積。"},{"w":"horizontal","p":"[ˌhɔ:rəˈzɒntl] adj.","d":"When something is horizontal, it is flat and level with the ground.","e":"The Russian flag has three horizontal stripes of white, blue, and red.","zh":"(形) 水平的；橫向的　(副) 水平地；橫向地","ez":"俄羅斯國旗有白、藍、紅三條橫紋。"},{"w":"hum","p":"[hʌm] v.","d":"To hum means to make a low, continuous noise.","e":"The man hummed his favorite song.","zh":"(動) 哼唱；發出嗯聲　(名) 嗡嗡聲；低鳴聲","ez":"那個男人哼著他最喜歡的歌。"},{"w":"inventory","p":"[ˈinvənˌtɔ:ri] n.","d":"An inventory is a supply of something.","e":"Gwen was checking the inventory to make sure we had what we needed.","zh":"(名) 庫存；存貨　(名) 詳細清單；盤點","ez":"關在檢查庫存，以確保我們有需要的東西。"},{"w":"inward","p":"[ˈinwərd] adj.","d":"If a thought or feeling is inward, it is not expressed or shown to others.","e":"She had an inward feeling of guilt when she lied to her mother.","zh":"(形) 向內的；內部的　(副) 向內；朝裡面","ez":"她對媽媽說謊時，內心有種罪惡感。"},{"w":"loaf","p":"[louf] n.","d":"A loaf of bread is bread shaped and baked in one piece.","e":"Could you please buy a loaf of bread for sandwiches?","zh":"(動) 懶散地閒蕩；虛度時光　(名) 一條麵包","ez":"可以請你買一條做三明治的麵包嗎？"},{"w":"oracle","p":"[ˈɔ(:)rəkəl] n.","d":"An oracle is person who speaks with gods and gives advice about the future.","e":"The king went to the oracle to ask if going to war was a good idea.","zh":"(名) 神諭；預言　(名) 神殿；智者","ez":"國王去請示神諭，詢問開戰是否是明智之舉。"},{"w":"orbit","p":"[ˈɔːrbit] v.","d":"To orbit something means to move around it in a continuous, curving path.","e":"The moon orbits the Earth.","zh":"(名) 軌道；軌跡　(動) 繞…運行；環繞","ez":"月球繞著地球運行。"},{"w":"overview","p":"[ˈouvərvjuː] n.","d":"An overview is a general description of a situation.","e":"My brother gave me an overview of the important parts of the book.","zh":"(名) 概述；概觀","ez":"我哥哥給我概述了書中重要的部分。"},{"w":"preview","p":"[ˈpriːvjuː] n.","d":"A preview is an opportunity to see something before it is available to the public.","e":"The band played us a preview of their new song.","zh":"(動) 預習；預覽","ez":"樂團為我們預演了他們的新歌。"},{"w":"previous","p":"[ˈpriːviəs] adj.","d":"If something is previous, then it happened earlier in time or order.","e":"He turned back to the previous page to read the paragraph again.","zh":"(形) 先前的；以往的","ez":"他翻回前一頁，重新讀那段文字。"},{"w":"provide","p":"[prəˈvaid] v.","d":"To provide something means to supply it.","e":"Each student was provided with a test and three sharp pencils.","zh":"(動) 提供；供應","ez":"每個學生都拿到一份試卷和三支削好的鉛筆。"},{"w":"recur","p":"[riˈkəːr] v.","d":"To recur means to happen more than once.","e":"Burglaries seem to recur over and over in our neighborhood.","zh":"(動) 再次發生；重現","ez":"我們社區似乎一再發生竊案。"},{"w":"relevant","p":"[ˈreləvənt] adj.","d":"When something is relevant, it is important to a certain person or situation.","e":"The thirty-year-old book about politics is still relevant to our society today.","zh":"(形) 相關的；切題的","ez":"那本三十年前的政治書，對今天的社會仍然有參考價值。"},{"w":"rite","p":"[rait] n.","d":"A rite is a traditional ceremony carried out by a particular group or society.","e":"Special masks are worn during the rite when a new baby is born.","zh":"(名) 儀式；典禮","ez":"新生兒出生時，儀式中會戴上特殊的面具。"},{"w":"stall","p":"[stɔːl] v.","d":"To stall means to stop a process and continue it at a later time.","e":"If you give the car a push, it won&rsquo;t stall.","zh":"(動) 熄火；停滯　(名) 攤位；停頓","ez":"如果你推一下車子，它就不會熄火。"},{"w":"supernatural","p":"[ˌsuːpərˈnætʃərəl] adj.","d":"If something is supernatural, it is not real or explainable by natural law.","e":"The dragon had supernatural powers such as flying and breathing fire.","zh":"(形) 超自然的；神奇的","ez":"龍擁有超自然能力，例如飛行和噴火。"}]},{"id":27,"name":"Unit 27","words":[{"w":"adapt","p":"[əˈdæpt] v.","d":"To adapt means to change in order to deal with a new situation or addition.","e":"When he went to the new town, he had to adapt to all the weather changes.","zh":"(動) 適應；改編　(動) 調整；改造","ez":"他搬到新城鎮時，必須適應所有的天氣變化。"},{"w":"biological","p":"[ˌbaiəˈlɒdʒikəl] adj.","d":"Biological describes the process of life and living things.","e":"In science, we learned about the biological process of bacterial growth.","zh":"(形) 生物的；生物學的　(形) 生理的；有機的","ez":"在自然課上，我們學到了細菌生長的生物過程。"},{"w":"cellular","p":"[ˈseljələr] adj.","d":"When something is cellular, it relates to the cells of animals or plants.","e":"She used a microscope to see the activity at a cellular level.","zh":"(形) 細胞的；蜂窩式網路的；行動通訊的","ez":"她用顯微鏡觀察細胞層級的活動。"},{"w":"dynamic","p":"[daiˈnæmik] adj.","d":"When people are dynamic, they are lively and have creative ideas.","e":"The new, dynamic employee came up with a good way to juggle his work load.","zh":"(形) 充滿活力的；有力的　(名) 動力；驅動力","ez":"那位充滿活力的新員工想出一個好方法來調配工作量。"},{"w":"fantasy","p":"[ˈfæntəzi] n.","d":"A fantasy is a pleasant situation that people think about but is unlikely to happen.","e":"Becoming an astronaut is a fantasy shared by many children.","zh":"(名) 幻想；奇想　(形) 幻想的；想像的","ez":"成為太空人是許多孩子共同的幻想。"},{"w":"heredity","p":"[hiˈredəti] n.","d":"Heredity is the process of passing on features from parents to children.","e":"The boy&rsquo;s face is similar to his father&rsquo;s because of heredity.","zh":"(名) 遺傳；遺傳性　(名) 遺傳特徵；遺傳因素","ez":"那個男孩的臉因遺傳而長得像他父親。"},{"w":"internal","p":"[inˈtəːrnl] adj.","d":"When something is internal, it exists or happens inside a person, object, or place.","e":"We removed the outer case to reveal the computer&rsquo;s internal wires.","zh":"(形) 內部的；內在的　(形) 體內的；內臟的","ez":"我們拆開外殼，露出電腦內部的電線。"},{"w":"minimal","p":"[ˈminəməl] adj.","d":"When something is minimal, it is very small.","e":"My lazy husband does a minimal amount of work around the house.","zh":"(形) 最小的；極少的　(形) 最低的；基本的","ez":"我懶惰的丈夫在家裡只做最少量的家事。"},{"w":"pioneer","p":"[paiəˈniər]","d":"A pioneer is a person who is the first to discover or be involved in something.","e":"He was a pioneer of computer programming.","zh":"(動) 開拓；倡導　(名) 先驅；開拓者","ez":"他是電腦程式設計的先驅。"},{"w":"prescribe","p":"[priˈskraib] v.","d":"To prescribe medicine means to tell someone to take it.","e":"When I was sick, the doctor prescribed me flu medicine.","zh":"(動) 開（藥方）；規定","ez":"我生病時，醫生開了流感藥給我。"},{"w":"respective","p":"[risˈpektiv] adj.","d":"When things are respective, they relate separately to each person just mentioned.","e":"The boxers were told to return to their respective corners.","zh":"(形) 各自的；分別的","ez":"拳擊手被要求回到各自的角落。"},{"w":"revive","p":"[riˈvaiv] v.","d":"To revive someone or something means to restore health or life to them.","e":"She revived the feeling of warmth in her leg by rubbing it softly.","zh":"(動) 復甦；重新振作","ez":"她輕輕按摩腿部，恢復了溫暖的感覺。"},{"w":"rigid","p":"[ˈridʒid] adj.","d":"When rules or systems are rigid, they are severe because they cannot be changed.","e":"Societies often have rigid rules about the way that people are supposed to act.","zh":"(形) 嚴格的；僵硬的","ez":"社會通常對人們應有的行為有嚴格的規範。"},{"w":"sequence","p":"[ˈsiːkwəns] n.","d":"A sequence is a number of events or things that come one after another.","e":"The dominos fell in a sequence of one after another.","zh":"(名) 順序；連續　(動) 按順序排列","ez":"骨牌一個接一個地依序倒下。"},{"w":"substitute","p":"[ˈsʌbstitjuːt] v.","d":"To substitute something or someone means to have them take the place of another.","e":"When I ran out of juice, I had to substitute water to drink in the morning.","zh":"(名) 代用品；替代者　(動) 替代；取代","ez":"果汁喝完了，我早上只好用水代替。"},{"w":"surgeon","p":"[ˈsəːrdʒən] n.","d":"A surgeon is a doctor who is trained to do surgery.","e":"The surgeon operated on the old man&rsquo;s heart.","zh":"(名) 外科醫生","ez":"外科醫生為那位老先生進行了心臟手術。"},{"w":"therapy","p":"[ˈθerəpi] n.","d":"Therapy is treatment for a particular physical or mental illness or condition.","e":"After she broke her legs, she used physical therapy to learn how to walk again.","zh":"(名) 治療；療法","ez":"她摔斷腿後，透過物理治療重新學習走路。"},{"w":"transfer","p":"[ˈtrænsfə:r] v.","d":"To transfer something means to move it from one place to another.","e":"The family transferred the groceries from the shopping cart to the car.","zh":"(動) 轉移；調動","ez":"家人把雜貨從購物車搬到車上。"},{"w":"transition","p":"[trænˈziʃən] n.","d":"A transition is a process where there is a change from one form to another.","e":"The weather gets colder during the transition from summer to autumn.","zh":"(名) 過渡；轉變","ez":"夏秋交替時，天氣會變冷。"},{"w":"transplant","p":"[trænsˈplænt] n.","d":"A transplant is an operation in which a damaged part of one’s body is replaced.","e":"The sick child needed a heart transplant to live.","zh":"(動) [træns'plænt] 移植；遷移　(名) ['trænsplænt] 移植；移植器官","ez":"那個生病的孩子需要心臟移植才能活下去。"}]},{"id":28,"name":"Unit 28","words":[{"w":"aquarium","p":"[əˈkwɛəriəm] n.","d":"An aquarium is a building where fish and underwater animals are kept.","e":"We took a trip to the aquarium and saw a scary shark.","zh":"(名) 水族館；魚缸","ez":"我們去水族館參觀，看到了一隻可怕的鯊魚。"},{"w":"arbitrary","p":"[ˈɑːrbitreri] adj.","d":"If something is arbitrary, it is not based on any plan or system, so it seems random.","e":"The classroom had many arbitrary rules that made me confused.","zh":"(形) 武斷的；任意的　(形) 專斷的；隨意的","ez":"教室裡有許多隨意的規定，讓我很困惑。"},{"w":"autobiography","p":"[ˌɔːtəbaiˈɒgrəfi] n.","d":"An autobiography is a true story of a person’s life written by that person.","e":"I read an autobiography about my favorite entertainer.","zh":"(名) 自傳；自述","ez":"我讀了一本關於我最喜歡藝人的自傳。"},{"w":"convention","p":"[kənˈvenʃən] n.","d":"A convention is behavior that is considered to be common or polite.","e":"In the US, a popular convention is to shake hands when you meet someone.","zh":"(名) 習俗；慣例　(名) 會議；大會","ez":"在美國，常見的習俗是見面時握手。"},{"w":"gracious","p":"[ˈgreiʃəs] adj.","d":"If someone is gracious, then they are kind and helpful to those who need it.","e":"The operator was gracious enough to help me find his number.","zh":"(形) 親切的；有禮貌的　(形) 優雅的；高貴的","ez":"接線生很親切地幫我找到了他的號碼。"},{"w":"improve","p":"[imˈpruːv] v.","d":"To improve something means to make it better.","e":"He studied hard to improve his test scores from the previous year.","zh":"(動) 改善；改進　(動) 進步；提高","ez":"他努力讀書，希望比去年提高考試成績。"},{"w":"insulate","p":"[ˈinsəleit] v.","d":"To insulate something means to protect it from heat, cold, or noise.","e":"People can conserve energy by insulating their houses.","zh":"(動) 隔離；使孤立　(動) 絕緣；隔熱","ez":"人們可以透過房屋隔熱來節約能源。"},{"w":"intrigue","p":"[inˈtriːg] v.","d":"To intrigue means to cause an interest in something or someone.","e":"Her mysterious past intrigued her new friend.","zh":"(動) [In`trig] 引起興趣；吸引　激起好奇心　(名) [`Intrig] 陰謀；詭計","ez":"她神祕的過去引起了新朋友的好奇。"},{"w":"longevity","p":"[lɒnˈdʒevəti] n.","d":"Longevity is the ability to live for a long time.","e":"Sea turtles have an amazing longevity.","zh":"(名) 長壽；長命　(名) 壽命；生命期限","ez":"海龜的壽命非常長。"},{"w":"misplace","p":"[misˈpleis] v.","d":"To misplace something means to lose it.","e":"I misplaced my wallet, and I didn&rsquo;t find it until a week later.","zh":"(動) 放錯地方；遺失　(動) 弄丟；找不到","ez":"我把錢包放錯地方，一個星期後才找到。"},{"w":"naughty","p":"[ˈnɔːti] adj.","d":"When children are naughty, they behave badly or do not do what they are told.","e":"The boy had to go to his room because he was being naughty.","zh":"(形) 調皮的；淘氣的　(形) 不聽話的；頑皮的","ez":"那個男孩因為調皮，所以被叫回房間。"},{"w":"norm","p":"[nɔːrm] n.","d":"A norm is a way of behaving that is considered normal in a particular society.","e":"Wearing a heavy coat all summer is not considered a norm in the desert.","zh":"(名) 準則；規範　(名) 常態；標準","ez":"在沙漠裡，整個夏天穿厚外套並不算是常態。"},{"w":"orangutan","p":"[ɔ:ˈræŋuˈtæn] n.","d":"An orangutan is a large ape with red and brown hair and long arms.","e":"Orangutans use their long arms to swing from trees.","zh":"紅毛猩猩","ez":"紅毛猩猩用長臂在樹間擺盪。"},{"w":"overload","p":"[ˌouvərˈloud] v.","d":"To overload something means to put more things into it than it is meant to hold.","e":"If you overload the truck, it might crash.","zh":"(名) 超載；負荷過重　(動) 使超載；使負荷過重","ez":"如果你讓卡車超載，它可能會翻車。"},{"w":"philanthropy","p":"[fiˈlænθrəpi] n.","d":"Philanthropy is the act of helping others, without wanting anything in return.","e":"The wealthy business owner is well known for his acts of philanthropy.","zh":"(名) 慈善；慈善事業","ez":"那位富有的企業主以慈善行為聞名。"},{"w":"probe","p":"[proub] v.","d":"To probe into something means to ask questions to discover facts about it.","e":"The bank probed into his financial history to see if he qualified for a loan.","zh":"(動) 探究；探測　(名) 探針；調查","ez":"銀行調查他的財務紀錄，看他是否符合貸款資格。"},{"w":"recipient","p":"[riˈsipiənt] n.","d":"A recipient of something is the person who receives it.","e":"I was the recipient of four phone calls today.","zh":"(名) 接受者；得主","ez":"我今天總共接了四通電話。"},{"w":"reptile","p":"[ˈreptail] n.","d":"A reptile is a cold-blooded animal that lays eggs and has skin covered with scales.","e":"Lizards are my favorite type of reptile.","zh":"(名) 爬蟲類動物","ez":"蜥蜴是我最喜歡的爬蟲類。"},{"w":"thrive","p":"[θraiv] v.","d":"To thrive means to do well and be successful, healthy, or strong.","e":"He may be an old man, but he continues to thrive.","zh":"(動) 茁壯成長；蓬勃發展","ez":"他雖然年紀大了，但依然活得很有活力。"},{"w":"ultimate","p":"[ˈʌltəmit] adj.","d":"When something is ultimate, it is the final result or aim of a long series of events.","e":"By trying hard in school, I will reach my ultimate goal of becoming a doctor.","zh":"(形) 最終的；極致的","ez":"只要在學校努力，我就能達成當醫生的終極目標。"}]},{"id":29,"name":"Unit 29","words":[{"w":"antique","p":"[ænˈtiːk] adj.","d":"If something is antique, it is very old and rare, and therefore valuable.","e":"My grandmother&rsquo;s antique rocking chair is worth a lot of money.","zh":"(形) 古老的；古董的　(名) 古董；古物","ez":"我奶奶的古董搖椅價值不菲。"},{"w":"applicant","p":"[ˈæplikənt] n.","d":"An applicant is someone who writes a request to be considered for a job or prize.","e":"Lots of applicants came into the store when the job position became available.","zh":"(名) 申請人；求職者　(名) 應試者；考生","ez":"那個職缺一開放，就有很多應徵者來到店裡。"},{"w":"artifact","p":"[ˈɑːrtəfækt] n.","d":"An artifact is an old object made by humans that is historically interesting.","e":"We studied artifacts from an ancient Chinese settlement.","zh":"(名) 人造物品；手工製品　(名) 考古遺物；古器物","ez":"我們研究了一個古代中國聚落的文物。"},{"w":"authentic","p":"[ɔːˈθentik] adj.","d":"When something is authentic, it is not false or a copy of the original.","e":"We ate authentic Italian food on our vacation to Rome.","zh":"(形) 真正的；道地的　(形) 可信的；可靠的","ez":"我們在羅馬度假時吃了道地的義大利菜。"},{"w":"chronology","p":"[krəˈnɒlədʒi] n.","d":"The chronology of a series of past events is when they happened.","e":"We learned the chronology of World War II in history class.","zh":"(名) 年代順序；時間順序　(名) 按時間順序排列的歷史事件記錄","ez":"我們在歷史課上學到了第二次世界大戰的 chronology。"},{"w":"diplomat","p":"[ˈdipləmæt] n.","d":"A diplomat is a representative of a country who works with another country.","e":"The Spanish diplomat discussed trade issues with officials in Peru.","zh":"(名) 外交官；外交家　(形) 圓滑的；策略性的","ez":"那位西班牙外交官與祕魯官員討論貿易問題。"},{"w":"epic","p":"[ˈepik] n.","d":"An epic is a long book, poem, or movie about a period of time or a great event.","e":"The poet wrote an epic about the great discoveries of the past thousand years.","zh":"(形) 史詩般的；壯大的　(名) 史詩；偉大的事蹟","ez":"詩人寫了一首關於過去千年重大發現的史詩。"},{"w":"excerpt","p":"[ˈeksəːrpt] n.","d":"An excerpt is a short piece of writing or music taken from a larger piece.","e":"I didn&rsquo;t listen to the entire symphony online, but I did play an excerpt.","zh":"(名) [ˈɛksɝpt] 摘錄；節錄　(動) [ɪkˈsɝpt] 摘取；引用","ez":"我沒有在網路上聽完整部交響曲，但我聽了一段選曲。"},{"w":"fossil","p":"[ˈfɒsl] n.","d":"A fossil is the hard remains of a prehistoric animal or plant.","e":"The expert arranged the fossils to build the skeleton of the dinosaur.","zh":"(名) 化石；遺跡　(形) 陳舊的；過時的","ez":"專家排列化石，拼出恐龍的骨架。"},{"w":"humiliate","p":"[hjuːˈmilieit] v.","d":"To humiliate someone means to make them feel ashamed and embarrassed.","e":"I was humiliated when I tripped and fell down in front of the whole school.","zh":"(動) 使蒙羞；羞辱　(動) 貶低；使感到羞愧","ez":"我在全校面前絆倒摔跤，覺得很丟臉。"},{"w":"lyric","p":"[ˈlirik] adj.","d":"When a poem is considered lyric, it is written in a simple and direct style.","e":"I enjoy reading and creating my own lyric poetry.","zh":"(名) 歌詞；抒情詩　(形) 抒情的；富有感情的","ez":"我喜歡閱讀和創作自己的抒情詩。"},{"w":"majesty","p":"[ˈmædʒisti] n.","d":"Majesty is supreme greatness or authority.","e":"You should address the king and queen as your majesty.","zh":"(名) 威嚴；莊嚴　(名) 陛下；皇帝","ez":"你應該稱呼國王和女王為「陛下」。"},{"w":"monarch","p":"[ˈmɒnark] n.","d":"The monarch of a country is the king, queen, emperor, or empress.","e":"The monarch lived in a beautiful palace with a grand gate.","zh":"(名) 君主；統治者　(名) 帝王蝶","ez":"君主住在一個有宏偉大門的美麗宮殿裡。"},{"w":"precede","p":"[priˈsiːd] v.","d":"To precede something means to come before it.","e":"The hurricane was preceded by a moment of still wind and clear sky.","zh":"(動) 在...之前發生；領先","ez":"颶風來臨前，有一段風平浪靜、天空晴朗的時刻。"},{"w":"punctual","p":"[ˈpʌŋktjuəl] adj.","d":"When someone is punctual, they do something or arrive at the right time.","e":"My mother hates being late. She is the most punctual person I know.","zh":"(形) 準時的；守時的","ez":"我媽媽討厭遲到，她是我認識最守時的人。"},{"w":"recruit","p":"[riˈkruːt] v.","d":"To recruit people means to select them to join or work for an organization.","e":"We successfully recruited someone to be the new manager.","zh":"(動) 招募；徵募","ez":"我們成功招募到一位新經理。"},{"w":"refund","p":"[ˈriːfʌnd] n.","d":"A refund is money given back to a person when an item is returned to a store.","e":"I asked for a refund because the shoes I bought were too tight.","zh":"(名) ['riˌfʌnd] 退款　(動) [rɪ'fʌnd] 退還；退款","ez":"我要求退款，因為買的鞋子太緊了。"},{"w":"register","p":"[ˈredʒəstə:r] n.","d":"A register is an official list or record of people or things.","e":"At a wedding there is register for all of the guests to sign.","zh":"(動) 登記；註冊","ez":"婚禮上有一本簽名簿，讓所有賓客簽名。"},{"w":"renown","p":"[riˈnaun] n.","d":"Renown is the quality of being well known due to having done good things.","e":"Michael is a singer of great renown in New Zealand.","zh":"名譽；聲望；聲譽","ez":"麥可是紐西蘭一位聲譽很高的歌手。"},{"w":"tusk","p":"[tʌsk] n.","d":"A tusk is a long, curved, pointed tooth of an elephant, boar, or walrus.","e":"Sadly, some people hunt elephants and remove their tusks to sell them.","zh":"長牙","ez":"可悲的是，有些人獵殺大象並拔掉牠們的象牙去賣。"}]},{"id":30,"name":"Unit 30","words":[{"w":"burden","p":"[ˈbəːrdn] n.","d":"A burden is a serious or difficult responsibility.","e":"Children who do not behave are a burden to their parents.","zh":"(名) 負擔；重擔　(動) 使負擔；使承受","ez":"不聽話的小孩對父母來說是個負擔。"},{"w":"compromise","p":"[ˈkɒmprəmaiz] v.","d":"To compromise is to agree to something that is not exactly what you want.","e":"We both compromised about the game we decided to play.","zh":"(動) 妥協；折衷　(名) 妥協；讓步","ez":"我們雙方妥協，決定要玩什麼遊戲。"},{"w":"craft","p":"[kræft] v.","d":"To craft something is to make it using skill.","e":"She crafted the bookcase out of solid pine wood and then painted it.","zh":"(名) 工藝；手工藝　(動) 精心製作；手工製造","ez":"她用實心松木做了書櫃，然後上了漆。"},{"w":"crook","p":"[kruk] n.","d":"A crook is someone who is not honest or who commits crimes.","e":"The manager was arrested by the police for being a crook.","zh":"(名) 騙子；壞人　(名) 彎曲的東西；彎柄　(動) 彎曲；彎起","ez":"那位經理因為是個騙子而被警方逮捕。"},{"w":"currency","p":"[ˈkə:rənsi] n.","d":"Currency is the form of money used in a certain place.","e":"Elizabeth had to exchange her dollars for foreign currency.","zh":"(名) 貨幣；通貨　(名) 流通；現行","ez":"伊莉莎白必須把她的美元兌換成外幣。"},{"w":"enigma","p":"[iˈnigmə] n.","d":"An enigma is someone or something that is mysterious or hard to understand.","e":"The theft of the paintings is an enigma to the investigators.","zh":"(名) 謎；神秘的人或事","ez":"那些畫作被偷，對調查人員來說是個謎。"},{"w":"fragile","p":"[ˈfrædʒəl] adj.","d":"When people or things are fragile, they are not strong and can be damaged easily.","e":"The fragile glassware was carefully packed into boxes.","zh":"(形) 易碎的；脆弱的　(形) 虛弱的；柔弱的","ez":"易碎的玻璃器皿被小心地裝進箱子裡。"},{"w":"hybrid","p":"[ˈhaibrid] n.","d":"A hybrid is a mixture of different things or styles.","e":"In Greek mythology, a centaur is a hybrid of a man and a horse.","zh":"(名) 混合物；混種動物　(形) 混合的；雜交的","ez":"在希臘神話中，半人馬是人與馬的混合體。"},{"w":"innocence","p":"[ˈinəsns] n.","d":"Innocence is a lack of experience of difficult or complex things in life.","e":"Everyone who met her found her innocence to be charming.","zh":"(名) 天真；無辜　(形) 純潔的；無罪的","ez":"每個見過她的人都覺得她的天真很迷人。"},{"w":"merge","p":"[məːrdʒ] v.","d":"To merge two things is to combine them into one whole thing.","e":"The storm clouds merged into one large menacing cloud that filled the sky.","zh":"(動) 合併；融合　(名) 合併；融合","ez":"暴風雲聚集成一大片威脅性的烏雲，布滿了天空。"},{"w":"moderate","p":"[ˈmɒdəreit] adj.","d":"When something is moderate, it is not too big or too small in size or amount.","e":"It takes a moderate amount of patience to be around small children all day.","zh":"(形) [ˋmɑdərɪt] 適度的；溫和的　(動) [ˋmɑdəˌret] 減輕；調和","ez":"整天跟小孩子在一起需要適度的耐心。"},{"w":"overwhelm","p":"[ˌouvərhˈwelm] v.","d":"To overwhelm is to exist in such a large amount that someone cannot deal with it.","e":"The amount of homework her teacher assigned has overwhelmed her.","zh":"(動) [ˌovɚˈwɛlm] 壓垮；淹沒　(名) ['ovɚˌwɛlm] 壓倒；征服","ez":"老師指派給她的作業量讓她吃不消。"},{"w":"perception","p":"[pərˈsepʃən] n.","d":"A perception of a situation is a way of thinking about it or understanding it.","e":"Since he couldn&rsquo;t see, his perception of life was much different than mine.","zh":"(名) 知覺；看法","ez":"因為他看不見，他對生活的感受跟我很不一樣。"},{"w":"reunion","p":"[riːˈjuːnjən] n.","d":"A reunion is the meeting of people or things that have been separated.","e":"Every summer we have a family reunion at the lake.","zh":"(名) 團聚；同學會","ez":"每年夏天我們都會在湖邊舉辦家庭聚會。"},{"w":"rig","p":"[rig]
