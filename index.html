n down.","e":"He dictated his speech so his secretary could write it down.","zh":"(動) 口述；聽寫　(動) 規定；命令","ez":"他口述演講內容，讓秘書記下來。"},{"w":"edge","p":"[edʒ] n.","d":"The edge of something is the part of it that is farthest from the center.","e":"He ran to the edge of the cliff.","zh":"(名) 邊緣；邊界　(動) 慢慢移動；靠近　(形) 銳利的；尖銳的","ez":"他跑到懸崖邊緣。"},{"w":"path","p":"[pɑːθ] n.","d":"A path is a way from one place to another that people can walk along.","e":"We followed a path through the woods.","zh":"(名) 路徑；小徑","ez":"我們沿著一條小路穿過樹林。"},{"w":"resort","p":"[rɪˈzɔːt] v.","d":"To resort to something is to depend on it in order to solve a problem.","e":"I hope they don&rsquo;t resort to violence to end the argument.","zh":"(名) 手段；度假地　(動) 訴諸；求助","ez":"我希望他們不要用暴力來結束爭論。"},{"w":"shadow","p":"[ˈʃædəʊ] n.","d":"A shadow is the dark area that is made when something blocks light.","e":"The man&rsquo;s shadow was taller than he was.","zh":"(名) 影子；陰影　(動) 跟蹤；遮蔽","ez":"那個男人的影子比他本人還高。"},{"w":"succeed","p":"[səkˈsiːd] v.","d":"To succeed is to complete something that you planned or tried to do.","e":"He will continue to work on the robot until he succeeds.","zh":"(動) 成功；接替","ez":"他會繼續研究機器人，直到成功為止。"},{"w":"suspect","p":"[səsˈpekt] v.","d":"To suspect something is to believe that it is true.","e":"I suspect that those kids stole the money.","zh":"(動) [səˋspɛkt] 懷疑；猜想　(名) [ˋsʌspɛkt] 嫌疑犯","ez":"我懷疑那些小孩偷了錢。"},{"w":"valley","p":"[ˈvælɪ] n.","d":"A valley is a low area of land between two mountains or hills.","e":"We looked at the valley below from the top of the mountain.","zh":"(名) 山谷；峽谷","ez":"我們從山頂俯瞰下方的山谷。"}]},{"id":9,"name":"Unit 9","words":[{"w":"admire","p":"[ədˈmaɪə:r] v.","d":"To admire someone is to like them for what they do.","e":"I admire my brother for his hard work.","zh":"(動) 欣賞；讚美　(動) 仰慕；崇拜","ez":"我佩服哥哥的努力工作。"},{"w":"aid","p":"[eɪd] v.","d":"To aid someone is to help them when they need something.","e":"The doctor aided the boy after his accident.","zh":"(名) 援助；幫助　(動) 幫助；協助","ez":"醫生在男孩發生意外後幫助了他。"},{"w":"attempt","p":"[əˈtempt] v.","d":"To attempt something is to try to do that thing.","e":"I am attempting to learn English.","zh":"(動) 嘗試；試圖　(名) 嘗試；企圖","ez":"我正在嘗試學英文。"},{"w":"authority","p":"[əˈθɒːrətɪ] n.","d":"Authority is the power that someone has because of their position.","e":"The policeman has authority on the streets.","zh":"(名) 權力；權威　(名) 專家；權威人士","ez":"警察在街上有執法權力。"},{"w":"capital","p":"[ˈkæpɪtl] n.","d":"A capital is an important city where a country’s leaders live and work.","e":"&nbsp;We will visit the capital to learn about our government.","zh":"(名) 首都；資本　(形) 主要的；大寫的","ez":"我們將參訪首都，了解我們的政府。"},{"w":"cooperate","p":"[koʊˈɒpəreɪt] v.","d":"To cooperate is to work together to do something.","e":"The students cooperated to clean up the classroom.","zh":"(動) 合作；協力　(動) 配合；協助","ez":"學生們合作打掃教室。"},{"w":"defend","p":"[dɪˈfend] v.","d":"To defend someone or something is to protect them from attack.","e":"The soldiers defended the town from the invaders.","zh":"(動) 保護；防守　(動) 為...辯護；維護","ez":"士兵們保衛城鎮，抵禦入侵者。"},{"w":"destruction","p":"[dɪsˈtrʌkʃən] n.","d":"Destruction is damage to something so bad that it can’t be fixed.","e":"After the big fire, there was much destruction in the city.","zh":"(名) 破壞；毀滅　(名) 被破壞的狀態；廢墟","ez":"大火過後，城市遭受嚴重破壞。"},{"w":"disorder","p":"[dɪsˈɔːrdər] n.","d":"Disorder is a lack of order, or a complete mess.","e":"The teacher&rsquo;s desk had many papers in disorder.","zh":"(名) 混亂；紊亂　(動) 使混亂；擾亂　(名) 疾病；失調","ez":"老師的桌上亂七八糟地堆滿了紙張。"},{"w":"division","p":"[dɪˈvɪʒən] n.","d":"A division is the act of making smaller groups out of a larger one.","e":"The chart had six divisions which all had different colors.","zh":"(名) 分裂；分割　(名) 部門；科室","ez":"圖表分成六個部分，各有不同顏色。"},{"w":"enable","p":"[ɪˈneɪbl] v.","d":"To enable a person is to make it possible for them to do something.","e":"Having the key enabled us to open the door.","zh":"(動) 使能夠；使可能　(動) 提供便利；方便","ez":"有了鑰匙，我們才能打開門。"},{"w":"frustrate","p":"[frʌsˈtreɪt] v.","d":"To frustrate is to prevent someone from fulfilling their desire.","e":"The machine frustrated me because I could not fix it.","zh":"(動) 使感到沮喪；挫折　(動) 阻止；破壞","ez":"那台機器讓我感到挫折，因為我修不好它。"},{"w":"govern","p":"[ˈgʌvən] v.","d":"To govern is to control the public business of a country, state, or city.","e":"The United States is governed from the White House.","zh":"(動) 統治；管理　(動) 控制；影響","ez":"美國由白宮治理。"},{"w":"plenty","p":"[ˈplentɪ] n.","d":"To have plenty of something is to have more than you need.","e":"The school had plenty of books for the students to read.","zh":"(代) 充足；大量　(形) 許多的；足夠的","ez":"學校有足夠的書讓學生閱讀。"},{"w":"relieve","p":"[rɪˈliːv] v.","d":"To relieve someone is to make them feel less pain.","e":"The medicine relieved the sick boy.","zh":"(動) 減輕；緩解","ez":"藥物讓生病的男孩舒服多了。"},{"w":"reputation","p":"[ˌrepjəˈteɪʃən] n.","d":"Reputation is the opinion that people have about someone.","e":"The doctor had a reputation for helping people.","zh":"(名) 名聲；聲譽","ez":"那位醫生以幫助他人聞名。"},{"w":"royal","p":"[ˈrɔɪəl] adj.","d":"Royal describes something that belongs to a king or queen.","e":"The king sat upon the royal throne.","zh":"(形) 皇家的；王室的","ez":"國王坐在皇家寶座上。"},{"w":"slave","p":"[sleɪv] n.","d":"A slave is a person who is not free and must work for someone else.","e":"The slave worked very hard all day long.","zh":"(名) 奴隸","ez":"奴隸整天非常努力工作。"},{"w":"struggle","p":"[ˈstrʌgəl] v.","d":"To struggle is to fight against someone or something.","e":"The kids struggled with each other for the toy.","zh":"(動) 奮鬥；努力　(名) 掙扎；鬥爭","ez":"孩子們為了玩具互相爭搶。"},{"w":"stupid","p":"[ˈstjuːpɪd] adj.","d":"When someone is stupid, they lack intelligence.","e":"He said something stupid that made everyone angry at him.","zh":"(形) 愚蠢的；笨的","ez":"他說了些蠢話，讓大家都生他的氣。"}]},{"id":10,"name":"Unit 10","words":[{"w":"citizen","p":"[ˈsɪtəzən] n.","d":"A citizen is someone who lives in a certain town or city.","e":"Carlos was born in Spain. He is a Spanish citizen.","zh":"(名) 公民；市民　(名) 國民；公民身份","ez":"卡洛斯在西班牙出生，他是西班牙公民。"},{"w":"council","p":"[ˈkaunsəl] n.","d":"A council is a group of people who run a city or town.","e":"The council met to discuss the new laws for the city.","zh":"(名) 議會；委員會　(動) 勸告；建議","ez":"議會開會討論城市的新法律。"},{"w":"declare","p":"[dɪˈklɛər] v.","d":"To declare is to say something officially.","e":"I declared my love for him.","zh":"(動) 宣布；聲明　(動) 申報；說明","ez":"我向他表白了我的愛。"},{"w":"enormous","p":"[ɪˈnɔːrməs] adj.","d":"When people or things are enormous, they are very large.","e":"My dog looks enormous next to yours.","zh":"(形) 巨大的；龐大的　(形) 極多的；大量的","ez":"我的狗在你旁邊顯得巨大。"},{"w":"extraordinary","p":"[ikˈstroːrdənəri] adj.","d":"When someone or something are extraordinary, they are amazing.","e":"The fireman who rescued the girl was extraordinary.","zh":"(形) 非凡的；特別的　(形) 異常的；極其的","ez":"救出那個女孩的消防員非常了不起。"},{"w":"fog","p":"[fo(:)g] n.","d":"Fog is a thick cloud that is near the ground or water.","e":"I did not want to drive in the thick fog.","zh":"(名) 霧；霧氣　(動) 使模糊；籠罩","ez":"我不想在濃霧中開車。"},{"w":"funeral","p":"[ˈfjuːnərəl] n.","d":"A funeral is a ceremony that takes place after a person dies.","e":"They had a funeral for the soldier who died during the war.","zh":"(名) 葬禮；喪禮　(形) 與葬禮有關的；哀悼的","ez":"他們為戰死的士兵舉行了葬禮。"},{"w":"giant","p":"[ˈdʒaɪənt] adj.","d":"When people or things are giant, they are very big.","e":"The giant truck got in my way.","zh":"(名) 巨人；龐然大物　(形) 巨大的；偉大的","ez":"那輛大卡車擋住了我的路。"},{"w":"impression","p":"[ɪmˈpreʃən] n.","d":"An impression is the way of thinking about someone or something.","e":"Most people&rsquo;s first impression of Dr. Giani is that he is mean.","zh":"(名) 印象；感受　(名) 影響；效果","ez":"大部分人對賈尼醫生的第一印象是他很刻薄。"},{"w":"income","p":"[ˈɪnkʌm] n.","d":"Income is how much money a person or business makes.","e":"Her company pays her a fairly good income.","zh":"(名) 收入；所得　(名) 進來的金錢","ez":"她的公司付給她相當不錯的薪水。"},{"w":"mad","p":"[mæd] adj.","d":"When someone is mad, they are angry.","e":"Mother got mad when I didn&rsquo;t listen to her.","zh":"(形) 生氣的；憤怒的　(形) 瘋狂的；發瘋的","ez":"我沒聽媽媽的話，她生氣了。"},{"w":"ought","p":"[ɔːt] aux. v.","d":"If someone ought to do something, then it is the right thing to do.","e":"I ought to take my library books back.","zh":"(助動) 應該","ez":"我應該把圖書館的書還回去。"},{"w":"resist","p":"[rɪˈzɪst] v.","d":"To resist something is to fight against it.","e":"He resisted the treatment at the hospital.","zh":"(動) 抵抗；抗拒","ez":"他抗拒醫院的治療。"},{"w":"reveal","p":"[rɪˈviːl] v.","d":"To reveal is to show something.","e":"I will reveal where I hid the candy bar.","zh":"(動) 揭露；透露","ez":"我會透露我把巧克力棒藏在哪裡。"},{"w":"rid","p":"[rɪd] v.","d":"To rid is to make a place free from something or someone.","e":"We rid our home of mice by using traps.","zh":"(動) 使擺脫；消除","ez":"我們用捕鼠器清除了家中的老鼠。"},{"w":"sword","p":"[sɔːrd] n.","d":"A sword is a long sharp weapon.","e":"They used to use swords in battles in ancient times.","zh":"(名) 劍；刀","ez":"古時候他們在戰鬥中使用劍。"},{"w":"tale","p":"[teɪl] n.","d":"A tale is a story.","e":"She told her two friends about the wild tale of her day.","zh":"(名) 故事；傳說","ez":"她跟兩個朋友講述了她那天離奇的經歷。"},{"w":"trap","p":"[træp] v.","d":"To trap people or animals is to capture them so they cannot get away.","e":"We trapped butterflies in a net.","zh":"(名) 陷阱；圈套　(動) 設陷阱捕捉；困住","ez":"我們用網子捕捉蝴蝶。"},{"w":"trial","p":"[ˈtraiəl] n.","d":"A trial is the way a court discovers if a person is guilty or innocent.","e":"He went on trial for robbing the bank.","zh":"(名) 試驗；審判　(動) 測試","ez":"他因搶劫銀行而受審。"},{"w":"violent","p":"[ˈvaɪələnt] adj.","d":"When people are violent, they want to hurt someone.","e":"The man was put into jail because he was violent.","zh":"(形) 暴力的；猛烈的","ez":"那個男人因為暴力行為被關進監獄。"}]},{"id":11,"name":"Unit 11","words":[{"w":"admission","p":"[ədˈmɪʃən] n.","d":"Admission is the act of allowing to enter a place.","e":"The admission ticket to the movie was $5.","zh":"(名) 錄取；入學　(名) 承認；招認","ez":"電影票是五美元。"},{"w":"astronomy","p":"[əsˈtrɒnəmɪ] n.","d":"Astronomy is the study of the stars and planets.","e":"Harold loved watching the stars, so he decided to study astronomy.","zh":"(名) 天文學；星象學","ez":"哈洛德喜歡看星星，所以他決定學天文學。"},{"w":"blame","p":"[bleɪm] v.","d":"To blame someone for something bad is to say they did it.","e":"My mom blamed me for something I didn&rsquo;t do.","zh":"(動) 責備；指責　(名) 責任；過錯","ez":"我媽因為我沒做過的事責怪我。"},{"w":"chemistry","p":"[ˈkemɪstrɪ] n.","d":"Chemistry the study of and reaction to substances.","e":"In chemistry class, the professor taught us about chemical reactions.","zh":"(名) 化學；化學變化","ez":"在化學課上，教授教我們化學反應。"},{"w":"despite","p":"[dɪsˈpaɪt] prep.","d":"If something happens despite what you do, it happens anyway.","e":"We still played the game despite the cold weather.","zh":"(介) 儘管；雖然　(名) 怨恨；惡意","ez":"儘管天氣很冷，我們還是玩了遊戲。"},{"w":"dinosaur","p":"[ˈdaɪnəsɔːr] n.","d":"A dinosaur is a very big animal that lived millions of years ago.","e":"I like to see the dinosaur bones at the museum.","zh":"(名) 恐龍；史前巨大爬蟲類","ez":"我喜歡在博物館看恐龍骨頭。"},{"w":"exhibit","p":"[ɪgˈzɪbɪt] n.","d":"An exhibit is a display of interesting things.","e":"There was an animal exhibit at the fair.","zh":"(動) 展出；展覽　陳列；表現　(名) 展品；展覽物","ez":"博覽會上有一個動物展覽。"},{"w":"fame","p":"[feɪm] n.","d":"Fame is reputation one has gained among the public.","e":"He had fame and fortune, but he was not happy.","zh":"(名) 名聲；名氣　(名) 聲譽；成名","ez":"他名利雙收，但並不快樂。"},{"w":"forecast","p":"[ˈfɔrˌkæst] n.","d":"A forecast is an idea about what the weather will be like in the future.","e":"The forecast says that it will rain all week.","zh":"(動) [fɔrˈkæst] 預報；預測　(名) [ˈfɔrˌkæst] 預報；預測","ez":"氣象預報說會下一個星期的雨。"},{"w":"genius","p":"[ˈdʒiːnjəs] n.","d":"A genius is a very smart person.","e":"Since she was a genius, she easily passed all of her school exams.","zh":"(名) 天才；天賦　(形) 極具才華的；聰慧的","ez":"因為她是天才，所以學校考試都輕鬆過關。"},{"w":"gentle","p":"[ˈdʒentl] adj.","d":"Someone who is gentle is kind and calm.","e":"He is very gentle with the baby.","zh":"(形) 溫柔的；和藹的　(形) 輕微的；不強烈的","ez":"他對寶寶非常溫柔。"},{"w":"geography","p":"[dʒɪˈɒgrəfɪ] n.","d":"Geography is the study of where things are.","e":"I had to draw a map for geography class.","zh":"(名) 地理；地理學　(名) 地形；地勢","ez":"我必須為地理課畫一張地圖。"},{"w":"interfere","p":"[ˌɪntəˈfɪər] v.","d":"To interfere is to cause problems and keep something from happening.","e":"My little sister always interferes when I&rsquo;m trying to study.","zh":"(動) 干擾；妨礙　(動) 介入；插手","ez":"我妹妹總是在我試著讀書時打擾我。"},{"w":"lightly","p":"[ˈlaɪtlɪ] adv.","d":"To do something lightly is to not push very hard.","e":"Draw lightly so you do not tear your paper.","zh":"輕輕地；稍稍地；稍微；烹調；下；嫩；炒；地；輕鬆地；隨便地；不嚴肅地","ez":"輕輕畫，才不會把紙弄破。"},{"w":"principal","p":"[ˈprɪnsəpəl] n.","d":"A principal is a person in charge of a school.","e":"My school&rsquo;s principal can be very strict with the rules.","zh":"(名) 校長；（形）主要的","ez":"我們學校的校長對規定非常嚴格。"},{"w":"row","p":"[rou] n.","d":"A row is a line of things.","e":"James put all of his toy soldiers into neat rows.","zh":"(動) 划船；　(名) 一排；一行","ez":"詹姆斯把他所有的玩具士兵排成整齊的行列。"},{"w":"shelf","p":"[ʃelf] n.","d":"A shelf is a place on a wall where you put things.","e":"I keep my clothes on a shelf in my closet.","zh":"(名) 架子；層架","ez":"我把衣服放在衣櫃的架子上。"},{"w":"spite","p":"[spaɪt] n.","d":"If you do something out of spite, you want to be mean.","e":"He snuck into his sister&rsquo;s room and stole her bag out of spite.","zh":"(名) 惡意；怨恨","ez":"他出於惡意潛進妹妹的房間，偷了她的包包。"},{"w":"super","p":"[ˈsuːpər] adj.","d":"Super means really good.","e":"My dad said I did a super Job cleaning the house.","zh":"(形) 超級的；極好的　(副) 非常；極度地","ez":"我爸說我打掃房子做得超棒。"},{"w":"wet","p":"[wet] adj.","d":"If something is wet, it has water on it.","e":"Since my dog was wet, he tried to shake all the water off his body.","zh":"(形) 潮濕的；下雨的　(動) 弄濕","ez":"因為我的狗濕了，牠試著甩掉身上的水。"}]},{"id":12,"name":"Unit 12","words":[{"w":"abuse","p":"[əˈbjuːz] v.","d":"To abuse someone or something means to hurt them on purpose.","e":"The mean man abused his dog when it barked too loudly.","zh":"(名) [ə'bjus] 濫用；虐待　(動) [ə'bjuz] 濫用；虐待","ez":"那個壞心的男人在狗叫太大聲時虐待牠。"},{"w":"afford","p":"[əˈfɔːrd] v.","d":"To afford something means you have enough money to pay for it.","e":"I&rsquo;ve been saving my money, so I can afford to buy a new bike.","zh":"(動) 負擔得起；買得起　(動) 提供；給予","ez":"我一直在存錢，所以能買得起一輛新腳踏車。"},{"w":"bake","p":"[beɪk] v.","d":"To bake means to cook food with heat.","e":"My sister is a good cook. She bakes delicious cakes.","zh":"(動) 烘烤；烤　(名) 烘烤；烤製","ez":"我姊姊很會做菜。她烤的蛋糕很好吃。"},{"w":"bean","p":"[bi:n] n.","d":"A bean is a plant seed that is good to eat.","e":"There are many different kinds of beans to eat.","zh":"(名) 豆；豆類　(名) 豆莢","ez":"有很多不同種類的豆子可以吃。"},{"w":"candle","p":"[ˈkændl] n.","d":"A candle is a stick of wax that is lit on fire for light or heat.","e":"When the lights went out, we lit some candles.","zh":"(名) 蠟燭；燭光","ez":"燈熄掉時，我們點了一些蠟燭。"},{"w":"convert","p":"[kənˈvəːrt] v.","d":"To convert something means to change it into something else.","e":"The man converted his messy field into a garden of flowers.","zh":"(名) ['kɑnvɝt] 改宗者；轉換者　(動) [kən'vɝt] 轉換；改變；使信教","ez":"那個男人把他亂七八糟的田地變成了花園。"},{"w":"debt","p":"[det] n.","d":"A debt is an amount of money that a person owes.","e":"I have not paid my gas bill. I owe a debt to the gas company.","zh":"(名) 債務；欠債　(動) 欠債；負債","ez":"我還沒付瓦斯費。我欠瓦斯公司一筆錢。"},{"w":"decrease","p":"[ˈdiːkriːs] v.","d":"To decrease something is to make it less than it was before.","e":"Hiring more police officers has decreased crime in the city.","zh":"(動) [dɪˈkris] 減少；降低　(名) [ˈdikris] 減少；下降","ez":"雇用更多警察讓城市的犯罪率降低了。"},{"w":"fault","p":"[fɔːlt] n.","d":"A fault is a mistake.","e":"It is my fault that the cat ran away. I left the door open.","zh":"(名) 過錯；缺點　(動) 挑剔；批評","ez":"貓跑掉是我的錯。我讓門開著。"},{"w":"fund","p":"[fʌnd] n.","d":"A fund is an amount of money that people have.","e":"We all put money into our club&rsquo;s fund.","zh":"(名) 基金；資金　(動) 資助；提供資金","ez":"我們都把錢放進社團的基金裡。"},{"w":"generous","p":"[ˈdʒenərəs] adj.","d":"When someone is generous, they like to give things to people.","e":"The generous man donated several new computers to our school.","zh":"(形) 慷慨的；大方的　(形) 豐富的；充足的","ez":"那個慷慨的人捐了好幾台新電腦給我們學校。"},{"w":"ingredient","p":"[ɪnˈgriːdɪənt] n.","d":"An ingredient is something that is part of a food dish.","e":"The main ingredients in cake are eggs, sugar and flour.","zh":"(名) 材料；配料　(名) 要素；成分","ez":"蛋糕的主要成分是雞蛋、糖和麵粉。"},{"w":"insist","p":"[ɪnˈsɪst] v.","d":"To insist means to be firm in telling people what to do.","e":"I insist that you try some of these cookies.","zh":"(動) 堅持；主張　(動) 堅決要求；執意","ez":"我堅持你一定要嚐一些這些餅乾。"},{"w":"mess","p":"[mes] n.","d":"A mess is a condition that is not clean or neat.","e":"Heather&rsquo;s room was a complete mess.","zh":"(名) 混亂；髒亂　(動) 弄亂；弄髒","ez":"希瑟的房間亂得一塌糊塗。"},{"w":"metal","p":"[ˈmetl] n.","d":"Metal is a strong material people use to build things.","e":"Steel is a common metal that is used to build buildings.","zh":"(名) 金屬　(形) 金屬製的；由金屬組成的","ez":"鋼鐵是一種常用來蓋建築物的金屬。"},{"w":"monitor","p":"[ˈmɒnɪtər] v.","d":"To monitor people or things is to watch them closely.","e":"The teacher monitors the students when they take tests.","zh":"(名) 監視器；螢幕　(動) 監控；監測","ez":"老師在學生考試時監視他們。"},{"w":"oppose","p":"[əˈpəʊz] v.","d":"To oppose something means to dislike it or act against it.","e":"I want to be a police officer because I oppose crime.","zh":"(動) 反對；對抗　(動) 相對；相反","ez":"我想當警察，因為我反對犯罪。"},{"w":"passive","p":"[ˈpæsɪv] a.","d":"If a person is passive, they do not take action to solve problems.","e":"Marcie is so passive that she never solves her own problems.","zh":"(形) 被動的；消極的","ez":"瑪西太被動了，從來不自己解決問題。"},{"w":"quantity","p":"[ˈkwɒntətɪ] n.","d":"A quantity is a certain amount of something.","e":"I have a small quantity of milk in my glass.","zh":"(名) 數量；大量","ez":"我杯子裡的牛奶量很少。"},{"w":"sue","p":"[su:] v.","d":"To sue someone is to take them to court for something wrong they did.","e":"I sued the company after I slipped on a banana peel in their hallway.","zh":"(動) 控告；起訴","ez":"我在他們走廊踩到香蕉皮滑倒後，就告了那家公司。"}]},{"id":13,"name":"Unit 13","words":[{"w":"anxiety","p":"[æŋˈzaɪətɪ] n.","d":"When someone has anxiety, they have a lot of worries and fear.","e":"When I have to climb to high places, I&rsquo;m filled with anxiety.","zh":"(名) 焦慮；不安　(名) 擔心；憂慮","ez":"當我必須爬到高處時，我充滿了焦慮。"},{"w":"army","p":"[ˈɑːrmɪ] n.","d":"An army is a large group of people who fight in wars.","e":"The army protects all the people in the country.","zh":"(名) 軍隊；陸軍　(名) 大量；眾多","ez":"軍隊保護國家裡所有的人。"},{"w":"billion","p":"[ˈbɪljən] n.","d":"A billion is a very large number: 1,000,000,000.","e":"There are billions of stars in outer space.","zh":"(名) 十億；十億個","ez":"外太空有數十億顆星星。"},{"w":"carve","p":"[kɑːrv] v.","d":"To carve means to cut into something.","e":"My father usually carves the turkey for Thanksgiving.","zh":"(動) 雕刻；刻畫　(動) 切割；分割","ez":"我爸爸通常在感恩節切火雞。"},{"w":"consult","p":"[kənˈsʌlt] v.","d":"To consult someone means to ask them for help.","e":"I will consult my accountant to find a way to pay for my bills.","zh":"(動) 諮詢；請教　(動) 參考；查閱","ez":"我會諮詢我的會計師，找出付帳單的方法。"},{"w":"emergency","p":"[ɪˈməːrdʒənsɪ] n.","d":"An emergency is a time when someone needs help right away.","e":"There is a huge fire in my house! This is an emergency!","zh":"(名) 緊急情況；緊急事件　(形) 緊急的；應急的","ez":"我家裡發生大火！這是緊急狀況！"},{"w":"fortune","p":"[ˈfɔːrtʃən] n.","d":"When someone has good fortune, it means they have luck.","e":"I have good fortune when I play cards.","zh":"(名) 財富；金錢　(名) 運氣；命運","ez":"我打牌時運氣很好。"},{"w":"guarantee","p":"[ˌgærənˈtiː] v.","d":"To guarantee means to know something will happen.","e":"I guarantee that the sun will come up in the morning.","zh":"(名) 保證；擔保　(動) 保證；確保","ez":"我保證太陽早上會升起來。"},{"w":"hike","p":"[haɪk] v.","d":"To hike means to walk in the mountains or forest.","e":"I always bring plenty of equipment with me when I hike.","zh":"(動) 登山；去郊遊　(名) 登山；郊遊","ez":"我健行時總是帶很多裝備。"},{"w":"initial","p":"[ɪˈnɪʃəl] adj.","d":"When something is initial, it is the first thing.","e":"The initial step when writing a paper is to find a good topic.","zh":"(形) 最初的；開始的　(名) 姓名縮寫；首字母","ez":"寫論文的第一步是找個好主題。"},{"w":"intense","p":"[ɪnˈtens] adj.","d":"If something is intense, it is very strong.","e":"The skunk made an intense odor that filled the air.","zh":"(形) 強烈的；激烈的　(形) 認真的；專注的","ez":"臭鼬發出強烈的氣味，瀰漫在空氣中。"},{"w":"lend","p":"[lend] v.","d":"To lend something is to give it to someone for a short time.","e":"My sister lost her pen, so I will lend her mine.","zh":"(動) 借出；貸款　(名) 借貸；貸款","ez":"我妹妹弄丟了她的筆，所以我會把我的借給她。"},{"w":"peak","p":"[piːk] n.","d":"The peak is the very top of a mountain.","e":"There is snow on the peaks of those mountains.","zh":"(名) 頂點；山峰　(動) 達到頂點　(形) 最高的","ez":"那些山頂上有積雪。"},{"w":"potential","p":"[pəˈtenʃəl] adj.","d":"Potential means capable of being but not yet in existence.","e":"I&rsquo;ve thought of some potential problems with your idea.","zh":"(名) 潛力；可能性　(形) 潛在的；可能的","ez":"我想到你的點子可能有一些潛在問題。"},{"w":"pride","p":"[praɪd] n.","d":"When you have pride, you are happy with yourself.","e":"I take pride in getting good grades.","zh":"(名) 驕傲；自尊　(動) 以...自豪","ez":"我以取得好成績為榮。"},{"w":"proof","p":"[pruːf] n.","d":"Proof is a fact that shows something is real.","e":"They used his fingerprint as proof for the crime he committed.","zh":"(名) 證據；證明","ez":"他們用他的指紋作為他犯罪的證據。"},{"w":"quit","p":"[kwɪt] v.","d":"To quit something means to stop doing it.","e":"I quit running because I got tired.","zh":"(動) 辭去；戒除","ez":"我因為累了而停止跑步。"},{"w":"spin","p":"[spɪn] v.","d":"To spin is to turn around in circles.","e":"The boy kept spinning until he fell down.","zh":"(動) 旋轉；紡紗　(名) 旋轉；兜風","ez":"那個男孩一直轉圈，直到跌倒。"},{"w":"tiny","p":"[ˈtaɪnɪ] adj.","d":"When people or things are tiny, they are very small.","e":"A baby&rsquo;s hand is tiny.","zh":"(形) 極小的；微小的","ez":"嬰兒的手很小。"},{"w":"tutor","p":"[ˈtjuːtər] n.","d":"A tutor is someone who gives lessons in a certain subject.","e":"My sister is bad at math. So my mother hired a tutor to help her.","zh":"(名) 家教；導師　(動) 輔導；當家教","ez":"我妹妹數學不好，所以我媽媽請了家教來幫她。"}]},{"id":14,"name":"Unit 14","words":[{"w":"apparent","p":"[əˈpærənt] adj.","d":"If something is apparent, it is easy to see.","e":"Her happiness was apparent from the smile on her face.","zh":"(形) 明顯的；似乎的　(副) 明顯地；表面上","ez":"她臉上的笑容明顯顯露出她的快樂。"},{"w":"blind","p":"[blaɪnd] adj.","d":"When people are blind, they cannot see.","e":"The blind man didn&rsquo;t see the hole and almost fell in.","zh":"(形) 盲的；看不見的　(動) 使看不見；蒙住眼睛","ez":"那個盲人沒看到洞，差點掉進去。"},{"w":"calculate","p":"[ˈkælkjəleɪt] v.","d":"To calculate is to find an answer using math.","e":"I calculated how much money I would need to buy the car.","zh":"(動) 計算；推算　(動) 估計；判斷","ez":"我計算了買那輛車需要多少錢。"},{"w":"chat","p":"[tʃæt] v.","d":"To chat is to talk with someone.","e":"Even though they were far apart, the couple chatted every day.","zh":"(動) 聊天；閒談　(名) 聊天；談話","ez":"儘管相隔很遠，那對情侶每天都會聊天。"},{"w":"commit","p":"[kəˈmɪt] v.","d":"To commit to something is to promise to do it.","e":"Seth wanted to go home, but he had committed to finishing the job.","zh":"(動) 承諾；保證　實行；犯下","ez":"賽斯想回家，但他已經承諾要完成工作。"},{"w":"compose","p":"[kəmˈpəʊz] v.","d":"To compose something is to make it from smaller parts.","e":"Tonya composed her report using many sources of information.","zh":"(動) 創作；譜曲　撰寫；編寫　(形) 鎮定的；沉著的","ez":"湯妮雅用許多資訊來源撰寫她的報告。"},{"w":"dormitory","p":"[ˈdɔːrmətɔ:rɪ] n.","d":"A dormitory is a school building where students live.","e":"I will move into the dormitory at the beginning of the school year.","zh":"(名) 宿舍；學生宿舍　(名) 集體宿舍；宿舍樓","ez":"我將在學年開始時搬進宿舍。"},{"w":"exhaust","p":"[ɪgˈzɔːst] v.","d":"To exhaust someone is to make them tired.","e":"John exhausted himself by swimming all day.","zh":"(動) 用盡；耗盡　(動) 排放；排出　(名) 廢氣；排氣","ez":"約翰游了一整天，把自己累壞了。"},{"w":"greenhouse","p":"[ˈgriːnhaʊs] n.","d":"A greenhouse is a small glass building that is used to grow plants.","e":"We have a small greenhouse in our backyard where we grow plants.","zh":"(名) 溫室；玻璃房　(形) 溫室的；會產生溫室效應的","ez":"我們後院有一個小溫室，用來種植植物。"},{"w":"ignore","p":"[ɪgˈnɔːr] v.","d":"To ignore something is to act like you do not see or hear it.","e":"I ignored the message he was making and kept studying.","zh":"(動) 忽視；不理睬　(動) 漠視；置之不理","ez":"我忽略了他傳達的訊息，繼續讀書。"},{"w":"obvious","p":"[ˈɒbvɪəs] adj.","d":"If something is obvious, it is clear and easily seen.","e":"It was obvious that he was tired. He kept falling asleep.","zh":"(形) 明顯的；易看出的　(形) 顯然的；不言而喻的","ez":"很明顯他累了，他一直打瞌睡。"},{"w":"physics","p":"[ˈfɪzɪks] n.","d":"Physics is a science that deals with energy and how it affects things.","e":"In physics class, we used Newton&rsquo;s Cradle to learn about energy.","zh":"(名) 物理學","ez":"物理課上，我們用牛頓擺來學習能量。"},{"w":"portion","p":"[ˈpɔːrʃən] n.","d":"A portion of something is a part of it.","e":"I only ate a small portion of the pizza.","zh":"(名) 部分；一份","ez":"我只吃了一小片披薩。"},{"w":"remind","p":"[rɪˈmaɪnd] v.","d":"To remind someone is to tell them to remember to do something.","e":"Nick&rsquo;s dad reminded him to do his homework.","zh":"(動) 提醒；使想起","ez":"尼克的爸爸提醒他做功課。"},{"w":"secretary","p":"[ˈsekrəterɪ] n.","d":"A secretary is a person who works in an office.","e":"Rebecca asked her secretary to type a report.","zh":"(名) 秘書；書記","ez":"蕾貝卡請她的秘書打一份報告。"},{"w":"severe","p":"[sɪˈvɪə:r] adj.","d":"If something is severe, it is very bad or serious.","e":"After hitting his hand with the hammer, Sam was in severe pain.","zh":"(形) 嚴重的；嚴厲的","ez":"山姆用錘子敲到手後，感到劇烈疼痛。"},{"w":"talent","p":"[ˈtælənt] n.","d":"If someone has a talent, they are naturally able to do it well.","e":"Maria has a talent for playing the piano.","zh":"(名) 天賦；才能","ez":"瑪麗亞有彈鋼琴的天賦。"},{"w":"thesis","p":"[ˈθiːsɪs] n.","d":"A thesis is an idea that needs to be proved.","e":"She did not support her thesis very well.","zh":"(名) 論文；論點","ez":"她的論文論證不夠充分。"},{"w":"uniform","p":"[ˈjuːnəfɔːrm] n.","d":"A uniform is a piece of clothing worn by people of the same group.","e":"All the members of our marching band wear matching uniforms.","zh":"(名) 制服；(形) 統一的；一致的","ez":"我們樂儀隊的所有成員都穿配套的制服。"},{"w":"vision","p":"[ˈvɪʒən] n.","d":"Vision is the act of seeing.","e":"The eye doctor tested my vision.","zh":"(名) 視力；視野；願景","ez":"眼科醫生檢查了我的視力。"}]},{"id":15,"name":"Unit 15","words":[{"w":"absorb","p":"[əbˈzɔːrb] v.","d":"To absorb a liquid means to take it inside.","e":"He used a sponge to absorb the water on the floor.","zh":"(動) 吸收；全神貫注","ez":"他用海綿吸乾地板上的水。"},{"w":"boss","p":"[bɔ(:)s] n.","d":"A boss is a person in charge of other people at work.","e":"My boss is a nice person.","zh":"(名) 老闆；上司　(動) 指揮；領導","ez":"我的老闆是個好人。"},{"w":"committee","p":"[kəˈmɪtɪ] n.","d":"A committee is a group of people who meet together to make decisions.","e":"The school&rsquo;s committee agreed on a new dress code for students.","zh":"(名) 委員會；小組　(名) 全體委員","ez":"學校委員會同意了新的學生服裝規定。"},{"w":"contract","p":"[ˈkɒntrækt] n.","d":"A contract is a written agreement between two people.","e":"The woman signed a contract when she bought the house.","zh":"(名) ['kɑntrækt] 合約；契約　(動) [kən'trækt] 簽訂合約；縮小","ez":"那位女士買房子時簽了一份合約。"},{"w":"crew","p":"[kruː] n.","d":"A crew is a group of workers.","e":"My father has a crew. They help him build houses.","zh":"(名) 船員；工作人員　(動) 划船；當船員","ez":"我爸爸有一個團隊，他們幫他蓋房子。"},{"w":"devote","p":"[dɪˈvəʊt] v.","d":"To devote time to something means to spend a lot of time doing it.","e":"She devotes two hours a day to playing the piano.","zh":"(動) 奉獻；致力於　(動) 將…專用於","ez":"她每天花兩小時彈鋼琴。"},{"w":"dig","p":"[dɪg] v.","d":"To dig is to make a hole in the ground.","e":"My dog digs in the yard so he can hide his bones.","zh":"(動) 挖；掘　(動) 挖掘；尋找","ez":"我的狗在院子裡挖洞，好藏牠的骨頭。"},{"w":"dine","p":"[daɪn] v.","d":"To dine means to eat dinner.","e":"The young couple dined at their home.","zh":"(動) 用餐；進餐　(動) 吃飯","ez":"那對年輕夫婦在家裡用餐。"},{"w":"donate","p":"[ˈdouneit] v.","d":"To donate is to give something to a charity or organization.","e":"We donate money to Christmas charities every year.","zh":"(動) 捐獻；捐贈　(名) 捐獻物；捐款","ez":"我們每年都會捐款給聖誕節慈善機構。"},{"w":"double","p":"[ˈdʌbəl] adj.","d":"If something is double, it is twice as much, or twice as many.","e":"I paid almost double the amount for that shirt.","zh":"(動) 加倍；翻倍　(形) 雙重的；成對的　(名) 雙份；雙人房","ez":"我買那件襯衫花了幾乎兩倍的價錢。"},{"w":"elevate","p":"[ˈeləveɪt] v.","d":"To elevate something is to put it at a higher level.","e":"The man elevated the picture so he could see it better.","zh":"(動) 提升；抬高　(動) 提高；改善","ez":"那個男人把畫掛高，以便看得更清楚。"},{"w":"flavor","p":"[ˈfleivər] n.","d":"A flavor is the taste of food or drinks.","e":"The flavor of the ice cream was very good.","zh":"(名) 風味；味道　(動) 調味；加香料","ez":"冰淇淋的味道非常好。"},{"w":"foundation","p":"[faʊnˈdeɪʃən] n.","d":"A foundation is a group that provides money for research.","e":"The foundation raised money to give scholarships to students.","zh":"(名) 基礎；根基　(名) 基金會；慈善機構","ez":"那個基金會募款來提供獎學金給學生。"},{"w":"generation","p":"[ˌdʒenəˈreɪʃən] n.","d":"A generation is a group of people who live at the same time.","e":"My grandparents are from a different generation than me.","zh":"(名) 一代人；世代　(名) 生成；產生","ez":"我的祖父母和我屬於不同的世代。"},{"w":"handle","p":"[ˈhændl] n.","d":"A handle is the part of an object people hold while using it.","e":"The pot is very hot. So pick it up by the handle.","zh":"(動) 處理；應對　(名) 把手；柄","ez":"鍋子很燙，所以拿的時候要握把手。"},{"w":"layer","p":"[ˈleɪə:r] n.","d":"A layer covers over something or is between two things.","e":"There was a layer of snow on the tops of the houses this morning.","zh":"(名) 層；層次　(動) 分層；按層排列","ez":"今天早上屋頂上有一層雪。"},{"w":"mud","p":"[mʌd] n.","d":"Mud is soft, wet dirt.","e":"My brother played rugby in the mud. Now he&rsquo;s dirty.","zh":"(名) 泥巴；泥漿　(動) 弄髒；使混亂","ez":"我哥哥在泥巴裡打橄欖球，現在他全身髒兮兮的。"},{"w":"smooth","p":"[smuːð] a.","d":"If something is smooth, it has no bumps.","e":"The baby&rsquo;s skin felt very smooth.","zh":"(形) 平坦的；順利的","ez":"嬰兒的皮膚摸起來很光滑。"},{"w":"soil","p":"[sɔɪl] n.","d":"Soil is the top layer of land on the Earth.","e":"The boy planted flowers in the soil and watered them every day.","zh":"(名) 土壤；土地　(動) 弄髒；污損","ez":"那個男孩在土裡種花，每天澆水。"},{"w":"unique","p":"[juːˈniːk] adj.","d":"If people or things are unique, they are not like the others.","e":"Her dog is unique. I&rsquo;ve never seen one quite like it.","zh":"(形) 獨特的；唯一的","ez":"她的狗很獨特，我從來沒見過像這樣的狗。"}]},{"id":16,"name":"Unit 16","words":[{"w":"chamber","p":"[ˈtʃeɪmbər] n.","d":"A chamber is an old word for a bedroom.","e":"The girl was tired. She went to her chamber fora nap.","zh":"(名) 房間；議院　(名) 腔室；密閉空間","ez":"那個女孩累了，她回房間小睡一下。"},{"w":"deny","p":"[dɪˈnaɪ] v.","d":"To deny something is to say it is not true.","e":"The boy denied that he broke the window.","zh":"(動) 否認；拒絕　(動) 否定；不承認","ez":"那個男孩否認打破窗戶。"},{"w":"document","p":"[ˈdokjəmənt] n.","d":"A document is an official piece of writing.","e":"He was given an official document proving he was a citizen.","zh":"(名) [ˈdɑkjəmənt] 文件；證件　(動) [ˈdɑkjəˌmɛnt] 記錄；用文件證明","ez":"他拿到一份官方文件證明他是公民。"},{"w":"emphasize","p":"[ˈemfəsaɪz] v.","d":"To emphasize is to give importance or attention to something.","e":"She emphasized the key points by circling them in red ink.","zh":"(動) 強調；重視　(動) 突出；使突出","ez":"她用紅筆圈出重點來強調。"},{"w":"fever","p":"[ˈfiːvər] n.","d":"A fever is a high body temperature that people get when they are sick.","e":"Lydia had a high fever so she didn&rsquo;t go to school.","zh":"(名) 發燒；發熱　(動) 發燒；患熱病","ez":"莉迪亞發高燒，所以沒去上學。"},{"w":"flu","p":"[flu:] n.","d":"The flu is a type of sickness that makes you feel weak or your body hurt.","e":"Since he had the flu, he felt miserable.","zh":"(名) 流感；感冒","ez":"因為他得了流感，覺得很難受。"},{"w":"freeze","p":"[fri:z] v.","d":"To freeze is to become very cold.","e":"If you don&rsquo;t wear your coat in winter, you will freeze.","zh":"(動) 結冰；凍結　(動) 靜止不動；驚呆","ez":"如果你冬天不穿外套，會凍僵的。"},{"w":"gesture","p":"[ˈdʒestʃər] n.","d":"A gesture is a movement of the hands or body.","e":"My teacher makes a lot of gestures when she speaks.","zh":"(名) 手勢；姿態　(動) 做手勢；示意","ez":"我的老師講話時會做很多手勢。"},{"w":"interrupt","p":"[ˌɪntəˈrʌpt] v.","d":"To interrupt is to briefly stop someone when they are doing something.","e":"My mother interrupted me when I was trying to listen to music.","zh":"(動) 打斷；中斷　(動) 插嘴；干擾","ez":"我正在聽音樂時，媽媽打斷了我。"},{"w":"last","p":"[læst] v.","d":"To last is to continue or go on for an amount of time.","e":"The football match lasted for nearly two hours.","zh":"(形) 最後的；最近的　(副) 最後；上次　(動) 持續；維持","ez":"那場足球賽持續了將近兩小時。"},{"w":"likeness","p":"[ˈlaɪknɪs] n.","d":"Likeness means the state of being like, or resemblance.","e":"Michelle bears a strong likeness to her older sister Kate.","zh":"(名) 相似；相似之處　(名) 肖像；畫像","ez":"蜜雪兒長得跟她姊姊凱特非常像。"},{"w":"moreover","p":"[mɔːˈrəʊvər] adv.","d":"Moreover means besides or in addition to something.","e":"It&rsquo;s cold outside. Moreover, the wind is very strong.","zh":"(連) 而且；此外　(副) 而且；更甚者","ez":"外面很冷，而且風又很大。"},{"w":"perspective","p":"[pə:rspektɪv] n.","d":"A perspective is the way you think about something.","e":"The man&rsquo;s speech gave me a new perspective on our country.","zh":"(名) 觀點；視角","ez":"那個男人的演講讓我對我們國家有了新的看法。"},{"w":"rational","p":"[ˈræʃənl] adj.","d":"When something is rational, it is normal or practical.","e":"It is hard to think in a rational way when you are scared.","zh":"(形) 理性的；合理的","ez":"害怕的時候很難理性思考。"},{"w":"recover","p":"[rɪˈkʌvə:r] v.","d":"To recover is to go back to normal after something bad happens.","e":"I hope the city will recover soon after the flood.","zh":"(動) 恢復；康復","ez":"我希望這個城市在洪水後能趕快復原。"},{"w":"rely","p":"[rɪˈlaɪ] v.","d":"To rely on something or someone is to trust or depend on them.","e":"The boy relied on his older brother to help him.","zh":"(動) 依賴；信任","ez":"那個男孩靠他哥哥幫忙。"},{"w":"shock","p":"[ʃɒk] v.","d":"To shock people is to surprise them.","e":"The man was shocked by the news.","zh":"(動) 使震驚；使震動　(名) 震驚；衝擊","ez":"那個男人被這個消息嚇到了。"},{"w":"shy","p":"[ʃaɪ] adj.","d":"When people are shy, they are nervous around people strange to them.","e":"The girl was too shy to try out for the play.","zh":"(形) 害羞的；膽怯的","ez":"那個女孩太害羞，不敢參加話劇試鏡。"},{"w":"stare","p":"[stɛə:r] v.","d":"To stare at something is to look at it for a long time.","e":"The young couple stared into each other&rsquo;s eyes.","zh":"(動) 注視；盯著看","ez":"那對年輕情侶互相凝視著對方的眼睛。"},{"w":"thus","p":"[ðʌs] adv.","d":"Thus means as a result or for that reason.","e":"The sun was shining. Thus, I wore my sunglasses.","zh":"(副) 因此；如此","ez":"太陽很大，所以我戴了太陽眼鏡。"}]},{"id":17,"name":"Unit 17","words":[{"w":"aim","p":"[eim] n.","d":"An aim is a goal someone wants to make happen.","e":"My aim is to become a helicopter pilot.","zh":"(名) 目標；目的　(動) 瞄準；以...為目標","ez":"我的目標是成為直升機駕駛員。"},{"w":"attach","p":"[əˈtætʃ] v.","d":"To attach is to put two things together.","e":"I attached the socks to the clothesline to dry.","zh":"(動) 附加；連接　(動) 依附；喜愛","ez":"我把襪子夾在曬衣繩上晾乾。"},{"w":"bet","p":"[bet] v.","d":"To bet is to risk money on the result of a game or a business.","e":"How much will you bet that your horse will win?","zh":"(名) 賭注；打賭　(動) 打賭；賭錢　(動) 確信；預料","ez":"你願意賭多少錢你的馬會贏？"},{"w":"carriage","p":"[ˈkærɪdʒ] n.","d":"A carriage is a vehicle pulled by a horse.","e":"We took a carriage ride in the park.","zh":"(名) 馬車；車廂　(名) 運送；運輸","ez":"我們在公園裡搭馬車兜風。"},{"w":"classic","p":"[ˈklæsɪk] adj.","d":"If something is classic, it is typical.","e":"The athlete made a classic mistake-he started running too soon.","zh":"(形) 經典的；古典的　(名) 經典著作；古典文學","ez":"那位運動員犯了個典型錯誤——他起跑太快了。"},{"w":"commute","p":"[kəˈmjuːt] v.","d":"To commute is to travel a long distance to get to work.","e":"I usually commute to work on the train.","zh":"(動) 通勤；往返　(名) 通勤路程；通勤時間","ez":"我通常搭火車通勤。"},{"w":"confirm","p":"[kənˈfəːrm] v.","d":"To confirm is to make sure something is correct.","e":"Winning the game confirmed that James was a good player.","zh":"(動) 確認；證實　(動) 批准；確定","ez":"贏得比賽證明了詹姆斯是個好球員。"},{"w":"criticize","p":"[ˈkrɪtɪsaɪz] v.","d":"To criticize is to say you do not like someone or something.","e":"He criticized his wife forspending too much money.","zh":"(動) 批評；指責　(動) 評論；評估","ez":"他批評太太花太多錢。"},{"w":"differ","p":"[ˈdɪfər] v.","d":"To differ is to not be the same as another person or thing.","e":"I differ from my brother: he is short, while I am tall.","zh":"(動) 不同；相異　(動) 意見不合；有分歧","ez":"我和哥哥不一樣：他矮，我高。"},{"w":"expense","p":"[ɪksˈpens] n.","d":"An expense is the money that people spend on something.","e":"She wrote down all the expenses for her trip.","zh":"(名) 費用；開支　(動) 花費；使耗費","ez":"她記下了旅行的所有花費。"},{"w":"formal","p":"[ˈfɔːrməl] adj.","d":"If something is formal, it is done in an official way.","e":"It was a formal dinner, so we wore our best clothes.","zh":"(形) 正式的；莊重的　(形) 按規則的；官方的","ez":"那是個正式晚宴，所以我們穿了最好的衣服。"},{"w":"height","p":"[haɪt] n.","d":"Height is how tall someone or something is.","e":"My height is 168 centimeters.","zh":"(名) 高度；身高　(動) 提高；增加","ez":"我的身高是168公分。"},{"w":"invent","p":"[ɪnˈvent] v.","d":"To invent something is to create something that never existed before.","e":"My grandfather has invented some interesting things.","zh":"(動) 發明；創造　(動) 編造；捏造","ez":"我爺爺發明了一些有趣的東西。"},{"w":"junior","p":"[ˈdʒuːnjər] adj.","d":"If someone is junior in their job, they do not have a lot of power.","e":"When she started at the company, she was only a junior manager.","zh":"(名) 三年級學生；年幼者　(形) 年幼的；資淺的","ez":"她剛進公司時只是個初階經理。"},{"w":"labor","p":"[ˈleɪbər] n.","d":"Labor is the act of doing or making something.","e":"Building the house took a lot of labor.","zh":"(名) 勞動；勞工　(動) 勞力工作；努力","ez":"蓋這棟房子花了很多勞力。"},{"w":"mechanic","p":"[məˈkænɪk] n.","d":"A mechanic is someone who fixes vehicles or machines.","e":"We took the car to the mechanic to be fixed.","zh":"(名) 技工；機械師　(形) 機械的；機械式的","ez":"我們把車送給技師修理。"},{"w":"prime","p":"[praɪm] adj.","d":"If something is prime, it is the most important one.","e":"Dirty air is a prime cause of illness.","zh":"(形) 主要的；首要的　(名) 全盛時期；最佳部分　(動) 使準備好","ez":"骯髒的空氣是生病的主要原因。"},{"w":"shift","p":"[ʃɪft] v.","d":"To shift to something is to move into a new place or direction.","e":"He shifted to the other side of the table to eat his breakfast.","zh":"(動) 轉移；改變　(名) 輪班；轉變","ez":"他移到桌子另一邊吃早餐。"},{"w":"signal","p":"[ˈsignəl] n.","d":"A signal is a sound or action that tells someone to do something.","e":"The coach blew his whistle as a signal to begin the game.","zh":"(名) 信號；標誌　(動) 發信號；標誌","ez":"教練吹哨子作為比賽開始的信號。"},{"w":"sincere","p":"[sɪnˈsɪər] adj.","d":"When people are sincere, they tell the truth.","e":"He sounded sincere when he apologized to me.","zh":"(形) 真誠的；誠摯的","ez":"他向我道歉時聽起來很誠懇。"}]},{"id":18,"name":"Unit 18","words":[{"w":"ability","p":"[əˈbiləti] n.","d":"Ability is the quality of a person being able to do something well.","e":"His swimming abilities let him cross the entire lake.","zh":"(名) 能力；才能","ez":"他的游泳能力讓他能游過整個湖。"},{"w":"agriculture","p":"[ˈægrɪkʌltʃər] n.","d":"Agriculture is the growing of food and animals.","e":"The farmer studied agriculture in college.","zh":"(名) 農業；農耕　(形) 農業的；農村的","ez":"那個農夫在大學讀農業。"},{"w":"cartoon","p":"[kɑːrˈtuːn] n.","d":"A cartoon is a funny drawing.","e":"Sometimes, people draw cartoons for the newspaper.","zh":"(名) 卡通；動畫　(名) 漫畫；卡通畫","ez":"有時候，人們會為報紙畫漫畫。"},{"w":"ceiling","p":"[ˈsiːlɪŋ] n.","d":"The ceiling is the top of a room.","e":"He painted the ceiling with a special roller.","zh":"(名) 天花板；上限","ez":"他用特殊的滾筒粉刷天花板。"},{"w":"convince","p":"[kənˈvɪns] v.","d":"To convince someone means to make them sure of something.","e":"She convinced me to buy the house.","zh":"(動) 說服；使信服　(動) 使確信；使承認","ez":"她說服我買下那棟房子。"},{"w":"curious","p":"[ˈkjʊərɪəs] adj.","d":"When you are curious about something, you want to know more about it.","e":"I opened up the clock because I was curious about how it worked.","zh":"(形) 好奇的；想知道的　(形) 奇怪的；特別的","ez":"我打開時鐘，因為我好奇它是怎麼運作的。"},{"w":"delay","p":"[dɪˈleɪ] v.","d":"To delay means to wait to do something.","e":"I was delayed at the airport for over two hours.","zh":"(動) 延遲；耽擱　(名) 延遲；遲延","ez":"我在機場被延誤了超過兩小時。"},{"w":"diary","p":"[ˈdaɪərɪ] n.","d":"A diary is a book in which people write their personal experiences.","e":"I do not let anybody read my diary.","zh":"(名) 日記；日誌　(名) 行程簿；記事本","ez":"我不讓任何人看我的日記。"},{"w":"element","p":"[ˈeləmənt] n.","d":"An element of something is a particular part of it.","e":"Tackling an opponent is Johnny&rsquo;s favorite element of American footbal.","zh":"(名) 元素；成分　(名) 要素；因素","ez":"擒抱對手是強尼在美式足球中最喜歡的部分。"},{"w":"faith","p":"[feɪθ] n.","d":"When people have faith in something, they believe in it and trust it.","e":"The sick girl had faith in doctors. She knew they would make her better.","zh":"(名) 信念；信仰　(名) 信心；信任","ez":"那個生病的女孩相信醫生，她知道醫生會讓她好起來。"},{"w":"grain","p":"[greɪn] n.","d":"Grain is food crops such as wheat, corn, rice or oats.","e":"The farmer planted two fields of grain this year.","zh":"(名) 穀物；穀類　(名) 顆粒；細粒","ez":"農夫今年種了兩塊田的穀物。"},{"w":"greet","p":"[griːt] v.","d":"To greet someone means to meet and welcome them.","e":"When my friend came over, I greeted him at the door.","zh":"(動) 問候；打招呼　(名) 問候；招呼","ez":"朋友來的時候，我在門口迎接他。"},{"w":"investigate","p":"[ɪnˈvestəgeɪt] v.","d":"To investigate means to search for something or learn about it.","e":"The detective went to investigate the crime.","zh":"(動) 調查；偵查　(動) 研究；檢查","ez":"偵探去調查那起犯罪案件。"},{"w":"joy","p":"[dʒɔɪ] n.","d":"Joy is a feeling you get when you are really happy.","e":"I love baseball. I feel joy when I play.","zh":"(名) 喜悅；歡樂　(動) 歡欣；感到高興","ez":"我愛棒球。打球時我感到快樂。"},{"w":"label","p":"[ˈleɪ bəl] n.","d":"A label is a tag that tells about something.","e":"The label on the back of your shirt will tell you what size it is.","zh":"(名) 標籤；貼紙　(動) 貼標籤；稱呼","ez":"你襯衫背面的標籤會告訴你尺寸。"},{"w":"monk","p":"[mʌŋk] n.","d":"A monk is a religious person who lives a simple life.","e":"The monks knew a lot about religion.","zh":"(名) 和尚；僧侶","ez":"那些和尚對宗教了解很多。"},{"w":"odd","p":"[ɒd] adj.","d":"When something is odd, it is unusual.","e":"Her cat is odd. It walks on two feet.","zh":"(形) 奇怪的；奇特的　(形) 奇數的；不成對的","ez":"她的貓很奇怪，會用兩隻腳走路。"},{"w":"pause","p":"[pɔːz] v.","d":"To pause means to stop doing something for a while.","e":"Since she was so hungry, she paused to make a snack.","zh":"(動) 暫停；停頓","ez":"因為她很餓，所以停下來做了點點心。"},{"w":"priest","p":"[priːst] n.","d":"A priest is a person trained to perform religious duties.","e":"The priest taught us about God.","zh":"(名) 牧師；神父","ez":"牧師教導我們關於上帝的事。"},{"w":"profession","p":"[prəˈfeʃən] n.","d":"A profession is a person’s job.","e":"He loved sailing, so he chose to work on ships as a profession.","zh":"(名) 職業；專業","ez":"他喜歡航海，所以選擇在船上工作當職業。"}]},{"id":19,"name":"Unit 19","words":[{"w":"adopt","p":"[əˈdɒpt] v.","d":"To adopt someone is to make them as a part of one’s own family.","e":"The girl was adopted by the couple when she was three.","zh":"(動) 採納；接受　(動) 收養；領養","ez":"那個女孩三歲時被這對夫婦收養。"},{"w":"beg","p":"[beg] v.","d":"To beg is to ask for something one really wants.","e":"The man begged for some money.","zh":"(動) 懇求；乞求　(動) 討飯；乞討","ez":"那個男人乞討一些錢。"},{"w":"beyond","p":"[bɪˈjɒnd] prep.","d":"If A is beyond B, A is farther away.","e":"John&rsquo;s house is beyond that lake.","zh":"(介) 超過；超越　(形) 無法達到的；遠處的","ez":"約翰的房子在那個湖的另一邊。"},{"w":"costume","p":"[ˈkɒstjuːm] n.","d":"A costume is a set of clothes people wear for a particular occasion.","e":"The woman wore a mask with her costume.","zh":"(名) 服裝；戲服　(名) 習俗；傳統","ez":"那個女人戴著面具搭配她的服裝。"},{"w":"exclaim","p":"[ɪksˈkleɪm] v.","d":"To exclaim is to say something loudly, usually due to being excited.","e":"&ldquo;Look at her dress!&rdquo; Sara exclaimed.","zh":"(動) 驚呼；大聲說出　(名) 驚呼；感歎詞","ez":"「看看她的裙子！」莎拉驚呼道。"},{"w":"extend","p":"[ɪksˈtend] v.","d":"To extend is to stretch out or reach.","e":"The boy extended his hand to catch the ball.","zh":"(動) 延伸；擴大　延長；伸出","ez":"男孩伸出手去接球。"},{"w":"fool","p":"[fuːl] n.","d":"A fool is someone who makes unwise choices.","e":"The girl was a fool for playing too close to the water.","zh":"(名) 傻瓜；愚人　(動) 欺騙；愚弄","ez":"那個女孩太靠近水邊玩耍真是個傻瓜。"},{"w":"forbid","p":"[fəˈbɪd] v.","d":"To forbid is to tell someone they cannot do something.","e":"My father forbids watching TV while we&rsquo;re eating dinner.","zh":"(動) 禁止；不准　(動) 阻止；妨礙","ez":"我父親禁止我們在吃晚餐時看電視。"},{"w":"illustrate","p":"[ˈɪləstreɪt] v.","d":"To illustrate is to show something by drawing a picture.","e":"The executive illustrated the decreasing profits of the company.","zh":"(動) 說明；闡述　(動) 繪製；配圖","ez":"主管說明了公司利潤下滑的情況。"},{"w":"indeed","p":"[ɪnˈdiːd] adv.","d":"Indeed means truly or really.","e":"The birthday party was indeed fun last night.","zh":"(副) 確實；的確　(片) 是的；沒錯","ez":"昨晚的生日派對確實很好玩。"},{"w":"interpret","p":"[inˈtəːrprit] v.","d":"To interpret is to explain what something means.","e":"The woman interpreted what her co-worker was trying to say.","zh":"(動) 解釋；詮釋　(動) 翻譯；傳譯","ez":"那位女士解釋了她同事想表達的意思。"},{"w":"kindly","p":"[ˈkaɪndlɪ] adv.","d":"If people do something kindly, they do it in a nice way.","e":"The stranger kindly cared for the hurt man.","zh":"(副) 親切地；友善地　(形) 親切的；體貼的","ez":"陌生人好心照顧了受傷的男人。"},{"w":"motive","p":"[moutiv] n.","d":"A motive is the reason someone does something.","e":"His motive for studying so hard is to get into a good college.","zh":"(名) 動機；目的　(形) 推動的；促動的","ez":"他這麼努力讀書的動機是為了進入好大學。"},{"w":"nest","p":"[nest] n.","d":"A nest is a place where a bird lays its eggs.","e":"The bird laid her eggs in the nest that she made.","zh":"(名) 巢；窩　(動) 築巢；嵌入","ez":"鳥兒在牠築的巢裡下了蛋。"},{"w":"origin","p":"[ˈɒrədʒɪn] n.","d":"The origin of someone or something is where they come from.","e":"The origin of the honey that we eat is from a beehive.","zh":"(名) 起源；來源","ez":"我們吃的蜂蜜來自蜂巢。"},{"w":"reception","p":"[rɪˈsepʃən] n.","d":"A reception is a party to welcome a person or celebrate an event.","e":"We all danced and had a good time at the wedding reception.","zh":"(名) 接待；接待會","ez":"我們都在婚禮喜宴上跳舞，玩得很開心。"},{"w":"reject","p":"[rɪˈdʒekt] v.","d":"To reject is to refuse something because you do not want it.","e":"The girl rejected the broken cup.","zh":"(動) [rɪ'dʒɛkt] 拒絕；駁回　(名) ['ridʒɛkt] 被拒之人；廢品","ez":"女孩拒絕了那個破掉的杯子。"},{"w":"silence","p":"[ˈsaɪləns] n.","d":"Silence is complete quiet.","e":"The man asked for silence while he worked on the problem.","zh":"(名) 安靜；沉默　(動) 使安靜；壓制","ez":"那個男人在解決問題時要求保持安靜。"},{"w":"stream","p":"[striːm] n.","d":"A stream is a small river.","e":"The boy caught a fish in the stream.","zh":"(名) 小溪；水流　(動) 流動；播放","ez":"男孩在小溪裡抓到了一條魚。"},{"w":"tone","p":"[təʊn] n.","d":"Tone is the sound of someone’s voice. It shows how they feel.","e":"My father&rsquo;s tone told me I had broken the rule.","zh":"(名) 語氣；音調　(動) 調和；定調","ez":"我父親的語氣告訴我，我違反了規定。"}]},{"id":20,"name":"Unit 20","words":[{"w":"accomplish","p":"[əˈkʌmplɪʃ] v.","d":"To accomplish something means to finish it.","e":"He accomplished his goal of running ten miles.","zh":"(動) 完成；達成","ez":"他完成了跑十英里的目標。"},{"w":"approve","p":"[əˈpruːv] v.","d":"To approve of something means you like it or are happy about it.","e":"Her co-workers approved her new plan.","zh":"(動) 贊成；同意　(動) 核准；批准","ez":"她的同事們批准了她的新計畫。"},{"w":"approximate","p":"[əˈprɒksəmɪt] adj.","d":"Approximate means to be close to an exact amount, number or time.","e":"My approximate height is two meters.","zh":"(動) 接近；估算　(形) 近似的；大約的","ez":"我的身高大約是兩公尺。"},{"w":"barrier","p":"[ˈbærɪər] n.","d":"A barrier is something that is in your way.","e":"The Great Wall was a barrier between China and its enemies.","zh":"(名) 障礙；屏障　(名) 柵欄；圍欄","ez":"長城是中國與敵人之間的屏障。"},{"w":"detect","p":"[dɪˈtekt] v.","d":"To detect something means to notice or find something.","e":"The boy ran to the kitchen when he detected the smell of cookies.","zh":"(動) 偵測；發現　(動) 察覺；檢測出","ez":"男孩聞到餅乾的味道時，就跑向廚房。"},{"w":"duty","p":"[ˈdjuːtɪ] n.","d":"A duty is something that a person has to do.","e":"It is parents&rsquo; duty to take care of their children.","zh":"(名) 責任；義務　(名) 稅金；關稅　(動) 應該做；必須做","ez":"照顧孩子是父母的責任。"},{"w":"elementary","p":"[ˌəlɪˈmentərɪ] adj.","d":"When something is elementary, it is the first or most simple thing.","e":"Children go to elementary school before high school.","zh":"(形) 基本的；初級的　(形) 小學的；初等的","ez":"孩子們在上高中之前先上小學。"},{"w":"failure","p":"[ˈfeɪljər] n.","d":"A failure happens when you do not do something right.","e":"My cooking ended in failure because I burned the food.","zh":"(名) 失敗；失敗的事　(動) 失敗；不及格","ez":"我的烹飪以失敗告終，因為我把食物燒焦了。"},{"w":"gradual","p":"[ˈgrædjʊəl] adj.","d":"When something is gradual, it happens slowly.","e":"Children learn to read at a gradual pace. They do not learn right away.","zh":"(形) 逐漸的；漸進的　(副) 逐漸地；慢慢地","ez":"孩子們以漸進的速度學習閱讀，不會一下子就學會。"},{"w":"immigrant","p":"[ˈɪmɪgrənt] n.","d":"An immigrant is a person who moves to a different country.","e":"My parents were immigrants. They came from Poland.","zh":"(名) 移民；移居者　(形) 移民的；外來的","ez":"我的父母是移民，他們來自波蘭。"},{"w":"insert","p":"[inˈsəːrt] v.","d":"To insert something means to put it in something else.","e":"The mailman inserted the letter into the mailbox.","zh":"(名) ['ɪnsɝt] 插頁；嵌入物　(動) [ɪn'sɝt] 插入；放入；刊登","ez":"郵差把信投入郵箱。"},{"w":"instant","p":"[ˈɪnstənt] n.","d":"An instant is a very short amount of time.","e":"A microwave oven cooks food in an instant.","zh":"(名) 瞬間；一瞬　(形) 立即的；即時的　(副) 立刻；馬上","ez":"微波爐能在瞬間煮熟食物。"},{"w":"poverty","p":"[ˈpɒvətɪ] n.","d":"Poverty is the state of being poor.","e":"Poverty is a problem in many countries around the world.","zh":"(名) 貧窮；貧困","ez":"貧窮是世界上許多國家的問題。"},{"w":"pretend","p":"[prɪˈtend] v.","d":"To pretend means to make believe something is real.","e":"The boy liked to pretend he was a king.","zh":"(動) 假裝；偽裝","ez":"男孩喜歡假裝自己是國王。"},{"w":"rank","p":"[ræŋk] n.","d":"A person’s rank is their place in an order of people.","e":"The man got to the rank of captain in the navy.","zh":"(名) 排名；等級　(動) 排名；分級","ez":"那個人在海軍中晉升到上校的軍階。"},{"w":"recognition","p":"[ˌrekəgˈnɪʃən] n.","d":"Recognition is getting praise from other people.","e":"The hero got recognition for his brave deed.","zh":"(名) 認可；承認","ez":"英雄因他的勇敢行為而獲得認可。"},{"w":"refrigerate","p":"[rɪˈfrɪdʒəreɪt] v.","d":"To refrigerate something means to make it cold.","e":"Grocery stores refrigerate fruit to make it last long.","zh":"冷藏；冷凍；保鮮","ez":"超市冷藏水果以延長保存期限。"},{"w":"rent","p":"[rent] n.","d":"Rent is the money people pay to someone to live in a certain place.","e":"To live in this house, I have to pay rent at the start of each month.","zh":"(名) 租金；(動) 租用；出租","ez":"要住在這間房子，我必須在每個月初付房租。"},{"w":"retire","p":"[rɪˈtaɪər] v.","d":"To retire is to leave a job, usually because of old age.","e":"My father is sixty-five years old. He is about to retire from work.","zh":"(動) 退休；退出","ez":"我父親六十五歲了，他即將退休。"},{"w":"statistic","p":"[stəˈtɪstɪk] n.","d":"A statistic is a number that tells a fact about something.","e":"The statistics showed that we did just as well this year as last year.","zh":"(名) 統計數字；統計資料","ez":"統計數據顯示，我們今年和去年表現一樣好。"}]},{"id":21,"name":"Unit 21","words":[{"w":"astronaut","p":"[ˈæstrənɔːt] n.","d":"An astronaut is a person that goes into outer space.","e":"The astronaut was walking on the moon.","zh":"(名) 太空人；宇航員","ez":"太空人在月球上行走。"},{"w":"awake","p":"[əˈweɪk] adj.","d":"When you are awake, you are not asleep.","e":"Sometimes I lay awake in bed because I am not tired.","zh":"(動) 醒來；喚醒　(形) 清醒的；醒著的","ez":"有時候我躺在床上睡不著，因為不累。"},{"w":"courage","p":"[ˈkə:rɪdʒ] n.","d":"When you have courage, you are not afraid.","e":"The man had the courage to touch the lion.","zh":"(名) 勇氣；膽量　(動) 鼓勵；激勵","ez":"那個男人有勇氣去摸獅子。"},{"w":"float","p":"[fləʊt] v.","d":"To float is to move on top of water without sinking.","e":"The boy&rsquo;s toy boat floated in the pool.","zh":"(動) 漂浮；浮動　(名) 浮體；木筏","ez":"男孩的玩具船在游泳池裡漂浮。"},{"w":"grant","p":"[grænt] v.","d":"To grant something is to allow someone to have it.","e":"The teacher granted us a break after studying hard all day.","zh":"(動) 授予；同意　(名) 補助金；撥款","ez":"老師讓我們在苦讀一整天後休息一下。"},{"w":"gravity","p":"[ˈgrӕvəti] n.","d":"Gravity is the force that makes things fall to Earth.","e":"There is no gravity in space.","zh":"(名) 重力；引力　(名) 嚴肅；莊嚴","ez":"太空中沒有重力。"},{"w":"jewel","p":"[ˈdʒuːəl] n.","d":"A jewel is a beautiful stone that is worth a lot of money.","e":"A diamond is one of the most expensive jewels in the world.","zh":"(名) 寶石；珠寶　(名) 珍寶；寶貴的人或物","ez":"鑽石是世界上最貴的珠寶之一。"},{"w":"miner","p":"[ˈmaɪnər] n.","d":"A miner is a person who works in a mine.","e":"The miner was looking for gold.","zh":"(名) 礦工；採礦者　(名) 未成年人","ez":"礦工正在尋找黃金。"},{"w":"mineral","p":"[ˈmɪnərəl] n.","d":"A mineral is a type of substance found in the Earth.","e":"Rocks are made up of different kinds of minerals.","zh":"(名) 礦物；礦質　(形) 礦物的；含礦物的","ez":"岩石由不同種類的礦物組成。"},{"w":"participate","p":"[pɑ:rtɪsəpeɪt] v.","d":"To participate is to take part in something.","e":"The students participated in the school play.","zh":"(動) 參加；參與","ez":"學生們參加了學校的戲劇表演。"},{"w":"permission","p":"[pə:rmɪʃən] n.","d":"Permission means the act of allowing the doing of something.","e":"I have permission to drive my mom&rsquo;s car.","zh":"(名) 許可；准許","ez":"我有許可開我媽媽的車。"},{"w":"pour","p":"[pɔːr]","d":"To pour a liquid means to make it come out of a container.","e":"I poured some milk into my sister&rsquo;s cup.","zh":"(動) 倒；傾注","ez":"我倒了一些牛奶到我妹妹的杯子裡。"},{"w":"presence","p":"[ˈprɛzəns] n.","d":"Someone or something’s presence is the fact they are there.","e":"The presence of dark clouds meant it would rain.","zh":"(名) 出席；存在","ez":"烏雲的出現意味著要下雨了。"},{"w":"raw","p":"[rɔː] adj.","d":"If a material is raw, it is natural and has not been processed.","e":"The company dumped raw sewage into the river.","zh":"(形) 生的；未經加工的","ez":"公司把未經處理的污水排進河裡。"},{"w":"satellite","p":"[ˈsætəlaɪt] n.","d":"A satellite is something that is sent into space to get information.","e":"The satellite was traveling around the earth.","zh":"(名) 衛星；人造衛星","ez":"衛星正在繞著地球運行。"},{"w":"scale","p":"[skeɪl] n.","d":"The scale of something is its size, especially when it is very large.","e":"I was surprised by the scale of the buildings in the downtown area.","zh":"(名) 規模；比例　(動) 攀登；縮放","ez":"我對市中心建築物的規模感到驚訝。"},{"w":"skip","p":"[skɪp] v.","d":"To skip something is to not do it.","e":"He skipped work to get more sleep.","zh":"(動) 跳過；略過　(名) 跳躍；跳過","ez":"他翹班去多睡一點覺。"},{"w":"stretch","p":"[stretʃ] v.","d":"To stretch is to make your arms or legs reach out.","e":"She stretched her body before exercising.","zh":"(名) 伸展；一段（時間或空間）　(動) 伸展；拉長","ez":"她在運動前伸展身體。"},{"w":"telescope","p":"[ˈtɛləskoʊp] n.","d":"A telescope is a tool people use to look at the stars.","e":"With a telescope, you can see the moon and stars easily.","zh":"(名) [ˈtɛləˌskop] 望遠鏡　(動) [ˌtɛləˈskop] 縮短；疊套","ez":"用望遠鏡，你可以輕鬆看到月亮和星星。"},{"w":"underground","p":"[ˈʌndəgraʊnd] adv.","d":"When something is underground, it is below the surface of the Earth.","e":"Subway trains travel underground.","zh":"(形) [ˌʌndɚ'graʊnd] 地下的；祕密的　(名) ['ʌndɚgraʊnd] 地下鐵；地下組織","ez":"地鐵列車在地下行駛。"}]},{"id":22,"name":"Unit 22","words":[{"w":"alarm","p":"[əˈlɑːrm] n.","d":"An alarm is something that warns people of danger.","e":"When the students heard the fire alarm, they left the building.","zh":"(名) 警報；鬧鐘　(動) 使驚恐；警告　(形) 警報的；報警的","ez":"學生們聽到火災警報時，離開了建築物。"},{"w":"apart","p":"[əˈpɑːrt] adv.","d":"When people or things are apart, they are not close together.","e":"The couple decided to live apart from each other.","zh":"(副) 分開；分散　(介) 除了…之外","ez":"這對夫妻決定分開生活。"},{"w":"arrest","p":"[əˈrest] v.","d":"To arrest someone means to catch them for doing something bad.","e":"The man was arrested for breaking the law.","zh":"(動) 逮捕；拘捕　(動) 停止；阻止　(名) 逮捕；拘留","ez":"那個男人因違法而被逮捕。"},{"w":"award","p":"[əˈwɔːrd] n.","d":"An award is a prize someone gets for doing something well.","e":"He got an award for having the best grades in class.","zh":"(名) 獎項；獎品　(動) 頒發；授予","ez":"他因為在班上成績最好而獲獎。"},{"w":"breed","p":"[briːd] n.","d":"A breed is a group of animals within a species.","e":"I like small dog breeds, such as terriers.","zh":"(名) 品種；種類　(動) 繁殖；飼養　(動) 引起；導致","ez":"我喜歡小型犬種，比如梗犬。"},{"w":"bucket","p":"[ˈbʌkɪt] n.","d":"A bucket is a round containerto put things in.","e":"I filled the bucket with water.","zh":"(名) 桶；水桶　(名) 桶的容量","ez":"我把水桶裝滿了水。"},{"w":"contest","p":"[ˈkɒntest] n.","d":"A contest is a game or a race.","e":"The girls had a contest to see who could jump higher.","zh":"(動) [kənˈtɛst] 反對；質疑　(名) [ˈkɑntɛst] 競賽；比賽","ez":"女孩們比賽看誰跳得更高。"},{"w":"convict","p":"[kənˈvikt] v.","d":"To convict someone means to prove that they did a bad thing.","e":"He was convicted of the crime and sent to jail.","zh":"(動) [kənˈvɪkt] 判決有罪；定罪　(名) [ˈkɑnvɪkt] 已定罪的人；囚犯","ez":"他被判有罪並送進監獄。"},{"w":"garage","p":"[gəˈrɑ:ʒ] n.","d":"A garage is the part of a house where people put their cars.","e":"My car does not get dirty because I keep it in the garage.","zh":"(名) 車庫；修車廠　(動) 把車停放在車庫裡","ez":"我的車不會髒，因為我把它停在車庫裡。"},{"w":"journalist","p":"[ˈdʒəːrnəlɪst] n.","d":"A journalist is a person who writes news stories.","e":"The journalist took notes for a story he was writing.","zh":"(名) 記者；新聞工作者　(形) 新聞的；記者的","ez":"記者為他正在寫的故事做筆記。"},{"w":"pup","p":"[pʌp] n.","d":"A pup is a young dog.","e":"All the girl wanted for her birthday was a pup.","zh":"(名) 小狗；幼犬","ez":"那個女孩生日只想要一隻小狗。"},{"w":"qualify","p":"[ˈkwɒləfaɪ] v.","d":"To qualify is to get, or to be declared, adequate or good enough.","e":"He qualified to go to the final match by beating the opponent.","zh":"(動) 使有資格；符合資格","ez":"他打敗對手，獲得了參加決賽的資格。"},{"w":"repair","p":"[rɪˈpɛə:r] v.","d":"To repair something is to fix it.","e":"I repaired the flat tire on my car.","zh":"(動) 修理；修復","ez":"我修好了車上的爆胎。"},{"w":"resume","p":"[rɪˈzuːm] v.","d":"To resume something means to start it again after taking a break.","e":"I put the newspaper down to eat breakfast. Then I resumed reading.","zh":"(動) 恢復；重新開始","ez":"我把報紙放下來吃早餐，然後繼續閱讀。"},{"w":"rob","p":"[rɒb] v.","d":"To rob a person or place is to take their property by using force.","e":"A thief has robbed me of my passport.","zh":"(動) 搶劫；盜取","ez":"有小偷偷走了我的護照。"},{"w":"slip","p":"[slɪp] v.","d":"To slip means to slide and fall down.","e":"The man slipped on the wet floor.","zh":"(動) 滑倒；溜走　(名) 滑倒；紙條","ez":"那個男人在濕滑的地板上滑倒了。"},{"w":"somewhat","p":"[ˈsʌmwɒt] adv.","d":"Somewhat means to some degree, but not to a large degree.","e":"James was somewhat upset when he had to move some boxes.","zh":"(副) 有點；稍微","ez":"詹姆斯在搬一些箱子時有點不高興。"},{"w":"stable","p":"[ˈsteɪbl] adj.","d":"When something is stable, it will not fall over.","e":"The chair is stable. Its legs are strong.","zh":"(形) 穩定的；穩固的","ez":"這張椅子很穩固，它的腿很結實。"},{"w":"tissue","p":"[ˈtɪʃuː] n.","d":"A tissue is a soft piece of paper people use to wipe their noses.","e":"There was a box of tissue on the table.","zh":"(名) 紙巾；面紙；組織","ez":"桌上有一盒面紙。"},{"w":"yard","p":"[jɑːrd] n.","d":"A yard is the ground just outside of a person’s house.","e":"The girls jumped rope in the yard.","zh":"(名) 院子；庭院","ez":"女孩們在院子裡跳繩。"}]},{"id":23,"name":"Unit 23","words":[{"w":"alike","p":"[əˈlaɪk] adj.","d":"If two things or people are alike, they are similar in some way.","e":"People often think my sister and I look alike.","zh":"(形) 相似的；一樣的　(副) 同樣地；都一樣地","ez":"人們常覺得我和我妹妹長得很像。"},{"w":"annoy","p":"[əˈnɔɪ] v.","d":"To annoy someone means to bother them.","e":"The flies buzzing around John&rsquo;s head annoyed him very much.","zh":"(動) 惹惱；使煩擾　(動) 騷擾；打擾","ez":"蒼蠅在約翰頭邊嗡嗡叫，讓他非常煩躁。"},{"w":"architecture","p":"[ˈɑːrkətektʃər] n.","d":"Architecture is the style or way a building is made.","e":"The architecture of the church is amazing.","zh":"(名) 建築；建築風格　(名) 建築師；設計者","ez":"這座教堂的建築令人驚嘆。"},{"w":"artificial","p":"[ˌɑːrtəˈfɪʃəl] adj.","d":"If something is artificial, it is made to look like something natural.","e":"That soccer field has artificial grass, but it looks real.","zh":"(形) 人造的；人工的　(形) 不自然的；虛假的","ez":"那個足球場有人造草皮，但看起來像真的。"},{"w":"chain","p":"[tʃeɪn] n.","d":"A chain is a series of connected loops often used to keep things in place.","e":"The scary dog was secured with a chain.","zh":"(名) 鏈條；連鎖　(動) 用鏈條束縛；連接","ez":"那隻可怕的狗被鏈條拴住了。"},{"w":"distinct","p":"[dɪsˈtɪŋkt] adj.","d":"If something is distinct, it is easily noticed or different from other things.","e":"That girl has distinct pink hair.","zh":"(形) 明顯的；清楚的　(形) 不同的；有區別的","ez":"那個女孩有獨特的粉紅色頭髮。"},{"w":"distinguish","p":"[dɪsˈtɪŋgwɪʃ] v.","d":"To distinguish is to recognize differences between things.","e":"The twins look exactly the same. It is hard to distinguish between them.","zh":"(動) 區分；辨別　(動) 使傑出；使卓越","ez":"這對雙胞胎長得一模一樣，很難分辨他們。"},{"w":"dust","p":"[dʌst] n.","d":"Dust is very tiny pieces of dirt or other matter.","e":"In the old house, the dust was thick on the floor and chairs.","zh":"(名) 灰塵；塵埃　(動) 擦去灰塵；撣去灰塵","ez":"在老房子裡，地板和椅子上積了厚厚的灰塵。"},{"w":"excitement","p":"[ɪkˈsaɪtmənt] n.","d":"Excitement means to feel a lot of happiness about something.","e":"Did you see the excitement in her when the team scored?","zh":"(名) 興奮；激動　(名) 令人興奮的事物","ez":"你有看到球隊得分時她臉上的興奮嗎？"},{"w":"heal","p":"[hiːl] v.","d":"To heal means to make a part of the body healthy again after injury.","e":"After my broken arm heals, I can play baseball again.","zh":"(動) 治癒；痊癒　(動) 修復；改善","ez":"等我斷掉的手臂痊癒後，我就可以再打棒球了。"},{"w":"inherit","p":"[ɪnˈherɪt] v.","d":"To inherit is to get something from someone who has died.","e":"She inherited her mother&rsquo;s gold earrings.","zh":"(動) 繼承；傳承　(動) 遺傳；獲得","ez":"她繼承了母親的金耳環。"},{"w":"manner","p":"[ˈmænə:r] n.","d":"A manner is the way someone does something.","e":"His manner of not looking at someone while speaking, is a bit rude.","zh":"(名) 方式；方法　(名) 禮貌；舉止","ez":"他說話時不看人的態度，有點沒禮貌。"},{"w":"mount","p":"[maʊnt] v.","d":"Something mounts when it becomes stronger over time.","e":"His fear mounted as the monster crawled out from under his bed.","zh":"(動) 爬上；登上　(動) 安裝；架設　(名) 坐騎；馬匹","ez":"當怪物從床底下爬出來時，他的恐懼加劇了。"},{"w":"roof","p":"[ruːf] n.","d":"A roof is the outside top part of a building.","e":"The roof was covered with snow.","zh":"(名) 屋頂；車頂","ez":"屋頂被雪覆蓋了。"},{"w":"shortage","p":"[ˈʃɔːrtɪdʒ] n.","d":"A shortage is a lack of something you need or want.","e":"Since there was a shortage of food, people were hungry.","zh":"(名) 短缺；不足","ez":"因為食物短缺，人們都餓著肚子。"},{"w":"solid","p":"[ˈsɒlɪd] adj.","d":"If something is solid, it is made of firm material.","e":"The safe looked to be quite solid.","zh":"(形) 固體的；堅固的；扎實的　(名) 固體","ez":"保險箱看起來相當堅固。"},{"w":"stock","p":"[stɒk] n.","d":"A stock is a stored amount of something.","e":"They keep a stock of rice so they&rsquo;ll always have something to eat.","zh":"(名) 存貨；股票　(動) 儲存；供應","ez":"他們儲備了一批米，這樣隨時都有東西吃。"},{"w":"substance","p":"[ˈsʌbstəns] n.","d":"A substance is any specific material or mixture of materials.","e":"Water is an important substance for all living things.","zh":"(名) 物質；實質","ez":"水是所有生物的重要物質。"},{"w":"tomb","p":"[tuːm] n.","d":"A tomb is a grave where a dead person is buried.","e":"Their whole family is buried inside the tomb.","zh":"(名) 墳墓；墓穴","ez":"他們全家都葬在墳墓裡。"},{"w":"wound","p":"[wuːnd] n.","d":"A wound is an injury to the body.","e":"He had many wounds after the car accident.","zh":"(名) 傷口；創傷　(動) 使受傷；傷害","ez":"車禍後他受了許多傷。"}]},{"id":24,"name":"Unit 24","words":[{"w":"bath","p":"[bæθ] n.","d":"A bath is water in a tub. People take a bath to get clean.","e":"After playing in the dirt, the boy took a bath.","zh":"(名) 洗澡；浴室　(動) 洗澡；沐浴","ez":"在泥土裡玩過之後，男孩洗了個澡。"},{"w":"bend","p":"[bend] v.","d":"To bend is to move something so it is not straight.","e":"Lee bent over and picked up the paper on the ground.","zh":"(動) 彎曲；折彎　(名) 彎曲；轉彎","ez":"李彎下腰撿起地上的紙。"},{"w":"chew","p":"[tʃuː] v.","d":"To chew is to move your mouth to break up food.","e":"I always chew my food carefully before swallowing it.","zh":"(動) 咀嚼；咬　(動) 反復思考；琢磨","ez":"我吞下食物前總是仔細咀嚼。"},{"w":"disabled","p":"[dɪsˈeɪbəld] adj.","d":"When a person is disabled, they cannot do what a normal person can do.","e":"The disabled man used a wheelchair to move around.","zh":"(形) 殘疾的；身心障礙的　(動) 使失去能力；使殘疾","ez":"這位殘障人士用輪椅四處移動。"},{"w":"fantastic","p":"[fænˈtæstɪk] adj.","d":"If something is fantastic, it is really good.","e":"The student did a fantastic job on his project and got an award.","zh":"(形) 極好的；非常棒的　(形) 奇異的；想像的","ez":"這個學生的專題做得非常好，獲得了獎項。"},{"w":"fiction","p":"[ˈfɪkʃən] n.","d":"Fiction is a story that is not true.","e":"I enjoy reading works of fiction because they are very entertaining.","zh":"(名) 虛構的故事；小說　(名) 謊言；虛假的事物","ez":"我喜歡讀小說，因為它們很有趣。"},{"w":"flag","p":"[flæg] n.","d":"A flag is a piece of colored cloth that represents something.","e":"Our country has a beautiful flag.","zh":"(名) 旗幟；國旗　(動) 衰退；標記　(形) 疲乏的；無力的","ez":"我們國家的國旗很漂亮。"},{"w":"inspect","p":"[ɪnˈspekt] v.","d":"To inspect is to look at something carefully.","e":"The mechanic inspected our car to see if it had any problems.","zh":"(動) 檢查；視察　(動) 檢視；查看","ez":"技師檢查了我們的車，看有沒有問題。"},{"w":"journal","p":"[ˈdʒəːrnəl] n.","d":"A journal is a type of magazine that deals with an academic subject.","e":"Mi-young was busy working on an article for an art journal.","zh":"(名) 日記；日誌　(名) 雜誌；期刊","ez":"美英忙著為一本藝術期刊寫文章。"},{"w":"liquid","p":"[ˈlɪkwɪd] n.","d":"A liquid is a substance that is neither solid nor gas.","e":"Water is the most important liquid for life.","zh":"(名) 液體　(形) 液態的；流動的","ez":"水是生命最重要的液體。"},{"w":"marvel","p":"[ˈmɑːrvəl] v.","d":"To marvel at something is to feel surprise and interest in it.","e":"We marveled at her excellent piano playing.","zh":"(名) 奇蹟；令人驚嘆的事物　(動) 對…感到驚奇；讚嘆","ez":"我們對她精湛的鋼琴演奏感到驚嘆。"},{"w":"nutrient","p":"[ˈnjuːtrɪənt] n.","d":"A nutrient is something that a living thing needs to keep it alive.","e":"Vegetables are full of important nutrients.","zh":"(名) 營養物質；養分","ez":"蔬菜富含重要的營養素。"},{"w":"overcome","p":"[ˌəʊvəˈkʌm] v.","d":"To overcome a problem is to successfully fix it.","e":"She overcame her shyness and spoke in front of the class.","zh":"(動) 克服；戰勝","ez":"她克服了害羞，在全班面前發言。"},{"w":"recall","p":"[rɪˈkɔːl] v.","d":"To recall something is to remember it.","e":"She was trying to recall what she had told her friend.","zh":"(動) 回憶；召回","ez":"她努力回想自己跟朋友說過什麼。"},{"w":"regret","p":"[rɪˈgret] v.","d":"To regret something is to wish that it didn’t happen.","e":"I regret that I was mean to my sister.","zh":"(動) 後悔；遺憾","ez":"我後悔對妹妹很刻薄。"},{"w":"soul","p":"[soʊl] n.","d":"A soul is a person’s spirit.","e":"Some people believe that the soul lives after the body dies.","zh":"(名) 靈魂；精神","ez":"有些人相信靈魂在肉體死後仍會存在。"},{"w":"sufficient","p":"[səˈfɪʃənt] adj.","d":"When something is sufficient, you have enough of it.","e":"After eating a sufficient amount of food, I left the table.","zh":"(形) 足夠的；充分的","ez":"吃了足夠的食物後，我離開了餐桌。"},{"w":"surgery","p":"[ˈsəːrdʒərɪ] n.","d":"Surgery is medical treatment when the doctor cuts open your body.","e":"I needed surgery to repair my leg after the accident.","zh":"(名) 手術；外科","ez":"車禍後我需要動手術修復我的腿。"},{"w":"tough","p":"[tʌf] adj.","d":"If something is tough, it is difficult.","e":"The man passed his driving test even though it was very tough.","zh":"(形) 困難的；堅韌的","ez":"這個男人通過了駕照考試，儘管它非常困難。"},{"w":"tube","p":"[tjuːb] n.","d":"A tube is a pipe through which water or air passes.","e":"The pile of tubes was going to be put in the ground.","zh":"(名) 管子；顯像管；捷運","ez":"那堆管子將被埋進地裡。"}]},{"id":25,"name":"Unit 25","words":[{"w":"admit","p":"[ədˈmɪt] v.","d":"To admit something means to say that it is true.","e":"I had to admit that I stole his idea.","zh":"(動) 承認；坦白　(動) 允許進入；放行","ez":"我不得不承認我偷了他的點子。"},{"w":"bin","p":"[bin] n.","d":"A bin is a container that holds things.","e":"He put his trash in the bin.","zh":"(名) 垃圾桶；廢棄物桶　(動) 將...放入垃圾桶；丟棄","ez":"他把垃圾丟進垃圾桶。"},{"w":"bowl","p":"[boul] n.","d":"A bowl is a deep, round dish that holds food or liquid.","e":"I ate a bowl of cereal for breakfast.","zh":"(名) 碗；盤　(動) 滾球；投球","ez":"我早餐吃了一碗麥片。"},{"w":"cabin","p":"[ˈkæbɪn] n.","d":"A cabin is a small house made of wood.","e":"My grandfather owns a small cabin in the country.","zh":"(名) 小屋；船艙","ez":"我爺爺在鄉下有一間小木屋。"},{"w":"cash","p":"[kæʃ] n.","d":"Cash is money in the form of paper or coins.","e":"I was able to save up enough cash to buy my mother a gift.","zh":"(名) 現金；現款　(動) 兌現；支取現金","ez":"我存夠了現金，可以給媽媽買禮物。"},{"w":"criminal","p":"[ˈkrɪmənl] n.","d":"A criminal is a person who does something against the law.","e":"The police made sure the criminal couldn&rsquo;t move his hands.","zh":"(形) 犯罪的；刑事的　(名) 罪犯；犯人","ez":"警察確保罪犯無法移動雙手。"},{"w":"dozen","p":"[ˈdʌzən] n.","d":"A dozen is a group of twelve things.","e":"Mom brought home a dozen donuts for us as a treat.","zh":"(名) 一打（12個）；許多","ez":"媽媽帶了一打甜甜圈回家給我們當點心。"},{"w":"elder","p":"[ˈeldər] adj.","d":"An elder is a person who is older than the people around them.","e":"Uncle Ray is my elder so I always try to be respectful.","zh":"(名) 年長者；長輩　(形) 年長的；較年長的","ez":"雷叔叔是我的長輩，所以我總是盡量保持尊重。"},{"w":"facial","p":"[ˈfeɪʃəl] adj.","d":"If something is facial, it is related to a person’s face.","e":"I could tell from his facial features that he was angry.","zh":"(形) 臉部的；面部的　(名) 臉部護理；美容療程","ez":"我從他的表情看得出來他在生氣。"},{"w":"fence","p":"[fens] n.","d":"A fence is a structure around a house or field.","e":"The farmer put up a fence so that no one could walk on her field.","zh":"(名) 柵欄；圍籬　(動) 用柵欄圍住；限制","ez":"農夫圍了籬笆，這樣就沒人能走進她的田地。"},{"w":"inspire","p":"[ɪnˈspaɪər] v.","d":"To inspire means to make a person want to do something.","e":"I was inspired to write a poem after watching the sunrise.","zh":"(動) 激勵；鼓舞","ez":"看完日出後，我受到啟發寫了一首詩。"},{"w":"mere","p":"[mɪər] adj.","d":"When something is mere, it is small or not important.","e":"We lost the game by a mere two points.","zh":"(形) 僅僅的；只不過的　(名) 湖；池塘","ez":"我們僅僅以兩分之差輸了比賽。"},{"w":"neat","p":"[niːt] adj.","d":"If something is neat, it is very clean or organized well.","e":"My sister always keeps her bedroom very neat.","zh":"(形) 整潔的；乾淨的　(形) 巧妙的；靈巧的","ez":"我妹妹總是讓她的臥室保持得非常整潔。"},{"w":"occasion","p":"[əˈkeɪʒən] n.","d":"An occasion is a time when something important happens.","e":"Her graduation was an occasion to have a good time.","zh":"(名) 場合；時刻　(名) 機會；原因　(動) 引起；造成","ez":"她的畢業典禮是個好好慶祝的場合。"},{"w":"penalty","p":"[ˈpɛnəltɪ] n.","d":"A penalty is a punishment, given when someone breaks a rule or law.","e":"I had to pay a $100 penalty for parking in the wrong spot.","zh":"(名) 處罰；罰金","ez":"我因為停錯位置而必須付一百美元的罰款。"},{"w":"rude","p":"[ruːd] adj.","d":"When someone is rude, they are mean and not polite.","e":"The children at the bus stop were very rude.","zh":"(形) 無禮的；粗魯的","ez":"公車站的孩子們非常沒禮貌。"},{"w":"settle","p":"[ˈsetl] v.","d":"To settle a problem means to end it by finding a solution.","e":"It took three of our best executives all day to settle the problem.","zh":"(動) 解決；安頓","ez":"我們花了三位最優秀的主管一整天的時間來解決這個問題。"},{"w":"vehicle","p":"[ˈvi:ɪkəl] n.","d":"A vehicle is a thing that moves people or things to another place.","e":"A ferry is a vehicle that takes people from one island to another.","zh":"(名) 車輛；交通工具","ez":"渡輪是一種把人從一個島載到另一個島的交通工具。"},{"w":"wallet","p":"[ˈwɒlɪt] n.","d":"A wallet is a thing that holds money and fits in a pocket.","e":"I keep my money in a wallet.","zh":"(名) 錢包；皮夾","ez":"我把錢放在錢包裡。"},{"w":"yell","p":"[jel] v.","d":"To yell is to say something very loudly.","e":"The coach yelled at his team for their poor performance.","zh":"(動) 大喊；叫喊","ez":"教練對隊員們糟糕的表現大聲斥責。"}]},{"id":26,"name":"Unit 26","words":[{"w":"accuse","p":"[əˈkjuːz] v.","d":"To accuse someone of something is to blame them for doing it.","e":"She accused her brother of breaking her computer.","zh":"(動) 指控；控告　非難；譴責","ez":"她指控哥哥弄壞了她的電腦。"},{"w":"adjust","p":"[əˈdʒʌst] v.","d":"To adjust something means to change it so it is better.","e":"He adjusted the old guitar to make it sound better.","zh":"(動) 調整；適應　(動) 調節；改變","ez":"他調整了舊吉他，讓聲音更好聽。"},{"w":"amuse","p":"[əˈmjuːz] v.","d":"To amuse someone means to do something that is funny or entertaining.","e":"The singer was very good. She amused the crowd.","zh":"(動) 逗樂；使高興　(動) 消遣；娛樂","ez":"那位歌手很厲害，她逗樂了群眾。"},{"w":"coral","p":"[ˈkɒ:rəl] n.","d":"Coral is the hard, colorful material formed by the shells of animals.","e":"The diver admired the beautiful coral under the water.","zh":"(名) 珊瑚　(形) 珊瑚色的；珊瑚製的","ez":"潛水員欣賞了水底美麗的珊瑚。"},{"w":"cotton","p":"[ˈkɒtn] n.","d":"Cotton is a cloth made from the fibers of the cotton plant.","e":"I like to wear clothes made from cotton in the summer.","zh":"(名) 棉花；棉布　(形) 棉製的；棉質的","ez":"夏天我喜歡穿棉質衣服。"},{"w":"crash","p":"[kræʃ] v.","d":"To crash means to hit and break something.","e":"There was a loud noise when the car crashed into the tree.","zh":"(動) 撞擊；碰撞　(名) 撞車；碰撞聲","ez":"車子撞到樹時發出了巨大的聲響。"},{"w":"deck","p":"[dek] n.","d":"A deck is a wooden floor built outside of a house or the floor of a ship.","e":"A ship will store many supplies below its deck.","zh":"(名) 甲板；層板　(動) 裝飾；整理","ez":"船會在甲板下儲存許多補給品。"},{"w":"engage","p":"[enˈgeɪdʒ] v.","d":"To engage in something means to do it.","e":"Dad was engaged in sawing a piece of wood in half.","zh":"(動) 吸引；使參與　(動) 從事；參加","ez":"爸爸忙著把一塊木頭鋸成兩半。"},{"w":"firm","p":"[fə:rm] adj.","d":"When something is firm, it is solid but not too hard.","e":"He sleeps better on a firm bed.","zh":"(形) 堅固的；結實的　(動) 使堅固；成立","ez":"他睡在硬床上睡得更安穩。"},{"w":"fuel","p":"[fjʊ:əl] n.","d":"Fuel is something that creates heat or energy.","e":"Heat is the fuel that comes from fire.","zh":"(名) 燃料；汽油　(動) 供給燃料；激起","ez":"熱能來自火焰，是燃料的一種。"},{"w":"grand","p":"[grænd] adj.","d":"When something is grand, it is big and liked by people.","e":"The grand mountain rose high into the sky.","zh":"(形) 宏偉的；壯麗的　(形) 重要的；盛大的","ez":"雄偉的山峰高聳入雲。"},{"w":"hurricane","p":"[ˈhə:rəkein] n.","d":"A hurricane is a bad storm that happens over the ocean.","e":"The wind from the hurricane bent the palm tree.","zh":"(名) 颶風；強烈風暴","ez":"颶風吹彎了棕櫚樹。"},{"w":"loss","p":"[lɒ(:)s] n.","d":"A loss means the act or an instance of losing something.","e":"I suffered a big loss while I was gambling.","zh":"(名) 損失；虧損　(名) 失去；喪失","ez":"我賭博時賠了一大筆錢。"},{"w":"plain","p":"[pleɪn] adj.","d":"If something is simple, it is plain and not decorated.","e":"He bought a pair of plain white shoes over the weekend.","zh":"(形) 樸素的；清楚的","ez":"他週末買了一雙樸素的白鞋。"},{"w":"reef","p":"[riːf] n.","d":"A reef is a group of rocks or coral that rise to or near the ocean.","e":"He walked along the reef and looked at the water below.","zh":"(名) 礁；暗礁","ez":"他沿著礁石走，看著下方的海水。"},{"w":"shut","p":"[ʃʌt] v.","d":"To shut something means to close it tightly.","e":"Please shut the door; the air outside is cold.","zh":"(動) 關閉；關上","ez":"請關上門，外面的空氣很冷。"},{"w":"strict","p":"[strɪkt] adj.","d":"When someone is strict, they make sure others follow rules.","e":"The teacher is strict. She does not let students talk in class.","zh":"(形) 嚴格的；嚴厲的","ez":"老師很嚴格，她不讓學生在課堂上講話。"},{"w":"surf","p":"[səːrf] v.","d":"To surf means to use a special board to ride on waves in the ocean.","e":"The students went to the beach to surf during their vacation.","zh":"(動) 衝浪；上網瀏覽","ez":"學生們在假期去海邊衝浪。"},{"w":"task","p":"[tæsk] n.","d":"A task is a piece of work to be done that is usually difficult.","e":"My task for the weekend was to clean the entire back yard.","zh":"(名) 任務；工作","ez":"我週末的任務是打掃整個後院。"},{"w":"zone","p":"[zoun] n.","d":"A zone is an area that has different qualities from the ones around it.","e":"Firefighters often work in danger zones.","zh":"(名) 區域；地帶","ez":"消防員經常在危險區域工作。"}]},{"id":27,"name":"Unit 27","words":[{"w":"apology","p":"[əˈpɒlədʒɪ] n.","d":"An apology is something someone says to show that they are sorry.","e":"After arguing with her teacher, the girl wrote the teacher an apology.","zh":"(名) 道歉；為...表示歉意　(動) 為...道歉；向...認錯","ez":"和老師爭論後，女孩寫了道歉信給老師。"},{"w":"bold","p":"[bould] adj.","d":"If someone is bold, they are not afraid of doing something.","e":"The bold man climbed the high mountain.","zh":"(形) 勇敢的；大膽的　(動) 大膽嘗試；冒險","ez":"那個大膽的男人爬上了高山。"},{"w":"capture","p":"[ˈkæptʃər] v.","d":"To capture someone or something is to catch them.","e":"James tried to capture the bubbles in his hands.","zh":"(動) 捕捉；抓住　(動) 拍攝；記錄　(名) 俘虜；捕獲","ez":"詹姆斯試圖用手抓住泡泡。"},{"w":"cardinal","p":"[ˈkɑːrdənl] adj.","d":"If a rule or quality is cardinal, then it is the most important one.","e":"Raising your hand in the classroom before you speak is a cardinal rule.","zh":"(形) 最重要的；基本的　(名) 樞機主教；紅衣主教","ez":"在課堂上發言前先舉手是一項基本規則。"},{"w":"duke","p":"[djuːk] n.","d":"A duke is a man of high social rank but below a king or queen.","e":"The duke ruled over the land.","zh":"(名) 公爵；貴族　(名) 拳擊中的揮拳動作","ez":"公爵統治著這片土地。"},{"w":"expose","p":"[ɪksˈpəʊz] v.","d":"To expose is to make known something that is hidden.","e":"He took off his shirt exposing his costume.","zh":"(動) 揭露；曝光　(動) 使暴露；使接觸","ez":"他脫掉襯衫，露出了裡面的服裝。"},{"w":"guilty","p":"[ˈgɪltɪ] adj.","d":"If people feel guilty, they feel bad for what they did.","e":"I felt guilty for taking my sister&rsquo;s cookies.","zh":"(形) 有罪的；內疚的　(形) 犯過錯的；感到懊悔的","ez":"我因為偷吃了妹妹的餅乾而感到內疚。"},{"w":"hire","p":"[ˈhaɪər] v.","d":"To hire someone is to pay them money to work for you.","e":"We hired a man to paint our house.","zh":"(動) 雇用；聘用　(名) 租賃；出租","ez":"我們雇了一個人來粉刷房子。"},{"w":"innocent","p":"[ˈɪnəsnt] adj.","d":"If someone is innocent, they are not guilty of a crime.","e":"The judge said that the woman was innocent of the crime.","zh":"(形) 無罪的；清白的　(形) 天真的；無知的","ez":"法官判定那名女子無罪。"},{"w":"jail","p":"[dʒeɪl] n.","d":"Jail is a place where criminals go to be punished.","e":"The thief was caught and sent to jail for ten years.","zh":"(名) 監獄；牢房　(動) 監禁；關進監獄","ez":"小偷被抓住，判了十年監禁。"},{"w":"minister","p":"[ˈmɪnɪstər] n.","d":"A minister is an important person in government with many duties.","e":"The minister of education controls the country&rsquo;s schools.","zh":"(名) 部長；部會首長　(動) 提供幫助；照顧","ez":"教育部長掌管全國的學校。"},{"w":"ordinary","p":"[ˈɔːrdənerɪ] adj.","d":"If someone or something is ordinary, they are not special in any way.","e":"Today was just an ordinary day. Nothing unusual happened.","zh":"(形) 普通的；平凡的　(形) 日常的；常見的","ez":"今天只是普通的一天，沒發生什麼特別的事。"},{"w":"permanent","p":"[ˈpəːrmənənt] adj.","d":"If something is permanent, it lasts for a long time or forever.","e":"We don&rsquo;t know if Aunt Mildred&rsquo;s visit will be a permanent one.","zh":"(形) 永久的；固定的","ez":"我們不知道米爾德麗德阿姨的來訪是否會是長期的。"},{"w":"preserve","p":"[priˈzəːrv] v.","d":"To preserve is to protect something from harm.","e":"Dad sprayed a chemical on the house to help preserve its looks.","zh":"(動) 保存；保護","ez":"爸爸在房子上噴了一種化學藥劑，以保持它的美觀。"},{"w":"pronounce","p":"[prəˈnaʊns] v.","d":"To pronounce is to say the sounds of letters or words.","e":"Young children often have trouble pronouncing words right.","zh":"(動) 發音；宣稱","ez":"小孩子常常很難正確發音。"},{"w":"resemble","p":"[rɪˈzembəl] v.","d":"To resemble someone is to look like them.","e":"The baby resembles his father a great deal.","zh":"(動) 類似；像","ez":"這個嬰兒長得非常像他爸爸。"},{"w":"symptom","p":"[ˈsimptəm] n.","d":"A symptom of a bad condition or illness is a sign that it is happening.","e":"Sneezing and a high fever are symptoms of the common cold.","zh":"(名) 症狀；徵兆","ez":"打噴嚏和高燒是普通感冒的症狀。"},{"w":"tobacco","p":"[təˈbækou] n.","d":"Tobacco is a plant whose leaves are smoked, such as in cigarettes.","e":"The tobacco in cigarettes is bad for your health.","zh":"(名) 菸草；菸草製品","ez":"香菸中的菸草對健康有害。"},{"w":"twin","p":"[twɪn] n.","d":"Twins are two children born at the same time.","e":"My sister and I are twins. We look exactly the same.","zh":"(名) 雙胞胎之一　(形) 雙胞胎的；成對的","ez":"我和妹妹是雙胞胎，我們長得一模一樣。"},{"w":"witch","p":"[wɪtʃ] n.","d":"A witch is a woman with magical powers.","e":"People think that witches fly around on broomsticks.","zh":"(名) 女巫；巫婆","ez":"人們認為女巫會騎著掃帚飛來飛去。"}]},{"id":28,"name":"Unit 28","words":[{"w":"accompany","p":"[əˈkʌmpənɪ] v.","d":"To accompany other people means to join them or go with them.","e":"My brothers accompanied me to the movie.","zh":"(動) 陪同；伴隨","ez":"我的兄弟們陪我去看電影。"},{"w":"bare","p":"[bɛər] adj.","d":"When something is bare, it is plain. It has no covering.","e":"He likes to walk around in his bare feet.","zh":"(形) 赤裸的；光禿的　(動) 露出；暴露","ez":"他喜歡光著腳走來走去。"},{"w":"branch","p":"[bræntʃ] n.","d":"A branch is the part of a tree with leaves.","e":"The monkey was hanging from a branch on the tree.","zh":"(名) 樹枝；分支　(動) 分開；分岔","ez":"猴子掛在樹枝上。"},{"w":"breath","p":"[breθ] n.","d":"A breath is the air that goes into and out of one’s lungs.","e":"You can&rsquo;t take a breath under water.","zh":"(名) 呼吸；氣息　(動) 呼吸；吐氣","ez":"你在水裡無法呼吸。"},{"w":"bridge","p":"[brɪdʒ] n.","d":"A bridge is something that is built over a river so people can cross it.","e":"The old bridge fell into the river.","zh":"(名) 橋；橋樑　(動) 架橋；連接","ez":"舊橋倒塌掉進了河裡。"},{"w":"cast","p":"[kæst] v.","d":"To cast something means to throw it.","e":"The fisherman cast his line into the water.","zh":"(動) 投擲；拋　(動) 選舉；投票　(名) 演員陣容；角色安排","ez":"漁夫把釣線拋進水裡。"},{"w":"dare","p":"[dɛər] v.","d":"To dare means to be brave enough to try something.","e":"He dared to jump out of the airplane and skydive.","zh":"(動) 敢；膽敢　(名) 挑戰；賭注","ez":"他敢於跳出飛機進行高空跳傘。"},{"w":"electronic","p":"[ɪlekˈtrɒnɪk] adj.","d":"When something is electronic, it uses electricity to do something.","e":"I like having electronic devices such as an MP3 player."
