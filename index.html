) 項目；物品　(名) 條款；項次","ez":"我的書包裡有很多上學要用的東西。"},{"w":"offer","p":"[ˈɒfə] v.","d":"To offer is to present someone with something.","e":"He offered me the keys to his car.","zh":"(動) 提供；提議　(名) 提議；報價","ez":"他把他車子的鑰匙給了我。"},{"w":"price","p":"[prʌɪs] n.","d":"The price of something is how much it costs.","e":"What is the price of this item?","zh":"(名) 價格；代價　(動) 定價；標價","ez":"這個東西的價格是多少？"},{"w":"product","p":"[ˈprɒdʌkt] n.","d":"A product is something that is made.","e":"My sister has many beauty products in her room.","zh":"(名) 產品；產物","ez":"我姊姊的房間裡有很多美容產品。"},{"w":"property","p":"[ˈprɒpəti] n.","d":"Property is something that someone owns.","e":"The house is now my property.","zh":"(名) 財產；房產；性質","ez":"這棟房子現在是我的財產。"},{"w":"purchase","p":"[ˈpəːtʃɪs] v.","d":"To purchase something is to buy it.","e":"I recently purchased a new car.","zh":"(動) 購買","ez":"我最近買了一輛新車。"},{"w":"recommend","p":"[rɛkəˈmɛnd] v.","d":"To recommend something is to say that someone should do it.","e":"My doctor recommended that I get some exercise.","zh":"(動) 推薦；建議","ez":"我的醫生建議我多運動。"},{"w":"select","p":"[sɪˈlɛkt] v.","d":"To select something is to choose it.","e":"I hope that I selected the right answers on the test.","zh":"(動) 選擇；挑選","ez":"我希望我在考試中選對了答案。"},{"w":"tool","p":"[tuːl] n.","d":"A tool is something that helps you do a task.","e":"We used a tool to fix the window.","zh":"(名) 工具；用具","ez":"我們用一個工具來修理窗戶。"},{"w":"treat","p":"[triːt] v.","d":"To treat is to act in a certain way toward someone.","e":"The cats treated the mouse very nicely.","zh":"(動) 對待；請客","ez":"那些貓對老鼠非常好。"}]},{"id":19,"name":"Unit 19","words":[{"w":"alive","p":"[əˈlʌɪv] adj.","d":"If someone or something is alive, they are not dead.","e":"My grandparents are still alive even though they are over 90.","zh":"(形) 活著的；有生命的　(形) 精力充沛的；生氣勃勃的","ez":"我的祖父母雖然超過九十歲了，但還健在。"},{"w":"bone","p":"[bəʊn] n.","d":"A bone is a hard part of the body.","e":"I brought home a nice bone for my dog.","zh":"(名) 骨頭；骨骼　(動) 剔除骨頭","ez":"我帶了一根好骨頭回家給我的狗。"},{"w":"bother","p":"[ˈbɒðə] v.","d":"To bother is to make the effort to do something.","e":"No one bothered to wash the dishes today.","zh":"(動) 煩擾；打擾　(名) 麻煩事；討厭的人","ez":"今天沒有人願意洗碗。"},{"w":"captain","p":"[ˈkaptɪn] n.","d":"A captain is the person who leads a ship or airplane.","e":"The captain sailed his ship to Australia.","zh":"(名) 船長；隊長　(動) 擔任…的隊長；領導","ez":"船長開著他的船航行到澳洲。"},{"w":"conclusion","p":"[kənˈkluːʒ(ə)n] n.","d":"The conclusion of something is the final part of it.","e":"At the conclusion of the race, the spectators cheered for the winner.","zh":"(名) 結論；結束　(動) 推斷；結束","ez":"比賽結束時，觀眾為贏家歡呼。"},{"w":"doubt","p":"[daʊt] n.","d":"Doubt is a feeling of not being sure.","e":"I have doubt that the story is true.","zh":"(動) 懷疑；不確定　(名) 疑惑；不信任","ez":"我懷疑這個故事的真實性。"},{"w":"explore","p":"[ɪkˈsplɔː] v.","d":"To explore is to look for new places.","e":"He wants to explore the world and see new things.","zh":"(動) 探索；探險　(動) 調查；檢查","ez":"他想探索世界，見識新事物。"},{"w":"foreign","p":"[ˈfɒrɪn] adj.","d":"If something is foreign, it is from a different country.","e":"Mexican food is a popular foreign food.","zh":"(形) 外國的；國外的　(形) 陌生的；不熟悉的","ez":"墨西哥菜是一種受歡迎的外國食物。"},{"w":"glad","p":"[ɡlæd] adj.","d":"If you are glad, you are happy.","e":"I am glad you came to my party.","zh":"(形) 高興的；快樂的　(形) 樂意的；願意的","ez":"我很高興你來參加我的派對。"},{"w":"however","p":"[haʊˈɛvə] adv.","d":"However means despite or not being influenced by something.","e":"She is a great cook. However, she never had professional lessons.","zh":"(連) 然而；但是　(副) 無論如何；不管怎樣","ez":"她是個很棒的廚師，但她從來沒有受過專業訓練。"},{"w":"injustice","p":"[ɪnˈdʒʌstɪs] n.","d":"Injustice is a lack of fairness or justice.","e":"Putting an innocent person in jail is an act of injustice.","zh":"(名) 不公正；冤屈　(名) 不公平的行為；冤案","ez":"把無辜的人關進監獄是一種不公義的行為。"},{"w":"international","p":"[ɪntəˈnaʃ(ə)n(ə)l] adj.","d":"If something is international, it involves more than one country.","e":"The United Nations is a powerful international organization.","zh":"(形) 國際的；國際間的　(副) 國際上；在國際範圍內","ez":"聯合國是一個強大的國際組織。"},{"w":"lawyer","p":"[ˈlɔːjə] n.","d":"A lawyer works with the law and represents people in court.","e":"The lawyer left the courthouse after the judge made her decision.","zh":"(名) 律師；法律顧問","ez":"法官做出判決後，律師離開了法院。"},{"w":"mention","p":"[ˈmɛnʃ(ə)n] v.","d":"To mention something is to talk about it.","e":"The doctors mentioned the problems that the patient was having.","zh":"(動) 提到；說起　(名) 提及；提到","ez":"醫生提到了病人遇到的問題。"},{"w":"policy","p":"[ˈpɒlɪsi] n.","d":"A policy is a rule.","e":"He told us that his policy was to put customers first.","zh":"(名) 政策；方針","ez":"他告訴我們，他的政策是以顧客為優先。"},{"w":"social","p":"[ˈsəʊʃ(ə)l] adj.","d":"If something is social, it is about many people in a community.","e":"People should come together and fix the world&rsquo;s social problems.","zh":"(形) 社會的；社交的","ez":"人們應該團結起來，解決世界的社會問題。"},{"w":"speech","p":"[spiːtʃ] n.","d":"A speech is something said to a group of people.","e":"She gave a speech to the class.","zh":"(名) 演講；說話能力","ez":"她對全班同學發表演說。"},{"w":"staff","p":"[stɑːf] n.","d":"A staff is a group of people working together in a company.","e":"My dad has a staff of four people to help him at the office.","zh":"(名) 員工；全體工作人員","ez":"我爸爸在辦公室裡有四個員工協助他。"},{"w":"toward","p":"[təˈwɔːd] prep.","d":"If you go toward something, you go closer to it.","e":"Santa walked toward my house with a special tree.","zh":"(介) 朝向；為了","ez":"聖誕老人帶著一棵特別的樹走向我家。"},{"w":"wood","p":"[wʊd] n.","d":"Wood is the thing that trees are made of.","e":"I put the pieces of wood in a pile.","zh":"(名) 木頭；木材","ez":"我把那些木頭碎片堆成一堆。"}]},{"id":20,"name":"Unit 20","words":[{"w":"achieve","p":"[əˈtʃiːv] v.","d":"To achieve something is to successfully do it after trying hard.","e":"I was happy that I could achieve my goal.","zh":"(動) 達成；完成　(動) 獲得；取得","ez":"我很高興我能達成我的目標。"},{"w":"advise","p":"[ədˈvʌɪz] v.","d":"To advise someone is to tell them what to do.","e":"My mother often advises people about their money.","zh":"(動) 建議；勸告　(動) 通知；告知","ez":"我媽媽經常給別人理財建議。"},{"w":"already","p":"[ɔːlˈrɛdi] adv.","d":"If something happens already, it happens before a certain time.","e":"It is already time for the movie to start. Let&rsquo;s go in.","zh":"(副) 已經；已經做完","ez":"電影已經要開始了，我們進去吧。"},{"w":"basic","p":"[ˈbeɪsɪk] adj.","d":"If something is basic, it is very simple or easy.","e":"I learned some basic English skills in school today.","zh":"(形) 基本的；基礎的　(名) 基本要素；基礎","ez":"我今天在學校學了一些基本的英文技能。"},{"w":"bit","p":"[bɪt] n.","d":"A bit is a small amount of something.","e":"I ate a bit of chocolate before I went to bed.","zh":"(名) 一點；少量　(動) 咬；叮咬","ez":"我在睡覺前吃了一點巧克力。"},{"w":"consider","p":"[kənˈsɪdə] v.","d":"To consider something means to think about it.","e":"Pete didn&rsquo;t like his job. He considered getting a new one.","zh":"(動) 考慮；認為　(動) 仔細思考；打量","ez":"彼得不喜歡他的工作，他考慮找個新的。"},{"w":"destroy","p":"[dɪˈstrɔɪ] v.","d":"To destroy means to damage something so badly that it cannot be used.","e":"The glass was destroyed.","zh":"(動) 摧毀；破壞　(動) 殺死；消滅","ez":"玻璃杯被打破了。"},{"w":"entertain","p":"[ɛntəˈteɪn] v.","d":"To entertain someone is to do something that they enjoy.","e":"The clown entertained the kids at the party.","zh":"(動) 娛樂；招待　(動) 使高興；逗樂","ez":"小丑在派對上娛樂了孩子們。"},{"w":"extra","p":"[ˈɛkstrə] adj.","d":"If something is extra, it is more than what is needed.","e":"The squirrel had extra nuts for the winter.","zh":"(形) 額外的；多餘的　(副) 特別地；非常","ez":"松鼠為冬天準備了額外的堅果。"},{"w":"goal","p":"[ɡəʊl] n.","d":"A goal is something you work toward.","e":"Her goal was to become a doctor.","zh":"(名) 目標；進球　(動) 進球；得分","ez":"她的目標是成為一名醫生。"},{"w":"lie","p":"[lʌɪ] v.","d":"To lie is to say or write something untrue to deceive someone.","e":"Whenever Pinocchio lied to his father, his nose grew.","zh":"(動) 說謊；撒謊　(名) 謊言；假話","ez":"每當小木偶皮諾丘對他爸爸說謊時，他的鼻子就會變長。"},{"w":"meat","p":"[miːt] n.","d":"Meat is food made of animals.","e":"This piece of meat I&rsquo;m eating tastes very good.","zh":"(名) 肉；肉類","ez":"我正在吃的這塊肉味道非常好。"},{"w":"opinion","p":"[əˈpɪnjən] n.","d":"An opinion is a thought about a person or a thing.","e":"Meg told me her opinion of my story. She said it was not funny.","zh":"(名) 意見；看法　(名) 觀點；見解","ez":"梅格告訴我她對我故事的看法，她說一點都不好笑。"},{"w":"real","p":"[riːl] adj.","d":"If something is real, it actually exists.","e":"The handbag has a stamp on it, so it&rsquo;s real.","zh":"(形) 真正的；實際的","ez":"這個手提包上有個印章，所以它是真品。"},{"w":"reflect","p":"[rɪˈflɛkt] v.","d":"To reflect is when a surface sends back light, heat, sound or an image.","e":"Her face was reflected on the smooth glass.","zh":"(動) 反射；反映","ez":"她的臉映照在光滑的玻璃上。"},{"w":"regard","p":"[rɪˈɡɑːd] v.","d":"To regard someone or something is to think of them in a certain way.","e":"The boy regarded the girl as a good friend.","zh":"(動) 視為；看待","ez":"那個男孩把那個女孩當作好朋友。"},{"w":"serve","p":"[səːv] v.","d":"To serve someone is to give them food or drinks.","e":"He served us our drinks quickly.","zh":"(動) 服務；提供","ez":"他很快地為我們送上飲料。"},{"w":"vegetable","p":"[ˈvɛdʒtəb(ə)l] n.","d":"A vegetable is a plant used as food.","e":"Carrots are my favorite vegetable.","zh":"(名) 蔬菜","ez":"紅蘿蔔是我最喜歡的蔬菜。"},{"w":"war","p":"[wɔː] n.","d":"A war is a big fight between two groups of people.","e":"Many young men died in the war.","zh":"(名) 戰爭；衝突","ez":"許多年輕人在戰爭中喪生。"},{"w":"worth","p":"[wəːθ] adj.","d":"If something is worth an amount of money, it costs that amount.","e":"Our house is worth a lot of money.","zh":"(形) 值得的；(名) 價值","ez":"我們的房子價值很多錢。"}]},{"id":21,"name":"Unit 21","words":[{"w":"appear","p":"[əˈpɪə] v.","d":"To appear is to seem.","e":"She appeared to be sad. She was crying.","zh":"(動) 出現；顯得　(動) 似乎；看起來","ez":"她看起來很難過，正在哭。"},{"w":"base","p":"[beɪs] n.","d":"The base is the bottom of something.","e":"The base of the table has three legs.","zh":"(名) 基地；根據地　(名) 基礎；基本　(動) 以...為基礎","ez":"桌子的底座有三條腿。"},{"w":"brain","p":"[breɪn] n.","d":"The brain is the organ in your head that lets you think.","e":"You must use your brain to solve the problem.","zh":"(名) 大腦；腦部　(名) 智力；聰慧","ez":"你必須動腦筋來解決這個問題。"},{"w":"career","p":"[kəˈrɪə] n.","d":"A career is a job that you do for a large part of your life.","e":"He was in the hospitality business for most of his career.","zh":"(名) 職業；生涯　(動) 快速移動；疾馳","ez":"他職業生涯大部分時間都在從事接待業。"},{"w":"clerk","p":"[klɑːk] n.","d":"A clerk is a type of worker. Clerks in a store help customers.","e":"The clerk added up her bill for the groceries.","zh":"(名) 職員；店員　(名) 牧師助理","ez":"店員加總了她購買雜貨的帳單。"},{"w":"effort","p":"[ˈɛfət] n.","d":"Effort is hard work or an attempt to do something.","e":"He always puts a lot of effort into his studies.","zh":"(名) 努力；用力　(動) 努力；盡力","ez":"他總是在學業上投入很多心力。"},{"w":"enter","p":"[ˈɛntə] v.","d":"To enter a place is to go into it.","e":"Two guards greeted me as I entered the front door.","zh":"(動) 進入；進去　(動) 參加；報名","ez":"我走進前門時，兩名警衛向我打招呼。"},{"w":"excellent","p":"[ˈɛks(ə)l(ə)nt] adj.","d":"When something is excellent, it is very good.","e":"I got an excellent score on my school test.","zh":"(形) 優秀的；傑出的　(形) 極好的；卓越的","ez":"我在學校考試中取得了優異的成績。"},{"w":"hero","p":"[ˈhɪərəʊ] n.","d":"A hero is a brave person who does things to help others.","e":"To children, the man in the blue and red costume was a real hero.","zh":"(名) 英雄；勇士　(名) 英勇人物；偶像","ez":"對孩子們來說，那個穿著藍紅相間服裝的男人是真正的英雄。"},{"w":"hurry","p":"[ˈhʌri] v.","d":"To hurry is to do something quickly.","e":"I hurried home on my bike.","zh":"(動) 匆忙；急速　(名) 匆忙；急促","ez":"我騎著腳踏車匆匆回家。"},{"w":"inform","p":"[ɪnˈfɔːm] v.","d":"To inform someone is to tell them about something.","e":"I called and informed her about my idea.","zh":"(動) 通知；告訴　(動) 提供資訊；使了解","ez":"我打電話告訴她我的想法。"},{"w":"later","p":"[ˈleɪtə] adv.","d":"Later means after the present, expected, or usual time.","e":"She missed the train, so she&rsquo;ll arrive a little later than expected.","zh":"(副) 之後；稍後　(形) 較晚的；後來的","ez":"她錯過了火車，所以會比預期晚一點到。"},{"w":"leave","p":"[liːv] v.","d":"To leave means to go away from someone or something.","e":"He packed his bag and was ready to leave for home.","zh":"(動) 離開；出發　(動) 留下；遺留","ez":"他收拾好包包，準備回家。"},{"w":"locate","p":"[lə(ʊ)ˈkeɪt] v.","d":"To locate something is to find it.","e":"I could not locate my keys in the house.","zh":"(動) 定位；查明位置　(動) 建立；設置","ez":"我在房子裡找不到我的鑰匙。"},{"w":"nurse","p":"[nəːs] n.","d":"A nurse is a person who helps sick people in the hospital.","e":"A nurse helped me get better.","zh":"(名) 護士；看護　(動) 護理；照顧","ez":"一名護士幫助我康復。"},{"w":"operation","p":"[ɒpəˈreɪʃ(ə)n] n.","d":"An operation is when a doctor replaces or removes something in the body.","e":"The operation on my arm was a success.","zh":"(名) 操作；運作　(名) 手術；醫療行為","ez":"我的手臂手術很成功。"},{"w":"pain","p":"[peɪn] n.","d":"Pain is the feeling that you have when you are hurt.","e":"His head was full of pain.","zh":"(名) 疼痛；痛苦　(動) 使痛苦","ez":"他的頭痛得厲害。"},{"w":"refuse","p":"[rɪˈfjuːz] v.","d":"To refuse something is to say “no” to it.","e":"The dog refused to play with the cat.","zh":"(動) 拒絕","ez":"那隻狗拒絕和貓玩。"},{"w":"though","p":"[ðəʊ] conj.","d":"Though is used when the second idea makes the first seem surprising.","e":"Though he was overweight, he liked to be active.","zh":"(連) 雖然；儘管　(副) 可是；不過","ez":"雖然他體重過重，但他喜歡保持活躍。"},{"w":"various","p":"[ˈvɛːrɪəs] adj.","d":"If something is various, there are many types of it.","e":"She owned shoes of various styles.","zh":"(形) 各種不同的；多樣的","ez":"她擁有各種款式的鞋子。"}]},{"id":22,"name":"Unit 22","words":[{"w":"actual","p":"[ˈaktʃʊəl] adj.","d":"Actual means that something is real or true.","e":"This is the actual sword that the King owned, not a fake one.","zh":"(形) 實際的；真實的　(副) 實際上；其實","ez":"這是國王真正擁有的劍，不是仿冒品。"},{"w":"amaze","p":"[əˈmeɪz] v.","d":"To amaze someone is to surprise them very much.","e":"The news in the paper amazed Jack.","zh":"(動) 使驚訝；使驚奇","ez":"報紙上的新聞讓傑克大吃一驚。"},{"w":"charge","p":"[tʃɑːdʒ] n.","d":"A charge is the price to pay for something.","e":"The charge for the shirts was $15.00.","zh":"(動) 收費；要價　(動) 指控；控告　(名) 費用；價格","ez":"這些襯衫的費用是15美元。"},{"w":"comfort","p":"[ˈkʌmfət] v.","d":"To comfort someone means to make them feel better.","e":"I wanted to comfort my friend after I heard the bad news.","zh":"(名) [ˈkʌmfɚt] 舒適；安慰　(動) [kəmˈfɚt] 安慰；使舒適　(形) 舒適的；安逸的","ez":"聽到壞消息後，我想安慰我的朋友。"},{"w":"contact","p":"[kənˈtakt] v.","d":"To contact someone is to speak or write to them.","e":"I contacted Sue about my party.","zh":"(名) [ˈkɑntækt] 接觸；聯繫　(動) [kənˈtækt] 聯絡；接觸","ez":"我聯繫了蘇關於我的派對。"},{"w":"customer","p":"[ˈkʌstəmə] n.","d":"A customer is a person who buys something at a store.","e":"The customer put a few items in a bag.","zh":"(名) 顧客；客戶　(名) 消費者；購買者","ez":"顧客把幾件物品放進袋子裡。"},{"w":"deliver","p":"[dɪˈlɪvə] v.","d":"To deliver something is to take it from one place to another.","e":"The man delivered Chinese food to my house.","zh":"(動) 遞送；運送　傳達；發表","ez":"那個男人把中式餐點送到我家。"},{"w":"earn","p":"[əːn] v.","d":"To earn means to get money for the work you do.","e":"He earns his living as a chef in a great restaurant.","zh":"(動) 賺；掙　獲得；贏得","ez":"他在一家高級餐廳擔任廚師謀生。"},{"w":"gate","p":"[ɡeɪt] n.","d":"A gate is a type of door. Gates are usually made of metal or wood.","e":"We want to put up a wooden gate around our house.","zh":"(名) 大門；門　(名) 入口；通道","ez":"我們想在房子周圍豎起一道木柵欄。"},{"w":"include","p":"[ɪnˈkluːd] v.","d":"To include something means to have it as part of a group.","e":"Does this meal include a soft drink?","zh":"(動) 包括；包含　(動) 將…計入；納入","ez":"這頓餐點包含軟性飲料嗎？"},{"w":"manage","p":"[ˈmanɪdʒ] v.","d":"To manage something means to control or be in charge of it.","e":"I had to manage the meeting myself.","zh":"(動) 管理；處理　(動) 設法做到；勉強應付","ez":"我必須自己主持會議。"},{"w":"mystery","p":"[ˈmɪst(ə)ri] n.","d":"A mystery is something that is difficult to understand or explain.","e":"The path on the map was a complete mystery to me.","zh":"(名) 謎；神祕的事物　(形) 神祕的；難以理解的","ez":"地圖上的那條路徑對我來說完全是個謎。"},{"w":"occur","p":"[əˈkəː] v.","d":"To occur means to happen.","e":"When did the thunderstorm occur?","zh":"(動) 發生；出現　(動) 存在；被發現","ez":"雷雨是什麼時候發生的？"},{"w":"opposite","p":"[ˈɒpəzɪt] n.","d":"If A is the opposite of B, A is completely different from B.","e":"The opposite of black is white.","zh":"(形) 相反的；對面的　(名) 對立面；反面　(介) 在…對面","ez":"黑色的相反是白色。"},{"w":"plate","p":"[pleɪt] n.","d":"A plate is a flat round thing that you put food on.","e":"I put my plate down so I could put some food on it.","zh":"(名) 盤子；碟子","ez":"我放下盤子，好讓我能放些食物在上面。"},{"w":"receive","p":"[rɪˈsiːv] v.","d":"To receive something is to get it.","e":"I received a present on my birthday.","zh":"(動) 收到；接受","ez":"我在生日時收到了一份禮物。"},{"w":"reward","p":"[rɪˈwɔːd] n.","d":"A reward is something given in exchange for good behavior or work.","e":"He was given a reward for his excellent performance.","zh":"(名) 獎勵；報酬　(動) 獎賞；酬謝","ez":"他因表現優異而獲得獎勵。"},{"w":"set","p":"[sɛt] v.","d":"To set something is to put it somewhere.","e":"Please set the dice down on the table.","zh":"(動) 放置；設定　(名) 一套；組","ez":"請把骰子放在桌上。"},{"w":"steal","p":"[stiːl] v.","d":"To steal is to take something that is not yours.","e":"The men tried to steal money from the bank.","zh":"(動) 偷；盜取","ez":"那些男人試圖從銀行偷錢。"},{"w":"thief","p":"[θiːf] n.","d":"A thief is someone who quietly takes things that do not belong to them.","e":"A thief broke into our home and took my mother&#39;s jewelry.","zh":"(名) 小偷；賊","ez":"一個小偷闖入我們家，拿走了我母親的珠寶。"}]},{"id":23,"name":"Unit 23","words":[{"w":"advance","p":"[ədˈvɑːns] v.","d":"To advance is to go forward.","e":"He advanced up the ladder slowly.","zh":"(動) 前進；推進　(名) 進步；預付款","ez":"他慢慢地爬上梯子。"},{"w":"athlete","p":"[ˈaθliːt] n.","d":"An athlete is a person who plays sports.","e":"Some athletes can play many sports very well.","zh":"(名) 運動員；選手","ez":"有些運動員能精通多項運動。"},{"w":"average","p":"[ˈav(ə)rɪdʒ] adj.","d":"If something is average, it is at a normal level.","e":"I&rsquo;m not rich or poor; I&rsquo;m average.","zh":"(名) 平均數；平均值　(形) 普通的；中等的　(動) 平均為；達到平均","ez":"我不富有也不貧窮；我是中等水準。"},{"w":"behavior","p":"[bɪˈheɪvjə] n.","d":"Your behavior is the way you act.","e":"Their behavior was good this semester. They didn&rsquo;t cause trouble.","zh":"(名) 行為；舉止　(動) 表現；舉止得當","ez":"他們這學期表現良好，沒有惹麻煩。"},{"w":"behind","p":"[bɪˈhʌɪnd] prep.","d":"Behind means to be at the back of something.","e":"The little girl was hiding behind a tree.","zh":"(介) 在…後面；背後　(副) 在後面；落後","ez":"小女孩躲在一棵樹後面。"},{"w":"course","p":"[kɔːs] n.","d":"A course is a class in school.","e":"I took a P.E. course in school this year.","zh":"(名) 課程；課程內容　(名) 過程；進程　(名) 一道菜；菜餚","ez":"今年我在學校修了一門體育課。"},{"w":"lower","p":"[ˈləʊə] v.","d":"To lower something is to make it go down.","e":"The chart shows how his production has lowered over the year.","zh":"(動) 降低；放低　(形) 較低的；下面的","ez":"圖表顯示他的產量在一年內下降了。"},{"w":"match","p":"[matʃ] v.","d":"To match is to be the same or similar.","e":"The two shoes matched. They looked the same.","zh":"(名) 比賽；競賽　(動) 相配；搭配　(名) 火柴","ez":"這兩隻鞋子是配對的，看起來一模一樣。"},{"w":"member","p":"[ˈmɛmbə] n.","d":"A member is a person who is part of a group.","e":"Julie is the newest member of our team.","zh":"(名) 成員；會員　(名) 肢體；身體部分","ez":"茱莉是我們團隊的最新成員。"},{"w":"mental","p":"[ˈmɛnt(ə)l] adj.","d":"If something is mental, it has to do with your mind.","e":"I made a mental picture of the room.","zh":"(形) 心理的；精神的　(形) 心智的；頭腦的","ez":"我在腦中想像了那個房間的樣子。"},{"w":"passenger","p":"[ˈpasɪndʒə] n.","d":"A passenger is a person who rides in a car, train, or airplane.","e":"One passenger was standing in the subway train.","zh":"(名) 乘客；旅客","ez":"地鐵車廂裡站著一位乘客。"},{"w":"personality","p":"[pəːsəˈnalɪti] n.","d":"Your personality is what you are like and how you behave.","e":"John has a bad personality.","zh":"(名) 個性；人格","ez":"約翰的個性不好。"},{"w":"poem","p":"[ˈpəʊɪm] n.","d":"A poem is a short kind of writing.","e":"William Shakespeare wrote many poems.","zh":"(名) 詩","ez":"威廉·莎士比亞寫了許多詩。"},{"w":"pole","p":"[pəʊl] n.","d":"A pole is a long thin stick made of wood or metal that supports things.","e":"The flag was hanging from the flag pole.","zh":"(名) 桿；竿；柱","ez":"旗子掛在旗杆上。"},{"w":"remove","p":"[rɪˈmuːv] v.","d":"To remove something is to take it away.","e":"I removed the nail from the board.","zh":"(動) 移除；脫掉","ez":"我從木板上拔掉了釘子。"},{"w":"safety","p":"[ˈseɪfti] n.","d":"Safety means to be the condition of being safe and free from danger.","e":"For his own safety, he was placed in a car seat.","zh":"(名) 安全；平安","ez":"為了安全起見，他被放在汽車座椅上。"},{"w":"shoot","p":"[ʃuːt] v.","d":"To shoot is to fire something like a bullet at someone or something.","e":"The hunter raised his gun to shoot at the target.","zh":"(動) 射擊；射門","ez":"獵人舉起槍瞄準目標射擊。"},{"w":"sound","p":"[saʊnd] v.","d":"To sound means to make a noise.","e":"The alarm clock sounded and woke us all up.","zh":"(名) 聲音；聲響　(動) 聽起來；發出聲音　(形) 健全的；合理的","ez":"鬧鐘響了，把我們都吵醒了。"},{"w":"swim","p":"[swɪm] v.","d":"To swim is to move through water.","e":"I love to swim in the ocean.","zh":"(動) 游泳","ez":"我喜歡在海裡游泳。"},{"w":"web","p":"[wɛb] n.","d":"","e":"Mom cleaned the spider webs out of the garage.","zh":"(名) 網；網路","ez":"媽媽清掉了車庫裡的蜘蛛網。"}]},{"id":24,"name":"Unit 24","words":[{"w":"block","p":"[blɒk] n.","d":"A block is a solid piece of wood, stone or ice.","e":"I saw a block of ice on the floor.","zh":"(名) 街區；塊　(動) 阻擋；妨礙　(形) 堵住的；被阻擋的","ez":"我看到地上有一塊冰。"},{"w":"cheer","p":"[tʃɪə] v.","d":"To cheer is to give a loud shout of approval or encouragement.","e":"The crowd all cheered when the home team won.","zh":"(動) 歡呼；鼓掌　(名) 歡呼聲；掌聲","ez":"主隊獲勝時，群眾都歡呼起來。"},{"w":"complex","p":"[ˈkɒmplɛks] adj.","d":"If something is complex, it has many small parts. It is hard to understand.","e":"A jig-saw puzzle can be complex because it has so many pieces.","zh":"(形) 複雜的；難懂的　(名) 複合體；情結","ez":"拼圖可能很複雜，因為它有很多片。"},{"w":"critic","p":"[ˈkrɪtɪk] n.","d":"A critic is someone who give their opinions about movies, books, plays.","e":"The wine critic tasted the wine so he could give his opinion.","zh":"(名) 評論家；批評家　(名) 批評者；挑剔者","ez":"品酒師品嚐了葡萄酒，以便提出他的意見。"},{"w":"event","p":"[ɪˈvɛnt] n.","d":"An event is something that happens, especially something important.","e":"Finishing high school was a major event in his life.","zh":"(名) 事件；活動　(名) 比賽項目；運動會","ez":"高中畢業是他人生中的一件大事。"},{"w":"exercise","p":"[ˈɛksəsʌɪz] v.","d":"To exercise is to run or play sports so that you can be healthy.","e":"You should exercise every day.","zh":"(名) 運動；練習　(動) 運動；鍛鍊","ez":"你應該每天運動。"},{"w":"fit","p":"[fɪt] v.","d":"If something fits, it is small enough or the right size to go there.","e":"The colorful eggs fit into the box.","zh":"(動) 適合；符合　(形) 健康的；合適的　(名) 發作；適合度","ez":"彩色的蛋剛好放進盒子裡。"},{"w":"friendship","p":"[ˈfrɛn(d)ʃɪp] n.","d":"Friendship is the relationship between people who are friends.","e":"Michael and Lisa have a very strong friendship with each other.","zh":"(名) 友誼；友誼關係　(名) 朋友間的親密關係","ez":"麥可和麗莎之間有非常深厚的友誼。"},{"w":"guide","p":"[ɡʌɪd] n.","d":"A guide is someone who shows you where to go.","e":"We followed a guide at the park.","zh":"(動) 帶領；指導　(名) 導遊；指南","ez":"我們在公園裡跟著導覽員走。"},{"w":"lack","p":"[lak] n.","d":"If there is a lack of something, there is not enough of it.","e":"His only problem is a lack of money.","zh":"(名) 缺乏；不足　(動) 缺少；短缺","ez":"他唯一的問題就是缺錢。"},{"w":"passage","p":"[ˈpasɪdʒ] n.","d":"A passage is a long area with walls that goes from one place to another.","e":"The long passage led us to the other side of the field.","zh":"(名) 通道；段落；通路","ez":"長長的通道帶我們到了田野的另一邊。"},{"w":"perform","p":"[pəˈfɔːm] v.","d":"To perform is to do something in front of people who watch.","e":"He will perform a song for the class.","zh":"(動) 表演；執行","ez":"他將為全班表演一首歌。"},{"w":"pressure","p":"[ˈprɛʃə] n.","d":"Pressure is what you apply to make someone do something.","e":"They put pressure on him to change his mind.","zh":"(名) 壓力；壓迫","ez":"他們對他施壓，要他改變主意。"},{"w":"probable","p":"[ˈprɒbəb(ə)l] adj.","d":"If something is probable, it is likely to happen.","e":"It is probable that you will get a good grade if you study for the test.","zh":"很可能真實的；很可能發生的","ez":"如果你為考試唸書，很可能會得到好成績。"},{"w":"public","p":"[ˈpʌblɪk] adj.","d":"If something is public, it is meant for everyone to use.","e":"I went to the public park to play with my friends.","zh":"(形) 公眾的；公共的　(名) 公眾；民眾","ez":"我去公園和朋友們玩。"},{"w":"strike","p":"[strʌɪk] v.","d":"To strike someone or something is to hit them.","e":"She struck the other girl in the face.","zh":"(動) 罷工；打擊　(名) 罷工；襲擊","ez":"她打了另一個女孩的臉。"},{"w":"support","p":"[səˈpɔːt] v.","d":"To support something is to like it and help it be successful.","e":"Everyone at work supports the new plan.","zh":"(名) 支持；援助　(動) 支持；養活","ez":"公司裡的每個人都支持新計畫。"},{"w":"task","p":"[tɑːsk] n.","d":"A task is work that someone has to do.","e":"Who has the task of building the brick wall?","zh":"(名) 任務；工作","ez":"誰負責砌這道磚牆？"},{"w":"term","p":"[təːm] n.","d":"A term is a word for something.","e":"I often use the term &ldquo;oops&rdquo; when I make a mistake.","zh":"(名) 術語；學期","ez":"我犯錯時常說「哎呀」這個詞。"},{"w":"unite","p":"[juːˈnʌɪt] v.","d":"To unite is to get together to do something.","e":"If we unite, we can finish our project faster.","zh":"(動) 團結；聯合","ez":"如果我們團結起來，就能更快完成專案。"}]},{"id":25,"name":"Unit 25","words":[{"w":"associate","p":"[əˈsəʊʃɪət] v.","d":"To associate means to connect something with a person or thing.","e":"Most people associate birthday parties with having fun.","zh":"(動) 聯想；將...連結在一起　(名) 同事；夥伴","ez":"大多數人把生日派對和玩樂聯想在一起。"},{"w":"environment","p":"[ɪnˈvʌɪrənm(ə)nt] n.","d":"The environment is the place where people work or live.","e":"Keeping our environment clean is important to our health.","zh":"(名) 環境；周圍的情況　(名) 自然環境；生態環境","ez":"保持環境清潔對我們的健康很重要。"},{"w":"factory","p":"[ˈfakt(ə)ri] n.","d":"A factory is a building where things are made or put together.","e":"We have only one factory in our town.","zh":"(名) 工廠；製造廠　(名) 製造業","ez":"我們鎮上只有一家工廠。"},{"w":"feature","p":"[ˈfiːtʃə] n.","d":"A feature is an important part of something.","e":"The cell phone has many features.","zh":"(名) 特徵；特色　(動) 以…為主要內容；刊登","ez":"這支手機有很多功能。"},{"w":"instance","p":"[ˈɪnst(ə)ns] n.","d":"An instance is an example of something.","e":"I have never experienced an instance of hate. Have you?","zh":"(名) 例子；實例　(名) 情況；情形","ez":"我從未經歷過仇恨的情況。你呢？"},{"w":"involve","p":"[ɪnˈvɒlv] v.","d":"To involve means to be actively taking part in something.","e":"The whole family was involved in playing the game.","zh":"(動) 涉及；牽涉　(動) 使參與；讓...參加","ez":"全家人都參與了玩這個遊戲。"},{"w":"medicine","p":"[ˈmɛdɪsɪn] n.","d":"Medicine is something you take to feel better or treat an illness.","e":"The doctor gave me medicine for my cold.","zh":"(名) 藥物；醫學　(名) 藥；治療方法","ez":"醫生給了我感冒藥。"},{"w":"mix","p":"[mɪks] n.","d":"A mix is different things put together.","e":"The green mix we made in science class spilled onto the table.","zh":"(動) 混合；混媒　(名) 混合物；混音","ez":"我們在科學課調的綠色混合物灑到了桌上。"},{"w":"organize","p":"[ˈɔːɡ(ə)nʌɪz] v.","d":"To organize is to plan or get ready for an event.","e":"Make a list to help you organize the things you need.","zh":"(動) 組織；安排","ez":"列一張清單來幫你整理需要的東西。"},{"w":"period","p":"[ˈpɪərɪəd] n.","d":"A period is an amount of time when something happens.","e":"In one period in Europe, there were many knights.","zh":"(名) ['pɪrɪəd] 時期；一節課；句點　(形) [pɪrɪ'ɑdɪk] 週期的","ez":"在歐洲的一個時期，有許多騎士。"},{"w":"populate","p":"[ˈpɒpjʊleɪt] v.","d":"If people populate an area, they live there.","e":"Billions of people populate the Earth.","zh":"(動) 居住於；充滿","ez":"數十億人居住在地球上。"},{"w":"produce","p":"[prəˈdjuːs] v.","d":"To produce something is to make or grow it.","e":"This tree produces apples every year.","zh":"(動) [prə'djus] 生產；製造　(名) ['prɑdjus] 農產品","ez":"這棵樹每年都會產蘋果。"},{"w":"range","p":"[reɪn(d)ʒ] n.","d":"A range is a number or a set of similar things.","e":"I saw a range of cars to choose from.","zh":"(名) 範圍；山脈　(動) 排列；（在…之間）變化","ez":"我看到一系列車子可以選擇。"},{"w":"recognize","p":"[ˈrɛkəɡnʌɪz] v.","d":"To recognize something is to know it because you have seen it before.","e":"I recognized an old friend from many years ago.","zh":"(動) 認出；承認；表揚","ez":"我認出了一位多年前的老朋友。"},{"w":"regular","p":"[ˈrɛɡjʊlə] adj.","d":"If something is regular, it happens often and in equal amounts of time.","e":"Our regular lunch time is around noon.","zh":"(形) 規律的；固定的","ez":"我們平常的午餐時間大約是中午。"},{"w":"sign","p":"[sʌɪn] n.","d":"A sign is a notice giving information, directions, a warning, etc.","e":"The sign indicated that today would be a bad day.","zh":"(動) 簽名；簽署　(名) 標誌；招牌","ez":"那個跡象顯示今天會是倒楣的一天。"},{"w":"tip","p":"[tɪp] n.","d":"A tip is a pointed end of something.","e":"The tip of his pen was very sharp.","zh":"(名) 尖端；小費；祕訣　(動) 傾倒；給小費","ez":"他的筆尖非常尖銳。"},{"w":"tradition","p":"[trəˈdɪʃ(ə)n] n.","d":"A tradition is something people have been doing for a long time.","e":"Marriage is a tradition all over the world.","zh":"(名) 傳統","ez":"婚姻是世界各地的傳統。"},{"w":"trash","p":"[traʃ] n.","d":"Trash is waste material or unwanted or worthless things.","e":"Please take out the trash; it smells bad.","zh":"(名) 垃圾；廢物　(動) 丟棄；破壞","ez":"請把垃圾拿出去，它很臭。"},{"w":"wide","p":"[wʌɪd] adj.","d":"If something is wide, it is large from side to side.","e":"The door was as wide as my arms.","zh":"(形) 寬的；廣泛的","ez":"那扇門和我手臂張開一樣寬。"}]},{"id":26,"name":"Unit 26","words":[{"w":"advice","p":"[ədˈvʌɪs] n.","d":"Advice is an opinion about what to do.","e":"I don&rsquo;t know how to study for my exams. Can you give me some advice?","zh":"(名) 建議；勸告　(動) 建議；勸告","ez":"我不知道怎麼準備考試，你能給我一些建議嗎？"},{"w":"along","p":"[əˈlɒŋ] prep.","d":"Along means to move from one part of a road, river, etc. to another.","e":"Walk along this tunnel for ten minutes, and you&rsquo;ll see a door on the left.","zh":"(介) 沿著；順著　(副) 一起；一同","ez":"沿著這條隧道走十分鐘，你會看到左邊有一扇門。"},{"w":"attention","p":"[əˈtɛnʃ(ə)n] n.","d":"Attention is the notice, thought, or consideration of someone.","e":"His work got the attention of two of his co-workers.","zh":"(名) 注意；關注　(動) 留意；注視","ez":"他的工作引起了兩位同事的注意。"},{"w":"attract","p":"[əˈtrakt] v.","d":"To attract means to make a person or thing come closer or be interested.","e":"The magnet attracted the metal.","zh":"(動) 吸引；引起　(動) 招引；使喜歡","ez":"磁鐵吸引了金屬。"},{"w":"climb","p":"[klʌɪm] v.","d":"To climb means to use your hands and feet to go up on something.","e":"The girls climbed to the top of the mountain.","zh":"(動) 爬；登　(名) 攀登；上升","ez":"女孩們爬到了山頂。"},{"w":"drop","p":"[drɒp] v.","d":"To drop is to fall or allow something to fall.","e":"A small amount of water dropped from the bottle.","zh":"(動) 掉落；下降　(名) 滴；降幅","ez":"瓶子裡滴出了一點水。"},{"w":"final","p":"[ˈfʌɪn(ə)l] adj.","d":"If something is final, it is the last part.","e":"In the final part of the film, the man and the woman got married.","zh":"(形) 最後的；決定性的　(名) 決賽；期末考","ez":"在電影的最後部分，男人和女人結婚了。"},{"w":"further","p":"[ˈfəːðə] adj.","d":"Further is used to say something is from a distance or time.","e":"The escalator is further along than I thought.","zh":"(動) 促進；推進　(形) 更遠的；進一步的　(副) 而且；此外","ez":"電扶梯比我想像的還要遠。"},{"w":"imply","p":"[ɪmˈplʌɪ] v.","d":"To imply something is to suggest it without saying it.","e":"The man implied that he wanted the job, but he didn&rsquo;t say so.","zh":"(動) 暗示；暗指　(動) 隱含；意味著","ez":"那個男人暗示他想要這份工作，但他沒有明說。"},{"w":"maintain","p":"[meɪnˈteɪn] v.","d":"To maintain means to make something stay the same.","e":"The balls maintain constant movement.","zh":"(動) 維持；保持　保養；維修","ez":"球保持持續的運動。"},{"w":"neither","p":"[ˈnʌɪðə] adv.","d":"You use neither to connect two negative statements.","e":"Neither the pass on the left nor the pass on the right will lead us home.","zh":"(形) 兩個都不；都不是　(連) 也不；既不","ez":"左邊的路和右邊的路都無法帶我們回家。"},{"w":"otherwise","p":"[ˈʌðəwʌɪz] adv.","d":"Otherwise means different or in another way.","e":"It&rsquo;s good to stay active; otherwise, you&rsquo;ll gain weight.","zh":"(副) 否則；不然","ez":"保持活動很好，否則你會變胖。"},{"w":"physical","p":"[ˈfɪzɪk(ə)l] adj.","d":"If something is physical, it is related to your body and not your mind.","e":"Biking is good for your physical health.","zh":"(形) 身體的；物理的","ez":"騎腳踏車對你的身體健康有好處。"},{"w":"prove","p":"[pruːv] v.","d":"To prove something is to show that it is true.","e":"My teacher proved the answer on the board.","zh":"(動) 證明；證實","ez":"我的老師在黑板上證明了答案。"},{"w":"react","p":"[rɪˈakt] v.","d":"To react is to act in a certain way because of something that happened.","e":"James reacted badly to the news.","zh":"(動) 反應；回應","ez":"詹姆斯對這個消息反應很差。"},{"w":"ride","p":"[rʌɪd] v.","d":"To ride something is to travel on it. You can ride an animal, a bike, etc.","e":"I will ride a roller-coaster for the first time today.","zh":"(動) 騎；乘坐　(名) 騎乘；搭乘","ez":"我今天第一次坐雲霄飛車。"},{"w":"situated","p":"[ˈsɪtʃʊeɪtid] adj.","d":"If something is situated somewhere, it is in that place.","e":"The white board is situated between the two men.","zh":"(形) 位於...的；坐落於...的","ez":"白板位於兩個男人之間。"},{"w":"society","p":"[səˈsʌɪɪti] n.","d":"Society is people and the way that they live.","e":"Society expects people to be good and honest.","zh":"(名) 社會","ez":"社會期望人們善良誠實。"},{"w":"standard","p":"[ˈstandəd] n.","d":"A standard is what people consider normal or good.","e":"This older model TV is below our store&rsquo;s standards.","zh":"(名) 標準；水準　(形) 標準的；普通的","ez":"這台舊型電視不符合我們店裡的標準。"},{"w":"suggest","p":"[səˈdʒɛst] v.","d":"To suggest something means to give an idea or plan about it.","e":"He suggested that we go to see his boss.","zh":"(動) 建議；暗示","ez":"他建議我們去找他的老闆。"}]},{"id":27,"name":"Unit 27","words":[{"w":"actually","p":"[ˈaktʃʊəli] adv.","d":"Actually means in fact or really.","e":"My dad looks a little mean, but actually he&rsquo;s very kind.","zh":"(副) 實際上；其實　(副) 竟然；居然","ez":"我爸爸看起來有點兇，但其實他很善良。"},{"w":"bite","p":"[bʌɪt] n.","d":"Bite is the act of using your teeth to cut and tear into something.","e":"The boy took a big bite out of his hamburger.","zh":"(動) 咬；叮　(名) 咬；一口","ez":"那個男孩大口咬了他的漢堡。"},{"w":"coast","p":"[kəʊst] n.","d":"The coast is the land by an ocean.","e":"I stayed on the southern coast of Australia.","zh":"(名) 海岸；沿海地區　(動) 沿著海岸航行","ez":"我待在澳洲的南海岸。"},{"w":"deal","p":"[diːl] n.","d":"A deal is an agreement that you have with another person.","e":"I made a deal with the other company to give us some money.","zh":"(名) 交易；協議　(動) 處理；分配　(名) 待遇；對待","ez":"我和另一家公司達成了協議，讓他們給我們一些錢。"},{"w":"desert","p":"[dɪˈzəːt] n.","d":"The desert is an area of land without many plants or water.","e":"Not many plants grow in the desert.","zh":"(名) [ˈdɛzɚt] 沙漠；荒漠　(動) [dɪˈzɝt] 遺棄；拋棄　(形) 荒蕪的；人煙稀少的","ez":"沙漠裡沒有很多植物生長。"},{"w":"earthquake","p":"[ˈəːθkweɪk] n.","d":"An earthquake is a shaking movement of the ground.","e":"The building shook during the earthquake.","zh":"(名) 地震；地動","ez":"建築物在地震中搖晃。"},{"w":"effective","p":"[ɪˈfɛktɪv] adj.","d":"If something is effective, it works well.","e":"Swimming is an effective way to stay healthy.","zh":"(形) 有效的；有效果的　(形) 實際的；實在的","ez":"游泳是保持健康的有效方法。"},{"w":"examine","p":"[ɪɡˈzamɪn] v.","d":"To examine something is to look at it carefully.","e":"The doctor examined my eyes today.","zh":"(動) 檢查；檢驗　(動) 審視；研究","ez":"醫生今天檢查了我的眼睛。"},{"w":"false","p":"[fɔːls] adj.","d":"If something is false, it is not correct.","e":"If you think the answer is false, press the red button.","zh":"(形) 虛假的；不真實的　(形) 錯誤的；不正確的","ez":"如果你認為答案是錯的，就按紅色按鈕。"},{"w":"gift","p":"[ɡɪft] n.","d":"A gift is something you give someone.","e":"Dave received many gifts for Christmas.","zh":"(名) 禮物；贈禮　(動) 贈送；給予","ez":"戴夫收到了很多聖誕禮物。"},{"w":"hunger","p":"[ˈhʌŋɡə] n.","d":"Hunger is the feeling that you get when you need to eat.","e":"After playing all day long, he was filled with hunger.","zh":"(名) 飢餓；飢荒　(動) 渴望；想要","ez":"玩了一整天後，他感到非常餓。"},{"w":"imagine","p":"[ɪˈmadʒɪn] v.","d":"To imagine something is to think of it in your mind.","e":"Sally imagined herself winning lots of money.","zh":"(動) 想像；猜想　(動) 假設；推測","ez":"莎莉想像自己贏了很多錢。"},{"w":"journey","p":"[ˈdʒəːni] n.","d":"A journey is a long trip.","e":"I went on a journey across the country with my parents.","zh":"(名) 旅程；旅行　(動) 去旅行；遊歷","ez":"我和父母一起踏上了穿越全國的旅程。"},{"w":"puzzle","p":"[ˈpʌz(ə)l] n.","d":"A puzzle is something that is hard to understand.","e":"The question was a puzzle to him.","zh":"(動) 使困惑；使為難　(名) 謎；難題","ez":"這個問題對他來說是個謎。"},{"w":"quite","p":"[kwʌɪt] adv.","d":"Quite is used to say that something is complete or very much.","e":"I think typing on a keyboard is quite easy.","zh":"(副) 相當；頗","ez":"我覺得在鍵盤上打字很簡單。"},{"w":"rather","p":"[ˈrɑːðə] adv.","d":"Rather is used when you want to do one thing but not the other.","e":"I would rather have the red one than the blue one.","zh":"(副) 相當；頗　(連) 寧願；與其...不如","ez":"我寧願要紅色的，也不要藍色的。"},{"w":"specific","p":"[spəˈsɪfɪk] adj.","d":"If something is specific, it is precise or exact.","e":"Please choose a specific place on the map.","zh":"(形) 具體的；特定的","ez":"請在地圖上選擇一個特定的地點。"},{"w":"tour","p":"[tʊə] n.","d":"A tour is a short trip in which you see many sights.","e":"I took a tour of Asia and Europe.","zh":"(名) 旅遊；觀光　(動) 旅行；巡迴","ez":"我參加了亞洲和歐洲的旅行。"},{"w":"trip","p":"[trɪp] n.","d":"A trip is a journey to a certain place.","e":"Ken took a trip to the city yesterday.","zh":"(名) 旅行；行程　(動) 絆倒；輕快地走","ez":"肯昨天去城裡玩了一趟。"},{"w":"value","p":"[ˈvaljuː] n.","d":"If something has value, it is worth a lot of money.","e":"Matthew found a treasure of very high value.","zh":"(名) 價值；重要性　(動) 重視；珍惜","ez":"馬修找到了一個價值很高的寶藏。"}]},{"id":28,"name":"Unit 28","words":[{"w":"band","p":"[band] n.","d":"A band is a group of people who play music.","e":"My brother is in a rock band.","zh":"(名) 樂隊；樂團　(名) 帶子；條紋　(動) 把...綁在一起","ez":"我哥哥在一個搖滾樂團裡。"},{"w":"barely","p":"[ˈbɛːli] adv.","d":"Barely means by the smallest amount, almost not.","e":"I barely had enough money to pay for my bus ticket.","zh":"(副) 勉強；幾乎不　(副) 剛剛；僅僅","ez":"我幾乎沒有足夠的錢付公車票。"},{"w":"boring","p":"[ˈbɔːrɪŋ] adj.","d":"If something is boring, it is not fun.","e":"I think the Internet is boring.","zh":"(形) 無聊的；令人厭倦的　(動) 使厭倦；鑽孔","ez":"我覺得網路很無聊。"},{"w":"cancel","p":"[ˈkans(ə)l] v.","d":"To cancel means to decide that an event or a request will not happen.","e":"She cancelled the rest of her plans because of the rain.","zh":"(動) 取消；廢除　(動) 抵消；互相抵銷","ez":"因為下雨，她取消了剩下的計畫。"},{"w":"driveway","p":"[ˈdrʌɪvweɪ] n.","d":"A driveway is a short private road that leads to a person’s home.","e":"The long driveway led us to their new house.","zh":"(名) 車道；行車道　(名) 私人通道","ez":"長長的車道帶我們到了他們的新房子。"},{"w":"garbage","p":"[ˈɡɑːbɪdʒ] n.","d":"Garbage is waste material like unwanted or spoiled food, bottles, paper, etc.","e":"The boy cleaned up the garbage around his house.","zh":"(名) 垃圾；廢物　(形) 劣質的；無用的","ez":"那個男孩清理了他家周圍的垃圾。"},{"w":"instrument","p":"[ˈɪnstrʊm(ə)nt] n.","d":"An instrument is something designed to do a certain task like music.","e":"My favorite musical instrument is the piano.","zh":"(名) 樂器；工具　(名) 儀器；裝置","ez":"我最喜歡的樂器是鋼琴。"},{"w":"list","p":"[lɪst] n.","d":"A list is a record of information printed with an item on each line.","e":"My mom makes a list of groceries to buy.","zh":"(名) 清單；列表　(動) 列出；記錄","ez":"我媽媽列了一張要買的雜貨清單。"},{"w":"magic","p":"[ˈmadʒɪk] n.","d":"Magic is the power to do impossible things.","e":"The magician used magic to pull a rabbit out of his hat.","zh":"(名) 魔法；魔術　(形) 魔法的；神奇的","ez":"魔術師用魔術從帽子裡變出一隻兔子。"},{"w":"message","p":"[ˈmɛsɪdʒ] n.","d":"A message is a set of words that you send to someone.","e":"I left a message for you in the envelope.","zh":"(名) 訊息；消息　(動) 傳達訊息；發送消息","ez":"我在信封裡給你留了一則訊息。"},{"w":"notice","p":"[ˈnəʊtɪs] v.","d":"To notice something is to see it for the first time.","e":"Did you notice the view?","zh":"(動) 注意到；察覺　(名) 通知；布告","ez":"你有注意到那個景色嗎？"},{"w":"own","p":"[əʊn] v.","d":"To own something means to have it. That thing belongs to you.","e":"My grandfather owns that house.","zh":"(v.) 擁有","ez":"那棟房子是我爺爺的。"},{"w":"predict","p":"[prɪˈdɪkt] v.","d":"To predict something is to say that it will happen.","e":"She predicted that I would get married next year.","zh":"(動) 預測；預報","ez":"她預測我明年會結婚。"},{"w":"professor","p":"[prəˈfɛsə] n.","d":"A professor is a person who teaches in college.","e":"Mike&rsquo;s science professor knows a lot about physics.","zh":"(名) 教授","ez":"麥克的科學教授很懂物理。"},{"w":"rush","p":"[rʌʃ] v.","d":"To rush is to go somewhere or do something very quickly.","e":"Nancy rushed to finish her homework.","zh":"(動) 匆忙行事；催促　(名) 匆忙；搶購","ez":"南希趕著完成她的作業。"},{"w":"schedule","p":"[ˈʃɛdjuːl] n.","d":"A schedule is a plan that tells you when to do things.","e":"What is your class schedule for today?","zh":"(名) 日程；時間表　(動) 安排；預定","ez":"你今天的上課時間表是怎樣的？"},{"w":"share","p":"[ʃɛː] v.","d":"To share something is to give some of it to another person.","e":"Jimmy shared his apple with me.","zh":"(動) 分享；分配","ez":"吉米把他的蘋果分給我吃。"},{"w":"stage","p":"[steɪdʒ] n.","d":"A stage is a place where actors or musicians act or sing.","e":"A large screen was on the stage.","zh":"(名) 舞台；階段　(動) 舉辦；上演","ez":"舞台上有一面大螢幕。"},{"w":"storm","p":"[stɔːm] n.","d":"A storm is very bad weather. There is a lot of rain or snow.","e":"Did that storm wake you up last night?","zh":"(名) 暴風雨；風暴","ez":"昨晚那場暴風雨有把你吵醒嗎？"},{"w":"within","p":"[wɪðˈɪn] prep.","d":"You use within to say that something is inside another thing.","e":"Within the box, there was a pizza.","zh":"(介) 在...之內；(副) 在內部","ez":"盒子裡有一個披薩。"}]},{"id":29,"name":"Unit 29","words":[{"w":"advertise","p":"[ˈadvətʌɪz] v.","d":"To advertise is to tell people about something on TV, radio, etc.","e":"They used a rabbit to help them advertise their product.","zh":"(動) 登廣告；宣傳　刊登廣告","ez":"他們用一隻兔子來幫忙宣傳產品。"},{"w":"assign","p":"[əˈsʌɪn] v.","d":"To assign something to someone is to tell them to do it.","e":"I assigned the worker an important task.","zh":"(動) 分配；指派　(動) 布置（作業）；交代","ez":"我指派那位工人一項重要任務。"},{"w":"audience","p":"[ˈɔːdɪəns] n.","d":"An audience is a group of people who watch something together.","e":"There was a large audience at the game.","zh":"(名) 觀眾；聽眾　(名) 謁見；接見","ez":"那場比賽有很多觀眾。"},{"w":"breakfast","p":"[ˈbrɛkfəst] n.","d":"Breakfast is the first meal of the day.","e":"I eat breakfast at 8:00 every morning.","zh":"(名) 早餐；早飯","ez":"我每天早上八點吃早餐。"},{"w":"competition","p":"[kɒmpɪˈtɪʃ(ə)n] n.","d":"A competition is a contest to see who is the best at something.","e":"He won the running competition over the weekend.","zh":"(名) 競爭；比賽　(名) 競爭者；對手","ez":"他週末贏得了跑步比賽。"},{"w":"cool","p":"[kuːl] adj.","d":"If the weather is cool, it is a little bit cold.","e":"The weather is cool in the fall.","zh":"(形) 涼的；酷的　(動) 冷卻；變涼","ez":"秋天時天氣很涼爽。"},{"w":"gain","p":"[ɡeɪn] v.","d":"If you gain something, you get more of it.","e":"I gained some weight over the summer.","zh":"(動) 獲得；賺取　(名) 利益；收穫","ez":"我暑假胖了一些。"},{"w":"importance","p":"[ɪmˈpɔːt(ə)ns] n.","d":"Importance means the quality or condition of being needed or valued.","e":"VIPs are people of great importance.","zh":"(名) 重要性；重要　(名) 重視；看重","ez":"VIP是指非常重要的人物。"},{"w":"knowledge","p":"[ˈnɒlɪdʒ] n.","d":"Knowledge is information that you have about something.","e":"A music teacher should have good knowledge of music.","zh":"(名) 知識；學問　(名) 認識；瞭解","ez":"音樂老師應該對音樂有很好的了解。"},{"w":"major","p":"[ˈmeɪdʒə] adj.","d":"If something is major, it is big or important.","e":"I have a major problem. My boss wants me to redo my project!","zh":"(名) 主修科目；專業　(形) 主要的；重大的","ez":"我有個大問題：老闆要我重做我的專案！"},{"w":"mean","p":"[miːn] adj.","d":"Mean describes someone who is unkind or cruel.","e":"My co-worker is a very mean person. He gets angry very quickly.","zh":"(形) 刻薄的；不友善的　(動) 表示；意思是","ez":"我的同事是個很刻薄的人，他很容易生氣。"},{"w":"prefer","p":"[prɪˈfəː] v.","d":"If you prefer something, you want it more than something else.","e":"I prefer to take the path that will lead me to a bright future.","zh":"(動) 偏好；更喜歡","ez":"我寧願選擇那條能帶我走向光明未來的路。"},{"w":"president","p":"[ˈprɛzɪd(ə)nt] n.","d":"A president is the leader of a country.","e":"The president of our country made an important announcement.","zh":"(名) 總統；會長；校長","ez":"我們國家的總統發表了一項重要聲明。"},{"w":"progress","p":"[prəˈɡrɛs] n.","d":"Progress is the act of getting closer to doing or finishing something.","e":"Our company made financial progress this year.","zh":"(名) [`prɑgrɛs] 進步；進展　(動) [prə`grɛs] 前進；進展","ez":"我們公司今年在財務上有所進展。"},{"w":"respect","p":"[rɪˈspɛkt] n.","d":"Respect is a good opinion of someone because they are good.","e":"I have great respect for firemen.","zh":"(動) 尊重；尊敬","ez":"我非常尊敬消防員。"},{"w":"rich","p":"[rɪtʃ] adj.","d":"Ifyou are rich, you have a lot of money.","e":"He&rsquo;s rich. He can buy anything he wants.","zh":"(形) 富裕的；豐富的；肥沃的","ez":"他很有錢，想買什麼就能買什麼。"},{"w":"skill","p":"[skɪl] n.","d":"A skill is the knowledge and ability that allows you to do something well.","e":"A snowboarder must have the right skills to do well.","zh":"(名) 技能；技巧　(動) 熟練掌握","ez":"滑雪板選手必須具備正確的技巧才能表現好。"},{"w":"somehow","p":"[ˈsʌmhaʊ] adv.","d":"Somehow means in a way or by some means which is not known.","e":"He somehow had to find a way to reach the life preserver.","zh":"(副) 不知怎地；以某種方式","ez":"他不知怎麼地必須找到方法去拿救生圈。"},{"w":"strength","p":"[strɛŋkθ] n.","d":"Strength is the physical power that you have.","e":"Exercising will increase your strength and give you more power.","zh":"(名) 力量；力氣","ez":"運動會增強你的體力，給你更多力量。"},{"w":"vote","p":"[vəʊt] v.","d":"To vote is to officially choose between two or more things.","e":"I voted for Billy to be our class president.","zh":"(動) 投票；(名) 選票","ez":"我投票給比利當我們的班長。"}]},{"id":30,"name":"Unit 30","words":[{"w":"above","p":"[əˈbʌv] prep.","d":"If something is above, it is at a higher level than something else.","e":"He straightened the sign that was above the crowd.","zh":"(介) 在…上方；高於　(副) 在上面；以上","ez":"他把人群上方的那個招牌弄正了。"},{"w":"ahead","p":"[əˈhɛd] adv.","d":"If something is ahead of something else, it is in front of it.","e":"The blue car drove on ahead of us.","zh":"(副) 在前面；向前　(形) 領先的；在…前面的","ez":"那輛藍色車子開在我們前面。"},{"w":"amount","p":"[əˈmaʊnt] n.","d":"An amount is how much there is of something.","e":"Can I use my card to pay for the entire amount?","zh":"(名) 數量；金額　(動) 共計；達到","ez":"我可以用我的卡付全額嗎？"},{"w":"belief","p":"[bɪˈliːf] n.","d":"A belief is a strong feeling that something is correct or true.","e":"A preacher or priest should have a strong belief in God.","zh":"(名) 信念；信仰　(動) 相信；認為","ez":"傳教士或牧師應該對上帝有堅定的信仰。"},{"w":"center","p":"[ˈsɛntə] n.","d":"The center of something is the middle of it.","e":"The center of a dart board is the most important spot.","zh":"(名) 中心；中央　(動) 把…放在中心；集中","ez":"飛鏢靶的中心是最重要的位置。"},{"w":"common","p":"[ˈkɒmən] adj.","d":"If something is common, it happens often or there is much of it.","e":"It is common for snow to fall in the winter.","zh":"(形) 普通的；常見的　(形) 平凡的；一般的","ez":"冬天經常會下雪。"},{"w":"cost","p":"[kɒst] v.","d":"To cost is to require expenditure or payment.","e":"These designer shoes cost more than the regular ones.","zh":"(名) 費用；成本　(動) 花費；值","ez":"這些設計師款鞋子比普通款貴。"},{"w":"demonstrate","p":"[ˈdɛmənstreɪt] v.","d":"To demonstrate something is to show how it is done.","e":"She demonstrated her plan to her co-workers.","zh":"(動) 示範；演示　(動) 證明；表明","ez":"她向同事們展示她的計畫。"},{"w":"different","p":"[ˈdɪf(ə)r(ə)nt] adj.","d":"Different describes someone or something that is not the same as others.","e":"Each of my sisters has a different hair style from one another.","zh":"(形) 不同的；有區別的　(形) 各式各樣的；多種的","ez":"我的每個姊妹都有不同的髮型。"},{"w":"evidence","p":"[ˈɛvɪd(ə)ns] n.","d":"Evidence is a fact or thing that you use to prove something.","e":"He used the pictures as evidence that UFOs are real.","zh":"(名) 證據；證物　(名) 跡象；跡象","ez":"他用那些照片作為證據，證明幽浮是真的。"},{"w":"honesty","p":"[ˈɒnɪsti] n.","d":"Honesty means the quality of being truthful or honest.","e":"A courtroom should be a place of honesty.","zh":"(名) 誠實；老實　(形) 誠實的；坦白的","ez":"法庭應該是一個誠實的地方。"},{"w":"idiom","p":"[ˈɪdɪəm] n.","d":"An idiom is a phrase with a meaning different from its words.","e":"The idiom &ldquo;when pigs fly&rdquo; means that something will never happen.","zh":"(名) 習語；成語　(名) 慣用語；片語","ez":"成語「當豬會飛」意思是某件事永遠不會發生。"},{"w":"independent","p":"[ɪndɪˈpɛnd(ə)nt] adj.","d":"If something is independent, it is not controlled by something else.","e":"She chose to live an independent life in the country.","zh":"(形) 獨立的；自主的　(形) 自立的；不依賴他人的","ez":"她選擇在鄉下過獨立的生活。"},{"w":"inside","p":"[ɪnˈsʌɪd] n.","d":"Inside means the inner part, space or side of something.","e":"The inside of the box was empty.","zh":"(形) 內部的；裡面的　(副) 在...裡面；內部　(名) 內部；裡面","ez":"盒子裡面是空的。"},{"w":"master","p":"[ˈmɑːstə] n.","d":"A master is a person who is very good at something.","e":"My brother is a master of taekwondo.","zh":"(名) 大師；高手　(動) 精通；掌握","ez":"我哥哥是跆拳道高手。"},{"w":"memory","p":"[ˈmɛm(ə)ri] n.","d":"A memory is something you remember.","e":"The memory of my first time in the city will always be the best.","zh":"(名) 記憶；記憶力　(名) 回憶；往事","ez":"我第一次進城的回憶永遠是最棒的。"},{"w":"proper","p":"[ˈprɒpə] adj.","d":"If something is proper, it is right.","e":"It is not proper to throw your garbage on the road.","zh":"(形) 適當的；正確的","ez":"把垃圾丟在路上是不對的。"},{"w":"scan","p":"[skan] v.","d":"To scan something is to look at it very carefully.","e":"You must scan each person closely.","zh":"(動) 掃描；瀏覽","ez":"你必須仔細掃描每一個人。"},{"w":"section","p":"[ˈsɛkʃ(ə)n] n.","d":"A section is a part of something larger.","e":"The green section of the graph is the most important part.","zh":"(名) 部分；區域","ez":"圖表的綠色區塊是最重要的部分。"},{"w":"surface","p":"[ˈsəːfɪs] n.","d":"The surface of something is the top part or outside of it.","e":"The surface of the moon is very rough.","zh":"(名) 表面；外觀　(動) 浮出水面；顯露","ez":"月球的表面非常粗糙。"}]},{"id":31,"name":"Index","words":[]}]},{"id":2,"name":"Book 2","units":[{"id":1,"name":"Unit 1","words":[{"w":"anxious","p":"[ˈӕŋkʃəs] adj.","d":"When a person is anxious, they worry that something bad will happen.","e":"She was anxious about not making her appointment on time.","zh":"(形) 焦慮的；不安的　(形) 渴望的；急切的","ez":"她擔心無法準時赴約。"},{"w":"awful","p":"[ˈɔːfəl] adj.","d":"When something is awful, it is very bad.","e":"Her performance last night was awful.","zh":"(形) 非常糟糕的；令人厭惡的　(副) 非常地；極其","ez":"她昨晚的表演糟透了。"},{"w":"consist","p":"[kənˈsɪst] v.","d":"To consist of is to be made of parts or things.","e":"Today&rsquo;s choices for lunch consisted of pizza, hamburgers, and hot dogs.","zh":"(動) 由...組成；構成　包含；包括","ez":"今天的午餐選擇有披薩、漢堡和熱狗。"},{"w":"desire","p":"[dɪˈzaɪər] v.","d":"To desire is to want something.","e":"My sister desires a big house and lots of money.","zh":"(名) 渴望；慾望　(動) 渴望；想要","ez":"我姐姐渴望擁有大房子和很多錢。"},{"w":"eager","p":"[ˈiːɡər] adj.","d":"When a person is eager about something, they are excited about it.","e":"The man was eager to talk about the good news.","zh":"(形) 渴望的；急切的　(動) 渴望；期盼","ez":"那個男人急著想談論這個好消息。"},{"w":"household","p":"[ˈhaʊshəʊld] n.","d":"A household is all the people who live in one house.","e":"Our household is made up of my father, my mother and me.","zh":"(名) 家戶；住戶　(形) 家庭的；家用的","ez":"我們家由爸爸、媽媽和我組成。"},{"w":"intent","p":"[ɪnˈtent] n.","d":"An intent is a plan to do something.","e":"Her intent is to visit Italy next summer.","zh":"(名) 意圖；目的　(形) 專注的；認真的","ez":"她的打算是明年夏天去義大利。"},{"w":"landscape","p":"[ˈlænskeɪp] n.","d":"A landscape is how an area of land looks.","e":"The landscape of the country is very green.","zh":"(名) 風景；景觀　(動) 進行景觀設計","ez":"這個國家的風景非常翠綠。"},{"w":"lift","p":"[lɪft] v.","d":"To lift something is to move it higher.","e":"The man tried to lift the box.","zh":"(名) 電梯；升起　(動) 舉起；提高　(動) 搭便車","ez":"那個男人試著抬起箱子。"},{"w":"load","p":"[loud] v.","d":"To load is to put objects into something.","e":"The man loaded the boxes into a truck.","zh":"(名) 負荷；載重　(動) 裝載；負擔　(形) 沉重的；繁重的","ez":"那個男人把箱子裝上卡車。"},{"w":"lung","p":"[lʌŋ] n.","d":"A lung is the organ in the body that fills with air when breathing.","e":"Having strong lungs is necessary for a healthy life.","zh":"(名) 肺；肺部","ez":"擁有強健的肺是健康生活所必需的。"},{"w":"motion","p":"[ˈməʊʃən] n.","d":"A motion is a movement that someone makes.","e":"The police officer made a motion with his hand.","zh":"(名) 動作；運動　(動) 揮手示意；提議","ez":"警察用手比了一個手勢。"},{"w":"pace","p":"[ˈpeɪs] n.","d":"The pace of something is the speed at which it happens.","e":"I ran the race at a slower pace than my friend.","zh":"(名) 步伐；速度　(動) 踱步；為……定速度","ez":"我跑步的速度比我朋友慢。"},{"w":"polite","p":"[pəˈlaɪt] adj.","d":"When someone is polite, they are acting in a thoughtful way.","e":"The boy was very polite: he behaved very thoughtfully.","zh":"(形) 有禮貌的；客氣的","ez":"那個男孩很有禮貌：他表現得非常體貼。"},{"w":"possess","p":"[pəˈzes] v.","d":"To possess something is to have it or own it.","e":"My uncle possesses three sheep, a chicken, a cow and a dog.","zh":"(動) 擁有；具有","ez":"我叔叔擁有三隻羊、一隻雞、一頭牛和一隻狗。"},{"w":"rapidly","p":"ˈræpɪdlɪ] adv.","d":"When something happens rapidly, it happens very fast.","e":"The train moved rapidly on the tracks.","zh":"快速地；迅猛地","ez":"火車在軌道上快速行駛。"},{"w":"remark","p":"[rɪˈmɑːrk] v.","d":"To remark is to say something.","e":"The teacher remarked on how quickly the students were learning.","zh":"(名) 評論；陳述　(動) 評論；談及","ez":"老師評論學生們學得很快。"},{"w":"seek","p":"[siːk] v.","d":"To seek is to look for something.","e":"If I have a problem, I seek my sister&rsquo;s advice.<br />","zh":"(動) 尋找；尋求","ez":"如果我有問題，我會尋求姐姐的建議。"},{"w":"shine","p":"[ʃaɪn] v.","d":"To shine is to make a bright light.","e":"The candles are shining in the dark room.","zh":"(動) 照耀；發亮　(名) 光澤；陽光","ez":"蠟燭在黑暗的房間裡閃耀著光芒。"},{"w":"spill","p":"[spɪl] v.","d":"To spill is to have something fall out of its container.","e":"I spilled the coffee on the table.","zh":"(動) 灑出；潑出　(名) 溢出；潑灑","ez":"我把咖啡灑在桌子上了。"}]},{"id":2,"name":"Unit 2","words":[{"w":"bring","p":"[brɪŋ] v.","d":"To bring means to take someone or something to a person or place.","e":"Oscar will bring in all the boxes.","zh":"(動) 帶來；拿來　(動) 造成；引起","ez":"奧斯卡會把所有箱子搬進來。"},{"w":"castle","p":"[ˈkæːsl] n.","d":"A castle is a building with strong walls where royalty usually lives.","e":"The castle was built many years ago.","zh":"(名) 城堡；堡壘","ez":"這座城堡是許多年前建造的。"},{"w":"command","p":"[kəˈmænd] v.","d":"To command someone is to tell them to do something.","e":"The general commanded his army to attack.","zh":"(動) 命令；指揮　(名) 命令；掌控","ez":"將軍命令他的軍隊發動攻擊。"},{"w":"counsel","p":"[ˈkaʊnsəl] v.","d":"To counsel someone is to listen and give advice about a problem.","e":"The teacher counseled the girl about her troubles.","zh":"(名) 律師；顧問　(動) 勸告；提供意見","ez":"老師輔導那個女孩解決她的煩惱。"},{"w":"ensure","p":"[ɪnˈʃʊər]","d":"To ensure is to make certain that something happens.","e":"Eating good food ensures that we stay healthy.","zh":"(動) 確保；保證　(動) 使...確定；確認","ez":"吃好的食物能確保我們保持健康。"},{"w":"explosion","p":"[ɪkˈsploʊ ʒən] n.","d":"An explosion is a violent burst, usually with a loud sound.","e":"A nuclear explosion can cause great damage.","zh":"(名) 爆炸；爆發　(名) 突然的增加；激增","ez":"核爆炸會造成巨大的破壞。"},{"w":"jewelry","p":"[ˈdʒu:əlri]","d":"Jewelry is something that people wear like earrings or necklaces.","e":"The woman looked beautiful with her nice dress and jewelry.","zh":"(名) 珠寶；首飾　(名) 珠寶飾品；裝飾品","ez":"那個女人穿著漂亮的衣服和首飾，看起來很美。"},{"w":"land","p":"[lænd] v.","d":"To land means to come to the ground usually from a ship or aircraft.","e":"The parachutist landed safely on the ground.","zh":"(名) 土地；陸地　(動) 降落；著陸　(形) 陸地的；土地的","ez":"跳傘者安全地降落在陸地上。"},{"w":"meteor","p":"[ˈmiːtɪər] n.","d":"A meteor is a rock from outer space that falls to Earth.","e":"We saw a meteor in the sky last night.","zh":"(名) 流星；隕星　(名) 氣象儀器","ez":"我們昨晚在天空看到一顆流星。"},{"w":"monster","p":"[ˈmɒnstər]","d":"A monster is any imaginary frightening creature that looks strange.","e":"The monster scared everyone in the village.","zh":"(名) 怪物；妖怪　(名) 殘忍的人；惡棍","ez":"那個怪物嚇壞了村子裡的每個人。"},{"w":"northern","p":"[ˈnɔr:ðərn] adj.","d":"If something is northern, it is in the direction of north.","e":"It is much colder in northern countries than it is here.","zh":"(形) 北方的；北部的　(形) 來自北方的","ez":"北方國家比這裡冷得多。"},{"w":"remote","p":"[rɪˈmoʊt] adj.","d":"If something is remote, it is very far away and difficult to get to.","e":"It took many days to get to the remote island.","zh":"(形) 遙遠的；偏僻的","ez":"花了許多天才到達那個偏遠的島嶼。"},{"w":"southern","p":"[ˈsʌðə:rn] adj.","d":"If something is southern, it is in the direction of south.","e":"Taegu is located in the southern part of the Korean peninsula.","zh":"(形) 南方的；南部的","ez":"大邱位於朝鮮半島的南部。"},{"w":"statue","p":"[ˈstætjuː] n.","d":"A statue is an image of a person or animal made of stone or metal.","e":"I saw a beautiful statue of a lion today.","zh":"(名) 雕像；塑像","ez":"我今天看到一座美麗的獅子雕像。"},{"w":"steam","p":"[stiːm] n.","d":"Steam is water that has become hot and has turned into a misty gas.","e":"We could see the steam rise from the boiling water.","zh":"(名) 蒸氣；水蒸氣　(動) 蒸；冒蒸氣","ez":"我們可以看到水蒸氣從沸水中升起。"},{"w":"submit","p":"[səbˈmɪt] v.","d":"To submit to someone is to agree to do what they tell you to do.","e":"She submitted to her mother&rsquo;s wishes and did her homework. ","zh":"(動) 提交；呈送","ez":"她順從母親的意願，完成了作業。"},{"w":"temple","p":"[ˈtempl] n.","d":"A temple is a building that is used for religious purposes.","e":"The people visited the temple to pray.","zh":"(名) 寺廟；神殿","ez":"人們去寺廟祈禱。"},{"w":"upper","p":"[ˈʌpər] adj.","d":"Upper means higher in position or place.","e":"A home&rsquo;s attic is at the upper part of the structure.","zh":"(形) 上層的；較高的","ez":"房子的閣樓位於建築物的上層。"},{"w":"weed","p":"[wiːd] n.","d":"A weed is a plant, especially one that is not useful or wanted.","e":"The yard of the house was full of ugly weeds.","zh":"(動) 除草；排除　(名) 雜草","ez":"房子的院子裡長滿了難看的雜草。"},{"w":"wing","p":"[wɪŋ] n.","d":"A wing is the part of an animal that lets it fly.","e":"The bird used its wings to fly across the water.","zh":"(名) 翅膀；機翼　(動) 飛翔","ez":"鳥兒用翅膀飛過水面。"}]},{"id":3,"name":"Unit 3","words":[{"w":"arrow","p":"[ˈærəʊ] n.","d":"An arrow is a thin, straight stick shot from a bow.","e":"The arrow flew through the air and hit the target.","zh":"(名) 箭；箭頭　(動) 快速移動；指向","ez":"箭飛過空中，擊中了目標。"},{"w":"battle","p":"[ˈbætl] n.","d":"A battle is a fight between two armies during a war.","e":"The battle lasted for many days.","zh":"(名) 戰鬥；戰役　(動) 奮力對抗；搏鬥","ez":"這場戰鬥持續了許多天。"},{"w":"bow","p":"[bəʊ] n.","d":"A bow is a weapon made of curved wood and string that shoots arrows.","e":"He went hunting with a bow and arrow.","zh":"(名) [bo] 弓；鞠躬　(動) [baʊ] 鞠躬；彎曲","ez":"他帶著弓箭去打獵。"},{"w":"brave","p":"[breɪv] adj.","d":"When people are brave, they are not afraid to face pain or danger.","e":"The brave firefighter saved the girl from the burning building.","zh":"(形) 勇敢的；英勇的　(動) 勇敢面對；挺身抵抗","ez":"勇敢的消防員從燃燒的大樓中救出了那個女孩。"},{"w":"chief","p":"[tʃiːf] n.","d":"A chief is the leader of a group of people.","e":"The chief led the people through the mountains.","zh":"(名) 首長；領導人　(形) 主要的；最重要的","ez":"酋長帶領人們穿越山脈。"},{"w":"disadvantage","p":"[ˌdɪsədˈvæntɪdʒ] n.","d":"A disadvantage is a situation where someone is likely to lose.","e":"Mike had a disadvantage in the race since he hurt his knee.","zh":"(名) 劣勢；不利條件　(動) 使處於不利地位","ez":"麥克在比賽中處於劣勢，因為他傷了膝蓋。"},{"w":"enemy","p":"[ˈɛnəmɪ] n.","d":"An enemy is a country that is fighting another country during a war.","e":"The enemy prepared to attack the kingdom.","zh":"(名) 敵人；對手　(形) 敵對的；有敵意的","ez":"敵人準備攻擊王國。"},{"w":"entrance","p":"[ˈentrəns] n.","d":"An entrance is a place where someone can enter an area.","e":"The gate was locked, so Bill had to find a different entrance.","zh":"(名) [`ɛntrəns] 入口；進入　(動) [ɪn`træns] 進入；錄取","ez":"大門鎖上了，所以比爾必須找另一個入口。"},{"w":"hardly","p":"[ˈhɑːrdlɪ] adj.","d":"If something hardly happens, it almost does not happen at all.","e":"I hardly saw the concert since I had to leave early.","zh":"(副) 幾乎不；幾乎沒有　(副) 剛剛；才剛","ez":"我幾乎沒看到演唱會，因為我必須提早離開。"},{"w":"intend","p":"[ɪnˈtend] v.","d":"To intend to do something means to plan to do it.","e":"I intend to finish college in three years.","zh":"(動) 打算；想要　(動) 意圖；目的","ez":"我打算在三年內完成大學學業。"},{"w":"laughter","p":"[ˈlæftər] n.","d":"Laughter is the sound produced by laughing about something funny.","e":"Susan&rsquo;s joke made her classmates burst into laughter.","zh":"(名) 笑聲；歡笑","ez":"蘇珊的笑話讓她的同學們哄堂大笑。"},{"w":"log","p":"[lɒg] n.","d":"A log is a thick piece of wood that is cut from a tree.","e":"The fire was too small, so we added another log to it.","zh":"(名) 木頭；原木　(名) 日誌；記錄　(動) 記錄；登記","ez":"火太小了，所以我們又加了一根木頭。"},{"w":"military","p":"[ˈmɪlɪtərɪ] n.","d":"The military is the armed forces of a country.","e":"&nbsp;I joined the military after I finished high school.","zh":"(形) 軍事的；軍隊的　(名) 軍隊；軍方","ez":"高中畢業後，我加入了軍隊。"},{"w":"obey","p":"[oʊˈbeɪ] v.","d":"To obey means to follow what a law or a person says you must do.","e":"My little sister did not obey my mother. Now she is in trouble.","zh":"(動) 聽從；服從　遵守；按照...行動","ez":"我的妹妹沒有聽媽媽的話，現在她惹上麻煩了。"},{"w":"secure","p":"[sɪˈkjʊə:r] v.","d":"To secure something means to get it after a lot of effort.","e":"&nbsp;I was able to secure a good grade on my test after weeks of studying.","zh":"(動) 確保；使安全","ez":"經過幾週的學習，我終於在考試中取得了好成績。"},{"w":"steady","p":"[ˈstedɪ] adj.","d":"When someone or something is steady, they are under control.","e":"The problem was hard but she remained steady and solved it.","zh":"(形) 穩定的；平穩的　(動) 使穩定；使平穩　(副) 穩定地；平穩地","ez":"問題很難，但她保持冷靜並解決了它。"},{"w":"trust","p":"[trʌst] v.","d":"To trust is to believe that someone is honest and will do what is right.","e":"I trust my friends; they don&rsquo;t tell my secrets to other people.","zh":"(名) 信任；信賴　(動) 信任；相信","ez":"我信任我的朋友，他們不會把我的秘密告訴別人。"},{"w":"twist","p":"[twɪst] v.","d":"To twist something is to wrap it around itself or another thing.","e":"She twisted the spaghetti around her fork.","zh":"(動) 扭轉；擰　(名) 扭轉；轉彎","ez":"她把義大利麵繞在叉子上。"},{"w":"unless","p":"[ənˈles] conj.","d":"Unless means if not or except when.","e":"Unless you clean your room, you cannot play with your friends.","zh":"(連) 除非；如果不","ez":"除非你打掃房間，否則不能和朋友出去玩。"},{"w":"weapon","p":"[ˈwepən] n.","d":"A weapon is an object that can be used to hurt people.","e":"Swords have been used as weapons for thousands of years.","zh":"(名) 武器；兵器","ez":"劍作為武器已經使用了數千年。"}]},{"id":4,"name":"Unit 4","words":[{"w":"chest","p":"[tʃest] n.","d":"The chest is the front part of a person’s body under the neck.","e":"The water in the lake was as high as my chest.","zh":"(名) 胸部；胸腔　(名) 箱子；櫃子","ez":"湖裡的水深及我的胸口。"},{"w":"confidence","p":"[ˈkɒnfɪdəns] n.","d":"If you have confidence about something, you are sure of it.","e":"I have confidence that I did well on the test.","zh":"(名) 信心；自信　(名) 信任；信賴","ez":"我有信心這次考試考得很好。"},{"w":"consequence","p":"[ˈkɒnsɪkwəns] n.","d":"A consequence is a result of a choice or action.","e":"Asa consequence of missing my bus, I had to find another way to work.","zh":"(名) 結果；後果　(名) 重要性；影響力","ez":"因為錯過了公車，我只好另找方法去上班。"},{"w":"disaster","p":"[dɪˈzæs tər] n.","d":"A disaster is a really bad thing that happens.","e":"When the car crashed, it was a disaster.","zh":"(名) 災難；災害　(名) 慘敗；失敗","ez":"車禍發生時，簡直是一場災難。"},{"w":"disturb","p":"[diˈstəːrb] v.","d":"To disturb someone means to upset them.","e":"The loud noise disturbed me while I was working.","zh":"(動) 打擾；妨礙　(動) 使不安；擾亂","ez":"我在工作時，巨大的噪音打擾了我。"},{"w":"estimate","p":"[ˈɛstəmeɪt] v.","d":"To estimate something means to make a guess about it.","e":"The boy estimated that he was one meter tall.","zh":"(動) [ˈɛstəˌmet] 估計；評估　(名) [ˈɛstəmɪt] 估計；評估","ez":"那個男孩估計自己有一公尺高。"},{"w":"honor","p":"[ˈɒn ər] v.","d":"When you honor people or things, you show respect for them.","e":"I honor my science teacher by working hard in class.","zh":"(名) 榮譽；名譽　(動) 尊敬；表彰　(形) 光榮的；值得尊敬的","ez":"我認真上課，以表達對自然老師的尊敬。"},{"w":"impress","p":"[ɪmˈpres] v.","d":"To impress someone means to make that person proud.","e":"He was able to impress the girls with his new dance.","zh":"(動) 留下深刻印象；使印象深刻　(動) 壓印；蓋印章","ez":"他用新舞步成功吸引了女孩們的注意。"},{"w":"marathon","p":"[ˈmærəθən] n.","d":"A marathon is a very long foot race just over 42 kilometers.","e":"I ran a marathon, and now my legs are tired.","zh":"(名) 馬拉松；持久的活動","ez":"我跑了一場馬拉松，現在腿很痠。"},{"w":"narrow","p":"[ˈnærəʊ] adj.","d":"When something is narrow, it is very thin.","e":"The bridge is too narrow for a car to drive over.","zh":"(形) 狹窄的；狹隘的　(動) 縮小；變窄","ez":"這座橋太窄了，車子開不過去。"},{"w":"pale","p":"[peɪl] adj.","d":"When something is pale, it does not have a bright color.","e":"The girl&rsquo;s skin was very pale.","zh":"(形) 蒼白的；淡的","ez":"那個女孩的皮膚非常蒼白。"},{"w":"rough","p":"[rʌf] adj.","d":"When something is rough, it is not even or smooth.","e":"The rough ground hurt my feet.","zh":"(形) 粗糙的；崎嶇的","ez":"粗糙的地面弄傷了我的腳。"},{"w":"satisfy","p":"[ˈsætɪsfaɪ] v.","d":"To satisfy someone means to make them happy.","e":"It will satisfy my teacher if I finish all my homework.","zh":"(動) 滿足；使滿意","ez":"如果我完成所有作業，老師會滿意的。"},{"w":"scream","p":"[skriːm] v.","d":"To scream means to make a loud noise with your mouth.","e":"The girl saw a spider and screamed.","zh":"(動) 尖叫；呼喊　(名) 尖叫聲","ez":"女孩看到蜘蛛，尖叫了起來。"},{"w":"sensitive","p":"[ˈsensɪtɪv] adj.","d":"When someone or something is sensitive, they are easily hurt.","e":"My teeth are sensitive to cold things.","zh":"(形) 敏感的；易受影響的","ez":"我的牙齒對冰冷的東西很敏感。"},{"w":"shade","p":"[ʃeɪd] n.","d":"The shade is a dark area that something makes when it blocks the sun.","e":"It was hot outside, so the boy sat in the shade of a tree.","zh":"(名) 陰涼處；樹蔭　(動) 遮蔽；遮光","ez":"外面很熱，所以男孩坐在樹蔭下。"},{"w":"supplement","p":"[ˈsʌpləmənt] v.","d":"To supplement something is to add something else to it in a good way.","e":"He supplements his diet with fresh fruits.","zh":"(名) ['sʌpləmənt] 補充；補充物　(動) [sʌplə'mɛnt] 補充；增補","ez":"他用新鮮水果補充營養。"},{"w":"terror","p":"[ˈterər] n.","d":"When someone feels terror, they are scared.","e":"I felt a sense of terror when the tiger chased me.","zh":"(名) 恐怖；恐懼","ez":"老虎追我的時候，我感到一陣恐懼。"},{"w":"threat","p":"[θret] n.","d":"A threat is something bad that might happen.","e":"Due to the dark clouds, there was a threat of a bad storm.","zh":"(名) 威脅；恐嚇","ez":"因為烏雲密布，可能會有暴風雨。"},{"w":"victim","p":"[ˈvɪktɪm] n.","d":"A victim is a person that had something bad happen to them.","e":"I was a victim of a robbery.","zh":"(名) 受害者；犧牲者","ez":"我是一起搶劫案的受害者。"}]},{"id":5,"name":"Unit 5","words":[{"w":"ancestor","p":"[ˈænsɛstə] n.","d":"An ancestor is a family member from the past.","e":"My ancestors came from Germany.","zh":"(名) 祖先；祖宗　(名) 前人；前代的人","ez":"我的祖先來自德國。"},{"w":"angle","p":"[æŋgl] n.","d":"An angle is the direction from which you look at something.","e":"The giraffe turned its head to see from another angle.","zh":"(名) 角度；角　(動) 轉向；傾斜　(名) 觀點；立場","ez":"長頸鹿轉頭從另一個角度看。"},{"w":"boot","p":"[buːt] n.","d":"A boot is a heavy shoe that goes over your ankle.","e":"He wore boots so that his feet wouldn&rsquo;t get wet.","zh":"(名) 靴子；長靴　(動) 啟動；開機　(動) 踢；踹","ez":"他穿了靴子，這樣腳就不會弄濕。"},{"w":"border","p":"[ˈbɔːrdər] n.","d":"A border is the edge of an area.","e":"The postcard had a pretty green border of pine needles.","zh":"(名) 邊界；國境　(動) 與...接壤；圍住","ez":"明信片上有漂亮的綠色松針邊框。"},{"w":"congratulate","p":"[kənˈgrætʃəleɪt] v.","d":"To congratulate someone is to tell them that you are happy for them.","e":"Bill and Angela congratulated each other on a job well done.","zh":"(動) 祝賀；恭喜　(動) 稱讚；褒揚","ez":"比爾和安琪拉互相祝賀工作做得好。"},{"w":"frame","p":"[freɪm] n.","d":"A frame is a border for a picture or mirror.","e":"I have to get a frame for my friend&rsquo;s picture.","zh":"(名) 框架；畫框　(動) 設計；構成；誣陷","ez":"我得為朋友的照片找個相框。"},{"w":"heaven","p":"[ˈhɛvən] n.","d":"Heaven is the place that some people believe people go when they die.","e":"When I die, I hope that I go to heaven.","zh":"(名) 天堂；極樂世界　(名) 天國；樂園","ez":"我希望死後能上天堂。"},{"w":"incredible","p":"[ɪnˈkredəbl] adj.","d":"If someone or something is incredible, it is hard to believe they are true.","e":"I have an incredible story to tell you about my vacation.","zh":"(形) 難以置信的；驚人的　(形) 極好的；了不起的","ez":"我有個關於假期的精采故事要告訴你。"},{"w":"legend","p":"[ˈledʒənd] n.","d":"A legend is a story from the past.","e":"There is a well-known legend about a king and his queen.","zh":"(名) 傳奇；傳說　(名) 圖例；說明","ez":"有一個關於國王和王后的著名傳說。"},{"w":"praise","p":"[preɪz] v.","d":"To praise is to show that you like someone or something.","e":"The coach praised both athletes after a good practice.","zh":"(動) 稱讚；表揚　(名) 讚揚；讚美","ez":"教練在良好的練習後稱讚了兩位運動員。"},{"w":"proceed","p":"[prəˈsiːd] v.","d":"To proceed is to go in a certain direction.","e":"My son and I proceeded to the beach so we could go fishing.","zh":"(動) 繼續進行；前進","ez":"我和兒子前往海灘釣魚。"},{"w":"pure","p":"[pjʊər] adj.","d":"If something is pure, it is very clear and beautiful.","e":"The rose was pure. It had no dirt or imperfections.","zh":"(形) 純淨的；純粹的","ez":"這朵玫瑰很純淨，沒有灰塵或瑕疵。"},{"w":"relative","p":"[ˈrelətɪv] n.","d":"A relative is a family member.","e":"My relatives came by to see the new baby.","zh":"(名) 親戚；親屬　(形) 相對的；比較的","ez":"我的親戚來探望新生兒。"},{"w":"senior","p":"[ˈsiːnjər] adj.","d":"If one is senior, they are the oldest or have been there the longest.","e":"Because he got his job first, Bob is the senior chef.","zh":"(名) 年長者；高年級學生　(形) 年長的；資深的","ez":"因為鮑伯先得到工作，所以他是資深主廚。"},{"w":"silent","p":"[ˈsaɪlənt] adj.","d":"If someone or something is silent, they make no sound.","e":"Since no one was home, the house was silent.","zh":"(形) 沉默的；安靜的","ez":"因為沒人在家，房子裡一片寂靜。"},{"w":"sink","p":"[sɪŋk] v.","d":"To sink into something is to slowly fall into it.","e":"The boat had a hole in it, and it sank into the ocean.","zh":"(名) 水槽；洗碗槽　(動) 下沉；沈沒","ez":"船上有個洞，沉入了大海。"},{"w":"superior","p":"[səˈpɪəriər] adj.","d":"If someone or something is superior, they are better than another.","e":"I think cooking outdoors is superior to cooking indoors.","zh":"(形) 優越的；上等的","ez":"我認為戶外烹飪比室內烹飪更好。"},{"w":"surround","p":"[səˈraʊnd] v.","d":"To surround something is to close in on it from all sides.","e":"We surrounded the suspect on all four sides.<br />","zh":"(動) 包圍；環繞","ez":"我們從四面圍住了嫌疑犯。"},{"w":"thick","p":"[θɪk] adj.","d":"If something is thick, it is wide and solid.","e":"The fog was so thick that I couldn&rsquo;t see through it.","zh":"(形) 厚的；濃的","ez":"霧太濃了，我無法看穿。"},{"w":"wrap","p":"[ræp] v.","d":"To wrap is to cover something on all sides.","e":"I wrapped his gift and put a bow on it.","zh":"(動) 包裝；包裹　(名) 包裝紙；披肩","ez":"我把禮物包好，並在上面打了個蝴蝶結。"}]},{"id":6,"name":"Unit 6","words":[{"w":"abroad","p":"[əˈbrɔːd] adv.","d":"If someone goes or travels abroad, they go to another country.","e":"My brother wants to go abroad next year.","zh":"(副) 在國外；到國外","ez":"我哥哥明年想出國。"},{"w":"anger","p":"[ˈæŋgər] v.","d":"To anger someone is to make them mad.","e":"It angers me when people are rude.","zh":"(名) 憤怒；生氣　(動) 使生氣；激怒","ez":"別人沒禮貌的時候我會生氣。"},{"w":"bride","p":"[braɪd] n.","d":"A bride is a woman who is getting married or has just gotten married.","e":"The bride looked beautiful in her wedding dress.","zh":"(名) 新娘；新婚妻子","ez":"新娘穿婚紗看起來很美。"},{"w":"brief","p":"[briːf] adj.","d":"If something is brief, it only lasts fora short time.","e":"The meeting this afternoon was very brief.","zh":"(形) 短暫的；簡短的　(動) 簡述；說明","ez":"今天下午的會議非常簡短。"},{"w":"chase","p":"[tʃeɪs] v.","d":"To chase someone or something is to follow them in order to catch them.","e":"I was chased by an angry native.","zh":"(動) 追趕；追捕　(動) 追求；追逐","ez":"我被一個生氣的當地人追趕。"},{"w":"disappoint","p":"[ˌdɪsəˈpɔɪnt] v.","d":"To disappoint is to make one feel sad or unsatisfied.","e":"I do not want to disappoint my family, so I try to do well at school.","zh":"(動) 使失望；令人沮喪　(動) 破壞；挫折","ez":"我不想讓家人失望，所以在學校努力表現。"},{"w":"dive","p":"[daɪv] v.","d":"To dive is to jump into water.","e":"I will dive into the lake once we get there.","zh":"(動) 潛水；跳水　(名) 潛水；跳水動作","ez":"我們一到那裡我就會跳進湖裡。"},{"w":"exchange","p":"[ɪksˈtʃeɪndʒ] v.","d":"To exchange means to give something for another thing in return.","e":"I exchanged my foreign money for American dollars.","zh":"(動) 交換；互換　(名) 交換；兌換","ez":"我把外幣換成美元。"},{"w":"favor","p":"[ˈfeɪvər] n.","d":"A favor is something you do for someone to help them.","e":"Can you do me a favor and turn off the lights?","zh":"(名) 偏好；喜愛　(動) 傾向於；偏袒　(名) 恩惠；幫忙","ez":"可以幫我關燈嗎？"},{"w":"fee","p":"[fiː] n.","d":"A fee is an amount of money that a person or company asks for a service.","e":"I had to pay an hourly fee to speak with my lawyer.","zh":"(名) 費用；服務費　(名) 學費；會費","ez":"我必須按小時付費才能跟律師說話。"},{"w":"forever","p":"[fərˈevər] adv.","d":"If something lasts forever, it means it lasts for all time.","e":"The young couple promised that they would love each other forever.","zh":"(副) 永遠地；永久地　(名) 永遠；很長時間","ez":"這對年輕情侶承諾會永遠相愛。"},{"w":"guy","p":"[gaɪ] n.","d":"A guy is an informal way to call a man.","e":"The guy at the flower shop was really helpful today.","zh":"(名) 男孩；男人；傢伙","ez":"今天花店的那個店員真的很幫忙。"},{"w":"lovely","p":"[ˈlʌvlɪ] adj.","d":"If people or things are lovely, they are good-looking or beautiful.","e":"The trees look lovely in the fall.","zh":"(形) 可愛的；美好的　(形) 令人愉快的；迷人的","ez":"秋天的樹木看起來很美。"},{"w":"mood","p":"[muːd] n.","d":"A mood is the way someone is feeling.","e":"I am in a good mood because I did well on my math test.","zh":"(名) 心情；情緒　(名) 氣氛；感覺","ez":"我心情很好，因為數學考得很好。"},{"w":"palace","p":"[ˈpælɪs] n.","d":"A palace is a very large building. It is often the home of a royal family.","e":"The king and queen live in a beautiful palace.","zh":"(名) 宮殿；宏偉的建築","ez":"國王和皇后住在美麗的宮殿裡。"},{"w":"permit","p":"[pərˈmɪt] v.","d":"To permit something is to let someone do it.","e":"I was sick, so my mother permitted me to stay home from school.","zh":"(動) 允許；准許","ez":"我生病了，所以媽媽准許我待在家不用上學。"},{"w":"protest","p":"[prəˈtest] v.","d":"To protest something is to argue about it with someone.","e":"The people protested the decision of the president.","zh":"(名) [`protɛst] 抗議；反對　(動) [prə`tɛst] 抗議；反對","ez":"人們抗議總統的決定。"},{"w":"sculpture","p":"[ˈskʌlptʃə:r] n.","d":"A sculpture is a piece of art that is made from wood, clay, or stone.","e":"We saw an old sculpture of Buddha at the museum.","zh":"(名) 雕塑；雕刻品","ez":"我們在博物館看到一尊古老的佛像。"},{"w":"tribe","p":"[traɪb] n.","d":"A tribe is a group of people who live in the same culture.","e":"There&rsquo;s a small tribe of people who live in the mountains of Spain.","zh":"(名) 部落；族群","ez":"西班牙山區住著一個小型部落。"},{"w":"youth","p":"[juːθ] n.","d":"Youth is a time in people’s lives when they are young.","e":"My mother wanted to be a nurse in her youth.","zh":"(名) 年輕時期；青春","ez":"我媽媽年輕時想當護士。"}]},{"id":7,"name":"Unit 7","words":[{"w":"basis","p":"[ˈbeɪsɪs] n.","d":"To do something on time’s basis is how often you do it.","e":"My grandfather gets his hearing checked on a yearly basis.","zh":"(名) 基礎；根據　(名) 基準；依據","ez":"我爺爺每年檢查一次聽力。"},{"w":"biology","p":"[baɪˈɒlədʒɪ] n.","d":"Biology is the study of living things.","e":"We learned about the human heart in biology class.","zh":"(名) 生物學；生物　(形) 生物的；生物學的","ez":"我們在生物課上學到關於人類心臟的知識。"},{"w":"cage","p":"[keɪdʒ] n.","d":"A cage is something that holds an animal so it cannot leave.","e":"We put the parrots in their cage at night.","zh":"(名) 籠子；鳥籠　(動) 將…關進籠子；限制","ez":"晚上我們把鸚鵡放進籠子裡。"},{"w":"colleague","p":"[ˈkɒliːg] n.","d":"A colleague is somebody you work with.","e":"My colleague helped me finish the job.","zh":"(名) 同事；同僚　(名) 工作夥伴；職場夥伴","ez":"我的同事幫我完成了工作。"},{"w":"colony","p":"[ˈkɒlənɪ] n.","d":"A colony is a country controlled by another country.","e":"The USA was at one time a colony of Great Britain.","zh":"(名) 殖民地；領地　(名) 群體；聚落","ez":"美國曾經是英國的殖民地。"},{"w":"debate","p":"[dɪˈbeɪt] v.","d":"To debate is to seriously discuss something with someone.","e":"The husband and wife debated over which TV to buy. ","zh":"(名) 辯論；討論　(動) 辯論；爭論","ez":"夫妻倆為了買哪台電視而爭論。"},{"w":"depart","p":"[dɪˈpɑːrt] v.","d":"To depart is to leave some place so you can go to another place.","e":"The plane departed for Italy at 3:00 this afternoon.","zh":"(動) 出發；離開　(動) 背離；偏離","ez":"飛機今天下午三點飛往義大利。"},{"w":"depress","p":"[dɪˈpres] v.","d":"To depress someone is to make them sad.","e":"The bad news from work depressed the man.","zh":"(動) 使沮喪；使憂鬱　(動) 降低；壓低","ez":"工作上的壞消息讓那個男人很沮喪。"},{"w":"factual","p":"[ˈfæktjʊəl] adj.","d":"When something is factual, it is true.","e":"John learns about history from factual books.","zh":"(形) 以事實為基礎的；符合事實的　(形) 真實的；確實的","ez":"約翰從事實性書籍中學習歷史。"},{"w":"fascinate","p":"[ˈfæsəˌneɪt] v.","d":"To fascinate someone is to make them really like something.","e":"The kitten was fascinated by the ball of yarn.","zh":"(動) 使著迷；吸引　(動) 迷住；使感興趣","ez":"小貓咪對那團毛線著迷。"},{"w":"mission","p":"[ˈmɪʃən] n.","d":"A mission is an important job that is sometimes far away.","e":"The woman&rsquo;s mission was to help sick people.","zh":"(名) 任務；使命　(名) 目標；宗旨","ez":"那位女士的使命是幫助病人。"},{"w":"nevertheless","p":"[ˌnevəðəˈles] adv.","d":"You use nevertheless to show that something goes against a fact.","e":"He is usually friendly. Nevertheless, he wasn&rsquo;t this afternoon.","zh":"(副) 然而；不過　(連) 儘管如此；但是","ez":"他通常很友善，但今天下午卻不是。"},{"w":"occupation","p":"[ˌɒkjʊˈpeɪʃən] n.","d":"An occupation is a person’s job.","e":"My father&rsquo;s occupation is a dentist.","zh":"(名) 職業；工作　(名) 佔領；占據","ez":"我爸爸的職業是牙醫。"},{"w":"overseas","p":"[ˌəʊvəˈsiːz] adv.","d":"If you go overseas, you go to a country on the other side of an ocean.","e":"John often goes overseas for vacations.","zh":"(副) 在國外；在海外　(形) 海外的；國外的","ez":"約翰經常出國度假。"},{"w":"persuade","p":"[pəˈsweɪd] v.","d":"To persuade someone is to make them agree to do something.","e":"The children persuaded their parents to buy them gifts.","zh":"(動) 說服；勸說","ez":"孩子們說服父母買禮物給他們。"},{"w":"route","p":"[ruːt] n.","d":"A route is the way you go from one place to another.","e":"I saw many new houses along the route to the city.","zh":"(名) 路線；路途","ez":"我在前往城市的路上看到許多新房子。"},{"w":"ruins","p":"[ˈruːɪnz] n.","d":"Ruins are old buildings that are not used anymore.","e":"I visited some interesting ruins in Greece.","zh":"(名) 廢墟；遺跡　(動) 毀壞；破壞","ez":"我在希臘參觀了一些有趣的遺跡。"},{"w":"scholar","p":"[ˈskɒlə:r] n.","d":"A scholar is a person who studies something and knows much about it.","e":"The scholar knew much about art history.","zh":"(名) 學者","ez":"那位學者對藝術史了解很多。"},{"w":"significant","p":"[sɪgˈnɪfɪkənt] adj.","d":"When someone or something is significant, they are important.","e":"I read many significant novels as a literature major in university.","zh":"(形) 重要的；意義重大的","ez":"我大學主修文學時讀了許多重要的小說。"},{"w":"volcano","p":"[vɒlˈkeɪnəʊ] n.","d":"A volcano is a mountain with a hole on top where hot liquid comes out.","e":"When the volcano erupted, smoke and heat filled the air.","zh":"(名) 火山","ez":"火山爆發時，煙霧和熱氣充滿了空氣。"}]},{"id":8,"name":"Unit 8","words":[{"w":"broad","p":"[brɔːd] adj.","d":"If something is broad, it is wide.","e":"The river is very long and broad.","zh":"(形) 寬的；寬廣的　(形) 廣泛的；涵蓋面大的","ez":"這條河又長又寬。"},{"w":"bush","p":"[bʊʃ] n.","d":"A bush is a plant with many thin branches. It is smaller than a tree.","e":"My dad and I planted some small bushes around the house.","zh":"(名) 灌木；灌木叢　(名) 灌木地；荒野","ez":"我和爸爸在房子周圍種了一些小灌木。"},{"w":"capable","p":"[ˈkeɪpəbəl] adj.","d":"If someone or something is capable of something, they can do it.","e":"The Olympic athlete is capable of lifting a lot of weight.","zh":"(形) 有能力的；勝任的　(形) 能夠做某事的；有才能的","ez":"那位奧運選手能夠舉起很重的重量。"},{"w":"cheat","p":"[tʃiːt] v.","d":"To cheat is to be dishonest so that you can win or do well.","e":"They cheated on the test by sharing answers.","zh":"(動) 作弊；欺騙　(名) 欺騙；作弊行為","ez":"他們互相分享答案作弊。"},{"w":"concentrate","p":"[ˈkɒnsəntreɪt] v.","d":"To concentrate on someone or something is to give your full attention.","e":"I could not concentrate on my homework because the room was so loud.","zh":"(動) 集中；專注　(動) 濃縮；提煉","ez":"房間太吵，我無法專心做功課。"},{"w":"conclude","p":"[kənˈkluːd] v.","d":"To conclude is to arrive at a logical end by looking at evidence.","e":"I saw crumbs on my dog&rsquo;s face, so I concluded that he ate my cookie.","zh":"(動) 結束；完成　推斷；得出結論","ez":"我看到狗狗臉上有碎屑，所以推斷他吃了我的餅乾。"},{"w":"confident","p":"[ˈkɒnfɪdənt] adj.","d":"Confident means that one believes they can do something without failing.","e":"She was confident she could climb the mountain due to her training.","zh":"(形) 有信心的；自信的　(形) 確信的；肯定的","ez":"由於訓練有素，她對自己能爬上山很有信心。"},{"w":"considerable","p":"[kənˈsɪdərəbl] adj.","d":"If something is considerable, it is large in size, amount or extent.","e":"They paid a considerable amount of money for that car.","zh":"(形) 相當大的；可觀的　(形) 值得考慮的；重要的","ez":"他們為那輛車付了一大筆錢。"},{"w":"convey","p":"[kənˈveɪ] v.","d":"To convey is to communicate or make ideas known.","e":"That picture of a crying child conveys a feeling of sadness.","zh":"(動) 傳達；表達　(動) 運送；傳遞","ez":"那張哭泣小孩的照片傳達出悲傷的感覺。"},{"w":"definite","p":"[ˈdɛf ə nɪt] adj.","d":"If something is definite, it is certain or sure to be true.","e":"There is a definite connection between hard work and success.","zh":"(形) 明確的；肯定的　(形) 清楚的；確定的","ez":"努力工作和成功之間有明確的關聯。"},{"w":"delight","p":"[dɪˈlaɪt] n.","d":"Delight is a feeling of being very happy with something.","e":"He felt such delight after getting a promotion at work.","zh":"(名) 喜悅；高興　(動) 使…高興；令…愉快　(形) 很高興的；樂意的","ez":"他升職後感到非常開心。"},{"w":"destination","p":"[ˌdestɪˈneɪʃən] n.","d":"A destination is the place where someone or something is going to.","e":"The destination of this plane is Munich, Germany.","zh":"(名) 目的地；目標　(名) 旅遊勝地；終點","ez":"這架飛機的目的地是德國慕尼黑。"},{"w":"dictate","p":"[dɪkˈteɪt] v.","d":"To dictate something is to read it aloud so it can be writte
