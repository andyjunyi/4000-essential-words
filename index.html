,"zh":"(形) 電子的；電子設備的　(名) 電子產品；電子設備","ez":"我喜歡擁有像MP3播放器這樣的電子設備。"},{"w":"inn","p":"[ɪn] n.","d":"An inn is a place where travelers can rest and eat.","e":"The visitor got a room at the inn.","zh":"(名) 旅館；小旅社　(名) 酒吧；客棧","ez":"訪客在小旅館裡訂了一間房間。"},{"w":"net","p":"[net] n.","d":"A net is a bag made of strong thread. It is used to catch animals.","e":"The boy caught butterflies in his net.","zh":"(名) 網；網子　(動) 用網捕捉；獲得淨利　(形) 淨的；純的","ez":"男孩用網子抓住了蝴蝶。"},{"w":"philosophy","p":"[fɪˈlɒsəfɪ] n.","d":"A philosophy is a way to think about truth and life.","e":"My philosophy is &ldquo;live and let live. &rdquo;","zh":"(名) 哲學；人生觀","ez":"我的人生哲學是「互相尊重，彼此包容」。"},{"w":"pot","p":"[pɒt] n.","d":"A pot is a deep, round metal container used for cooking.","e":"Don&rsquo;t touch the pot on the stove. It&rsquo;s hot.","zh":"(名) 鍋子；壺","ez":"別碰爐子上的鍋子，很燙。"},{"w":"seed","p":"[siːd] n.","d":"A seed is the hard part of a plant or fruit that trees grow from.","e":"I planted the seed in the dirt hoping that it would grow into a tree.","zh":"(名) 種子；(動) 播種","ez":"我把種子種在土裡，希望它能長成一棵樹。"},{"w":"sharp","p":"[ʃɑːrp] adj.","d":"When something is sharp, it has a thin edge that cuts things easily.","e":"That knife is very sharp. Be careful not to hurt yourself.","zh":"(形) 銳利的；鋒利的　(副) 準時地；突然地","ez":"那把刀很鋒利，小心別傷到自己。"},{"w":"sort","p":"[sɔːrt] n.","d":"A sort of something is a type of it.","e":"What sort of instrument do you want to learn to play?","zh":"(動) 分類；整理　(名) 種類；類型","ez":"你想學哪一種樂器？"},{"w":"subtract","p":"[səbˈtrækt] v.","d":"To subtract means to take something away.","e":"We learned how to subtract numbers from each other in class.","zh":"(動) 減去；扣除","ez":"我們在課堂上學了如何做減法。"},{"w":"tight","p":"[taɪt] adj.","d":"When something is tight, it is fixed or fastened firmly in place.","e":"The knots were too tight to untie.","zh":"(形) 緊的；緊湊的","ez":"那些結打得太緊，解不開。"},{"w":"virtual","p":"[ˈvəːrtʃuəl] adj.","d":"If something is virtual, then it is very close to being true or accurate.","e":"Because he&rsquo;s popular, Joe is the virtual leader of the group.","zh":"(形) 虛擬的；實際上的","ez":"因為他很受歡迎，喬是這個團體的實質領袖。"},{"w":"weigh","p":"[weɪ] v.","d":"To weigh something means to see how heavy it is.","e":"The little dog weighed exactly 3kgs.","zh":"(動) 稱重；重達","ez":"那隻小狗剛好重三公斤。"},{"w":"whisper","p":"[ˈwɪspə:r] v.","d":"To whisper means to say very quietly.","e":"We have to whisper in the library so people can focus on reading.","zh":"(動) 低聲說話；耳語　(名) 低語；耳語","ez":"我們在圖書館裡得小聲說話，這樣大家才能專心看書。"}]},{"id":29,"name":"Unit 29","words":[{"w":"abstract","p":"[ˈæbstrækt] adj.","d":"If ideas are abstract, they are based on general ways of thinking.","e":"The idea of beauty is abstract and changes over time.","zh":"(形) ['æbstrækt] 抽象的；深奧的　(名) ['æbstrækt] 摘要；概要　(動) [æb'strækt] 摘錄；提取","ez":"美的概念是抽象的，而且會隨著時間改變。"},{"w":"annual","p":"[ˈænjʊəl] adj.","d":"If something is annual, it happens once a year.","e":"The only time I see my aunts and uncles is at our annual family picnic.","zh":"(形) 每年的；年度的　(名) 年刊；年鑑","ez":"我只有在每年家庭野餐時才會見到我的阿姨和叔叔們。"},{"w":"clay","p":"[kleɪ] n.","d":"Clay is a type of heavy, wet soil used to make pots.","e":"She made a bowl out of the clay.","zh":"(名) 黏土；陶土　(動) 用黏土塑造","ez":"她用黏土做了一個碗。"},{"w":"cloth","p":"[klɔ(:)θ] n.","d":"Cloth is material used to make clothes.","e":"His shirt is made of a very soft type of cloth.","zh":"(名) 布；布料　(名) 抹布；布巾","ez":"他的襯衫是用一種很柔軟的布料做的。"},{"w":"curtain","p":"[ˈkəːrtən] n.","d":"A curtain is a cloth hung over a window or used to divide a room.","e":"She opened the curtains to let light into the room.","zh":"(名) 窗簾；布幕　(動) 用窗簾遮住；隔開","ez":"她拉開窗簾，讓光線照進房間。"},{"w":"deserve","p":"[dɪˈzəːrv] v.","d":"To deserve is to be worthy of something as a result of one’s actions.","e":"The dog deserved a bone for behaving very well.","zh":"(動) 應該得到；值得　(動) 應得；應受","ez":"那隻狗表現得很好，值得得到一根骨頭。"},{"w":"feather","p":"[ˈfeðər] n.","d":"Feathers are the things covering birds’ bodies.","e":"That bird has orange feathers on its chest.","zh":"(名) 羽毛；羽毛狀物　(動) 用羽毛裝飾；輕輕放下","ez":"那隻鳥的胸口有橘色的羽毛。"},{"w":"fertile","p":"[ˈfəːrtl] adj.","d":"If land is fertile, it is able to produce good crops and plants.","e":"The farmer grew many vegetables in the fertile soil.","zh":"(形) 肥沃的；適合種植的　(形) 多產的；富有成果的","ez":"農夫在肥沃的土壤裡種了許多蔬菜。"},{"w":"flood","p":"[flʌd] n.","d":"A flood is an event in which water covers an area which is usually dry.","e":"After three days of rain, there was a flood in the city.","zh":"(名) 洪水；大量　(動) 淹沒；湧入　(形) 泛濫的；溢出的","ez":"連續下了三天雨後，城市裡發生了水災。"},{"w":"furniture","p":"[ˈfəːrnɪtʃə:r] n.","d":"Furniture is the things used in a house such as tables and chairs.","e":"His living room only had a few simple pieces of furniture.","zh":"(名) 家具；傢俱　(名) 房間或建築物內的可動物品","ez":"他的客廳裡只有幾件簡單的家具。"},{"w":"grave","p":"[greɪv] n.","d":"A grave is the place where a dead person is buried.","e":"We visit our grandfather&rsquo;s grave each year.","zh":"(形) 嚴肅的；莊嚴的　(名) 墳墓；墓地　(動) 雕刻；銘刻","ez":"我們每年都會去掃祖父的墓。"},{"w":"ideal","p":"[aɪˈdɪ:əl] adj.","d":"If something is ideal, it is the best that it can possibly be.","e":"This house is an ideal place for my family. It has everything we need.","zh":"(形) 理想的；完美的　(名) 理想；標準","ez":"這棟房子對我家來說很理想，應有盡有。"},{"w":"intelligence","p":"[ɪnˈtelədʒəns] n.","d":"Intelligence is the ability to learn and understand things.","e":"Because of his high intelligence, he finished school early.","zh":"(名) 智力；聰慧　(名) 情報；資訊","ez":"因為他智商很高，所以提早完成了學業。"},{"w":"nowadays","p":"[ˈnaʊədeɪz] adv.","d":"If something happens nowadays, it happens at the present time.","e":"In the past people walked everywhere. Nowadays, they use cars.","zh":"(副) 現在；如今　(名) 現代；當今","ez":"以前人們到哪裡都用走的，現在他們都開車。"},{"w":"obtain","p":"[əbˈteɪn] v.","d":"To obtain is to get something you want or need.","e":"After I passed the test, I obtained my driver&rsquo;s license.","zh":"(動) 獲得；取得　(動) 達成；實現","ez":"通過考試後，我拿到了駕照。"},{"w":"religious","p":"[rɪˈlɪdʒəs] adj.","d":"When something is religious, it has to do with religion.","e":"The holy man spoke about religious topics.","zh":"(形) 宗教的；虔誠的","ez":"那位聖人談論了宗教相關的主題。"},{"w":"romantic","p":"[roʊˈmæntɪk] adj.","d":"When something is romantic, it has to do with love.","e":"The young couple went to see a romantic movie.","zh":"(形) 浪漫的；多情的","ez":"那對年輕情侶去看了一部浪漫電影。"},{"w":"shell","p":"[ʃel] n.","d":"A shell is a hard covering that protects the body of some sea creatures.","e":"There were many pretty shells on the beach.","zh":"(名) 殼；貝殼　(動) 剝殼；去殼","ez":"沙灘上有許多漂亮的貝殼。"},{"w":"shore","p":"[ʃɔːr] n.","d":"A shore is the edge of a large body of water.","e":"All of the boats were floating near the shore.","zh":"(名) 岸；海濱","ez":"所有的船都停靠在岸邊附近。"},{"w":"wheel","p":"[wi:l] n.","d":"A wheel is a round thing on a vehicle that turns when it moves.","e":"A car has four wheels.","zh":"(名) 輪子；方向盤","ez":"汽車有四個輪子。"}]},{"id":30,"name":"Unit 30","words":[{"w":"appeal","p":"[əˈpiːl] v.","d":"To appeal to someone is to be interesting or attractive to them.","e":"Sleeping all day appeals to me, but I have to go to school.","zh":"(名) 上訴；呼籲　(動) 吸引；打動；上訴","ez":"整天睡覺很吸引我，但我得去上學。"},{"w":"assume","p":"[əˈsjuːm] v.","d":"To assume something is to think that it is true, even with no proof.","e":"I assume you are both familiar with this plan.","zh":"(動) 假設；假定　(動) 承擔；擔任","ez":"我假設你們兩個都熟悉這個計畫。"},{"w":"borrow","p":"[ˈbɔ(:)roʊ] v.","d":"To borrow something is to take it and then give it back later.","e":"Can I borrow a pencil to use today? I&rsquo;ll give it back to you tomorrow.","zh":"(動) 借用；借入　(動) 向…借錢","ez":"我可以借一支鉛筆今天用嗎？明天還你。"},{"w":"client","p":"[ˈklaɪənt] n.","d":"A client is a person or business that pays another to do a service.","e":"She has many clients who enjoy coming to her salon.","zh":"(名) 客戶；委託人　(名) 患者；顧客","ez":"她有很多客戶喜歡來她的沙龍。"},{"w":"downtown","p":"[ˈdaʊnˈtaʊn] n.","d":"The downtown is the center of most cities.","e":"The downtown is filled with many tall buildings.","zh":"(名) 市中心；商業區　(形) 往市中心的；市中心的","ez":"市中心有許多高樓大廈。"},{"w":"dull","p":"[dʌl] adj.","d":"If something is dull, it is not exciting.","e":"The movie was very dull. I fell asleep watching it.","zh":"(形) 遲鈍的；無聊的　(動) 使變遲鈍；使變無聊","ez":"那部電影很無聊，我看一看就睡著了。"},{"w":"embarrass","p":"[ɪmˈbærəs] v.","d":"To embarrass someone is to make them feel ashamed or foolish.","e":"He was embarrassed when he couldn&rsquo;t remember her name.","zh":"(動) 使尷尬；使不安　(動) 阻礙；妨礙","ez":"他因為記不起她的名字而感到尷尬。"},{"w":"fare","p":"[fɛər] n.","d":"A fare is an amount of money paid to use a bus, train, or taxi.","e":"Since he is a senior, my grandfather pays a low fare for the bus.","zh":"(名) 車費；票價　(名) 食物；飯菜　(動) 進展；過活","ez":"因為我爺爺是年長者，所以他搭公車的票價很低。"},{"w":"former","p":"[ˈfɔːrmər] adj.","d":"Former describes something that used to be but is not any more.","e":"The hotel, a former castle, was built over 200 years ago.","zh":"(形) 以前的；從前的　(名) 前任者；前者","ez":"這家飯店以前是一座城堡，建於兩百多年前。"},{"w":"formula","p":"[ˈfɔːrmjələ] n.","d":"A formula is a set mathematical way or method of solving a problem.","e":"I learned a new formula that may help us with our problem.","zh":"(名) 公式；方程式　(名) 配方；成分","ez":"我學到一個新公式，可能有助於解決我們的問題。"},{"w":"found","p":"[faund] v.","d":"To found a company or organization means to start it.","e":"The pilgrims founded one of the first colonies in the United States.","zh":"(動) 創辦；建立　(動) 發現；找到","ez":"那些朝聖者建立了美國最早的殖民地之一。"},{"w":"invest","p":"[ɪnˈvest] v.","d":"To invest means to use money in a way that will bring a profit later.","e":"I invested money in a new building that should bring me a profit.","zh":"(動) 投資；花錢購買　(動) 投入時間或精力","ez":"我投資了一棟新建築，應該能為我帶來利潤。"},{"w":"loan","p":"[loun] n.","d":"A loan is the act of lending something, usually money.","e":"I got a loan from the bank.","zh":"(名) 貸款；借款　(動) 借出；貸予","ez":"我從銀行貸了一筆款。"},{"w":"practical","p":"[ˈpræktɪkəl] adj.","d":"If something is practical, it is useful in normal life.","e":"Learning English is practical; you can use it in many places.","zh":"(形) 實用的；實際的","ez":"學英文很實用，在很多地方都能用到。"},{"w":"quarter","p":"[ˈkwɔːrtər] n.","d":"A quarter is 25 cents.","e":"He paid a quarter for the candy.","zh":"(名) 四分之一；一刻鐘；一季","ez":"他付了二十五美分買糖果。"},{"w":"salary","p":"[ˈsælərɪ] n.","d":"A salary is how much money a person makes at his or her job.","e":"He got a new job with a better salary.","zh":"(名) 薪水；薪資","ez":"他找到了一份薪水更好的新工作。"},{"w":"scholarship","p":"[ˈskɒlə:rʃɪp] n.","d":"A scholarship is money given to one so they can go to school.","e":"I got a scholarship to help me pay for university.","zh":"(名) 獎學金","ez":"我拿到一筆獎學金來支付大學學費。"},{"w":"temporary","p":"[ˈtempərərɪ] adj.","d":"If something is temporary, it exists for a short time.","e":"This car is only temporary; I&rsquo;ll get a new one soon.","zh":"(形) 臨時的；暫時的","ez":"這輛車只是暫時的，我很快就會換新車。"},{"w":"treasure","p":"[ˈtreʒə:r] n.","d":"A treasure is a collection of valuable things, especially jewels or gold.","e":"They became very rich when they found the buried treasure.","zh":"(動) 珍惜；珍視　(名) 寶藏；珍寶","ez":"他們找到埋藏的寶藏後，變得非常富有。"},{"w":"urge","p":"[əːrdʒ] v.","d":"To urge someone is to try very hard to get them to do something.","e":"He urged them to believe his story.","zh":"(名) 強烈的慾望；衝動　(動) 驅策；力勸","ez":"他極力說服他們相信他的故事。"}]},{"id":31,"name":"Index","words":[]}]},{"id":3,"name":"Book 3","units":[{"id":1,"name":"Unit 1","words":[{"w":"arise","p":"[əˈraɪz] v.","d":"To arise is to happen.","e":"Difficulties arose with his computer because it was old.","zh":"(動) 出現；產生　發生；起身","ez":"他的電腦因為老舊而出現問題。"},{"w":"benefactor","p":"[ˈbenəfӕktər] n.","d":"A benefactor is a person who gives money to help someone.","e":"The student&rsquo;s benefactor gave him money to spend on his studies.","zh":"捐助人；贊助人","ez":"學生的贊助人給他錢用於學業。"},{"w":"blacksmith","p":"[ˈblæksmɪθ] n.","d":"A blacksmith is a person who makes things out of metal.","e":"The blacksmith pounded the piece of metal until it was flat.","zh":"(名) 鐵匠；打鐵工人","ez":"鐵匠捶打金屬片直到它變平。"},{"w":"charitable","p":"[ˈtʃærətəbəl] adj.","d":"When someone is charitable, they help people who are in need.","e":"My sister was charitable enough to help me buy my first house.","zh":"(形) 慈善的；樂善好施的　(形) 寬容的；仁慈的","ez":"我姊姊很慷慨，幫我買了第一間房子。"},{"w":"chimney","p":"[ˈtʃɪmnɪ] n.","d":"A chimney is a tall pipe used to carry smoke out of a building.","e":"The cat was on the roof sitting next to the chimney.","zh":"(名) 煙囪；烟道","ez":"貓咪在屋頂上，坐在煙囪旁邊。"},{"w":"compensate","p":"[ˈkɒmpənseɪt] v.","d":"To compensate is to pay someone for the time they spent doing something.","e":"Her boss compensated her for the extra work she did last week.","zh":"(動) 補償；賠償　(動) 彌補；抵消","ez":"她的老闆補償了她上週做的額外工作。"},{"w":"encounter","p":"[ɪnˈkaʊntər] v.","d":"If you encounter something, you meet or come close to it.","e":"I encountered a sea turtle while I was swimming.","zh":"(動) 遇見；碰面　(名) 相遇；邂逅","ez":"我在游泳時遇到了一隻海龜。"},{"w":"exceed","p":"[ɪkˈsiːd] v.","d":"To exceed is to be more than something.","e":"Since I exceeded my limit, I decided to get rid of my credit cards.","zh":"(動) 超過；勝過　(動) 超出限制；過量","ez":"因為超過額度，我決定停用信用卡。"},{"w":"forge","p":"[fɔːrdʒ] v.","d":"To forge is to make or produce, especially with difficulty.","e":"Stacy and Heather forged their friendship when they were teenagers.","zh":"(動) 鍛造；偽造　(名) 鍛造廠；熔爐","ez":"史黛西和希瑟在青少年時期建立了友誼。"},{"w":"humble","p":"[ˈhʌmbl] adj.","d":"People who are humble do not believe that they are better than other people.","e":"Even though Bob is the smartest boy in his class, he is humble.","zh":"(形) 謙虛的；謙遜的　(動) 使謙卑；貶低","ez":"雖然鮑伯是班上最聰明的男生，但他很謙虛。"},{"w":"iron","p":"[ˈaɪərn] n.","d":"Iron is a strong metal that is used to make many objects.","e":"The horse had shoes made of iron.","zh":"(名) 鐵；熨斗　(動) 熨燙；解決　(形) 堅硬的；鐵製的","ez":"那匹馬的蹄鐵是鐵製的。"},{"w":"ladder","p":"[ˈlædə:r] n.","d":"A ladder is an object that is used to climb up and down things.","e":"He used a ladder to climb to the top of his tree house.","zh":"(名) 梯子；階梯　(名) 晉升的途徑；升遷機會","ez":"他用梯子爬到樹屋頂端。"},{"w":"modest","p":"[ˈmɒdɪst] adj.","d":"If people are modest, they do not think that they are too important.","e":"Derek is very modest for someone who is so rich.","zh":"(形) 謙虛的；不傲慢的　(形) 適度的；不過分的","ez":"德瑞克這麼有錢卻很謙虛。"},{"w":"occupy","p":"[ˈɒkjəpaɪ] v.","d":"To occupy a place is to live, work, or be there.","e":"Kevin and Alice occupied the chairs and had a long discussion.","zh":"(動) 佔據；佔領　(動) 使某人忙碌；使某人專注","ez":"凱文和愛麗絲佔了椅子，進行了長時間的討論。"},{"w":"penny","p":"[ˈpenɪ] n.","d":"A penny is a coin worth one cent.","e":"U.S. President Abraham Lincoln is on the penny.","zh":"(名) 便士；一分錢","ez":"美國總統亞伯拉罕·林肯出現在一分錢硬幣上。"},{"w":"preach","p":"[priːtʃ] v.","d":"To preach is to talk about and promote a religious idea.","e":"Aaron often preached about living an honest life.","zh":"(動) 宣揚；講道","ez":"亞倫經常宣揚過誠實生活的重要性。"},{"w":"prosper","p":"[ˈprɒspər] v.","d":"To prosper is to be successful or make a lot of money.","e":"Frank&rsquo;s new business finally prospered after many years of hard work.","zh":"(動) 繁榮；成功","ez":"法蘭克的新事業經過多年努力終於成功。"},{"w":"province","p":"[ˈprɒvɪns] n.","d":"A province is a small area that is controlled by a country.","e":"Canada is divided into several different provinces.","zh":"(名) 省份；省","ez":"加拿大分為幾個不同的省份。"},{"w":"satisfaction","p":"[ˌsætɪsˈfækʃən] n.","d":"Satisfaction is a feeling you get when you do or receive something good.","e":"Brad was filled with satisfaction when he saw what was for dinner.","zh":"(名) 滿足；滿意","ez":"布萊德看到晚餐時感到非常滿足。"},{"w":"sustain","p":"[səsˈteɪn] v.","d":"To sustain something is to keep it going.","e":"Wind power is a clean way to sustain a city with energy.","zh":"(動) 維持；支撐","ez":"風力發電是維持城市能源的乾淨方式。"}]},{"id":2,"name":"Unit 2","words":[{"w":"acquire","p":"[əˈkwaɪər] v.","d":"To acquire something is to gain possession of it.","e":"Tina acquired a strange package yesterday.","zh":"(動) 獲得；取得　(動) 學到；習得","ez":"蒂娜昨天收到一個奇怪的包裹。"},{"w":"awkward","p":"[ˈɔːkwərd] adj.","d":"If something is awkward, it is embarrassing and uncomfortable.","e":"After dropping his coffee cup, Robbie felt awkward.","zh":"(形) 尷尬的；不自在的　(形) 笨拙的；不靈巧的","ez":"羅比打翻咖啡杯後覺得很尷尬。"},{"w":"caretaker","p":"[ˈkɛərteɪkər]","d":"A caretaker is a person who takes care of very young, old, or sick people.","e":"My grandmother&rsquo;s caretaker helps her get around the house.","zh":"(名) 照顧者；管理員　(名) 臨時代理人；代理負責人","ez":"我祖母的看護協助她在屋內走動。"},{"w":"deceive","p":"[dɪˈsiːv] v.","d":"To deceive someone is to make them believe something that is not true.","e":"He tried to deceive his friends as they were playing a game.","zh":"(動) 欺騙；迷惑　(名) 欺騙；詐騙","ez":"他在玩遊戲時試圖欺騙朋友。"},{"w":"discourage","p":"[dɪsˈkə:rɪdʒ] v.","d":"To discourage someone is to make them feel less excited about something.","e":"Mr. Perry discouraged the students from quitting school.","zh":"(動) 使失去勇氣；打擊信心　(動) 阻止；勸阻","ez":"派瑞先生勸阻學生不要輟學。"},{"w":"fake","p":"[feɪk] adj.","d":"If something is fake, it is made to look real in order to trick people.","e":"The model was wearing fake eyelashes.","zh":"(形) 假的；偽造的　(動) 偽造；冒充","ez":"模特兒戴著假睫毛。"},{"w":"hatred","p":"[ˈheɪtrɪd] n.","d":"Hatred is a strong feeling of not liking someone or something.","e":"I have a hatred for the taste of medicine.","zh":"(名) 仇恨；厭惡　(動) 痛恨；憎恨","ez":"我討厭藥的味道。"},{"w":"hut","p":"[hʌt] n.","d":"A hut is a house made of wood, grass, or mud that has only one or two rooms.","e":"We all went into the hut to sleep.","zh":"(名) 小屋；茅舍　(名) 簡陋的房子","ez":"我們都進小屋睡覺。"},{"w":"inferior","p":"[ɪnˈfɪərɪər] adj.","d":"If something is inferior, it is not as good as something else.","e":"Cars built a hundred years ago are inferior to ones built today.","zh":"(形) 較差的；低級的　(形) 下位的；次要的","ez":"一百年前製造的汽車不如現代的汽車。"},{"w":"lodge","p":"[lɒdʒ] n.","d":"A lodge is a house in the mountains, used by people who hunt or fish.","e":"During our ski trip, we stayed at a lodge.","zh":"(動) 提出；提交　(名) 小屋；山間小住所","ez":"滑雪旅行期間，我們住在一間小木屋。"},{"w":"neglect","p":"[nɪˈglekt] v.","d":"To neglect someone or something is to not take care of it properly.","e":"William neglected his room, so it is a complete mess.","zh":"(動) 忽視；疏忽　(名) 疏忽；忽視","ez":"威廉忽略了他的房間，所以房間一團亂。"},{"w":"newcomer","p":"[ˈnjuːˌkʌmə:r] n.","d":"A newcomer is a person who has recently arrived at a place or a group.","e":"The students happily welcomed the newcomer to the school.","zh":"(名) 新來的人；新手　(名) 初入者；剛到的人","ez":"學生們高興地歡迎新同學。"},{"w":"offense","p":"[əfens] n.","d":"An offense is behavior that is wrong or breaks a law.","e":"Stealing a car is a very serious offense.","zh":"(名) 冒犯；得罪　(名) 犯罪行為；違法行為","ez":"偷車是非常嚴重的罪行。"},{"w":"overlook","p":"[əuvəˈluk] v.","d":"To overlook something is to not notice it, or to not realize that it is important.","e":"Brenda overlooked the last step and had a bad fall.","zh":"(動) 忽略；俯視","ez":"布蘭達忽略了最後一階，摔得很慘。"},{"w":"repay","p":"[riːˈpeɪ] v.","d":"To repay is to pay back or to reward someone or something.","e":"She repaid her friend for all of his hard work with a small gift.","zh":"(動) 償還；回報","ez":"她送了一份小禮物回報朋友的辛苦付出。"},{"w":"ridiculous","p":"[rɪˈdɪkjələs] adj.","d":"If something is ridiculous, it is silly or strange.","e":"Steve looked ridiculous with those huge blue sunglasses.","zh":"愚蠢的；荒唐的；可笑的","ez":"史提夫戴著那副大藍色太陽眼鏡看起來很可笑。"},{"w":"satisfactory","p":"[ˌsætɪsˈfæktərɪ] adj.","d":"If something is satisfactory, it is good enough.","e":"Mina often received satisfactory grades since she studied so hard.","zh":"(形) 令人滿意的；符合要求的","ez":"米娜因為很用功，經常拿到滿意的成績。"},{"w":"shepherd","p":"[ˈʃepə:rd] n.","d":"A shepherd is a person who protects and cares for sheep.","e":"The shepherd moved the sheep to another field.","zh":"(名) 牧羊人　(動) 引導；帶領","ez":"牧羊人把羊群趕到另一塊田地。"},{"w":"venture","p":"[ˈventʃər] v.","d":"To venture is to go to a place that may be dangerous.","e":"Even though it was dangerous, they ventured up the mountain.","zh":"(動) 冒險；敢於","ez":"雖然很危險，他們還是冒險上山。"},{"w":"wheat","p":"[hwiːt] n.","d":"Wheat is a plant which makes grain. Wheat grain is used to make bread.","e":"The field of golden wheat was ready to be harvested.","zh":"(名) 小麥","ez":"那片金黃色的小麥田已經可以收割了。"}]},{"id":3,"name":"Unit 3","words":[{"w":"alley","p":"[ˈælɪ] n.","d":"An alley is a narrow road behind houses or buildings.","e":"The alley behind my house looks dirty.","zh":"(名) 小巷；巷道　(名) 後街；後巷","ez":"我家後面的小巷看起來很髒。"},{"w":"ax","p":"[ӕks] n.","d":"An ax is a tool used to cut wood.","e":"She used an ax to cut some wood for the fire.","zh":"(名) 斧頭；斧子　(動) 用斧頭砍；解僱","ez":"她用斧頭砍了一些木柴生火。"},{"w":"bunch","p":"[bʌntʃ] n.","d":"A bunch is a group of the same things.","e":"She was hungry, so she ate the entire bunch of grapes.","zh":"(名) 束；群；一堆　(動) 聚集；束在一起","ez":"她很餓，所以吃掉了整串葡萄。"},{"w":"chore","p":"[tʃɔːr] n.","d":"A chore is a job that you have to do but don’t like.","e":"It&rsquo;s Nikki&rsquo;s chore to do the dishes every Tuesday and Wednesday night.","zh":"(名) 家務；雜務　(動) 分配家務；派遣","ez":"妮基的任務是每週二和週三晚上洗碗。"},{"w":"decent","p":"[ˈdiːsənt] adj.","d":"When something is decent, it is OK or good enough.","e":"Eric did a decent job painting the fence.","zh":"(形) 令人滿意的；不錯的　(形) 得體的；適當的","ez":"艾瑞克油漆籬笆做得還不錯。"},{"w":"disgrace","p":"[dɪsˈgreɪs] n.","d":"Disgrace is a feeling of shame.","e":"He felt a sense of disgrace after failing his big exam.","zh":"(名) 恥辱；羞辱　(動) 使蒙羞；玷污　(形) 可恥的；丟臉的","ez":"大考失敗後，他感到丟臉。"},{"w":"elbow","p":"[ˈelbou] n.","d":"The elbow is the middle part of a person’s arm that lets you bend it.","e":"She pointed to her elbow to show me where she hurt herself.","zh":"(名) 手肘；肘部　(動) 用肘推；擠開","ez":"她指著手肘給我看她受傷的地方。"},{"w":"grateful","p":"[ˈgreɪtfəl] adj.","d":"When you are grateful for something, you are happy that it happened.","e":"The girls were grateful to have a chance to spend time with their grandfather.","zh":"(形) 感謝的；感激的　(形) 令人欣慰的；令人愉快的","ez":"女孩們很感激有機會和祖父相處。"},{"w":"irritate","p":"[ˈɪrəteɪt] v.","d":"To irritate means to annoy someone.","e":"She was irritated when her brother told her that he had lost her camera.","zh":"(動) 激怒；惹惱　(動) 使發炎；刺激","ez":"哥哥告訴她弄丟了她的相機，她感到很惱火。"},{"w":"kid","p":"[kid] v.","d":"To kid is to make a joke to make someone believe something which is not true.","e":"I am not really mad. I was kidding when I said I was angry.","zh":"(名) 小孩；兒童　(動) 開玩笑；戲弄","ez":"我沒有真的生氣。我說生氣只是在開玩笑。"},{"w":"loose","p":"[luːs] adj.","d":"When something is loose, it is not held in place well.","e":"The bolt was loose, so I tightened it with the wrench.","zh":"(形) 鬆的；不緊的　(動) 放鬆；解開","ez":"螺栓鬆了，所以我用扳手把它鎖緊。"},{"w":"offend","p":"[əˈfend] v.","d":"To offend someone means to make them angry or upset.","e":"They were both offended by what they had said to each other.","zh":"(動) 冒犯；得罪　惹惱；傷害","ez":"他們都因為彼此說的話而感到被冒犯。"},{"w":"overnight","p":"[ouvərnait] adv.","d":"When something happens overnight, it happens during the night.","e":"The campers stayed in the tent overnight.","zh":"(副) 在夜間；一夜之間　(形) 夜間的；突然的","ez":"露營者整晚都待在帳篷裡。"},{"w":"persist","p":"[pə:rsɪst] v.","d":"To persist means to keep doing something even when it is hard.","e":"Even though the lesson was difficult, he persisted until he understood.","zh":"(動) 堅持；持續存在","ez":"雖然課程很難，但他堅持到理解為止。"},{"w":"pine","p":"[paɪn] n.","d":"A pine is a type of tree that is tall and thin.","e":"There were many beautiful pine trees in the forest.","zh":"(動) 渴望；思念　(名) 松樹","ez":"森林裡有許多美麗的松樹。"},{"w":"scar","p":"[skɑːr] n.","d":"A scar is a mark on the skin after a wound heals.","e":"The monster had horrible scars on his cheek and forehead.","zh":"(名) 疤痕；(動) 留下疤痕","ez":"怪物的臉頰和額頭上有可怕的疤痕。"},{"w":"sensation","p":"[senˈseɪʃən] n.","d":"A sensation is a feeling a person gets from their senses.","e":"Mom got a painful sensation in her head from the loud noise.","zh":"(名) 感覺；轟動","ez":"媽媽因為巨大的噪音而感到頭痛。"},{"w":"sled","p":"[sled] n.","d":"A sled is a small vehicle that you use on snow.","e":"Marvin likes to ride his sled down the hill in winter.","zh":"(名) 雪橇　(動) 乘雪橇","ez":"馬文喜歡在冬天坐雪橇滑下山坡。"},{"w":"tease","p":"[tiːz] v.","d":"To tease someone means to laugh at or make fun of them.","e":"Jake teased Charlie because he was the new student.","zh":"(動) 取笑；戲弄","ez":"傑克取笑查理，因為他是新來的學生。"},{"w":"valentine","p":"[ˈvæləntaɪn] n.","d":"A valentine is someone you love or admire with great affection.","e":"Harry wanted Molly to be his valentine.","zh":"(名) 情人；情人卡","ez":"哈利希望茉莉當他的情人。"}]},{"id":4,"name":"Unit 4","words":[{"w":"bloom","p":"[bluːm] v.","d":"When a plant blooms, it makes flowers.","e":"Roses look so pretty when they bloom.","zh":"(動) 開花；盛開　(名) 花朵；花期","ez":"玫瑰盛開時看起來非常漂亮。"},{"w":"compact","p":"[kəmˈpækt] adj.","d":"If something is compact, it is smaller than normal.","e":"A laptop computer is much more compact than a desktop model.","zh":"(形) 緊湊的；小巧的　(動) 壓緊；壓縮","ez":"筆記型電腦比桌上型電腦小巧得多。"},{"w":"curl","p":"[kɜːrl] n.","d":"A curl is a small piece of something with a round shape.","e":"The colorful ribbons were bent into curls.","zh":"(動) 捲；使彎曲　(名) 捲髮；彎曲物","ez":"彩色緞帶被彎成捲曲的形狀。"},{"w":"decay","p":"[dɪˈkeɪ] v.","d":"To decay is to be destroyed naturally.","e":"The old wooden house was slowly decaying.","zh":"(動) 腐爛；腐蝕；衰退　(名) 腐爛；衰退","ez":"那棟老木屋正在慢慢腐朽。"},{"w":"dessert","p":"[diˈzəːrt] n.","d":"Dessert is a sweet food that you eat after a meal.","e":"Kayla wants ice cream for dessert.","zh":"(名) 甜點；甜食　(動) 遺棄；拋棄","ez":"凱拉想吃冰淇淋當甜點。"},{"w":"dip","p":"[dip] v.","d":"To dip something is to put part of it into a liquid for a short time.","e":"Laurel dipped her strawberry into the chocolate.","zh":"(動) 浸；沾　(名) 醬料；下降","ez":"勞瑞爾把草莓沾進巧克力裡。"},{"w":"distant","p":"[ˈdɪstənt] adj.","d":"If something is distant, it is far away.","e":"Michael could barely see the distant island.","zh":"(形) 遠的；遠處的　(形) 冷淡的；疏遠的","ez":"麥可幾乎看不到遠方的島嶼。"},{"w":"eclipse","p":"[ɪˈklɪps] n.","d":"An eclipse is an occasion when the moon moves in front of the sun.","e":"A complete eclipse of the sun is a very rare occurrence.","zh":"(名) 日食；月食　(動) 遮蔽；使黯然失色","ez":"日全食是非常罕見的現象。"},{"w":"fairy","p":"[ˈfɛərɪ] n.","d":"A fairy is a small, magic creature with wings.","e":"There are usually fairies in fantasy stories.","zh":"(名) 仙女；精靈　(形) 仙女般的；神奇的","ez":"奇幻故事裡通常有仙女。"},{"w":"grace","p":"[greɪs] n.","d":"Grace is a quality of moving in a smooth, relaxed and attractive way.","e":"The ballerina danced with grace.","zh":"(名) 優雅；恩典　(動) 使優雅；裝飾　(形) 優雅的；得體的","ez":"芭蕾舞者優雅地跳舞。"},{"w":"leisure","p":"[ˈliːʒə:r] n.","d":"Leisure is time when you do not have to do work.","e":"Eve likes to listen to music in her leisure time.","zh":"(名) 閒暇；休閒時間　(形) 悠閒的；不急的","ez":"伊芙喜歡在空閒時間聽音樂。"},{"w":"mankind","p":"[mænˈkaɪnd] n.","d":"Mankind is all of the world’s people.","e":"All of mankind has to work to make this a better world.","zh":"(名) 人類；全體人類","ez":"全人類都必須努力讓這個世界變得更好。"},{"w":"passion","p":"[ˈpæʃən] n.","d":"Passion is a very strong feeling of wanting to do something.","e":"She had a passion for dancing.","zh":"(名) 熱情；愛好","ez":"她對跳舞充滿熱情。"},{"w":"pillow","p":"[ˈpɪlou] n.","d":"A pillow is something that you put your head on when you sleep.","e":"When I travel, I usually take along my favorite pillow.","zh":"(名) 枕頭","ez":"旅行時，我通常會帶上我最喜歡的枕頭。"},{"w":"pulse","p":"[pʌls] n.","d":"A pulse is the beat of the heart.","e":"The doctor checked the patient&rsquo;s pulse by feeling his wrist.","zh":"(名) 脈搏；脈衝　(動) 搏動；跳動","ez":"醫生透過摸病人的手腕來檢查脈搏。"},{"w":"refresh","p":"[rɪˈfreʃ] v.","d":"To refresh someone is to make them feel less hot or tired.","e":"The baby was refreshed after taking a cool bath.","zh":"(動) 使恢復精神；使清新","ez":"寶寶洗了涼水澡後精神煥發。"},{"w":"sneeze","p":"[sniːz] v.","d":"To sneeze is to suddenly blow air out of your nose and mouth.","e":"He sneezed after smelling the flower.","zh":"(名) 噴嚏　(動) 打噴嚏","ez":"他聞了花之後打了噴嚏。"},{"w":"spice","p":"[spaɪs] n.","d":"A spice is a flavor for food and drinks.","e":"Two common spices found in many homes are salt and pepper.","zh":"(名) 香料；調味品　(動) 加香料於；增添趣味","ez":"許多家庭常見的兩種調味料是鹽和胡椒。"},{"w":"whistle","p":"[hwɪsəl] v.","d":"To whistle is to make a sound by putting your lips together and blowing.","e":"Ashe was listening to music, Daryl whistled.","zh":"(名) 哨子；哨聲　(動) 吹口哨；鳴笛","ez":"艾許在聽音樂，戴瑞爾在吹口哨。"},{"w":"wool","p":"[wʊl] n.","d":"Wool is the hair that a sheep has.","e":"Grandma wants to use the blue wool to knit me a sweater.","zh":"(名) 羊毛","ez":"奶奶想用藍色毛線幫我織一件毛衣。"}]},{"id":5,"name":"Unit 5","words":[{"w":"acquaint","p":"[əˈkweɪnt] v.","d":"To acquaint is to get to know something or someone.","e":"Nancy acquainted herself with the new computer.","zh":"(動) 使認識；介紹　(動) 了解；熟悉","ez":"南西熟悉了那台新電腦。"},{"w":"cemetery","p":"[ˈseməteri] n.","d":"A cemetery is where people are buried when they die.","e":"Some people are scared of cemeteries.","zh":"(名) 墓地；公墓","ez":"有些人害怕墓地。"},{"w":"curse","p":"[kə:rs] v.","d":"To curse someone or something is to hope that bad things happen to them.","e":"The witch cursed the village.","zh":"(動) 詛咒；咒罵　(名) 詛咒；髒話","ez":"女巫詛咒了村莊。"},{"w":"disguise","p":"[dɪsˈgaɪz] n.","d":"A disguise is something you wear so people cannot tell who you are.","e":"Everyone knew that it was Dad in the Santa disguise.","zh":"(名) 偽裝；化妝　(動) 偽裝；隱瞞","ez":"大家都知道那是爸爸假扮的聖誕老人。"},{"w":"fancy","p":"[ˈfænsɪ] adj.","d":"If something is fancy, it is nicer than normal.","e":"Their table was all set for a fancy dinner.","zh":"(形) 花俏的；精美的　(動) 想要；喜歡","ez":"他們的餐桌已經擺好，準備享用一頓精緻的晚餐。"},{"w":"flashlight","p":"[ˈflæʃlaɪt] n.","d":"A flashlight is a small electric light that you carry in your hand.","e":"We took a flashlight when we went camping.","zh":"(名) 手電筒；閃光燈","ez":"我們去露營時帶了手電筒。"},{"w":"hood","p":"[hʊd] n.","d":"A hood is part of a coat that goes over your head.","e":"She put on her hood to keep her head warm.","zh":"(名) 兜帽；風帽　(名) 街區；社區","ez":"她戴上連帽衫的帽子保暖。"},{"w":"inhabitant","p":"[ɪnˈhæbətənt] n.","d":"An inhabitant is a person who lives in a certain place.","e":"The number of inhabitants in the countryside is increasing.","zh":"(名) 居民；住民","ez":"鄉村居民的人數正在增加。"},{"w":"nourish","p":"[ˈnə:rɪʃ] v.","d":"To nourish something is to give it food that it needs to live.","e":"A good mother will nourish her baby every day.","zh":"(動) 滋養；供養　(動) 培養；促進","ez":"好媽媽每天都會滋養她的寶寶。"},{"w":"pirate","p":"[ˈpaɪərət] n.","d":"A pirate is a sailor who steals things from other boats.","e":"Pirates are very scary characters.","zh":"(名) 海盜；盜版者　(動) 盜版；剽竊","ez":"海盜是非常可怕的角色。"},{"w":"publication","p":"[ˌpʌbləˈkeɪʃən] n.","d":"A publication is something printed, like a newspaper or book.","e":"She&rsquo;s been a subscriber to that publication for over ten years.","zh":"(名) 出版；出版物","ez":"她訂閱那份刊物已經超過十年了。"},{"w":"riddle","p":"[ˈrɪdl] n.","d":"A riddle is a question that is difficult to answer but meant to be funny.","e":"I could not answer Wendy&rsquo;s riddle, but it made me laugh.","zh":"(名) 謎；謎語","ez":"我答不出溫蒂的謎語，但它讓我笑了。"},{"w":"rot","p":"[rɒt] n.","d":"When something rots, it slowly gets softer and is destroyed.","e":"The old log began to rot in the forest.","zh":"(動) 腐爛；敗壞","ez":"那根老木頭在森林裡開始腐爛。"},{"w":"scare","p":"[ˈskɛə:r] v.","d":"To scare means to cause one to feel frightened.","e":"I was scared by the sight of the monster.","zh":"(動) 驚嚇；嚇走","ez":"我被怪物的模樣嚇到了。"},{"w":"shortly","p":"[ˈʃɔːrtlɪ] adv.","d":"If something will happen shortly, it will happen very soon.","e":"My workday will end shortly.","zh":"(副) 不久；簡短地","ez":"我的工作日很快就會結束。"},{"w":"skeleton","p":"[ˈskelətn] n.","d":"A skeleton is the bones of a body.","e":"There is a skeleton in the science classroom.","zh":"(名) 骨骼；骨架","ez":"科學教室裡有一具骷髏。"},{"w":"spoil","p":"[spɔɪl] v.","d":"If something spoils, it turns bad or rots.","e":"We left the fruit out too long, and it spoiled.","zh":"(動) 破壞；寵壞","ez":"我們把水果放太久，它壞掉了。"},{"w":"starve","p":"[stɑːrv] v.","d":"If a person starves, they do not get enough to eat and sometimes die.","e":"During the war, many people starved.","zh":"(動) 餓死；挨餓","ez":"戰爭期間，很多人餓死了。"},{"w":"thrill","p":"[θrɪl] n.","d":"A thrill is an exciting feeling.","e":"The boys enjoy the thrill of surfing a big wave.","zh":"(名) 興奮；震顫　(動) 使興奮；使震顫","ez":"男孩們享受衝大浪的刺激感。"},{"w":"wicked","p":"[ˈwɪkɪd] adj.","d":"If something is wicked, it is very bad or evil.","e":"My boss is a very wicked man.","zh":"(形) 邪惡的；壞的","ez":"我的老闆是個非常邪惡的人。"}]},{"id":6,"name":"Unit 6","words":[{"w":"alert","p":"[əˈləːrt]","d":"To alert someone is to tell or warn them about something.","e":"The fire alarm alerted us that there was a problem.","zh":"(形) 警覺的；機敏的　(動) 警告；提醒　(名) 警報；警告","ez":"火災警報器提醒我們有問題。"},{"w":"broadcast","p":"[ˈbrɔ:dkæst] n.","d":"A broadcast is a television or radio show.","e":"We watched the broadcast of the local news on TV. ","zh":"(名) 廣播；播送　(動) 廣播；播放","ez":"我們在電視上觀看本地新聞的播報。"},{"w":"bulletin","p":"[ˈbulətin] n.","d":"A bulletin is a news report that talks about very recent and important events.","e":"There was a live bulletin reporting on the economy of the city.","zh":"(名) 公告；簡訊　(名) 期刊；通訊","ez":"有一則關於該市經濟的現場報導。"},{"w":"bump","p":"[bʌmp] n.","d":"A bump is a small raised area on a surface.","e":"The monkey got a bump on his head because he was hit by a rock.","zh":"(名) 碰撞；腫塊　(動) 碰撞；撞擊　(形) 崎嶇不平的","ez":"那隻猴子被石頭砸到，頭上腫了一個包。"},{"w":"chop","p":"[tʃɒp] v.","d":"To chop something means to cut it into pieces with a tool.","e":"Mom chopped some vegetables to put into the stew.","zh":"(動) 砍；劈　(名) 砍刀；肉排","ez":"媽媽切了一些蔬菜要放進燉菜裡。"},{"w":"closet","p":"[ˈklɒzɪt] n.","d":"A closet is a small room used to store things.","e":"Marie has many clothes inside o f her closet.","zh":"(名) 壁櫥；衣櫃　(形) 秘密的；隱藏的","ez":"瑪麗的衣櫃裡有很多衣服。"},{"w":"console","p":"[kənˈsoul] v.","d":"To console someone who is sad means to make them comforted.","e":"When my dog ran away, my dad consoled me.","zh":"(動) [kənˈsol] 安慰；撫慰　(名) [ˈkɑnˌsol] 控制台；遊戲機","ez":"我的狗跑掉時，爸爸安慰了我。"},{"w":"district","p":"[ˈdɪstrɪkt] n.","d":"A district is a small part of a city, county, state, or country.","e":"I live in a residential district of Seattle, Washington.","zh":"(名) 地區；地帶　(名) 區域；行政區","ez":"我住在華盛頓州西雅圖的一個住宅區。"},{"w":"drawer","p":"[ˈdrɔːər] n.","d":"A drawer is a small part in furniture that is used to store things.","e":"I put my clothes into the empty drawers.","zh":"(名) 抽屜；抽屜形容器","ez":"我把衣服放進空的抽屜裡。"},{"w":"endure","p":"[enˈdjuər] v.","d":"To endure something tough means to do or go through it.","e":"She had to endure her husband shouting all day long.","zh":"(動) 忍受；承受　(動) 持續；維持","ez":"她必須忍受丈夫整天大吼大叫。"},{"w":"execute","p":"[ˈeksɪkjuːt] v.","d":"To execute someone means to kill them as a legal punishment.","e":"Some people are executed for serious crimes.","zh":"(動) 執行；實施　(動) 處死；被處死","ez":"有些人因為重罪被處決。"},{"w":"grasp","p":"[græsp] v.","d":"To grasp something means to hold it.","e":"He grasped the bag o f money tightly.","zh":"(動) 抓住；握住　(動) 理解；領會　(名) 掌握；理解","ez":"他緊緊抓住那袋錢。"},{"w":"rear","p":"[rɪə:r] n.","d":"When something is in the rear of something, it is in the back.","e":"The man loaded the rear of his truck with boxes.","zh":"(動) 養育；飼養；種植","ez":"這個人把箱子裝上卡車的後車廂。"},{"w":"senator","p":"[ˈsenətər] n.","d":"A senator is someone who makes laws for a state.","e":"The young senator promised to make laws that would help the people. ","zh":"(名) 參議員","ez":"這位年輕的參議員承諾制定對人民有幫助的法律。"},{"w":"skull","p":"[skʌl] n.","d":"A skull is the hard part of your head. Your brain is inside of it.","e":"The brain is protected by the skull.","zh":"(名) 頭骨；骷髏","ez":"大腦由頭骨保護著。"},{"w":"stir","p":"[stəːr] v.","d":"To stir something means to mix it using something small, like a spoon.","e":"Mom stirred the batter until it was smooth.","zh":"(名) 騷動；攪動　(動) 攪拌；攪動；激起","ez":"媽媽攪拌麵糊直到它變得光滑。"},{"w":"tap","p":"[tæp] v.","d":"To tap something is to hit it lightly.","e":"He tapped the keys of the keyboard to write a short word.","zh":"(動) 輕拍；輕觸　(名) 水龍頭；輕拍","ez":"他輕敲鍵盤的按鍵，打出一個簡短的單字。"},{"w":"tremendous","p":"[triˈmendəs] adj.","d":"When something is tremendous, it is very large.","e":"The Earth&rsquo;s oceans are filled with a tremendous amount of water.","zh":"(形) 巨大的；驚人的","ez":"地球的海洋裡充滿了巨量的水。"},{"w":"underneath","p":"[ˈʌndərniːθ] prep.","d":"When something is underneath something else, it is below or lower than it.","e":"The roots of a tree are located underneath the ground.","zh":"(介) 在...下面　(副) 在下面；在底下","ez":"樹的根位於地底下。"},{"w":"worm","p":"[wəːrm] n.","d":"A worm is a small animal with a long, thin body.","e":"Worms are often used to help catch fish.","zh":"(名) 蟲；蠕蟲","ez":"蟲子常用來幫助釣魚。"}]},{"id":7,"name":"Unit 7","words":[{"w":"abandon","p":"[əˈbændən] v.","d":"To abandon something is to leave it forever or for a long time.","e":"The old room had been abandoned years before.","zh":"(動) 放棄；拋棄","ez":"那間舊房間多年前就被廢棄了。"},{"w":"ambitious","p":"[æmˈbɪʃəs] adj.","d":"If someone is ambitious, they want to be rich or successful.","e":"Kendra had to be ambitious to get into medical school.","zh":"(形) 有抱負的；野心勃勃的　(形) 需要付出努力的；艱難的","ez":"肯德拉必須有雄心壯志才能進入醫學院。"},{"w":"bark","p":"[bɑːrk] v.","d":"When a dog barks, it makes a short, loud noise.","e":"The dog barked loudly and frighteningly.","zh":"(名) 樹皮　(動) 吠叫；大聲喊叫","ez":"那隻狗大聲且嚇人地吠叫。"},{"w":"bay","p":"[beɪ] n.","d":"A bay is an area near the ocean where the land goes inward.","e":"The Golden Gate Bridge crosses San Francisco Bay.","zh":"(名) 海灣；灣　(動) 包圍；圍住","ez":"金門大橋橫跨舊金山灣。"},{"w":"brilliant","p":"[ˈbrɪljənt] adj.","d":"If someone is brilliant, they are very smart.","e":"My younger sister is brilliant for someone her age.","zh":"(形) 聰慧的；傑出的　(形) 耀眼的；光彩的","ez":"我妹妹以她的年紀來說非常聰明。"},{"w":"chin","p":"[tʃɪn] n.","d":"Your chin is the hard part at the bottom of your face.","e":"Luke pointed to the hair on his chin.","zh":"(名) 下巴；頦　(動) 用力抬起下巴","ez":"路克指著他下巴上的鬍子。"},{"w":"complaint","p":"[kəmˈpleɪnt] n.","d":"A complaint is something you say to tell people that you don’t like something.","e":"Mom said she didn&rsquo;t want to hear my brother&rsquo;s complaints.","zh":"(名) 抱怨；投訴　(動) 抱怨；申訴","ez":"媽媽說她不想聽我哥哥的抱怨。"},{"w":"deaf","p":"[def] adj.","d":"When someone is deaf, they cannot hear.","e":"Susan was born deaf.","zh":"(形) 聾的；耳聾的　(形) 不願聽的；漠視的","ez":"蘇珊天生耳聾。"},{"w":"enthusiastic","p":"[eneu:ziæstik] adj.","d":"To be enthusiastic about something is to be excited by or interested in it.","e":"The man was enthusiastic about his job.","zh":"(形) 熱情的；充滿熱忱的　(形) 熱心的；積極的","ez":"這個人對他的工作充滿熱情。"},{"w":"expedition","p":"[ˌekspədɪʃən] n.","d":"An expedition is a long trip, usually to a place very far away.","e":"They got into their spaceship to begin their expedition.","zh":"(名) 探險隊；遠征　(名) 探險之旅；考察活動","ez":"他們進入太空船開始探險。"},{"w":"horizon","p":"[həˈraɪzən] n.","d":"The horizon is where the sky looks like it meets the ground.","e":"The sun clipped below the horizon.","zh":"(名) 地平線；視野　(名) 前景；範圍","ez":"太陽落到地平線下方。"},{"w":"loyal","p":"[ˈlɔɪəl] adj.","d":"To be loyal to something or someone is to agree to always help them.","e":"The three friends are very loyal to each other.","zh":"(形) 忠誠的；真實的　(形) 忠心的；可靠的","ez":"這三個朋友對彼此非常忠誠。"},{"w":"mayor","p":"[meiə:r] n.","d":"The mayor is the person in charge of a city.","e":"The mayor o f my hometown is quite a powerful speaker.","zh":"(名) 市長；鎮長","ez":"我家鄉的市長是一位相當有影響力的演說家。"},{"w":"mutual","p":"[ˈmjuːtʃuəl] adj.","d":"If something is mutual, it is felt in the same way by two or more people.","e":"Robert likes Sarah. The feeling is mutual.","zh":"(形) 相互的；彼此的　(形) 共同的；雙方的","ez":"羅伯特喜歡莎拉，這種感覺是相互的。"},{"w":"overweight","p":"[ouvərweit] adj.","d":"If someone is overweight, they are very fat.","e":"Roger eats too much, so now he&rsquo;s overweight.","zh":"(形) 過重的；超重的","ez":"羅傑吃太多，所以他現在過重了。"},{"w":"refuge","p":"[ˈrefjuːdʒ] n.","d":"A refuge is a place where you go to be safe.","e":"When it started to rain, she found refuge in the house.","zh":"(名) 避難所；庇護","ez":"開始下雨時，她在房子裡避難。"},{"w":"restore","p":"[rɪsˈtɔːr] v.","d":"To restore something is to put it back the way it was.","e":"Victor restored the old car.","zh":"(動) 恢復；修復","ez":"維克多修復了那輛舊車。"},{"w":"rub","p":"[rʌb] v.","d":"To rub something is to push on it and move your hand back and forth.","e":"Mom&rsquo;s feet were sore, so she rubbed them.","zh":"(動) 摩擦；擦","ez":"媽媽的腳很痠，所以她揉了揉它們。"},{"w":"senses","p":"[sensiz] n.","d":"Your senses are how you see, taste, hear, feel and smell.","e":"It would be hard to live without your five senses.","zh":"官能；感覺；知覺；聽覺；嗅覺；整體感覺；領悟；理解；輕鬆快樂的天性；幽默感；隆重的氣氛；節慶的氣氛；理智；明智；理智；良好的判斷能力；含意；意義；從任何意義上看；從某種意義上講；根本不；絕對不；意識到；感覺到","ez":"沒有五種感官會很難生活。"},{"w":"veterinarian","p":"[ˌvetərənɛərɪən] n.","d":"A veterinarian is a doctor that takes care of animals.","e":"Wanda became a veterinarian because she loves dogs.","zh":"(名) 獸醫","ez":"旺達成為獸醫，因為她愛狗。"}]},{"id":8,"name":"Unit 8","words":[{"w":"anniversary","p":"[ˌænəˈvəːrsərɪ] n.","d":"An anniversary is a day that celebrates something from the past.","e":"My parents went out to eat for their wedding anniversary.","zh":"(名) 週年紀念；周年紀念日","ez":"我父母出門吃飯慶祝他們的結婚紀念日。"},{"w":"arithmetic","p":"[əˈrɪθmətɪk] n.","d":"Arithmetic is math.","e":"I like to study arithmetic at school.","zh":"(名) 算術；四則運算　(形) 算術的；數字的","ez":"我喜歡在學校學算術。"},{"w":"ashamed","p":"[əˈʃeɪmd] adj.","d":"To be ashamed is to feel upset because you did something wrong or bad.","e":"He was ashamed when he found out that I knew about his past.","zh":"(形) 羞愧的；感到慚愧的　(形) 尷尬的；害臊的","ez":"當他發現我知道他的過去時，他感到很羞愧。"},{"w":"burst","p":"[bəːrst] v.","d":"To burst is to suddenly break open or apart.","e":"The bomb burst over the city.","zh":"(動) 突然破裂；爆炸　(名) 突然的爆發；一陣","ez":"炸彈在城市上空爆炸。"},{"w":"carpenter","p":"[ˈkɑːrpəntər] n.","d":"A carpenter is a person who builds things with wood.","e":"We hired a carpenter to make a cupboard.","zh":"(名) 木匠；木工","ez":"我們雇了一個木匠做一個櫥櫃。"},{"w":"coal","p":"[koul] n.","d":"Coal is a hard black rock that you burn for heat.","e":"Many power stations burn coal to produce energy.","zh":"(名) 煤炭；煤　(名) 餘燼；木炭","ez":"許多發電廠燃燒煤炭來產生能源。"},{"w":"couch","p":"[kaʊtʃ] n.","d":"A couch is a long, soft seat that many people can sit on.","e":"Kim and M artin&rsquo;s new couch was very expensive.","zh":"(名) 沙發；長椅　(動) 用言語表達；蹲伏","ez":"金和馬丁的新沙發非常昂貴。"},{"w":"drip","p":"[drɪp] v.","d":"When a liquid drips, just a little bit falls at a time.","e":"I heard water dripping from the faucet.","zh":"(名) 滴；點滴　(動) 滴下；點滴流出","ez":"我聽到水從水龍頭滴下來。"},{"w":"elegant","p":"[ˈelɪgənt] adj.","d":"If something is elegant, it is very fancy and pleasing.","e":"In Japan, women wear elegant kimonos on special occasions.","zh":"(形) 優雅的；高雅的　(形) 精緻的；簡潔的","ez":"在日本，女性在特殊場合會穿優雅的和服。"},{"w":"fabric","p":"[ˈfæbrɪk] n.","d":"Fabric is cloth used to make clothes, furniture, etc.","e":"The towels were made from a soft fabric.","zh":"(名) 布料；織物　(名) 結構；構成","ez":"這些毛巾是用柔軟的布料製成的。"},{"w":"highlands","p":"[ˈhaɪlənd] n.","d":"The highlands are high areas of land, usually with mountains.","e":"The man had a small home in the highlands.","zh":"高地；高原；山區；高地；蘇格蘭；高地的","ez":"那個男人在高地有一間小房子。"},{"w":"ivory","p":"[ˈaɪvərɪ] n.","d":"Ivory is a white, hard substance that comes from elephants.","e":"The elephant&rsquo;s long ivory tusks looked very impressive.","zh":"(名) 象牙；象牙色　(形) 象牙製的；象牙色的","ez":"大象的長象牙看起來非常壯觀。"},{"w":"mill","p":"[mil] n.","d":"A mill is a building where flour is made.","e":"The farmer took his wheat to the mill to make it into flour.","zh":"(名) 磨坊；工廠　(動) 磨；碾碎","ez":"農夫把小麥帶到磨坊磨成麵粉。"},{"w":"needle","p":"[ˈniːdl] n.","d":"A needle is a small, sharp piece of metal that you use to make or fix clothes.","e":"I used a needle to fix the hole in my pants.","zh":"(名) 針；針頭　(動) 用針刺；慢慢推進","ez":"我用針線縫補褲子上的破洞。"},{"w":"polish","p":"[ˈpɒlɪʃ] v.","d":"To polish something is to rub it in order to make it shiny.","e":"Mark spent all morning polishing his shoes for the wedding.","zh":"(名) 亮光劑；擦亮　(動) 擦亮；磨光　(形) 波蘭的","ez":"馬克花了一整個早上為婚禮擦亮鞋子。"},{"w":"sew","p":"[sou] v.","d":"To sew means to put pieces of cloth together using string.","e":"I learned to sew when I was a little girl.","zh":"(動) 縫；縫製","ez":"我小時候學會了縫紉。"},{"w":"shed","p":"[ʃed] n.","d":"A shed is a small building where you store things like tools.","e":"We have a small shed in the backyard for storage.","zh":"(名) 棚子；小屋　(動) 脫落；流出","ez":"我們後院有一個小儲物棚。"},{"w":"thread","p":"[θred] n.","d":"A thread is a thin piece of string.","e":"I have many different colors of thread at home.","zh":"(名) 線；細絲　(動) 穿線；穿過","ez":"我家裡有許多不同顏色的線。"},{"w":"trim","p":"[trim] v.","d":"To trim something is to cut it a little bit.","e":"I had my hair trimmed this afternoon.","zh":"(動) 修剪；削減","ez":"我今天下午去修剪了頭髮。"},{"w":"upwards","p":"[ˈʌpwərdz] adv.","d":"If something goes upwards, it moves vertically higher.","e":"The kite went upwards further and further.","zh":"(副) 向上地；上升地","ez":"風箏越飛越高。"}]},{"id":9,"name":"Unit 9","words":[{"w":"ail","p":"[eɪl] v.","d":"To ail a person or group is to cause difficulty or pain.","e":"My brother went to the doctor to see what was ailing him.","zh":"困擾；使苦惱；使處境困難；使；生病；使；不適","ez":"我哥哥去看醫生，想知道他哪裡不舒服。"},{"w":"ally","p":"[ˈælaɪ] n.","d":"An ally is someone who agrees to help or support you.","e":"I was happy to find many allies who shared the same opinion as me.","zh":"(名) [ˈælaɪ] 盟友；同盟國　(動) [əˈlaɪ] 與…結盟；聯合","ez":"我很高興找到許多和我意見相同的盟友。"},{"w":"boast","p":"[boust] v.","d":"To boast is to talk about how good you are.","e":"We all became tired o f listening to him boast about him self all day.","zh":"(動) 吹牛；自誇　(名) 吹牛的話；自誇","ez":"我們都聽膩了他整天自吹自擂。"},{"w":"bounce","p":"[bauns] v.","d":"To bounce is to move something up and away from a surface after hitting it.","e":"Owen bounced the ball on the ground.","zh":"(動) 反彈；彈回　(名) 反彈；彈力","ez":"歐文把球往地上拍。"},{"w":"bully","p":"[ˈbulɪ] n.","d":"A bully is a person who is mean to others.","e":"The two bullies always picked on the smaller, weaker kids.","zh":"(動) 欺凌；霸凌　(名) 霸凌者；惡棍","ez":"那兩個惡霸總是欺負比較瘦小的孩子。"},{"w":"carbohydrate","p":"[ˈkɑːrbouˈhaɪdreɪt] n.","d":"Carbohydrates are substances in foods like bread that give you energy.","e":"Carbohydrates like rice are a good source o f energy for active people.","zh":"(名) 碳水化合物；醣類","ez":"像米飯這類的碳水化合物是活動量大的人很好的能量來源。"},{"w":"crawl","p":"[krɔːl] v.","d":"To crawl is to move slowly on your hands and knees.","e":"The baby crawled across the floor.","zh":"(動) 爬行；緩慢移動　(名) 爬行；緩慢速度","ez":"嬰兒在地板上爬行。"},{"w":"defeat","p":"[dɪˈfiːt] v.","d":"To defeat someone is to beat them in a game or battle.","e":"The champion defeated the challenger in the boxing match.","zh":"(動) 擊敗；戰勝　(名) 失敗；敗北","ez":"冠軍在拳擊賽中擊敗了挑戰者。"},{"w":"dial","p":"[ˈdaɪəl] n.","d":"A dial is the front of a clock.","e":"I looked at the dial to see what time it was.","zh":"(動) 撥打；轉動　(名) 錶盤；刻度盤","ez":"我看了看錶盤，想知道現在幾點。"},{"w":"dominant","p":"[ˈdɒmənənt] adj.","d":"When someone or something is dominant, they are stronger than others.","e":"The gorilla is one o f the dominant animals in the jungle.","zh":"(形) 佔優勢的；主要的　(形) 支配的；統治的","ez":"大猩猩是叢林中占主導地位的動物之一。"},{"w":"mercy","p":"[ˈməːrsi] n.","d":"If you show mercy, you choose not to punish or harm someone.","e":"He asked his boss for mercy and to not fire him.","zh":"(名) 憐憫；慈悲　(名) 寬恕；饒恕","ez":"他向老闆求情，希望不要開除他。"},{"w":"nod","p":"[nɒd] v.","d":"To nod is to move your head up and down.","e":"I nodded my head as I listened to the song.","zh":"(動) 點頭；表示同意　(名) 點頭的動作","ez":"我邊聽歌邊點頭。"},{"w":"opponent","p":"[əˈpounənt] n.","d":"An opponent is someone who fights against you.","e":"On the field, our opponents were too good for us.","zh":"(名) 對手；敵手　(名) 反對者；反對派","ez":"在球場上，對手比我們強太多了。"},{"w":"quarrel","p":"[ˈkwɔ:rəl] v.","d":"To quarrel is to argue or fight.","e":"Billy quarreled with his wife about buying a new house.","zh":"(動) 爭吵；吵架","ez":"比利為了買新房子的事和太太吵架。"},{"w":"rival","p":"[ˈraɪvəl] n.","d":"A rival is someone that is trying to keep you from getting what you want.","e":"The three rivals were all competing for the same job.","zh":"(名) 競爭者；對手　(動) 與…匹敵；競爭","ez":"三個競爭對手都在爭取同一個工作。"},{"w":"sore","p":"[sɔːr] adj.","d":"When a part of your body is sore, it hurts.","e":"After lifting the heavy box, Mona&rsquo;s back was sore.","zh":"(形) 疼痛的；痠痛的","ez":"搬完那個重箱子後，莫娜的背很痠痛。"},{"w":"sting","p":"[stɪŋ] v.","d":"To sting is to cause pain by pushing a sharp part into the skin.","e":"The needle stung my arm and made me say, &ldquo; Ouch!&rdquo;","zh":"(動) 刺；螫　(名) 刺；刺痛","ez":"針刺到我的手臂，讓我喊了一聲：「唉呦！」"},{"w":"strain","p":"[streɪn] v.","d":"To strain is to try very hard.","e":"Casey strained to lift the heavy box.","zh":"(名) 壓力；負擔　(動) 拉緊；使疲勞","ez":"凱西費力地搬起那個重箱子。"},{"w":"torture","p":"[ˈtɔːrtʃə:r] n.","d":"Torture is something that causes you physical or mental pain.","e":"Greg thought that writing the essay was torture.","zh":"(名) 折磨；拷問　(動) 折磨；拷打","ez":"葛瑞格覺得寫那篇作文簡直是折磨。"},{"w":"wrestle","p":"[ˈresəl] v.","d":"To wrestle is to play a game where you try to push someone to the floor.","e":"My dad loved to wrestle when he was in high school.","zh":"(動) 奮力掙扎；摔角","ez":"我爸爸高中時很喜歡摔角。"}]},{"id":10,"name":"Unit 10","words":[{"w":"absence","p":"[ˈæbsəns] n.","d":"Absence is the state of something being away.","e":"There is an absence of sand in the hourglass.","zh":"(名) 缺席；不在","ez":"沙漏裡沒有沙子了。"},{"w":"aloud","p":"[əˈlaud] adv.","d":"If you say something aloud, you say it so that others can hear you.","e":"My father often reads stories aloud to me and my sister.","zh":"(副) 大聲地；出聲地　(形) 大聲的；出聲的","ez":"我爸爸常常大聲唸故事給我和妹妹聽。"},{"w":"bald","p":"[bɔːld] adj.","d":"If someone is bald, they have no hair.","e":"My oldest brother is bald.","zh":"(形) 禿頭的；光禿的","ez":"我的大哥是禿頭。"},{"w":"blanket","p":"[ˈblæŋkɪt] n.","d":"A blanket is a piece of cloth that you use to keep warm or to sit upon.","e":"I laid a blanket on the ground so that we could have a picnic.","zh":"(名) 毛毯；毛巾　(動) 覆蓋；包裹　(形) 全面的；籠統的","ez":"我在地上鋪了一條毯子，這樣我們就可以野餐了。"},{"w":"creep","p":"[kriːp] v.","d":"To creep is to move quietly and slowly.","e":"The cat slowly crept down the tree.","zh":"(動) 爬行；緩慢移動　(名) 令人不快的人","ez":"貓咪慢慢地從樹上爬下來。"},{"w":"divorce","p":"[dɪˈvɔːrs] n.","d":"Divorce is an event in which a marriage is ended.","e":"Divorce rates have increased in the past twenty years.","zh":"(名) 離婚；婚姻解除　(動) 與...離婚；分離","ez":"過去二十年來離婚率上升了。"},{"w":"imitate","p":"[ˈɪmɪteɪt] v.","d":"To imitate someone is to do exactly what they do.","e":"He imitated his favorite superhero by putting on a costume.","zh":"(動) 模仿；仿造　(動) 假裝；模仿他人","ez":"他穿上戲服模仿他最喜歡的超級英雄。"},{"w":"infant","p":"[ˈɪnfənt] n.","d":"An infant is a baby.","e":"The infant cried all night.","zh":"(名) 嬰兒；幼兒　(形) 嬰幼的；初期的","ez":"嬰兒哭了一整夜。"},{"w":"kidnap","p":"[ˈkɪdnæp] v.","d":"To kidnap someone is to take them illegally.","e":"She was terrified to find out her son was kidnapped.","zh":"(動) 綁架；誘拐　(名) 綁架案；誘拐事件","ez":"她發現兒子被綁架後嚇壞了。"},{"w":"nap","p":"[næp] n.","d":"A nap is a short sleep, usually during the day.","e":"I took a short nap because I stayed up late last night.","zh":"(名) 小睡；打盹　(動) 打盹；小睡","ez":"因為昨晚熬夜，我小睡了一下。"},{"w":"nowhere","p":"[ˈnouhwɛə:r] adv.","d":"You use nowhere to say that a place or thing does not exist.","e":"Unfortunately, water was nowhere to be found.","zh":"(副) 任何地方都沒有；無處　(名) 偏遠的地方；荒涼之地","ez":"不幸的是，到處都找不到水。"},{"w":"pat","p":"[pæt] v.","d":"To pat something is to hit it softly with your hand.","e":"I patted some lotion onto my face.","zh":"(名) 輕拍　(動) 輕拍；拍打","ez":"我在臉上拍了一些乳液。"},{"w":"relief","p":"[rɪˈliːf] n.","d":"Relief is a feeling you get when something bad or challenging ends.","e":"I felt a sense of relief when I heard the good news.","zh":"(名) 減輕；解脫","ez":"聽到好消息時，我感到一陣解脫。"},{"w":"reproduce","p":"[riːprəˈdjuːs] v.","d":"To reproduce is to make something exactly how someone else did it.","e":"The children tried to reproduce their house using toy blocks.","zh":"(動) 複製；繁殖","ez":"孩子們試著用積木重現他們家的樣子。"},{"w":"rhyme","p":"[raɪm] n.","d":"To rhyme is to have the same sounds at the end of a word.","e":"Humpty Dumpty is an old rhyme that children learn in school.","zh":"(動) 押韻　(名) 韻；押韻詞","ez":"「蛋頭先生」是孩子在學校學的一首古老童謠。"},{"w":"suck","p":"[sʌk] v.","d":"To suck is to put something in your mouth and try to get flavor out of it.","e":"The baby sucked milk from her bottle.","zh":"(動) 吸；吮　(形) 糟糕的；令人不快的","ez":"嬰兒吸著奶瓶裡的奶。"},{"w":"urgent","p":"[ˈəːrdʒənt] adj.","d":"If something is urgent, it is important and needs to be done now.","e":"He had to leave now; it was urgent.","zh":"(形) 緊急的；迫切的","ez":"他現在必須離開；事情很緊急。"},{"w":"vanish","p":"[ˈvænɪʃ] v.","d":"To vanish is to go away suddenly.","e":"All the passengers vanished from the train station.","zh":"(動) 消失；消散","ez":"所有乘客都從火車站消失了。"},{"w":"wagon","p":"[ˈwæɡən] n.","d":"A wagon is a cart you use to carry heavy things.","e":"He used his wagon to carry some of his gifts.","zh":"(名) 馬車；貨車","ez":"他用他的推車搬運一些禮物。"},{"w":"wrinkle","p":"[ˈrɪŋkəl] n.","d":"A wrinkle is a line on a person’s face that happens as they get old.","e":"My grandfather has some wrinkles on his face.","zh":"(動) 起皺；使起皺　(名) 皺紋","ez":"我爺爺的臉上有些皺紋。"}]},{"id":11,"name":"Unit 11","words":[{"w":"abnormal","p":"[æbˈnɔ:rməl] adj.","d":"If something is abnormal, it is strange or not normal.","e":"Her idea of art is a bit too abnormal for me.","zh":"(形) 異常的；不正常的","ez":"她對藝術的看法對我來說有點太不正常了。"},{"w":"bamboo","p":"[bæmˈbu:] n.","d":"Bamboo is a hard plant with thin branches and leaves.","e":"Outside his home, there is a lot of bamboo.","zh":"(名) 竹子；竹　(名) 竹製品","ez":"他家外面有很多竹子。"},{"w":"blossom","p":"[ˈblɑsəm] n.","d":"A blossom is a flower or group of flowers.","e":"There were colorful blossoms in the yard.","zh":"(名) 花；花朵　(動) 開花；繁榮","ez":"院子裡有五彩繽紛的花朵。"},{"w":"compass","p":"[ˈkʌmpəs] n.","d":"A compass is a device used to tell what direction one is going.","e":"A compass is an important tool to have when you are traveling.","zh":"(名) 指南針；羅盤　(名) 圓規；範圍","ez":"指南針是旅行時的重要工具。"},{"w":"dialect","p":"[ˈdaɪəlekt] n.","d":"A dialect is a regional variety of language showing where you are from.","e":"People from the U.K. have a different dialect of English from those in the U.K.","zh":"(名) 方言；地方語言　(名) 某一群體的語言變體","ez":"英國人和美國人說的英語方言不同。"},{"w":"dishonest","p":"[dɪsˈɒnɪst] adj.","d":"If someone is dishonest, they do not tell the truth.","e":"She was being dishonest when she copied the answers from his test.","zh":"(形) 不誠實的；欺騙的　(名) 不誠實的人；騙子","ez":"她抄襲他的考試答案時很不誠實。"},{"w":"dwarf","p":"[dwɔːrf] n.","d":"A dwarf is a creature from stories that often looks like a short, hairy man.","e":"The dwarf had a pleasant look on his face.","zh":"(名) 侏儒；矮子　(動) 使顯得矮小；阻礙成長　(形) 矮小的；發育不全的","ez":"那個矮人臉上帶著愉快的表情。"},{"w":"ecosystem","p":"[i:kousɪstəm] n.","d":"An ecosystem is a group of plants and animals in an area.","e":"The river&rsquo;s ecosystem not only includes fish but other insects and plants too.","zh":"(名) 生態系統；生態系","ez":"河流的生態系統不僅包括魚類，還有其他昆蟲和植物。"},{"w":"fatal","p":"[ˈfeɪtl] adj.","d":"If something is fatal, it causes death.","e":"They passed away in a fatal car crash.","zh":"(形) 致命的；導致死亡的　(形) 致命性的；毀滅性的","ez":"他們在一場致命車禍中去世了。"},{"w":"impatient","p":"[ɪmˈpeɪʃənt] adj.","d":"If someone is impatient, they are not able to wait for things.","e":"Bob was so impatient that he could barely wait for the light to turn green.","zh":"(形) 急躁的；沒耐心的　(形) 渴望的；急切的","ez":"鮑勃很不耐煩，幾乎等不及綠燈亮起。"},{"w":"leaf","p":"[li:f] n.","d":"A leaf is the flat green thing on trees or bushes.","e":"In the fall, the leaves on the trees change colors.","zh":"(名) 葉子；樹葉　(動) 翻頁；離開","ez":"秋天時，樹上的葉子會變色。"},{"w":"manuscript","p":"[ˈmӕnjəskript] n.","d":"A manuscript is an old book or paper written by hand.","e":"The manuscript was written over 150 years ago.","zh":"(名) 手稿；原稿　(名) 手寫文件；手寫本","ez":"這份手稿是150多年前寫成的。"},{"w":"marsh","p":"[mɑːrʃ] n.","d":"A marsh is a type of wet land covered with grasses and short plants.","e":"The marsh looked so lovely against the mountains.","zh":"(名) 沼澤；濕地　(動) 行進；邁進","ez":"那片沼澤在山的襯托下顯得很美。"},{"w":"patience","p":"[ˈpeɪʃəns] n.","d":"Patience is the ability to wait for something without becoming upset.","e":"Sue&rsquo;s patience was rewarded by catching her very first fish.","zh":"(名) 耐心；忍耐","ez":"蘇的耐心得到了回報，她釣到了第一條魚。"},{"w":"perfume","p":"[pəˈ:rfjuːm] n.","d":"Perfume is a good-smelling liquid that girls wear.","e":"When she wore her perfume, everyone said she smelled great.","zh":"(名) 香水","ez":"她噴了香水後，每個人都說她聞起來很香。"},{"w":"pond","p":"[pɒnd] n.","d":"A pond is a very small area of water.","e":"The ducks swam in the pond.","zh":"(名) 池塘","ez":"鴨子在池塘裡游泳。"},{"w":"proverb","p":"[ˈprɒvəːrb] n.","d":"A proverb is a short saying that tells you something important.","e":"The proverb &ldquo;egg on your face&rdquo; means you&rsquo;ve done something embarrassing.","zh":"(名) 諺語；格言","ez":"諺語「egg on your face」意思是做了尷尬的事。"},{"w":"pursuit","p":"[pərsuːt] n.","d":"A pursuit is a chase.","e":"The dinosaur was in pursuit of the caveman.","zh":"(名) 追求；追尋","ez":"恐龍正在追趕穴居人。"},{"w":"recite","p":"[rɪˈsaɪt] v.","d":"To recite something means to repeat or say aloud in front of a group.","e":"Katie recited the Pledge of Allegiance in class.","zh":"(動) 背誦；朗誦","ez":"凱蒂在課堂上背誦了效忠誓詞。"},{"w":"wilderness","p":"[ˈwɪldə:rnɪs] n.","d":"A wilderness is an area where no people live.","e":"If you are not careful, you can get lost in the wilderness.","zh":"(名) 荒野；荒蕪之地","ez":"如果不小心，你會在荒野中迷路。"}]},{"id":12,"name":"Unit 12","words":[{"w":"anticipate","p":"[ӕnˈtisəpeit] v.","d":"To anticipate something is to think that it will happen.","e":"Carrie anticipated the arrival of her baby.","zh":"(動) 預期；期待　(動) 先於...之前做；預先準備","ez":"凱莉期待著她的寶寶出生。"},{"w":"barrel","p":"[ˈbærəl] n.","d":"A barrel is a round thing that you can keep liquids in.","e":"There was an empty barrel outside the house.","zh":"(名) 桶；木桶　(名) 槍管；砲管","ez":"房子外面有一個空桶。"},{"w":"beam","p":"[biːm] n.","d":"A beam is a heavy bar.","e":"Modern skyscrapers are made with several beams.","zh":"(名) 光線；光束　(動) 發光；照射　(名) 梁；橫樑","ez":"現代摩天大樓使用多根鋼樑建造。"},{"w":"casual","p":"[ˈkæʒjuəl] adj.","d":"If something is casual, it is relaxed or simple.","e":"You can wear casual clothes to the party like jeans.","zh":"(形) 隨意的；不正式的　(形) 偶然的；無計畫的","ez":"你可以穿休閒服去派對，比如牛仔褲。"},{"w":"caution","p":"[ˈkɔːʃən] n.","d":"Caution is care and attention in order to avoid danger.","e":"Please use the power saw with caution. It is very dangerous.","zh":"(名) 小心；謹慎　(動) 警告；勸阻","ez":"請小心使用電鋸，它非常危險。"},{"w":"contrary","p":"[ˈkɒntrərɪ] adj.","d":"If something is contrary to something else, it is the opposite.","e":"It isn&rsquo;t warm outside at all. On the contrary, it is quite cold.","zh":"(形) 相反的；相對的　(副) 相反地；恰恰相反","ez":"外面一點也不暖和，相反，還很冷。"},{"w":"deliberate","p":"[dɪˈlɪbərɪt] adj.","d":"If you are deliberate, you do something on purpose.","e":"Bernie made a deliberate attempt to injure Andy.","zh":"(動) 仔細考慮；深思熟慮　(形) 故意的；蓄意的；深思熟慮的","ez":"伯尼故意試圖傷害安迪。"},{"w":"dissolve","p":"[dɪˈzɒlv] v.","d":"To dissolve something is to mix it into a liquid and disappear.","e":"I dissolved the pill in a glass o f water.","zh":"(動) 溶解；分解　(動) 結束；解散","ez":"我把藥片溶解在一杯水裡。"},{"w":"explode","p":"[ɪksˈploud] v.","d":"When something explodes, it blows up.","e":"My new radio exploded when I plugged it in.","zh":"(動) 爆炸；爆發　(名) 爆炸","ez":"我的新收音機插上電後爆炸了。"},{"w":"fasten","p":"[ˈfæsn] v.","d":"To fasten something is to close it or put it in the correct place.","e":"Elizabeth fastened her seat belt.","zh":"(動) 扣牢；繫緊　(動) 固定；栓住","ez":"伊莉莎白繫好了安全帶。"},{"w":"germ","p":"[dʒəːrm] n.","d":"A germ is something that makes you sick.","e":"Germs are on everything that you touch.","zh":"(名) 細菌；病菌　(名) 萌芽；種子","ez":"你碰到的每樣東西上都有細菌。"},{"w":"kit","p":"[kit] n.","d":"A kit is a set of all the things needed to do something.","e":"Is there a first aid kit in your office?","zh":"(名) 工具包；套裝　(名) 裝備；全套用品","ez":"你的辦公室裡有急救箱嗎？"},{"w":"puff","p":"[pʌf] n.","d":"A puff is a little bit of smoke or steam.","e":"A puff of smoke came from the burnt match.","zh":"(動) 吹氣；噴出　(名) 一陣（風、煙等）","ez":"燒過的火柴冒出一縷煙。"},{"w":"rag","p":"[ræg] n.","d":"A rag is a small towel.","e":"Please use a rag to clean the dust o ff the table.","zh":"(名) 破布；抹布","ez":"請用抹布擦掉桌子上的灰塵。"},{"w":"scatter","p":"[ˈskætə:r] v.","d":"To scatter something is to make it go in many places.","e":"I accidentally scattered all of my pills.","zh":"(動) 使分散；散開","ez":"我不小心把所有的藥片都弄散了。"},{"w":"scent","p":"[sent] n.","d":"A scent is a smell.","e":"Julie enjoyed the scent of the flowers.","zh":"(名) 氣味；香氣　(動) 嗅；聞到","ez":"茱莉喜歡花的香味。"},{"w":"steel","p":"[sti:l] n.","d":"Steel is a shiny gray metal.","e":"The new apartment building was made with steel.","zh":"(名) 鋼鐵；鋼","ez":"新的公寓大樓是用鋼材建造的。"},{"w":"swift","p":"[swift] adj.","d":"If something is swift, it is fast.","e":"The swift horse easily jumped over the hurdle.","zh":"(形) 迅速的；敏捷的","ez":"那匹快馬輕鬆跳過了障礙。"},{"w":"toss","p":"[tɔ:s] v.","d":"If you toss something, you throw it softly.","e":"He tossed a coin into the air.","zh":"(動) 扔；拋；擲","ez":"他把一枚硬幣拋向空中。"},{"w":"triumph","p":"[ˈtraɪəmf] n.","d":"Triumph is what you feel when you win or finish something.","e":"He raised the award in triumph at the end of his speech.","zh":"(名) 勝利；成功　(動) 獲勝；成功","ez":"他在演講結束時得意地舉起了獎項。"}]},{"id":13,"name":"Unit 13","words":[{"w":"aboard","p":"[əˈbɔːrd] prep.","d":"When someone is aboard a ship or plane, they are on or in it.","e":"They climbed aboard the kayak and paddled through the river.","zh":"(副) 在船（車、飛機）上　(介) 上（船、車、飛機）","ez":"他們爬上獨木舟，划過河流。"},{"w":"bitter","p":"[ˈbɪtər] adj.","d":"When a person is bitter, they are upset with someone or a situation.","e":"He was extremely bitter when his computer crashed.","zh":"(形) 苦的；痛苦的　(副) 極其；非常","ez":"他的電腦當機時，他非常沮喪。"},{"w":"bullet","p":"[ˈbulit] n.","d":"A bullet is a small metal object that is shot out of guns.","e":"Bullets come in different sizes for different guns.","zh":"(名) 子彈；槍彈　(名) 要點；項目符號","ez":"子彈有不同尺寸，適用於不同的槍枝。"},{"w":"devil","p":"[ˈdevl] n.","d":"The devil is a powerful evil spirit in some religions.","e":"The church promised protection from the devil.","zh":"(名) 魔鬼；惡魔　(名) 壞人；調皮鬼","ez":"教會承諾保護人們免受魔鬼的侵害。"},{"w":"drift","p":"[drɪft] v.","d":"To drift means to be moved slowly by wind or water.","e":"The large chunk of ice drifted in the water.","zh":"(動) 漂流；漂移　(名) 漂流；偏移","ez":"那塊大冰塊在水中漂流。"},{"w":"enforce","p":"[enˈfɔːrs] v.","d":"To enforce means to make a person follow a rule.","e":"Police enforce traffic laws to keep everyone safe.","zh":"(動) 執行；實施　(動) 強制；強迫","ez":"警察執行交通法規以確保大家安全。"},{"w":"fountain","p":"[ˈfauntɪn] n.","d":"A fountain is a source of water made by people.","e":"There was a beautiful fountain in the middle of the park.","zh":"(名) 噴泉；水池","ez":"公園中央有一座美麗的噴泉。"},{"w":"harbor","p":"[ˈhaːrbər] n.","d":"A harbor is an area of water along a shore where boats land.","e":"There were a few small boats in the harbor.","zh":"(名) 港灣；海港　(動) 懷有；庇護","ez":"港口裡有幾艘小船。"},{"w":"inhabit","p":"[ɪnˈhæbɪt] v.","d":"To inhabit means to live in a certain place.","e":"No one inhabits the ancient city.","zh":"(動) 居住；棲息　(動) 占據；存在於","ez":"這座古城無人居住。"},{"w":"march","p":"[mɑːrtʃ] v.","d":"To march means to walk at a steady pace together with others.","e":"The soldiers marched in straight rows.","zh":"(名) 三月；行進　(動) 行走；遊行","ez":"士兵們排成整齊的隊伍行進。"},{"w":"millionaire","p":"[mɪljənɛər] n.","d":"A millionaire is a person who has at least a million dollars.","e":"He became a millionaire because he was smart with his money.","zh":"(名) 百萬富翁；百萬富豪","ez":"他因為理財有方而成為百萬富翁。"},{"w":"port","p":"[pɔːrt] n.","d":"A port is a place where ships stop to load and unload things.","e":"The ship was being loaded with materials at the port.","zh":"(名) 港口","ez":"船隻正在港口裝載物資。"},{"w":"sheriff","p":"[ˈʃerɪf] n.","d":"A sheriff is a police officer who is in charge of a large area.","e":"It was the sheriff&rsquo;s job to make the city safe.","zh":"(名) 警長；郡治安官","ez":"確保城市安全是警長的工作。"},{"w":"startle","p":"[ˈstɑːrtl] v.","d":"To startle means to scare someone suddenly.","e":"The loud crash startled the sleeping woman.","zh":"(動) 使驚嚇；使嚇一跳","ez":"巨大的撞擊聲驚醒了睡夢中的女人。"},{"w":"sweat","p":"[swet] v.","d":"To sweat means to lose liquid from the body through the skin.","e":"Whenever I workout, I sweat quite a bit.","zh":"(動) 流汗；(名) 汗水","ez":"每次運動我都會流不少汗。"},{"w":"trigger","p":"[ˈtrɪgə:r] n.","d":"A trigger is the part of the gun that a person pulls to make it fire.","e":"The man had his finger on the trigger of the gun.","zh":"(動) 觸發；引發　(名) 扳機；觸發因素","ez":"那名男子的手指放在槍的扳機上。"},{"w":"unify","p":"[ˈjuːnəfaɪ] v.","d":"To unify means to bring people or things together.","e":"With their good deeds, the children tried to unify the world.","zh":"(動) 統一；統合","ez":"孩子們用善行試圖團結這個世界。"},{"w":"vessel","p":"[ˈvesəl] n.","d":"A vessel is a large ship or boat.","e":"We toured the area aboard a luxury vessel.","zh":"(名) 船；容器","ez":"我們搭乘豪華船隻遊覽了該地區。"},{"w":"voyage","p":"[ˈvɔidʒ] n.","d":"A voyage is a long journey made on a boat or an aircraft.","e":"The astronauts took off on a long voyage to the moon.","zh":"(名) 航行；旅行","ez":"太空人展開了前往月球的漫長旅程。"},{"w":"worship","p":"[ˈwəːrʃip] v.","d":"To worship means to like and honor a person, thing, or religious figure.","e":"Many people around the world worship in a church.","zh":"(動) 崇拜；敬仰　(名) 崇拜；禮拜","ez":"世界各地許多人在教堂裡禮拜。"}]},{"id":14,"name":"Unit 14","words":[{"w":"apprentice","p":"[əˈprentɪs] n.","d":"An apprentice is a person who learns how to do a job from a skilled person.","e":"Mark is an apprentice chef at the restaurant.","zh":"(名) 學徒；實習生　(動) 使當學徒；訓練","ez":"馬克是這家餐廳的學徒廚師。"},{"w":"assure","p":"[əˈʃuər] v.","d":"To assure someone is to tell them something is true to make them less worried.","e":"He assured the boss that the building would be done on time.","zh":"(動) 保證；確保　(動) 使確信；讓放心","ez":"他向老闆保證建築物會按時完工。"},{"w":"bandage","p":"[ˈbændɪdʒ] n.","d":"A bandage is a piece of cloth used to stop bleeding.","e":"If you cut yourself, please get a bandage from the first-aid kit.","zh":"(名) 繃帶；藥布　(動) 用繃帶包紮；包紮傷口","ez":"如果你割傷自己，請從急救箱拿繃帶。"},{"w":"bleed","p":"[bliːd] v.","d":"To bleed is to lose blood.","e":"If you are not careful, you will cut your finger and bleed.","zh":"(動) 流血；出血　(動) 滲出；洩漏","ez":"如果不小心，你會割傷手指並流血。"},{"w":"bond","p":"[bɔnd] v.","d":"To bond with someone is to become friends with them.","e":"The women bonded after several hours of conversation.","zh":"(名) 紐帶；連結　(動) 粘合；結合","ez":"這幾位女性在聊了幾小時後建立了情誼。"},{"w":"chef","p":"[ʃef] n.","d":"A chef is a person who cooks in a restaurant.","e":"Tom is a chef at the restaurant near my house.","zh":"(名) 主廚；廚師","ez":"湯姆是我家附近那間餐廳的廚師。"},{"w":"crown","p":"[kraun] n.","d":"A crown is the hat worn by a king or queen.","e":"The crown is made of gold.","zh":"(名) 皇冠；王冠　(動) 為…加冕；居首","ez":"這頂王冠是金子做的。"},{"w":"departure","p":"[dɪˈpɑːrtʃər] n.","d":"A departure is the act of leaving a place.","e":"They were excited about their departure back home.","zh":"(名) 出發；離開　(名) 偏離；出發時間","ez":"他們對於即將啟程回家感到興奮。"},{"w":"diligent","p":"[ˈdɪlədʒənt] adj.","d":"If someone is diligent, they work hard and are careful.","e":"Craig has always been a very diligent person at work.","zh":"(形) 勤勉的；認真的　(形) 盡心盡力的；努力的","ez":"克雷格在工作上一直非常勤奮。"},{"w":"emperor","p":"[ˈempərər] n.","d":"An emperor is the leader of a group of countries.","e":"The emperor Julius Caesar was in control o f ancient Rome.","zh":"(名) 皇帝；帝王","ez":"皇帝凱撒統治了古羅馬。"},{"w":"fiber","p":"[ˈfaibər] n.","d":"Fiber is a thread of a substance used to make clothes or rope.","e":"The mat was made from tiny fibers.","zh":"(名) 纖維；纖維素　(名) 光纖","ez":"這張墊子是由細小纖維製成的。"},{"w":"horrible","p":"[ˈhɔ:rəbəl] adj.","d":"If something is horrible, it is very bad.","e":"The assignment was horrible. I hated it.","zh":"(形) 可怕的；討厭的　(形) 極壞的；糟糕的","ez":"這份作業糟透了，我超討厭它。"},{"w":"impolite","p":"[impəˈlait] adj.","d":"If someone is impolite, they are rude.","e":"Roger is im polite to everyone he meets.","zh":"(形) 無禮的；不禮貌的","ez":"羅傑對他遇到的每個人都很沒禮貌。"},{"w":"kneel","p":"[niːl] v.","d":"To kneel is to put one or both knees on the ground.","e":"Daryl got down on one knee and asked Nina to marry him.","zh":"(動) 跪下；跪著　(名) 跪的動作","ez":"戴瑞單膝跪下，向妮娜求婚。"},{"w":"luxury","p":"[ˈlʌkʃərɪ] n.","d":"A luxury is an expensive thing that you do not need.","e":"We stayed at a luxury resort for our honeymoon.","zh":"(名) 奢侈；奢華　(形) 豪華的；奢侈的","ez":"我們蜜月時住在一間豪華度假村。"},{"w":"massive","p":"[ˈmæsɪv] adj.","d":"If something is massive, it is very big.","e":"The wheels on his truck were massive.","zh":"(形) 巨大的；龐大的　(形) 大規模的；廣泛的","ez":"他卡車的輪子非常大。"},{"w":"panic","p":"[ˈpænɪk] v.","d":"To panic is to feel so nervous or afraid that you cannot think clearly.","e":"Everyone panicked when the house caught on fire.","zh":"(名) 恐慌；驚慌　(動) 使恐慌；驚慌失措","ez":"房子著火時每個人都驚慌了。"},{"w":"priority","p":"[praɪɔ(:)rətɪ] n.","d":"A priority is something that is more important than other things.","e":"My priority is to get good grades in school.","zh":"(名) 優先；優先事項","ez":"我的首要任務是在學校取得好成績。"},{"w":"robe","p":"[roub] n.","d":"A robe is a long, loose piece of clothing.","e":"Many people wear robes in the morning.","zh":"(名) 長袍；浴袍","ez":"很多人早上會穿睡袍。"},{"w":"scold","p":"[skould] v.","d":"To scold means to criticize one angrily because they have done wrong.","e":"Jesse was scolded by the teacher for not paying attention.","zh":"(動) 責罵；訓斥","ez":"傑西因為上課不專心被老師責罵。"}]},{"id":15,"name":"Unit 15","words":[{"w":"affair","p":"[əˈfɛər] n.","d":"An affair is an event or a thing that happened.","e":"My wife and I attended a formal affair over the weekend.","zh":"(名) 事情；事務　(名) 婚外情；風流韻事","ez":"我和太太週末參加了一場正式活動。"},{"w":"assembly","p":"[əˈsemblɪ] n.","d":"An assembly is a group that is together for the same reason.","e":"The students had an assembly to talk about their interests.","zh":"(名) 集會；大會　(動) 組裝；聚集","ez":"學生們開會討論各自的興趣。"},{"w":"bless","p":"[bles] v.","d":"To bless is to ask God for protection or help.","e":"The angel blessed the newborn baby to keep it safe.","zh":"(動) 祝福；祝願　(動) 讚美；頌揚","ez":"天使祝福新生兒，保佑他平安。"},{"w":"cereal","p":"[ˈsɪərɪəl] n.","d":"Cereal is a food that you mix with milk and eat for breakfast.","e":"Cereal is a fast and common breakfast food enjoyed in the U.S.","zh":"(名) 穀類食品；麥片　(名) 穀物；谷類","ez":"麥片是美國常見的快速早餐食品。"},{"w":"cheerful","p":"[ˈtʃɪəfəl] adj.","d":"If someone is cheerful, they are happy or feel good.","e":"The children were cheerful because they didn&rsquo;t have to go to school.","zh":"(形) 快樂的；高興的　(形) 樂觀的；積極的","ez":"孩子們很開心，因為不用上學。"},{"w":"diameter","p":"[daɪˈæmɪtər] n.","d":"The diameter of a round thing is the length across its center.","e":"The diameter o f the tree was about 22 centimeters.","zh":"(名) 直徑；直經","ez":"這棵樹的直徑大約22公分。"},{"w":"exploit","p":"[ˈiksplɔɪt] v.","d":"To exploit something is to use it for greedy reasons rather than good reason.","e":"The company exploits their workers and makes them stay 12 hours a day.","zh":"(動) [ɪkˈsplɔɪt] 剝削；利用　(名) [ˈɛksplɔɪt] 功績；壯舉","ez":"公司剝削員工，強迫他們每天工作12小時。"},{"w":"famine","p":"[ˈfæmɪn] n.","d":"A famine is a long time with little or no food.","e":"The farmers couldn&rsquo;t grow any food on the dry soil, so there was a famime.","zh":"(名) 飢荒；飢餓　(形) 饑饉的；極度缺乏的","ez":"農夫們在乾燥的土壤上種不出作物，因此發生饑荒。"},{"w":"harvest","p":"[ˈhɑːrvɪst] n.","d":"A harvest is the act of collecting food from farming.","e":"They had a lot of wheat from the last harvest.","zh":"(名) 收穫；豐收　(動) 收穫；採收","ez":"他們上次收成收穫了很多小麥。"},{"w":"merry","p":"[ˈmerɪ] adj.","d":"If someone is merry, they are very happy.","e":"They felt merry because the weather was great.","zh":"(形) 快樂的；充滿歡樂的　(形) 愉快的；高興的","ez":"因為天氣很好，他們感到愉快。"},{"w":"nut","p":"[nʌt] n.","d":"A nut is a hard seed or fruit that comes from some trees and bushes.","e":"To eat a nut, first you have to crack its shell.","zh":"(名) 堅果；核果　(名) 螺帽；螺栓","ez":"要吃堅果，得先敲開它的殼。"},{"w":"pardon","p":"[ˈpɑːrdn] v.","d":"To pardon is a way to ask someone to repeat what was said before.","e":"Pardon me teacher, but could you repeat what you just said?","zh":"(名) 原諒；寬恕　(動) 原諒；赦免","ez":"老師，抱歉，可以請您重複剛才說的話嗎？"},{"w":"pharaoh","p":"[ˈfɛərou] n.","d":"A pharaoh was a king in ancient Egypt.","e":"The pharaohs ruled Egypt for thousands of years.","zh":"法老","ez":"法老統治埃及數千年。"},{"w":"ripe","p":"[raɪp] adj.","d":"When a fruit is ripe, it is ready to be eaten.","e":"The cherries were nice and ripe.","zh":"(形) 成熟的","ez":"這些櫻桃又甜又熟。"},{"w":"roast","p":"[roust] v.","d":"To roast something is to cook it in an oven or over a fire.","e":"Mom roasted a turkey for the holiday dinner.","zh":"(動) 烤；烘烤　(名) 烤肉","ez":"媽媽烤了一隻火雞當作節日晚餐。"},{"w":"routine","p":"[ruːˈtiːn] n.","d":"A routine is a way of doing things that is the same every time.","e":"My father&rsquo;s daily routine includes shaving right before breakfast.","zh":"(名) 例行公事；常規　(形) 例行的；常規的","ez":"我父親的日常習慣包括在早餐前刮鬍子。"},{"w":"scheme","p":"[skiːm] n.","d":"A scheme is a plan or design.","e":"Mickey and Minnie came up with a scheme to solve the problem.","zh":"(名) 方案；計畫　(動) 策劃；圖謀","ez":"米奇和米妮想出一個方案來解決問題。"},{"w":"slim","p":"[slim] adj.","d":"If something or someone is slim, they are thin.","e":"Look at my new cell phone. It&rsquo;s very slim.","zh":"(形) 苗條的；薄的","ez":"看看我的新手機，它非常輕薄。"},{"w":"stove","p":"[stouv] n.","d":"A stove is a device used to cook food.","e":"Our new stove helps us to cook food much faster than before.","zh":"(名) 爐子；火爐","ez":"我們的新爐子煮飯比以前快很多。"},{"w":"theft","p":"[θeft] n.","d":"A theft is a criminal act that involves someone stealing something.","e":"The theft of his TV took place when he was at work.","zh":"(名) 偷竊；盜竊","ez":"他的電視是在他上班時被偷的。"}]},{"id":16,"name":"Unit 16","words":[{"w":"adolescent","p":"[ӕdəˈlesənt] n.","d":"An adolescent is a young person or a teenager.","e":"The adolescent was excited about getting a skateboard for his birthday. ","zh":"(名) 青少年；十幾歲的人　(形) 青春期的；少年的","ez":"那個青少年因為生日收到滑板而感到興奮。"},{"w":"aptitude","p":"[ˈæptɪtjuːd] n.","d":"Aptitude is a natural ability or skill.","e":"He has a natural aptitude for water skiing.","zh":"(名) 天賦；才能　(名) 傾向；素質","ez":"他對滑水有天生的天賦。"},{"w":"compliment","p":"[ˈkɒmpləmənt] v.","d":"To compliment is to say a nice thing about someone or something.","e":"Her co-worker complimented her for doing a good job.","zh":"(名) 讚美；稱讚　(動) 稱讚；恭維","ez":"她的同事稱讚她工作表現良好。"},{"w":"hinder","p":"[ˈhindər] v.","d":"To hinder is to keep someone or something from doing something.","e":"All the traffic hindered me from getting to work on time.","zh":"(動) 妨礙；阻礙　(動) 阻止；延遲","ez":"所有交通堵塞讓我無法準時上班。"},{"w":"journalism","p":"[ˈdʒəːrnəlɪzəm] n.","d":"Journalism is the work of collecting the news to put in newspapers or on TV.","e":"Before becoming a teacher, she worked in journalism.","zh":"(名) 新聞工作；新聞業","ez":"在成為老師之前，她從事新聞工作。"},{"w":"jury","p":"[ˈdʒuəri] n.","d":"A jury is a group of people that listen to a trial and say if someone is guilty.","e":"The jury listened closely to the attorney before they made their decision.","zh":"(名) 陪審團；評委會","ez":"陪審團在做出決定前仔細聆聽律師的發言。"},{"w":"justice","p":"[ˈdʒʌstɪs] n.","d":"Justice is fairness in the way that you treat other people.","e":"People turn to the court system when they are seeking justice.","zh":"(名) 正義；公正　(名) 司法；審判","ez":"人們在尋求正義時會求助於法院系統。"},{"w":"liberty","p":"[ˈlibə:rti] n.","d":"Liberty is freedom to do what you want.","e":"To many people, the Statue of Liberty is a symbol of freedom.","zh":"(名) 自由；自主　(名) 許可；權利","ez":"對許多人來說，自由女神像是自由的象徵。"},{"w":"literary","p":"[ˈlɪtərərɪ] adj.","d":"If someone or something is literary, it is involved with literature in some way.","e":"He worked hard to create a successful literary career.","zh":"(形) 文學的；文學性的　(形) 逐字的；字面上的","ez":"他努力創造成功的文學事業。"},{"w":"pharmacy","p":"[ˈfɑːrməsɪ] n.","d":"A pharmacy is a place where medicine is sold.","e":"My mother sells medicine to people at the pharmacy.","zh":"(名) 藥局；藥房","ez":"我媽媽在藥局賣藥給人們。"},{"w":"pill","p":"[pil] n.","d":"A pill is a small object that has medicine inside.","e":"She took a pill for her headache.","zh":"(名) 藥丸；藥片","ez":"她吃了一顆藥來治頭痛。"},{"w":"presume","p":"[prɪˈzuːm] v.","d":"To presume is to believe something is true without being certain.","e":"Since he raised his hand, the teacher presumed he knew the answer.","zh":"(動) 假定；推測","ez":"因為他舉手，老師假定他知道答案。"},{"w":"privacy","p":"[ˈpraɪvəsɪ] n.","d":"To have privacy is to be away from other people.","e":"Please hang the sign on the door so we can have some privacy.","zh":"(名) 隱私；私密","ez":"請把牌子掛在門上，這樣我們才能有點隱私。"},{"w":"punishment","p":"[ˈpʌnɪʃmənt] n.","d":"A punishment is something that one must endure for any wrong doing.","e":"He was given a punishment for being rude to the teacher.","zh":"(名) 懲罰；處罰","ez":"他因為對老師無禮而受到處罰。"},{"w":"sensible","p":"[ˈsensəbl] adj.","d":"If someone is sensible, they make good decisions.","e":"It was sensible for her to save some money each month.","zh":"(形) 明智的；合理的","ez":"她每個月存一些錢是明智的。"},{"w":"slice","p":"[slaɪs] n.","d":"A slice is a piece from something larger, such as a cake.","e":"The girl enjoyed a slice of cake at her birthday party.","zh":"(動) 切；切片　(名) 片；薄片","ez":"那個女孩在她的生日派對上吃了一塊蛋糕。"},{"w":"sorrow","p":"[ˈsɒrou] n.","d":"Sorrow is a very sad feeling.","e":"The girl felt sorrow after her best friend moved away.","zh":"(名) 悲傷；哀痛","ez":"那個女孩在她最好的朋友搬走後感到悲傷。"},{"w":"straw","p":"[strɔː] n.","d":"A straw is a thin tube that is used to suck liquid into the mouth.","e":"I drank the orange juice through a straw.","zh":"(名) 吸管；稻草","ez":"我用吸管喝柳橙汁。"},{"w":"swell","p":"[swel] v.","d":"To swell is to become larger and rounder.","e":"My sister&rsquo;s stomach began to swell after she got pregnant.","zh":"(動) 膨脹；上漲　(名) 膨脹；隆起","ez":"我姊姊懷孕後肚子開始隆起。"},{"w":"tidy","p":"[ˈtaɪdɪ] adj.","d":"When something is tidy, it is clean and in order.","e":"Leon has always been a very tidy boy.","zh":"(動) 整理；收拾　(形) 整潔的","ez":"Leon一直是個非常整潔的男孩。"}]},{"id":17,"name":"Unit 17","words":[{"w":"affection","p":"[əˈfekʃən] n.","d":"Affection is a feeling of liking someone or something.","e":"Amanda has a lot of affection for her little sister Sarah.","zh":"(名) 喜愛；疼愛　(名) 感情；情感","ez":"Amanda對她的妹妹Sarah充滿感情。"},{"w":"agency","p":"[ˈeɪdʒənsɪ] n.","d":"An agency is a business or service set up to act for others.","e":"I went to a travel agency to help me arrange a flight home.","zh":"(名) 代理機構；仲介公司　(名) 行動；作用；力量","ez":"我去旅行社幫我安排回家的航班。"},{"w":"ash","p":"[æʃ] n.","d":"Ash is the grey or black powder created when something is burned.","e":"The end of his cigar was full of ashes.","zh":"(名) 灰燼；灰　(名) 骨灰　(形) 灰色的；蒼白的","ez":"他的雪茄末端滿是菸灰。"},{"w":"confine","p":"[kənˈfaɪn] v.","d":"To confine something is to keep it in one place.","e":"The elephant is confined to a cage in the zoo.","zh":"(動) 限制；侷限　(動) 監禁；關押","ez":"大象被關在動物園的籠子裡。"},{"w":"dismiss","p":"[dɪsˈmɪs] v.","d":"To dismiss something is to say it is not important.","e":"He quickly dismissed my idea about a new project.","zh":"(動) 解僱；開除　(動) 駁回；不理會","ez":"他很快地否決了我關於新專案的想法。"},{"w":"erupt","p":"[ɪˈrʌpt] v.","d":"To erupt is for a volcano or something to shoot a hot substance.","e":"The volcano erupted for the first time in ten years.","zh":"(動) 爆發；噴發　(動) 突然發生；突然出現","ez":"火山在十年來首次爆發。"},{"w":"fate","p":"[feɪt] n.","d":"Fate is a power that causes some things to happen.","e":"Some people believe that a person&rsquo;s hand can tell their fate.","zh":"(名) 命運；宿命　(名) 結局；下場","ez":"有些人相信一個人的手能預測命運。"},{"w":"lava","p":"[ˈlɑːvə] n.","d":"Lava is the hot substance made of melted rock that shoots from volcanoes.","e":"The red hot lava poured from the volcano.","zh":"(名) 熔岩；火山岩漿","ez":"熾熱的紅色熔岩從火山湧出。"},{"w":"miserable","p":"[ˈmɪzərəbəl] adj.","d":"If someone is miserable, they are very unhappy.","e":"He was miserable after his dog died.","zh":"(形) 悲慘的；痛苦的　(形) 令人厭惡的；糟糕的","ez":"他的狗死後，他非常痛苦。"},{"w":"navigate","p":"[ˈnævəgeɪt] v.","d":"To navigate something is to control the way it moves or goes.","e":"She navigated the ship across the ocean.","zh":"(動) 航行；導航　航行；駕駛","ez":"她駕駛船隻橫越海洋。"},{"w":"originate","p":"[əˈrɪdʒəneɪt] v.","d":"To originate somewhere is to start there.","e":"The idea of democracy originated in Ancient Greece.","zh":"(動) 起源；發源","ez":"民主的概念起源於古希臘。"},{"w":"remainder","p":"[rɪˈmeɪndə:r] n.","d":"The remainder of something is what is left.","e":"He took a bite of the apple, then gave me the remainder of it.","zh":"(名) 剩餘部分；其餘的人","ez":"他咬了一口蘋果，然後把剩下的給了我。"},{"w":"retrieve","p":"[rɪˈtriːv] v.","d":"To retrieve something is to find it and get it back.","e":"She retrieved her mail from the mail box.","zh":"(動) 找回；取回","ez":"她從信箱取回她的郵件。"},{"w":"shallow","p":"[ˈʃælou] adj.","d":"If something is shallow, it is not deep.","e":"The kids were playing in the shallow water.","zh":"(形) 淺的；淺薄的","ez":"孩子們在淺水區玩耍。"},{"w":"slope","p":"[sloup] n.","d":"A slope is ground that is not flat.","e":"The slope to the top of the mountain was very steep.","zh":"(名) 斜坡；坡度　(動) 傾斜；使傾斜","ez":"通往山頂的斜坡非常陡峭。"},{"w":"span","p":"[spæn] v.","d":"To span a length of time is to last that long.","e":"His work began in 1999. It has spanned many years since then.","zh":"(動) 跨越；涵蓋　(名) 跨度；一段時間","ez":"他的工作始於1999年，從那時起已持續多年。"},{"w":"superstition","p":"[suːpərstiʃən] n.","d":"A superstition is something magical that people believe is real.","e":"It is a superstition that Friday the 13<sup>th</sup> is an unlucky day.","zh":"(名) 迷信","ez":"迷信認為13號星期五是不吉利的日子。"},{"w":"sympathy","p":"[ˈsɪmpəθɪ] n.","d":"Sympathy is a feeling of being sad for another person.","e":"I felt sympathy for my sister so I got her a balloon to cheer her up.","zh":"(名) 同情；同情心","ez":"我同情我的妹妹，所以買了氣球讓她開心。"},{"w":"vibrate","p":"[vaɪˈbreɪt] v.","d":"To vibrate is to shake very hard.","e":"The machine made his whole body vibrate as he broke up the ground.","zh":"(動) 震動；顫動","ez":"機器讓他整個身體震動，因為他在破土。"},{"w":"wander","p":"[ˈwɒndə:r] v.","d":"To wander is to walk without goi
