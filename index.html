<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>4000 Essential English Words</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.container { width: 100%; max-width: 440px; padding: 16px; }

/* 選擇頁 */
.selector { text-align: center; color: white; }
.selector h1 { font-size: 22px; margin-bottom: 6px; }
.selector .sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 20px; }

/* 書本卡片 */
.book-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.book-card {
  border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  cursor: pointer; transition: all 0.3s;
  text-align: left;
}
.book-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.book-card-header {
  display: flex; align-items: center; gap: 14px; padding: 16px;
}
.book-card-header .icon { font-size: 36px; }
.book-card-header .info { flex: 1; }
.book-card-header .book-name { font-size: 18px; font-weight: 700; color: white; }
.book-card-header .book-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.book-card-header .arrow { color: rgba(255,255,255,0.25); font-size: 14px; transition: transform 0.3s; }
.book-card.open .book-card-header .arrow { transform: rotate(90deg); }

/* 單元列表 */
.unit-list { display: none; padding: 0 16px 14px 16px; }
.book-card.open .unit-list { display: flex; flex-wrap: wrap; gap: 8px; }
.unit-chip {
  padding: 8px 14px; border-radius: 20px; font-size: 13px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7);
  cursor: pointer; transition: all 0.2s;
}
.unit-chip:hover { background: rgba(255,255,255,0.1); }
.unit-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

.start-btn-wrap { margin-top: 8px; }
.start-btn {
  display: block; margin: 0 auto; padding: 14px 48px;
  border-radius: 30px; border: none;
  background: linear-gradient(135deg, #0abde3, #0984e3);
  color: white; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(10,189,227,0.3);
}
.start-btn:active { transform: scale(0.95); }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 卡片區 */
.study-view { display: none; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.back-btn {
  background: rgba(255,255,255,0.08); border: none; color: white;
  padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
}
.info { color: rgba(255,255,255,0.5); font-size: 13px; text-align: right; }
.progress-wrap { display: flex; gap: 4px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.15); transition: all 0.4s;
}
.dot.active { background: #0abde3; box-shadow: 0 0 8px #0abde3; transform: scale(1.5); }
.dot.known { background: #27ae6060; }
.dot.unknown { background: #e74c3c60; }

/* 翻轉卡片 */
.flip { perspective: 1200px; width: 100%; height: 440px; margin-bottom: 16px; }
.flip-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.flip-inner.revealed { transform: rotateY(180deg); }
.face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.front {
  background: linear-gradient(145deg, #1e3a5f, #162447);
  border: 2px solid rgba(10,189,227,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.back {
  background: linear-gradient(145deg, #1a1a2e, #162447);
  border: 2px solid rgba(10,189,227,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  transform: rotateY(180deg);
}
.word-display {
  color: #ecf0f1; font-size: 36px; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 12px; text-align: center;
}
.phonetic { color: #0abde3; font-size: 16px; margin-bottom: 20px; text-align: center; }
.hint { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 20px; }

/* 鍵盤提示 */
.key-hints {
  display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
  margin-top: 12px;
}
.key-hints .key {
  color: rgba(255,255,255,0.35); font-size: 12px;
  display: flex; align-items: center; gap: 4px;
}
.key-hints kbd {
  display: inline-block; min-width: 24px; height: 24px;
  line-height: 24px; text-align: center;
  border-radius: 5px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5); font-size: 12px;
  font-family: inherit; padding: 0 5px;
}

.back-word { color: #ecf0f1; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.back-phonetic { color: #0abde3; font-size: 15px; margin-bottom: 16px; }
.def-box {
  background: rgba(255,255,255,0.06); border-radius: 14px;
  padding: 16px; margin-bottom: 14px; width: 100%;
}
.def-label { color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
.def-text { color: #ecf0f1; font-size: 16px; line-height: 1.6; }
.zh-box {
  background: rgba(255,193,7,0.06); border-radius: 14px;
  padding: 12px; width: 100%; margin-bottom: 10px;
  border-left: 3px solid #f39c12;
}
.zh-label { color: rgba(243,156,18,0.6); font-size: 11px; letter-spacing: 2px; margin-bottom: 4px; }
.zh-text { color: #f1c40f; font-size: 16px; }
.example-box {
  background: rgba(10,189,227,0.08); border-radius: 14px;
  padding: 14px; width: 100%; border-left: 3px solid #0abde3;
}
.example-label { color: rgba(10,189,227,0.6); font-size: 11px; letter-spacing: 2px; margin-bottom: 4px; }
.example-text { color: #b2bec3; font-size: 14px; line-height: 1.6; font-style: italic; }
.back-buttons { display: flex; gap: 12px; margin-top: 16px; }
.know-btn, .dunno-btn {
  flex: 1; padding: 14px; border-radius: 14px;
  border: none; font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.dunno-btn { background: rgba(231,76,60,0.15); color: #e74c3c; }
.know-btn { background: rgba(39,174,96,0.15); color: #27ae60; }
.dunno-btn:active { background: rgba(231,76,60,0.3); }
.know-btn:active { background: rgba(39,174,96,0.3); }

/* 完成畫面 */
.complete { display: none; text-align: center; color: white; animation: fadeIn 0.5s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.complete.show { display: block; }
.complete-emoji { font-size: 56px; margin-bottom: 12px; }
.stats { font-size: 15px; margin-bottom: 20px; line-height: 1.8; }
.stats .green { color: #27ae60; }
.stats .red { color: #e74c3c; }
.again-btn {
  padding: 14px 40px; border-radius: 30px;
  border: 2px solid #0abde3; background: transparent;
  color: #0abde3; font-size: 16px; cursor: pointer;
  margin: 4px; transition: all 0.3s;
}
.again-btn:active { background: rgba(10,189,227,0.15); }
.again-btn.primary { background: #0abde3; color: white; border: none; }

/* 彈窗 */
.modal { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; }
.modal.show { display: flex; }
.modal-content {
  background: #162447; border-radius: 20px; padding: 24px;
  max-width: 360px; width: 90%; text-align: center;
  border: 1px solid rgba(10,189,227,0.2);
}
.modal h3 { color: white; margin-bottom: 12px; }
.modal p { color: #b2bec3; font-size: 14px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- 選擇頁 -->
  <div class="selector" id="selectorView">
    <h1>📚 4000 Essential English Words</h1>
    <div class="sub">選一本書開始練習</div>
    <div class="book-cards" id="bookCards"></div>
    <div class="start-btn-wrap">
      <button class="start-btn" id="startBtn" disabled onclick="startStudy()">開始練習 ▶</button>
    </div>
  </div>

  <!-- 學習頁 -->
  <div class="study-view" id="studyView">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">← 回選單</button>
      <div class="info" id="studyInfo"></div>
    </div>
    <div class="progress-wrap" id="dots"></div>
    <div class="flip" id="flip" onclick="flipCard()">
      <div class="flip-inner" id="flipInner">
        <div class="face front">
          <div class="word-display" id="frontWord"></div>
          <div class="phonetic" id="frontPhonetic"></div>
          <div class="hint">點卡片看答案</div>
        </div>
        <div class="face back" onclick="event.stopPropagation(); flipCard()">
          <div class="back-word" id="backWord"></div>
          <div class="back-phonetic" id="backPhonetic"></div>
          <div class="def-box">
            <div class="def-label">定義</div>
            <div class="def-text" id="defText"></div>
          </div>
          <div class="zh-box" id="zhBox" style="display:none">
            <div class="zh-label">中文</div>
            <div class="zh-text" id="zhText"></div>
          </div>
          <div class="example-box" id="exampleBox" style="display:none">
            <div class="example-label">例句</div>
            <div class="example-text" id="exampleText"></div>
          </div>
          <div class="back-buttons">
            <button class="dunno-btn" onclick="event.stopPropagation(); answer(false)">😣 不熟</button>
            <button class="know-btn" onclick="event.stopPropagation(); answer(true)">😊 會了</button>
          </div>
        </div>
      </div>
    </div>
    <div class="key-hints">
      <span class="key"><kbd>↑</kbd> 發音</span>
      <span class="key"><kbd>↓</kbd><kbd>Space</kbd> 翻面</span>
      <span class="key"><kbd>←</kbd> 上一張</span>
      <span class="key"><kbd>→</kbd> 下一張</span>
    </div>
  </div>

  <!-- 完成頁 -->
  <div class="complete" id="completeView">
    <div class="complete-emoji" id="completeEmoji">🎉</div>
    <div class="stats" id="statsText"></div>
    <button class="again-btn" onclick="goBack()">📖 回選單</button>
    <button class="again-btn primary" onclick="startStudy()">🔄 再來一次</button>
  </div>
</div>

<script>
let allData = [];
let currentBook = null;
let currentUnit = null;
let cards = [];
let currentIdx = 0;
let known = 0;
let unknown = 0;

async function init() {
  try {
    const res = await fetch('data/words.json');
    allData = await res.json();
    renderBooks();
  } catch(e) { alert('載入資料失敗'); }
}

const BOOK_COLORS = ['#0abde3','#27ae60','#f39c12','#9b59b6','#e84393','#00cec9'];
const BOOK_ICONS   = ['📘','📗','📙','📕','📒','📓'];

function renderBooks() {
  const wrap = document.getElementById('bookCards');
  wrap.innerHTML = allData.map((b,i) => {
    const total = b.units.reduce((s,u) => s + u.words.length, 0);
    return `<div class="book-card" id="book${i}" style="--accent:${BOOK_COLORS[i]};--accent-bg:${BOOK_COLORS[i]}15"
              onclick="toggleBook(${i})">
      <div class="book-card-header">
        <span class="icon">${BOOK_ICONS[i]}</span>
        <div class="info">
          <div class="book-name">Book ${b.id}</div>
          <div class="book-meta">${b.units.length} 單元 · ${total} 字</div>
        </div>
        <span class="arrow">▶</span>
      </div>
      <div class="unit-list">${
        b.units.map((u,j) =>
          `<span class="unit-chip" id="chip${i}_${j}" onclick="event.stopPropagation(); pickUnit(${i},${j})">${u.name}</span>`
        ).join('')
      }</div>
    </div>`;
  }).join('');
}

function toggleBook(idx) {
  const card = document.getElementById('book'+idx);
  const wasOpen = card.classList.contains('open');
  // 關閉其他
  document.querySelectorAll('.book-card').forEach(c => c.classList.remove('open','selected'));
  if (!wasOpen) card.classList.add('open');
}

function pickUnit(bookIdx, unitIdx) {
  currentBook = bookIdx;
  currentUnit = unitIdx;
  // 清除其他選取
  document.querySelectorAll('.unit-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip'+bookIdx+'_'+unitIdx).classList.add('active');
  // 標記書本
  document.querySelectorAll('.book-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('book'+bookIdx).classList.add('selected');
  // 啟用開始按鈕
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent =
    `開始練習 ▶ (${allData[bookIdx].units[unitIdx].words.length} 字)`;
}

function startStudy() {
  const unit = allData[currentBook].units[currentUnit];
  cards = [...unit.words];
  // 隨機排序
  for (let i = cards.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  currentIdx = 0;
  known = 0;
  unknown = 0;
  
  document.getElementById('selectorView').style.display = 'none';
  document.getElementById('completeView').classList.remove('show');
  document.getElementById('completeView').style.display = 'none';
  document.getElementById('studyView').style.display = 'block';
  
  document.getElementById('studyInfo').textContent =
    `Book ${allData[currentBook].id} · ${unit.name}`;
  
  renderDots();
  showCard();
}

function renderDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = cards.map((_,i) =>
    `<div class="dot" id="dot${i}"></div>`
  ).join('');
}

function showCard() {
  const card = cards[currentIdx];
  document.getElementById('flipInner').classList.remove('revealed');
  document.getElementById('frontWord').textContent = card.w;
  document.getElementById('frontPhonetic').textContent = card.p || '';
  document.getElementById('backWord').textContent = card.w;
  document.getElementById('backPhonetic').textContent = card.p || '';
  document.getElementById('defText').textContent = card.d || '';
  
  if (card.zh) {
    document.getElementById('zhBox').style.display = 'block';
    document.getElementById('zhText').textContent = card.zh;
  } else {
    document.getElementById('zhBox').style.display = 'none';
  }
  
  if (card.e) {
    document.getElementById('exampleBox').style.display = 'block';
    document.getElementById('exampleText').textContent = card.e;
  } else {
    document.getElementById('exampleBox').style.display = 'none';
  }
  
  updateDots();
  speak();
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.remove('active');
    if (i === currentIdx) d.classList.add('active');
  });
}

function flipCard() {
  const inner = document.getElementById('flipInner');
  inner.classList.toggle('revealed');
  if (!inner.classList.contains('revealed')) speak();  // 翻回正面自動發音
}

async function speak() {
  const word = cards[currentIdx].w;
  const safe = word.replace(/[^a-zA-Z-]/g, '');
  const audio = new Audio(`data/audio/${safe}.mp3`);
  audio.onerror = () => speakFallback(word);
  audio.play().catch(() => speakFallback(word));
}

let speaking = false;
function speakFallback(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function prevCard() {
  if (currentIdx <= 0) return;
  // 退回上一張時不計分
  currentIdx--;
  showCard();
}

function answer(isKnown) {
  const dot = document.getElementById(`dot${currentIdx}`);
  if (isKnown) {
    known++; dot.classList.add('known');
  } else {
    unknown++; dot.classList.add('unknown');
  }
  
  currentIdx++;
  if (currentIdx >= cards.length) {
    showComplete();
  } else {
    showCard();
  }
}

// 鍵盤快捷鍵
document.addEventListener('keydown', function(e) {
  if (document.getElementById('studyView').style.display !== 'block') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); speak(); break;
    case 'ArrowDown':  e.preventDefault(); flipCard(); break;
    case ' ':          e.preventDefault(); flipCard(); break;
    case 'ArrowRight': e.preventDefault(); answer(true); break;
    case 'ArrowLeft':  e.preventDefault(); prevCard(); break;
  }
});

function showComplete() {
  document.getElementById('studyView').style.display = 'none';
  document.getElementById('completeView').style.display = 'block';
  document.getElementById('completeView').classList.add('show');
  
  const total = cards.length;
  const pct = Math.round(known/total*100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : pct >= 50 ? '💪' : '📖';
  document.getElementById('completeEmoji').textContent = emoji;
  document.getElementById('statsText').innerHTML =
    `完成 ${total} 個單字！<br>
    <span class="green">😊 認識：${known} (${pct}%)</span><br>
    <span class="red">😣 不熟：${unknown}</span>`;
}

function goBack() {
  document.getElementById('studyView').style.display = 'none';
  document.getElementById('completeView').style.display = 'none';
  document.getElementById('completeView').classList.remove('show');
  document.getElementById('selectorView').style.display = 'block';
  document.getElementById('flipInner').classList.remove('revealed');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '開始練習 ▶';
  document.querySelectorAll('.book-card').forEach(c => c.classList.remove('open','selected'));
  document.querySelectorAll('.unit-chip').forEach(c => c.classList.remove('active'));
}

init();
</script>
</body>
</html>
