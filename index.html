v.","d":"To rig something means to dishonestly arrange it.","e":"The bad politician rigged the election so that he would win.","zh":"(動) 操縱；裝配","ez":"那個壞政客操縱選舉，讓自己獲勝。"},{"w":"shiver","p":"[ˈʃivə:r] n.","d":"A shiver is a shaking movement the body makes when someone is cold or scared.","e":"I got shivers on my way home because it was so cold.","zh":"輕微顫抖；發抖；顫慄；顫抖；發抖；寒顫；顫抖；發抖","ez":"回家的路上我冷得直發抖。"},{"w":"sociable","p":"[ˈsouʃəbəl] adj.","d":"When someone is sociable, they are friendly.","e":"Many of my good friends are sociable, but I am shy.","zh":"(形) 好交際的；友善的","ez":"我的很多好朋友都很愛社交，但我很害羞。"},{"w":"talkative","p":"[ˈtɔːkətiv] adj.","d":"When someone is talkative, they talk a lot.","e":"My aunt is very talkative whenever she is on the phone.","zh":"(形) 多話的；愛說話的","ez":"我姑姑每次講電話都很健談。"},{"w":"tow","p":"[tou] v.","d":"To tow something is to pull it.","e":"The truck was towing a trailer behind it.","zh":"(動) 拖；拉；牽引","ez":"卡車後面拖著一輛拖車。"},{"w":"tramp","p":"[træmp] v.","d":"To tramp is to put your feet down in a loud, heavy way as you walk.","e":"The baby tramped across the floor as he was learning to walk.","zh":"(名) 流浪漢；長途步行　(動) 跋涉；踩踏","ez":"寶寶學走路時，在地板上蹣跚而行。"}]},{"id":31,"name":"Index","words":[]}]},{"id":6,"name":"Book 6","units":[{"id":1,"name":"Unit 1","words":[{"w":"alleviate","p":"[əˈliːvieit] v.","d":"To alleviate pain or suffering means to make it less intense or severe.","e":"She needed something to alleviate the pain in her back.","zh":"(動) 減輕；緩解　(動) 舒緩；改善","ez":"她需要一些東西來緩解背部的疼痛。"},{"w":"astrology","p":"[əsˈtrɒlədʒi] n.","d":"Astrology is the study of the stars in the belief that they influence people’s lives.","e":"Jack, who studies astrology, believes that the stars can predict the future.","zh":"占星術；占星學","ez":"研究占星學的傑克相信星星能預測未來。"},{"w":"differentiate","p":"[difəˈrenʃieit] v.","d":"To differentiate things or people is to show the difference between them.","e":"It was hard to differentiate between the identical twins.","zh":"(動) 區分；辨別　(動) 使不同；區別對待","ez":"很難區分那對雙胞胎。"},{"w":"disrupt","p":"[disˈrʌpt] v.","d":"To disrupt something or someone is to prevent them from working.","e":"The loud crash disrupted the class lecture.","zh":"(動) 破壞；中斷　(動) 擾亂；打擾","ez":"巨大的撞擊聲打斷了課堂講課。"},{"w":"equation","p":"[iˈkweiʒən] n.","d":"An equation is a math operation to determine the value of something.","e":"I used the Pythagorean theorem to solve the equation.","zh":"(名) 方程式；等式　(名) 問題；情況","ez":"我用畢氏定理解這個方程式。"},{"w":"err","p":"[əːr] v.","d":"To err means to make a mistake.","e":"The pilot erred in his estimate of the time it would take to make the trip.","zh":"犯錯誤；做錯事；出差錯","ez":"飛行員錯誤估計了旅程所需的時間。"},{"w":"erroneous","p":"[iˈrouniəs] adj.","d":"When something is erroneous, it is incorrect or only partly correct.","e":"The child held the erroneous belief that time machines were real.","zh":"(形) 錯誤的；不正確的　(形) 謬誤的；荒謬的","ez":"那個孩子錯誤地相信時光機是真的。"},{"w":"frantic","p":"[ˈfræntik] adj.","d":"If people or things are frantic, they behave in a wild way because they are frightened.","e":"The cat became frantic when I tried to give it a bath.","zh":"(形) 狂亂的；惶恐的　(形) 急促的；匆忙的","ez":"當我試圖幫貓洗澡時，牠變得非常慌亂。"},{"w":"hull","p":"[hʌl] n.","d":"The hull of a boat or tank is the main body of it.","e":"Afterthe wreckatsea, the ship&rsquo;s hull was the last part to sink.","zh":"(名) 船殼；外殼　(動) 去除外殼；剝去","ez":"海上遇難後，船體是最後沉沒的部分。"},{"w":"inadvertent","p":"[inədˈvəːrtənt] adj.","d":"When an action is inadvertent, it is done without realizing what you are doing.","e":"She made an inadvertent error when she knocked over the nail polish.","zh":"非故意的；無意的","ez":"她不小心打翻指甲油時犯了個無心之錯。"},{"w":"improvise","p":"[ˈimprəvaiz] v.","d":"To improvise something is to do it with whatever is available or without planning.","e":"There was no meat for the pizza, so we improvised with what was in the fridge.","zh":"臨時做；即興做；演員；即興表演；音樂家；即興創作","ez":"披薩沒有肉，所以我們用冰箱裡的東西臨時應變。"},{"w":"latitude","p":"[ˈlӕtətjuːd] n.","d":"The latitude of a place is its distance from the equator.","e":"The device was able to tell the traveler his exact latitude.","zh":"(名) 緯度；自由度；活動範圍","ez":"這個裝置能告訴旅行者他的精確緯度。"},{"w":"mariner","p":"[ˈmærənə:r] n.","d":"A mariner is a sailor.","e":"The old mariner used his telescope to find the shore.","zh":"(名) 水手；海員　(名) 航海者；船員","ez":"老水手用望遠鏡尋找海岸。"},{"w":"multitude","p":"[ˈmʌltitjuːd] n.","d":"A multitude of things or people is a very large number of them.","e":"A multitude of people were waiting at the airport.","zh":"(名) 大量；眾多　(名) 群眾；大批人群","ez":"一大群人在機場等候。"},{"w":"nuisance","p":"[ˈnjuːsəns] n.","d":"A nuisance is a person or thing that is annoying or causes a lot of problems.","e":"The teenager considered her noisy little brothers to be quite a nuisance.","zh":"(名) 討厭的人或事；麻煩","ez":"那個青少年覺得她吵鬧的弟弟們很煩人。"},{"w":"permanence","p":"[ˈpəːrmənəns] n.","d":"The permanence of something is its ability to last forever.","e":"Poor results will threaten the permanence of the new teaching system.","zh":"持久；性；永久；性；永恆；性","ez":"糟糕的結果會威脅新教學系統的持久性。"},{"w":"revolve","p":"[riˈvɒlv] v.","d":"To revolve around something is to keep it as the main feature or focus.","e":"My life revolves around sports.","zh":"(動) 旋轉；繞行；以…為中心","ez":"我的生活圍繞著運動。"},{"w":"soothe","p":"[suːð] v.","d":"To soothe means to calm someone who is angry or upset.","e":"The mother soothed her crying baby by rocking him in her arms.","zh":"(動) 安撫；緩和","ez":"母親搖著懷裡哭泣的嬰兒來安撫他。"},{"w":"stranded","p":"[ˈstrændid] adj.","d":"If someone is stranded, they are prevented from leaving a place.","e":"When the plane left, my sister and I were stranded in China.","zh":"(動) 使擱淺；使受困　(形) 擱淺的；無助的","ez":"飛機離開時，我和姐姐被困在中國。"},{"w":"volatile","p":"[ˈvɒlətil] adj.","d":"When something is volatile, it is likely to change suddenly and unexpectedly.","e":"The volatile volcano might explode at any moment.","zh":"(形) 不穩定的；易變的","ez":"那座不穩定的火山隨時可能爆發。"}]},{"id":2,"name":"Unit 2","words":[{"w":"arduous","p":"[ˈɑːrdjʊəs] adj.","d":"When something is arduous, it demands great effort or labor.","e":"The explorers began their arduous hike up the steep mountain.","zh":"(形) 艱難的；費力的　(形) 陡峭的；險峻的","ez":"探險者開始了他們艱苦的陡峭登山之旅。"},{"w":"attain","p":"[əˈtein] v.","d":"To attain something means to gain or achieve it, often after a lot of effort.","e":"In two more years, I will attain my high school diploma.","zh":"(動) 達到；獲得　(動) 實現；完成","ez":"再過兩年，我將獲得高中文憑。"},{"w":"coexist","p":"[ˈkouigˈzist] v.","d":"To coexist with something means to exist with it in the same time and place.","e":"Our pets coexist at our home with little or no problems.","zh":"共生；共處；共存","ez":"我們的寵物在家裡幾乎和平共處。"},{"w":"conceive","p":"[kənˈsiːv] v.","d":"To conceive something means to be able to imagine or believe it.","e":"The child could not conceive the actual size of the Earth.","zh":"(動) 想出；構想　懷孕；受孕","ez":"那個孩子無法想像地球的實際大小。"},{"w":"dubious","p":"[ˈdjuːbiəs] adj.","d":"When something or someone is dubious, they are not considered honest.","e":"The police thought that the man&rsquo;s description of the crime was dubious.","zh":"(形) 可疑的；有疑問的　(形) 令人懷疑的；不可信的","ez":"警方認為那名男子對犯罪的描述很可疑。"},{"w":"ego","p":"[ˈiːgou] n.","d":"An ego is a person’s sense of their own worth.","e":"Kelly&rsquo;s ego made her think that she was some kind of a superhero.","zh":"(名) 自我；自尊心　(名) 傲慢；虛榮心","ez":"凱莉的自負讓她覺得自己像個超級英雄。"},{"w":"elastic","p":"[iˈlæstik] n.","d":"Elastic is a rubber that stretches when it is pulled.","e":"He attached the elastic bungee to his legs before he jumped off the platform.","zh":"(形) 有彈性的；易伸縮的　(名) 橡皮筋；彈性物料","ez":"他在跳下平台前將彈性繩綁在腿上。"},{"w":"endeavor","p":"[enˈdevər] n.","d":"An endeavor is an attempt to do something, especially something new or original.","e":"The company&rsquo;s new advertising endeavor ended in a horrible failure.","zh":"(名) 努力；嘗試　(動) 努力；試圖","ez":"公司的新廣告活動以慘敗告終。"},{"w":"engrave","p":"[inˈgreiv] v.","d":"To engrave means to cut a design or words into the surface of something.","e":"The couple engraved their names onto the old pine tree.","zh":"(動) 雕刻；刻畫　(動) 銘記；深深印在心中","ez":"那對夫婦將名字刻在老松樹上。"},{"w":"excavate","p":"[ˈekskəveit] v.","d":"To excavate means to dig on land and remove dirt to look for something.","e":"The team wishes to excavate the site in hopes of finding fossils.","zh":"發掘；挖出；開鑿；挖；洞；挖空","ez":"團隊希望挖掘這個遺址以尋找化石。"},{"w":"jagged","p":"[ˈdʒӕgid] adj.","d":"When something is jagged, it has a tough, uneven shape or edge.","e":"The swimmer was hurt when he fell on the jagged rocks.","zh":"有尖突的；鋸齒狀的；參差不齊的","ez":"游泳者摔在參差不齊的岩石上受傷了。"},{"w":"locale","p":"[louˈkæl] n.","d":"A locale is a small area or place where something specific happens.","e":"The spa was the perfect locale for my mother to relax and enjoy her vacation.","zh":"(名) 地點；地區　(形) 當地的；本地的","ez":"水療中心是我媽媽放鬆享受假期的完美地點。"},{"w":"mold","p":"[mould] n.","d":"A mold is a hollow container that is used to make certain shapes.","e":"Using a cupcake mold will ensure that they come out just right.","zh":"(名) 黴菌；霉　(動) 形成；塑造","ez":"使用杯子蛋糕模具能確保它們形狀完美。"},{"w":"outright","p":"[autˈrait] adj.","d":"When something is outright, it is open and direct.","e":"Everyone knew that the boy&rsquo;s story was an outright lie.","zh":"(副) [aʊt'raɪt] 完全地；坦率地；立即　(形) ['aʊtˌraɪt] 完全的；直率的","ez":"大家都知道那個男孩的故事完全是謊言。"},{"w":"periphery","p":"[pəˈrifəri] n.","d":"The periphery of an area, place, or thing is the edge of it.","e":"A beautiful floral pattern is on the periphery of the stationery.","zh":"(名) 外圍；邊緣地帶","ez":"文具邊緣有美麗的花卉圖案。"},{"w":"plaster","p":"[ˈplæstər] n.","d":"Plaster is a smooth paste that gets hard when it dries.","e":"He used plaster to fill in the cracks in the old walls.","zh":"(動) 塗抹；貼滿　(名) 石膏；灰泥","ez":"他用灰泥填補舊牆的裂縫。"},{"w":"shovel","p":"[ˈʃʌvəl] n.","d":"A shovel is a tool with a long handle that is used for digging.","e":"The boy grabbed his shovel and got all of the snow off of the sidewalk.","zh":"(名) 鏟子；鍬","ez":"男孩拿起鏟子把所有人行道上的雪清乾淨。"},{"w":"skeletal","p":"[ˈskelətl] adj.","d":"When something is skeletal, it relates to bones in the body.","e":"We studied the skeletal system in anatomy class.","zh":"骨骼的；骨瘦如柴的；輪廓的；最基本的；大概的","ez":"我們在解剖課上學習骨骼系統。"},{"w":"terrestrial","p":"[təˈrestriəl] adj.","d":"If something is terrestrial, it relates to Earth.","e":"There are billions of terrestrial life forms.","zh":"(形) 陸地的；地球的","ez":"有數十億種陸地生命形式。"},{"w":"vicious","p":"[ˈviʃəs] adj.","d":"When something or someone is vicious, they are violent and cruel.","e":"The vicious dog tried to bite the small child.","zh":"(形) 惡毒的；殘酷的","ez":"那隻兇猛的狗試圖咬那個小孩。"}]},{"id":3,"name":"Unit 3","words":[{"w":"absurd","p":"[əbˈsəːrd] adj.","d":"If something or someone is absurd, they are ridiculous.","e":"That group of people making animal noises sounds completely absurd.","zh":"(形) 荒謬的；可笑的","ez":"那群發出動物叫聲的人聽起來完全荒謬。"},{"w":"anemia","p":"[əˈniːmiə] n.","d":"Anemia is a blood condition that causes a person to be pale and tired.","e":"When she first developed anemia, she became tired often.","zh":"(名) 貧血；紅血球不足","ez":"當她第一次患上貧血時，她經常感到疲倦。"},{"w":"aristocracy","p":"[ӕrəˈstokrəsi] n.","d":"The aristocracy is the highest class of people in certain societies.","e":"Most members of the aristocracy were very well-fed.","zh":"貴族；貴族階級","ez":"大多數貴族成員都營養良好。"},{"w":"aristocrat","p":"[ˈæristəkræt] n.","d":"An aristocrat is a person who is of the highest class in certain societies.","e":"The aristocrat did not need a job because his family was wealthy.","zh":"貴族；貴族成員","ez":"那個貴族不需要工作，因為他家很有錢。"},{"w":"attire","p":"[əˈtaiər] n.","d":"Attire is nice or special clothing.","e":"Everyone wore their best attire to the president&rsquo;s daughter&rsquo;s wedding.","zh":"(名) 服裝；衣著　(動) 穿著；打扮","ez":"每個人都穿著最好的服裝參加總統女兒的婚禮。"},{"w":"craze","p":"[kreiz] n.","d":"A craze is a brief and popular activity or object.","e":"Wearing bright red socks was a craze when I was in high school.","zh":"時尚；風行","ez":"我高中時穿亮紅色襪子曾是一股熱潮。"},{"w":"enlarge","p":"[enˈlaːrdʒ] v.","d":"To enlarge something means to make it bigger.","e":"The classrooms were enlarged over the summer to make room for more students.","zh":"(動) 擴大；放大　(動) 增加；加大","ez":"教室在夏天擴大了，以便容納更多學生。"},{"w":"excess","p":"[ekˈses] n.","d":"An excess is an amount of something that is more than needed or wanted.","e":"Because it never got cold that winter, many stores had an excess of coats.","zh":"(名) [ɪkˋsɛs] 過量；超額　(形) [ˋɛksɛs] 過多的；超出的　(動) 超過；超出","ez":"因為那年冬天從未變冷，許多商店有過剩的外套。"},{"w":"feminine","p":"[ˈfemənin] adj.","d":"If something is feminine, then it has qualities that are commonly related to women.","e":"Many of the older people thought his long hair made him look too feminine.","zh":"(形) 女性的；柔和的　(形) 陰性的；優雅的","ez":"許多長輩覺得他的長髮讓他看起來太女性化。"},{"w":"hallmark","p":"[ˈhɔːlmɑːrk] n.","d":"A hallmark is a unique characteristic of something.","e":"Different types of pasta and tomato sauces are hallmarks of Italian food.","zh":"(名) 特徵；標誌　(動) 標示；表明","ez":"不同種類的義大利麵和番茄醬是義大利食物的特色。"},{"w":"pad","p":"[pæd] n.","d":"A pad is a thick piece of soft material used to protect or clean things.","e":"Football players wear shoulder pads to keep them safe.","zh":"(動) 填塞；墊襯　(名) 墊子；便箋簿","ez":"美式足球員會穿戴護肩來保護安全。"},{"w":"predominant","p":"[priˈdɒmənənt] adj.","d":"If something is predominant, then it is the most important, common or strongest.","e":"Before cars were invented, horses were the predominant method of travel.","zh":"(形) 主要的；占優勢的","ez":"在汽車發明之前，馬匹是主要的旅行方式。"},{"w":"reputable","p":"[repjəˈtəbəl] adj.","d":"If someone or something is reputable, then they have a good reputation.","e":"The service from the less than reputable company made her angry.","zh":"(形) 聲譽好的；可信賴的","ez":"那家信譽不佳的公司提供的服務讓她生氣。"},{"w":"rouge","p":"[ruːʒ] n.","d":"Rouge is a red powder or cream used as makeup on the cheeks or lips.","e":"Even when she didn&rsquo;t wear rouge, her cheeks appeared red.","zh":"(名) 腮紅；口紅　(動) 塗口紅；擦腮紅","ez":"即使她沒有塗腮紅，她的臉頰看起來還是紅潤的。"},{"w":"signify","p":"[ˈsignəfai] v.","d":"To signify means to be a symbol of something.","e":"A red octagon is used to signify to stop.","zh":"(動) 表示；意味著","ez":"紅色八角形用來表示停止。"},{"w":"strap","p":"[stræp] n.","d":"A strap is a thin long piece of fabric used to fasten, carry, or hold something.","e":"She put the strap of her purse over her shoulder and walked out of the door.","zh":"(名) 帶子；皮帶　(動) 用帶子捆紮；束緊","ez":"她把皮包的肩帶掛在肩上，然後走出了門。"},{"w":"tangle","p":"[ˈtæŋgəl] n.","d":"A tangle is something or many things twisted together.","e":"The laces of his shoes were in such a tangle that he could not untie them.","zh":"(動) 纏繞；糾結　(名) 糾纏；混亂","ez":"他的鞋帶纏成一團，以至於他無法解開。"},{"w":"vanity","p":"[ˈvænəti] n.","d":"Vanity is excessive pride or love of one’s own appearance or things one has done.","e":"Her vanity won&rsquo;t allow her to pass a mirror without looking at herself.","zh":"(名) 虛榮心；自負","ez":"她的虛榮心不允許她在經過鏡子時不照一下自己。"},{"w":"vie","p":"[vai] v.","d":"To vie for something means to compete against others for it.","e":"The three boys vied for the prize in the chemistry contest.","zh":"競爭；爭奪","ez":"這三個男孩在化學競賽中爭奪獎品。"},{"w":"vulgar","p":"[ˈvʌlgər] adj.","d":"If something or someone is vulgar, then they are rude or lacking in style.","e":"Her vulgar behavior got her into trouble with her parents.","zh":"(形) 粗俗的；低俗的","ez":"她的粗俗行為讓她惹上了父母的麻煩。"}]},{"id":4,"name":"Unit 4","words":[{"w":"attic","p":"[ˈætik] n.","d":"An attic is a room just below a house’s roof.","e":"There were two windows in their attic.","zh":"(名) 閣樓；頂樓　(形) 古代雅典的；雅典風格的","ez":"他們的閣樓裡有兩扇窗戶。"},{"w":"chunk","p":"[tʃʌŋk] n.","d":"A chunk is a thick, solid piece of something.","e":"When they broke open the rock, they saw it was filled with chunks of gold.","zh":"(名) 厚塊；大塊　(動) 分成塊；投擲","ez":"當他們敲開岩石時，發現裡面充滿了金塊。"},{"w":"civic","p":"[ˈsivik] adj.","d":"If something is civic, then it is related to a town or city, especially its government.","e":"Most of the important civic buildings are located downtown.","zh":"(形) 公民的；市民的　(形) 市政的；城市的","ez":"大多數重要的市政建築都位於市中心。"},{"w":"descent","p":"[diˈsent] n.","d":"A descent is a movement downwards.","e":"During the space shuttle&rsquo;s descent, the Earth became larger and larger.","zh":"(名) 下降；下坡　(名) 血統；祖先　(動) 下降；下去","ez":"在太空梭下降的過程中，地球變得越來越大。"},{"w":"din","p":"[din] n.","d":"A din is loud, unpleasant, and extended noise.","e":"The din of the rusty machinery made the factory a horrible place to work.","zh":"喧囂；嘈雜聲","ez":"生鏽機器的噪音讓這家工廠成為一個可怕的工作場所。"},{"w":"dissatisfy","p":"[dissӕtisfai] v.","d":"To dissatisfy someone means to fail to please them.","e":"He was dissatisfied with his meal.","zh":"使不滿意","ez":"他對自己的餐點感到不滿意。"},{"w":"fuss","p":"[fʌs] n.","d":"A fuss is excited or annoyed behavior that is not useful in any way.","e":"The child made an awful fuss because she didn&rsquo;t want to go to bed.","zh":"(名) 小題大作；麻煩事　(動) 為小事煩惱；大驚小怪　(形) 愛挑剔的；講究的","ez":"這個孩子因為不想上床睡覺而大吵大鬧。"},{"w":"gourmet","p":"[ˈguərmei] adj.","d":"If food is gourmet, then it is nicer and more expensive than regular food.","e":"In order to get a gourmet meal, you have to eat at an expensive restaurant.","zh":"(名) 美食家；讚賞美食的人　(形) 高級的；精選的","ez":"要吃到美食，你必須去昂貴的餐廳用餐。"},{"w":"hence","p":"[hens] adv.","d":"If something happens hence, then it happens as a result of something.","e":"John forgot the key. Hence, we couldn&rsquo;t open the door.","zh":"(副) 因此；所以　(連) 由此；從而","ez":"約翰忘了鑰匙，因此我們無法打開門。"},{"w":"intrinsic","p":"[inˈtrinsik] adj.","d":"If something is intrinsic, then it is related to the basic nature of that thing.","e":"Paper money has no intrinsic value. It is useful simply because society says it is.","zh":"(形) 內在的；本質的　固有的；與生俱來的","ez":"紙幣沒有內在價值，它之所以有用，只是因為社會賦予它價值。"},{"w":"kettle","p":"[ˈketl] n.","d":"A kettle is a large metal pot used for boiling liquids or cooking food.","e":"The soup was being cooked in a large kettle.","zh":"(名) 水壺；茶壺","ez":"湯正在一個大鍋裡煮著。"},{"w":"ministry","p":"[ˈministri] n.","d":"A ministry is a government department.","e":"The Ministry of Trade is responsible for taxing imports and exports.","zh":"(名) 部；閣；ministry　(名) 聖職；宗教事業","ez":"貿易部負責對進出口商品徵稅。"},{"w":"ordeal","p":"[ɔːrdiːəl] n.","d":"An ordeal is a bad experience.","e":"Driving in the snowstorm was an ordeal she&rsquo;d never forget.","zh":"(名) 嚴峻的考驗；磨難","ez":"在暴風雪中開車是她永遠不會忘記的煎熬。"},{"w":"outspoken","p":"[aʊtˈspoukkən] adj.","d":"If someone is outspoken, then they are not afraid to say what they think.","e":"She was an outspoken critic about the new banking laws.","zh":"(形) 直言不諱的；坦率的","ez":"她對新的銀行法規直言不諱地批評。"},{"w":"overwork","p":"[ouvərwəːrk] v.","d":"To overwork someone means to make them tired with too much work.","e":"After working for three weeks with only one day of rest, Judy was overworked.","zh":"(動) [ˌovɚ'wɝk] 過度工作；過勞　(名) ['ovɚˌwɝk] 過度工作；過勞","ez":"連續工作三週只休息一天後，茱蒂過度勞累了。"},{"w":"particular","p":"[pərtikjələr] adj.","d":"If something is particular, then it is a single, important part of a group of things.","e":"The dress shop didn&rsquo;t have the particular dress she was looking for.","zh":"(形) 特定的；特別的","ez":"那家服裝店沒有她正在找的那件特定洋裝。"},{"w":"pungent","p":"[ˈpʌndʒənt] adj.","d":"If something is pungent, then it tastes or smells strong and sharp.","e":"The garlic made the soup taste so pungent that the chef wouldn&rsquo;t serve it.","zh":"(形) 刺鼻的；辛辣的","ez":"大蒜讓湯的味道變得如此辛辣，以至於廚師不願端上桌。"},{"w":"snore","p":"[snɔːr] v.","d":"To snore means to make a loud noise each time a sleeping person breathes.","e":"It was impossible to get to sleep because my husband snored.","zh":"(動) 打鼾；打呼　(名) 打鼾聲","ez":"因為我丈夫打鼾，所以根本無法入睡。"},{"w":"soundly","p":"[ˈsaundli] adv.","d":"If something is done soundly, then it is done in the best or most complete way.","e":"The nearest opponent was ten meters behind. She won the race soundly.","zh":"完全地；徹底地；完好地；完善地","ez":"最近的對手落後十公尺，她輕鬆贏得了比賽。"},{"w":"superintendent","p":"[suːpərinˈtendənt] n.","d":"A superintendent is a person who runs a certain department or building.","e":"The superintendent decided to close the schools because of the weather.","zh":"(名) 監督人；主管；督學","ez":"因為天氣的緣故，督學決定關閉學校。"}]},{"id":5,"name":"Unit 5","words":[{"w":"alternate","p":"[ˈɔ:ltərneit] v.","d":"To alternate means to switch back and forth between two things.","e":"The best exercise alternates muscle and heart strengthening.","zh":"(動) [ˋɔltɚˏnet] 輪流；交替　(形) [ˋɔltɚnɪt] 輪流的；交替的","ez":"最好的運動能交替強化肌肉和心臟。"},{"w":"apologetic","p":"[əˌpɒləˈdʒetik] adj.","d":"If someone is apologetic, they are sorry about something.","e":"The boy felt apologetic after losing his sister&rsquo;s favorite toy.","zh":"表示歉意的；抱歉的；道歉的","ez":"弄丟妹妹最喜歡的玩具後，這個男孩感到非常抱歉。"},{"w":"benign","p":"[biˈnain] adj.","d":"If something or someone is benign, they do not hurt anyone.","e":"Many spiders look scary, but most are actually benign.","zh":"(形) 良性的；無害的　(形) 溫和的；親切的","ez":"許多蜘蛛看起來很可怕，但實際上大多數是無害的。"},{"w":"char","p":"[tʃɑːr] v.","d":"To char means to burn something so that it turns black.","e":"While Frank went inside to get the mustard, he accidentally charred the hotdogs.","zh":"把；燒焦；燒黑；當清潔工；女清潔工；打雜女工","ez":"當法蘭克進屋去拿芥末時，不小心把熱狗烤焦了。"},{"w":"clarify","p":"[ˈklærəfai] v.","d":"To clarify means to make something easier to understand by explaining it.","e":"Drew tried to clarify all the functions of Michelle&rsquo;s new computer.","zh":"(動) 澄清；說明　(動) 使清楚；闡明","ez":"德魯試圖釐清蜜雪兒新電腦的所有功能。"},{"w":"dogged","p":"[ˈdɔ(:)gid] adj.","d":"When someone’s actions are dogged, they try hard to continue something.","e":"Her dad bought her a new jacket after her dogged requests for one.","zh":"(形) 頑固的；執著的　(形) 堅定的；不屈不�撓的","ez":"在她堅持不懈地要求下，爸爸給她買了一件新夾克。"},{"w":"distress","p":"[disˈtres] n.","d":"Distress is the feeling of being upset or worried.","e":"Failing a class caused the student a lot of distress.","zh":"(名) 痛苦；困境　(動) 使痛苦；使煩惱　(形) 感到痛苦的；困頓的","ez":"被當掉一門課讓這個學生感到非常痛苦。"},{"w":"ensue","p":"[inˈsuː] v.","d":"To ensue means to happen after something.","e":"After a few minutes of lightening, thunder ensued.","zh":"(動) 隨之發生；接著發生","ez":"閃電過後幾分鐘，雷聲隨之而來。"},{"w":"gasp","p":"[gæsp] v.","d":"To gasp means to make a noise by quickly breathing in when surprised.","e":"John always gasps when watching a scary movie.","zh":"(動) 喘氣；倒吸一口氣　(名) 喘息聲；倒吸氣聲","ez":"約翰在看恐怖電影時總是會倒吸一口氣。"},{"w":"negotiate","p":"[niˈgouʃieit] v.","d":"To negotiate means to try to make an agreement through discussion.","e":"Mario and Joe took a long time negotiating the contract between the companies.","zh":"(動) 談判；協商　(動) 克服；度過","ez":"馬里奧和喬花了很長時間協商兩家公司之間的合約。"},{"w":"overdose","p":"[ˈouvərdous] n.","d":"An overdose is an instance of taking or having too much of something.","e":"John&rsquo;s skin was burned from an overdose of sunshine.","zh":"過量；超劑量；過量；太多；過量服藥；吃得太多","ez":"約翰的皮膚因過度曝曬而燒傷。"},{"w":"persuasion","p":"[pərˈsweiʒən] n.","d":"Persuasion is the act of making someone do or believe something.","e":"The persuasion of his argument convinced the customer to buy the laptop.","zh":"(名) 說服；勸說","ez":"他論點的說服力讓顧客決定購買這台筆記型電腦。"},{"w":"relay","p":"[ˈriːlei] n.","d":"A relay is a race in which teams of runners or swimmers race against each other.","e":"Jerry was the fastest on his team, so he ran the last part of the relay.","zh":"(動) 傳達；轉發","ez":"傑瑞是隊上最快的，所以他跑了接力賽的最後一棒。"},{"w":"reluctance","p":"[riˈlʌktəns] n.","d":"Reluctance is a feeling of not wanting to do something.","e":"Jesse took out the trash with great reluctance.","zh":"(名) 不情願；勉強","ez":"傑西非常不情願地出去倒垃圾。"},{"w":"restate","p":"[riːˈsteit] v.","d":"To restate something means to say it again or in a different way.","e":"Mrs. Jones restated the test question to the class.","zh":"(動) 重述；重新陳述","ez":"瓊斯太太向全班重新陳述了考試題目。"},{"w":"sesame","p":"[ˈsesəmi] n.","d":"Sesame is an herb that is grown for its small seeds and its oil.","e":"I used the buns with the sesame seeds on them.","zh":"芝麻","ez":"我用了那些有芝麻的麵包。"},{"w":"sip","p":"[sip] v.","d":"To sip something means to drink a small amount at a time.","e":"Liza relaxed on the beach, sipping fruit juice through a straw.","zh":"(名) 一小口　(動) 小口喝；啜飲","ez":"麗莎在海灘上放鬆，用吸管喝著果汁。"},{"w":"verge","p":"[vəːrdʒ] n.","d":"The verge is the point at which something is about to happen.","e":"Joan was on the verge of leaving her house when the phone rang.","zh":"(名) 邊緣；邊界　(動) 瀕臨；接近","ez":"瓊正要離開家時，電話響了。"},{"w":"wary","p":"[ˈwɛəri] adj.","d":"If someone is wary, they are cautious or mistrusting.","e":"She was wary of going to school because she hadn&rsquo;t done her homework.","zh":"(形) 謹慎的；警戒的","ez":"她因為沒做功課而對上學感到戒慎恐懼。"},{"w":"waver","p":"[ˈweivə:r] v.","d":"To waver is to be unable to decide between two choices.","e":"I wavered between eating the apple or the cake for a snack.","zh":"(動) 動搖；猶豫","ez":"我在吃蘋果還是蛋糕當點心之間猶豫不決。"}]},{"id":6,"name":"Unit 6","words":[{"w":"ashore","p":"[əˈʃɔːr] adv.","d":"If something goes ashore, it goes from water to the land.","e":"After a long day of fishing, Glen pulled his boat ashore, so it wouldn&rsquo;t float away.","zh":"(副) 靠岸；登陸　(形) 在岸上的；陸上的","ez":"釣了一整天的魚後，葛蘭把船拖上岸，以免船漂走。"},{"w":"contradict","p":"[ˌkɒntrəˈdikt] v.","d":"To contradict means to state the opposite of what someone else has.","e":"Ken was always fighting with his little sister because she kept contradicting him.","zh":"(動) 與...相矛盾；反駁　(動) 否認；否定","ez":"肯恩老是跟妹妹吵架，因為她總是反駁他。"},{"w":"counterpart","p":"[ˈkauntərpɑːrt] v.","d":"A counterpart is something that is very similar to something else in what it does.","e":"Our manager will meet our rival company&rsquo;s counterpart later today.","zh":"(名) 對應的人；對等物　(名) 相似的東西；同類人物","ez":"我們經理今天稍晚會和對手公司的對應人員見面。"},{"w":"devoid","p":"[diˈvɔid] adj.","d":"When something or someone is devoid of a thing, they are missing it.","e":"The movie was devoid of any violence, so it was a perfect movie for the family.","zh":"(形) 完全缺乏的；沒有的　(動) 使空出；清空","ez":"這部電影完全沒有暴力場面，非常適合闔家觀賞。"},{"w":"diverge","p":"[diˈvəːrdʒ] v.","d":"To diverge is to become different or to follow a different direction.","e":"The road diverged into two paths that led to our houses.","zh":"(動) 分岔；分開　(動) 偏離；背離","ez":"道路分岔成兩條小徑，分別通往我們的家。"},{"w":"elude","p":"[iˈluːd] v.","d":"To elude means to avoid being caught by something.","e":"The rabbit eluded the wolf by hiding in a bush.","zh":"(動) 逃脫；躲避　(動) 使困惑；難以理解","ez":"兔子躲在灌木叢裡，躲過了狼的追捕。"},{"w":"embryo","p":"[ˈembriou] n.","d":"An embryo is a human or animal that is still growing inside its mother.","e":"Some doctors say that what a mother eats has a big effect on her embryo.","zh":"(名) 胚胎；初期形態","ez":"有些醫生說，母親吃的東西對胎兒影響很大。"},{"w":"fend","p":"[fend] v.","d":"To fend off something means to push it away and avoid it.","e":"Dave spent all night fending off bugs instead of sleeping.","zh":"(動) 自衛；防守　(動) 照顧；養活","ez":"戴夫整晚都在趕蟲子，根本沒睡。"},{"w":"fictitious","p":"[fikˈtiʃəs] adj.","d":"When something is fictitious, it is made up and not real.","e":"The author said that the characters in her book were completely fictitious.","zh":"(形) 虛構的；假的　(形) 臆造的；捏造的","ez":"作者說她書裡的角色全是虛構的。"},{"w":"gazette","p":"[gəˈzet] n.","d":"A gazette is a newspaper.","e":"Alice wants to write for a gazette when she&rsquo;s older.","zh":" 報","ez":"愛麗絲長大後想為報社撰稿。"},{"w":"homogeneous","p":"[ˌhouməˈdʒiːniəs] adj.","d":"If something is homogeneous, it is made up of things which are all the same.","e":"All of the houses on Victor&rsquo;s block were boring and homogenous.","zh":"(形) 同類的；成分相同的　(形) 均勻的；一致的","ez":"維克多住的街區裡，所有房子都很單調，千篇一律。"},{"w":"obstruct","p":"[əbˈstrʌkt] v.","d":"To obstruct something means to get in its way.","e":"The car broke down on the road and obstructed traffic for hours.","zh":"(動) 阻擋；妨礙　(動) 堵塞；阻止","ez":"車子在路上拋錨，堵了好幾個小時的車。"},{"w":"plunge","p":"[plʌndʒ] v.","d":"To plunge means to move down into something very quickly.","e":"The water in the pool was very cold, but the boy plunged in anyway.","zh":"(動) 投入；跳入","ez":"池水很冷，但男孩還是跳了進去。"},{"w":"prolong","p":"[prouˈlɔ:ŋ] v.","d":"To prolong means to make something last for a longer time.","e":"Sandy walked slowly across the beach, trying to prolong her lunch break.","zh":"延長；拖延","ez":"珊蒂慢慢走過沙灘，想延長她的午休時間。"},{"w":"publicize","p":"[ˈpʌbləsaiz] v.","d":"To publicize is to make something get a lot of attention.","e":"The company publicized the job positions in the newspaper.","zh":"(動) 宣傳；公布","ez":"公司在報紙上公布了職缺。"},{"w":"sparse","p":"[spɑːrs] adj.","d":"If something is sparse, there is not very much of it in a big area.","e":"Rob spent Saturday in his garden, clearing out the sparse weeds.","zh":"(形) 稀疏的；稀少的","ez":"羅伯週六在花園裡清理稀疏的雜草。"},{"w":"surplus","p":"[ˈsəːrplʌs] n.","d":"A surplus is an extra amount of something.","e":"The store sold their surplus items on sale.","zh":"(名) 盈餘；剩餘　(形) 過剩的；多餘的","ez":"這家店把多餘的商品打折出售。"},{"w":"theorize","p":"[ˈθi:əraiz] v.","d":"To theorize means to develop ideas about something.","e":"They enjoyed theorizing about how things worked.","zh":"(動) 理論化；推論","ez":"他們喜歡推測事物運作的原理。"},{"w":"verify","p":"[ˈverəfai] v.","d":"To verify means to find out if something is true.","e":"Julian called the movie theater to verify that the movie started at nine.","zh":"(動) 驗證；核實","ez":"朱利安打電話到電影院確認電影九點開演。"},{"w":"vigorous","p":"[ˈvigərəs] adj.","d":"If something or someone is vigorous, they use a lot of energy.","e":"Henry uses vigorous exercise to keep himself in shape.","zh":"(形) 強有力的；充滿活力的","ez":"亨利靠劇烈運動來保持身材。"}]},{"id":7,"name":"Unit 7","words":[{"w":"altar","p":"[ˈɔ:ltər] n.","d":"An altar is a table used in churches.","e":"The altar had many lit candles on it.","zh":"(名) 祭壇；聖壇　(動) 改變；修改","ez":"祭壇上點了很多蠟燭。"},{"w":"arthritis","p":"[ɑːrˈθraitis] n.","d":"Arthritis is an illness causing pain and swelling in a person’s joints.","e":"Agatha couldn&rsquo;t play the piano anymore because of her arthritis.","zh":"關節炎","ez":"阿嘉莎因為關節炎，沒辦法再彈鋼琴了。"},{"w":"botany","p":"[ˈbɒtəni] n.","d":"Botany is the study of plants.","e":"Gardens are the best places for botany.","zh":"(名) 植物學；植物研究","ez":"花園是研究植物學最好的地方。"},{"w":"credible","p":"[ˈkredəbəl] adj.","d":"If something or someone is credible, they can be believed or trusted.","e":"Dick gave a credible reason for being late and didn&rsquo;t get in any trouble.","zh":"(形) 可信的；可靠的　(形) 令人相信的；合理的","ez":"迪克為遲到給了一個可信的理由，因此沒惹上麻煩。"},{"w":"deceased","p":"[diˈsiːst] adj.","d":"If someone is deceased, they are dead.","e":"We visited the graves of our deceased grandparents.","zh":"(形) 已故的；死亡的　(名) 已故者；死者","ez":"我們去掃了已故祖父母的墓。"},{"w":"deception","p":"[diˈsepʃən] n.","d":"Deception is the act of lying or tricking someone.","e":"The magic looked very real, but it was only deception.","zh":"欺騙；欺詐；隱瞞","ez":"魔術看起來很逼真，但其實只是騙術。"},{"w":"decipher","p":"[diˈsaifər] v.","d":"To decipher writing is to figure out what it says.","e":"My teacher complained that she couldn&rsquo;t decipher my essay.","zh":"辨認；破解；破譯","ez":"我的老師抱怨說她看不懂我的文章。"},{"w":"dung","p":"[dʌŋ] n.","d":"Dung is solid waste material produced by animals.","e":"There was cow dung all over the field.","zh":"糞便","ez":"田野裡到處都是牛糞。"},{"w":"dusk","p":"[dʌsk] n.","d":"Dusk is the time in the evening when it begins to get dark.","e":"After dusk, Hannah would catch fireflies in the park.","zh":"(名) 黃昏；薄暮　(形) 昏暗的；陰暗的","ez":"黃昏過後，漢娜會在公園裡抓螢火蟲。"},{"w":"gratify","p":"[ˈgrætəfai] v.","d":"To gratify someone means to please them.","e":"Bonnie was gratified after receiving her gift from her parents.","zh":"(動) 使滿足；令人高興　(動) 滿足願望；實現願望","ez":"邦妮收到父母的禮物後，感到非常滿足。"},{"w":"hone","p":"[houn] v.","d":"To hone something is to improve it and make it very good.","e":"Lisa honed her chess skills by hours and hours of practice.","zh":"使；把；磨練；磨礪；訓練","ez":"麗莎經過好幾個小時的練習，磨練了她的棋藝。"},{"w":"mash","p":"[mæʃ] v.","d":"To mash something is to crush it so that it is soft.","e":"We mashed the hard potatoes and served them for dinner.","zh":"(動) 搗碎；壓爛　(名) 混合物；馬鈴薯泥","ez":"我們把硬邦邦的馬鈴薯搗碎，當作晚餐。"},{"w":"ornate","p":"[ɔːrˈneit] adj.","d":"If something is ornate, it is decorated with a lot of fancy things.","e":"Kim&rsquo;s prom dress was very expensive since it was so ornate.","zh":"(形) 華麗的；裝飾華美的","ez":"金的畢業舞會禮服非常昂貴，因為它很華麗。"},{"w":"pneumonia","p":"[njuːˈmounjə] n.","d":"Pneumonia is a dangerous illness causing the lungs to fill with liquid.","e":"Elaine got pneumonia after playing outside in the rain without a coat.","zh":"(名) 肺炎","ez":"伊蓮沒穿外套在雨中玩耍，結果得了肺炎。"},{"w":"psychic","p":"[ˈsaikik] adj.","d":"When someone is psychic, they know what will happen or what people think.","e":"I think my grandmother has psychic abilities because she can predict anything.","zh":"(名) 靈媒；通靈者　(形) 心靈的；超自然的","ez":"我覺得我奶奶有特異功能，因為她什麼都能預測。"},{"w":"psychotic","p":"[saiˈkɒtik] adj.","d":"If someone is psychotic, they have a very serious mental illness.","e":"The psychotic patient believed he saw things that weren&rsquo;t real.","zh":"精神病的；患精神病的","ez":"那個精神病患相信自己看到了不存在的東西。"},{"w":"scope","p":"[skoup] n.","d":"The scope of something is how many people or things it relates to.","e":"Modern history has a wide scope.","zh":"(名) 範圍；餘地","ez":"現代史的範圍很廣。"},{"w":"sinister","p":"[ˈsinistə:r] adj.","d":"If something or someone is sinister, they are evil.","e":"Bad guys in most movies have sinister laughs.","zh":"(形) 不祥的；邪惡的","ez":"大部分電影裡的反派都有陰險的笑聲。"},{"w":"strife","p":"[straif] n.","d":"Strife is disagreement or fighting between people or groups.","e":"There was a lot of strife between Jim and Lisa about what TV show to watch.","zh":"衝突；糾紛；爭吵","ez":"吉姆和麗莎為了看什麼電視節目而爭執不休。"},{"w":"therapeutic","p":"[ˌθerəˈpjuːtik] adj.","d":"If something is therapeutic, it helps to cure a disease or makes you healthier.","e":"After a stressful day of working, Phoebe would take a therapeutic bath.","zh":"(形) 治療的；有療效的","ez":"菲比在辛苦工作一天後，會泡個療癒的澡。"}]},{"id":8,"name":"Unit 8","words":[{"w":"congested","p":"[kənˈdʒestid] adj.","d":"If something is congested, it is full or blocked.","e":"Tom didn&rsquo;t get home until after dark because the road was so congested.","zh":"(形) 擁擠的；堵塞的　(形) 充滿的；擠滿的","ez":"湯姆因為道路太擁擠，天黑後才到家。"},{"w":"courier","p":"[ˈkuriər] n.","d":"A courier is someone who takes and delivers mail or packages.","e":"Before trains, most couriers used horses to travel.","zh":"(名) 快遞員；信差　(名) 快遞服務；傳遞","ez":"在火車出現之前，大多數信差都騎馬傳送訊息。"},{"w":"deform","p":"[diˈfɔːrm] v.","d":"To deform something means to change it from its correct or original shape.","e":"The computer program deformed the building&rsquo;s picture into an unreal sight.","zh":"使變形；使扭曲；變形","ez":"電腦程式把建築物的圖片扭曲成不真實的景象。"},{"w":"etiquette","p":"[ˈetiket] n.","d":"Etiquette is the group of rules about how to be polite.","e":"When in Asian countries, bowing is a form of etiquette.","zh":"(名) 禮儀；禮節　(名) 餐桌禮儀；社交禮儀","ez":"在亞洲國家，鞠躬是一種禮儀。"},{"w":"exclusive","p":"[iksˈkluːsiv] adj.","d":"If something is exclusive, it is expensive and only for rich people.","e":"The golf course was so exclusive that most people hadn&rsquo;t even heard of it.","zh":"(形) 獨家的；專有的　(形) 高級的；限制性的","ez":"這個高爾夫球場非常私密，大多數人甚至沒聽過。"},{"w":"freight","p":"[freit] n.","d":"Freight is a set of items carried on a train, boat, or airplane.","e":"Trade ships only carried valuable freight like silk and spices.","zh":"(名) 貨物；運費　(動) 裝貨；運送貨物","ez":"貿易船隻只運載貴重貨物，例如絲綢和香料。"},{"w":"garment","p":"[ˈgɑːrmənt] n.","d":"A garment is a piece of clothing.","e":"The business man had all of his garments cleaned before the important meeting.","zh":"(名) 衣服；服裝　(名) 衣著；外衣","ez":"那位商人在重要會議前，把所有衣服都送洗了。"},{"w":"insomnia","p":"[inˈsɒmniə] n.","d":"Insomnia is a condition in which a person has difficulty sleeping.","e":"Nate&rsquo;s insomnia prevented him from getting enough rest.","zh":"(名) 失眠；失眠症","ez":"奈特的失眠症讓他無法獲得足夠的休息。"},{"w":"intuitive","p":"[inˈtjuːitiv] adj.","d":"Intuitive is knowing about something without naturally having support or proof.","e":"Rhonda had an intuitive feeling that Shane wasn&rsquo;t coming to school today.","zh":"(形) 直覺的；憑直覺的　(副) 直覺地；憑直覺","ez":"朗妲有種直覺，覺得尚恩今天不會來學校。"},{"w":"liable","p":"[ˈlaiəbəl] adj.","d":"If something is liable to happen, it is very likely that it will happen.","e":"During the summer months, hikers in the forest are liable to see deer and elk.","zh":"(形) 可能的；容易的　(形) 有責任的；需要負責的","ez":"夏季時，森林裡的健行者很容易看到鹿和麋鹿。"},{"w":"obsess","p":"[əbˈses] v.","d":"To obsess about something means to think about it all of the time.","e":"After watching the Star Wars movies, Ike obsessed about becoming a Jedi.","zh":"(動) 沉迷於；執著於　(動) 使著迷；使困擾","ez":"看完星際大戰電影後，艾克著迷於成為絕地武士。"},{"w":"overboard","p":"[ˈouvərbɔːrd] adv.","d":"When something is overboard, it is over the side of a boat and in the water.","e":"Tom and Gary slipped on the wet floor and fell overboard.","zh":"從船上落入水中","ez":"湯姆和蓋瑞在濕滑的地板上滑倒，掉進了水裡。"},{"w":"premium","p":"[ˈpriːmiəm] n.","d":"A premium is a payment that is higher than average.","e":"Tony paid for premium gas because it made his car run the best.","zh":"(名) 保費；獎金　(形) 高級的；優質的","ez":"東尼付錢加高級汽油，因為這能讓他的車跑得最好。"},{"w":"privilege","p":"[ˈprivəlidʒ] n.","d":"A privilege is a special right given to only a certain person or group of people.","e":"Only the best employee had the privilege of parking in that spot.","zh":"(名) 特權；優待　(動) 給予特權","ez":"只有最優秀的員工才有特權停在那個車位。"},{"w":"propel","p":"[prəˈpel] v.","d":"To propel something means to push or move it somewhere.","e":"The strong wind propelled the leaf through the air and across the street.","zh":"(動) 推進；驅動","ez":"強風吹動樹葉，讓它飄過空中並越過街道。"},{"w":"socialize","p":"[ˈsouʃəlaiz] v.","d":"To socialize is to have a good time with people.","e":"I like to socialize with my classmates after school.","zh":"(動) 社交；交際","ez":"我喜歡放學後和同學們社交。"},{"w":"suppress","p":"[səˈpres] v.","d":"To suppress something means to prevent it from happening.","e":"She suppressed her urge to scream because she didn&rsquo;t want to be noticed.","zh":"(動) 壓制；抑制","ez":"她壓抑住想尖叫的衝動，因為不想被注意到。"},{"w":"tram","p":"[træm] n.","d":"A tram is a vehicle like a streetcar that runs on electricity above ground.","e":"I took the tram to Eighth Avenue.","zh":"有軌電車","ez":"我搭電車到第八大道。"},{"w":"unsettle","p":"[ˈʌnˈsetl] v.","d":"To unsettle someone means to make them anxious or worried.","e":"The dark clouds in the sky unsettled Beth.","zh":"(動) 使不安；擾亂","ez":"天空中的烏雲讓貝絲感到不安。"},{"w":"warp","p":"[wɔːrp] v.","d":"To warp means to become bent into the wrong shape.","e":"The woman put the clock above the fireplace, and the heat warped it.","zh":"(動) 使變形；扭曲","ez":"女人把時鐘放在壁爐上方，熱氣讓它變形了。"}]},{"id":9,"name":"Unit 9","words":[{"w":"artery","p":"[ˈɑːrtəri] n.","d":"An artery is a tube that takes blood from the heart to the rest of the body.","e":"Eating healthily keeps your arteries clean, so blood can flow with ease.","zh":"(名) 動脈；幹線","ez":"健康飲食能保持動脈乾淨，讓血液順暢流動。"},{"w":"deterioration","p":"[diˌtiəriəˈreiʃən] n.","d":"Deterioration is the act of becoming worse.","e":"The lack of care led to the deterioration of the house.","zh":"(名) 惡化；衰退　(名) 品質下降；損壞","ez":"缺乏照顧導致房子逐漸損壞。"},{"w":"elusive","p":"[iˈluːsiv] adj.","d":"If something or someone is elusive, they are hard to find.","e":"The elusive fish only came out at night.","zh":"(形) 難以捉摸的；難以找到的","ez":"這種難以捉摸的魚只在夜間出現。"},{"w":"forage","p":"[ˈfɔ:ridʒ] v.","d":"To forage means to look around for food.","e":"Many animals hide food in the fall since little can be foraged in winter.","zh":"(動) 尋找食物；覓食　(名) 飼料；草料","ez":"許多動物在秋天藏食物，因為冬天幾乎找不到東西吃。"},{"w":"impede","p":"[imˈpiːd] v.","d":"To impede something means to keep it from moving or going forward.","e":"The barrier impeded our ability to get closer to the building.","zh":"(動) 阻礙；妨礙　(動) 延緩；阻止","ez":"障礙物阻礙了我們靠近那棟建築物。"},{"w":"induce","p":"[inˈdjuːs] v.","d":"To induce something means to make it happen.","e":"Running without good shoes may induce leg pain.","zh":"(動) 引起；導致　(動) 誘導；勸說","ez":"穿不好的鞋子跑步可能會引起腿痛。"},{"w":"inseparable","p":"[inˈsepərəbəl] adj.","d":"If two things are inseparable, they can’t be separated.","e":"Denise and Diana have been inseparable since they first met.","zh":"(形) 不可分離的；密不可分的","ez":"丹妮絲和黛安娜從第一次見面就形影不離。"},{"w":"invalid","p":"[ˈinvælid] adj.","d":"If something is invalid, it is not correct.","e":"The way to winning debates is to avoid invalid arguments.","zh":"(形) 無效的；作廢的　(名) 病人；患者","ez":"贏得辯論的方法就是避免無效的論點。"},{"w":"magnify","p":"[ˈmægnəfai] v.","d":"To magnify something means to make it look bigger than it really is.","e":"Astronomers use telescopes to magnify far-away stars.","zh":"(動) 放大；擴大　(動) 誇大；渲染","ez":"天文學家用望遠鏡放大遙遠的星星。"},{"w":"mainstream","p":"[ˈmeinstriːm] n.","d":"The mainstream is a group of ideas that are considered normal and accepted.","e":"Before punk rock music became part of the mainstream, only a few people liked it.","zh":"(名) 主流；潮流　(形) 主流的；流行的","ez":"在龐克搖滾音樂成為主流之前，只有少數人喜歡它。"},{"w":"microbe","p":"[ˈmaikroub] n.","d":"A microbe is a very small living thing that often makes people sick.","e":"The first step in curing a disease is finding the microbe that causes the disease.","zh":"微生物；細菌","ez":"治療疾病的第一步是找出引起疾病的微生物。"},{"w":"negligible","p":"[ˈneglidʒəbəl] adj.","d":"If something is negligible, it is extremely small and not important.","e":"The amount she owed was negligible. It was less than ten cents.","zh":"(形) 可以忽略的；微不足道的　(形) 極少的；不重要的","ez":"她欠的金額微不足道，不到十美分。"},{"w":"paralysis","p":"[pəˈræləsis] n.","d":"Paralysis is the loss of the ability to move all or part of your body.","e":"His paralysis meant that he had to use a wheelchair to get around.","zh":"(名) 麻痺；癱瘓","ez":"他的癱瘓意味著他必須用輪椅行動。"},{"w":"pest","p":"[pest] n.","d":"A pest is an animal or insect that hurts plants or food.","e":"Many farmers put up scarecrows to keep pests off of their corn.","zh":"(名) 害蟲；討厭的人或物","ez":"許多農民豎起稻草人來防止害蟲破壞玉米。"},{"w":"prevail","p":"[priˈveil] v.","d":"To prevail means to be accepted or very common.","e":"Unfortunately, injustice still prevails in the country&rsquo;s court system.","zh":"(動) 戰勝；盛行","ez":"不幸的是，這個國家的法院系統仍然存在不公。"},{"w":"respiration","p":"[ˌrespəˈreiʃən] n.","d":"Respiration is the act of breathing.","e":"Artificial respiration is the best thing to do if someone stops breathing.","zh":"(名) 呼吸","ez":"如果有人停止呼吸，人工呼吸是最好的處理方式。"},{"w":"rupture","p":"[ˈrʌptʃə:r] v.","d":"To rupture means to tear or burst open.","e":"Sarah put too much water into the balloon, and it ruptured.","zh":"(名) [`rʌptʃɚ] 破裂；斷裂　(動) [rʌp`tʃɚ] 破裂；斷裂","ez":"莎拉在氣球裡裝了太多水，結果它破裂了。"},{"w":"savage","p":"[ˈsævidʒ] adj.","d":"If something or someone is savage, they are very violent or cruel.","e":"Wild animals are very savage when defending their babies.","zh":"(形) 野蠻的；兇猛的；猛烈的","ez":"野生動物在保護幼崽時非常兇猛。"},{"w":"stun","p":"[stʌn] v.","d":"To stun someone means to make them unable to speak due to surprise or shock.","e":"Tim fell off the swing and was too stunned to cry.","zh":"(動) 使震驚；使目瞪口呆","ez":"提姆從鞦韆上摔下來，嚇得哭不出來。"},{"w":"susceptible","p":"[səˈseptəbəl] adj.","d":"If one is susceptible to something like disease, they are easily harmed by it.","e":"Not eating enough vegetables makes you more susceptible to getting sick.","zh":"(形) 易受影響的；易感染的","ez":"蔬菜吃得不夠會讓你更容易生病。"}]},{"id":10,"name":"Unit 10","words":[{"w":"accumulate","p":"[əˈkjuːmjəleit] v.","d":"To accumulate something is to collect a lot of it over time.","e":"The mail accumulated in their mailbox while they were on vacation.","zh":"(動) 積累；累積","ez":"他們度假時，郵件在信箱裡累積起來。"},{"w":"aerial","p":"[ˈɛəriəl] adj.","d":"When something is aerial, it relates to being in the air or flying.","e":"The aerial photographer took pictures from the air balloon.","zh":"(形) 空中的；從空中的　(名) 天線；空中的東西","ez":"空中攝影師從熱氣球上拍照。"},{"w":"apparatus","p":"[ˌæpəˈræitəs] n.","d":"An apparatus is a device used for a particular purpose.","e":"The campers had an apparatus that showed them their exact location.","zh":"(名) 儀器；裝置　(名) 器材；設備","ez":"露營者有一個裝置可以顯示他們的確切位置。"},{"w":"avalanche","p":"[ˈævəlæntʃ] n.","d":"An avalanche is a large amount of snow, ice, and rock falling off a mountain.","e":"The avalanche destroyed the mountain village.","zh":"(名) 雪崩；山洪　(動) 崩落；大量滑落","ez":"雪崩摧毀了山村。"},{"w":"consistency","p":"[kənˈsistənsi] n.","d":"Consistency is the state of always behaving in the same way.","e":"Her consistency in archery meant that our team had a chance to win.","zh":"(名) 一致性；貫徹性　(名) 濃稠度；黏稠度","ez":"她在射箭上的穩定表現讓我們隊有機會獲勝。"},{"w":"convection","p":"[kənˈvekʃən] n.","d":"Convection is the flow of hot air through gas or liquid.","e":"The weather changed because of convection in the atmosphere.","zh":"對流","ez":"天氣因為大氣中的對流而改變。"},{"w":"discharge","p":"[ˈdistʃɑːrdʒ] v.","d":"To discharge someone is to allow them to leave from a place, usually a hospital.","e":"I was discharged from the hospital after three days.","zh":"(名) ['dɪstʃɑrdʒ] 釋放；流出物　(動) [dɪs'tʃɑrdʒ] 釋放；排放","ez":"三天後我出院了。"},{"w":"intact","p":"[inˈtækt] adj.","d":"When something is intact, it is complete and not damaged.","e":"Despite being over ten years old, my father&rsquo;s model ship is still intact.","zh":"(形) 完整的；未損壞的　(形) 未受影響的；保持原狀的","ez":"儘管已經超過十年，我父親的模型船仍然完好無損。"},{"w":"mortal","p":"[ˈmɔːrtl] adj.","d":"When a person is mortal, they cannot live forever.","e":"All people are mortal.","zh":"(形) 致命的；會導致死亡的　(形) 凡人的；人類的","ez":"所有人都會死。"},{"w":"omen","p":"[ˈɑumən] n.","d":"An omen is a sign of what will happen in the future.","e":"He thought that seeing a black cat in the street was an omen of bad luck.","zh":"預兆；徵兆；兆頭","ez":"他認為在街上看到黑貓是厄運的預兆。"},{"w":"overcast","p":"[ˈouvərˈkæst] adj.","d":"When the sky is overcast, it is full of clouds and is not sunny.","e":"The sky was overcast in the morning, but by noon it was bright again.","zh":"(形) 陰天的；多雲的　(動) 遮蔽；使陰暗","ez":"早上天空陰沉，但到了中午又明亮起來。"},{"w":"poignant","p":"[ˈpɔinjənt] adj.","d":"When something is poignant, it causes a very strong feeling of sadness.","e":"The girls cried at the end of the poignant movie.","zh":"(形) 令人心酸的；深刻的","ez":"女孩們在感人的電影結尾哭了。"},{"w":"ranger","p":"[ˈreindʒə:r] n.","d":"A ranger is a person who protects the forest or parks.","e":"Peter wanted to be a ranger because he liked spending time outside.","zh":"護林員；園林管理工；國際女童軍成員","ez":"彼得想當護林員，因為他喜歡待在戶外。"},{"w":"rubble","p":"[ˈrʌbəl] n.","d":"Rubble is piles of broken stone and wood created after a building is destroyed.","e":"There was rubble all over the city after the earthquake.","zh":"瓦礫堆；碎磚爛瓦；碎石；石子；碎石；毛石","ez":"地震後，城市裡到處都是瓦礫。"},{"w":"seclude","p":"[siˈklu:d] v.","d":"To seclude someone means to keep them away from other people.","e":"She was secluded on an island for over a year.","zh":"(動) 使隔離；使隱居","ez":"她被隔離在島上超過一年。"},{"w":"sideways","p":"[ˈsaidˌweiz] adv.","d":"If something moves sideways, then it moves to or from the side.","e":"Jim turned sideways in order to slow down and stop his snowboard.","zh":"(副) 斜向一邊地；側面地","ez":"吉姆側身轉向，以減速並停下他的滑雪板。"},{"w":"sob","p":"[sɒb] v.","d":"To sob is to cry loudly.","e":"I sobbed when my youngest daughter got married.","zh":"(動) 啜泣；嗚咽","ez":"我最小的女兒結婚時，我啜泣了起來。"},{"w":"sober","p":"[ˈsoubə:r] adj.","d":"When something or someone is sober, they are serious and calm.","e":"After the funeral, everybody felt very sober.","zh":"(形) 清醒的；未醉的","ez":"葬禮後，每個人都感到非常沉重。"},{"w":"speck","p":"[spek] n.","d":"A speck is a very small mark or amount.","e":"A speck of blood appeared where the mosquito bit him.","zh":"小點；斑點；小片","ez":"蚊子咬他的地方出現了一小點血。"},{"w":"upbringing","p":"[ˈʌpˌbriŋiŋ] n.","d":"An upbringing is the way that someone is taught to behave by their parents.","e":"He had a strict upbringing and was never allowed to watch television.","zh":"(名) 教養；養育","ez":"他從小受到嚴格管教，從來不被允許看電視。"}]},{"id":11,"name":"Unit 11","words":[{"w":"advocate","p":"[ˈædvəkeit] v.","d":"To advocate a plan or idea is to support or suggest it in public.","e":"The group advocated increased spending on education and schools.","zh":"(動) 提倡；主張　(名) 提倡者；律師","ez":"該團體主張增加教育和學校的經費。"},{"w":"authorize","p":"[ˈɔːθəraiz] v.","d":"To authorize something means to give permission for it.","e":"The mayor authorized the construction of a new statue in the park.","zh":"(動) 授權；批准　(動) 允許；核准","ez":"市長授權在公園內建造一座新雕像。"},{"w":"civilian","p":"[siˈviljən] n.","d":"A civilian is someone who is not in the military.","e":"It was Todd&rsquo;s job to keep civilians from entering the army facility.","zh":"(名) 平民；民眾　(形) 民間的；非軍事的","ez":"阻止平民進入軍事設施是陶德的職責。"},{"w":"commodity","p":"[kəˈmɒdəti] n.","d":"A commodity is something that can be bought or sold.","e":"Fran&rsquo;s uncle made most of his money trading commodities.","zh":"(名) 商品；物品　(名) 日用品；農產品","ez":"法蘭的叔叔主要透過交易大宗商品賺錢。"},{"w":"conquest","p":"[ˈkɒŋkwest] n.","d":"A conquest is an event by which one country takes over another country.","e":"After the conquest, the people of the small city had no freedom.","zh":"(名) 征服；征兆　(動) 征服；攻佔","ez":"征服之後，小城的人民失去了自由。"},{"w":"disclose","p":"[disˈklouz] v.","d":"To disclose something means to tell it to someone else.","e":"John came home late, so he had to disclose his activities to his wife.","zh":"(動) 揭露；披露　透露；洩露","ez":"約翰晚回家，所以他必須向妻子交代他的行蹤。"},{"w":"dynamics","p":"[daiˈnæmiks] n.","d":"The dynamics of a situation are the way that parts of it affect each other.","e":"A good psychologist needs to know a lot about the dynamics of brain disorders.","zh":"動力；變革動力；力度變化；動力學；力學","ez":"一位好的心理學家需要深入了解腦部疾病的動態。"},{"w":"enroll","p":"[enˈroul] v.","d":"To enroll in something is to put one’s name on a list as a member of a group.","e":"The students had to enroll in the class one semester in advance.","zh":"(動) 入學；報名　參加；登記","ez":"學生必須提前一學期註冊該課程。"},{"w":"envious","p":"[ˈenviəs] adj.","d":"When someone is envious, they want something that another person has.","e":"They were envious of their neighbor&rsquo;s front yard.","zh":"(形) 嫉妒的；羨慕的　(形) 引人嫉妒的；令人羨慕的","ez":"他們羨慕鄰居的前院。"},{"w":"euphoria","p":"[juːˈfɔːriə] n.","d":"Euphoria is a feeling of extreme happiness.","e":"The athlete felt euphoria after he won the important game.","zh":"(名) 極度的幸福感；欣喜若狂","ez":"這位運動員贏得重要比賽後感到極度興奮。"},{"w":"festive","p":"[ˈfestiv] adj.","d":"When something is festive, it is happy and related to a party or celebration.","e":"Dean&rsquo;s favorite part of Christmas is the festive clothing that people wear.","zh":"(形) 歡樂的；節慶的　(形) 充滿喜慶氣氛的","ez":"迪恩最喜歡聖誕節的部分是人們穿的節慶服裝。"},{"w":"jolly","p":"[ˈdʒɒli] adj.","d":"When someone is jolly, they are cheerful and happy.","e":"My grandmother&rsquo;s jolly attitude always made me smile.","zh":"(形) 快樂的；愉快的　(形) 熱鬧的；歡樂的","ez":"我祖母開朗的態度總是讓我微笑。"},{"w":"lentil","p":"[ˈlentil] n.","d":"Lentils are very small beans that people cook and eat.","e":"Danni made her special soup with lentils when her husband was sick.","zh":"小扁豆；兵豆","ez":"丹妮在她丈夫生病時用扁豆做了特製湯。"},{"w":"marshal","p":"[ˈmɑːrʃəl] v.","d":"To marshal a group means to assemble them in order.","e":"The students were marshaled outside and put into groups.","zh":"(名) 元帥；警長　(動) 組織；集結","ez":"學生們被集合到外面並分組。"},{"w":"morale","p":"[mouˈræl] n.","d":"Morale is the amount of hope that people have during a difficult situation.","e":"To improve our family&rsquo;s morale, mom suggested going on a picnic.","zh":"(名) 士氣；精神面貌　(形) 道德的；倫理的","ez":"為了提升家裡的士氣，媽媽建議去野餐。"},{"w":"prophecy","p":"[ˈprɒfəsi] n.","d":"A prophecy is a prediction about what will happen in the future.","e":"Some people believe that prophecies are actually true.","zh":"(名) 預言；預言能力","ez":"有些人認為預言其實是真的。"},{"w":"sage","p":"[seidʒ] n.","d":"A sage is someone who is very wise.","e":"Hal always visited the local sage for help with love.","zh":"(形) 明智的；賢明的　(名) 聖人；智者","ez":"哈爾總是拜訪當地的智者尋求愛情方面的幫助。"},{"w":"senate","p":"[ˈsenət] n.","d":"A senate is a part of the government in some countries.","e":"Everybody liked Caroline and chose her to speak for them in the senate.","zh":"(名) 參議院；立法機構","ez":"大家都喜歡卡洛琳，並選她在參議院為他們發言。"},{"w":"sentiment","p":"[ˈsentəmənt] n.","d":"A sentiment is an opinion based on your feelings.","e":"Tess told everyone at the table her sentiments about eating meat.","zh":"(名) 情感；意見","ez":"泰絲向在座每個人表達了她對吃肉的想法。"},{"w":"unrest","p":"[ʌnˈrest] n.","d":"Unrest is a state of anger about something among the people in a place.","e":"High taxes caused much of the unrest that led to the Revolutionary War.","zh":"(名) 動盪；不安","ez":"高稅收引發了導致獨立戰爭的許多動盪。"}]},{"id":12,"name":"Unit 12","words":[{"w":"adorn","p":"[əˈdɔːrn] v.","d":"To adorn something means to make it more beautiful by decorating it.","e":"Small glass beads adorned the vase.","zh":"(動) 裝飾；點綴　(動) 佩戴；穿戴","ez":"小花瓶上裝飾著小玻璃珠。"},{"w":"bliss","p":"[blis] n.","d":"Bliss is a state of complete happiness.","e":"Every time he sees his girlfriend, he feels a sense of bliss.","zh":"(名) 極樂；幸福　(形) 極樂的；幸福的","ez":"每次看到女友，他都感到一陣幸福。"},{"w":"butler","p":"[ˈbʌtlər] n.","d":"A butler is the most important male servant in a wealthy house.","e":"Whenever he needed something, he rang a bell, and the butler appeared.","zh":"男管家","ez":"每當他需要東西時，他就搖鈴，管家就會出現。"},{"w":"cramp","p":"[kræmp] n.","d":"A cramp is a strong pain caused by a muscle after a lot of physical use.","e":"After the marathon, Jenny got a terrible cramp in her calf muscle.","zh":"(名) 抽筋；痛楚　(動) 使抽筋；限制","ez":"馬拉松後，珍妮的小腿肌肉嚴重抽筋。"},{"w":"dilapidated","p":"[diˈlæpədeitid] adj.","d":"When a building is dilapidated, it is old and in bad condition.","e":"Paint peeled off of the old dilapidated apartment building.","zh":"(形) 破舊的；殘破的　(形) 衰敗的；廢棄的","ez":"油漆從老舊破敗的公寓大樓上剝落。"},{"w":"evoke","p":"[iˈvouk] v.","d":"To evoke a memory or emotion means to make it occur.","e":"The picture evoked memories of when grandmother was a girl.","zh":"(動) 喚起；引起　激發；回想起","ez":"這張照片喚起了祖母還是女孩時的回憶。"},{"w":"farewell","p":"[fɛərˈwel] n.","d":"A farewell is an instance of saying goodbye or a way to say it.","e":"She got on the plane after we said our farewells.","zh":"(名) 告別；再見　(動) 向…道別；告別　(感) 再見；再會","ez":"我們道別後，她上了飛機。"},{"w":"faucet","p":"[ˈfɔːsit] n.","d":"A faucet is a device that controls the flow of a liquid or gas.","e":"Turn off the faucet when you are done brushing your teeth.","zh":"(名) 水龍頭；旋塞","ez":"刷完牙後請關掉水龍頭。"},{"w":"filth","p":"[filθ] n.","d":"Filth is a large amount of dirt or dirty things that disgust you.","e":"There was tons of filth and trash on the shore of the river.","zh":"(名) 污垢；髒東西　(名) 下流的言語或思想","ez":"河岸上堆滿了污垢和垃圾。"},{"w":"flaw","p":"[flɔː] n.","d":"A flaw is a mistake in something that causes it to be less effective or correct.","e":"We discovered a major flaw in the metal chain.","zh":"(名) 缺點；瑕疵　(動) 使有缺陷","ez":"我們發現金屬鏈條有一個重大缺陷。"},{"w":"grin","p":"[grin] v.","d":"To grin means to smile broadly.","e":"That joke makes me grin every time I hear it.","zh":"(動) 露齒笑；咧嘴笑　(名) 燦爛的笑容；笑靨","ez":"每次聽到那個笑話，我都會咧嘴笑。"},{"w":"housekeeping","p":"[ˈhausˌkiːpiŋ] n.","d":"Housekeeping is the maintenance of a house or an establishment like a hotel.","e":"Housekeeping is not much fun, but it has to be done.","zh":"家務管理；飯店；總務部門；家務開支；家用；工作的；部分；雜務活","ez":"做家務不太有趣，但還是得做。"},{"w":"mound","p":"[maund] n.","d":"A mound of something is a large pile of it.","e":"There was a mound of clothes on the messy teenager&rsquo;s floor.","zh":"(名) 土堆；丘陵　(動) 堆積；隆起","ez":"那個邋遢青少年的地板上有一堆衣服。"},{"w":"numb","p":"[nʌm] adj.","d":"When a body part is numb, it does not have any feeling.","e":"After holding my hand under the icy water, my fingers went numb.","zh":"(形) 麻木的；無感覺的　(動) 使麻木；使無感覺","ez":"把手放在冰水裡之後，我的手指麻了。"},{"w":"reckless","p":"[ˈreklis] adj.","d":"When people are reckless, they act in an unsafe way.","e":"The reckless driver posed a threat to everyone else on the road.","zh":"(形) 魯莽的；不顧後果的","ez":"魯莽的司機對路上的其他人構成威脅。"},{"w":"slate","p":"[sleit] n.","d":"Slate is a dark grey rock that can easily be split into layers.","e":"The roof of the church was made of slate.","zh":"(名) 石板；候選人名單　(動) 預定；提名","ez":"教堂的屋頂是用石板做的。"},{"w":"stool","p":"[stuːl] n.","d":"A stool is a seat with legs but no support for a person’s arms and back.","e":"I don&rsquo;t find stools very comfortable to sit on.","zh":"(名) 凳子；擱腳凳","ez":"我覺得凳子坐起來不太舒服。"},{"w":"testament","p":"[ˈtestəmənt] n.","d":"A testament to something shows that it exists or is true.","e":"The beautiful performance was a testament to the singer&rsquo;s natural talents.","zh":"(名) 證明；遺囑","ez":"這場精彩的表演證明了歌手的天賦。"},{"w":"timber","p":"[ˈtimbə:r] n.","d":"Timber is wood that is used for building houses and making furniture.","e":"Trees in this area are grown specifically to be used for timber.","zh":"(名) 木材；木料","ez":"這個地區的樹木是專門為了用作木材而種植的。"},{"w":"valve","p":"[vælv] n.","d":"A valve is a device attached to a pipe that controls the flow of liquid or air.","e":"The mechanic removed the dirt to clear the engine valve.","zh":"(名) 閥門；活門","ez":"技師清除污垢以疏通引擎閥門。"}]},{"id":13,"name":"Unit 13","words":[{"w":"certify","p":"[ˈsəːrtəfai] v.","d":"To certify something means to confirm that its results are true.","e":"The photograph on her passport certified that she was indeed Jolene Sawyer.","zh":"(動) 證明；認證　(動) 頒發證書；確認","ez":"護照上的照片證實她確實是喬琳·索耶。"},{"w":"collaborate","p":"[kəˈlæbəreit] v.","d":"To collaborate means to work together on something.","e":"When they collaborated, they managed to finish their chores early.","zh":"(動) 合作；協力　(動) 共同完成","ez":"他們合作時，設法提早完成了家務。"},{"w":"compile","p":"[kəmˈpail] v.","d":"To compile things means to collect a variety of them into a group.","e":"She compiled a list of people who she wanted to attend her birthday party.","zh":"(動) 編譯；彙編　(動) 編寫；整理","ez":"她整理了一份她想邀請參加生日派對的名單。"},{"w":"counteract","p":"[kauntəˈrӕkt] v.","d":"To counteract something means to act against it in order to reduce or stop it.","e":"Medicine is supposed to counteract illnesses.","zh":"(動) 抵消；對抗　(動) 減弱；阻止","ez":"藥物應該用來對抗疾病。"},{"w":"curb","p":"[kəːrb] v.","d":"To curb something means to prevent it from happening or increasing.","e":"She curbed her anger by listening to a relaxing song.","zh":"(名) 路緣；馬路邊　(動) 抑制；控制","ez":"她透過聽一首放鬆的歌曲來壓抑怒氣。"},{"w":"diagnose","p":"[ˈdaiəgnouz] v.","d":"To diagnose someone means to identify the medical condition they have.","e":"Several of the children were diagnosed with the flu.","zh":"(動) 診斷；判斷　(名) 診斷","ez":"好幾個孩子被診斷出得了流感。"},{"w":"enact","p":"[iˈnækt] v.","d":"To enact something means to make it into a law.","e":"The council enacted a law that would only allow buses to drive downtown.","zh":"(動) 制定；頒布　(動) 表演；上演","ez":"市議會頒布了一項法律，只允許公車開進市中心。"},{"w":"federation","p":"[ˌfedəˈreiʃən] n.","d":"A federation is a group of states or businesses working for a common cause.","e":"The United Nations is a federation designed to prevent war, disease, and famine.","zh":"(名) 聯邦；聯合體　(名) 聯盟；協會","ez":"聯合國是一個旨在防止戰爭、疾病和饑荒的聯盟。"},{"w":"gross","p":"[grous] adj.","d":"If something is gross, then it is disgusting.","e":"The food was so gross that the dog couldn&rsquo;t eat it without feeling sick.","zh":"(形) 令人厭惡的；粗俗的　(動) 賺取；淨賺","ez":"食物太噁心了，連狗吃了都覺得不舒服。"},{"w":"humane","p":"[hjuːˈmein] adj.","d":"If something is humane, then it is good and kind.","e":"Helping build homes for poor people is very humane.","zh":"(形) 人道的；仁慈的　(形) 富有同情心的；溫和的","ez":"幫助窮人蓋房子是非常人道的行為。"},{"w":"intolerable","p":"[inˈtɒlərəbəl] adj.","d":"If something is intolerable, then it is so bad that people cannot bear it.","e":"The weather was so intolerable that I had to put on my warmest clothes.","zh":"(形) 無法忍受的；令人厭惡的","ez":"天氣實在太難受了，我不得不穿上最厚的衣服。"},{"w":"needy","p":"[ˈniːdi] adj.","d":"If someone is needy, they are very poor.","e":"After he lost his job, he became very needy.","zh":"(形) 需要幫助的；貧困的　(形) 過度依賴他人的；黏人的","ez":"他失業後，變得非常依賴別人。"},{"w":"onset","p":"[ˈɒnset] n.","d":"The onset of something unpleasant is the beginning of it.","e":"At the onset of the battle, the enemy wasn&rsquo;t prepared for such a large attack.","zh":"(名) 開始；發作　(動) 開始；襲來","ez":"戰鬥一開始，敵人根本沒準備好應付這麼大規模的攻擊。"},{"w":"pledge","p":"[pledʒ] v.","d":"To pledge means to make a promise to do something.","e":"Her mother pledged that she would find her daughter&rsquo;s lost kitten.","zh":"(動) 發誓；承諾　(名) 誓言；保證","ez":"她媽媽發誓一定會找到女兒走失的小貓。"},{"w":"prohibit","p":"[prouhibit] v.","d":"To prohibit something means to not allow it.","e":"She prohibited the students from speaking until their work was done.","zh":"(動) 禁止；阻止","ez":"她禁止學生在完成作業前說話。"},{"w":"rash","p":"[ræʃ] n.","d":"A rash is an infected area of the skin with redness, bumps, itching, or dryness.","e":"The new perfume left a horrible rash on my skin.","zh":"(形) 輕率的；魯莽的　(名) 疹子","ez":"新香水讓我的皮膚起了嚴重的疹子。"},{"w":"render","p":"[ˈrendər] v.","d":"To render something means to make it become something else.","e":"His report was rendered unimportant by the release of new information.","zh":"(動) 使成為；提供","ez":"新資訊公布後，他的報告就變得無關緊要了。"},{"w":"smallpox","p":"[ˈsmɔːlpɒks] n.","d":"Smallpox is a disease that causes tiny bumps on the skin and high fevers.","e":"When she saw the tiny bumps, she thought her son might have smallpox.","zh":"(名) 天花","ez":"看到那些小疹子時，她以為兒子得了天花。"},{"w":"transmit","p":"[trænsˈmit] v.","d":"To transmit something means to pass it from one person or place to another.","e":"The radio tower transmits a signal to all the radios in a 20-kilometer radius.","zh":"(動) 傳送；傳播","ez":"廣播塔會將訊號傳送到半徑二十公里內的所有收音機。"},{"w":"vow","p":"[vau] v.","d":"To vow means to make a promise to do something.","e":"Before they are allowed to work, all senators must vow to never accept bribes.","zh":"(動) 發誓；誓言","ez":"所有參議員在就職前都必須宣誓絕不接受賄賂。"}]},{"id":14,"name":"Unit 14","words":[{"w":"camouflage","p":"[ˈkæməflɑːʒ] n.","d":"Camouflage is something used to hide people and things.","e":"The green and brown camouflage was best used for hiding in forests and jungles.","zh":"(名) 偽裝；迷彩　(動) 偽裝；隱藏","ez":"綠色和棕色的迷彩最適合在森林和叢林中隱藏。"},{"w":"contemplate","p":"[ˈkɒntəmpleit] v.","d":"To contemplate something means to think about it.","e":"Mark took a moment to contemplate the math problem before solving it.","zh":"(動) 冥想；思考　沉思；考慮","ez":"馬克花了一點時間思考數學題目，然後才開始解題。"},{"w":"contend","p":"[kənˈtend] v.","d":"To contend with something means to struggle to overcome it.","e":"Stacy had to contend with a learning disability throughout high school.","zh":"(動) 主張；聲稱　(動) 競爭；爭奪","ez":"史黛西在高中期間必須努力克服學習障礙。"},{"w":"cot","p":"[kɒt] n.","d":"A cot is a small portable bed.","e":"At the camp, the boys&rsquo; cabin was lined with cots.","zh":"嬰兒床；小床；折疊床；窄床","ez":"營地裡，男生的小木屋裡擺滿了行軍床。"},{"w":"enlist","p":"[enˈlist] v.","d":"To enlist means to join the military.","e":"In their final year at school, the students were asked to enlist in the military.","zh":"(動) 參軍；徵募　(動) 爭取；尋求幫助","ez":"在學最後一年，學生們被要求從軍。"},{"w":"frontier","p":"[ˈfrʌntiə:r] n.","d":"A frontier is a border between two regions or countries.","e":"A fence was built along the frontier where the river curved.","zh":"(名) 邊界；邊疆　(名) 新領域；未開發地區","ez":"在河流彎曲處的邊界上，建起了一道圍籬。"},{"w":"handbook","p":"[ˈhændbuk] n.","d":"A handbook is an item that gives specific information or instructions.","e":"If you look at the handbook, it will tell you which wires to connect to the TV.","zh":"(名) 手冊；指南　(名) 參考書；說明書","ez":"翻開手冊，它會告訴你哪些電線要連接到電視上。"},{"w":"hesitant","p":"[ˈhezətənt] adj.","d":"If someone is hesitant, then they are not sure or slow in acting or speaking.","e":"Though he knew the answer, he was hesitant to say it because he might be wrong.","zh":"(形) 猶豫的；遲疑的　(形) 不確定的；缺乏信心的","ez":"雖然他知道答案，但因為怕答錯，他猶豫著不敢說。"},{"w":"lush","p":"[lʌʃ] adj.","d":"If something is lush, then it is full of a variety of large, healthy plants.","e":"The lush jungle was filled with plants, trees, and vines.","zh":"(形) 茂密的；翠綠的　(形) 豐富的；奢華的","ez":"茂密的叢林裡長滿了植物、樹木和藤蔓。"},{"w":"marrow","p":"[ˈmærou] n.","d":"Marrow is the soft substance in the center of bones.","e":"Dissolved marrow is a common ingredient in soups.","zh":"髓；骨髓；西葫蘆","ez":"溶解的骨髓是湯品中常見的食材。"},{"w":"outfit","p":"[ˈautfit] n.","d":"An outfit is a set of clothes worn together, often for a certain job or event.","e":"Kelly&rsquo;s new outfit made her look so glamourous.","zh":"(名) 服裝；裝備　(動) 配備；裝備","ez":"凱莉的新裝扮讓她看起來非常迷人。"},{"w":"paw","p":"[pɔ:] n.","d":"A paw is an animal’s foot that has claws or soft bottoms.","e":"The kitten cleaned its paws with its tongue.","zh":"(名) 爪子；腳掌　(動) 用爪子抓；笨拙地觸碰","ez":"小貓用舌頭清理自己的爪子。"},{"w":"quiver","p":"[ˈkwivər] v.","d":"To quiver means to tremble or shake.","e":"The flame on the candle quivered whenever someone opened or closed a door.","zh":"(動) 顫抖；顫動　(名) 顫抖；箭筒","ez":"每當有人開門或關門時，蠟燭的火苗就會搖晃。"},{"w":"splendid","p":"[ˈsplendid] adj.","d":"If something or someone is splendid, then they are very good.","e":"From his head down to his shoes, his clothes looked splendid.","zh":"(形) 壯麗的；極好的","ez":"從頭到腳，他的衣服看起來都很華麗。"},{"w":"stray","p":"[strei] v.","d":"To stray means to go in a wrong direction and often become lost.","e":"He found himself lost because he had strayed from the tour group.","zh":"(形) 流浪的；迷路的　(動) 走失；偏離","ez":"他發現自己迷路了，因為他脫離了旅行團。"},{"w":"substantial","p":"[səbˈstænʃəl] adj.","d":"If something is substantial, then it is of great importance, size, or value.","e":"The bank said that he owed it a substantial amount of money.","zh":"(形) 大量的；相當大的","ez":"銀行說他欠了一大筆錢。"},{"w":"torch","p":"[tɔːrtʃ] n.","d":"A torch is a stick with one end on fire that can be carried in order to give light.","e":"He grabbed a piece of wood and stuck it in the fire in order to make a torch.","zh":"(名) 火炬；手電筒","ez":"他抓起一塊木頭插進火裡，想做成火把。"},{"w":"tract","p":"[trækt] n.","d":"A tract is a large area of land.","e":"On the other side of the mountains was a long tract of forest.","zh":"短文；傳單；大片土地；丈量過的土地；管；道；束","ez":"山的另一邊是一片綿延的森林。"},{"w":"vigil","p":"[ˈvidʒəl] n.","d":"A vigil is a period of watchful attention at night fora specific purpose.","e":"He had a vigil in front of the tomb for three days.","zh":"祈禱；不眠時間；值夜；守夜","ez":"他在墓前守夜了三天。"},{"w":"weary","p":"[ˈwiəri] adj.","d":"If someone is weary, then they are tired.","e":"Jane was weary after a long day of work.","zh":"筋疲力盡的；極為疲倦的；對；使疲勞；使疲倦；對；開始厭倦","ez":"珍工作了一整天後感到疲憊不堪。"}]},{"id":15,"name":"Unit 15","words":[{"w":"adhere","p":"[ədˈhiər] v.","d":"To adhere means to act in the way that a rule or agreement says is right.","e":"If the new employees wish to succeed, they must adhere to the boss&rsquo;s rules.","zh":"(動) 遵守；信守　粘附；黏著","ez":"如果新員工想成功，就必須遵守老闆的規定。"},{"w":"administer","p":"[ədˈministər] v.","d":"To administer means to take responsibility for organizing something.","e":"The teacher&rsquo;s assistant will administer the test.","zh":"(動) 管理；執行　(動) 施予；供給","ez":"助教將負責監考。"},{"w":"compassionate","p":"[kəmˈpæʃənit] adj.","d":"When people are compassionate, they feel pity and sympathy for others.","e":"The compassionate nurse tried to make the sick man feel comfortable.","zh":"(形) 同情的；有同情心的　(形) 溫情的；仁慈的","ez":"富有同情心的護士努力讓病人感到舒適。"},{"w":"contaminate","p":"[kənˈtæməneit] v.","d":"To contaminate something means to put dirty or harmful chemicals into it.","e":"The lake was contaminated when pollutants entered into the water.","zh":"(動) 污染；使受污染　(動) 弄髒；使不潔淨","ez":"污染物進入湖水後，湖泊受到了污染。"},{"w":"deficiency","p":"[diˈfiʃənsi] n.","d":"A deficiency is a lack of something, especially something that is needed.","e":"Your snack has a deficiency of any real nutrients.","zh":"(名) 缺乏；不足　(名) 缺陷；缺點","ez":"你的零食缺乏任何真正的營養。"},{"w":"epidemic","p":"[ˌepəˈdemik] n.","d":"An epidemic is an outbreak of a disease that spreads quickly.","e":"It was difficult to stop the flu epidemic.","zh":"(名) 流行病；傳染病　(形) 流行的；大流行的","ez":"要阻止流感疫情蔓延很困難。"},{"w":"hazard","p":"[ˈhæzərd] n.","d":"A hazard is something that could be dangerous to a person’s health or safety.","e":"Smoking cigarettes poses many health hazards.","zh":"(名) 危險；危害　(動) 冒...的風險；危及　(形) 危險的；有害的","ez":"抽菸會帶來許多健康風險。"},{"w":"imperative","p":"[imˈperətiv] adj.","d":"When something is imperative, it is extremely important and must be done.","e":"It was imperative for him to find a job.","zh":"(形) 急迫的；必要的　(名) 必要的事；祈使句","ez":"他必須找到工作，這點至關重要。"},{"w":"intestines","p":"[inˈtestinz] n.","d":"Intestines are tubes through which food passes after it leaves the stomach.","e":"Whatever you eat goes into your intestines.","zh":"腸","ez":"你吃的任何東西都會進入腸道。"},{"w":"manifest","p":"[ˈmӕnəfest] v.","d":"To manifest means to make something visible or obvious.","e":"The holiday season manifested joy in the children.","zh":"(動) 顯示；表現　(形) 明顯的；顯而易見的","ez":"假期讓孩子們顯露出喜悅之情。"},{"w":"metabolic","p":"[ˌmetəˈbɒlik] adj.","d":"When something is metabolic, it relates to a person’s or animal’s metabolism.","e":"People who have a low metabolic rate will gain weight.","zh":"代謝的；新陳代謝的","ez":"新陳代謝率低的人容易變胖。"},{"w":"overcrowded","p":"[ˌouvərˈkraudid] adj.","d":"When a place is overcrowded, it has too many people or things in it.","e":"The lobby was overcrowded with people.","zh":"過分擁擠的；擁擠不堪的","ez":"大廳裡擠滿了人。"},{"w":"paramount","p":"[ˈpærəmaunt] adj.","d":"When something is paramount, it is more important than anything else.","e":"The safety of passengers must be paramount when designing a car.","zh":"(形) 至關重要的；首要的","ez":"設計汽車時，乘客的安全必須是最重要的考量。"},{"w":"practitioner","p":"[prækˈtiʃənər] n.","d":"A practitioner is a doctor.","e":"She made an appointment with the practitioner to treat her cough.","zh":"(名) 從業者；執業者","ez":"她跟醫師約診治療咳嗽。"},{"w":"provision","p":"[prəˈviʒən] n.","d":"The provision of something is the act of giving it to people in need or want.","e":"That department is responsible for the provision of emergency supplies.","zh":"(名) 準備；供應","ez":"那個部門負責提供緊急物資。"},{"w":"replenish","p":"[riˈpleniʃ] v.","d":"To replenish something means to make it full or complete again.","e":"We planted nearly one hundred seeds to replenish the garden after the fire.","zh":"補充；把；重新裝滿","ez":"火災後，我們種了近一百顆種子來恢復花園。"},{"w":"sterile","p":"[ˈsteril] adj.","d":"When something is sterile, it is completely clean and free from germs.","e":"The hospital room looked quite sterile.","zh":"(形) 無菌的；消過毒的","ez":"醫院的病房看起來相當無菌。"},{"w":"upgrade","p":"[ˈʌpgreid] v.","d":"To upgrade something means to improve it or make it more efficient.","e":"He upgraded to a real fancy car.","zh":"(動) [ʌp'gred] 升級；提升　(名) ['ʌp.gred] 升級；改進","ez":"他升級換了一輛非常高級的車。"},{"w":"viable","p":"[ˈvaiəbəl] adj.","d":"When something is viable, it is capable of doing what it is intended to do.","e":"Her method of solving the math problem seemed viable.","zh":"(形) 可行的；能生存的","ez":"她解數學題的方法似乎可行。"},{"w":"voluntary","p":"[ˈvɒləntəri] adj.","d":"When something is voluntary, it is done by choice but is not required.","e":"Many people attended the voluntary boat safety class.","zh":"(形) 自願的；志願的　(名) 自願行為；志願工作","ez":"很多人參加了自願性的船隻安全課程。"}]},{"id":16,"name":"Unit 16","words":[{"w":"amid","p":"[əˈmid] prep.","d":"If something is amid something else, then it is in the middle of it.","e":"The bee was busily flying amid the flowers in the garden.","zh":"(介) 在...之中；在...之間　(介) 被...所包圍","ez":"蜜蜂在花園的花叢中忙碌地飛舞。"},{"w":"backstage","p":"[ˈbækˈsteidʒ] adv.","d":"If something happens backstage, it occurs behind a theater’s stage.","e":"After the show, the director went backstage and thanked the actors.","zh":"後臺的；幕後的；在後臺；在幕後；秘密的；秘密地","ez":"表演結束後，導演到後台感謝演員們。"},{"w":"billionaire","p":"[biljəˈnɛər] n.","d":"A billionaire is someone who has at least one billion dollars.","e":"The sale of his inventions made the inventor a billionaire.","zh":"億萬富翁；擁有十億家產的人","ez":"他的發明銷售讓這位發明家成了億萬富翁。"},{"w":"brute","p":"[bruːt] n.","d":"A brute is someone who behaves or looks like a violent animal.","e":"My older brother can act like a brute when he doesn&rsquo;t get his way.","zh":"(形) 野蠻的；殘暴的　(名) 野蠻人；畜生","ez":"我哥哥如果不順他的意，就會像個野蠻人一樣。"},{"w":"clumsy","p":"[ˈklʌmzi] adj.","d":"If someone is clumsy, then they are awkward in handling things.","e":"The businessman was clumsy and dropped his work files.","zh":"(形) 笨拙的；動作不靈活的　(形) 粗魯的；不優雅的","ez":"那個商人笨手笨腳的，把工作文件掉在地上。"},{"w":"collide","p":"[kəˈlaid] v.","d":"To collide with something means to hit into it while moving.","e":"The two cars collided with each other because their drivers were not careful.","zh":"(動) 碰撞；相撞　(動) 衝突；不相容","ez":"兩輛車因為駕駛不小心而相撞。"},{"w":"culprit","p":"[ˈkʌlprit] n.","d":"A culprit is someone who did a crime or other bad deed.","e":"The police were still searching for the culprit from the robbery.","zh":"(名) 犯人；罪魁禍首　(名) 責任人；肇事者","ez":"警方仍在搜尋搶劫案的嫌犯。"},{"w":"evacuate","p":"[iˈvækjueit] v.","d":"To evacuate means to leave a place of danger to a place of safety.","e":"During the flood, many families were evacuated to higher ground.","zh":"(動) 撤離；逃離　(動) 疏散；清空","ez":"洪水期間，許多家庭被疏散到地勢較高的地方。"},{"w":"flammable","p":"[ˈflæməbəl] adj.","d":"If something is flammable, then it is able to catch on fire.","e":"Be careful with that blanket near the candle. It is extremely flammable.","zh":"(形) 易燃的；可燃的","ez":"小心那條靠近蠟燭的毯子，它非常易燃。"},{"w":"mob","p":"[mɒb] n.","d":"A mob is a large crowd of people that often wants to cause violence.","e":"The copier was destroyed by a mob of angry workers.","zh":"(名) 烏合之眾；暴動群眾　(動) 成群包圍；蜂擁而至","ez":"影印機被一群憤怒的工人破壞了。"},{"w":"premature","p":"[ˈprimətʃuər] adj.","d":"If something is premature, then it is done too early or before the proper time.","e":"Mark&rsquo;s celebration was premature because the ball hadn&rsquo;t fallen in the hole.","zh":"(形) 過早的；早產的","ez":"馬克的慶祝太早了，因為球還沒掉進洞裡。"},{"w":"resent","p":"[riˈzent] v.","d":"To resent something means to have bad feelings about it.","e":"She resented the fact that she had never been able to play an instrument.","zh":"(動) 怨恨；厭惡","ez":"她對自己一直無法演奏樂器這件事感到怨恨。"},{"w":"satire","p":"[ˈsætaiər] n.","d":"A satire is a work of art that uses humor and irony to make fun of something.","e":"This book is a satire of what life was like in the army.","zh":"(名) 諷刺；諷刺作品","ez":"這本書是對軍中生活的諷刺。"},{"w":"scrutiny","p":"[ˈskruːtəni] n.","d":"Scrutiny is the careful examination of something.","e":"A scientist should always practice scrutiny with their work.","zh":"(名) 仔細檢查；審查","ez":"科學家應該時時嚴格審視自己的工作。"},{"w":"segregate","p":"[ˈsegrigeit] v.","d":"To segregate something means to place it in a group apart from other things.","e":"In gym class, the children were segregated into two groups: boys and girls.","zh":"(動) 隔離；分離","ez":"體育課上，孩子們被分成兩組：男生和女生。"},{"w":"subject","p":"[səbˈdʒekt] v.","d":"To subject someone to something means to force them to do or experience it.","e":"The officers subjected everyone to a careful search before they left the plane.","zh":"(名) [ˋsʌbdʒɪkt] 主題；科目　(動) [səbˋdʒɛkt] 使服從；使遭受","ez":"官員們在所有人離開飛機前對他們進行了仔細搜查。"},{"w":"testify","p":"[ˈtestəfai] v.","d":"To testify means to give evidence as a witness.","e":"The judge listened while the victim testified about the robbery.","zh":"(動) 作證；證明","ez":"法官聽取受害者關於搶劫案的證詞。"},{"w":"tumult","p":"[ˈtjuːmʌlt] n.","d":"A tumult is a loud and confused noise made by a large crowd of people.","e":"She couldn&rsquo;t hear her friend over the tumult of the other excited guests.","zh":"吵鬧；喧嘩；騷亂；混亂","ez":"在其他興奮賓客的喧鬧聲中，她聽不見朋友的聲音。"},{"w":"underestimate","p":"[ˈʌndərˈestəmeit] v.","d":"To underestimate something or someone means to think they are not important.","e":"Ne lost the game because we underestimated the other team&rsquo;s skill.","zh":"(動) 低估；看輕","ez":"我們輸了比賽，因為低估了對手的實力。"},{"w":"uproar","p":"[ˈʌprɔːr] n.","d":"Uproar is loud noise caused by people who are very angry or upset.","e":"The fans made a great uproar when their team lost the game.","zh":"喧囂；嘈雜；吵鬧","ez":"球迷們在球隊輸球時大聲鼓譟。"}]},{"id":17,"name":"Unit 17","words":[{"w":"accelerate","p":"[ækˈseləreit] v.","d":"To accelerate means to increase in speed.","e":"When he stepped on the gas pedal, the motorcycle accelerated.","zh":"(動) 加速；促進","ez":"他踩下油門時，摩托車加速前進。"},{"w":"anew","p":"[əˈnjuː] adv.","d":"If you do something anew, you do it again and in a different way.","e":"Though he had failed his driving test, he decided to try it anew.","zh":"重新；再","ez":"雖然他駕照考試沒過，但他決定重新嘗試。"},{"w":"defect","p":"[ˈdiːfekt] n.","d":"A defect is a part of something that is wrong or missing.","e":"All these bottles have a defect and must be sent back to the warehouse.","zh":"(名) [ˈdifɛkt] 缺陷；瑕疵　(動) [dɪˈfɛkt] 背棄；叛逃","ez":"所有這些瓶子都有瑕疵，必須退回倉庫。"},{"w":"dreary","p":"[ˈdriəri] adj.","d":"If something is dreary, then it is dull, dark, and lifeless.","e":"After the fire, this section of forest is rather dreary.","zh":"(形) 陰沉的；令人厭倦的　(形) 沉悶的；乏味的","ez":"火災過後，這片森林區域顯得相當陰鬱。"},{"w":"duplicate","p":"[ˈdjuːpləkeit] v.","d":"To duplicate something means to copy it.","e":"She duplicated her friend&rsquo;s movements like she was in front of a mirror.","zh":"(動) [`djup lə ket] 複製；重複　(名) [`djup lə kət] 複本；副本　(形) [`djup lə kət] 相同的；重複的","ez":"她像照鏡子一樣模仿朋友的動作。"},{"w":"electromagnetic","p":"[iˈlektroumægˈnetik] adj.","d":"If something is electromagnetic, it is related to electricity and magnetic fields.","e":"Different colors of light come from different levels of electromagnetic energy.","zh":"電磁的","ez":"不同顏色的光來自不同等級的電磁能量。"},{"w":"electron","p":"[iˈlektrɒn] n.","d":"An electron is a particle in all atoms that has a negative electric charge.","e":"The number of electrons in an atom determines the substance the atoms make.","zh":"(名) 電子；電子粒子","ez":"原子中的電子數量決定了原子組成的物質。"},{"w":"glide","p":"[glaid] v.","d":"To glide means to fly on extended wings with little or no effort.","e":"When the wind is blowing, birds can glide easily through the sky.","zh":"(動) 滑行；滑翔　(名) 滑行；滑翔動作","ez":"當風吹起時，鳥兒可以輕鬆地在天空滑翔。"},{"w":"ingenious","p":"[inˈdʒiːnjəs] adj.","d":"If someone is ingenious, then they are very smart.","e":"Charles was the only person ingenious enough to repair the plane&rsquo;s engines.","zh":"(形) 聰慧的；富有創意的　(形) 巧妙的；靈巧的","ez":"查爾斯是唯一夠聰明能修理飛機引擎的人。"},{"w":"innovation","p":"[inouˈveiʃən] n.","d":"An innovation is a product or an idea that is new or very original.","e":"Mrs. Johnson made a great innovation to the company&rsquo;s business plan.","zh":"(名) 創新；革新　(名) 創新事物；新發明","ez":"強森太太對公司的商業計畫做出了重大創新。"},{"w":"innovative","p":"[inouˈveitiv] adj.","d":"If something or someone is innovative, they can think in creative ways.","e":"Since Peter was so innovative, he was chosen to lead the science team.","zh":"(形) 創新的；革新的　(名) 創新者；革新者","ez":"因為彼得很有創新精神，他被選為科學團隊的領導。"},{"w":"launch","p":"[lɔːntʃ] v.","d":"To launch something means to make it go into motion.","e":"The boat launched from the dock and floated down the river.","zh":"(動) 發射；推出　(名) 發射；推出","ez":"船從碼頭出發，順著河流漂流而下。"},{"w":"meteorological","p":"[ˌmiːtiərəˈlɒdʒikəl] adj.","d":"If something is meteorological, it is concerned with the science of weather.","e":"The thunderstorm was so large that it became a great meteorological event.","zh":"(形) 氣象的；氣象學的","ez":"這場雷雨規模極大，成為重大的氣象事件。"},{"w":"meteorology","p":"[ˌmiːtiəˈrɒlədʒi] n.","d":"Meteorology is the science that studies the weather.","e":"In order to understand the weather, you have to study meteorology.","zh":"氣象學","ez":"要了解天氣，你必須學習氣象學。"},{"w":"penetrate","p":"[ˈpenətreit] v.","d":"To penetrate something means to enter into it.","e":"The knife easily penetrated the surface of the orange.","zh":"(動) 穿透；進入","ez":"刀子輕易地刺穿了柳橙的表皮。"},{"w":"propulsion","p":"[prəˈpʌlʃən] n.","d":"Propulsion is the force that moves something forward.","e":"The propulsion lifted the rocket into the sky.","zh":"(名) 推進；推進力","ez":"推進力將火箭升上天空。"},{"w":"simulate","p":"[ˈsimjəleit] v.","d":"To simulate something means to copy its actions or characteristics.","e":"The French language teacher could simulate the accent of a French citizen.","zh":"(動) 模擬；模仿","ez":"法語老師能模仿法國人的口音。"},{"w":"spur","p":"[spəːr] v.","d":"To spur someone means to urge them into action.","e":"The coach&rsquo;s speech spurred her team into playing the best game of their lives.","zh":"(動) 激勵；刺激","ez":"教練的演講激勵她的隊伍打出了生涯最佳的一場比賽。"},{"w":"stimulate","p":"[ˈstimjəleit] v.","d":"To stimulate something means to cause or to increase activity in it.","e":"Doctors sometimes use electric shock to stimulate a patient&rsquo;s heartbeat.","zh":"(動) 刺激；激發","ez":"醫生有時會用電擊來刺激病人的心跳。"},{"w":"tenacious","p":"[təˈneiʃəs] adj.","d":"If someone is tenacious, then they do not easily give up.","e":"I&rsquo;m sure that he&rsquo;ll finish that difficult sale. He is very tenacious.","zh":"(形) 頑強的；堅持不懈的","ez":"我確定他會完成那筆困難的銷售，他非常堅持。"}]},{"id":18,"name":"Unit 18","words":[{"w":"beforehand","p":"[biˈfɔːrhænd] adv.","d":"If something is done beforehand, then it is done in advance.","e":"He packed his luggage beforehand, so he was able to leave right away.","zh":"(副) 提前；事先　(形) 預先的；事前的","ez":"他事先打包好行李，所以能立刻出發。"},{"w":"centigrade","p":"[ˈsentəgreid] n.","d":"If a temperature is centigrade, it is scaled, so water freezes at 0° and boils at 100°.","e":"During the spring time, the temperature gets as warm as 26 degrees centigrade.","zh":"(形) 攝氏的；百分度的","ez":"春天時，氣溫會暖到攝氏26度。"},{"w":"chatter","p":"[ˈtʃætər] v.","d":"To chatter means to talk quickly about unimportant things.","e":"The children chattered in the back of the classroom.","zh":"(動) 喋喋不休地說話；閒聊　(名) 閒聊；喧鬧聲","ez":"孩子們在教室後面嘰嘰喳喳地聊天。"},{"w":"concerto","p":"[kənˈtʃərtou] n.","d":"A concerto is music for a solo instrument and played with an orchestra.","e":"The piano concerto has a section in which only the piano plays.","zh":"(名) 協奏曲；樂隊與獨奏者的樂曲","ez":"這首鋼琴協奏曲有一段只有鋼琴獨奏。"},{"w":"condense","p":"[kənˈdens] v.","d":"To condense a gas means to make it a liquid.","e":"The cool air made tiny drops of water condense on the tops of the grass.","zh":"(動) 濃縮；凝結　(形) 濃縮的；簡潔的","ez":"涼爽的空氣讓小水滴凝結在草尖上。"},{"w":"cove","p":"[kouv] n.","d":"A cove is a part of land where it curves inward around the sea.","e":"They hid the boat in a small cove on the south side of the island.","zh":"小海灣；小灣；人；傢夥","ez":"他們把船藏在島嶼南邊的一個小海灣裡。"},{"w":"deterio
