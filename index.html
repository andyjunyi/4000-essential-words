bove you.","e":"As we sat on top of the hill, a plane flew overhead.","zh":"(形) 頭頂上的；上方的　(副) 在頭頂上；在上方　(名) 經常性開支；管理費用","ez":"我們坐在山頂上時，一架飛機從頭頂飛過。"},{"w":"principle","p":"[ˈprinsəpəl] n.","d":"A principle is a belief about the correct way to behave.","e":"To maintain principles, it&rsquo;s vital to watch, listen, and speak carefully.","zh":"(名) 原則；原理","ez":"為了堅守原則，謹慎觀察、傾聽和說話至關重要。"},{"w":"rural","p":"[ˈruərəl] adj.","d":"If a place is rural, it is in the countryside instead of the city.","e":"I want to live in a small house in a rural area.","zh":"(形) 鄉村的；農村的","ez":"我想住在鄉下的一間小房子裡。"},{"w":"secluded","p":"[siˈkluːdid] adj.","d":"If a place is secluded, it is far away from any other place.","e":"There was a secluded bench in the park.","zh":"(形) 隱蔽的；僻靜的","ez":"公園裡有一個隱蔽的長椅。"},{"w":"species","p":"[ˈspiːʃi(ː)z] n.","d":"A species is a type of plant or animal.","e":"There are 21 different species of butterfly in this forest.","zh":"(名) 物種；種類","ez":"這片森林裡有21種不同的蝴蝶。"},{"w":"swamp","p":"[swɒmp] n.","d":"A swamp is a very wet area of land.","e":"There are lots of wild animals living in the swamp.","zh":"(名) 沼澤；濕地　(動) 淹沒；使應接不暇","ez":"沼澤裡住著許多野生動物。"},{"w":"traverse","p":"[ˈtrævə:rs] v.","d":"To traverse means to move or travel through an area.","e":"The explorer traversed the desert alone on a camel.","zh":"(動) 橫越；穿過","ez":"探險家獨自騎著駱駝穿越沙漠。"},{"w":"zoology","p":"[zouˈɒlədʒɪ] n.","d":"Zoology is a subject in which people study animals.","e":"Helen wants to study zoology because she has always liked animals.","zh":"動物學","ez":"海倫想學動物學，因為她一直很喜歡動物。"}]},{"id":26,"name":"Unit 26","words":[{"w":"assumption","p":"[əˈsʌmpʃən] n.","d":"An assumption is something that you believe is true but cannot prove.","e":"I went to the cafeteria on the assumption that everyone would be there.","zh":"(名) 假設；假定　(名) 假想；認定","ez":"我以為大家都在，所以去了自助餐廳。"},{"w":"barley","p":"[ˈbɑːrli] n.","d":"Barley is a grain that is used for animal feed, health food and beer.","e":"The farmer grew barley to feed his cows in the winter.","zh":"(名) 大麥；麥類穀物","ez":"農夫種了大麥，冬天用來餵牛。"},{"w":"beast","p":"[biːst] n.","d":"A beast is a large, dangerous animal.","e":"A lion is one of the fiercest beasts on Earth.","zh":"(名) 野獸；凶惡的人　(形) 野蠻的；殘忍的","ez":"獅子是地球上最兇猛的野獸之一。"},{"w":"colonel","p":"[ˈkəːrnəl] n.","d":"A colonel is a military officer.","e":"James has been given a promotion in the army. He is now a colonel.","zh":"(名) 陸軍上校；空軍上校","ez":"詹姆斯在軍隊裡升官了，他現在是上校。"},{"w":"contagious","p":"[kənˈteɪdʒəs] adj.","d":"If a disease is contagious, it is easily carried from one person to another.","e":"You must wear protective clothing because the patient&rsquo;s illness is contagious.","zh":"(形) 易傳染的；有傳染性的　(形) 易蔓延的；容易傳播的","ez":"你必須穿防護衣，因為病人的病會傳染。"},{"w":"corpse","p":"[kɔːrps] n.","d":"A corpse is a dead body of a human.","e":"After the accident, the corpse was taken to the hospital.","zh":"(名) 屍體；死屍","ez":"事故發生後，屍體被送到了醫院。"},{"w":"crisis","p":"[ˈkraisis] n.","d":"A crisis is a situation that is extremely stressful or dangerous.","e":"The airport workers&rsquo; strike led to a crisis at the airport.","zh":"(名) 危機；困境　(名) 關鍵時刻；轉折點","ez":"機場員工罷工導致機場陷入危機。"},{"w":"cure","p":"[kjuər] v.","d":"To cure means to cause an illness or injury to end or disappear.","e":"My dentist cured me of my toothache.","zh":"(動) 治癒；治療　(名) 療法；治療方法","ez":"我的牙醫治好了我的牙痛。"},{"w":"deformed","p":"[diˈfɔːrmd] adj.","d":"If something is deformed, it is not shaped normally and may appear ugly.","e":"Even though the carrot was deformed, it was still safe to eat.","zh":"畸形的；變形的","ez":"雖然胡蘿蔔變形了，但還是可以安全食用。"},{"w":"discriminate","p":"[disˈkriməneit] v.","d":"To discriminate means to judge people according to their looks.","e":"They discriminated against her because she was different.","zh":"(動) 歧視；區別對待　(動) 區分；辨別","ez":"他們因為她與眾不同而歧視她。"},{"w":"embassy","p":"[ˈembəsi] n.","d":"An embassy is where government officials work in a foreign country.","e":"If you lose your passport, you should contact the embassy.","zh":"(名) 大使館；使館","ez":"如果你弄丟護照，應該聯絡大使館。"},{"w":"extinguish","p":"[iksˈtiŋgwiʃ] v.","d":"To extinguish a fire means to make it stop.","e":"Michael extinguished the small fire with the hose.","zh":"(動) 熄滅；撲滅　(動) 消除；結束","ez":"麥可用水管撲滅了小火焰。"},{"w":"flint","p":"[flint] n.","d":"Flint is a hard stone that people used to make weapons for hunting.","e":"There are a lot of flint tools in the museum.","zh":"塊；燧石；火石；塊；打火石；電石","ez":"博物館裡有很多燧石工具。"},{"w":"harass","p":"[ˈhəræs] v.","d":"To harass someone means to annoy or trouble them.","e":"The children harassed their mother because they wanted her attention.","zh":"(動) 騷擾；困擾　(動) 持續攻擊；折磨","ez":"孩子們纏著媽媽，因為他們想要她的注意。"},{"w":"integrate","p":"[ˈintəgreit] v.","d":"To integrate means to join, communicate and socialize.","e":"Governments want immigrants to integrate with the population.","zh":"(動) 整合；融合　(動) 使…融入；使…一體化","ez":"政府希望移民能融入當地人口。"},{"w":"miniature","p":"[ˈminiətʃər] adj.","d":"If something is miniature, it is very small.","e":"The boy enjoys playing with his miniature train set in his bedroom.","zh":"(形) 極小的；縮小的　(名) 微小物；縮小版","ez":"這男孩喜歡在臥室玩他的迷你火車組。"},{"w":"nutrition","p":"[njuːˈtriʃən] n.","d":"Nutrition is the process by which people use food to stay healthy.","e":"It is important to pay attention to nutrition if you want to be an athlete.","zh":"(名) 營養；營養學　(形) 營養的；有益健康的","ez":"想當運動員，注意營養很重要。"},{"w":"promptly","p":"[ˈprɒmptli] adv.","d":"If something happens promptly, it happens quickly or on time.","e":"Arrive promptly, or we won&rsquo;t have time to discuss everything.","zh":"(副) 迅速地；立即地；準時地","ez":"準時到達，否則我們就沒時間討論所有事情了。"},{"w":"technician","p":"[tekˈniʃən] n.","d":"A technician is a person who is skilled in electronic or mechanical work.","e":"I need to call the technician to help me with my computer.","zh":"(名) 技術人員；技師","ez":"我需要打電話叫技術人員來幫我修電腦。"},{"w":"tropics","p":"[ˈtropiks] n.","d":"The tropics are the areas of land and sea close to the equator.","e":"People like to go to the tropics for vacation because it&rsquo;s warm.","zh":"回歸線；熱帶地區","ez":"人們喜歡去熱帶度假，因為那裡很溫暖。"}]},{"id":27,"name":"Unit 27","words":[{"w":"beneficial","p":"[benəˈfiʃəl] adj.","d":"If something is beneficial, it is good for you.","e":"Drinking milk everyday is beneficial to your bones.","zh":"(形) 有益的；有利的　(形) 受惠的；受益的","ez":"每天喝牛奶對你的骨骼有益。"},{"w":"birthplace","p":"[ˈbəːθpleis] n.","d":"A birthplace is a place where a person is born or where something started.","e":"China is the birthplace of chopsticks.","zh":"出生地","ez":"中國是筷子的發源地。"},{"w":"capacity","p":"[kəˈpæsəti] n.","d":"The capacity of something is the amount of things that can be put in it.","e":"The parking lot has reached its full capacity.","zh":"(名) 容量；能力　(名) 職位；身分","ez":"停車場已經達到飽和容量。"},{"w":"comparative","p":"[kəmˈpærətiv] adj.","d":"If something is comparative, it is being judged based on something else.","e":"The money that John has is comparative to most other adults.","zh":"(形) 比較的；相對的　(名) 比較級","ez":"約翰的錢和大多數其他成年人差不多。"},{"w":"comprehensive","p":"[ˌkɒmpriˈhensiv] adj.","d":"If something is comprehensive, it has all the details about something else.","e":"The teacher gave us a comprehensive review for the exam.","zh":"(形) 全面的；廣泛的　(形) 綜合性的；包含一切的","ez":"老師給我們做了全面的考試複習。"},{"w":"conserve","p":"[kənˈsəːrv] v.","d":"To conserve something is to protect it from being ruined or used completely.","e":"The group worked to conserve the beauty of Europe&rsquo;s national parks.","zh":"(動) 保護；保存　節約；節省","ez":"這個團體致力於保護歐洲國家公園的美景。"},{"w":"crucial","p":"[ˈkruːʃəl] adj.","d":"If something is crucial, it is extremely important to another thing.","e":"Clean air is crucial to the survival of humans, plants, and animals.","zh":"(形) 關鍵的；決定性的　(形) 極其重要的；至關緊要的","ez":"乾淨的空氣對人類、植物和動物的生存至關重要。"},{"w":"cumulative","p":"[ˈkjuːmjəleitiv] adj.","d":"Cumulative describes an increase by adding one after another.","e":"The cumulative snowfall in the area is 50 centimeters per year.","zh":"(形) 累積的；逐漸增加的","ez":"該地區的年累積降雪量是50公分。"},{"w":"deposit","p":"[diˈpɒzit] v.","d":"To deposit something is to put it into a place or another thing.","e":"I deposited the money into my bank account.","zh":"(名) 保證金；定金　(動) 存放；沉澱　(形) 沉積的","ez":"我把錢存進了我的銀行帳戶。"},{"w":"distribute","p":"[disˈtribjuːt] v.","d":"To distribute something is to give it to a number of people.","e":"The teacher distributed crayons and markers to his students.","zh":"(動) 分配；發放　(動) 分散；散佈","ez":"老師把蠟筆和馬克筆分發給學生。"},{"w":"equator","p":"[iˈkweitər] n.","d":"The equator is an imaginary line that splits the Earth into north and south.","e":"The equator crosses the northern part of South America.","zh":"(名) 赤道；地球中心的想像圓線","ez":"赤道穿過南美洲的北部。"},{"w":"exotic","p":"[igˈzotik] adj.","d":"Exotic describes something unusual because it is from far away.","e":"Rebecca tried many exotic foods on her trip to Africa.","zh":"(形) 異國的；來自外國的　奇特的；不尋常的","ez":"瑞貝卡在非洲旅行時吃了很多異國料理。"},{"w":"federal","p":"[ˈfedərəl] adj.","d":"If something is federal, it comes from the government of a country.","e":"Sometimes federal laws are different from state laws.","zh":"(形) 聯邦的；聯邦政府的","ez":"有時候聯邦法律和州法律不一樣。"},{"w":"formation","p":"[fɔːrˈmeiʃən] n.","d":"A formation is the way that something is made.","e":"The formation of ice happens when water freezes.","zh":"(名) 形成；構成　(名) 隊伍排列；陣形","ez":"冰的形成發生在水結冰的時候。"},{"w":"frequency","p":"[ˈfriːkwənsi] n.","d":"The frequency of something is the number of times that it happens.","e":"The frequency of rainstorms is very high, especially during the spring.","zh":"(名) 頻率；出現次數　(名) 頻道；頻率","ez":"暴雨的頻率很高，尤其是在春天。"},{"w":"objective","p":"[əbˈdʒektiv] adj.","d":"An objective is a goal or plan that someone has.","e":"My objective this week is to finish my homework by 7:30 every night.","zh":"(形) 客觀的；不偏不倚的　(名) 目標；目的","ez":"我這週的目標是每晚七點半前完成作業。"},{"w":"oxygen","p":"[ˈɒksidʒən] n.","d":"Oxygen is a gas that all living things need to breathe.","e":"My aunt believes that the oxygen in the country is cleaner than in the city.","zh":"(名) 氧；氧氣","ez":"我阿姨認為鄉下的氧氣比城市乾淨。"},{"w":"rainforest","p":"[ˈreinˌfɔ(:)rist] n.","d":"A rainforest is a forest that is in a place where it rains very often.","e":"The rainforest is home to many animals.","zh":"熱帶雨林","ez":"雨林是許多動物的家。"},{"w":"strategy","p":"[ˈstrӕtədʒi] n.","d":"A strategy is a plan for how to do something.","e":"The team came up with a strategy to win the game.","zh":"(名) 策略；戰略","ez":"團隊想出了一個贏得比賽的策略。"},{"w":"wooded","p":"[ˈwudid] adj.","d":"If an area is wooded, it is covered with trees.","e":"Jim and Ben decided to go hiking in the wooded area by the river.","zh":"長有樹木的","ez":"吉姆和班決定去河邊的樹林區健行。"}]},{"id":28,"name":"Unit 28","words":[{"w":"avail","p":"[əˈveil] n.","d":"Avail is help. It is often used in the achievement of a goal.","e":"His studying was to no avail because he failed the test.","zh":"(動) 有用；幫助　(名) 利益；幫助","ez":"他的讀書毫無用處，因為他考試沒過。"},{"w":"expand","p":"[iksˈpænd] v.","d":"To expand is to become bigger in size.","e":"A balloon will expand as you blow air into it.","zh":"(動) 擴大；擴展　(動) 膨脹；展開","ez":"當你吹氣進去時，氣球會膨脹。"},{"w":"define","p":"[diˈfain] v.","d":"To define means to clearly state, show, or explain what something is.","e":"People define success in many different ways.","zh":"(動) 定義；解釋　(動) 確定；說明","ez":"人們用許多不同的方式定義成功。"},{"w":"dread","p":"[dread] v.","d":"To dread is to be afraid of something that could, or is going to, happen.","e":"I dread the idea that I will not get into college.","zh":"(動) 害怕；懼怕　(名) 恐懼；害怕","ez":"我害怕自己上不了大學。"},{"w":"fundamental","p":"[ˌfʌndəˈmentl] adj.","d":"If something is fundamental, it is a basic part of something.","e":"The fundamental rules of basketball are easy.","zh":"(形) 基本的；根本的　(名) 基本要素；基礎","ez":"籃球的基本規則很簡單。"},{"w":"horrifying","p":"[ˈhɔ:rəfaiŋ] adj.","d":"If something is horrifying, it is frightening and very unpleasant.","e":"There was a horrifying car accident today.","zh":"(形) 令人恐懼的；驚人的　(動) 使恐懼；使害怕","ez":"今天發生了一起可怕的車禍。"},{"w":"incredulous","p":"[inˈkredjələs] adj.","d":"If someone is incredulous about something, they do not believe that it is true.","e":"She was incredulous that monkeys could ever drive a car.","zh":"(形) 不相信的；懷疑的　(形) 難以置信的；令人難以接受的","ez":"她難以置信猴子竟然能開車。"},{"w":"linger","p":"[ˈliŋgər] v.","d":"To linger is to last for a long time.","e":"The smell of fresh cookies lingered in the bakery.","zh":"(動) 逗留；停留　(動) 緩慢消散；拖延","ez":"新鮮餅乾的香味瀰漫在麵包店裡。"},{"w":"organism","p":"[ˈɔːrgənizəm] n.","d":"An organism is a living thing, especially a very small one.","e":"We studied the organism on the microscope.","zh":"(名) 生物；有機體","ez":"我們用顯微鏡研究了那個生物體。"},{"w":"paraphrase","p":"[ˈpærəfreiz] v.","d":"To paraphrase is to make someone else’s writing or speech shorter.","e":"The students were asked to paraphrase the story they just heard.","zh":"意譯；解釋；改述","ez":"學生們被要求改寫他們剛剛聽到的故事。"},{"w":"plague","p":"[pleig] n.","d":"A plague is a serious disease that quickly spreads to many people.","e":"A plague in Europe killed millions of people.","zh":"(名) 瘟疫；災害　(動) 折磨；使苦惱","ez":"歐洲的一場瘟疫導致數百萬人死亡。"},{"w":"presently","p":"[ˈprezəntli] adv.","d":"If something happens presently, it is happening right now.","e":"Presently, our profits are good, but by next year we can do even better.","zh":"(副) 目前；不久","ez":"目前我們的利潤不錯，但明年可以做得更好。"},{"w":"random","p":"[ˈrændəm] adj.","d":"If something is random, it happens without any pattern or reason.","e":"Young children often ask random questions.","zh":"(形) 隨機的；任意的","ez":"小孩子常常問一些隨機的問題。"},{"w":"riot","p":"[ˈraiət] n.","d":"A riot is a crowd that reacts to bad news by violently breaking laws.","e":"A riot broke out after the candidate lost the election.","zh":"(名) 暴動；騷亂","ez":"候選人輸掉選舉後爆發了一場暴動。"},{"w":"scribble","p":"[ˈskribəl] v.","d":"To scribble is to write something quickly without caring about how it looks.","e":"I scribbled a rough diagram of our plan and gave it to him.","zh":"(名) 潦草的筆跡；亂寫　(動) 潦草地寫；亂畫","ez":"我草草畫了一張我們計畫的簡圖給他。"},{"w":"shrine","p":"[ʃrain] n.","d":"A shrine is a religious building built to honor a person, event, or god.","e":"He prayed at the shrine for an hour.","zh":"(名) 神社；聖地","ez":"他在神社祈禱了一個小時。"},{"w":"solitude","p":"[ˈsɒlitjuːd] n.","d":"Solitude is the state of being totally alone.","e":"John lives a life of solitude because he doesn&rsquo;t get along well with people.","zh":"(名) 孤獨；獨處","ez":"約翰過著孤獨的生活，因為他不擅長與人相處。"},{"w":"stark","p":"[stɑːrk] adj.","d":"If a contrast is stark, then the things being compared are utterly different.","e":"There is a stark contrast between their test scores.","zh":"(形) 鮮明的；赤裸的","ez":"他們的考試成績有明顯的對比。"},{"w":"summon","p":"[ˈsʌmən] v.","d":"To summon a person is to ask them to come to you.","e":"We summoned the doctor as soon as we noticed she was sick.","zh":"(動) 召喚；召集","ez":"我們一發現她生病就立刻叫了醫生。"},{"w":"worsen","p":"[ˈwəːrsən] v.","d":"To worsen is to get worse.","e":"The weather suddenly worsened, and we had to stay inside.","zh":"(動) 惡化；變壞","ez":"天氣突然變糟，我們只好待在室內。"}]},{"id":29,"name":"Unit 29","words":[{"w":"automobile","p":"[ˈɔːtəməbiːl] n.","d":"An automobile is a car.","e":"The first automobiles were very different from the ones that exist today.","zh":"(名) 汽車；自動車","ez":"最早的汽車和現在的樣子很不一樣。"},{"w":"candidate","p":"[ˈkændideit] n.","d":"A candidate is a person who is competing to win something such as a job.","e":"Alice is the best candidate for the job.","zh":"(名) 候選人；應徵者　(名) 考生；申請人","ez":"愛麗絲是這份工作的最佳人選。"},{"w":"confidential","p":"[ˌkɒnfɪˈdenʃəl] adj.","d":"If something is confidential, it must be kept secret.","e":"The information from the meeting is confidential.","zh":"(形) 機密的；保密的　(形) 信任的；親密的","ez":"會議中的資訊是保密的。"},{"w":"corporate","p":"[ˈkɔːrpərit] adj.","d":"If something is corporate, it is related to a large business.","e":"Tom enjoys working in the corporate world.","zh":"(形) 公司的；企業的　(名) 公司；企業","ez":"湯姆喜歡在企業界工作。"},{"w":"enhance","p":"[enhæns] v.","d":"To enhance something is to make it better.","e":"Amy&rsquo;s blue shirt really enhances the color of her eyes.","zh":"(動) 提高；增強　(動) 改善；增進","ez":"艾咪的藍色襯衫讓她的眼睛顏色更突出。"},{"w":"era","p":"[ˈerə] n.","d":"An era is a period of time that has something special about it.","e":"During the medieval era, knights wore protective armor.","zh":"(名) 時代；年代　(名) 時期；紀元","ez":"在中世紀時期，騎士會穿戴防護盔甲。"},{"w":"guideline","p":"[ˈgaidlain] n.","d":"A guideline is a rule about how to do something.","e":"Before they began the project, the teacher gave them some guidelines.","zh":"(名) 指導方針；準則　(名) 指引；標準","ez":"在他們開始這個專案前，老師給了他們一些指導方針。"},{"w":"incorporate","p":"[inˈkɔːrpəreit] v.","d":"To incorporate is to add something to another thing.","e":"I decided to incorporate a new ingredient into my cake recipe.","zh":"(動) 併入；納入　(動) 成立公司；設立法人","ez":"我決定在我的蛋糕食譜中加入一種新食材。"},{"w":"interact","p":"[intərˈӕkt] v.","d":"To interact is to talk to or do something with another person.","e":"The kids began to interact when the adults left the room.","zh":"(動) 互動；相互作用　(名) 互動；交互作用","ez":"大人離開房間後，孩子們開始互動起來。"},{"w":"interval","p":"[ˈintərvəl] n.","d":"An interval is the time between two things happening.","e":"Tony rested for brief intervals while he worked in the yard.","zh":"(名) 間隔；間隙　(名) 休息時間；中場休息","ez":"東尼在院子裡工作時會短暫休息。"},{"w":"mobile","p":"[ˈmoubail] adj.","d":"If something is mobile, it can be moved easily.","e":"Mobile phones are popular because you can take them anywhere.","zh":"(形) 可移動的；流動的　(名) 手機；行動電話","ez":"手機很受歡迎，因為你可以隨身攜帶。"},{"w":"modify","p":"[ˈmɒdəfai] v.","d":"To modify something is to change it a little bit.","e":"I modified my outfit by adding a belt to it.","zh":"(動) 修改；改變　(動) 調整；改進","ez":"我修改了我的服裝，加了一條腰帶。"},{"w":"parallel","p":"[ˈpærəlel] adj.","d":"If two things are parallel, they are the same distance away from each other.","e":"There are two yellow parallel lines dividing both sides of traffic.","zh":"(形) 平行的；(動) 與…平行；(名) 平行線","ez":"有兩條黃色的平行線分隔雙向車流。"},{"w":"phenomenon","p":"[fiˈnɒmənɒn] n.","d":"A phenomenon is something that can be seen as it is happening.","e":"I was amazed when I saw the phenomenon of shooting stars.","zh":"(名) 現象","ez":"看到流星現象時我感到驚奇。"},{"w":"pollute","p":"[pəˈluːt] v.","d":"To pollute means to make air, water, or land dirty, unclean, or foul.","e":"The careless factory polluted the river with chemicals.","zh":"(動) 污染","ez":"粗心的工廠用化學物質污染了河流。"},{"w":"ridicule","p":"[ˈridikjuːl] v.","d":"To ridicule is to make fun of something in a mean way.","e":"The other students ridicule Peter&rsquo;s foreign accent.","zh":"(名) 嘲笑；奚落　(動) 嘲笑；奚落","ez":"其他學生嘲笑彼得的異國口音。"},{"w":"solar","p":"[ˈsoulə:r] adj.","d":"If something is solar, it is related to the sun.","e":"Using solar energy is good for the environment.","zh":"(形) 太陽的；太陽能的","ez":"使用太陽能對環境有益。"},{"w":"territory","p":"[ˈterətɔ:ri] n.","d":"A territory is a piece of land that belongs to a country but isn’t a state.","e":"Gibraltar is a territory of Great Britain.","zh":"(名) 領土；領域","ez":"直布羅陀是英國的領土。"},{"w":"tournament","p":"[ˈtuə:rnəmənt] n.","d":"A tournament is a competition, usually with many people participating.","e":"My dad is playing in a golf tournament tomorrow.","zh":"(名) 錦標賽；聯賽","ez":"我爸爸明天要參加一場高爾夫球賽。"},{"w":"transportation","p":"[ˌtrænspəːrˈteɪʃən] v.","d":"Transportation is any type of vehicle that can carry people or things.","e":"I don&rsquo;t have a car, so my normal transportation is the train.","zh":"(名) 交通；運輸","ez":"我沒有車，所以平常的交通工具是火車。"}]},{"id":30,"name":"Unit 30","words":[{"w":"bill","p":"[bil] n.","d":"A bill is a statement of money owed for goods or a service.","e":"I have so many bills that I do not know how to pay for them all.","zh":"(名) 帳單；帳款　(名) 鈔票；紙幣　(名) 法案；議案","ez":"我帳單太多，不知道該怎麼付清。"},{"w":"boundary","p":"[ˈbaundəri] n.","d":"A boundary is the line where one area of land stops, and another begins.","e":"This fence shows the boundary between our yard and yours.","zh":"(名) 邊界；界線　(名) 界限；範圍","ez":"這道圍籬標示了我們家和你們家的界線。"},{"w":"chaos","p":"[ˈkeiɒs] n.","d":"Chaos is a situation that is confusing and not ordered.","e":"His presentation was in chaos. I couldn&rsquo;t understand what he meant.","zh":"(名) 混亂；混沌　(名) 極度混亂的狀態；無序","ez":"他的簡報一團亂，我聽不懂他想表達什麼。"},{"w":"consistent","p":"[kənˈsistənt] adj.","d":"If a person is consistent, they keep the same behavior or attitude.","e":"Sara comes in every day and is our most consistent worker.","zh":"(形) 一致的；前後相符的　(形) 持續的；堅持不懈的","ez":"莎拉每天都來上班，是我們最穩定的員工。"},{"w":"cyclone","p":"[ˈsaikloun] n.","d":"A cyclone is a large storm with heavy rain and winds that spin in a circle.","e":"Hundreds of homes were damaged by the cyclone.","zh":"旋風；氣旋；龍捲風","ez":"數百間房屋被氣旋摧毀。"},{"w":"doomed","p":"[duːmd] adj.","d":"If someone or something is doomed, they are going to fail or be destroyed.","e":"Since I spent all my money, my date with Jane is doomed.","zh":"(形) 注定失敗的；必然滅亡的","ez":"因為我把錢都花光了，和珍的約會註定失敗。"},{"w":"heir","p":"[ɛər] n.","d":"An heir is a person who receives money or property of someone who dies.","e":"The princess was the heir to the king and queen&rsquo;s throne.","zh":"(名) 繼承人；法定繼承人　(名) 繼承者；承人","ez":"公主是國王和王后王位的繼承人。"},{"w":"martial","p":"[ˈmɑːrʃəl] n.","d":"If something is martial, it is related to fighting or war.","e":"Karate is a martial art that began many years ago in Japan.","zh":"(形) 軍事的；戰爭的　(形) 好戰的；勇武的","ez":"空手道是一種源自日本多年的武術。"},{"w":"organic","p":"[ɔːrˈgænik] adj.","d":"If food is organic, it is grown without adding chemicals to it.","e":"The organic carrots are more expensive, but they&rsquo;re better for you.","zh":"(形) 有機的；有機體的","ez":"有機胡蘿蔔比較貴，但對身體更好。"},{"w":"poultry","p":"[ˈpoultri] n.","d":"Poultry is a bird, such as a chicken, that is used for meat and eggs.","e":"He raises poultry and sells their meat for extra money.","zh":"(名) 家禽；家禽肉","ez":"他飼養家禽並賣肉來賺外快。"},{"w":"scramble","p":"[ˈskræmbl] v.","d":"To scramble is to move somewhere quickly and desperately.","e":"The hikers scrambled down the side of the hill.","zh":"(動) 爭搶；攀爬","ez":"登山者手腳並用地爬下山坡。"},{"w":"sergeant","p":"[ˈsɑːrdʒənt] n.","d":"A sergeant is a soldier or police officer of middle rank.","e":"He was promoted to sergeant after a year in the army.","zh":"(名) 士官；中士","ez":"他在軍中一年後晉升為中士。"},{"w":"sheer","p":"[ʃiə:r] adj.","d":"If you describe something as sheer, it is complete and very strong.","e":"I was impressed by her sheer dedication to jogging.","zh":"(形) 純粹的；完全的；陡峭的","ez":"她對慢跑的純粹投入讓我印象深刻。"},{"w":"stance","p":"[stæns] n.","d":"A stance is an attitude about an issue that someone states clearly.","e":"My stance is that using oil and gas is bad for the environment.","zh":"(名) 立場；姿勢","ez":"我的立場是使用石油和天然氣對環境有害。"},{"w":"telegraph","p":"[ˈteləgræf] n.","d":"A telegraph is a method of sending electric messages on wires.","e":"In the 1900s, the telegraph was the fastest way to send a message.","zh":"(名) [`tɛlə.græf] 電報機；電報　(動) [tə`lɛgrəf] 打電報；電傳","ez":"在1900年代，電報是傳送訊息最快的方式。"},{"w":"textile","p":"[ˈtekstail] n.","d":"Textile is cloth that has been woven or knitted.","e":"The blue textile was going to be used to make blouses.","zh":"(名) 紡織品；紡織業　(形) 紡織的","ez":"這塊藍色布料將用來做女襯衫。"},{"w":"tornado","p":"[tɔːrˈneidou] n.","d":"A tornado is a tube-shaped formation of air that spins very quickly.","e":"During a tornado, the safest place to be is underground.","zh":"(名) 龍捲風","ez":"龍捲風來襲時，最安全的地方是地下。"},{"w":"typhoon","p":"[taiˈfuːn] n.","d":"A typhoon is a large tropical storm that moves in circles.","e":"Thousands of people lost electricity after a typhoon hit Australia.","zh":"(名) 颱風","ez":"颱風襲擊澳洲後，數千人無電可用。"},{"w":"wail","p":"[weil] v.","d":"To wail is to show sadness by crying loudly.","e":"The baby wailed because it was hungry.","zh":"(動) 哭嚎；哀號","ez":"嬰兒因為餓了而嚎啕大哭。"},{"w":"wardrobe","p":"[ˈwɔːrdroub] n.","d":"A wardrobe is the collection of all of a person’s clothing.","e":"She bought some new clothes to expand her wardrobe.","zh":"(名) 衣櫥；衣櫃","ez":"她買了一些新衣服來擴充衣櫃。"}]},{"id":31,"name":"Index","words":[]}]},{"id":5,"name":"Book 5","units":[{"id":1,"name":"Unit 1","words":[{"w":"allot","p":"[əˈlɒt] v.","d":"To allot something means to give it to someone.","e":"The coach allotted each team five minutes to prepare a strategy.","zh":"(動) 分配；分派　(動) 撥給；預留","ez":"教練分配給每隊五分鐘來制定策略。"},{"w":"appall","p":"[əˈpɔ:l] v.","d":"To appall means to horrify, shock, or disgust someone.","e":"The boy was appalled when he saw the accident.","zh":"(動) 使震驚；使驚愕　使感到厭惡","ez":"那個男孩看到事故時嚇壞了。"},{"w":"cache","p":"[kæʃ] n.","d":"A cache is a hiding place for valuable things.","e":"The pirates kept their jewelry in a cache hidden in a cave.","zh":"隱藏物；隱藏所；電腦的；高速緩衝記憶體；快取記憶體","ez":"海盜們把珠寶藏在一個洞穴裡的隱藏處。"},{"w":"convenience","p":"[kənˈviːnjənt] n.","d":"Convenience is a state of being able to do something with little effort.","e":"The Internet allows consumers to shop at their own convenience.","zh":"(名) 便利；方便　(名) 便利設施；便利商店","ez":"網路讓消費者可以隨時方便地購物。"},{"w":"dearth","p":"[dəːrθ] n.","d":"A dearth is an amount or supply which is not large enough.","e":"There is a dearth of money in my bank account. I can&rsquo;t afford a new car.","zh":"(名) 缺乏；短缺　(名) 不足量","ez":"我的銀行帳戶裡錢不夠，買不起新車。"},{"w":"deliberate","p":"[diˈlibərit] adj.","d":"If a thing you do is deliberate, you intend to do it.","e":"She made a deliberate effort to save money each month.","zh":"(動) 仔細考慮；深思熟慮　(形) 故意的；蓄意的；深思熟慮的","ez":"她每個月刻意努力存錢。"},{"w":"dire","p":"[ˈdaiər] adj.","d":"When something is dire, it is terrible and very serious.","e":"The tornado created a dire situation for the small town.","zh":"(形) 極度的；危急的　(形) 嚴重的；絕望的","ez":"龍捲風為這個小鎮帶來了危急的情況。"},{"w":"elapse","p":"[iˈlæps] v.","d":"To elapse means to pass, as in seconds, minutes, or hours.","e":"A few seconds must elapse before you can take another picture.","zh":"(動) 時間流逝；經過　(名) 時間的流逝；間隔","ez":"你必須等幾秒鐘才能拍下一張照片。"},{"w":"empathy","p":"[ˈempəθi] n.","d":"Empathy is sharing or understanding another person’s feelings.","e":"The caring nurse had empathy for her patients.","zh":"(名) 同理心；換位思考　(動) 感同身受；體諒","ez":"這位體貼的護士對她的病人充滿同理心。"},{"w":"fanciful","p":"[ˈfænsifəl] adj.","d":"When something is fanciful, it is unusual or unrealistic.","e":"The girl had fanciful ideas about doing well in school without studying.","zh":"(形) 充滿想像的；異想天開的　(形) 虛構的；不切實際的","ez":"那個女孩幻想不讀書也能在學校表現良好。"},{"w":"gripe","p":"[graip] v.","d":"To gripe means to complain constantly.","e":"Lawrence always gripes when he has to do chores.","zh":"(動) 抱怨；發牢騷；使不滿　(名) 不滿；怨言","ez":"勞倫斯每次做家事時總是抱怨。"},{"w":"grueling","p":"[ˈgru:əliŋ] adj.","d":"When something is grueling, it is very hard to do.","e":"The climber faced the grueling task of reaching the top of the steep mountain.","zh":"(形) 極其疲勞的；令人筋疲力盡的　(動) 使極度疲勞；使筋疲力盡","ez":"登山者面臨爬到陡峭山頂的艱鉅任務。"},{"w":"mundane","p":"[ˈmʌnˈdein] adj.","d":"When something is mundane, it is boring, common, or ordinary.","e":"The man had the mundane chore of raking thousands of leaves into piles.","zh":"(形) 平凡的；單調的　(形) 日常的；普通的","ez":"這個人做著把數千片樹葉耙成堆的單調工作。"},{"w":"opt","p":"[ɒpt] v.","d":"To opt is to make a choice, especially when deciding in favor of something.","e":"My brother likes chocolate ice cream, but I always opt for vanilla.","zh":"(動) 選擇；決定　(動) 選用；採用","ez":"我哥哥喜歡巧克力冰淇淋，但我總是選香草口味。"},{"w":"outrage","p":"[ˈautreidʒ] n.","d":"Outrage is a very strong emotion of anger or shock.","e":"Tommy was feeling outrage when his parents said he couldn&rsquo;t go to the dance.","zh":"(名) [ˈaʊtˌredʒ] 憤怒；暴行　(動) [aʊtˈredʒ] 激怒；使震怒","ez":"當父母說湯米不能去舞會時，他感到非常憤怒。"},{"w":"paltry","p":"[ˈpɔːltri] adj.","d":"When an amount of something is paltry, it is very small.","e":"The poor man had a paltry sum of money.","zh":"金錢；微不足道的；無價值的；低劣的；可鄙的","ez":"那個可憐的人只有一點點錢。"},{"w":"rectify","p":"[ˈrektəfai] v.","d":"To rectify something means to correct it.","e":"I quickly rectified the spelling mistakes that I had on my essay.","zh":"(動) 改正；糾正","ez":"我很快修正了論文中的拼寫錯誤。"},{"w":"resourceful","p":"[riˈsɔːrsfəl] adj.","d":"When someone is resourceful, they are good at dealing with hard situations.","e":"After his boat sunk, Matt was resourceful enough to build a raft.","zh":"機敏的；足智多謀的","ez":"船沉沒後，麥特足智多謀地造了一艘木筏。"},{"w":"sustenance","p":"[ˈsʌstənəns] n.","d":"Sustenance is food and water needed to keep a person, animal, or plant alive.","e":"Without the proper sustenance, the man will starve.","zh":"食物；營養；支持；支撐","ez":"沒有適當的食物，這個人會餓死。"},{"w":"tedious","p":"[ˈtiːdiəs] adj.","d":"When something is tedious, it is long, frustrating, and boring.","e":"His job involved a lot of tedious typing, filing, and organizing.","zh":"(形) 乏味的；冗長的","ez":"他的工作包括大量繁瑣的打字、歸檔和整理。"}]},{"id":2,"name":"Unit 2","words":[{"w":"abbey","p":"[ˈæbi] n.","d":"An abbey is a house or group of houses where monks or nuns live.","e":"When the monk returned to the abbey, he went immediately to his bedroom.","zh":"(名) 修道院；大教堂","ez":"僧侶回到修道院後，直接去了他的臥室。"},{"w":"abundant","p":"[əˈbʌndənt] adj.","d":"If something is abundant, then it is available in large quantities.","e":"Cakes, cookies, and candy were so abundant that the child was very happy.","zh":"(形) 豐富的；大量的","ez":"蛋糕、餅乾和糖果非常豐富，孩子非常開心。"},{"w":"adjoin","p":"[əˈdʒɔin] v.","d":"To adjoin something means to be next to or attached to something else.","e":"She can listen to her brother&rsquo;s conversations because her room adjoins his.","zh":"(動) 與...相鄰；毗鄰　(動) 靠近；接近","ez":"她可以聽到哥哥的對話，因為她的房間緊鄰他的房間。"},{"w":"ample","p":"[ˈæmpl] adj.","d":"If something is ample, then it is enough or more than enough.","e":"There was an ample supply of oats to feed the horses.","zh":"(形) 充足的；豐富的　(形) 寬敞的；寬闊的","ez":"有充足的燕麥來餵馬。"},{"w":"arid","p":"[ˈærid] adj.","d":"If a place is arid, then it is hot and dry and gets very little or no rain.","e":"Not many plants grow in the arid desert.","zh":"(形) 乾旱的；缺水的　(形) 枯燥的；無趣的","ez":"乾燥的沙漠中長不出多少植物。"},{"w":"cathedral","p":"[kəˈθiːdrəl] n.","d":"A cathedral is an important and often large and beautifully built church.","e":"The large cathedral is full of people on Sunday mornings.","zh":"(名) 大教堂；主教座堂　(形) 主要的；中心的","ez":"週日上午大教堂裡擠滿了人。"},{"w":"deprive","p":"[diˈpraiv] v.","d":"To deprive someone of something means to not let them have it.","e":"Because the child was bad, she was deprived of her dessert after dinner.","zh":"(動) 剝奪；使失去　(動) 使處於貧困","ez":"因為孩子表現不好，晚餐後她被剝奪了甜點。"},{"w":"drought","p":"[draut] n.","d":"A drought is a long period of time in which little or no rain falls.","e":"After three months of drought, the vegetation and trees started dying.","zh":"(名) 乾旱；缺水　(動) 使乾旱","ez":"經過三個月的乾旱，植被和樹木開始枯死。"},{"w":"eligible","p":"[ˈelidʒəbəl] adj.","d":"If someone is eligible, then they are permitted to do or have something.","e":"Only people who bought tickets were eligible to win a prize.","zh":"(形) 有資格的；符合條件的　(形) 合適的；可取的","ez":"只有買票的人才有資格贏得獎品。"},{"w":"fast","p":"[fæst] v.","d":"To fast means to go without food or drink for a period of time.","e":"In her religion, they fast for five days and then have a big feast.","zh":"(形) 快的；迅速的　(副) 快地；迅速地","ez":"在她的宗教中，他們禁食五天，然後舉辦一場盛宴。"},{"w":"grumble","p":"[ˈgrʌmbəl] v.","d":"To grumble means to complain.","e":"He grumbled about having to work late on Friday.","zh":"(動) 抱怨；嘟囔　(名) 抱怨；低沉的聲音","ez":"他抱怨星期五必須加班。"},{"w":"inland","p":"[ˈinlənd] adv.","d":"If someone goes inland, they travel into the center of a country or land.","e":"The river curved inland near the campground.","zh":"(形) 內陸的；靠近內陸的　(名) 內陸；內地","ez":"河流在露營地附近轉向內陸。"},{"w":"moisture","p":"[ˈmɔistʃər] n.","d":"Moisture is small drops of water in the air or on a surface.","e":"If you breathe on a window, moisture from your breath collects on the glass.","zh":"(名) 濕度；水分　(動) 使濕潤；增加水分","ez":"如果你對著窗戶呼氣，呼吸中的水氣會凝結在玻璃上。"},{"w":"nonetheless","p":"[ˌnʌnðəˈles] adv.","d":"If something happens nonetheless, then it occurs despite some other thing.","e":"She tried to keep the dog out of the mud, but it got dirty nonetheless.","zh":"(連) 然而；但是　(副) 儘管如此；仍然","ez":"她試圖讓狗遠離泥巴，但牠還是弄髒了。"},{"w":"oath","p":"[ouθ] n.","d":"An oath is a formal, often public, promise.","e":"Judges must take an oath to be fair to everyone in court.","zh":"(名) 誓言；誓約　(動) 發誓；起誓","ez":"法官必須宣誓在法庭上對每個人公平。"},{"w":"prairie","p":"[ˈprɛəri] n.","d":"A prairie is a large flat area of grassland.","e":"The prairie was perfect for a farm because there were hills and trees.","zh":"(名) 大草原；牧場","ez":"這片草原非常適合農場，因為有山丘和樹木。"},{"w":"ragged","p":"[ˈrægid] adj.","d":"If something is ragged, then it is old, torn, and falling apart.","e":"They could see his toes through the holes in his ragged shoes.","zh":"(形) 破爛的；衣衫襤褸的","ez":"他們可以透過他破爛鞋子上的洞看到他的腳趾。"},{"w":"rugged","p":"[ˈrʌgid] adj.","d":"If an area of land is rugged, then it is rocky and difficult to travel through.","e":"Their car couldn&rsquo;t make it far along the rugged roads.","zh":"(形) 崎嶇的；堅韌的","ez":"他們的車在崎嶇的道路上開不遠。"},{"w":"scarce","p":"[ˈskɛə:rs] adj.","d":"If something is scarce, then it is in a very small amount.","e":"When gasoline was scarce, we rode our bikes, instead of driving, to school.","zh":"(形) 缺乏的；稀有的","ez":"汽油短缺時，我們騎腳踏車上學，而不是開車。"},{"w":"speculate","p":"[ˈspekjəleit] v.","d":"To speculate means to guess about something.","e":"My sister looked at the sky and speculated that it would rain tomorrow.","zh":"(動) 推測；投機","ez":"我姐姐看著天空，推測明天會下雨。"}]},{"id":3,"name":"Unit 3","words":[{"w":"analytic","p":"[ˌænəˈlitik] adj.","d":"If something is analytic, it is related to logic and reasoning.","e":"The analytic article criticized the new plan and presented one of its own.","zh":"分析的；分析的；邏輯的；分析性的；指；分析性的","ez":"這篇分析文章批評了新計劃，並提出了自己的方案。"},{"w":"assert","p":"[əˈsəːrt] v.","d":"To assert a fact or belief means to state it with confidence.","e":"He asserted that his mother&rsquo;s cooking was better than his best friend&rsquo;s.","zh":"(動) 主張；聲稱　(動) 堅持；維護","ez":"他斷言他母親的廚藝比他最好的朋友的母親更好。"},{"w":"bachelor","p":"[ˈbætʃələr] n.","d":"A bachelor is an unmarried man.","e":"Since he was a bachelor, Jason did his shopping by himself.","zh":"(名) 學士；未婚男子　(名) 單身漢；獨身者","ez":"因為是單身漢，傑森自己購物。"},{"w":"calculus","p":"[ˈkælkjələs] n.","d":"Calculus is an advanced type of mathematics.","e":"By using calculus, scientists determined small changes in the stars&rsquo; brightness.","zh":"微積分","ez":"科學家利用微積分確定了星星亮度的微小變化。"},{"w":"celestial","p":"[səˈlestʃəl] adj.","d":"If something is celestial, it is related to the sky or to outer space.","e":"Comets are celestial objects that are rarely seen.","zh":"(形) 天空的；天體的　(形) 極其美妙的；夢幻般的","ez":"彗星是很少見的天體。"},{"w":"cognitive","p":"[ˈkɒgnətiv] adj.","d":"If something is cognitive, it is related to learning and knowing things.","e":"After her physical examination, her cognitive strengths were tested.","zh":"(形) 認知的；涉及思考的　(名) 認知能力","ez":"體檢後，她的認知能力接受了測試。"},{"w":"collision","p":"[kəˈliʒən] n.","d":"A collision is the act of two things hitting into each another.","e":"The collision between the two cars created a loud noise.","zh":"(名) 碰撞；衝突　(名) 抵觸；矛盾","ez":"兩輛車相撞發出巨大的聲響。"},{"w":"competent","p":"[ˈkɒmpətənt] adj.","d":"If someone is competent, they are able to think or act successfully.","e":"Competent employees are much better than unknowledgeable ones.","zh":"(形) 勝任的；能幹的　(形) 足夠的；充分的","ez":"能幹的員工遠比無知的員工好。"},{"w":"diploma","p":"[diˈploumə] n.","d":"A diploma is a certificate proving that someone has completed their studies.","e":"After four years of college, Mary finally had a diploma.","zh":"(名) 文憑；畢業證書　(名) 外交文件；國家證書","ez":"上了四年大學後，瑪麗終於拿到了文憑。"},{"w":"excel","p":"[ikˈsel] v.","d":"To excel at a subject or activity means to be very good at it.","e":"Jenny excels at playing the piano.","zh":"(動) 擅長；傑出　(動) 超越；勝過","ez":"珍妮擅長彈鋼琴。"},{"w":"geology","p":"[dʒiˈɒlədʒi] n.","d":"Geology is the study of the Earth’s natural structures and how they change.","e":"Because he studied geology, he knew how the mountains were formed.","zh":"(名) 地質學；地質構造","ez":"因為他讀過地質學，所以他知道山脈是怎麼形成的。"},{"w":"harness","p":"[ˈhɑːrnis] v.","d":"To harness something means to control and use it, usually to make energy.","e":"The sails harness the wind in order to move.","zh":"(名) 馬具；安全帶　(動) 利用；駕馭；套上馬具","ez":"船帆利用風力來移動。"},{"w":"intellect","p":"[ˈintəlekt] n.","d":"An intellect is a person’s ability to understand things easily.","e":"She was known for her quick and strong intellect as well as her beauty.","zh":"(名) 智力；理智　(名) 聰慧的人；知識份子","ez":"她以敏捷的頭腦和美貌聞名。"},{"w":"keen","p":"[kiːn] adj.","d":"If someone is keen, they are intelligent.","e":"Only the keenest of students could have solved that math problem.","zh":"(形) 熱情的；積極的　(形) 敏銳的；靈敏的","ez":"只有最敏銳的學生才能解出那道數學題。"},{"w":"mythology","p":"[miˈθɒlədʒi] n.","d":"Mythology is a group of stories from a particular country or region.","e":"Egyptian mythology was the basis for a religion.","zh":"(名) 神話；神話故事　(名) 神話體系；傳說","ez":"埃及神話是一個宗教的基礎。"},{"w":"physiology","p":"[ˌfiziˈɒlədʒi] n.","d":"Physiology is the study of the various parts of living things.","e":"His work in physiology helped him understand how the human body works.","zh":"(名) 生理學","ez":"他的生理學研究幫助他了解人體如何運作。"},{"w":"radioactive","p":"[reidiouˈӕktiv] adj.","d":"If something is radioactive, then it lets out, or is related to, radiation.","e":"Radioactive materials can be very bad for anyone&rsquo;s health.","zh":"(形) 放射性的","ez":"放射性物質對任何人的健康都可能非常有害。"},{"w":"relativity","p":"[ˌreləˈtivəti] n.","d":"Relativity is a set of ideas about time and space developed by Albert Einstein.","e":"Relativity teaches that light travels at the same speed in the universe.","zh":"(名) 相對論；相對性","ez":"相對論告訴我們，光在宇宙中以相同速度行進。"},{"w":"sociology","p":"[ˌsousiˈɒlədʒi] n.","d":"Sociology is the study of human society, its organizations, and problems.","e":"Sociology teaches that people&rsquo;s problems are a result of their society.","zh":"(名) 社會學","ez":"社會學教導我們，人們的問題源於他們的社會。"},{"w":"theoretical","p":"[θiəˈretikəl] adj.","d":"If something is theoretical, it is based on theory rather than experience.","e":"His conclusion was only theoretical and not meant to be publicized.","zh":"(形) 理論上的；假設的","ez":"他的結論只是理論性的，並非打算公開。"}]},{"id":4,"name":"Unit 4","words":[{"w":"administrator","p":"[ædˈminəstreitər] n.","d":"An administrator is a person who controls a business, company, or organization.","e":"Everyone in the store did whatever the administrator asked them to do.","zh":"(名) 管理者；行政人員　(名) 遺產管理人","ez":"店裡的每個人都照著管理員的指示做事。"},{"w":"affluent","p":"[ˈæflu(:)ənt] adj.","d":"If someone is affluent, they are wealthy.","e":"People in the city are usually more affluent than people in the country.","zh":"(形) 富裕的；富有的　(形) 充足的；豐富的","ez":"城市裡的人通常比鄉下人更有錢。"},{"w":"audit","p":"[ˈɔːdit] v.","d":"To audit means to inspect financial records from a person or business.","e":"The government usually audits companies that report lower than usual incomes.","zh":"(名) 審計；稽核　(動) 審計；旁聽","ez":"政府通常會審計那些申報收入比平常低的公司。"},{"w":"automate","p":"[ˈɔːtəmeit] v.","d":"To automate a company means to install machines or computers to do the work.","e":"When the bank automated, it started installing ATM machines.","zh":"(動) 自動化；使自動運作　(名) 自動化系統","ez":"銀行自動化後，開始安裝自動提款機。"},{"w":"bribe","p":"[braib] v.","d":"To bribe someone means to illegally persuade them for a favor with money.","e":"The judge was bribed so that she would set the suspect free.","zh":"(名) 賄賂；贿金　(動) 贿赂；用賄賂收買","ez":"法官被賄賂，所以她會釋放嫌疑犯。"},{"w":"corrupt","p":"[kəˈrʌpt] adj.","d":"If someone is corrupt, they break the law for money or fame.","e":"The corrupt policemen didn&rsquo;t arrest the man because he gave them money.","zh":"(形) 腐敗的；貪汙的　(動) 使腐敗；使墮落","ez":"那些貪腐的警察沒有逮捕那個人，因為他給了他們錢。"},{"w":"dispose","p":"[diˈspouz] v.","d":"To dispose of something means to get rid of it.","e":"He disposed of the can by throwing it into the recycle bin.","zh":"(動) 處理；丟棄　(動) 使傾向；使有意願","ez":"他把罐子丟進回收桶裡處理掉。"},{"w":"headquarters","p":"[ˈhedˈkwɔːrtərz] n.","d":"A headquarters is a building where the bosses of a company work.","e":"He drove the long route to headquarters because it was a nice day.","zh":"(名) 總部；司令部　(名) 指揮中心；總指揮處","ez":"他開車走長路去總部，因為天氣很好。"},{"w":"incentive","p":"[inˈsentiv] n.","d":"An incentive is what makes a person want to do something.","e":"The chance of winning a prize was incentive to get people to play the game.","zh":"(名) 獎勵；動力　(形) 有激勵作用的；鼓勵性的","ez":"贏得獎品的機會是鼓勵人們玩遊戲的誘因。"},{"w":"infrastructure","p":"[ˈinfrəˌstrʌtʃər] n.","d":"An infrastructure is a collection of services needed to run a society or business.","e":"Power lines are important parts of a city&rsquo;s infrastructure.","zh":"(名) 基礎設施；基礎建設　(名) 公共設施；下層結構","ez":"電線是城市基礎設施的重要部分。"},{"w":"legislate","p":"[ˈledʒisleit] v.","d":"To legislate means to make laws.","e":"Senators have to legislate fairly, so most people will enjoy the benefits.","zh":"(動) 立法；制定法律　(動) 通過法律","ez":"參議員必須公平立法，讓大多數人能享受福利。"},{"w":"legitimate","p":"[liˈdʒitəmit] adj.","d":"If something is legitimate, then it is acceptable according to the law.","e":"She found a legitimate plan to raise extra funds for her vacation.","zh":"(形) 合法的；正當的　(形) 真實的；正宗的","ez":"她找到一個合法的計畫來為她的假期籌措額外資金。"},{"w":"manipulate","p":"[məˈnipjəleit] v.","d":"To manipulate something means to skillfully or unfairly control or affect it.","e":"The Dr. manipulated the data to make it look like the cure was working.","zh":"(動) 操縱；控制　巧妙處理；操作","ez":"醫生操縱數據，讓治療看起來有效。"},{"w":"merchandise","p":"[ˈməːrtʃəndaiz] n.","d":"Merchandise is goods ready to be purchased or sold.","e":"The store added more merchandise because there were more shoppers.","zh":"(名) 商品；貨物　(動) 推銷；販售商品","ez":"商店增加了更多商品，因為購物者變多了。"},{"w":"retail","p":"[ˈriːteil] n.","d":"Retail is the activity of selling goods to the public, often for personal use.","e":"Though cheap to make, once a t-shirt reaches retail, it costs ten times as much.","zh":"(名) [ˋritel] 零售　(動) [riˋtel] 零售","ez":"雖然T恤製作成本低，但一到零售價就貴了十倍。"},{"w":"revenue","p":"[ˈrevənjuː] n.","d":"Revenue is the income made by a company.","e":"The new products really increased the business&rsquo;s monthly revenue.","zh":"(名) 收入；稅收","ez":"新產品確實增加了這家公司的月收入。"},{"w":"rubbish","p":"[ˈrʌbiʃ] n.","d":"Rubbish is trash or waste.","e":"The floor around the garbage can was covered with all kinds of rubbish.","zh":"(名) 垃圾；廢物","ez":"垃圾桶周圍的地板堆滿了各種垃圾。"},{"w":"subsidy","p":"[ˈsʌbsidi] n.","d":"A subsidy is money given by the government to companies to assist them.","e":"The official gave the company a subsidy, so it could open two new factories.","zh":"(名) 補助金；津貼","ez":"官員給這家公司補助，讓它能開兩間新工廠。"},{"w":"transaction","p":"[trænˈsækʃən] n.","d":"A transaction is an act of buying or selling something.","e":"Because the clerk was new at the job, the simple transaction took a long time.","zh":"(名) 交易；處理","ez":"因為店員是新手，簡單的交易花了很多時間。"},{"w":"violate","p":"[ˈvaiəleit] v.","d":"To violate a law, rule, or agreement means to break it.","e":"I was given a ticket because the policeman said I violated the speed limit.","zh":"(動) 違反；違背","ez":"我被開了罰單，因為警察說我超速。"}]},{"id":5,"name":"Unit 5","words":[{"w":"assess","p":"[əˈses] v.","d":"To assess something means to judge the structure, purpose, or quality of it.","e":"She assessed the condition of the toy car before buying it.","zh":"(動) 評估；評價　(動) 估計；判斷","ez":"她在買玩具車之前先評估了它的狀況。"},{"w":"astonish","p":"[əˈstɒniʃ] v.","d":"To astonish someone means to greatly surprise them.","e":"The amount of people that came to her party astonished her.","zh":"(動) 使驚訝；使震驚　(動) 使吃驚；讓人感到意外","ez":"來參加她派對的人數讓她大吃一驚。"},{"w":"commence","p":"[kəˈmens] v.","d":"To commence something means to begin it.","e":"His speech commenced with a &ldquo;thankyou&rdquo; to all who had helped him succeed.","zh":"(動) 開始；著手　(名) 開始；開幕式","ez":"他的演講以感謝所有幫助他成功的人開場。"},{"w":"essence","p":"[ˈesəns] n.","d":"The essence of something is its important qualities or basic characteristics.","e":"The essence of the argument was that both sides felt they had lost money.","zh":"(名) 本質；精髓　(名) 精油；香精","ez":"爭論的重點是雙方都覺得自己虧了錢。"},{"w":"extract","p":"[ikˈstrӕkt] v.","d":"To extract something means to remove it.","e":"The dentist extracted the woman&rsquo;s damaged tooth and put in a fake one.","zh":"(動) [ɪkˈstrækt] 提取；萃取　(名) [ˈɛkstrækt] 精華；萃取物","ez":"牙醫拔掉了那位女士的壞牙，並裝上假牙。"},{"w":"fabulous","p":"[ˈfæbjələs] adj.","d":"If something is fabulous, it is extremely good.","e":"This strawberry is the best I&rsquo;ve ever had. It&rsquo;s fabulous.","zh":"(形) 極好的；了不起的　(形) 難以置信的；傳說中的","ez":"這顆草莓是我吃過最好吃的，太棒了。"},{"w":"haste","p":"[heist] n.","d":"Haste is speed in movement or action.","e":"In order to get to the meeting in time, he proceeds with haste.","zh":"(名) 匆忙；急速　(動) 匆忙進行；加快速度","ez":"為了及時趕到會議，他匆忙前進。"},{"w":"impulse","p":"[ˈimpʌls] n.","d":"An impulse is a sudden thoughtless urge to do something.","e":"Because of the scary noise, she had an impulse to run somewhere and hide.","zh":"(名) 衝動；突然的慾望　(名) 推動力；刺激　(動) 推動；激勵","ez":"因為可怕的聲音，她衝動地想跑到某個地方躲起來。"},{"w":"latter","p":"[ˈlætə:r] adj.","d":"Latter describes something last in a series or the second choice of two things.","e":"In the latter minutes of the game, the visitors scored the winning goal.","zh":"(形) 後者的；後面的　(代) 後者；兩者中的後一個","ez":"在比賽的最後幾分鐘，客隊踢進了致勝球。"},{"w":"molecule","p":"[ˈmɒləkjuːl] n.","d":"A molecule is the smallest basic unit that makes up a physical substance.","e":"A tiny drop of water is made up of thousands of molecules of water.","zh":"(名) 分子；分子結構","ez":"一小滴水由數千個水分子組成。"},{"w":"ongoing","p":"[ˈɒnˌgouiŋ] adj.","d":"If something is ongoing, then it is still happening or still growing.","e":"The development of plants is ongoing because it takes time for them to mature.","zh":"(形) 持續的；進行中的　(形) 不斷的；未完成的","ez":"植物的發育是持續進行的，因為它們需要時間成熟。"},{"w":"pharmaceutical","p":"[ˌfɑːrməˈsuːtikəl] adj.","d":"If something is pharmaceutical, then it is related to the development of drugs.","e":"Pharmaceutical companies discover new cures to illnesses all the time.","zh":"(形) 製藥的；藥物的","ez":"製藥公司不斷發現治療疾病的新方法。"},{"w":"precise","p":"[priˈsais] adj.","d":"If someone is precise, then they are exact and careful about their work.","e":"The builder was very precise about where he placed the nails.","zh":"(形) 精確的；明確的","ez":"建築工人對釘子的位置非常精確。"},{"w":"proximity","p":"[prɒkˈsiməti] n.","d":"Proximity is closeness in time, space, or relationships.","e":"All the trees in the proximity of the beach had been cut down.","zh":"(名) 接近；鄰近","ez":"海灘附近的所有樹都被砍光了。"},{"w":"publicity","p":"[pʌbˈlisəti] n.","d":"Publicity is public attention given to someone or something by the media.","e":"She received a lot of publicity after her performance in the film.","zh":"(名) 宣傳；公開","ez":"她在電影中的演出之後獲得了大量關注。"},{"w":"remedy","p":"[ˈremədi] n.","d":"A remedy is a cure for a disease, argument, or problem.","e":"A good remedy for a headache is an aspirin and a glass of water.","zh":"(名) 補救方法；治療法","ez":"頭痛的好療法是一顆阿斯匹靈和一杯水。"},{"w":"significance","p":"[sigˈnifikəns] n.","d":"The significance of something is the quality that makes it important.","e":"The significance of the snowy weather was that we didn&rsquo;t have to go to school.","zh":"(名) 重要性；意義","ez":"下雪天的重要意義是我們不用上學。"},{"w":"subsequent","p":"[ˈsʌbsikwənt] adj.","d":"If something is subsequent, then it comes after something else in time.","e":"The flood and the subsequent rescue of those caught in the flood were on TV.","zh":"(形) 後續的；隨後的","ez":"洪水以及後續對受困者的救援都在電視上播出。"},{"w":"synthetic","p":"[sinˈθetik] adj.","d":"If something is synthetic, then it is made to be like something natural.","e":"Clothing made out of synthetic fabrics is very effective at keeping people warm.","zh":"(形) 合成的；人造的","ez":"合成纖維製成的衣服非常有效地讓人保暖。"},{"w":"terminal","p":"[ˈtəːrmənəl] adj.","d":"If something is terminal, then it causes or results in death.","e":"Since his condition was not terminal, he felt a great sense of relief.","zh":"(名) 終點站；航站　(形) 末期的；終點的","ez":"既然他的病情不是絕症，他感到如釋重負。"}]},{"id":6,"name":"Unit 6","words":[{"w":"altitude","p":"[ˈӕltətjuːd] n.","d":"The altitude of a place is its height above sea level.","e":"The air was thin at such a high altitude on the mountain.","zh":"(名) 海拔；高度　(名) 高度角；仰角","ez":"山上這麼高的地方空氣很稀薄。"},{"w":"coastline","p":"[ˈkoustlain] n.","d":"A coastline is the outline of a country’s coast.","e":"He noticed that most of the cities in Australia are on the coastline.","zh":"(名) 海岸線；海岸邊界","ez":"他注意到澳洲大部分城市都在海岸線上。"},{"w":"deter","p":"[diˈtəːr] v.","d":"To deter means to prevent or discourage someone from doing something.","e":"Icy roads deter people from driving their cars.","zh":"(動) 阻止；制止　遏阻；勸阻","ez":"結冰的道路讓人不敢開車。"},{"w":"devise","p":"[diˈvaiz] v.","d":"To devise something means to have an idea or plan about it in the mind.","e":"The thieves devised a plan to steal the diamonds.","zh":"(動) 設計；想出　創造；發明","ez":"小偷們策劃了一個偷鑽石的計畫。"},{"w":"expertise","p":"[ˌekspə:rtiːz] n.","d":"Expertise is the knowledge and skills to do something well.","e":"John has a lot of advertising expertise. He can sell anything!","zh":"(名) 專業知識；專門技能　(名) 專家的意見；專業判斷","ez":"約翰很有廣告專業，他什麼都能賣！"},{"w":"fracture","p":"[ˈfræktʃə:r] n.","d":"A fracture is a crack or break in something.","e":"Don&rsquo;t stand on that teg because there is a fracture. It might get worse.","zh":"(名) 骨折；裂縫　(動) 使骨折；破裂","ez":"不要站在那條裂縫上，它可能會變得更糟。"},{"w":"impair","p":"[imˈpɛər] v.","d":"To impair something means to damage it or make it worse.","e":"Drinking coffee impairs my ability to go to sleep.","zh":"(動) 損害；削弱　(動) 妨礙；減少","ez":"喝咖啡會影響我入睡的能力。"},{"w":"implement","p":"[ˈimpləment] v.","d":"To implement something means to ensure that what has been planned is done.","e":"The school decided to implement a new teaching strategy.","zh":"(動) [`Impləˌmɛnt] 實施；執行　(名) [`Impləmənt] 工具；器具","ez":"學校決定實施新的教學策略。"},{"w":"indigenous","p":"[inˈdidʒənəs] adj.","d":"If something is indigenous, it is originally from, or native to, a place.","e":"Tomatoes are indigenous to the Americas.","zh":"(形) 土著的；原住民的　(形) 本地的；本土的","ez":"番茄原產於美洲。"},{"w":"insight","p":"[ˈinsait] n.","d":"Insight is a deep and accurate understanding of something.","e":"The physics textbook gave the student new insight about gravity.","zh":"(名) 洞察；領悟　(名) 深刻的理解","ez":"這本物理課本讓學生對重力有了新的見解。"},{"w":"limb","p":"[lim] n.","d":"A limb is a large branch on a tree.","e":"The monkey sat on the tree limb and enjoyed a piece of fruit.","zh":"(名) 四肢；手臂或腿　(名) 樹枝；分支","ez":"猴子坐在樹枝上享用水果。"},{"w":"migraine","p":"[ˈmaiːgrein] n.","d":"A migraine is a painful headache that makes one feel sick.","e":"My sister gets a migraine every time she has a lot of stress.","zh":"(名) 偏頭痛；嚴重頭痛","ez":"我姐姐每次壓力大時就會偏頭痛。"},{"w":"optimism","p":"[ˈoptəmizəm] n.","d":"Optimism is the feeling of being hopeful about the future or success of something.","e":"The mother had optimism about her children&rsquo;s futures.","zh":"(名) 樂觀；樂觀主義　(形) 樂觀的","ez":"母親對孩子們的未來抱持樂觀態度。"},{"w":"peculiar","p":"[piˈkjuːliər] adj.","d":"When something is peculiar, it is strange, sometimes in a bad way.","e":"That peculiar smell coming from the kitchen reminds me of rotten eggs.","zh":"(形) 奇怪的；獨特的","ez":"廚房傳來的那股怪味讓我想起臭雞蛋。"},{"w":"proficient","p":"[prəˈfiʃənt] adj.","d":"When a person is proficient at something, they can do it well.","e":"Secretaries are proficient at typing quickly.","zh":"(形) 熟練的；精通的","ez":"秘書打字很熟練。"},{"w":"quest","p":"[kwest] n.","d":"A quest is a long and difficult search for something.","e":"The treasure hunter went on a quest to find an ancient gold necklace.","zh":"(名) 追尋；探索","ez":"尋寶者踏上尋找古代金項鍊的旅程。"},{"w":"ridge","p":"[ridʒ] n.","d":"A ridge is a long, narrow piece of raised land.","e":"The brown bear walked along the edge of the mountain ridge.","zh":"(名) 山脊；屋脊","ez":"棕熊沿著山脊邊緣走。"},{"w":"spouse","p":"[spaus] n.","d":"A spouse is the person to whom someone is married.","e":"I live in a home with my spouse and our two children.","zh":"(名) 配偶","ez":"我和配偶及兩個孩子住在家裡。"},{"w":"thrust","p":"[θrʌst] v.","d":"To thrust means to push or move something quickly with a lot of force.","e":"The boxer thrust his fist into the punching bag.","zh":"(名) 推；刺　(動) 推；刺","ez":"拳擊手把拳頭猛擊沙包。"},{"w":"tolerate","p":"[ˈtɒləreit] v.","d":"To tolerate something means to be able to accept it even when it is unpleasant.","e":"When you are in a hurry, it can be hard to tolerate traffic signals.","zh":"(動) 容忍；忍受","ez":"趕時間時，很難忍受紅綠燈。"}]},{"id":7,"name":"Unit 7","words":[{"w":"aquatic","p":"[əˈkwætik] adj.","d":"If a plant or animal is aquatic, it lives or grows in water.","e":"The dolphin is an aquatic mammal.","zh":"(形) 水生的；與水有關的","ez":"海豚是水生哺乳動物。"},{"w":"biosphere","p":"[ˈbaiəsfiər] adj.","d":"The biosphere is the earth’s surface and atmosphere where there are living things.","e":"Birds, trees, and worms all thrive in the biosphere.","zh":"生物圈","ez":"鳥類、樹木和蠕蟲都在生物圈中繁衍生息。"},{"w":"bizarre","p":"[biˈzaːr] adj.","d":"When something is bizarre, it is very strange.","e":"My bizarre dreams make no sense to me when I am awake.","zh":"(形) 奇怪的；古怪的　(形) 離奇的；荒誕的","ez":"我那些怪異的夢醒來後完全沒道理。"},{"w":"Celsius","p":"[ˈselsiəs] n.","d":"Celsius is a scale for measuring temperature.","e":"Water freezes at zero degrees Celsius.","zh":"(名) 攝氏溫度；攝氏度數","ez":"水在攝氏零度結冰。"},{"w":"coarse","p":"[kɔːrs] adj.","d":"If something is coarse, that means it has a rough texture.","e":"The coarse sweater made my skin itch.","zh":"(形) 粗糙的；粗纖維的　(形) 粗魯的；不禮貌的","ez":"粗糙的毛衣讓我的皮膚發癢。"},{"w":"companion","p":"[kəmˈpænjən] n.","d":"A companion is a person that someone spends a lot of time with.","e":"I always walk to school with my companion Frank.","zh":"(名) 同伴；夥伴　(名) 陪伴者；伴侶","ez":"我總是和同伴法蘭克一起走路上學。"},{"w":"digest","p":"[diˈdʒest] v.","d":"To digest means to swallow food and pass it through the body.","e":"Allow some time for food to be digested before going swimming.","zh":"(動) [dəˋdʒɛst] 消化；吸收　(名) [ˋdaɪdʒɛst] 文摘；摘要","ez":"游泳前要留點時間讓食物消化。"},{"w":"duration","p":"[djuəˈreiʃən] n.","d":"The duration of an event is the time during which it happens.","e":"The girls watched television for the duration of the evening.","zh":"(名) 持續時間；時間長度　(名) 期間；時期","ez":"女孩們整個晚上都在看電視。"},{"w":"ecology","p":"[i:kɒlədʒi] n.","d":"Ecology is the study of the environment and living things.","e":"We study ecology to learn how to help improve the Earth.","zh":"(名) 生態學；生態　(形) 生態的；環保的","ez":"我們研究生態學是為了學習如何改善地球。"},{"w":"feat","p":"[fiːt] n.","d":"A feat is an impressive or difficult achievement or action.","e":"The elephant&rsquo;s standing up on one leg was a feat.","zh":"(名) 功績；壯舉　(動) 完成；達成","ez":"大象用一條腿站立真是個絕技。"},{"w":"infinite","p":"[ˈinfənit] adj.","d":"If something is infinite, it has no limit or end.","e":"Many scientists believe that the universe is infinite.","zh":"(形) 無限的；無窮的　(名) 無限；無窮","ez":"許多科學家認為宇宙是無限的。"},{"w":"nucleus","p":"[ˈnjuːkliəs] n.","d":"The nucleus is the central part of an atom or cell.","e":"The nucleus is made up of many tiny particles.","zh":"(名) 細胞核；原子核　(名) 中心；核心","ez":"原子核由許多微小粒子組成。"},{"w":"parasite","p":"[ˈpӕrəsait] n.","d":"A parasite is a tiny animal or plant that attaches to another animal to get food.","e":"The sick dog was covered in parasites.","zh":"寄生生物；寄生動物；寄生植物；靠他人為生者；寄生蟲","ez":"那隻生病的狗身上滿是寄生蟲。"},{"w":"prominent","p":"[ˈprɒmənənt] adj.","d":"When something is prominent, it is important and well known.","e":"Queen Victoria was a prominent person in history.","zh":"(形) 突出的；顯眼的","ez":"維多利亞女王是歷史上著名的人物。"},{"w":"repetitive","p":"[riˈpetətiv] adj.","d":"When something is repetitive, it is repeated many times and becomes boring.","e":"Working on an assembly line making cars every day is a repetitive job.","zh":"(形) 重複的；反覆的","ez":"每天在裝配線上做汽車是重複性的工作。"},{"w":"reproductive","p":"[riːprəˈdʌktiv] adj.","d":"If something is reproductive, it has to do with a living thing producing young.","e":"The reproductive system of a plant is simple.","zh":"生殖；生育；繁殖","ez":"植物的生殖系統很簡單。"},{"w":"temperate","p":"[ˈtempərit] adj.","d":"When a place is temperate, it never gets too hot or cold.","e":"In Peru, the weather is temperate and rarely gets too hot or cold.","zh":"(形) 溫和的；適度的","ez":"祕魯的氣候溫和，很少太熱或太冷。"},{"w":"tolerance","p":"[ˈtɒlərəns] n.","d":"Tolerance is the ability to accept something painful or unpleasant.","e":"Boxers have a high tolerance for pain.","zh":"(名) 寬容；容忍","ez":"拳擊手對疼痛的忍耐度很高。"},{"w":"undergo","p":"[ˈʌndərˈgou] v.","d":"To undergo an action means to have it happen to you.","e":"The cancer patient undergoes treatments twice a week. gous","zh":"(動) 經歷；接受","ez":"癌症患者每週接受兩次治療。"},{"w":"vulnerable","p":"[ˈvʌlnərəbəl] adj.","d":"When someone is vulnerable, they are weak and without protection.","e":"He felt very vulnerable when he was stranded in the desert.","zh":"(形) 脆弱的；易受傷的","ez":"他困在沙漠中時感到非常脆弱。"}]},{"id":8,"name":"Unit 8","words":[{"w":"adept","p":"[əˈdept] adj.","d":"If someone is adept at something, they are very good at doing it.","e":"The carpenter is very adept at building houses.","zh":"(形) 熟練的；精通的　(動) 使適應；調整","ez":"木匠非常擅長蓋房子。"},{"w":"barren","p":"[ˈbӕrən] adj.","d":"If land is barren, it has no plants growing on it.","e":"People cannot farm in barren lands.","zh":"(形) 貧瘠的；不毛的　(形) 空虛的；無結果的","ez":"人們無法在貧瘠的土地上耕作。"},{"w":"ceramic","p":"[səˈrӕmik] adj.","d":"If something is ceramic, it is made of baked clay.","e":"The house&rsquo;s roof was made of ceramic tiles.","zh":"(形) 陶瓷的；陶製的　(名) 陶瓷製品；陶器","ez":"房子的屋頂是用瓷磚做的。"},{"w":"culinary","p":"[ˈkʌləneri] adj.","d":"If something is culinary, it is related to cooking.","e":"I gained culinary skills after working in a restaurant for many years.","zh":"(形) 烹飪的；廚藝的　(形) 烹飪有關的；食物的","ez":"在餐廳工作多年後，我學到了烹飪技巧。"},{"w":"dense","p":"[dens] adj.","d":"If something is dense, it has a lot of things close together.","e":"I easily became lost in the dense forest.","zh":"(形) 密集的；稠密的　(形) 濃厚的；難以理解的","ez":"我在茂密的森林裡很容易迷路。"},{"w":"dignity","p":"[ˈdignəti] n.","d":"Dignity is the ability to be calm and worthy of respect.","e":"When his company went out of business, he faced it with dignity.","zh":"(名) 尊嚴；尊貴　(名) 莊重；體面","ez":"他的公司倒閉時，他體面地面對。"},{"w":"dominate","p":"[ˈdɒməneit] v.","d":"To dominate someone or something is to control them.","e":"The loud man dominated the conversation.","zh":"(動) 控制；主宰　(動) 佔優勢；居於首位","ez":"那個大聲的男人主導了對話。"},{"w":"edible","p":"[ˈedəbəl] adj.","d":"If something is edible, you can eat it.","e":"We learn about edible plants when we go camping.","zh":"(形) 可食用的；可吃的","ez":"露營時我們學習辨識可食用的植物。"},{"w":"hostile","p":"[ˈhɒstəl] adj.","d":"If someone is hostile, they are angry and unfriendly.","e":"We were happy to move away from our hostile neighbor.","zh":"(形) 充滿敵意的；不友善的　(形) 敵對的；對立的","ez":"我們很高興搬離那個不友善的鄰居。"},{"w":"intake","p":"[ˈinteik] n.","d":"Your intake of food is the amount of food you take into your body.","e":"The doctor said I needed to increase my intake of fruits and vegetables.","zh":"(名) 攝入量；進氣　(動) 吸入；納入","ez":"醫生說我需要增加水果和蔬菜的攝取量。"},{"w":"likewise","p":"[ˈlaikwaiz] adv.","d":"If someone does something likewise, they do the same thing as someone else.","e":"If Joe is staying away from school to go swimming, I want to do likewise.","zh":"(副) 同樣地；也；同樣　(連) 同樣；並且","ez":"如果喬翹課去游泳，我也想跟著去。"},{"w":"malnutrition","p":"[mӕlnjuˈtriʃən] n.","d":"Malnutrition is the condition of not getting enough nutrients.","e":"After eating only a meager amount of food, she suffered from malnutrition.","zh":"營養不良","ez":"只吃少量食物後，她營養不良了。"},{"w":"medication","p":"[ˌmedəˈkeiʃən] n.","d":"Medication is medicine or drugs given to people who are sick.","e":"The doctor gave me medication to treat my illness.","zh":"(名) 藥物；藥　(名) 醫療；用藥","ez":"醫生給了我治療疾病的藥物。"},{"w":"misconception","p":"[miskənˈsepʃən] n.","d":"A misconception is a wrong idea about something.","e":"People once believed the misconception that the Earth is flat.","zh":"(名) 錯誤的想法；誤解","ez":"人們曾經誤以為地球是平的。"},{"w":"obscure","p":"[əbˈskjuər] adj.","d":"If something is obscure, it is not well-known.","e":"The old man travels the world in search of obscure books.","zh":"(形) [əb`skjʊr] 模糊的；不清楚的　(動) [əbskj`ʊr] 使...模糊；隱瞞","ez":"那位老人周遊世界尋找罕見書籍。"},{"w":"oppress","p":"[əˈpres] v.","d":"To oppress someone means to rule over them in a cruel and unfair way.","e":"Free speech had been oppressed in his country.","zh":"(動) 壓迫；欺壓　(動) 使沮喪；使苦惱","ez":"在他的國家，言論自由曾受壓制。"},{"w":"peel","p":"[piːl] v.","d":"To peel fruits and vegetables is to remove their skin.","e":"We peeled the apple before eating it.","zh":"(動) 剝皮；削皮　(名) 果皮","ez":"我們吃蘋果前先削了皮。"},{"w":"prescription","p":"[priˈskripʃən] n.","d":"A prescription is permission from a doctor to get medicine.","e":"The doctor gave me a prescription for my medication.","zh":"(名) 處方；藥方","ez":"醫生給了我一張藥方。"},{"w":"respirator","p":"[respəˈreitə:r] n.","d":"A respirator is a machine that helps weak or sick people breathe.","e":"The man needed a respirator to breathe.","zh":"人工呼吸器；呼吸機；防毒面具","ez":"那名男子需要呼吸器才能呼吸。"},{"w":"strive","p":"[straiv] v.","d":"To strive is to struggle to achieve something.","e":"People who strive to succeed often do.","zh":"(動) 努力；奮鬥","ez":"努力追求成功的人往往會成功。"}]},{"id":9,"name":"Unit 9","words":[{"w":"archaic","p":"[ɑːrˈkeik] adj.","d":"If something is archaic, it is very old or outdated.","e":"To be competitive, we must update our archaic equipment.","zh":"古老的；古代的；原始的","ez":"為了有競爭力，我們必須更新老舊設備。"},{"w":"benevolent","p":"[bəˈnevələnt] adj.","d":"If someone is benevolent, they are kind and generous.","e":"My father was a benevolent man and gave lots of money to charity.","zh":"(形) 慈善的；仁慈的　(形) 友善的；善良的","ez":"我父親是個仁慈的人，捐了很多錢給慈善機構。"},{"w":"brass","p":"[bræs] n.","d":"Brass is a metal that is used to make musical instruments and ornaments.","e":"Brass is used to make musical instruments like trumpets.","zh":"(名) 黃銅；銅製品　(形) 黃銅製的；厚顏無恥的","ez":"黃銅用來製作像小號這樣的樂器。"},{"w":"capitalism","p":"[ˈkæpitəlizəm] n.","d":"Capitalism is an economic system where private companies make goods for profit.","e":"Most industries in the world today are based on capitalism.","zh":"(名) 資本主義；資本制度","ez":"現今世界上多數產業都以資本主義為基礎。"},{"w":"component","p":"[kəmˈpounənt] n.","d":"A component is a part of a larger machine.","e":"Computers have many different components, so they are complicated to build.","zh":"(名) 零件；組成部分　(形) 組成的；構成的","ez":"電腦有許多不同零件，因此組裝起來很複雜。"},{"w":"dependence","p":"[diˈpendəns] n.","d":"Dependence is a situation in which somebody relies on something else.","e":"Young children have a dependence on their parents.","zh":"(名) 依賴；依存　(名) 成癮；上癮","ez":"年幼的孩子依賴父母。"},{"w":"diminish","p":"[dəˈminiʃ] v.","d":"To diminish means to reduce or get smaller.","e":"As the economy got worse, my savings diminished.","zh":"(動) 減少；降低　(動) 縮小；衰退","ez":"隨著經濟惡化，我的積蓄減少了。"},{"w":"drawback","p":"[ˈdrɔːbæk] n.","d":"A drawback is a disadvantage.","e":"The drawback of having a car is that it is very expensive to maintain.","zh":"(名) 缺點；不利之處　(名) 退縮；後退","ez":"擁有汽車的缺點是維護費用很高。"},{"w":"fad","p":"[fæd] n.","d":"A fad is something that is popular for a short time.","e":"The hula hoop was a fad for a few years, but it soon lost its popularity.","zh":"(名) 一時風尚；短暫流行的事物　(動) 逐漸消退；褪色","ez":"呼拉圈曾流行幾年，但很快就失去熱度。"},{"w":"impose","p":"[imˈpouz] v.","d":"To impose means to interrupt or force your ideas on other people.","e":"He imposes on his wife every morning by expecting her to make breakfast.","zh":"(動) 強加；施加　課稅；徵收","ez":"他每天早上都強迫妻子做早餐。"},{"w":"managerial","p":"[ˌmænəˈdʒiəriəl] adj.","d":"Managerial describes something related to a manager or management.","e":"Nancy has a managerial position at the bank.","zh":"(形) 管理的；經理的　(形) 管理階層的；主管的","ez":"南希在銀行擔任管理職位。"},{"w":"medieval","p":"[mi:diˈiːvəl] adj.","d":"If something is medieval, it comes from the period between 650 and 1500 CE.","e":"We visited a castle that was built during medieval times.","zh":"(形) 中世紀的；中古的　(形) 古老的；陳舊的","ez":"我們參觀了一座中世紀建造的城堡。"},{"w":"obsolete","p":"[ˈɒbsəliːt] adj.","d":"If something is obsolete, it is not used anymore because something better exists.","e":"Since computers became inexpensive, typewriters have become obsolete.","zh":"(形) 過時的；廢棄的　(形) 老舊的；陳舊的","ez":"自從電腦變便宜後，打字機就過時了。"},{"w":"peninsula","p":"[pəˈninsələ] n.","d":"A peninsula is a large piece of land that is surrounded by the sea on three sides.","e":"The state of Florida is an example of a peninsula.","zh":"(名) 半島","ez":"佛羅里達州是半島的一個例子。"},{"w":"prestige","p":"[presˈtiːrdʒ] n.","d":"If a person has prestige, people admire or respect them.","e":"The young actress gained much prestige after she won an award.","zh":"(名) 聲望；威信","ez":"年輕女演員獲獎後獲得了極大聲望。"},{"w":"proportion","p":"[prəˈpɔːrʃən] n.","d":"A proportion is an amount that shows the link between the parts and the whole.","e":"Only a small proportion of the people in this town actually work here.","zh":"(名) 比例；部分","ez":"這個城鎮裡只有一小部分人實際上在這裡工作。"},{"w":"radical","p":"[ˈrædikəl] adj.","d":"If something is radical, it is very new or different.","e":"The president is planning to make some radical changes to the law.","zh":"(形) 根本的；激進的","ez":"總統計劃對法律進行一些重大改革。"},{"w":"refute","p":"[riˈfjuːt] v.","d":"To refute something means to prove that it is false or incorrect.","e":"The bank manager has refuted the claims that he lied to his customers.","zh":"(動) 反駁；駁斥","ez":"銀行經理否認了他對客戶說謊的指控。"},{"w":"spectacular","p":"[spekˈtækjələr] adj.","d":"If something is spectacular, it looks or sounds very impressive.","e":"There was a spectacular fireworks display in the park at New Year.","zh":"(形) 壯觀的；引人入勝的","ez":"新年時公園裡有壯觀的煙火表演。"},{"w":"weave","p":"[wiːv] v.","d":"To weave means to make cloth using horizontal and vertical threads.","e":"We saw a woman weave a blanket on our vacation to South America.","zh":"(動) 編織；編造","ez":"我們去南美洲度假時看到一名婦女織毯子。"}]},{"id":10,"name":"Unit 10","words":[{"w":"accountant","p":"[əˈkauntənt] n.","d":"An accountant is a person whose job is to keep financial accounts.","e":"The accountant helped me keep track of my money.","zh":"(名) 會計師；會計人員","ez":"會計師幫我記錄開支。"},{"w":"capitalist","p":"[ˈkæpitəlist] n.","d":"A capitalist is a business person who invests in trade and industry for profit.","e":"The capitalist invested in a factory that made wheat into cereal.","zh":"(名) 資本家；從事資本主義的人","ez":"資本家投資了一家把小麥加工成穀物食品的工廠。"},{"w":"contempt","p":"[kənˈtempt] n.","d":"Contempt is the feeling of having no respect for something.","e":"The judge had contempt for the wicked criminal.","zh":"(名) 輕蔑；蔑視　(動) 輕蔑；鄙視","ez":"法官對邪惡的罪犯感到輕蔑。"},{"w":"dedicate","p":"[ˈdedikeit] v.","d":"To dedicate oneself to something means to put a lot of time and effort into it.","e":"The nun dedicated herself to helping people in need.","zh":"(動) 致力於；奉獻　(動) 獻身；專注","ez":"修女致力於幫助有需要的人。"},{"w":"ditch","p":"[ditʃ] n.","d":"A ditch is a narrow hole cut into the ground by a road or a field.","e":"When the car slid off of the road, it fell into the ditch.","zh":"(名) 溝渠；水溝　(動) 拋棄；放棄","ez":"車子滑出路面掉進了水溝。"},{"w":"enterprise","p":"[ˈentərpraiz] n.","d":"An enterprise is a company or business.","e":"My father owns an advertising enterprise.","zh":"(名) 企業；事業　(動) 從事；承辦","ez":"我父親擁有一家廣告公司。"},{"w":"exquisite","p":"[iksˈkwizit] adj.","d":"When something is exquisite, it is very beautiful or pleasant.","e":"The artist made exquisite watercolor paintings.","zh":"(形) 精緻的；優美的　(形) 極度的；劇烈的","ez":"藝術家創作了精美的水彩畫。"},{"w":"finance","p":"[fiˈnæns] v.","d":"To finance someone or something means to provide money for them.","e":"The government financed the scientist&rsquo;s experiments with new weapons.","zh":"(名) 財務；金錢　(動) 提供資金；籌資","ez":"政府資助了科學家關於新武器的實驗。"},{"w":"indifferent","p":"[inˈdəfrənt] adj.","d":"When someone is indifferent toward something, they have a lack of interest in it.","e":"Lisa is indifferent toward school. She doesn&rsquo;t care what her final grades are.","zh":"(形) 冷淡的；不關心的　(形) 普通的；平庸的","ez":"麗莎對學校漠不關心，她不在乎最終成績。"},{"w":"irrigate","p":"[ˈirəgeit] v.","d":"To irrigate means to supply water to land so that crops can grow.","e":"In dry climates, it is important to irrigate fields of crops.","zh":"灌溉；沖洗","ez":"在乾燥氣候中，灌溉農田很重要。"},{"w":"maximize","p":"[ˈmæksəmaiz] v.","d":"To maximize something is to make it as great in amount, size, or importance.","e":"You should exercise regularly to maximize a healthy lifestyle.","zh":"(動) 最大化；使達到最大　(動) 充分利用；發揮到最大","ez":"你應該規律運動以最大化健康生活。"},{"w":"monetary","p":"[ˈmanəteri] adj.","d":"When something is monetary, it relates to money.","e":"A strong monetary policy is important for a country to be successful.","zh":"(形) 貨幣的；金錢的　(形) 與金融制度相關的","ez":"強健的貨幣政策對國家成功很重要。"},{"w":"precaution","p":"[priˈkɔːʃən] n.","d":"A precaution is an action that is meant to stop something bad from happening.","e":"Asa precaution, you should put on a heavy coat before going out in cold weather.","zh":"(名) 預防措施；預防","ez":"作為預防措施，在寒冷天氣出門前應穿上厚外套。"},{"w":"preliminary","p":"[priˈliməneri] adj.","d":"Preliminary describes something that happens before a more important event.","e":"The runners must do well in the preliminary races to qualify for the final race.","zh":"(形) 初步的；預備的","ez":"跑者必須在預賽中表現良好才能晉級決賽。"},{"w":"saturate","p":"[ˈsӕtʃəreit] v.","d":"To saturate something means to completely soak it with a liquid.","e":"The sponge was saturated with soapy water and dripped all over the floor.","zh":"(動) 使濕透；使飽和","ez":"海綿吸滿肥皂水，滴得到處都是。"},{"w":"simplicity","p":"[simˈplisəti] n.","d":"The simplicity of something is the fact that it is easy to do or understand.","e":"We were able to find the house thanks to the simplicity of the directions.","zh":"(名) 簡單；簡樸","ez":"因為指示簡單，我們找到了那棟房子。"},{"w":"sow","p":"[sou] v.","d":"To sow seeds means to plant them in the ground.","e":"He always sows his garden seeds in the springtime.","zh":"(動) 播種；散播","ez":"他總是在春天播種。"},{"w":"soy","p":"[sɔi] n.","d":"Soy is a food made from soybeans, such as flour or butter.","e":"Soy can be made into tofu, sauce, and also milk.","zh":"(n.) 醬油","ez":"大豆可以做成豆腐、醬油和豆奶。"},{"w":"spade","p":"[speid] n.","d":"A spade is a tool used for digging.","e":"The gardener used her spade to make a hole for the seed.","zh":"鏟；鍬；黑桃花色；黑桃；黑人","ez":"園丁用鏟子挖洞來播種。"},{"w":"upcoming","p":"[ˈʌpkʌmiŋ] adj.","d":"When something is upcoming, that means it will happen in the near future.","e":"The kids were worried about their upcoming exam.","zh":"(形) 即將到來的；即將發生的","ez":"孩子們擔心即將到來的考試。"}]},{"id":11,"name":"Unit 11","words":[{"w":"acute","p":"[əˈkjuːt] adj.","d":"When a bad thing is acute, it is very severe and intense.","e":"When she fell out of the tree, the girl felt an acute pain in her arm.","zh":"(形) 嚴重的；急性的　(形) 敏銳的；尖銳的","ez":"當女孩從樹上摔下來時，她的手臂感到劇痛。"},{"w":"aggression","p":"[əˈgreʃən] n.","d":"Aggression is behavior that is mean or violent to others.","e":"The problem was only made worse by Mark&rsquo;s aggression.","zh":"(名) 侵略；攻擊　(名) 好鬥；挑釁","ez":"馬克的攻擊性只讓問題變得更糟。"},{"w":"banquet","p":"[ˈbæŋkwit] n.","d":"A banquet is a grand formal dinner.","e":"Both families brought a lot of food for the wedding banquet.","zh":"(名) 宴會；盛宴　(動) 設宴款待；享受盛宴","ez":"兩個家庭都帶了很多食物來參加婚宴。"},{"w":"biography","p":"[baiˈɒgrəfi] n.","d":"A biography is an account of someone’s life that is written by someone else.","e":"We read a biography about Charles Darwin in science class.","zh":"(名) 傳記；自傳　(名) 傳記文學；生平記錄","ez":"我們在自然課上讀了一本關於查爾斯·達爾文的傳記。"},{"w":"boost","p":"[buːst] v.","d":"To boost something means to increase or improve it.","e":"Lowering prices boosts customers&rsquo; interest in shopping.","zh":"(動) 促進；增強　(名) 推動；提升","ez":"降價能提升顧客的購物興趣。"},{"w":"clap","p":"[klæp] v.","d":"To clap means to hit one’s hands together to express pleasure or get attention.","e":"After the speech, everyone in the crowd clapped their hands for the speaker.","zh":"(動) 拍手；鼓掌　(名) 掌聲；拍擊聲","ez":"演講結束後，人群中的每個人都為演講者鼓掌。"},{"w":"compel","p":"[kəmˈpel] v.","d":"To compel someone to do something means to force them to do it.","e":"Traffic signs compel drivers to drive safely.","zh":"(動) 強迫；迫使　(動) 促使；驅使","ez":"交通標誌強迫駕駛人安全駕駛。"},{"w":"dominance","p":"[ˈdɒmənəns] n.","d":"The dominance of a person is their state of being more powerful than others.","e":"Large gorillas hit their chests to express their dominance over others.","zh":"(名) 優勢；統治　(動) 佔優勢；統治","ez":"大猩猩拍打胸部來表達牠們對其他猩猩的支配地位。"},{"w":"gorgeous","p":"[ˈgɔːrdʒəs] adj.","d":"When something is gorgeous, it is very pleasing and attractive.","e":"The girl picked out a gorgeous dress to wear to the dance.","zh":"(形) 非常美麗的；華麗的　(形) 極好的；令人驚嘆的","ez":"女孩挑選了一件華麗的洋裝去參加舞會。"},{"w":"inevitable","p":"[inˈevitəbəl] adj.","d":"When something is inevitable, it is certain to happen or cannot be avoided.","e":"It is inevitable that the days will get longer in the summer.","zh":"(形) 不可避免的；必然的　(形) 無法阻止的；確定會發生的","ez":"夏天白天變長是不可避免的。"},{"w":"legacy","p":"[ˈleɡəsi] n.","d":"A legacy is an effect that exists because of a person or thing in the past.","e":"The legacy of the ancient Egyptians can be seen in their monuments.","zh":"(名) 遺產；傳承　(名) 遺留物；影響","ez":"古埃及人的遺產可以在他們的紀念碑中看到。"},{"w":"masterpiece","p":"[ˈmæstərpiːs] n.","d":"A masterpiece is a very good painting, novel, movie, or other work of art.","e":"The Arc de Triomphe is considered a masterpiece in the world of architecture.","zh":"(名) 傑作；大師之作　(名) 代表作；最佳作品","ez":"凱旋門被認為是建築界的傑作。"},{"w":"multiple","p":"[ˈmʌltəpəl] adj.","d":"If there are multiple things, there are many of them.","e":"When the stunt went wrong, the man suffered multiple injuries.","zh":"(形) 多個的；多重的　(名) 倍數；多重項","ez":"當特技失誤時，那名男子受了多處傷。"},{"w":"narrate","p":"[næˈreit] v.","d":"To narrate a story means to write about it or read it aloud.","e":"This story was written by John, but Aaron is narrating it to the crowd.","zh":"(動) 敘述；講述　(動) 旁白；配音解說","ez":"這個故事是約翰寫的，但亞倫正在向人群講述它。"},{"w":"notorious","p":"[nouˈtɔːriəs] adj.","d":"When something is notorious, it is well-known because of something bad.","e":"This area of town is notorious for gang activity.","zh":"(形) 臭名昭著的；惡名遠播的　(形) 聲名狼藉的；臭名遠揚的","ez":"這個城區以幫派活動聞名。"},{"w":"outdated","p":"[ˈautˈdeitid] adj.","d":"When something is outdated, it is old and no longer useful in modern time.","e":"Tape players are becoming outdated because of digital music.","zh":"(形) 過時的；落伍的","ez":"錄音機因為數位音樂而逐漸過時。"},{"w":"overall","p":"[ˈouvərɔːl] adv.","d":"When a thing is talked about overall, the whole thing is considered.","e":"Overall, the party was a huge success.","zh":"(形) 整體的；全面的　(副) 總體上；大體上","ez":"總體來說，這場派對非常成功。"},{"w":"partiality","p":"[ˌpɑːrʃiˈæləti] n.","d":"A partiality is a tendency to prefer one thing to another.","e":"She has a partiality for walking to school instead of driving.","zh":"偏袒；偏見；不公；嗜好","ez":"她偏愛走路去學校而不是開車。"},{"w":"spontaneous","p":"[spɒnˈteiniəs] adj.","d":"When an act is spontaneous, it is not planned. It happens suddenly.","e":"My wife made a spontaneous decision to buy a new sofa while I was at work.","zh":"(形) 自發的；自然的","ez":"我太太在我上班時一時興起決定買一張新沙發。"},{"w":"virtue","p":"[ˈvəːrtʃuː] n.","d":"A virtue is a good quality or way of behaving.","e":"My best virtue is forgiveness.","zh":"(名) 美德；優點","ez":"我最大的美德是寬恕。"}]},{"id":12,"name":"Unit 12","words":[{"w":"anthropology","p":"[ˌænθrəˈpɒlədʒi] n.","d":"Anthropology is the study of people, society, and culture.","e":"In anthropology class, I learned about simple tools that ancient cultures used.","zh":"(名) 人類學；人類文化和社會的研究","ez":"在人類學課上，我學到了古代文化使用的簡單工具。"},{"w":"applaud","p":"[əˈplɔːd] v.","d":"To applaud means to clap in order to show approval.","e":"Everyone cheered and applauded Manny&rsquo;s efforts.","zh":"(動) 鼓掌；喝彩　(動) 讚同；贊成","ez":"每個人都為曼尼的努力歡呼鼓掌。"},{"w":"appoint","p":"[əˈpɔint] v.","d":"To appoint someone to a job means to give the job to them.","e":"Two students were appointed to help the scientists with their research.","zh":"(動) 任命；委派　(動) 約定；安排","ez":"兩名學生被指派協助科學家進行研究。"},{"w":"compatible","p":"[kəmˈpætəbəl] adj.","d":"When things are compatible, they work well or exist together successfully.","e":"Jan and Fred are too different. They will never be compatible.","zh":"(形) 相容的；兼容的　(形) 能並存的；相合的","ez":"珍和弗雷德太不一樣了，他們永遠不會合得來。"},{"w":"competence","p":"[ˈkɒmpətəns] n.","d":"Competence is the ability to do something well or effectively.","e":"The job was easy because the group had enough competence to do it well.","zh":"(名) 能力；勝任　(名) 專業知識；技能","ez":"這份工作很簡單，因為團隊有足夠的能力做好它。"},{"w":"confer","p":"[kənˈfəːr] v.","d":"To confer with someone means to discuss something with them to make a decision.","e":"I will have to confer with my wife before I can purchase a new car.","zh":"(動) 商談；協商　(動) 授予；頒發","ez":"在買新車之前，我得先和我太太商量。"},{"w":"consecutive","p":"[kənˈsekjətiv] adj.","d":"When things are consecutive, they happen one after another without interruption.","e":"The king ruled for ten consecutive years.","zh":"(形) 連續的；相鄰的　(名) 連續發生的事物","ez":"國王連續統治了十年。"},{"w":"crude","p":"[kruːd] adj.","d":"When something is crude, it is not exact or detailed, but it can still be useful.","e":"She drew crude hearts on the ground to show how much she loved him.","zh":"(形) 粗糙的；未加工的　(形) 粗魯的；無禮的","ez":"她在地上畫了粗糙的愛心來表達她有多愛他。"},{"w":"cube","p":"[kjuːb] n.","d":"A cube is a solid object with six square surfaces that are all the same size.","e":"Please get me some ice cubes to put in my soda.","zh":"(名) 立方體；正方形　(動) 切成立方體；立方","ez":"請幫我拿一些冰塊放到我的汽水裡。"},{"w":"feedback","p":"[ˈfiːdbæk] n.","d":"Feedback is comments to a person about how they are doing something.","e":"I asked my boss for feedback on my work.","zh":"(名) 反饋；意見　(動) 提供反饋；回應","ez":"我向老闆詢問對我工作的回饋。"},{"w":"ignorance","p":"[ˈignərəns] n.","d":"Ignorance of something is lack of knowledge about it.","e":"When he failed the test, his ignorance of math was obvious.","zh":"(名) 無知；缺乏知識　(名) 不了解；不認識","ez":"當他考試不及格時，他對數學的無知顯而易見。"},{"w":"masculine","p":"[ˈmæskjəlin] adj.","d":"When something is masculine, it is a quality or thing related to men.","e":"American football is usually considered a masculine sport.","zh":"(形) 男性的；陽剛的　(形) 男人的特徵","ez":"美式足球通常被認為是一項陽剛的運動。"},{"w":"monument","p":"[ˈmɒnjəmənt] n.","d":"A monument is a structure that is built to remind people of a person or event.","e":"A large monument was built to honor the brave soldiers.","zh":"(名) 紀念碑；紀念建築　(名) 歷史遺跡；重要證據","ez":"建造了一座大型紀念碑來紀念勇敢的士兵。"},{"w":"muscular","p":"[ˈmʌskjələ:r] adj.","d":"When someone is muscular, they are very fit and strong.","e":"He exercised regularly so that his body could become muscular.","zh":"(形) 肌肉發達的；強健的","ez":"他規律運動，讓身體變得肌肉發達。"},{"w":"posture","p":"[ˈpɒstʃər] n.","d":"A person’s posture is the position in which they stand or sit.","e":"Your back will feel better if you improve your posture.","zh":"(名) 姿勢；姿態","ez":"如果你改善姿勢，你的背部會感覺好一些。"},{"w":"situate","p":"[ˈsitjueit] v.","d":"To situate something means to place or build it in a certain place.","e":"The road was situated between the forest and the lake.","zh":"(動) 使位於；使坐落於","ez":"那條路位於森林和湖泊之間。"},{"w":"supervise","p":"[ˈsuːpərvaiz] v.","d":"To supervise something means to make sure that it is done correctly.","e":"Allen supervised the construction workers to ensure everyone&rsquo;s safety.","zh":"(動) 監督；監考","ez":"艾倫監督建築工人，確保每個人的安全。"},{"w":"symmetry","p":"[ˈsimətri] n.","d":"Symmetry is the state of having two halves that are exactly the same.","e":"The artist made sure to use perfect symmetry when painting the butterfly.","zh":"(名) 對稱；勻稱","ez":"藝術家在畫蝴蝶時確保使用完美的對稱。"},{"w":"tattoo","p":"[tæˈtuː] n.","d":"A tattoo is a design that is drawn permanently on the skin with needles.","e":"The surfer had tattoos on both his arms.","zh":"(名) 刺青；紋身　(動) 刺青於；紋身於","ez":"衝浪者的雙臂都有刺青。"},{"w":"undergraduate","p":"[ˈʌndərˈgrædjuit] n.","d":"An undergraduate is a student at a college who is studying fora bachelor’s degree.","e":"She was excited to finish high school and enroll as an undergraduate in the fall.","zh":"(名) 大學生","ez":"她很興奮能高中畢業並在秋天以大學部學生的身分入學。"}]},{"id":13,"name":"Unit 13","words":[{"w":"brook","p":"[bruk] n.","d":"A brook is a small stream.","e":"Water flows down several brooks on the mountain.","zh":"(名) 小溪；溪流　(動) 容忍；忍受","ez":"水從山上的幾條小溪流下來。"},{"w":"cater","p":"[ˈkeitər] v.","d":"To cater to someone means to provide them with all the things needed or wanted.","e":"Bill was too sick to get out of bed, so his nurse catered to his needs.","zh":"(動) 提供飲食；滿足需求","ez":"比爾病得太重無法下床，所以他的護士照顧他的需求。"},{"w":"considerate","p":"[kənˈsidərit] adj.","d":"When someone is considerate, they pay attention to the needs of others.","e":"The considerate boy gave a present to his girlfriend on Valentine&rsquo;s Day.","zh":"(形) 體貼的；周到的　(動) 考慮；顧及","ez":"體貼的男孩在情人節送了禮物給女友。"},{"w":"consumption","p":"[kənˈsʌmpʃən] n.","d":"The consumption of food or drink is the act of eating or drinking it.","e":"These apples are too rotten for consumption.","zh":"(名) 消費；消耗　(名) 肺結核","ez":"這些蘋果太爛了，不能吃。"},{"w":"criteria","p":"[kraiˈtiəriə] n.","d":"Criteria are factors on which a person judges or decides something.","e":"Before she got the job, she had to meet all the necessary criteria.","zh":"(名) 標準；準則","ez":"在她得到這份工作之前，她必須滿足所有必要的條件。"},{"w":"crust","p":"[krʌst] n.","d":"Crust is the tough outer part of a loaf of bread.","e":"The little boy never ate the crust of his pizza.","zh":"(名) 地殼；硬皮　(名) 麵包皮；外層","ez":"那個小男孩從不吃披薩的邊。"},{"w":"degrade","p":"[diˈgreid] v.","d":"To degrade someone means to cause people to have shame.","e":"The teacher degraded Bob when she announced his poor performance to the class","zh":"(動) 貶低；降低　(動) 使變壞；惡化","ez":"老師向全班宣布鮑伯的糟糕表現，讓他難堪。"},{"w":"entitle","p":"[enˈtaitl] v.","d":"To entitle someone means to give them the rights to have or do something.","e":"His golden ticket entitled him to sit in the front row at the concert.","zh":"(
