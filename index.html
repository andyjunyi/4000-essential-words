ng to a certain place.","e":"The boys like to wander in the woods and look at birds.","zh":"(動) 漫步；閒逛","ez":"男孩們喜歡在樹林裡閒逛並觀察鳥類。"}]},{"id":18,"name":"Unit 18","words":[{"w":"armor","p":"[ˈaːrmər] n.","d":"Armor is metal worn by soldiers to protect the body.","e":"The soldier wore armor to protect his body.","zh":"(名) 盔甲；防具　(名) 裝甲；盔甲","ez":"士兵穿著盔甲保護身體。"},{"w":"blaze","p":"[bleɪz] v.","d":"To blaze means to burn brightly or powerfully.","e":"The small fire soon blazed into a large dangerous one.","zh":"(動) 燃燒；熊熊燃燒　(名) 火焰；烈火","ez":"小火很快燃燒成危險的大火。"},{"w":"boom","p":"[buːm] v.","d":"To boom means to make a loud, deep sound.","e":"The firecrackers made a loud boom when they exploded.","zh":"(名) 繁榮；景氣　(動) 發出低沉聲音；急速增長","ez":"鞭炮爆炸時發出巨大的轟響。"},{"w":"cliff","p":"[klɪf] n.","d":"A cliff is a high and often flat wall of rock.","e":"The wolf stood at the cliff and howled.","zh":"(名) 懸崖；峭壁","ez":"狼站在懸崖邊嚎叫。"},{"w":"flame","p":"[fleɪm] n.","d":"A flame is part of fire.","e":"The torch was filled with yellow and orange flames.","zh":"(名) 火焰；火苗　(動) 燃燒；發火　(形) 火紅的；激烈的","ez":"火炬充滿了黃色和橙色的火焰。"},{"w":"independence","p":"[indiˈpendənt] adj.","d":"Independence is the state of being free from the control of others.","e":"After leaving home, Sophia had a great feeling of independence.","zh":"(名) 獨立；自主　(名) 自由；自治","ez":"離家後，Sophia感到強烈的獨立感。"},{"w":"invasion","p":"[ɪnˈveɪʒən] n.","d":"An invasion is an attack by a group from another country.","e":"In Korea, walls were built around cities to protect them from invasions.","zh":"(名) 入侵；侵略　(名) 大量湧入；入侵","ez":"在韓國，城市周圍建造城牆以防禦入侵。"},{"w":"knight","p":"[nait] n.","d":"A knight is a soldier of high rank and skill who usually serves a king.","e":"He was the best soldier, so the king made him a knight.","zh":"(名) 騎士；爵士　(名) 國際象棋中的馬","ez":"他是最優秀的士兵，所以國王封他為騎士。"},{"w":"lightning","p":"[ˈlaɪtnɪŋ] n.","d":"Lightning is the bright light seen during a storm.","e":"The lightning flashed above the water.","zh":"(名) 閃電；電光　(形) 閃電般的；迅速的","ez":"閃電在水面上方閃爍。"},{"w":"rebel","p":"[ˈrebəl] n.","d":"A rebel is a person who fights the government in order to change it.","e":"The rebel had enough of the government&rsquo;s unfair polices.","zh":"(動) 反抗；叛逆","ez":"反抗者受夠了政府不公平的政策。"},{"w":"retreat","p":"[rɪˈtriːt] v.","d":"To retreat means to run away because you have been beaten in a fight.","e":"The army retreated because they were losing the battle.","zh":"(動) 撤退；退卻　(名) 撤退；隱居","ez":"軍隊因為戰敗而撤退。"},{"w":"revolution","p":"[revəˈluːʃən] n.","d":"A revolution is a change to the political system by a group of people.","e":"The revolution in Russia led to the creation of the Soviet Union.","zh":"(名) 革命；變革","ez":"俄國的革命導致了蘇聯的成立。"},{"w":"spear","p":"[spɪə:r] n.","d":"A spear is a long stick with a blade on one end that is used as a weapon.","e":"The soldier was holding a spear in his hand.","zh":"(名) 矛；魚叉　(動) 刺；叉","ez":"那個士兵手裡握著一支長矛。"},{"w":"steep","p":"[stiːp] adj.","d":"If something is steep, then its slope or angle rises or falls sharply.","e":"He rode his bike up the steep hill to reach the top.","zh":"(形) 陡峭的；急遽的","ez":"他騎著腳踏車爬上陡峭的山丘到達山頂。"},{"w":"summit","p":"[ˈsʌmɪt] n.","d":"A summit is the highest part of a hill or mountain.","e":"Snow covered the summit of the mountain even during the summer.","zh":"(名) 山頂；最高點　(動) 參加高峰會；登上頂峰","ez":"即使在夏天，山頂也覆蓋著雪。"},{"w":"thunder","p":"[ˈθʌndə:r] n.","d":"Thunder is the loud noise heard during a storm.","e":"The sound of the thunder startled me.","zh":"(名) 雷；雷聲　(動) 打雷；轟隆作響","ez":"雷聲嚇了我一跳。"},{"w":"troops","p":"[truːps] n.","d":"Troops are soldiers that fight in groups in a battle.","e":"The troops were all prepared to go into battle.","zh":"(名) 軍隊；部隊","ez":"部隊都準備好要上戰場了。"},{"w":"warrior","p":"[ˈwɔ(:)riə:r] n.","d":"A warrior is a brave soldier or fighter.","e":"The samurai were some of the most skilled warriors in the ancient world.","zh":"(名) 戰士；勇士","ez":"武士是古代世界中最厲害的戰士之一。"},{"w":"withdraw","p":"[wɪθˈdrɔː] v.","d":"To withdraw means to leave a place, usually during war.","e":"After losing the battle, the enemy withdrew back to its own country.","zh":"(動) 退出；撤回","ez":"戰敗後，敵軍撤回自己的國家。"},{"w":"yield","p":"[jiːld] v.","d":"To yield something means to give up control of it or to give it away.","e":"He had to yield his turn because he was in checkmate.","zh":"(動) 讓路；屈服　(名) 產量；收益","ez":"因為被將死，他不得不讓出回合。"}]},{"id":19,"name":"Unit 19","words":[{"w":"bench","p":"[bentʃ] n.","d":"A bench is a long seat for two or more people.","e":"Most parks have benches for citizens to relax upon.","zh":"(名) 長凳；板凳　(名) 運動隊的替補席","ez":"大多數公園都有長椅讓市民休息。"},{"w":"confront","p":"[kənˈfrʌnt] v.","d":"To confront a hard situation or person is to deal with it.","e":"The couple has to confront each other about their problems.","zh":"(動) 面對；對抗　勇敢面對（困難、問題等）","ez":"這對夫妻必須面對面解決他們的問題。"},{"w":"daisy","p":"[ˈdeɪzɪ] n.","d":"A daisy is a small flower with white petals and a yellow center.","e":"There were a few daisies growing in the field.","zh":"雛菊","ez":"田野裡長了幾朵雛菊。"},{"w":"dispute","p":"[diˈspjuːt] n.","d":"A dispute is an argument or disagreement that people have.","e":"Karen and Brian often have disputes about silly things.","zh":"(名) 爭議；爭執　(動) 爭論；質疑","ez":"凱倫和布萊恩常為瑣事爭吵。"},{"w":"horror","p":"[ˈhɔ:rər] n.","d":"Horror is a feeling of being very afraid or shocked.","e":"The audience screamed in horror when the ghost appeared in the movie.","zh":"(名) 恐怖；驚駭　(形) 令人恐怖的；可怕的","ez":"電影中鬼魂出現時，觀眾嚇得尖叫。"},{"w":"incident","p":"[ˈɪnsədənt] n.","d":"An incident is an event that is usually not pleasant.","e":"Mr. Wilson had an incident where he became sick and had to leave.","zh":"(名) 事件；事故　(名) 衝突；糾紛","ez":"威爾森先生發生了一個事件，他生病了而不得不離開。"},{"w":"mist","p":"[mist] n.","d":"Mist is water that you can see in the air or on a surface.","e":"The forest was covered with mist.","zh":"(名) 霧；薄霧　(動) 使模糊；噴霧","ez":"森林籠罩在霧中。"},{"w":"object","p":"[ˈɒbdʒɪkt] n.","d":"An object is an inanimate thing that you can see or touch.","e":"The shopping cart was filled with objects.","zh":"(名) [ˈɑbdʒɪkt] 物體；對象　(動) [əbˈdʒɛkt] 反對；提出異議","ez":"購物車裡裝滿了物品。"},{"w":"orphan","p":"[ˈɔːrfən] n.","d":"An orphan is a child who does not have parents.","e":"The orphan frequently cried during the night.","zh":"(名) 孤兒　(動) 使成孤兒","ez":"那個孤兒經常在夜裡哭泣。"},{"w":"plot","p":"[plɔt] v.","d":"To plot is to make a secret plan to do something that is wrong or mean.","e":"The group was plotting to ruin the company&rsquo;s financial reports.","zh":"(名) 情節；陰謀　(動) 策劃；繪製","ez":"那個團體正在策劃破壞公司的財務報告。"},{"w":"pregnant","p":"[ˈpregnənt] adj.","d":"When a female is pregnant, she is going to have a baby.","e":"The pregnant woman was shopping for baby clothes.","zh":"(形) 懷孕的","ez":"那位孕婦正在選購嬰兒衣服。"},{"w":"rage","p":"[reɪdʒ] n.","d":"Rage is a very angry feeling.","e":"The chef was filled with rage when his helpers ruined the meal.","zh":"(名) 憤怒；暴怒　(動) 發怒；肆虐","ez":"當助手搞砸了餐點時，廚師滿腔怒火。"},{"w":"revenge","p":"[rɪˈvendʒ] n.","d":"Revenge is what you do to hurt or punish someone who hurts you.","e":"He broke his sister&rsquo;s doll as revenge after she lost his favorite book.","zh":"(名) 報復；復仇　(動) 報復；為…報仇","ez":"他為了報復妹妹弄丟他最喜歡的書，而弄壞了她的洋娃娃。"},{"w":"shame","p":"[ʃeɪm] n.","d":"Shame is a bad feeling about things you have done wrong.","e":"The boy felt shame about misplacing his clothes.","zh":"(名) 羞愧；恥辱","ez":"那個男孩因為弄丟衣服而感到羞愧。"},{"w":"sigh","p":"[saɪ] v.","d":"To sigh is to breathe out loudly and show that you are tired or sad.","e":"Molly sighed when she looked at all the information she had to research.","zh":"(名) 嘆息；嘆氣　(動) 嘆息；嘆氣","ez":"茉莉看著她必須研究的所有資料，嘆了口氣。"},{"w":"sneak","p":"[sniːk] v.","d":"To sneak is to move quietly so that no one hears or sees you.","e":"The thief snuck out of the house without anyone noticing him.","zh":"(動) 偷偷地走；偷帶","ez":"小偷悄悄溜出房子，沒有人注意到他。"},{"w":"spare","p":"[spɛə:r] v.","d":"To spare something is to give it because you have more than you need.","e":"I wanted to help him but I couldn&rsquo;t spare a tire.","zh":"(動) 抽出（時間）；讓出；節省　(形) 多餘的；備用的","ez":"我想幫他，但我沒有多餘的輪胎。"},{"w":"stem","p":"[stem] n.","d":"The stem of a plant is the stick that grows leaves or flowers.","e":"The rose had a long thin stem.","zh":"(動) 阻止；遏制　(名) 莖；柄","ez":"那朵玫瑰有一根細長的莖。"},{"w":"supper","p":"[ˈsʌpər] n.","d":"Supper is a meal that is eaten in the evening.","e":"We usually have supper around 6 o &rsquo;clock at my house.","zh":"(名) 晚餐；宵夜","ez":"我們通常在我家晚上六點左右吃晚餐。"},{"w":"tender","p":"[ˈtendə:r] adj.","d":"When something is tender, it is soft and easy to chew.","e":"The meat was so tender they didn&rsquo;t need knives to cut it with.","zh":"(形) 嫩的；溫柔的","ez":"肉很嫩，他們不需要用刀切。"}]},{"id":20,"name":"Unit 20","words":[{"w":"beneath","p":"[bɪˈniːθ] prep.","d":"If something is beneath something else, it is under it.","e":"The largest part of an iceberg lies beneath the waterline.","zh":"(介) 在…下面；低於　(動) 在…之下","ez":"冰山最大的部分位於水面下。"},{"w":"cub","p":"[kʌb] n.","d":"A cub is a baby animal, such as a bear or lion.","e":"The lion cub was crying for its mother.","zh":"(名) 幼獸；小熊　(名) 年輕缺乏經驗的人","ez":"小獅子在哭著找媽媽。"},{"w":"dawn","p":"[dɔːn] n.","d":"Dawn is the time of day when the sun rises.","e":"At dawn, the sun gently rose over the farm.","zh":"(名) 黎明；清晨　(動) 開始；破曉","ez":"黎明時，太陽緩緩升起在農場上空。"},{"w":"dissatisfied","p":"[ˈdɪsˈsætɪsfaɪd] adj.","d":"If you are dissatisfied, you are not happy with something.","e":"I was dissatisfied with their decision to work on Sunday.","zh":"(形) 不滿意的；不滿足的","ez":"我對他們決定在星期天工作感到不滿。"},{"w":"ease","p":"[iːz] n.","d":"When something is done with ease, it is not hard to do.","e":"The monkey climbed the tree with ease.","zh":"(動) 減輕；舒緩　(名) 輕鬆；舒適","ez":"猴子輕鬆地爬上了樹。"},{"w":"evident","p":"[ˈevɪdənt] adj.","d":"When something is evident, it is easy to see or understand.","e":"It was evident from the look on his face that he was unhappy.","zh":"(形) 明顯的；清楚的　(形) 顯而易見的；無庸置疑的","ez":"從他臉上的表情很明顯看出他不開心。"},{"w":"hail","p":"[heɪl] n.","d":"Hail is ice that falls from the sky when rain freezes.","e":"The hail from the storm was the size of golf balls.","zh":"(名) 冰雹　(動) 稱讚；歡迎　(動) 招呼；打招呼","ez":"暴風雨中的冰雹有高爾夫球那麼大。"},{"w":"howl","p":"[haul] v.","d":"To howl means to make a long, loud sound like a wolf or a dog.","e":"The wolf howled at the moon.","zh":"(動) 嚎叫；號叫　(名) 嚎叫聲；哭喊聲","ez":"狼對著月亮嚎叫。"},{"w":"leap","p":"[liːp] v.","d":"To leap means to jump a long distance.","e":"He had to leap over the gap to reach the other side of the hill.","zh":"(動) 跳躍；跳過　(名) 跳躍；飛躍","ez":"他必須跳過那道縫隙才能到達山丘的另一邊。"},{"w":"magnificent","p":"[mægˈnɪfəsənt] adj.","d":"When something is magnificent, it is beautiful and grand.","e":"The man gave his wife a pair of magnificent diamond earrings.","zh":"(形) 壯麗的；宏偉的　(形) 傑出的；卓越的","ez":"那個男人送給妻子一對華麗的鑽石耳環。"},{"w":"necessity","p":"[nɪˈsesətɪ] n.","d":"A necessity is something that is needed.","e":"Fresh water is a necessity for life.","zh":"(名) 必需；必要性　(名) 必需品；生活必需物","ez":"淡水是生命必需品。"},{"w":"outcome","p":"[ˈautkʌm] n.","d":"An outcome is the end of an action or event.","e":"The outcome of his latest business plan was a complete failure.","zh":"(名) 結果；成果","ez":"他最新商業計畫的結果是徹底失敗。"},{"w":"pile","p":"[paɪl] n.","d":"A pile is a large group of things on top of one another.","e":"The pile of cups was beginning to tilt.","zh":"(名) 堆；大量　(動) 堆積；累積","ez":"那疊杯子開始傾斜了。"},{"w":"profound","p":"[prəˈfaund] adj.","d":"When something is profound, it is very intelligent.","e":"For a little boy, Jeremy has some profound thoughts.","zh":"(形) 深刻的；深遠的","ez":"對一個小男孩來說，傑瑞米有一些深刻的想法。"},{"w":"seize","p":"[siːz] v.","d":"To seize something means to grab it quickly or strongly.","e":"The man seized as much money as he could before anyone could see him.","zh":"(動) 抓住；奪取","ez":"那個男人在任何人看到他之前，盡可能地抓了很多錢。"},{"w":"squeeze","p":"[skwiːz] v.","d":"To squeeze something means to press it together and hold it tightly.","e":"When Clara saw her cat, she gave it a big squeeze.","zh":"(動) 擠；壓榨","ez":"克拉拉看到她的貓時，緊緊地抱了牠一下。"},{"w":"supreme","p":"[suˈpriːm] adj.","d":"When something is supreme, it is the highest or best.","e":"The supreme officer was in charge of keeping the citizens calm.","zh":"(形) 最高的；至高的","ez":"最高指揮官負責維持市民的冷靜。"},{"w":"terrific","p":"[təˈrɪfɪk] adj.","d":"When something is terrific, it is very good.","e":"My youngest daughter is a terrific painter.","zh":"(形) 極好的；絕妙的","ez":"我最小的女兒是個很棒的畫家。"},{"w":"trait","p":"[treɪt] n.","d":"A trait is part of someone’s personality.","e":"One trait of Salvador&rsquo;s personality is his cheerfulness.","zh":"(名) 特質；特徵","ez":"薩爾瓦多個性的一個特點是他的開朗。"},{"w":"vital","p":"[ˈvaɪtl] adj.","d":"When something is vital, it is necessary for life.","e":"The heart is a vital organ.","zh":"(形) 至關重要的；生死攸關的","ez":"心臟是一個重要的器官。"}]},{"id":21,"name":"Unit 21","words":[{"w":"accustomed","p":"[əˈkʌstəmd] adj.","d":"When you become accustomed to something, you are in the habit of it.","e":"Grandfather is accustomed to reading the newspaper every morning.","zh":"(形) 習慣的；適應的　(動) 使習慣；使適應","ez":"爺爺習慣每天早上看報紙。"},{"w":"affirm","p":"[əˈfəːrm] v.","d":"To affirm is to say that something is true.","e":"Using a graph, Malcolm affirmed the success o f the company.","zh":"(動) 肯定；確認　(動) 聲明；宣稱","ez":"馬爾科姆用圖表證實了公司的成功。"},{"w":"astonished","p":"[əstɒnɪʃt] adj.","d":"If someone is astonished, they are very surprised or shocked.","e":"I was astonished when he pulled the live rabbit out of his hat.","zh":"(形) 驚訝的；吃驚的　(動) 使驚訝；使吃驚","ez":"當他從帽子裡拉出活兔子時，我嚇了一跳。"},{"w":"bang","p":"[æŋ] v.","d":"To bang is to hit something to make a noise.","e":"The drummer banged on his drum as he marched in the parade.","zh":"(名) 爆炸聲；砰聲　(動) 砰地關閉；猛烈撞擊　(副) 砰地一聲；正好","ez":"鼓手在遊行中邊走邊用力敲鼓。"},{"w":"clan","p":"[klæn] n.","d":"A clan is a group of relatives or friends.","e":"The Lee clan meets every year to celebrate the New Year.","zh":"(名) 氏族；家族　(名) 幫派；團體","ez":"李家每年聚會慶祝新年。"},{"w":"dim","p":"[dɪm] adj.","d":"When something is dim, it does not give out much light.","e":"Working in a dim room is bad for your eyes.","zh":"(形) 昏暗的；模糊的　(動) 使變暗；調暗","ez":"在昏暗的房間裡工作對眼睛不好。"},{"w":"emphasis","p":"","d":"Emphasis is special attention or importance.","e":"The students put special emphasis on chapter 4 because it will be on the test.","zh":"(名) 強調；重點　(動) 強調；著重","ez":"學生們特別強調第四章，因為考試會考。"},{"w":"fable","p":"[ˈfeibəl] n.","d":"A fable is a short story that teaches a lesson.","e":"In the fable about the tortoise and the hare, the lesson is consistency.","zh":"(名) 寓言；寓言故事　(名) 謊言；虛構的故事","ez":"在龜兔賽跑的寓言中，教訓是持之以恆。"},{"w":"feast","p":"[fiːst] n.","d":"A feast is a large meal for many people.","e":"At Thanksgiving, I enjoy a wonderful feast with my family.","zh":"(名) 盛宴；豐盛的餐飲　(動) 大吃；享受豐富的食物","ez":"感恩節時，我和家人享受一頓豐盛的大餐。"},{"w":"glow","p":"[glou] v.","d":"To glow is to make a soft light.","e":"The small flame glowed softly.","zh":"(動) 發光；照亮　(名) 光輝；光芒","ez":"小火苗微微發光。"},{"w":"hollow","p":"[ˈhɒlou] adj.","d":"When something is hollow, it has an empty space inside.","e":"Straws are hollow, so liquid can flow through them.","zh":"(形) 空心的；中空的　(動) 挖空；使凹陷","ez":"吸管是中空的，所以液體可以流過。"},{"w":"instinct","p":"[ɪnstɪŋkt] n.","d":"Instinct is the natural way that people behave without thinking about it.","e":"Cats hunt mice because of instinct.","zh":"(名) 本能；直覺　(動) 憑直覺驅使","ez":"貓捉老鼠是出於本能。"},{"w":"joint","p":"[dʒɔɪnt] n.","d":"A joint is a place of the body where the bones meet, such as the knee.","e":"Two important bones in your leg meet at a join t in your knee.","zh":"(名) 關節；接合處　(動) 連接；結合　(形) 共同的；聯合的","ez":"腿上的兩根重要骨頭在膝蓋的關節處相接。"},{"w":"leak","p":"[liːk] v.","d":"To leak is to let a liquid or gas pass through a flaw.","e":"The pipe leaks from many places.","zh":"(名) 洩漏；漏水　(動) 洩露；漏出","ez":"這根管子多處漏水。"},{"w":"physician","p":"[fɪzɪʃən] n.","d":"A physician is a doctor.","e":"The physician said I would feel better if I took my medicine.","zh":"(名) 醫生；內科醫師","ez":"醫生說如果我吃藥就會感覺好一點。"},{"w":"sacrifice","p":"[ˈsækrəfaɪs] v.","d":"To sacrifice something valuable is to give it up to get something else.","e":"Her parents sacrificed a lot of money in order for her to go to college.","zh":"(名) ['sækrəˌfaɪs] 犧牲；奉獻　(動) [ˈsækrəˌfaɪs] 犧牲；獻出","ez":"她的父母為了讓她上大學犧牲了很多錢。"},{"w":"stiff","p":"[stɪf] adj.","d":"When something is stiff, it is hard to move.","e":"The bird was standing on the tree&rsquo;s s tiff branch.","zh":"(形) 硬的；僵硬的；(態度) 嚴格的","ez":"那隻鳥站在樹的硬枝上。"},{"w":"stroke","p":"[strouk] v.","d":"To stroke is to move a hand over something or someone.","e":"She stroked her cheek to see if there was something on it.","zh":"(名) 划水；中風　(動) 撫摸；划水","ez":"她摸了摸臉頰，看看上面有沒有東西。"},{"w":"tragic","p":"[ˈtrædʒɪk] adj.","d":"When something is tragic, it is connected with death and suffering.","e":"The airplane crashed in a tragic accident.","zh":"(形) 悲慘的；悲劇的","ez":"飛機在一場悲劇事故中墜毀。"},{"w":"tune","p":"[tjuːn] n.","d":"A tune is a song.","e":"The students played a familiar tune for the audience.","zh":"(動) 調音；調整","ez":"學生們為觀眾演奏了一首熟悉的曲子。"}]},{"id":22,"name":"Unit 22","words":[{"w":"accommodate","p":"[əˈkɒmədeɪt] v.","d":"To accommodate is to have enough room.","e":"The meeting room can accommodate nine people.","zh":"(動) 容納；提供住宿","ez":"會議室可以容納九個人。"},{"w":"circus","p":"[ˈsəːrkəs]  n.","d":"A circus is a traveling show with animals and people.","e":"I like to go to the circus to see the animals do tricks.","zh":"(名) 馬戲團；馬戲表演","ez":"我喜歡去馬戲團看動物表演把戲。"},{"w":"coincide","p":"[kouinˈsaid] v.","d":"If two things coincide, they happen at the same time.","e":"My birthday coincides with Christmas.","zh":"(動) 巧合；一致　(動) 同時發生；相符","ez":"我的生日和聖誕節同一天。"},{"w":"commission","p":"[kəˈmɪʃən] v.","d":"To commission someone to do something is to pay them to do it.","e":"The artist was commissioned to create a picture.","zh":"(名) 佣金；手續費　(動) 委託；授權　(名) 委員會；機構","ez":"這位藝術家受委託創作一幅畫。"},{"w":"dose","p":"[dous] n.","d":"A dose is a certain amount of medicine that you take at one time.","e":"My mother gave me a dose of medicine before I went to bed.","zh":"(名) 劑量；一份　(動) 給予劑量；給藥","ez":"我媽媽在我睡前給了我一劑藥。"},{"w":"dye","p":"[daɪ] v.","d":"To dye something is to make it a certain color by using a special chemical.","e":"Valery got her hair dyed at the salon yesterday.","zh":"(動) 染色；將某物浸入顏料　(名) 染料；顏料","ez":"瓦萊麗昨天在沙龍染了頭髮。"},{"w":"extent","p":"[ɪksˈtent] n.","d":"The extent of something is how large, important, or serious it is.","e":"He ate to such an extent that he became overweight.","zh":"(名) 程度；範圍　(名) 長度；面積","ez":"他吃得太多了，結果變胖了。"},{"w":"gender","p":"[ˈdʒendər] n.","d":"Gender is a category that describes being either a boy or a girl.","e":"Do you know the gender of her new baby?","zh":"(名) 性別；性　(形) 性別的；關於性別的","ez":"你知道她新生兒的性別嗎？"},{"w":"headline","p":"[ˈhedlaɪn] n.","d":"A headline is the title of a newspaper story.","e":"The headline on the front page was about the economy.","zh":"(名) 標題；頭條新聞　(動) 擔任主要角色；做為頭條刊登","ez":"頭版頭條是關於經濟的新聞。"},{"w":"informal","p":"[ɪnˈfɔːrməl] adj.","d":"When something is informal, it is not official.","e":"They had an informal meeting to talk about their experiences.","zh":"(形) 非正式的；不正規的　(形) 隨便的；輕鬆的","ez":"他們開了一個非正式會議，聊聊各自的經歷。"},{"w":"inquire","p":"[ɪnˈkwaɪər] v.","d":"To inquire about something is to ask about it.","e":"Dad called to inquire about the price of tickets for the show.","zh":"(動) 詢問；打聽　(動) 調查；探究","ez":"爸爸打電話詢問表演門票的價格。"},{"w":"messenger","p":"[ˈmesəndʒər] n.","d":"A messenger is one who carries information from one place to another.","e":"The messenger delivered an important document to the office.","zh":"(名) 信使；使者　(名) 通訊軟體","ez":"信差將一份重要文件送到辦公室。"},{"w":"peer","p":"[pɪər] v.","d":"To peer at something is to watch it carefully.","e":"She peered at people through the window.","zh":"(名) 同儕；同輩","ez":"她透過窗戶仔細看著人們。"},{"w":"portrait","p":"[ˈpɔːrtrɪt] n.","d":"A portrait is a painting or photograph of someone.","e":"I saw many religious portraits when I went to the museum.","zh":"(名) 肖像；畫像","ez":"我去博物館時看到許多宗教肖像。"},{"w":"pose","p":"[pouz] v.","d":"To pose is to stay in one place without moving.","e":"The kids and their dog posed for a picture.","zh":"(動) 擺姿勢；造成；提出","ez":"孩子們和他們的狗一起擺姿勢拍照。"},{"w":"ranch","p":"[ræntʃ] n.","d":"A ranch is a large farm where animals are kept.","e":"My uncle has many horses on his ranch.","zh":"(名) 牧場；大農場","ez":"我叔叔的農場裡有許多馬。"},{"w":"steer","p":"[stɪə:r] v.","d":"To steer something is to control where it goes.","e":"He steered the go-cart around the track.","zh":"(動) 駕駛；引導","ez":"他駕駛卡丁車繞著賽道行駛。"},{"w":"stripe","p":"[straɪp] n.","d":"A stripe is a thick line.","e":"The flag of the United States has red and white stripes.","zh":"(名) 條紋；斑紋　(動) 加條紋","ez":"美國國旗有紅白相間的條紋。"},{"w":"tame","p":"[teɪm] adj.","d":"When an animal is tame, it is not afraid to be near people.","e":"The tame bird rested on his hand.","zh":"(形) 馴服的；溫順的　(動) 馴服；馴化","ez":"那隻溫馴的鳥停在他手上。"},{"w":"tempt","p":"[tempt] v.","d":"To tempt people is to offer them something they want but shouldn’t have.","e":"I wasn&rsquo;t hungry, but she tempted me with a piece of my favorite cake.","zh":"(動) 誘惑；引誘","ez":"我不餓，但她用一塊我最喜歡的蛋糕引誘我。"}]},{"id":23,"name":"Unit 23","words":[{"w":"Aborigine","p":"[ӕbəˈridʒəni:] n.","d":"An Aborigine is a native of Australia before Europeans lived there.","e":"The Aborigines created beautiful artwork.","zh":"(名) 原住民；土著","ez":"原住民創作了美麗的藝術品。"},{"w":"ban","p":"[bæn] v.","d":"To ban something is to not let people do it.","e":"Smoking is banned in this building.","zh":"(動) 禁止；禁用　(名) 禁令；禁止","ez":"這棟建築內禁止吸菸。"},{"w":"cautious","p":"[ˈkɔːʃəs] adj.","d":"If you are cautious, you are careful in a dangerous situation.","e":"Be very cautious as you stack those boxes.","zh":"(形) 謹慎的；小心的　(形) 留意的；警覺的","ez":"疊那些箱子時要非常小心。"},{"w":"confess","p":"[kənˈfes] v.","d":"To confess something is to say that you did it.","e":"He confessed that he was responsible for choosing the winning story.","zh":"(動) 承認；坦白　(動) 向神父認罪","ez":"他承認自己負責選出獲勝的故事。"},{"w":"cottage","p":"[ˈkɒtɪdʒ] n.","d":"A cottage is a small, old house in the countryside.","e":"My aunt lives in a pretty cottage in the mountains.","zh":"(名) 小屋；鄉村別墅　(名) 農舍；度假小屋","ez":"我阿姨住在山上一間漂亮的小屋裡。"},{"w":"daytime","p":"[ˈdeɪtaɪm] n.","d":"Daytime is the time of the day when the sky is light.","e":"I only allowed my kids to play outside in the daytime.","zh":"白天；白晝","ez":"我只讓孩子們在白天到外面玩。"},{"w":"desperate","p":"[ˈdespərɪt] adj.","d":"If you are desperate, you will try anything to do or change something.","e":"I&rsquo;m desperate to find a new job.","zh":"(形) 絕望的；孤注一擲的　(動) 使絕望","ez":"我迫切需要找到一份新工作。"},{"w":"fade","p":"[feɪd] v.","d":"If something fades, it gets quieter or darker.","e":"The piece of cloth I found was old and faded.","zh":"(動) 褪色；消退　(動) 逐漸消失；減弱","ez":"我找到的那塊布又舊又褪色。"},{"w":"fierce","p":"[fɪərs] adj.","d":"If a person or animal is fierce, they are angry or violent.","e":"Wolves are fierce animals. Do not disturb them.","zh":"(形) 兇猛的；激烈的　(形) 強烈的；熾熱的","ez":"狼是兇猛的動物，不要打擾牠們。"},{"w":"gamble","p":"[ˈgæmbəl] v.","d":"To gamble means to play a game that involves winning or losing money.","e":"Many people like to go to casinos to gamble.","zh":"(動) 賭博；冒險　(名) 賭博；冒險行為","ez":"很多人喜歡去賭場賭博。"},{"w":"lawn","p":"[lɔːn] n.","d":"A lawn is an area covered in grass.","e":"My dad keeps the lawn in front of our house very neat.","zh":"(名) 草坪；草地","ez":"我爸爸把我們家門前的草坪整理得非常整齊。"},{"w":"mow","p":"[mou] v.","d":"To mow grass is to cut it to make it very short.","e":"I mow our lawn every weekend.","zh":"(動) 剪草；割草","ez":"我每個週末都會修剪我們家的草坪。"},{"w":"outlaw","p":"[ˈautlɔː] n.","d":"An outlaw is a criminal who hides from the police.","e":"The police passed out posters of the outlaw to all the people.","zh":"(動) [aʊt'lɔ] 宣布...為非法；禁止　(名) ['aʊt'lɔ] 罪犯；亡命之徒","ez":"警方將通緝犯的海報發放給所有民眾。"},{"w":"prospect","p":"[ˈprɒspekt] n.","d":"A prospect is a possibility that something will happen.","e":"He wakes up every morning with the prospect of having a good day.","zh":"(名) 前景；可能性　(動) 探勘；尋找","ez":"他每天早上醒來都期待著美好的一天。"},{"w":"purse","p":"[pəːrs] n.","d":"A purse is a bag where women keep money, makeup and keys.","e":"My sister likes to buy designer purses.","zh":"(名) 錢包；手提包","ez":"我姐姐喜歡買名牌手提包。"},{"w":"rod","p":"[rɔd] n.","d":"A rod is a thin stick made of wood or metal.","e":"I bought a new fishing rod to use while on vacation.","zh":"(名) 棒；桿","ez":"我買了一根新釣竿，準備在度假時使用。"},{"w":"seldom","p":"[ˈseldəm] adv.","d":"If something seldom happens, it doesn’t happen very often.","e":"It seldom rains in southern Arizona.","zh":"(副) 很少；不常","ez":"亞利桑那州南部很少下雨。"},{"w":"shave","p":"[ʃeɪv] v.","d":"To shave means to cut the hairs on your face with a sharp tool.","e":"My father shaves his face every day because he doesn&rsquo;t want a beard.","zh":"(動) 刮鬍子；剃毛","ez":"我父親每天刮臉，因為他不想留鬍子。"},{"w":"terrified","p":"[ˈterəfaid] adj.","d":"If you are terrified, you are extremely scared.","e":"When I saw the ghost, I was absolutely terrified!","zh":"非常害怕的；極度恐懼的","ez":"當我看到鬼魂時，我嚇得魂飛魄散！"},{"w":"wizard","p":"[ˈwɪzə:rd] n.","d":"A wizard is a man who can do magic.","e":"The wizard made gold fall from the sky.","zh":"(名) 巫師；術士","ez":"巫師讓黃金從天而降。"}]},{"id":24,"name":"Unit 24","words":[{"w":"baggage","p":"[ˈbægɪdʒ] n.","d":"Baggage is the set of bags that people take with them when they travel.","e":"I&rsquo;m taking several pieces of baggage with me on vacation.","zh":"(名) 行李；包袱　(名) 累贅；包袱","ez":"我帶了好幾件行李去度假。"},{"w":"bulb","p":"[bʌlb] n.","d":"A bulb is the glass part of an electric light.","e":"I had to change the light bulb in my bedroom.","zh":"(名) 燈泡；球莖","ez":"我必須更換臥室裡的燈泡。"},{"w":"bundle","p":"[ˈbʌndl] n.","d":"A bundle is a number of things that are tied together.","e":"I was shocked when he showed me a bundle of money.","zh":"(名) 束；包裹　(動) 捆紮；匆匆推動","ez":"當他給我看一疊錢時，我震驚不已。"},{"w":"cattle","p":"[ˈkætl] n.","d":"Cattle are cows and bulls, especially on a farm.","e":"The rancher&rsquo;s cattle were eating the grass in the field.","zh":"(名) 牛；牲畜　(名) 牲口；家畜","ez":"牧場主的牛正在田野裡吃草。"},{"w":"flee","p":"[fliː] v.","d":"To flee means to run away from trouble or danger.","e":"The crowd of men tried to flee from the danger.","zh":"(動) 逃跑；逃離　(動) 倉皇離去","ez":"那群男人試圖逃離危險。"},{"w":"graze","p":"[greɪz] v.","d":"To graze means to eat grass.","e":"The cows grazed in the field.","zh":"(動) 放牧；吃草　(動) 輕擦；擦傷","ez":"牛群在田野裡吃草。"},{"w":"greed","p":"[griːd] n.","d":"Greed is a desire to have more than the things that you need.","e":"She ate all the cookies out of her greed.","zh":"(名) 貪心；貪欲　(形) 貪心的；貪婪的","ez":"她因為貪婪而吃光了所有的餅乾。"},{"w":"herd","p":"[həːrd] n.","d":"A herd is a large group of the same type of animals that live together.","e":"The herd of cows moved slowly across the ranch.","zh":"(名) 牛群；獸群　(動) 聚集；驅趕","ez":"牛群緩慢地穿過牧場。"},{"w":"initiate","p":"[ɪˈnɪʃɪeɪt] v.","d":"To initiate something means to start it.","e":"You have to turn the switch on to initiate the computer system.","zh":"(動) 開始；發起　(動) 啟動；著手","ez":"你必須打開開關才能啟動電腦系統。"},{"w":"lane","p":"[leɪn] n.","d":"A lane is a small road.","e":"The lane passes directly in front of our house.","zh":"(名) 車道；巷弄　(名) 泳道；跑道","ez":"那條小路直接經過我們家門前。"},{"w":"nerve","p":"[nəːrv] n.","d":"Nerve is bravery or the belief that you can do something.","e":"He has the nerve to think that he can actually wrestle with a lion.","zh":"(名) 神經；勇氣　(動) 鼓起勇氣；使膽怯","ez":"他竟敢認為自己真的能和一頭獅子摔角。"},{"w":"optimist","p":"[ˈɔptəmɪst] n.","d":"An optimist is somebody who sees the good parts of a situation.","e":"Even though he has physical problems, my brother is an optimist.","zh":"樂觀主義者；樂天派","ez":"儘管我哥哥身體有問題，他仍然是個樂觀主義者。"},{"w":"parade","p":"[pəˈreɪd] n.","d":"A parade is a celebration when groups of people walk in the same direction.","e":"There were many marching bands in the spring parade.","zh":"(名) 遊行；檢閱　(動) 遊行；列隊行進","ez":"春季遊行中有許多行進樂隊。"},{"w":"pave","p":"[peɪv] v.","d":"To pave the ground is to lay material on it to make it easier to walk or drive on.","e":"The path was paved with yellow bricks.","zh":"(動) 鋪設；鋪路","ez":"那條小路鋪滿了黃色磚塊。"},{"w":"phantom","p":"[ˈfæntəm] n.","d":"A phantom is a ghost or spirit.","e":"A scary phantom appeared from out of the darkness.","zh":"幽靈；鬼魂；像幽靈的；像鬼魂的；幻覺的；幻影的；虛假的","ez":"一個可怕的幽靈從黑暗中出現。"},{"w":"portable","p":"[ˈpɔːrtəbəl] adj.","d":"Something that is portable is able to be moved or carried easily.","e":"Since computers are portable, people can use them anywhere.","zh":"(形) 可攜帶的；輕便的","ez":"由於電腦便於攜帶，人們可以在任何地方使用它們。"},{"w":"poster","p":"[ˈpoustər] n.","d":"A poster is a written announcement that is used to advertise something.","e":"I saw a poster about a free concert in the park.","zh":"(名) 海報；廣告","ez":"我看到一張關於公園免費音樂會的海報。"},{"w":"scratch","p":"[ˈskrætʃ] v.","d":"To scratch is to make small cuts with a claw or fingernail.","e":"I used a stick to scratch my back.","zh":"(動) 抓；刮；擦　(名) 抓痕；刮痕","ez":"我用一根棍子來抓背。"},{"w":"symphony","p":"[ˈsɪmfənɪ] n.","d":"A symphony is a long piece of music performed by many musicians.","e":"Alex, a violin player, has always dreamt of playing a symphony.","zh":"(名) 交響樂；交響曲","ez":"亞歷克斯，一位小提琴手，一直夢想著演奏交響樂。"},{"w":"widow","p":"[ˈwɪdou] n.","d":"A widow is a woman whose husband has died.","e":"The widow had no children and was very lonely.","zh":"(名) 寡婦","ez":"那位寡婦沒有孩子，非常孤獨。"}]},{"id":25,"name":"Unit 25","words":[{"w":"circulate","p":"[ˈsəːrkjəleit] v.","d":"To circulate something is to spread it quickly.","e":"The fan helped to circulate cool air through the room.","zh":"(動) 流通；循環　傳播；散布","ez":"電風扇幫助將涼爽的空氣循環到房間裡。"},{"w":"consequent","p":"[ˈkɒnsɪkwənt] adj.","d":"Consequent means happening because of a different situation.","e":"Her consequent rash came after she touched the poison ivy.","zh":"(形) 隨之而來的；由此產生的　(名) 結果；後果","ez":"她接觸毒藤後，隨之而來的皮疹出現了。"},{"w":"derive","p":"[dɪˈraɪv] v.","d":"To derive something from another source means to get it from that thing.","e":"Red&rsquo;s nickname was derived from the color of her hair.","zh":"(動) 推導；得出　獲得；來自","ez":"瑞德的綽號來自她頭髮的顏色。"},{"w":"drown","p":"[draun] v.","d":"To drown is to die from not being able to breathe underwater.","e":"He would have drowned if the sailors would not have rescued him.","zh":"(動) 溺水；淹沒　(動) 淹沒；掩蓋","ez":"如果水手們沒有救他，他早就淹死了。"},{"w":"dynasty","p":"[ˈdainəstɪ] n.","d":"A dynasty is a series of rulers who are all from the same family.","e":"The ancient Egyptians had a dynasty that lasted for many years.","zh":"(名) 朝代；王朝　(名) 家族統治；世家","ez":"古埃及有一個持續多年的王朝。"},{"w":"fraction","p":"[ˈfrækʃən] n.","d":"A fraction is a small part of something.","e":"Only a fraction of the cake was gone.","zh":"(名) 分數；片段　(名) 小部分；微小的量","ez":"蛋糕只被吃掉了一小部分。"},{"w":"frost","p":"[frɔ:st] n.","d":"Frost is a white layer of ice that forms during very cold weather.","e":"In the morning, the trees were all covered with frost.","zh":"(名) 霜；寒霜　(動) 結霜；冷凍　(形) 結霜的；冷的","ez":"早晨，樹木都覆蓋著霜。"},{"w":"illusion","p":"[ɪˈluːʒən] n.","d":"An illusion is something that looks real, but doesn’t actually exist.","e":"Some pictures create an illusion for the eyes.","zh":"(名) 幻覺；幻想　(動) 迷惑；欺騙","ez":"有些圖片會給眼睛帶來錯覺。"},{"w":"invade","p":"[ɪnˈveɪd] v.","d":"To invade is to take over a place by force.","e":"The enemy forces tried to invade our country through the air.","zh":"(動) 入侵；侵略　(動) 闖入；打擾","ez":"敵軍試圖從空中入侵我們的國家。"},{"w":"lieutenant","p":"[luːˈtenənt] n.","d":"A lieutenant is a rank in the military or police, or a person with that rank.","e":"The lieutenant was a good leader, and his soldiers respected him.","zh":"(名) 中尉；副官","ez":"中尉是一位好領袖，他的士兵們都很尊敬他。"},{"w":"marine","p":"[məˈriːn] adj.","d":"The word marine describes something related to the sea.","e":"A healthy ocean is full of marine animals.","zh":"(形) 海洋的；海生的　(名) 海軍；海員","ez":"健康的海洋充滿了海洋動物。"},{"w":"merit","p":"[ˈmerɪt] n.","d":"The merit of something or someone is their good qualities.","e":"The actor received an award for his merits in the movie.","zh":"(名) 優點；長處　(動) 值得；應得","ez":"這位演員因在電影中的功績而獲獎。"},{"w":"navy","p":"[ˈneɪvɪ] n.","d":"A navy is the part of a country’s military that fights at sea.","e":"My country is known for our strong navy.","zh":"(名) 海軍；艦隊　(形) 深藍色的；海軍的","ez":"我的國家以我們強大的海軍聞名。"},{"w":"polar","p":"[ˈpoulər] adj.","d":"Polar relates to the cold places on Earth’s north and south ends.","e":"Only a few people live in the Earth&rsquo;s northern polar region.","zh":"(形) 極地的；極端的；相反的","ez":"只有少數人居住在地球的北極地區。"},{"w":"ray","p":"[reɪ] n.","d":"A ray is a line of light that comes from a bright object.","e":"The sun&rsquo;s warm rays covered the beach.","zh":"(名) 光線；射線","ez":"太陽溫暖的光芒灑滿了沙灘。"},{"w":"resign","p":"[rɪˈzaɪn] v.","d":"To resign means to quit a job.","e":"After I officially resigned from work, I said goodbye to my boss.","zh":"(動) 辭職；放棄","ez":"在我正式辭職後，我向老闆道別。"},{"w":"suicide","p":"[ˈsuːəsaid] n.","d":"Suicide is the act of killing oneself.","e":"Some people feel so sad that they think suicide is the only answer.","zh":"(名) 自殺","ez":"有些人感到非常悲傷，以至於認為自殺是唯一的出路。"},{"w":"tremble","p":"[ˈtrembəl] v.","d":"To tremble is to shake as a result of cold weather.","e":"Harry was not used to the cold, so he trembled most of the day.","zh":"(動) 顫抖；發抖","ez":"哈利不習慣寒冷，所以大部分時間都在發抖。"},{"w":"underlying","p":"[ˈʌndərlaɪɪŋ] adj.","d":"When something is underlying, it is a hidden cause of something else.","e":"Her underlying fear of flying reduced her traveling options.","zh":"(形) 根本的；潛在的","ez":"她對飛行的潛在恐懼減少了她的旅行選擇。"},{"w":"via","p":"[vi:ə] prep.","d":"To travel via something means to travel through or using something.","e":"We arrived in the city from the airport via the train.","zh":"(介) 經由；透過","ez":"我們從機場搭乘火車抵達城市。"}]},{"id":26,"name":"Unit 26","words":[{"w":"alter","p":"[ˈɔ:ltər] v.","d":"To alter something means to make a small change to it.","e":"I altered the color of my nails to match my hair.","zh":"(動) 改變；修改　(動) 改小；改大","ez":"我把指甲的顏色改成跟頭髮一樣。"},{"w":"aside","p":"[əˈsaɪd] adv.","d":"If someone stands aside, they are on or to one side.","e":"The man stood aside and opened the door for me.","zh":"(副) 在旁邊；另外　(介) 除了...之外　(名) 旁白；題外話","ez":"那個男人站到一旁，幫我開了門。"},{"w":"autumn","p":"[ˈɔːtəm] n.","d":"Autumn is the season of the year between summer and winter.","e":"I love when the leaves fall in autumn because I can play in them.","zh":"(名) 秋季；秋天　(形) 秋天的；秋季的","ez":"我喜歡秋天落葉的時候，因為可以在裡面玩。"},{"w":"blend","p":"[blend] v.","d":"To blend is to mix two or more things together so that they become one thing.","e":"My wife blended together all of the ingredients to make a delicious stew.","zh":"(動) 混合；融合　(名) 混合物；混合品","ez":"我太太把所有食材混合在一起，煮了一鍋美味的燉菜。"},{"w":"collapse","p":"[kəˈlæps] v.","d":"To collapse is to fall down suddenly.","e":"The tree collapsed right in front of our house.","zh":"(動) 倒塌；崩潰　(名) 倒塌；崩潰","ez":"那棵樹就在我們家門口倒塌了。"},{"w":"crush","p":"[krʌʃ] v.","d":"To crush something is to press it together so its shape is destroyed.","e":"Selena&rsquo;s new car was crushed when something fell on top of it.","zh":"(動) 壓碎；粉碎　(名) 迷戀；暗戀的人","ez":"賽琳娜的新車被掉下來的東西壓壞了。"},{"w":"curve","p":"[kəːrv] v.","d":"To curve is to move in a line that bends and does not go straight.","e":"The road curves to the left and to the right.","zh":"(名) 曲線；彎曲　(動) 彎曲；轉彎","ez":"這條路彎來彎去，一下左一下右。"},{"w":"disgusting","p":"[dɪsˈgʌstɪŋ] adj.","d":"If something is disgusting, it is very unpleasant.","e":"After running all day, Greg&rsquo;s feet had a disgusting odor.","zh":"(形) 令人厭惡的；令人討厭的","ez":"跑了一整天後，葛瑞格的腳散發出難聞的氣味。"},{"w":"drain","p":"[dreɪn] n.","d":"A drain is a pipe that carries away water from a building, such as in a kitchen.","e":"The water in the sink goes down the drain as you wash your hands.","zh":"(動) 排水；消耗　(名) 排水管；流失","ez":"洗手的時候，水槽裡的水會流進排水管。"},{"w":"embrace","p":"[ɪmˈbreɪs] v.","d":"To embrace is to hug.","e":"When they saw each other again, the happy couple embraced.","zh":"(動) 擁抱；接受　(名) 擁抱；懷抱","ez":"這對快樂的情侶再次見面時，互相擁抱。"},{"w":"envy","p":"[ˈenvɪ] v.","d":"To envy someone is to wish that you had something that they have.","e":"Sally envied the happy couple.","zh":"(動) 妒忌；羨慕　(名) 妒忌；嫉妒","ez":"莎莉羨慕這對快樂的情侶。"},{"w":"fireworks","p":"[ˈfaɪərwəːrks] n.","d":"Fireworks are objects that create colored lights when they are lit.","e":"The display of fireworks was so beautiful.","zh":"憤怒的叫喊","ez":"煙火表演好漂亮。"},{"w":"flour","p":"[ˈflauər] n.","d":"Flour is a powder made from plants that is used to make foods like bread.","e":"I wanted to bake a pie, but I needed flour.","zh":"(名) 麵粉；粉末","ez":"我想烤一個派，但我需要麵粉。"},{"w":"fuse","p":"[fjuːz] n.","d":"A fuse is a string that you light on fireworks to make them explode.","e":"The boy litthe fuse on the rocket and waited for it to burst in the sky.","zh":"(動) 熔合；融合　(名) 保險絲；導火線","ez":"那個男孩點燃了火箭的引信，等著它在空中爆炸。"},{"w":"ginger","p":"[ˈdʒɪndʒər] n.","d":"Ginger is a spice from the root of a plant. It tastes spicy and sweet.","e":"Ginger is a common ingredient in many dishes from India.","zh":"(名) 薑；生薑　(形) 薑色的；活潑的","ez":"生薑是許多印度料理中常見的食材。"},{"w":"jealous","p":"[ˈdʒeləs] adj.","d":"If you are jealous, you think someone might take something from you.","e":"Miriam was jealous because Sue was paying too much attention to Jim .","zh":"(形) 嫉妒的；忌妒的　(形) 警惕的；保護的","ez":"米莉安很嫉妒，因為蘇太注意吉姆了。"},{"w":"paste","p":"[peɪst] n.","d":"A paste is a thick and smooth substance.","e":"My son needed some paste for a school project.","zh":"(動) 黏貼；張貼　(名) 麵團；糊狀物","ez":"我兒子需要一些膠水來做學校作業。"},{"w":"receipt","p":"[rɪˈsiːt] n.","d":"A receipt is a paper that proves that something was received or bought.","e":"After looking at my receipt, I realized that I had spent too much money.","zh":"(名) 收據；發票　(動) 收到；簽收","ez":"看了收據之後，我發現自己花太多錢了。"},{"w":"wipe","p":"[waip] v.","d":"To wipe something is to slide a piece of cloth over it to clean it.","e":"She wiped the dust from the windows.","zh":"(動) 擦；拭去","ez":"她把窗戶上的灰塵擦掉。"},{"w":"wire","p":"[ˈwaɪə:r] n.","d":"A wire is a thin string made out of metal.","e":"The wires were connected to towers that brought electricity to the city.","zh":"(名) 金屬線；電線　(動) 用金屬線連接；安裝電線","ez":"這些電線連接到為城市供電的電塔。"}]},{"id":27,"name":"Unit 27","words":[{"w":"acknowledge","p":"[əkˈnɒlɪdʒ] v.","d":"If you acknowledge something, you accept that it is true or that it exists.","e":"The teacher acknowledged that the young student was hungry.","zh":"(動) 承認；認可　(動) 表示感謝；致謝","ez":"老師承認那個年輕學生餓了。"},{"w":"ambassador","p":"[æmˈbæsədər] n.","d":"An ambassador is a government worker who works in another country.","e":"The ambassador from Korea was in charge ofthe conference.","zh":"(名) 大使；外交官　(名) 代表；使者","ez":"來自韓國的大使負責主持這場會議。"},{"w":"blonde","p":"[blɒnd] adj.","d":"If someone is a blonde, they have light-colored hair.","e":"My cousin is different from me. She is a blonde with blue eyes.","zh":"(形) 金色的；淺色的　(名) 金髮人；淺色","ez":"我表妹跟我長得不一樣。她是金髮藍眼。"},{"w":"conquer","p":"[ˈkɒŋkər] v.","d":"To conquer a country means to attack and take control of it.","e":"The soldiers were trying to conquer the world.","zh":"(動) 征服；攻佔　(動) 克服；戰勝","ez":"那些士兵試圖征服世界。"},{"w":"drag","p":"[dræg] v.","d":"To drag something means to pull it across the ground.","e":"The dog was dragging his owner down the street.","zh":"(動) 拖；拉　(動) 緩慢移動；拖曳　(名) 阻力；妨礙","ez":"那隻狗拖著主人在街上走。"},{"w":"exaggerate","p":"[ɪgˈzædʒəreɪt] v.","d":"To exaggerate is to say that something is bigger or better than it really is.","e":"Jimmy wasn&rsquo;t exaggerating about the seriousness of his injury.","zh":"(動) 誇大；誇張　(名) 誇大；夸張的說法","ez":"吉米沒有誇大他傷勢的嚴重性。"},{"w":"heritage","p":"[ˈherɪtɪdʒ] n.","d":"Heritage is the collection of features of a society, such as language and religion.","e":"Teepees are part ofthe heritage of the American Indians of the plains.","zh":"(名) 遺產；文化遺產　(名) 傳統；遺留","ez":"帳篷是平原美洲原住民文化遺產的一部分。"},{"w":"insult","p":"[ˈɪnsʌlt] v.","d":"To insult someone is to say things that will hurt their feelings.","e":"The girls insulted each other all afternoon.","zh":"(動) [In`s^lt] 侮辱；辱罵　(名) [`Ins^lt] 侮辱；無禮","ez":"那些女孩整個下午都在互相辱罵。"},{"w":"meanwhile","p":"[ˈmiːnhwaɪl] adv.","d":"Meanwhile means until something happens or while something is happening.","e":"He wants to be a doctor in the future, but meanwhile, he works a regular job.","zh":"(副) 同時；其間　(連) 當...的時候；同時","ez":"他將來想當醫生，但在此期間，他做著一份普通的工作。"},{"w":"necklace","p":"[ˈneklɪs] n.","d":"A necklace is a piece of jewelry that people wear around their necks.","e":"Joyce received a lovely pearl necklace for her wedding anniversary.","zh":"(名) 項鍊；頸飾","ez":"喬伊絲在結婚紀念日收到一條漂亮的珍珠項鍊。"},{"w":"noble","p":"[ˈnoubəl] n.","d":"A noble is a rich and powerful person.","e":"The Queen invited a noble from a nearby country to dinner.","zh":"(形) 高尚的；崇高的　(形) 貴族的；出身高貴的","ez":"女王邀請了一位鄰國的貴族來吃晚餐。"},{"w":"precious","p":"[ˈpreʃəs] adj.","d":"When something is precious, it is valuable and important.","e":"In a desert, water can be more precious than money.","zh":"(形) 珍貴的；寶貴的","ez":"在沙漠裡，水可能比錢還珍貴。"},{"w":"prejudice","p":"[ˈpredʒudɪs] n.","d":"A prejudice is an unfair opinion about someone before you get to know them.","e":"The company&rsquo;s rules against gender prejudice must be enforced.","zh":"(名) [ˈprɛdʒədɪs] 偏見；歧視　(動) [prɪˈdʒɛdɪs] 使有偏見；損害","ez":"公司反對性別偏見的規定必須嚴格執行。"},{"w":"rumor","p":"[ˈruːmə:r] n.","d":"A rumor is a story that may not be true.","e":"Carla was spreading rumors around the office.","zh":"(名) 謠言；傳聞","ez":"卡拉在辦公室裡散播謠言。"},{"w":"sin","p":"[sin] n.","d":"A sin is something that is wrong for religious reasons.","e":"Taking something that doesn&rsquo;t belong to you is a sin.","zh":"(名) 罪；罪惡","ez":"拿不屬於自己的東西是一種罪過。"},{"w":"spectacle","p":"[ˈspektəkəl] n.","d":"A spectacle is an amazing sight.","e":"Niagara Falls is quite a spectacle.","zh":"(名) 景象；奇觀；眼鏡","ez":"尼加拉瀑布真是壯觀。"},{"w":"stack","p":"[stæk] n.","d":"A stack is a pile of different things.","e":"There was a stack of paperwork on his desk to complete.","zh":"(動) 堆疊；堆積　(名) 堆；疊","ez":"他的桌上有一疊要完成的文書工作。"},{"w":"suspicious","p":"[səsˈpɪʃəs] adj.","d":"If someone is suspicious of someone else, they do not trust that person.","e":"Dad was suspicious ofthe caller on the line.","zh":"(形) 可疑的；懷疑的","ez":"爸爸對電話那頭的來電者感到懷疑。"},{"w":"tin","p":"[tɪn] n.","d":"Tin is a cheap white metal.","e":"Soup is a common food that is often sold in tin cans.","zh":"(名) 錫；罐頭；馬口鐵","ez":"湯是一種常見的食物，常以罐頭形式販售。"},{"w":"vase","p":"[veis] n.","d":"A vase is an attractive container where people keep flowers.","e":"The vase was filled with such lovely flowers.","zh":"(名) 花瓶","ez":"花瓶裡插滿了這麼可愛的花。"}]},{"id":28,"name":"Unit 28","words":[{"w":"ache","p":"[eɪk] v.","d":"If something aches, it hurts.","e":"Mindy&rsquo;s head ached because she bumped it against the wall.","zh":"(名) 疼痛；酸痛　(動) 疼痛；酸痛","ez":"敏蒂的頭很痛，因為她撞到了牆壁。"},{"w":"arctic","p":"[ˈɑːrktɪk] adj.","d":"If something is arctic, it is from far north near the North Pole.","e":"It is cold when the arctic winds blow.","zh":"(形) 北極的；寒冷的","ez":"當北極風吹來時，天氣很冷。"},{"w":"canal","p":"[kəˈnæl] n.","d":"A canal is a path for water to travel through.","e":"The city of Venice, Italy, has many canals.","zh":"(名) 運河；水道　(動) 引導；疏導","ez":"義大利威尼斯市有許多運河。"},{"w":"chemist","p":"[ˈkemɪst] n.","d":"A chemist is a scientist who works with chemicals.","e":"My mother is a successful chemist who helps invent new products.","zh":"(名) 藥劑師；化學家","ez":"我媽媽是一位成功的化學家，協助發明新產品。"},{"w":"chill","p":"[tʃɪl] n.","d":"A chill is a feeling of cold.","e":"The chill from the cold wind made Bill shiver.","zh":"(動) 冷卻；放鬆　(形) 涼爽的；酷的","ez":"冷風的寒意讓比爾發抖。"},{"w":"congress","p":"[ˈkɔŋgris] n.","d":"Congress is a group of leaders in a government.","e":"Congress makes laws for people to follow.","zh":"(名) 國會；議會　(名) 會議；集會","ez":"國會制定法律讓人們遵守。"},{"w":"dairy","p":"[ˈdɛərɪ] adj.","d":"If something is dairy, it is made from milk.","e":"Things like milk and cheese are dairy foods.","zh":"(名) 乳製品；牛奶製品　(形) 含乳製品的；與乳製品有關的","ez":"像牛奶和起司這類的東西是乳製品。"},{"w":"descend","p":"[dɪˈsend] v.","d":"To descend is to go downward.","e":"I descended the stairs to get out of the building.","zh":"(動) 下降；下來　(動) 祖先是；源自","ez":"我走下樓梯離開建築物。"},{"w":"grocer","p":"[ˈgrousər] n.","d":"A grocer is a person who sells food.","e":"Our grocer, Mr. Smith, is a very kind man.","zh":"(名) 雜貨商；食品店老闆","ez":"我們的雜貨店老闆史密斯先生是個非常和善的人。"},{"w":"hesitate","p":"[ˈhezəteɪt] v.","d":"To hesitate is to wait for a short time before doing something.","e":"He hesitated for a moment before he decided which choice to make.","zh":"(動) 猶豫；遲疑　(名) 猶豫；遲疑","ez":"他猶豫了一會兒，才決定要選哪個。"},{"w":"institution","p":"[ɪnstəˈtjuːʃən] n.","d":"An institution is an organization that works to help a city or group of people.","e":"Banks are vital institutions that businesses and people use every day.","zh":"(名) 機構；制度　(名) 慈善機關；學校","ez":"銀行是企業和人們每天使用的重要機構。"},{"w":"jog","p":"[dʒɔg] v.","d":"To jog is to run slowly.","e":"He jogs every day so he can be healthier.","zh":"(動) 慢跑；輕推　(名) 慢跑；輕推","ez":"他每天慢跑，讓自己更健康。"},{"w":"merchant","p":"[ˈməːrtʃənt] n.","d":"A merchant is a person who sells things.","e":"The merchant was selling used cars.","zh":"(名) 商人；貿易商　(形) 商業的；貿易的","ez":"那個商人正在賣二手車。"},{"w":"poke","p":"[pouk] v.","d":"To poke something is to push it with your finger.","e":"I poked my finger on a thumb tack.","zh":"(動) 戳；捅　(名) 戳；捅","ez":"我的手指被圖釘刺到了。"},{"w":"postpone","p":"[poustˈpoun] v.","d":"To postpone something is to make it happen later than planned.","e":"They postponed the meeting until Elena arrived.","zh":"(動) 延緩；延期","ez":"他們把會議延後，直到艾蓮娜抵達。"},{"w":"splash","p":"[splæʃ] v.","d":"When a liquid splashes, it bursts and hits something.","e":"Some green paint splashed upon the floor.","zh":"(名) 水花；濺潑聲　(動) 濺；潑","ez":"一些綠色油漆濺到了地板上。"},{"w":"stubborn","p":"[ˈstʌbə:rn] adj.","d":"If people are stubborn, they don’t change their minds easily.","e":"Both of my parents are stubborn. They never give in to each other.","zh":"(形) 固執的；頑固的","ez":"我的父母都很固執，誰也不讓誰。"},{"w":"suburb","p":"[ˈsʌbəːrb] n.","d":"A suburb is a small part of a large city.","e":"I grew up in the suburbs only a few minutes outside of the city.","zh":"(名) 郊區；近郊","ez":"我在郊區長大，離市區只有幾分鐘車程。"},{"w":"tide","p":"[taɪd] n.","d":"The tide is the level of the water in the sea.","e":"The tide continued to crawl upon the beach little by little.","zh":"(名) 潮汐；潮流　(動) 順勢而為；渡過","ez":"潮水一點一點地繼續漫上沙灘。"},{"w":"tragedy","p":"[ˈtrædʒədɪ] n.","d":"A tragedy is a very sad event.","e":"It was a tragedy when his house was struck by lightning and burned.","zh":"(名) 悲劇；災難","ez":"他的房子被雷擊中燒毀，真是個悲劇。"}]},{"id":29,"name":"Unit 29","words":[{"w":"bomb","p":"[bɒm] n.","d":"A bomb is an object that explodes and destroys large areas.","e":"The bomb will destroy anything that is near.","zh":"(名) 炸彈；爆彈　(動) 轟炸；投擲炸彈　(動) 砸；失敗","ez":"炸彈會摧毀附近的一切。"},{"w":"certificate","p":"[sərtɪfəkɪt] n.","d":"A certificate is a document that says that something is true or happened.","e":"I was given a certificate after completing the computer course.","zh":"(名) 證書；憑證　(動) 證明；認可","ez":"完成電腦課程後，我獲得了一張證書。"},{"w":"circumstance","p":"[ˈsəːrkəmstӕns] n.","d":"A circumstance is an event that makes a situation what it is.","e":"There were many circumstances behind their success like hard work.","zh":"(名) 環境；情況　(名) 條件；因素","ez":"他們成功的背後有許多因素，比如努力。"},{"w":"coffin","p":"[ˈkɔ:fɪn] n.","d":"A coffin is a box used to bury dead people.","e":"When a person passes away, they are usually buried inside of a coffin.","zh":"(名) 棺材；靈柩","ez":"人過世後，通常會被埋葬在棺材裡。"},{"w":"cope","p":"[koup] v.","d":"To cope with a difficult or stressful situation means to deal with it.","e":"He copes with work stress by exercising three or four times a week.","zh":"(動) 應對；處理　(動) 克服；忍受","ez":"他透過每週運動三到四次來應對工作壓力。"},{"w":"criticism","p":"[ˈkritisizəm] n.","d":"Criticism is the act of saying that you don’t like or approve of something.","e":"She had a lot of criticism about their new plan.","zh":"(名) 批評；評論　(名) 批評意見；挑剔","ez":"她對他們的新計畫有很多批評。"},{"w":"devastate","p":"[ˈdevəsteɪt] v.","d":"To devastate something means to completely destroy it.","e":"The entire wall was devastated.","zh":"(動) 嚴重破壞；摧毀　(動) 使極度傷心；打擊","ez":"整面牆都毀了。"},{"w":"frown","p":"[fraun] v.","d":"To frown is to make an unhappy look with your face.","e":"Melissa frowned when she found out that the party had been cancelled.","zh":"(動) 皺眉；不悅　(名) 皺眉；不滿的表情","ez":"梅麗莎發現派對取消時，皺起了眉頭。"},{"w":"gaze","p":"[geɪz] v.","d":"To gaze at something means to look at it for a long time.","e":"We used a telescope to gaze at the stars for over an hour.","zh":"(動) 凝視；注視　(名) 凝視；目光","ez":"我們用望遠鏡觀星超過一個小時。"},{"w":"glance","p":"[glæns] v.","d":"To glance at something means to look at it quickly.","e":"She glanced behind her to see if he was looking at her.","zh":"(動) 匆匆一瞥；掃一眼　(名) 一瞥；眼神","ez":"她回頭瞥了一眼，看他是否在看她。"},{"w":"grief","p":"[griːf] n.","d":"Grief is the feeling of deep sadness, usually when a person dies.","e":"The grief caused by losing her parents was very difficult for her.","zh":"(名) 悲傷；哀痛　(動) 為…感到悲傷","ez":"失去父母帶給她的悲傷非常難以承受。"},{"w":"groom","p":"[gruːm] n.","d":"A groom is a man who is going to be married.","e":"The groom looked happy as he walked with his new wife.","zh":"(名) 新郎；馬夫　(動) 梳洗打扮；培養","ez":"新郎和新娘走在一起時，看起來很開心。"},{"w":"license","p":"[ˈlaɪsəns] n.","d":"A license is an official document that gives one permission to do something.","e":"In the United States you need a driver&rsquo;s license to drive legally.","zh":"(名) 執照；許可證　(動) 頒發執照；核准","ez":"在美國，你需要駕照才能合法開車。"},{"w":"microscope","p":"[ˈmaɪkrəskoup] n.","d":"A microscope is a device that makes small objects look bigger.","e":"Germs cannot be seen without a microscope.","zh":"(名) 顯微鏡；放大鏡","ez":"沒有顯微鏡就看不到細菌。"},{"w":"nuclear","p":"[ˈnjuːklɪə:r] adj.","d":"When something is nuclear, it relates to the division or joining of atoms.","e":"Nuclear power plants provide inexpensive energy to cities.","zh":"(形) 核的；核能的　(形) 中心的；核心的","ez":"核電廠為城市提供廉價的能源。"},{"w":"portray","p":"[pɔːrtreɪ] v.","d":"To portray something means to describe it or show it in a picture.","e":"Her picture portrayed the house she grew up in when she was little.","zh":"(動) 描繪；扮演","ez":"她的畫描繪了她小時候長大的房子。"},{"w":"rotate","p":"[rouˈteɪt] v.","d":"To rotate something means to turn it around in a circle.","e":"An airplane&rsquo;s propellers rotate quickly to help it fly.","zh":"(動) 旋轉；輪流","ez":"飛機的螺旋槳快速旋轉，幫助它飛行。"},{"w":"souvenir","p":"[su:vəniə:r] n.","d":"A souvenir is something you buy to remind you of a place or event.","e":"I bought a Russian doll as a souvenir from my trip to Moscow.","zh":"(名) 紀念品","ez":"我買了一個俄羅斯娃娃，作為莫斯科之旅的紀念品。"},{"w":"submarine","p":"[sʌbməˈriːn] n.","d":"A submarine is a boat that can go underwater for long periods of time.","e":"The submarine dove under the sea so the enemy couldn&rsquo;t see it.","zh":"(名) 潛水艇；海底生物","ez":"潛水艇潛入海中，讓敵人看不見它。"},{"w":"trace","p":"[treɪs] v.","d":"To trace something means to follow over it with the eyes or a finger.","e":"He traced over the graph with his finger.","zh":"(名) 痕跡；微量　(動) 追蹤；描繪","ez":"他用手指沿著圖表描繪。"}]},{"id":30,"name":"Unit 30","words":[{"w":"appliance","p":"[əˈplaɪəns] n.","d":"An appliance is a piece of equipment used for jobs in the home.","e":"Many homes have appliances like ovens, toasters and refrigerators.","zh":"(名) 電器用品；家電　(名) 裝置；器具","ez":"許多家庭都有烤箱、烤麵包機和冰箱等電器。"},{"w":"basin","p":"[ˈbeɪsən] n.","d":"A basin is large bowl for washing things. A sink is sometimes called a basin.","e":"She filled the basin with water and washed her face.","zh":"(名) 盆；盆地　(名) 河流的流域；集水區","ez":"她裝滿一盆水洗了臉。"},{"w":"broom","p":"[bruːm] n.","d":"A broom is a brush with a long handle used for cleaning floors.","e":"My father usually uses a broom to sweep away dust in the basement.","zh":"(名) 掃帚；掃把　(動) 掃；清掃","ez":"我爸爸通常用掃帚清掃地下室的灰塵。"},{"w":"caterpillar","p":"[ˈkætərpɪlər] n.","d":"A caterpillar is a small insect that looks like a worm and eats plants.","e":"After eating a lot of leaves, caterpillars change into butterflies.","zh":"(名) 毛毛蟲；蝴蝶幼蟲","ez":"毛毛蟲吃了很多葉子後，會變成蝴蝶。"},{"w":"cupboard","p":"[ˈkʌbərd] n.","d":"A cupboard is a piece of furniture that is used to store food or household items.","e":"We put all of our dishes and food in the cupboards.","zh":"(名) 碗櫃；食物櫃","ez":"我們把所有碗盤和食物都放進櫥櫃裡。"},{"w":"delicate","p":"[ˈdeləkɪt] adj.","d":"If something or someone is delicate, they are easy to break or harm.","e":"You should hold the baby carefully because she&rsquo;s very delicate.","zh":"(形) 細緻的；精緻的　(形) 虛弱的；脆弱的","ez":"你應該小心抱著嬰兒，因為她非常脆弱。"},{"w":"emerge","p":"[ɪˈməːrdʒ] v.","d":"To emerge from something means to come out of it.","e":"The hand suddenly emerged from the grave.","zh":"(動) 出現；浮現　(動) 從…中出來；浮出","ez":"那隻手突然從墳墓裡伸出來。"},{"w":"handicap","p":"[ˈhændɪkæp] n.","d":"A handicap is a condition that limits someone’s mental or physical abilities.","e":"Joe has a slight handicap, so he uses a walker to get around.","zh":"(名) 障礙；不利條件　(動) 妨礙；使處於不利地位　(形) 身心障礙的","ez":"喬有輕微的行動不便，所以他用助行器走動。"},{"w":"hook","p":"[huk] n.","d":"A hook is a sharp curved piece of metal used for catching or holding things.","e":"The fish went after the sharp hook.","zh":"(名) 鉤子；魚鉤　(動) 用鉤子鉤住；吸引　(片) 打右勾拳","ez":"那條魚追著鋒利的魚鉤。"},{"w":"hop","p":"[hɔp] v.","d":"To hop means to jump a short distance.","e":"The kangaroo quickly hopped away from danger.","zh":"(動) 跳躍；單足跳　(名) 跳躍；啤酒花","ez":"袋鼠迅速跳開，遠離危險。"},{"w":"laundry","p":"[ˈlɔːndrɪ] n.","d":"Laundry is clothes that have been or need to be washed.","e":"He folded the clean laundry and put the dirty laundry in a basket.","zh":"(名) 洗衣服；洗衣店　(名) 待洗衣物；已洗衣物","ez":"他把乾淨的衣服摺好，把髒衣服放進籃子裡。"},{"w":"pursue","p":"[pərjuː] v.","d":"To pursue someone or something is to chase or follow them.","e":"The mother pursued her young child down the hill.","zh":"(動) 追求；追趕","ez":"母親追著她年幼的孩子跑下山坡。"},{"w":"reluctant","p":"[rɪˈlʌktənt] adj.","d":"If someone is reluctant, they do not want to do something.","e":"She was reluctant to eat the meager breakfast.","zh":"(形) 不情願的；勉強的","ez":"她不太情願吃那頓簡陋的早餐。"},{"w":"sleeve","p":"[sliːv] n.","d":"Sleeves are the part of a shirt where your arms go.","e":"Ryan bought a new shirt with long sleeves to keep his arms warm.","zh":"(名) 袖子","ez":"萊恩買了一件長袖新襯衫，讓手臂保暖。"},{"w":"spine","p":"[spaɪn] n.","d":"The spine is the bone that runs up and down the middle of the back.","e":"Our spine helps us to stand up nice and straight.","zh":"(名) 脊柱；書脊；刺","ez":"我們的脊椎幫助我們站得筆直。"},{"w":"stain","p":"[steɪn] n.","d":"A stain is a dirty mark that is difficult to clean.","e":"He had a red stain on the collar of his shirt.","zh":"(名) 污漬；斑點　(動) 玷污；染色","ez":"他襯衫的領子上有一塊紅色污漬。"},{"w":"strip","p":"[strɪp] n.","d":"A strip is a long, narrow piece of material or land.","e":"He had long strips of film that held images of his trip abroad.","zh":"(動) 剝去；脫掉　(名) 條；帶","ez":"他有好幾條長長的底片，記錄了他出國旅行的影像。"},{"w":"swear","p":"[swɛər] v.","d":"To swear means to promise to do something.","e":"I will put my hand on the Bible and swear to do my best for the country.","zh":"(動) 咒罵；發誓","ez":"我會把手放在聖經上，發誓為國家盡心盡力。"},{"w":"swing","p":"[swɪŋ] v.","d":"To swing something means to move it back and forth or from side to side.","e":"He can swing a golf club very powerfully.","zh":"(動) 搖擺；盪鞦韆　(名) 鞦韆；擺動","ez":"他揮動高爾夫球桿的力道非常強勁。"},{"w":"utilize","p":"[ˈjuːtəlaiz] v.","d":"To utilize something means to use it for a specific purpose.","e":"They utilized a pair of scissors to cut the ribbon.","zh":"使用；利用；應用","ez":"他們用一把剪刀剪斷了緞帶。"}]},{"id":31,"name":"Index","words":[]}]},{"id":4,"name":"Book 4","units":[{"id":1,"name":"Unit 1","words":[{"w":"aroma","p":"[əˈroumə] n.","d":"An aroma is a scent or smell.","e":"I love the aroma of coffee in the morning.","zh":"(名) 香氣；芳香　(形) 有香味的；芬芳的","ez":"我喜歡早晨咖啡的香氣。"},{"w":"beverage","p":"[ˈbevərɪdʒ] n.","d":"A beverage is a drink.","e":"The waiter brought our beverages first. Then he brought our food.","zh":"(名) 飲料；飲品","ez":"服務生先送上飲料，然後才上菜。"},{"w":"cluster","p":"[ˈklʌstər] n.","d":"A cluster of things is a small group of them placed close together.","e":"She held a large cluster of grapes in her hand.","zh":"(名) 群；簇；一群　(動) 聚集；群集","ez":"她手裡拿著一大串葡萄。"},{"w":"combine","p":"[kəmˈbaɪn] v.","d":"To combine is to join together to make a single thing or group.","e":"Mina combined peanut butter and jelly to make a sandwich.","zh":"(動) [kəmˋbaɪn] 結合；合併　(名) [ˋkɑmbaɪn] 聯合收割機","ez":"米娜把花生醬和果醬混在一起做三明治。"},{"w":"condensed","p":"[kənˈdenst] adj.","d":"When a liquid is condensed, it is made thicker.","e":"One way to make a dessert thick and sweet is to use condensed milk.","zh":"使；液體；濃縮的；使；凝固的；使；凝結的","ez":"讓甜點變濃稠又香甜的方法之一是使用煉乳。"},{"w":"contemporary","p":"[kənˈtempərərɪ] adj.","d":"When something is contemporary, it is related to the present time.","e":"Contemporary scientists have learned quite a bit about DNA.","zh":"(形) 當代的；現代的　(名) 同時代的人；當代人物","ez":"當代科學家對DNA已有相當多的了解。"},{"w":"cultivate","p":"[ˈkʌltəveɪt] v.","d":"To cultivate plants is to care for them and help them grow.","e":"A research company is cultivating new kinds of rice to aid poor countries.","zh":"(動) 培養；栽培　(動) 種植；耕種","ez":"一家研究公司正在培育新品種的稻米，以幫助貧窮國家。"},{"w":"divine","p":"[dɪˈvaɪn] adj.","d":"When something is divine, it is related to gods.","e":"Legends say that music was given to men as a divine gift from the gods.","zh":"(形) 神聖的；神的　(動) 預測；猜測","ez":"傳說音樂是眾神賜予人類的神聖禮物。"},{"w":"humid","p":"[ˈhjuːmɪd] adj.","d":"When it is humid, there is a lot of water in the air.","e":"It is very humid inside of a sauna.","zh":"(形) 潮濕的；濕度高的　(形) 悶熱的；濕悶的","ez":"桑拿房裡非常潮濕。"},{"w":"odor","p":"[ˈoudər] n.","d":"An odor is a very distinct smell.","e":"He knew there was a leak when he noticed the strong odor of natural gas.","zh":"(名) 氣味；臭味　(名) 香氣；芳香","ez":"當他聞到強烈的瓦斯味時，就知道有漏氣。"},{"w":"palate","p":"[ˈpælɪt] n.","d":"The palate is the top part of the mouth.","e":"You can touch your palate with your tongue.","zh":"(名) 味覺；口味","ez":"你可以用舌頭碰觸上顎。"},{"w":"paradise","p":"[ˈpærədaɪs] n.","d":"Paradise is the place or condition of happiness where things are perfect.","e":"My vacation in Hawaii was like being in paradise.","zh":"(名) 天堂；樂園","ez":"我在夏威夷的假期就像身在天堂。"},{"w":"plantation","p":"[plænˈteɪʃən] n.","d":"A plantation is a big farm that only grows certain kinds of crops.","e":"In the 1800s, there were many cotton plantations in the southern US.","zh":"(名) 種植園；殖民地；大農場","ez":"在19世紀，美國南部有許多棉花種植園。"},{"w":"rapid","p":"[ˈræpɪd] adj.","d":"When something is rapid, it moves or changes very quickly.","e":"His mother was surprised by her son&rsquo;s rapid growth.","zh":"(形) 快速的；迅速的","ez":"母親對兒子的快速成長感到驚訝。"},{"w":"rate","p":"[reɪt] n.","d":"A rate is the speed at which something happens.","e":"Grass tends to grow at a very slow rate.","zh":"(名) 速率；比率　(動) 評價；評定等級","ez":"草的生長速度通常很慢。"},{"w":"soothing","p":"[ˈsuːðɪŋ] adj.","d":"When something is soothing, it makes you calm or relaxed.","e":"The soothing music helped the baby fall asleep.","zh":"安慰的；使人平靜的；鎮痛的；紓緩痛苦的","ez":"舒緩的音樂幫助嬰兒入睡。"},{"w":"subtle","p":"[ˈsʌtl] adj.","d":"When something is subtle, it is not easy to see or notice.","e":"The handsome man has a subtle smile.","zh":"(形) 微妙的；細微的","ez":"那位英俊的男子帶著一抹淺淺的微笑。"},{"w":"texture","p":"[ˈtekstʃə:r] n.","d":"The texture of something is the way its surface looks and feels.","e":"The texture of a rock found in the water is typically very smooth.","zh":"(名) 質地；口感","ez":"在水中找到的石頭，質地通常非常光滑。"},{"w":"toxic","p":"[ˈtɒksɪk] adj.","d":"When something is toxic, it is poisonous. Toxic things are very dangerous.","e":"Please check the label to see if the product is toxic.","zh":"(形) 有毒的；中毒的","ez":"請檢查標籤，看看產品是否有毒。"},{"w":"vary","p":"[ˈvɛərɪ] v.","d":"To vary means to be different from another thing in size or amount.","e":"The heights of the people in my class vary by a large amount.","zh":"(動) 變化；不同","ez":"我們班上同學的身高差異很大。"}]},{"id":2,"name":"Unit 2","words":[{"w":"accident","p":"[ˈæksɪdənt] n.","d":"An accident is an unexpected undesirable event.","e":"She had to go to the hospital after she was in a serious car accident.","zh":"(名) 意外；事故","ez":"她發生嚴重車禍後，必須去醫院。"},{"w":"admiral","p":"[ˈædmərəl] n.","d":"An admiral is someone who controls many military ships.","e":"They won the sea battle because of the admiral&rsquo;s great leadership.","zh":"(名) 海軍上將；旗艦司令官","ez":"他們因為海軍上將卓越的領導而贏得了海戰。"},{"w":"arc","p":"[ɑːrk] n.","d":"An arc is a curved shape.","e":"A rainbow has the shape of an arc.","zh":"(名) 弧；弧線　(動) 形成弧形；彎曲","ez":"彩虹的形狀像一道弧線。"},{"w":"character","p":"[ˈkærɪktər] n.","d":"Your character is your personality.","e":"My sister&rsquo;s character is fun and very outgoing.","zh":"(名) 性格；個性　(名) 人物；角色　(名) 品德；道德","ez":"我妹妹的性格活潑又非常外向。"},{"w":"conscience","p":"[ˈkɒnʃəns] n.","d":"Your conscience is your inner sense of what is right and wrong.","e":"I recycle everything I can, so my conscience is clear!","zh":"(名) 良心；道德感　(名) 道德意識；自我約束","ez":"我盡可能回收所有東西，所以問心無愧！"},{"w":"fiery","p":"[ˈfaɪərɪ] adj.","d":"If something is fiery, it is burning strongly.","e":"The fiery blaze burned all night long.","zh":"(形) 熾熱的；炎熱的　(形) 激烈的；激情的","ez":"熊熊烈火燃燒了整夜。"},{"w":"flesh","p":"[fleʃ] n.","d":"Flesh is the skin, muscle and fat on your body.","e":"The zebra&rsquo;s flesh has black and white stripes.","zh":"(名) 肉；肉體　(動) 使豐滿；充實　(形) 肉色的；淡紅色的","ez":"斑馬的身上有黑白相間的條紋。"},{"w":"grapefruit","p":"[ˈgreɪpfruːt] n.","d":"A grapefruit is a fruit similar to an orange, but bigger and not as sweet.","e":"Would you like a grapefruit with your breakfast?","zh":"(名) 葡萄柚；柚子","ez":"早餐要不要來顆葡萄柚？"},{"w":"hay","p":"[heɪ] n.","d":"Hay is dry grass used to feed animals or used as a covering.","e":"I need to buy some more hay for the horse to sleep on.","zh":"(名) 乾草；牧草","ez":"我需要多買些乾草給馬睡覺用。"},{"w":"horrified","p":"[ˈhɔ:rəˌfaɪd] adj.","d":"If you are horrified, you are very shocked and feel upset.","e":"I was horrified when I read about the old lady who was attacked.","zh":"(形) 非常害怕的；驚恐的　(動過) 使...感到恐懼；嚇壞","ez":"讀到那位老婦人被攻擊的消息時，我感到非常驚駭。"},{"w":"kerosene","p":"[ˈkerəsiːn] n.","d":"Kerosene is a type of oil. It is used in some lamps and stoves.","e":"Many people in poor countries cook on kerosene stoves.","zh":"航空煤油；煤油","ez":"貧窮國家的許多人用煤油爐做飯。"},{"w":"loop","p":"[luːp] n.","d":"A loop is a line made into the shape of a circle.","e":"He made a loop with the rope and placed it over the post.","zh":"(名) 迴圈；環形　(動) 環繞；循環","ez":"他用繩子打了個圈，套在柱子上。"},{"w":"paddle","p":"[ˈpædl] n.","d":"A paddle is a piece of wood or plastic that moves a boat across water.","e":"We need a paddle to help us move across the water.","zh":"(名) 槳；槳板　(動) 用槳划船；涉水","ez":"我們需要一支槳來划過水面。"},{"w":"raft","p":"[ræft] n.","d":"A raft is a floating platform made from pieces of wood tied together.","e":"The man made a raft out of bamboo and floated out to sea.","zh":"(名) 木筏；橡皮艇","ez":"那個男人用竹子做了個筏子，漂向大海。"},{"w":"sour","p":"[ˈsauə:r] adj.","d":"When something is sour, it has a sharp and unpleasant taste.","e":"I don&rsquo;t like lemons because I think they are too sour.","zh":"(形) 酸的；酸味的","ez":"我不喜歡檸檬，因為我覺得太酸了。"},{"w":"stake","p":"[steɪk] n.","d":"A stake is a small, sharp piece of wood or metal that is put into the ground.","e":"We marked our property by placing stakes into the ground.","zh":"(動) 賭注；以...打賭　(名) 樁；股份","ez":"我們在地上插了木樁來標記我們的土地。"},{"w":"steward","p":"[ˈstjuːərd] n.","d":"A steward is a person like a waiter who serves food on planes and ships.","e":"The steward is bringing some tea.","zh":"(名) 乘務員；服務員","ez":"服務員正在端茶過來。"},{"w":"string","p":"[strɪŋ] n.","d":"String is a thin piece of fabric or rope.","e":"I found a large ball of string.","zh":"(名) 繩子；線　(動) 串起；繫","ez":"我找到了一大團線。"},{"w":"thorn","p":"[θɔːrn] n.","d":"A thorn is a sharp part of a plant.","e":"Be careful of the thorns when you pick the roses!","zh":"(名) 刺；荊棘","ez":"摘玫瑰時要小心刺！"},{"w":"wreck","p":"[rek] v.","d":"To wreck something means to destroy or ruin it.","e":"The teenagers wrecked the house for no reason at all.","zh":"(動) 毀壞；使失事","ez":"那些青少年毫無理由地破壞了房子。"}]},{"id":3,"name":"Unit 3","words":[{"w":"admonish","p":"[ədˈmɒnɪʃ] v.","d":"To admonish someone is to tell them you disapprove of their behavior.","e":"The teacher admonished Mark because he was chewing gum in class.","zh":"告誡；警告；責備；力勸；忠告","ez":"老師告誡馬克，因為他在課堂上嚼口香糖。"},{"w":"audible","p":"[ˈɔːdəbl] adj.","d":"If something is audible, then it is able to be heard.","e":"The sound of the drums was audible from miles away.","zh":"(形) 能聽到的；可聽見的","ez":"鼓聲從幾英里外就能聽到。"},{"w":"awesome","p":"[ˈɔːsəm] adj.","d":"If something or someone is awesome, they are impressive or frightening.","e":"The huge military plane was an awesome sight.","zh":"(形) 令人驚歎的；極好的　(形) 令人敬畏的；了不起的","ez":"那架巨大的軍用飛機真是壯觀。"},{"w":"beware","p":"[bɪˈwɛər] v.","d":"To beware means to be careful of something or someone that is dangerous.","e":"You should beware of driving fast on wet roads.","zh":"(動) 當心；提防　(片) 小心；留意","ez":"你應該小心在濕滑的路面上開快車。"},{"w":"brag","p":"[bræg] v.","d":"To brag means to talk of one’s abilities or achievements in a proud way.","e":"He had strong muscles and bragged about it to the entire class.","zh":"(動) 吹牛；自誇　(名) 吹牛；誇耀","ez":"他肌肉發達，並向全班炫耀。"},{"w":"conscious","p":"[ˈkɒnʃəs] adj.","d":"If someone is conscious of something, then they are aware of it.","e":"The new student was conscious of the other students staring at her.","zh":"(形) 有意識的；清醒的　(形) 意識到的；察覺到的","ez":"新來的學生意識到其他同學在盯著她看。"},{"w":"disagree","p":"[dɪsəgriː] v.","d":"To disagree with someone means to have a different opinion from them.","e":"The lawyers disagreed about the best way to settle the case.","zh":"(動) 不同意；反對　(動) 意見不合；爭執","ez":"律師們對解決案件的最佳方式意見分歧。"},{"w":"echo","p":"[ˈekou] v.","d":"To echo means that a sound repeats itself because it bounced off an object.","e":"The child yelled over the canyon, and the wall echoed the sound.","zh":"(名) 回聲；迴音　(動) 發出回聲；重複","ez":"孩子對著峽谷大喊，牆壁迴盪著聲音。"},{"w":"eventual","p":"[iˈventʃuəl] adj.","d":"If something is eventual, it will happen at the end of a series of events.","e":"The constant training and planning led the team to an eventual victory.","zh":"(副) 最終地；終於　(形) 最後的；終極的","ez":"持續的訓練和規劃使團隊最終獲勝。"},{"w":"hint","p":"[hint] n.","d":"A hint is information that suggests something will happen or is true.","e":"I quietly passed on a hint to my sister about the test.","zh":"(名) 提示；暗示　(動) 暗示；提示","ez":"我悄悄地給妹妹透露了考試的提示。"},{"w":"idiot","p":"[ˈɪdɪət] n.","d":"An idiot is a person who is not smart or who has done something silly.","e":"Because he got lost in the forest, the man felt like an idiot.","zh":"(名) 白痴；傻瓜　(形) 愚蠢的；傻的","ez":"因為他在森林裡迷路了，那男人覺得自己像個白痴。"},{"w":"immense","p":"[iˈmens] adj.","d":"If something is immense, it is very large.","e":"An immense amount of money was needed to buy such a large boat.","zh":"(形) 極大的；廣闊的　(形) 龐大的；無邊無際的","ez":"買這麼大一艘船需要一大筆錢。"},{"w":"indirect","p":"[indiˈrekt] adj.","d":"If something is indirect, then it is not the easiest or straightest way.","e":"He chose to take the most indirect route to the coast.","zh":"(形) 間接的；不直接的　(副) 間接地；迂迴地","ez":"他選擇走最迂迴的路線到海岸。"},{"w":"option","p":"[ˈɒpʃən] n.","d":"An option is a choice between two or more things.","e":"The children were given the option of three houses to pick from.","zh":"(名) 選擇；選項　(名) 可能性；機會","ez":"孩子們可以從三棟房子中挑選。"},{"w":"pastime","p":"[ˈpæstaɪm] n.","d":"A pastime is an activity done for fun that you do often.","e":"In the US, baseball is considered the national pastime.","zh":"(名) 消遣；娛樂","ez":"在美國，棒球被視為全國性的休閒活動。"},{"w":"perfect","p":"[ˈpəːrfɪkt] adj.","d":"If something is perfect, then it is without any mistakes.","e":"She got all the questions right, so her score was perfect.","zh":"(形) [ˈpɝfɪkt] 完美的；完全的　(動) [pɚˈfɛkt] 使完美","ez":"她全部答對，所以得了滿分。"},{"w":"pinpoint","p":"[ˈpɪnpɔɪnt] v.","d":"To pinpoint something means to locate it exactly.","e":"The navigation system in my car is able to pinpoint my exact location.","zh":"(動) 精確定位；準確找出","ez":"我車上的導航系統能精準定位我的位置。"},{"w":"switch","p":"[swɪtʃ] v.","d":"To switch means to change something to something else.","e":"Mom switched the TV station from the news to her favorite show.","zh":"(動) 轉變；交換　(名) 開關；改變","ez":"媽媽把電視從新聞台轉到她最喜歡的節目。"},{"w":"thorough","p":"[ˈθə:rou] adj.","d":"If something or someone is thorough, then they are complete in every way.","e":"Tina did a thorough job of cleaning the stains out of the carpet.","zh":"(形) 徹底的；詳盡的","ez":"蒂娜徹底清除了地毯上的污漬。"},{"w":"torment","p":"[ˈtɔːrment] v.","d":"To torment someone means to cause them to suffer on purpose.","e":"She tormented her little brother by taking his favorite toy.","zh":"(動) [tɔr'mɛnt] 折磨；使痛苦　(名) ['tɔrmɛnt] 折磨；痛苦","ez":"她拿走弟弟最喜歡的玩具來折磨他。"}]},{"id":4,"name":"Unit 4","words":[{"w":"beak","p":"[beak] n.","d":"A beak is the hard curved part of a bird’s mouth.","e":"The bird used her beak to dig a small hole in the ground.","zh":"(名) 鳥嘴；喙","ez":"那隻鳥用喙在地上挖了一個小洞。"},{"w":"damp","p":"[dæmp] adj.","d":"If something is damp, it is somewhat wet.","e":"My hair is still damp from my shower.","zh":"(形) 潮濕的；微溼的　(動) 使潮濕；抑制","ez":"我的頭髮洗完澡後還是濕的。"},{"w":"disapprove","p":"[disəˈpruːv] v.","d":"To disapprove of something is to think that it is wrong.","e":"Alex, disapproved of his son&rsquo;s behavior.","zh":"(動) 不贊成；反對　不同意；不滿意","ez":"亞歷克斯不贊同他兒子的行為。"},{"w":"except","p":"[ɪkˈsept] prep.","d":"You use except to talk about the only thing that a statement does not apply to.","e":"Everyone had fun on the trip except Jim, who felt ill the whole time.","zh":"(動) 除外；排除　(介) 除了；除…外","ez":"除了吉姆全程不舒服外，大家這趟旅行都玩得很開心。"},{"w":"flight","p":"[flaɪt] n.","d":"A flight is an act of flying, often in an airplane.","e":"The airplane made a flight around the world.","zh":"(名) 飛行；航班　(名) 逃跑；逃離　(動) 飛；飛行","ez":"那架飛機環繞世界飛行了一趟。"},{"w":"fond","p":"[fɒnd] adj.","d":"When someone is fond of something, they like it.","e":"I am very fond of chocolate cake.","zh":"(形) 喜愛的；喜歡的　(動) 喜歡；愛好","ez":"我非常喜歡巧克力蛋糕。"},{"w":"immoral","p":"[ɪˈmɔ(:)rəl] adj.","d":"When something or someone is immoral, they are evil or do bad things.","e":"Stealing money from one&rsquo;s mother is an immoral act.","zh":"(形) 不道德的；缺乏品德的　(形) 邪惡的；不正當的","ez":"偷媽媽的錢是不道德的行為。"},{"w":"ivy","p":"[ˈaivi] n.","d":"Ivy is a plant with long vines that grows upward typically on walls.","e":"The walls of the castle are covered with ivy.","zh":"(名) 常春藤；葉藤　(形) 覆滿常春藤的；被葉藤包裹的","ez":"城堡的牆壁上爬滿了常春藤。"},{"w":"moan","p":"[moun] v.","d":"To moan is to make a low sound when feeling pain or sadness.","e":"The sick man moaned from his bed.","zh":"(動) 呻吟；抱怨　(名) 呻吟聲；哭訴","ez":"那個病人躺在床上呻吟。"},{"w":"oblivious","p":"[əˈblɪvɪəs] adj.","d":"If someone is oblivious of something, they are unaware of it.","e":"I was late to school because I was oblivious of the time.","zh":"(形) 不注意的；沒有察覺的　(形) 遺忘的；健忘的","ez":"我上學遲到是因為沒注意時間。"},{"w":"perish","p":"[ˈperɪʃ] v.","d":"To perish means to die, usually because of bad conditions or bad events.","e":"Many people perish in wars.","zh":"(動) 消亡；毀滅","ez":"許多人在戰爭中喪生。"},{"w":"pit","p":"[pit] n.","d":"A pit is a big hole in the ground.","e":"Michael fell into the pit and needed some help to get out.","zh":"(名) 坑；洞　(動) 使…有坑；與…較量","ez":"麥可掉進坑裡，需要幫忙才能出來。"},{"w":"rim","p":"[rim] n.","d":"The rim is the outside edge of a round thing, like a cup or bottle.","e":"I put my lips to the rim of the bottle and took a drink.","zh":"(名) 邊緣；輪緣","ez":"我把嘴唇貼在瓶口喝了一口。"},{"w":"roost","p":"[ruːst] n.","d":"A roost is a place where birds can land and rest or sleep.","e":"The family of doves made a roost at the top of the tree.","zh":"鳥的；棲身處；棲木；鳥；棲息","ez":"那對鴿子在樹頂築巢。"},{"w":"slippery","p":"[ˈslɪpərɪ] adj.","d":"If something is slippery, it is wet or smooth and causes people to slip.","e":"The repairman fell down on the floor because it was too slippery.","zh":"(形) 滑的；狡猾的","ez":"維修工因為地板太滑而摔倒了。"},{"w":"soar","p":"[sɔːr] v.","d":"To soar means to fly high in the air.","e":"As the sun rose, two eagles soared through the sky.","zh":"(動) 翱翔；急升","ez":"太陽升起時，兩隻老鷹在天空翱翔。"},{"w":"trivial","p":"[ˈtrɪvɪəl] adj.","d":"If something is trivial, it is not important or meaningful.","e":"Television is trivial, but learning to read is very important.","zh":"(形) 瑣碎的；不重要的","ez":"電視很膚淺，但學習閱讀非常重要。"},{"w":"typical","p":"[ˈtɪpɪkəl] adj.","d":"If something is typical, it is normal for a certain type of thing.","e":"Barking is typical behavior for dogs.","zh":"(形) 典型的；平常的","ez":"吠叫是狗典型的行為。"},{"w":"utterly","p":"[ˈʌtəlɪ] adv.","d":"If something is utterly a way, it is completely that way.","e":"When the sun was blocked by the moon, it was utterly dark outside.","zh":"完全地；極度地","ez":"當太陽被月亮遮住時，外面一片漆黑。"},{"w":"weep","p":"[wiːp] v.","d":"To weep means to cry.","e":"My sister told me the dramatic movie would make me weep.","zh":"(動) 哭泣；流淚","ez":"我姊姊說那部劇情片會讓我哭。"}]},{"id":5,"name":"Unit 5","words":[{"w":"awhile","p":"[əˈwaɪl] adv.","d":"If you do something awhile, you do it for a short time.","e":"Wait here awhile, and I&rsquo;ll bring some tea.","zh":"(副) 一陣子；暫時　(名) 一段時間；一會兒","ez":"你在這裡等一會兒，我去拿茶來。"},{"w":"cyberspace","p":"[ˈsaɪbərspeɪs] n.","d":"Cyberspace is the imaginary place of the Internet where activities occur.","e":"I didn&rsquo;t receive your email. It probably got lost in cyberspace.","zh":"網路空間","ez":"我沒收到你的郵件，可能是在網路空間裡遺失了。"},{"w":"edit","p":"[ˈedɪt] v.","d":"To edit means to correct a piece of writing so that it is suitable to be published.","e":"She asked her brother to edit her paper before she submitted it to her teacher.","zh":"(動) 編輯；修改　(名) 編輯版本；版本","ez":"她在交給老師之前，請哥哥幫她修改報告。"},{"w":"essay","p":"[ˈeseɪ] n.","d":"An essay is a short piece of writing on a certain subject.","e":"She had to write a two-page essay for her English class.","zh":"(名) [ˈɛse] 短文；論文　(動) [ɛˈse] 嘗試；試驗","ez":"她必須為英文課寫一篇兩頁的短文。"},{"w":"evaluate","p":"[iˈvӕljueit] v.","d":"To evaluate something means to study it, so a decision can be made.","e":"Joe and Ken evaluated the plan and agreed that it would work.","zh":"(動) 評估；評價　(動) 計算；求值","ez":"喬和肯評估了那個計畫，並認為可行。"},{"w":"faint","p":"[feɪnt] v.","d":"To faint means to go unconscious and fall down.","e":"Carol fainted because she hadn&rsquo;t eaten in over a day.","zh":"(形) 微弱的；昏迷的　(動) 昏倒；暈厥","ez":"卡蘿因為超過一天沒吃東西而昏倒了。"},{"w":"global","p":"[ˈgloubəl] adj.","d":"If something is global, it happens all around the world.","e":"Pollution is a global problem.","zh":"(形) 全球的；全世界的　(形) 整體的；全面的","ez":"污染是全球性的問題。"},{"w":"gymnasium","p":"[dʒɪmˈneɪzɪəm] n.","d":"A gymnasium is a building with equipment that you can use to get exercise.","e":"When I go to the gymnasium, I use the treadmill for 20 minutes.","zh":"體操館；健身房","ez":"我去健身房時，會用跑步機跑二十分鐘。"},{"w":"highlight","p":"[ˈhaɪlaɪt] v.","d":"To highlight something means to mark it with a color so that it is easy to see.","e":"&nbsp;I read my vocabulary list and highlighted the most difficult words.","zh":"(動) 強調；突出　(名) 最精彩的部分；亮點","ez":"我讀了單字表，並標出最難的詞。"},{"w":"ignorant","p":"[ˈɪgnərənt] adj.","d":"If someone is ignorant about something, they have no knowledge about it.","e":"&nbsp;I&rsquo;m a bit ignorant about his theories. Can you explain them to me?","zh":"(形) 無知的；缺乏知識的　(形) 不了解的；沒有意識到的","ez":"我對他的理論有點不了解，你能解釋給我聽嗎？"},{"w":"index","p":"[ˈɪndeks] n.","d":"An index is a list of words at the end of a book that gives information.","e":"If you look in the index, you&rsquo;ll find the right page number.","zh":"(名) 索引；指數　(動) 編製索引；標明","ez":"如果你查索引，就會找到正確的頁碼。"},{"w":"lecture","p":"[ˈlektʃə:r] n.","d":"A lecture is a long, educational speech.","e":"His lecture on world hunger was very informative.","zh":"(名) 講座；演講　(動) 給...上課；講演","ez":"他關於世界飢餓的演講內容非常豐富。"},{"w":"moral","p":"[ˈmɔ(:)rəl] n.","d":"A moral is a message at the end of a story that teaches you something.","e":"At the end of the story, Mother explained the moral to the children.","zh":"(形) 道德的；倫理的　(名) 品格；道德教訓","ez":"故事結尾，媽媽向孩子們說明了寓意。"},{"w":"operate","p":"[ˈɒpəreɪt] v.","d":"To operate means to work or function.","e":"I&rsquo;m sorry, but the trains are not operating today.","zh":"(動) 操作；運作　(動) 經營；管理","ez":"抱歉，今天火車不營運。"},{"w":"private","p":"[ˈpraɪvɪt] adj.","d":"If something is private, it is only used by one person or group.","e":"Don&rsquo;t look at my diary! It&rsquo;s private!","zh":"(形) 私人的；私有的","ez":"別看我的日記！那是私人的！"},{"w":"recent","p":"[ˈriːsənt] adj.","d":"When something is recent, it happened a short time ago.","e":"I did not know what caused his recent behavior.","zh":"(形) 最近的；近期的","ez":"我不知道他最近行為的原因。"},{"w":"resolution","p":"[ˌrezəˈluːʃən] n.","d":"A resolution is a personal decision.","e":"At New Year, I made a list of resolutions to help me have a better year.","zh":"(名) 決心；解決","ez":"新年時，我列了一份新年新希望，讓這一年過得更好。"},{"w":"semester","p":"[sɪˈmestər] n.","d":"A semester is a portion of a school year.","e":"Jack is in his second semester of college.","zh":"(名) 學期","ez":"傑克正在讀大學的第二學期。"},{"w":"typewritten","p":"[ˈtaɪpˌrɪtn] adj.","d":"If something is typewritten, it is written on a computer or typewriter.","e":"This is an important, formal project and must be typewritten.","zh":"打的；打字的","ez":"這是個重要的正式專案，必須打字。"},{"w":"weird","p":"[wiə:rd] adj.","d":"When something is weird, it is very strange.","e":"My best friend&rsquo;s dad is a bit weird.","zh":"(形) 奇怪的；古怪的","ez":"我最好朋友的爸爸有點怪。"}]},{"id":6,"name":"Unit 6","words":[{"w":"absolute","p":"[ˈæbsəluːt] adj.","d":"If something is absolute, it is total or complete.","e":"My presentation was an absolute disaster! It was terrible!","zh":"(形) 絕對的；完全的　(副) 絕對地；完全地","ez":"我的報告簡直是一場災難！太糟了！"},{"w":"alas","p":"[əˈlæs] int.","d":"Alas is a word that people say when something bad happens.","e":"I looked everywhere for my purse, but alas, I couldn&rsquo;t find it.","zh":"哎呀；唉；嗚呼；啊呀","ez":"我到處找我的錢包，但可惜還是找不到。"},{"w":"attentive","p":"[əˈtentɪv] adj.","d":"If you are attentive, you are careful and you pay attention.","e":"He is a good student because he is attentive to every detail on his work.","zh":"(形) 專注的；細心的　(形) 留意的；留神的","ez":"他是個好學生，因為他對工作中的每個細節都很用心。"},{"w":"cape","p":"[keɪp] n.","d":"A cape is a large cloth that covers one’s back and is tied around the neck.","e":"The superhero wore a long red cape.","zh":"(名) 海角；岬角　(名) 斗篷；披肩","ez":"那位超級英雄披著一件長長的紅色披風。"},{"w":"envision","p":"[ɪnˈvɪʒən] v.","d":"To envision something means to imagine that it may happen.","e":"I can envision my mom&rsquo;s face when I give her this present!","zh":"(動) 想像；設想　(動) 展望；預見","ez":"我可以想像媽媽收到這份禮物時的表情！"},{"w":"evenly","p":"[ˈiːvənlɪ] adv.","d":"When something happens evenly, it happens at the same rate or level.","e":"The food was handed out evenly among the hungry people.","zh":"(副) 均勻地；平均地　(副) 平靜地；冷靜地","ez":"食物平均分給了那些飢餓的人們。"},{"w":"folk","p":"[fouk] n.","d":"Folk are common or average people.","e":"I&rsquo;ve invited all the folks from our street to a gathering at my place.","zh":"(名) 民俗；民間文化　(形) 民間的；民俗的","ez":"我邀請了整條街的鄰居來我家聚會。"},{"w":"melt","p":"[melt] v.","d":"To melt means to turn from a solid to a liquid.","e":"The snowman that we made yesterday melted in the sun.","zh":"(動) 融化；溶化　(動) 消散；逐漸消失","ez":"我們昨天堆的雪人在太陽下融化了。"},{"w":"patch","p":"[pætʃ] n.","d":"A patch is a part of a surface that is different in appearance from the rest.","e":"There was one small patch of grass in the sand-covered desert.","zh":"(名) 補丁；一小片　(動) 修補；連接","ez":"在滿是沙子的沙漠中，有一小塊草地。"},{"w":"pleasure","p":"[ˈpleʒər] n.","d":"Pleasure is a feeling of happiness.","e":"The student smiled with pleasure when she received the prize.","zh":"(名) 樂趣；愉快","ez":"學生拿到獎品時，開心地笑了。"},{"w":"pop","p":"[pop] n.","d":"A pop is a short, loud sound.","e":"I heard a loud pop; then my computer screen shattered.","zh":"(名) 流行音樂；砰的一聲　(動) 突然出現；發出砰聲","ez":"我聽到一聲巨響，然後我的電腦螢幕就碎了。"},{"w":"pudding","p":"[ˈpudiŋ] n.","d":"A pudding is a sweet dessert.","e":"Would you like some chocolate pudding and coffee for dessert?","zh":"(名) 布丁","ez":"你想來點巧克力布丁和咖啡當甜點嗎？"},{"w":"rail","p":"[reɪl] n.","d":"A rail is a horizontal bar made of metal or wood.","e":"The cat was sitting on the rail of the fence.","zh":"(名) 鐵軌；欄杆","ez":"那隻貓坐在籬笆的橫桿上。"},{"w":"recipe","p":"[ˈresəpi:] n.","d":"A recipe is a set of instructions to make food.","e":"The apple cake that you made is really tasty. Can I have the recipe, please?","zh":"(名) 食譜；處方","ez":"你做的蘋果蛋糕真好吃。可以給我食譜嗎？"},{"w":"role","p":"[roul] n.","d":"A role is the normal purpose or function of a person or thing.","e":"My role at work is to check the quality of the products.","zh":"(名) 角色；作用","ez":"我在工作中的角色是檢查產品品質。"},{"w":"shrink","p":"[ʃriŋk] v.","d":"To shrink means to get smaller.","e":"If you stick to a healthy diet, your stomach will shrink!","zh":"(動) 縮小；縮水","ez":"如果你堅持健康飲食，你的胃會變小！"},{"w":"soak","p":"[souk] v.","d":"To soak something means to make it very wet.","e":"You need to soak these beans overnight before you cook them.","zh":"(動) 浸泡；浸濕","ez":"煮這些豆子之前，你需要把它們浸泡一整晚。"},{"w":"spark","p":"[spɑːrk] n.","d":"A spark is a small, quick flash of fire.","e":"As he welded the two pieces of metal together, sparks flew everywhere.","zh":"(名) 火花；火星　(動) 引發；激起","ez":"當他把兩塊金屬焊接在一起時，火花四濺。"},{"w":"spirit","p":"[ˈspirit] n.","d":"A spirit is someone’s feelings and personality, but not a physical body part.","e":"He has a very outgoing spirit. He can make friends with anyone.","zh":"(名) 精神；心靈　(動) 鼓舞；鼓勵","ez":"他個性非常外向，可以和任何人交朋友。"},{"w":"suit","p":"[suːt] n.","d":"A suit is a set of clothes. It usually includes a jacket with pants or a skirt.","e":"I wore my new suit on my date with Melissa.","zh":"(名) 套裝；西裝　(動) 適合；合身","ez":"我和梅麗莎約會時穿了新西裝。"}]},{"id":7,"name":"Unit 7","words":[{"w":"account","p":"[əˈkaunt] n.","d":"An account with a bank is an arrangement to keep one’s money there.","e":"After I paid for the new car, my bank account was nearly empty.",
